# ==========================
# 1. PREFIX & GENERAL
# ==========================
set -g prefix C-s
unbind C-b
bind -r C-s send-prefix

# Basics
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -s escape-time 0
set -g allow-rename off
setw -g automatic-rename on

# === RESIZE & TERMINAL FIXES (STABLE) ===
# 1. Use xterm-256color (Best for macOS/iTerm2 resizing)
set -g default-terminal "xterm-256color"
set -sa terminal-overrides ',*:Tc'
set -g set-clipboard on
set -ag terminal-features "xterm*:clipboard"

# 2. Enable Focus Events (Critical for iTerm2 to pass resize signals)
set -g focus-events on

# 3. Aggressive Resize (Standard - helps when multiple clients connect)
setw -g aggressive-resize on

# Note: Removed 'window-size' and 'client-attached' hooks as they caused conflicts.
# ==========================

# History
set -g history-limit 100000
set -g display-panes-time 2000

# ==========================
# 2. TERMINAL TITLES
# ==========================
set -g set-titles on
set -g set-titles-string "#S:#W"

# ==========================
# 3. THEME & COLORS
# ==========================
# Default to Light Theme
source-file ~/.tmux/themes/light.conf

# Toggle Theme (Prefix + T)
bind T if-shell "grep 'bg=white' ~/.tmux/themes/current_theme.conf" \
    "source-file ~/.tmux/themes/dark.conf; display 'Theme: Dark'" \
    "source-file ~/.tmux/themes/light.conf; display 'Theme: Light'"

# ==========================
# 4. BINDINGS
# ==========================
# Reload Config (Prefix + Ctrl-b)
bind C-b source-file ~/.tmux.conf \; display-message "Config Reloaded"

# Force Redraw / Refresh Client (Fixes monitor disconnect glitch)
# "Super Refresh": Detach others, resize, refresh status, AND re-calculate pane layout
bind F run-shell "tmux detach-client -a; tmux resize-window -A; tmux refresh-client -S; tmux select-layout -E; tmux display-message 'Layout & Panes Fixed!'"

# Panic Button: Reset to Tiled Layout (Fixes broken/overlapping panes)
bind 0 select-layout tiled

# === WINDOW NAVIGATION ===
# 1. Move Windows (Option + Control + Left/Right)
bind -n M-C-Left previous-window
bind -n M-C-Right next-window

# 2. Toggle Last Window (Option + Control + Up/Down OR Prefix + l)
bind l last-window
bind -n M-C-Up last-window
bind -n M-C-Down last-window

# === PANE NAVIGATION ===
# 1. Smart Switching (Vim-Tmux-Navigator: Ctrl + h/j/k/l)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# 2. Standard Switching (Prefix + Arrows)
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Standard Pane Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind + resize-pane -Z

# Window Splitting (keeping path)
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# === POPUP / SCRATCHPAD ===
# Press Prefix + ^ (Shift+6) to toggle the scratchpad
bind ^ display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"

# Move Windows (Swap)
bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window

# Safety / Kill / Detach
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind O confirm-before -p "Kill all other panes? (y/n)" "kill-pane -a"
bind X confirm-before -p "kill window #W? (y/n)" kill-window
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session
bind d confirm-before -p "Detach session #S? (y/n)" detach
bind D if -F '#{session_many_attached}' 'confirm-before -p "Detach others? (y/n)" "detach -a"' 'display "Only 1 client attached"'

# Respawn current pane & SSH to window name
# We use run-shell so Tmux translates #{window_name} into text before typing it
bind P confirm-before -p "Restart pane #P & SSH to #W? (y/n)" "respawn-pane -k \; run-shell 'sleep 0.5; tmux send-keys -t #{pane_id} \"ssh admin@#{window_name}\" Enter' \; display 'Pane Respawned!'"

# Respawn ALL panes in current window & SSH to window name
bind W confirm-before -p "Restart ALL panes in #W & SSH? (y/n)" "run-shell 'tmux list-panes -F \"##{pane_id}\" | xargs -I PANE tmux respawn-pane -k -t PANE; sleep 0.5; tmux list-panes -F \"##{pane_id}\" | xargs -I PANE tmux send-keys -t PANE \"ssh admin@#{window_name}\" Enter' \; display 'Window Respawned!'"

# Synchronization (Manual Toggle)
bind C-p setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"

# === BROADCASTING ===
# e/E  → Active pane per window only (safe with pipes and single quotes)
# C-e/C-E → ALL panes in all windows
# The command is stored via set-environment so special chars (|, ', etc.) survive intact.
bind e   command-prompt -p "Command (Session):"      "set-environment -g TMUX_BROADCAST_CMD \"%%\" \; run-shell \"~/.tmux/tmux_broadcast.sh\""
bind E   command-prompt -p "Command (ALL Sessions):" "set-environment -g TMUX_BROADCAST_CMD \"%%\" \; run-shell \"~/.tmux/tmux_broadcast.sh -A\""
bind C-e command-prompt -p "Broadcast (Session):"    "set-environment -g TMUX_BROADCAST_CMD \"%%\" \; run-shell \"~/.tmux/tmux_broadcast.sh -a\""
bind C-E command-prompt -p "Broadcast (ALL):"        "set-environment -g TMUX_BROADCAST_CMD \"%%\" \; run-shell \"~/.tmux/tmux_broadcast.sh -aA\""

# Renaming
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# Misc
bind C-l send-keys 'C-l'  # Clear Screen
bind p display-panes

# Auto-SSH to Window Name in ALL panes
# Grabs the window name (#W) and sends "ssh admin@<windowname>" to every pane in the current window
bind S run-shell "tmux list-panes -F '##{pane_id}' | xargs -I PANE tmux send-keys -t PANE 'ssh admin@#W' Enter"

# ==========================
# 5. COPY MODE & VIM
# ==========================
set -g mode-keys vi

# Start selection with 'v'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Copy to system clipboard via OSC52 (works over SSH to Mac/iTerm2)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================
# 6. STATUS BAR
# ==========================
set -g status-justify centre
set -g status-left-length 20
set -g status-left '#[fg=black][#S] '
set -g status-right-length 60
set -g status-right "#{?pane_synchronized,#[fg=red]SYNC-ON,#[fg=blue]sync-off} #{online_status} #[fg=black][#h]"
set -g window-status-separator ' | '

# ==========================
# 7. PLUGINS
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-online-status'

# Plugin Configs
set -g @online_icon "#[fg=green]●"
set -g @offline_icon "#[fg=red]● Down"
set -g @continuum-restore 'off'

# ⚠️ DISABLE YANK MOUSE BINDINGS
# This allows us to handle mouse releases manually in Section 8
set -g @yank_with_mouse off

# Initialize TMUX plugin manager (keep this line at the very bottom)
# Note: The path is '.../tpm/tpm' because it runs the executable script named 'tpm' inside the directory named 'tpm'.
run '~/.tmux/plugins/tpm/tpm'

# ==========================
# 8. POST-PLUGIN OVERRIDES
# ==========================
# This must be AFTER 'run tpm' so plugins don't overwrite it.
# Single "sky" mode: intercept drag START in root with copy-mode -M so all mouse
# selections use copy mode's native sky highlight, never mustard.
bind -T root         MouseDrag1Pane    if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -M'
# Drag end: bind in BOTH tables. In tmux 3.2a, drag end may fire in root (drag started
# there) even after copy-mode -M. Use send-keys -X directly (NO copy-mode call) to avoid
# resetting copy mode state and re-triggering mustard.
bind -T root         MouseDragEnd1Pane if -F '#{pane_in_mode}' 'send-keys -X copy-selection-and-cancel' ''
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
# Touchpad fix: finger lift fires MouseUp instead of MouseDragEnd when drag isn't detected
bind -T root         MouseUp1Pane      if -F '#{pane_in_mode}' 'send-keys -X copy-selection-and-cancel' ''
bind -T copy-mode-vi MouseUp1Pane      if -F '#{selection_active}' 'send-keys -X copy-selection-and-cancel' ''
# iTerm2/trackpad fix: after a drag, iTerm2 can fire DoubleClick/TripleClick which re-enters
# copy-mode -H (mustard flash for 300ms due to run -d0.3 in plugin default). Only enter copy-mode
# when NOT already in mode (pane_in_mode=0); shrink delay to 50ms to eliminate visible flash.
bind -T root DoubleClick1Pane select-pane -t = \; if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'run-shell "~/.tmux/tmux_click.sh word #{mouse_y} #{mouse_x}"'
bind -T root TripleClick1Pane select-pane -t = \; if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'run-shell "~/.tmux/tmux_click.sh line #{mouse_y}"'
# Handle double/triple click when already in copy mode (e.g. scrolled up)
bind -T copy-mode-vi DoubleClick1Pane select-pane -t = \; send-keys -X select-word \; run -d0.05 \; send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi TripleClick1Pane select-pane -t = \; send-keys -X select-line \; run -d0.05 \; send-keys -X copy-pipe-and-cancel
