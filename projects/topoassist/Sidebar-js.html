/**
* =================================================================
* 1. KEYBOARD STATE & SINGLETON HANDLER (UPDATED)
* =================================================================
*/

// A. Global State Initialization
if (typeof window.lastEscPress === 'undefined') {
  window.lastEscPress = 0;
}

// B. Remove existing listener to prevent duplicate execution loops
if (window.topologyKeyHandler) {
  document.removeEventListener("keydown", window.topologyKeyHandler, true);
}

// C. Define the Handler Function
window.topologyKeyHandler = function (event) {
  const activeEl = document.activeElement;
  const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeEl.tagName) || activeEl.isContentEditable;
  const key = event.key;
  const keyLower = key.toLowerCase();

  // Guard: Global System Shortcuts (Cmd+C, Ctrl+A, etc.)
  if (event.ctrlKey || event.metaKey) return;

  // --- 1. THE "MASTER RESET" (Esc, `, or c) ---
  // Note: Backtick (`) is allowed even in inputs to act as "Clear/Reset" command
  if (key === "Escape" || key === "`" || (keyLower === "c" && !isInput)) {

    event.preventDefault();
    event.stopPropagation();

    // HARD REFRESH: Double-Esc
    if (key === "Escape") {
      const now = Date.now();
      if (now - window.lastEscPress < 500) {
        if (typeof fetchData === 'function') { setStatus('Manual refresh \u2014 reloading topology\u2026', 'status-info'); fetchData(true); }
        return;
      }
      window.lastEscPress = now;
    }

    // STEP 1: CLOSE MODALS — dynamic lookup, no registry needed (only one modal open at a time)
    const openModal = [...document.querySelectorAll('.modal-std')]
      .find(m => getComputedStyle(m).display !== 'none' && !m.classList.contains('modal-minimized'));

    if (openModal) {
      // Config Modal: clear find bar first if active
      if (openModal.id === 'configModal') {
        const cfgSearch = document.getElementById('configSearch');
        if (cfgSearch && cfgSearch.value.trim() !== '') {
          cfgSearch.value = ''; cfgSearch.dispatchEvent(new Event('input')); cfgSearch.focus();
          return;
        }
      }
      // Config Center: clear find bar first if active
      if (openModal.id === 'configCenterModal') {
        const gcfgSearch = document.getElementById('globalCfgSearch');
        if (gcfgSearch && gcfgSearch.value.trim() !== '') {
          gcfgSearch.value = ''; gcfgSearch.dispatchEvent(new Event('input')); gcfgSearch.focus();
          return;
        }
        const cvSearch = document.getElementById('cfgViewSearch');
        if (cvSearch && cvSearch.value.trim() !== '') {
          _clearCfgViewSearch();
          return;
        }
      }
      openModal.querySelector('.btn-modal-close')?.click();
      return;
    }

    // STEP 2: GLOBAL UI & DATA RESET (Run if no modals intercepted the key)
    const sInp = document.getElementById("searchInp");
    const clearBtn = document.getElementById("searchClear");

    if (sInp) { sInp.value = ""; sInp.closest('.search-container')?.classList.remove('search-matched'); }
    if (clearBtn) clearBtn.style.display = "none";

    if (typeof debouncedFilterTopology !== 'undefined') debouncedFilterTopology.cancel();

    const autoList = document.getElementById('search-autocomplete');
    if (autoList) {
      autoList.innerHTML = "";
      autoList.classList.add('hidden');
    }

    const vLegend = document.getElementById('vlan-legend');
    if (vLegend) {
      vLegend.classList.remove('visible');
    }

    if (typeof clearVlanTrace === 'function') clearVlanTrace();
    if (typeof clearPoHighlight === 'function') clearPoHighlight();
    if (typeof triggerResetAnimation === 'function') triggerResetAnimation();

    selectedLineId = null;
    selectedDeviceId = null;
    document.querySelectorAll(".node.selected").forEach(n => n.classList.remove("selected"));
    document.querySelectorAll('.split-btn').forEach(el => el.style.display = "none");
    if (document.getElementById("copyGroup")) document.getElementById("copyGroup").style.display = "none";
    if (typeof activeLinkColors !== 'undefined') activeLinkColors = {};

    // 🛑 FIX: Force a clean synchronous reset of the topology layers
    if (typeof filterTopology === 'function') filterTopology();
    if (typeof traceVlan === 'function') traceVlan();

    // Allow the DOM a split-second to reflow un-hidden cards before drawing links
    setTimeout(() => {
        // 🛑 FIX: Removed zoomToFit()! The restoreCameraState() inside filterTopology
        // will now handle seamlessly gliding back to where you were.
        if (typeof redrawLinks === 'function') requestAnimationFrame(redrawLinks);
    }, 50);
    return false;
  }

  // --- 2. NAVIGATION SHORTCUTS ---
  if (!isInput) {
    if (key === "/" || keyLower === "f") {
      event.preventDefault();
      // Context Aware Focus
      const configModal = document.getElementById("configModal");
      if (configModal && getComputedStyle(configModal).display !== "none") {
        const cfgSearch = document.getElementById("configSearch");
        if (cfgSearch) { cfgSearch.focus(); cfgSearch.select(); }
      } else {
        const globalSearch = document.getElementById("searchInp");
        if (globalSearch) { globalSearch.focus(); globalSearch.select(); }
      }
    }
    else if (keyLower === "v") {
      event.preventDefault();
      const searchInp = document.getElementById("searchInp");
      if (searchInp) {
        searchInp.value = "v";
        searchInp.focus();
        searchInp.setSelectionRange(1, 1);
        const clearBtn = document.getElementById("searchClear");
        if (clearBtn) clearBtn.style.display = "flex";
        const container = searchInp.closest('.search-container');
        if (container) {
          container.classList.add('shortcut-flash');
          setTimeout(() => container.classList.remove('shortcut-flash'), 400);
        }
      }
    }
    else if (keyLower === "s") {
      event.preventDefault();
      const cb = document.getElementById("strictSearch");
      if (cb) {
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      }
    }
    else if (key === "?") {
      event.preventDefault();
      if (typeof openHelpModal === 'function') openHelpModal();
    }
  }
};

/**
* Temporarily dims all VLANs except the target
*/
function isolateVlanPath(targetVid) {
  const targetColor = getVlanColor(targetVid);

  // 1. Dim all links that aren't the target
  // We don't delete them, just change the activeLinkColors temporarily
  globalLinks.forEach(link => {
    if (activeLinkColors[link.id]) {
      const isMatch = checkPortHasVlan(allNodesData[link.u], targetVid) &&
        checkPortHasVlan(allNodesData[link.v], targetVid);

      // If it's not our target path, make it very faint gray
      if (!isMatch) {
        activeLinkColors[link.id] = "rgba(203, 213, 225, 0.2)";
      } else {
        activeLinkColors[link.id] = targetColor;
      }
    }
  });

  // 2. Dim nodes that don't carry this specific VLAN
  document.querySelectorAll(".node").forEach(node => {
    const devId = node.dataset.id;
    const ports = devicePortsMap[devId] || [];
    const hasVlan = ports.some(pid => checkPortHasVlan(allNodesData[pid], targetVid));

    node.style.opacity = hasVlan ? "1" : "0.15";
  });

  if (typeof redrawLinks === 'function') redrawLinks();
}

// Helper to escape regex characters
function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function checkSearchMatch(fullText, term) {
  if (!term) return true;
  fullText = fullText.toLowerCase();
  term = term.toLowerCase();

  if (document.getElementById("strictSearch").checked) {
    // STRICT MODE: Use Regex with boundaries, but ESCAPE the user input first
    let safeTerm = escapeRegExp(term);
    // Allow matching "Et1/1" exactly, or words like "access"
    // We use boundary \b, but slashes / are not word boundaries, so we handle that:
    let regex = new RegExp("(?:^|\\s|\\/|:)" + safeTerm + "(?:$|\\s|\\/|:)", "i");
    return regex.test(fullText);
  } else {
    // LOOSE MODE: Standard includes
    return fullText.includes(term);
  }
}

/* Wrap the first occurrence of query in the label with <mark class="search-hl"> */
function highlightMatch(text, query) {
  if (!query || !text) return _escHtml(text || '');
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return _escHtml(text);
  return _escHtml(text.slice(0, idx))
    + '<mark class="search-hl">' + _escHtml(text.slice(idx, idx + query.length)) + '</mark>'
    + _escHtml(text.slice(idx + query.length));
}
function _escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlightPort(portId, isActive) {
  let cleanId = "p-" + portId.replace(/[^a-zA-Z0-9]/g, "-");
  let el = document.getElementById(cleanId);
  if (el) {
    if (isActive) el.classList.add("highlight");
    else el.classList.remove("highlight");
  }
}

function restoreLinkStyle(linkObj) {
  if (!linkObj) return;
  highlightPort(linkObj.u, false); highlightPort(linkObj.v, false);
  clearInteractionSVG();
}

function hoverPort(portId, isEnter) {
  if (selectedLineId) return;
  let lines = portMap[portId];
  if (isEnter) {
    activeTooltipPortId = portId;

    clearInteractionSVG();
    let svg = document.getElementById("svg-layer");
    if (lines) {
      lines.forEach(lid => {
        let link = linkMap[lid];
        if (link && link.coords) {
          drawInteractionSVG(link);
          let peer = (link.u === portId) ? link.v : link.u;
          highlightPort(peer, true);
        }
      });
    }
    highlightPort(portId, true);
  } else {
    // [NEW] Clear active port
    activeTooltipPortId = null;

    clearInteractionSVG();
    highlightPort(portId, false);
  }
}

function clearPoHighlight() {
  document.querySelectorAll('.port-row.po-group-highlight').forEach(el => el.classList.remove('po-group-highlight'));

function applyPoHighlight(portId) {
  clearPoHighlight();
  const node = allNodesData[portId];
  if (!node || !node.details) return;
  const poVal = (node.details.po_ || '').trim();
  if (!poVal) return;
  for (const pid in allNodesData) {
    const n = allNodesData[pid];
    if (!n || !n.details) continue;
    if ((n.details.po_ || '').trim() === poVal) {
      const cleanId = 'p-' + pid.replace(/[^a-zA-Z0-9]/g, '-');
      const el = document.getElementById(cleanId);
      if (el) el.classList.add('po-group-highlight');
    }
  }
}

function getPeerId(portId) {
  let lines = portMap[portId];
  if (!lines || lines.length === 0) return null;

  // Prefer snake link — prevents wrong peer when port has both snake + regular links
  for (let linkId of lines) {
    let linkObj = linkMap[linkId];
    if (linkObj && linkObj.type === 'snake') {
      return (linkObj.u === portId) ? linkObj.v : linkObj.u;
    }
  }

  let linkId = lines[0];
  let linkObj = linkMap[linkId];
  if (!linkObj) return null;
  return (linkObj.u === portId) ? linkObj.v : linkObj.u;
}

function selectDevice(deviceId) {
  if (isEditMode) return;

  // 1. Update Global State
  selectedDeviceId = deviceId;
  selectedLineId = null;
  savedSelectionId = null;
  _selectedPortId = null;

  // 2. Visual Interaction
  document.querySelectorAll(".node.selected").forEach(n => n.classList.remove("selected"));
  let el = document.querySelector('.node[data-id="' + deviceId + '"]');
  if (el) el.classList.add("selected");

  // 3. UI Context Management
  document.querySelectorAll('.split-btn').forEach(el => el.style.display = "none");
  document.getElementById("splitDevice").style.display = "flex";

  // 5. Data Resolution
  const devData = allDevicesData[deviceId];
  const devId = (devData && devData.sheetIndex) ? devData.sheetIndex : "-";
  const time = getTimestamp();
  // Hide copy/view/push for non-EOS devices — no EOS config to show or push
  const nonEosDev = devData && devData.type === 'non-arista';
  const pushDevBtn = document.getElementById('btnPushDevice');
  const copyDevBtn = document.getElementById('btnDevice');
  const viewDevBtn = document.getElementById('btnViewDevice');
  if (pushDevBtn) pushDevBtn.style.display = nonEosDev ? 'none' : '';
  if (copyDevBtn) copyDevBtn.style.display = nonEosDev ? 'none' : '';
  if (viewDevBtn) viewDevBtn.style.display = nonEosDev ? 'none' : '';
  // Reset stale "Previewing…"/disabled — static button reused across device selections.
  if (pushDevBtn && (!_pendingPush || _pendingPush.deviceName !== deviceId)) { pushDevBtn.textContent = 'Push'; pushDevBtn.disabled = false; }
  document.querySelectorAll('#splitDevice .split-action-divider').forEach(d => d.style.display = nonEosDev ? 'none' : '');

  if (devData && devData.type === 'non-arista') {
    currentDeviceConfig = "";
    _setSplitBtnLabel("splitDevice", devId, deviceId, null, 'non-eos');
  } else if (!configCache[deviceId]) {
    currentDeviceConfig = "";
    _setSplitBtnLabel("splitDevice", devId, deviceId, null, 'fetching', time);
    fetchFullConfig(deviceId);
  } else {
    currentDeviceConfig = formatConfigText(configCache[deviceId].data);
    _setSplitBtnLabel("splitDevice", devId, deviceId, null, 'ready', devData?.fetchEpoch ? formatAgeLabel(devData.fetchEpoch) : 'Cached');
    triggerButtonFlash("btnDevice");
  }

  // 6. AUDIT SUMMARY DISPLAY — always clear prior link-error annotation first
  const selSt = document.getElementById("selectionStatus");
  if (selSt) { selSt.innerHTML = ''; selSt.style.color = ''; selSt.style.fontWeight = ''; selSt.title = ''; }

  let devErrors = new Set();
  const ports = devicePortsMap[deviceId] || [];
  ports.forEach(portId => {
    const links = portMap[portId] || [];
    links.forEach(lid => {
      if (typeof validationErrors !== 'undefined' && validationErrors[lid]) {
        validationErrors[lid].forEach(e => devErrors.add(e));
      }
    });
    if (typeof validationErrors !== 'undefined' && validationErrors[portId]) {
      validationErrors[portId].forEach(e => devErrors.add(e));
    }
  });

  if (devErrors.size > 0) {
    setStatus(`△ ${deviceId} <span style="opacity:0.8; font-weight:normal;">(${devErrors.size} Issues Found)</span>`, "status-error");
    document.getElementById("status").title = Array.from(devErrors).join("\n");
  } else {
    setStatus("Selected Device: " + _fmtDev(deviceId));
    document.getElementById("status").title = "";
  }

  const copyGroup = document.getElementById("copyGroup");
  if (copyGroup) copyGroup.style.display = "flex";
}

/**
* Handles link selection and updates the toolbar with side-by-side Interface actions.
*/
function selectLine(id) {
  if (selectedLineId && selectedLineId !== id) {
    if (linkMap[selectedLineId]) restoreLinkStyle(linkMap[selectedLineId]);
  }
  selectedLineId = id;
  selectedDeviceId = null;
  _selectedPortId = null;

  document.querySelectorAll(".node.selected").forEach(n => n.classList.remove("selected"));
  clearInteractionSVG();

  if (id && linkMap[id]) {
    let link = linkMap[id];
    highlightPort(link.u, true);
    highlightPort(link.v, true);

    // 1. UI Toggle
    document.querySelectorAll('.split-btn').forEach(el => el.style.display = "none");
    document.getElementById("splitLeft").style.display = "flex";
    document.getElementById("splitRight").style.display = "flex";

    // 2. Data Resolution
    let u = link.u; let v = link.v;
    let dev1 = u.split(":")[0].trim(); let port1 = (u.split(":")[1] || "").trim();
    let dev2 = v.split(":")[0].trim(); let port2 = (v.split(":")[1] || "").trim();

    const isCfg1Ready = !!configCache[dev1];
    const isCfg2Ready = !!configCache[dev2];

    // 3. Set state for both split buttons
    const time = getTimestamp();
    const sheetId1 = allDevicesData[dev1]?.sheetIndex || "-";
    const sheetId2 = allDevicesData[dev2]?.sheetIndex || "-";

    _leftDev   = dev1;
    _rightDev  = dev2;
    _leftPort  = port1;  // single-interface push when clicked from link strip
    _rightPort = port2;
    // Hide copy/view/push for non-EOS link sides — no EOS config to show or push
    const nonEos1 = allDevicesData[dev1] && allDevicesData[dev1].type === 'non-arista';
    const nonEos2 = allDevicesData[dev2] && allDevicesData[dev2].type === 'non-arista';
    const pbl = document.getElementById('btnPushLeft');
    const cbl = document.getElementById('btnLeft');
    const vbl = document.getElementById('btnViewLeft');
    const pbr = document.getElementById('btnPushRight');
    const cbr = document.getElementById('btnRight');
    const vbr = document.getElementById('btnViewRight');
    if (pbl) pbl.style.display = nonEos1 ? 'none' : '';
    if (cbl) cbl.style.display = nonEos1 ? 'none' : '';
    if (vbl) vbl.style.display = nonEos1 ? 'none' : '';
    if (pbr) pbr.style.display = nonEos2 ? 'none' : '';
    if (cbr) cbr.style.display = nonEos2 ? 'none' : '';
    if (vbr) vbr.style.display = nonEos2 ? 'none' : '';
    // Reset stale "Previewing…"/disabled state — buttons are static DOM elements reused
    // across device selections; skip reset only when a push is in-flight for that device.
    if (pbl && (!_pendingPush || _pendingPush.deviceName !== dev1)) { pbl.textContent = 'Push'; pbl.disabled = false; }
    if (pbr && (!_pendingPush || _pendingPush.deviceName !== dev2)) { pbr.textContent = 'Push'; pbr.disabled = false; }
    document.querySelectorAll('#splitLeft .split-action-divider').forEach(d => d.style.display = nonEos1 ? 'none' : '');
    document.querySelectorAll('#splitRight .split-action-divider').forEach(d => d.style.display = nonEos2 ? 'none' : '');

    if (allDevicesData[dev1] && allDevicesData[dev1].type === 'non-arista') {
      currentLeftConfig = "";
      _setSplitBtnLabel("splitLeft", sheetId1, dev1, port1, 'non-eos');
    } else if (isCfg1Ready) {
      currentLeftConfig = allNodesData[u]?.details?.config;
      _setSplitBtnLabel("splitLeft", sheetId1, dev1, port1, 'ready', allDevicesData[dev1]?.fetchEpoch ? formatAgeLabel(allDevicesData[dev1].fetchEpoch) : 'Cached');
      triggerButtonFlash("btnLeft");
    } else {
      _setSplitBtnLabel("splitLeft", sheetId1, dev1, port1, 'fetching', time);
      fetchFullConfig(dev1);
    }

    if (allDevicesData[dev2] && allDevicesData[dev2].type === 'non-arista') {
      currentRightConfig = "";
      _setSplitBtnLabel("splitRight", sheetId2, dev2, port2, 'non-eos');
    } else if (isCfg2Ready) {
      currentRightConfig = allNodesData[v]?.details?.config;
      _setSplitBtnLabel("splitRight", sheetId2, dev2, port2, 'ready', allDevicesData[dev2]?.fetchEpoch ? formatAgeLabel(allDevicesData[dev2].fetchEpoch) : 'Cached');
      triggerButtonFlash("btnRight");
    } else {
      _setSplitBtnLabel("splitRight", sheetId2, dev2, port2, 'fetching', time);
      fetchFullConfig(dev2);
    }

    // 7. [NEW] AUDIT ERROR DISPLAY
    // If this link has an error recorded by runValidation, show it here.
    const statusEl = document.getElementById("selectionStatus");
    if (statusEl) {
      if (typeof validationErrors !== 'undefined' && validationErrors[id]) {
        // Found errors! Show them in Red.
        statusEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg> ' + validationErrors[id].join(" | ");
        statusEl.style.color = "#b91c1c"; // Strong Red
        statusEl.style.fontWeight = "bold";
        statusEl.title = validationErrors[id].join("\n");
      } else {
        // No errors — clear any prior annotation
        statusEl.innerHTML = "";
        statusEl.style.color = "";
        statusEl.style.fontWeight = "";
        statusEl.title = "";
      }
    }

    document.getElementById("copyGroup").style.display = "flex";
    requestAnimationFrame(redrawLinks);
  }
}

/**
* 3. DISCONNECTED PORT SELECTION (Single Interface)
* Old Name: identifyPeer
*/
function selectPortOrLink(portId) {
  if (isEditMode) { return; }
  applyPoHighlight(portId);
  let peer = getPeerId(portId);
  if (peer) {
    let lines = portMap[portId];
    if (lines && lines.length > 0) { selectLine(lines[0]); }
  } else {
    // Disconnected / Single Port Logic
    if (selectedLineId && linkMap[selectedLineId]) { let old = linkMap[selectedLineId]; restoreLinkStyle(old); }
    selectedLineId = null; savedSelectionId = null; selectedDeviceId = null; _selectedPortId = portId;

    document.querySelectorAll(".node.selected").forEach(n => n.classList.remove("selected"));
    document.getElementById("selectionStatus").innerText = "Selected Link: " + portId + " (Disconnected)";
    document.getElementById("selectionStatus").classList.add("highlighted");

    let myData = allNodesData[portId];
    if (myData) {
      currentLeftConfig = myData.details.config || "";
      _leftDev   = portId.split(':')[0];
      _rightDev  = null;
      _leftPort  = null;  // device-level push — no port filter
      _rightPort = null;
      document.getElementById("copyGroup").style.display = "flex";

      const btnLeft = document.getElementById("btnLeft");

      const devName = portId.split(':')[0];
      const portName = portId.split(':')[1];
      const devData = allDevicesData[devName];

      const sheetId = (devData && devData.sheetIndex) ? devData.sheetIndex : "-";
      const ageLabel = devData && devData.fetchEpoch ? formatAgeLabel(devData.fetchEpoch) : getTimestamp();

      document.querySelectorAll('.split-btn').forEach(el => el.style.display = "none");
      document.getElementById("splitLeft").style.display = "flex";
      _setSplitBtnLabel("splitLeft", sheetId, devName, portName || "?", 'ready', ageLabel);
      triggerButtonFlash("btnLeft");
    }
    requestAnimationFrame(redrawLinks);
  }
}

// Returns 000_BASE + 000_GTPL concatenated — device baseline + user template.
// Used by "Copy Base+Ints" to prepend before interface blocks.
function _getBaseBlock(deviceName) {
  const data = configCache[deviceName] && configCache[deviceName].data;
  if (!data) return '';
  const base = (data['000_BASE'] && data['000_BASE'].full) || '';
  const tpl  = (data['000_GTPL'] && data['000_GTPL'].full) || '';
  if (base && tpl) return base + '\n!\n' + tpl;
  return base || tpl;
}

// Updates the currently selected device/link strips to an error state.
// Called when fetchFullConfig hits a server error, GAS framework timeout, or failure.
// Turns the strip red and re-enables buttons so the user can retry by re-selecting.
function _updateStripFetchError(deviceName, label) {
  const sheetId = (allDevicesData[deviceName] && allDevicesData[deviceName].sheetIndex) || "-";
  const errLabel = `[${sheetId}] ${deviceName} — ${label}`;
  if (selectedDeviceId && deviceName.toLowerCase() === selectedDeviceId.toLowerCase()) {
    setSplitBtnState("splitDevice", errLabel, 'error', false);
  }
  if (selectedLineId) {
    const link = linkMap[selectedLineId];
    if (link) {
      if (link.u.toLowerCase().startsWith(deviceName.toLowerCase() + ":")) {
        setSplitBtnState("splitLeft", errLabel, 'error', false);
      }
      if (link.v.toLowerCase().startsWith(deviceName.toLowerCase() + ":")) {
        setSplitBtnState("splitRight", errLabel, 'error', false);
      }
    }
  }
}

/**
* Processes incoming config data from the server.
* Ensures Context (Left/Right) and State (Ready) are preserved without flickering.
* Old Name: processFetchedConfig
*/
function processDeviceConfig(deviceName, configData) {
  const wasAlreadyLoaded = !!configCache[deviceName];
  const time = (wasAlreadyLoaded && allDevicesData[deviceName])
    ? (allDevicesData[deviceName].fetchTime || getTimestamp())
    : getTimestamp();

  // Populate allNodesData per-port config FIRST so Cases 1/2 below read fresh values.
  // configData keys are prefixed (e.g. "050_Et1", "060_Po10") for section ordering in the
  // Configs sheet. Strip the numeric prefix before canonicalizing so the lookup matches
  // allNodesData keys (e.g. "SPINE1:Et1"), keeping tooltip and Configs sheet in sync.
  for (let portName in configData) {
    let shortPort = canonicalizeInterface(portName.replace(/^\d+_/, ""));
    let fullId = deviceName + ":" + shortPort;
    if (allNodesData[fullId] && allNodesData[fullId].details) {
      allNodesData[fullId].details.config = configData[portName].full;
    }
  }

  if (allDevicesData[deviceName]) {
    const fullCfg = formatConfigText(configData);
    allDevicesData[deviceName].fetchTime = time;
    allDevicesData[deviceName].fetchEpoch = Date.now();

    const sheetId = allDevicesData[deviceName]?.sheetIndex || "-";
    const ageLabel = formatAgeLabel(allDevicesData[deviceName].fetchEpoch);
    const _isEosDev = allDevicesData[deviceName] && allDevicesData[deviceName].type !== 'non-arista';

    // CASE 1: CURRENTLY SELECTED DEVICE — always update, no background guard
    if (_isEosDev && selectedDeviceId && deviceName.toLowerCase() === selectedDeviceId.toLowerCase()) {
      currentDeviceConfig = fullCfg;
      _setSplitBtnLabel("splitDevice", sheetId, deviceName, null, 'ready', ageLabel);
      if (!wasAlreadyLoaded) triggerButtonFlash("btnDevice");
    }

    // CASE 2: CURRENTLY SELECTED LINK — use _leftDev/_rightDev (stable across
    // redrawLinks/filterTopology which can clear selectedLineId while strip stays visible).
    const splitLeftEl  = document.getElementById("splitLeft");
    const splitRightEl = document.getElementById("splitRight");
    if (_isEosDev && _leftDev && _leftDev.toLowerCase() === deviceName.toLowerCase()
        && splitLeftEl && splitLeftEl.style.display !== "none") {
      const portL = _leftPort || "";
      currentLeftConfig = allNodesData[deviceName + ":" + portL]?.details?.config;
      _setSplitBtnLabel("splitLeft", sheetId, deviceName, portL, 'ready', ageLabel);
      if (!wasAlreadyLoaded) triggerButtonFlash("btnLeft");
    }
    if (_isEosDev && _rightDev && _rightDev.toLowerCase() === deviceName.toLowerCase()
        && splitRightEl && splitRightEl.style.display !== "none") {
      const portR = _rightPort || "";
      currentRightConfig = allNodesData[deviceName + ":" + portR]?.details?.config;
      _setSplitBtnLabel("splitRight", sheetId, deviceName, portR, 'ready', ageLabel);
      if (!wasAlreadyLoaded) triggerButtonFlash("btnRight");
    }
  }
}

/**
* Helper: Standardizes interface names (Ethernet1 -> Et1)
* Required for mapping server config data to UI elements.
* DUPLICATED in Code.gs — last synced: 2026-05-05
*/
function canonicalizeInterface(name) {
  if (!name) return "";

  let s = String(name).trim().replace(/^(interface\s+|int\s+)/i, "");

  s = s.replace(/^ethernet/i, "Et")
    .replace(/^eth/i, "Et")
    .replace(/^port-channel/i, "Po")
    .replace(/^portchannel/i, "Po")
    .replace(/^vlan/i, "Vl")
    .replace(/^vxlan/i, "Vx")
    .replace(/^loopback/i, "Lo")
    .replace(/^(management|mgmt|ma)/i, "Ma")
    .replace(/^tunnel/i, "Tu");

  // Matches Et1, Et1/1, Et1.10, etc.
  let match = s.match(/^((?:Twe|Hu|Te|Gi|Fa|Et|Po|Vx|Vl|Lo|Ma|Tu)\d+[\d\/.]*)/i);

  return match ? match[1] : s;
}

function getModeScore(port) {
  let m = (port.details.sp_mode_ || "").trim().toLowerCase();
  let map = { "l2-et-access": 1, "l2-po-access": 2, "l2-et-trunk": 3, "l2-po-trunk": 4, "l3-et-int": 5, "l3-po-int": 6, "l3-et-sub-int": 7, "l3-po-sub-int": 8 };
  return map[m] || 99;
}

function changeSort(val) {
  if (!val) return;
  sortMode = val;
  updateSortButtons(val);

  if (currentData) {
    if (typeof toggleViewMode === 'function') {
      toggleViewMode(currentViewMode);
    } else {
      render(currentData);
    }
  }
}

function updateSortButtons(activeVal) {
  const map = { sheet: 'btnSortSheet', mode: 'btnSortMode', priority: 'btnSortIp', alpha: 'btnSortAlpha' };
  Object.values(map).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const activeEl = document.getElementById(map[activeVal]);
  if (activeEl) activeEl.classList.add('active');
}

// --- EDIT MODALS ---
// SECURITY FIX: ESCAPED INPUT ATTRIBUTES
function buildFormFields(d, prefix, isReadOnly) {
  let html = "";

  // Iterate over Global Schema
  topoColumnSchema.forEach(item => {
    // Skip 'int' (handled in top section) and 'snake_int' (set internally by addSnakePair, not user-editable)
    if (item.key === 'int' || item.key === 'snake_int') return;

    let val = d[item.key + "_"]; // Access data (e.g. d.po_)

    html += "<div class='form-group'><label class='form-label'>" + escapeHtml(item.label) + "</label>";

    // Check if this field has options (Dropdown)
    if (item.options && item.options.length > 0) {
      html += "<select class='form-input' id='" + prefix + item.key + "'>";
      html += "<option value=''></option>"; // Empty option

      item.options.forEach(opt => {
        // Handle empty strings in options if any
        if (String(opt).trim() === "") return;

        let sel = (val === opt) ? "selected" : "";
        html += "<option value='" + escapeHtml(opt) + "' " + sel + ">" + escapeHtml(opt) + "</option>";
      });
      html += "</select>";
    }
    // Otherwise, standard Text Input
    else {
      let safeVal = escapeHtml(val || "");
      // Optional: Add specific placeholders based on key
      let placeholder = "";
      if (item.key === 'vlan') placeholder = "10, 20";
      if (item.key === 'po') placeholder = "Po10";

      const isPoDisabled = item.key === 'po' && /^l[23]-et/i.test(d.sp_mode_ || "");
      if (isPoDisabled) {
        html += "<input type='text' class='form-input' id='" + prefix + item.key + "' value='' placeholder='N/A for Et mode' disabled style='opacity:0.4;cursor:not-allowed;'>";
      } else {
        html += "<input type='text' class='form-input' id='" + prefix + item.key + "' value='" + safeVal + "' placeholder='" + placeholder + "'>";
      }
    }
    html += "</div>";
  });

  return html;
}

/**
* Unified Modal Column Builder
* Generates HTML for one side of a connection (Device Select/Text, Port Input/Text, Form Fields)
*/
function buildModalColumn(title, config) {
  let html = `<div class='modal-col'><div class='col-title'>${title}</div>`;

  // 1. Device Field
  html += `<div class='form-group'><label class='form-label'>Device</label>`;
  if (config.mode === 'static') {
    html += `<input type='text' class='form-static' value='${escapeHtml(config.devVal)}' readonly>`;
  } else {
    // Editable Dropdown
    html += `<select class='form-input' id='${config.devId}'>`;
    globalDeviceNames.forEach(n => {
      let sel = (n === config.devVal) ? "selected" : "";
      html += `<option value='${n}' ${sel}>${n}</option>`;
    });
    html += `</select>`;
  }
  html += `</div>`;

  // 2. Interface Field
  html += `<div class='form-group'><label class='form-label'>Interface</label>`;
  if (config.mode === 'static') {
    html += `<input type='text' class='form-static' value='${escapeHtml(config.portVal)}' readonly>`;
  } else {
    // Editable Input
    let pVal = config.portVal || "";
    html += `<input type='text' class='form-input' id='${config.portId}' value='${pVal}' placeholder='EtX/Y'>`;
  }
  html += `</div>`;

  // 3. Form Fields (VLAN, Speed, etc.)
  // We reuse your existing buildFormFields helper here
  html += buildFormFields(config.dataObj || {}, config.fieldsPrefix);

  html += `</div>`;
  return html;
}

function openEditModal(domId, portObj) {

  let parts = domId.split(":");

    devVal: localDev,

  // RIGHT COL: Editable (Peer can be changed)

    html += buildModalColumn("Peer Connection", {
      mode: "editable",
      devVal: peerDev,
      portVal: peerPort,
      devId: "peer_dev_sel",
      portId: "peer_port_name",
      fieldsPrefix: "peer_",
      dataObj: peerObj.details
    });
  } else {
    // Disconnected State
    html += `<div class='modal-col'>
<div class='col-title' style='color:#ef4444'>Peer: Disconnected</div>
<div style='padding:20px; text-align:center; color:#94a3b8; font-style:italic;'>
No peer connected.<br>Use 'Connect' to add a link.
</div>
</div>`;
  }
  html += "</div>";

  document.getElementById("modalContent").innerHTML = html;

  // Show Delete or Delete+Unconfigure depending on bridge availability
  const btnDelete = document.getElementById("btnDelete");
  const btnDelUnconf = document.getElementById("btnDeleteUnconfigure");

    if (btnDelete) btnDelete.style.display = "none";
    if (btnDelUnconf) btnDelUnconf.style.display = "block";
  } else {
    if (btnDelete) btnDelete.style.display = "block";
    if (btnDelUnconf) btnDelUnconf.style.display = "none";
  }

  setActiveModalChip('guiEditModal');
  modal.style.display = "flex";
  initialEditModalState = _captureFormState('guiEditModal');
}

    mode: "static",
    devVal: devA,
    portVal: portA,
    fieldsPrefix: "editA_",
    dataObj: portObj.details

    devVal: defDevB,
    portVal: "",

    }).withFailureHandler(function (err) {
      btn.innerText = originalText; btn.disabled = false; setStatus("Server Error: " + err.message, "status-error");
    }).connectExistingToNew(devA, portA, updatesA, devB, portB, updatesB);

    // 2. ADD MODE
  } else if (isAddMode) {
    let devA = document.getElementById("devA_sel").value;
    let portA = document.getElementById("portA_name").value;
    let updatesA = {};

    dynamicIds.forEach(id => { let el = document.getElementById("editA_" + id); if (el) updatesA[id] = el.value; });

    let devB = document.getElementById("devB_sel").value;
    let portB = document.getElementById("portB_name").value;
    let updatesB = {};

    dynamicIds.forEach(id => { let el = document.getElementById("editB_" + id); if (el) updatesB[id] = el.value; });

    if (!portA || !portB) { alert("Interface Names required."); btn.innerText = originalText; btn.disabled = false; return; }

      btn.innerText = originalText; btn.disabled = false;

    };
    const onAddFail = function (err) { btn.innerText = originalText; btn.disabled = false; setStatus("Server Error: " + err.message, "status-error"); };

    if (devA === devB) {
      // Snake self-loop — same device on both sides
      if (!updatesA.ip_type_) updatesA.ip_type_ = "p2p";
      if (!updatesA.sp_mode_ || !String(updatesA.sp_mode_).trim()) {
        setStatus("Snake port: sp_mode_ is required — use l3-et-int (L3) or l2-et-access/l2-et-trunk (L2)", "status-error");
        btn.innerText = originalText; btn.disabled = false; return;
      }
      if (!updatesA.vlan_ || !String(updatesA.vlan_).trim()) {
        setStatus("Snake port: vlan_ is required — enter the VLAN for the snake VRF chain", "status-error");
        btn.innerText = originalText; btn.disabled = false; return;
      }
      google.script.run.withSuccessHandler(onAddSuccess).withFailureHandler(onAddFail)
        .addSnakePair(devA, portA, portB, updatesA);
    } else {
      google.script.run.withSuccessHandler(onAddSuccess).withFailureHandler(onAddFail)
        .addLinkPair(devA, portA, devB, portB, updatesA, updatesB);

  } else {

    let newPeerDev = "", newPeerPort = "";

    if (originalPeerId && peerDevInput && peerPortInput) {
      newPeerDev = peerDevInput.value;
      newPeerPort = peerPortInput.value;

    if (isTopologyChange) {

      google.script.run.withSuccessHandler(function (res) {
        // ... success ...
        btn.innerText = originalText; btn.disabled = false;

        else { initialEditModalState = ''; closeEditModal(); setStatus(localDev + ':' + localPort + ' \u2194 ' + newPeerDev + ':' + newPeerPort + ' \u2014 topology refresh\u2026', 'status-info'); fetchData(true); }

    } else {

// Scan allNodesData against deviceInternalVlans.
// Returns [{device, port, vlans:[...conflicting ids]}] — empty if no bridge data or no conflicts.
function _scanInternalVlanConflicts() {
  if (!Object.keys(deviceInternalVlans).length) return [];
  const hits = [];
  for (const nodeId in allNodesData) {
    const node = allNodesData[nodeId];
    if (!node || !node.details) continue;
    const intVlans = deviceInternalVlans[(node.device || '').toLowerCase()] || [];
    if (!intVlans.length) continue;
    const pvj = parseVlanWithNative(node.details.vlan_);
    const vlanStr = [pvj.vlans, pvj.native].filter(Boolean).join(',');
    if (!vlanStr) continue;
    const portVlans = [...parseVlanInput(vlanStr)].map(v => parseInt(v)).filter(v => !isNaN(v));
    const conflicts = portVlans.filter(v => intVlans.includes(v));
    if (conflicts.length) hits.push({ device: node.device, port: node.name, vlans: conflicts });
  }
  return hits;
}

// --- RESIZER ---
function initResizer(el, nodeId) {
  let resizer = document.createElement("div");
  resizer.className = "resizer";
  resizer.title = "Drag to resize";
  el.appendChild(resizer);
  resizer.addEventListener("mousedown", function (e) { initDrag(e, el, nodeId); });
}
let startX, startWidth, resizableEl, _resizeNodeId;
function initDrag(e, el, nodeId) {
  startX = e.clientX;
  startWidth = parseInt(document.defaultView.getComputedStyle(el).width, 10);
  resizableEl = el;
  _resizeNodeId = nodeId || null;
  document.documentElement.addEventListener("mousemove", doDrag, false);
  document.documentElement.addEventListener("mouseup", stopDrag, false);
  e.stopPropagation(); e.preventDefault();
}
function doDrag(e) {
  let newW = startWidth + e.clientX - startX;
  if (newW < 150) newW = 150;
  resizableEl.style.width = newW + "px";
}
function stopDrag(e) {
  document.documentElement.removeEventListener("mousemove", doDrag, false);
  document.documentElement.removeEventListener("mouseup", stopDrag, false);
  if (_resizeNodeId) {
    const widths = JSON.parse(localStorage.getItem('nb_card_width') || '{}');
    widths[_resizeNodeId] = parseInt(resizableEl.style.width, 10);
    localStorage.setItem('nb_card_width', JSON.stringify(widths));
  }
}
