}

// Extract short device name from LLDP systemName FQDN.
// "DUT-L-Leaf1-VG-cal423.sjc.aristanetworks.com" → "cal423"
// Falls back to original string if no dashes/dots found.
function _normSysName(sysName) {
  const host = (sysName || '').split('.')[0];   // strip domain
  const seg  = host.split('-').pop();            // last dash segment
  return seg || host;
}

// Normalize LLDP full interface names to canonical short form (Ethernet1 → Et1).
function _normLldpIface(name) {
  return (name || '')
    .replace(/^Ethernet(\d.*)/i,    'Et$1')
    .replace(/^Management(\d.*)/i,  'Ma$1')
    .replace(/^Port-Channel(\d.*)/i,'Po$1')
    .replace(/^Loopback(\d.*)/i,    'Lo$1')
    .replace(/^Vxlan(\d.*)/i,       'Vx$1');
}

// Dot class for bridge-port-dot — full class string including has-l1 suffix.
// missing+errdis → red; missing+down → amber; missing+shut → gray; missing+other → red.
function _bridgePortDotClass(status, portId) {
  let cls;
  if (!status || status === 'match') cls = 'bridge-port-match';
  else if (status === 'mismatch') cls = 'bridge-port-mismatch';
  else if (status === 'missing') {
    const sub = (portId && bridgePortSubType[portId]) || 'other';
    cls = sub === 'errdis' ? 'bridge-port-errdis'
        : sub === 'shut'   ? 'bridge-port-shut'
        : sub === 'down'   ? 'bridge-port-down' : 'bridge-port-missing';
  } else { cls = ''; }
  return cls + (portId && bridgePortL1Errors[portId] ? ' has-l1' : '');
}

// Title tooltip for a bridge-port-dot span.
function _bridgePortTitle(status, portId) {
  if (!status || status === 'match') return 'LLDP match';
  if (status === 'mismatch') return 'LLDP mismatch';
  const sub = (portId && bridgePortSubType[portId]) || 'other';
  if (sub === 'errdis') return 'No LLDP neighbor — errdisabled';
  if (sub === 'down')   return 'No LLDP neighbor — link down';
  if (sub === 'shut')   return 'No LLDP neighbor — admin shut';
  return 'No LLDP neighbor';
}

// has-l1 suffix for a link row (either endpoint above threshold).
function _linkL1Cls(u, v) { return (bridgePortL1Errors[u] || bridgePortL1Errors[v]) ? ' has-l1' : ''; }

// Render the Port — LLDP sidebar legend via the same SSoT helpers as live dot rendering.
// Any change to _bridgePortDotClass or _bridgePortTitle propagates automatically.
function _renderBridgeLldpLegend() {
  const row = document.getElementById('lldpLegendRow');
  if (!row) return;
  const MOCK = '__lgnd__';
  const items = [
    { status: 'match' },
    { status: 'mismatch' },
    { status: 'missing', sub: 'other',  label: 'Missing' },
    { status: 'missing', sub: 'errdis', label: 'Err-Dis' },
    { status: 'missing', sub: 'down',   label: 'Down' },
    { status: 'missing', sub: 'shut',   label: 'Shut' },
  ];
  let html = items.map(item => {
    if (item.sub) bridgePortSubType[MOCK] = item.sub;
    const pid   = item.sub ? MOCK : null;
    const cls   = _bridgePortDotClass(item.status, pid);
    const title = _bridgePortTitle(item.status, pid);
    const label = item.label || (item.status[0].toUpperCase() + item.status.slice(1));
    if (item.sub) delete bridgePortSubType[MOCK];
    return `<div class="l-item"><span class="bridge-port-dot ${cls}" title="${title}"></span>${label}</div>`;
  }).join('');
  html += `<div class="l-item"><span class="bridge-port-dot has-l1" title="L1 errors (CRC/FCS)"></span>L1 Error</div>`;
  row.innerHTML = html;
}

// Apply bridgePortStatus to topology card port rows.
// Called after runBridgeCheck() and after render() (to survive topology redraws).
function _bridgeEffectiveClass(status, portId) {
  if (status === 'missing') {
    const sub = (portId && bridgePortSubType[portId]) || 'other';
    if (sub === 'errdis') return bridgeAuditFlagErrDis ? 'missing' : 'missing-quiet';
    if (sub === 'shut')   return bridgeAuditFlagShut   ? 'missing' : 'missing-quiet';
    if (sub === 'down')   return bridgeAuditFlagDown   ? 'missing' : 'missing-quiet';
    return bridgeAuditFlagMissing ? 'missing' : 'missing-quiet';
  }
  return status;
}

// Populate bridgePortSubType from fresh dsData right after _compareBridgeData().
// This is the single canonical sub-type classification — all consumers read it.
// Priority: errdis > shut > down > other.
// notconnect ports whose peer device is unreachable or non-Arista are reclassified as 'shut'
// (expected no-link — peer is disabled/unavailable, not a real cabling issue).
function _populateBridgePortSubTypes(dsData) {
  bridgePortSubType = {};
  if (!dsData) return;
  // Build peer lookup from _lastBridgeResults (set by _compareBridgeData before this call).
  const portToPeer = {};
  if (_lastBridgeResults) {
    _lastBridgeResults.forEach(r => { portToPeer[r.u] = r.v; portToPeer[r.v] = r.u; });
  }
  Object.keys(bridgePortStatus).forEach(portId => {
    if (bridgePortStatus[portId] !== 'missing') return;
    const c = portId.lastIndexOf(':');
    const ds = dsData[portId.slice(0, c)];
    if (!ds || !ds.ok || !ds.interfaces) { bridgePortSubType[portId] = 'other'; return; }
    const ls = (ds.interfaces[_expandIfaceName(portId.slice(c + 1))] || {}).linkStatus || '';
    if (ls === 'errdisabled') {
      bridgePortSubType[portId] = 'errdis';
    } else if (ls === 'disabled') {
      bridgePortSubType[portId] = 'shut';
    } else if (ls === 'notconnect') {
      const peerPortId = portToPeer[portId];
      const peerDev    = peerPortId ? peerPortId.slice(0, peerPortId.lastIndexOf(':')) : null;
      const peerIsUnavailable = peerDev && (!dsData[peerDev] || !dsData[peerDev].ok);
      const peerIsNonArista   = peerDev && (allDevicesData[peerDev] || {}).type === 'non-arista';
      const peerPortName = peerPortId ? peerPortId.slice(peerPortId.lastIndexOf(':') + 1) : null;
      const peerDs = peerDev ? dsData[peerDev] : null;
      const peerIfLs = (peerPortName && peerDs && peerDs.ok && peerDs.interfaces)
        ? ((peerDs.interfaces[_expandIfaceName(peerPortName)] || {}).linkStatus || '') : '';
      const peerIsDisabled = peerIfLs === 'disabled';
      bridgePortSubType[portId] = (peerIsUnavailable || peerIsNonArista || peerIsDisabled) ? 'shut' : 'down';
    } else {
      bridgePortSubType[portId] = 'other';
    }
  });
}

// Populate bridgePortL1Errors from fresh dsData right after _populateBridgePortSubTypes().
// SSoT for L1 error classification — all consumers read from this map.
// Iterates all topology ports (allNodesData) so errdisable/down/shut ports not in a bridge
// check are also detected, not just ports in bridgePortStatus.
function _populateBridgePortL1Errors(dsData) {
  bridgePortL1Errors = {};
  if (!dsData) return;
  Object.keys(allNodesData).forEach(portId => {
    const c  = portId.lastIndexOf(':');
    const ds = dsData[portId.slice(0, c)];
    if (!ds || !ds.ok || !ds.interfaceErrors) return;
    const e = ds.interfaceErrors[_expandIfaceName(portId.slice(c + 1))];
    if (!e) return;
    if ((e.fcs || 0) >= bridgeL1ErrorThreshold ||
        (e.sym || 0) >= bridgeL1ErrorThreshold ||
        (e.align || 0) >= bridgeL1ErrorThreshold) {
      bridgePortL1Errors[portId] = e;
    }
  });
}

function _l1ErrDetail(u, uErr, v, vErr) {
  const fmt = (id, e) => {
    if (!e) return '';
    let s = id + ': FCS ' + e.fcs;
    if (e.sym)   s += ' sym '   + e.sym;
    if (e.align) s += ' align ' + e.align;
    return s;
  };
  return [fmt(u, uErr), fmt(v, vErr)].filter(Boolean).join(' | ');
}

function _applyHostnameIndicators(devices) {
  devices.forEach(n => {
    const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    const el = document.getElementById('bridgeHn_' + safeId);
    if (!el) return;
    const ds = devStatusMap[n.id];
    if (!ds || !ds.ok || !ds.hostname) return;
    const expected = _normSysName(n.id);
    const actual   = _normSysName(ds.hostname);
    if (expected === actual) {
      el.className = 'bridge-hn-dot hn-match';
      el.title = 'Hostname verified: ' + ds.hostname;
    } else {
      el.className = 'bridge-hn-dot hn-mismatch';
      el.title = 'Hostname mismatch — expected: ' + n.id + ', got: ' + ds.hostname;
    }
  });
}

function applyLldpIndicators() {
  document.querySelectorAll('.col-bridge').forEach(el => { el.innerHTML = ''; });
  Object.entries(bridgePortStatus).forEach(([portId, status]) => {
    const rowEl = document.getElementById('p-' + portId.replace(/[^a-zA-Z0-9]/g, '-'));
    if (!rowEl) return;
    const col = rowEl.querySelector('.col-bridge');
    if (!col) return;
    const dotCls = _bridgePortDotClass(status, portId);
    col.innerHTML = `<span class="bridge-port-dot ${dotCls}" title="${_bridgePortTitle(status, portId)}"></span>`;
  });
}

// Expand short EOS interface names to full form for devstatus lookup
function _expandIfaceName(name) {
  if (!name) return '';
  return name
    .replace(/^Et(\d)/i,  'Ethernet$1')
    .replace(/^Lo(\d)/i,  'Loopback$1')
    .replace(/^Ma(\d)/i,  'Management$1')
    .replace(/^Po(\d)/i,  'Port-Channel$1')
    .replace(/^Vl(\d)/i,  'Vlan$1')
    .replace(/^Vx(\d)/i,  'Vxlan$1');
}

// Update every .dev-model-line: manual model wins over bridge platform; flag mismatch in amber.
// DCS- prefix is stripped before comparison (bridge returns "DCS-7050CX3-32S", users type "7050CX3-32S").
function _refreshModelLines() {
  const norm = s => (s || '').replace(/^DCS-/i, '').trim().toLowerCase();
  document.querySelectorAll('.dev-model-line').forEach(el => {
    const devId = el.dataset.devId;
    const ds = devStatusMap[devId];
    const manualModel    = (deviceMetadata[devId] || {}).model || '';
    const bridgePlatform = (ds && ds.ok && ds.platform) ? ds.platform : '';
    const mismatch = manualModel && bridgePlatform && norm(manualModel) !== norm(bridgePlatform);
    el.textContent = manualModel || bridgePlatform;
    el.classList.toggle('model-mismatch', !!mismatch);
    el.title = mismatch
      ? `Device Manager: ${manualModel}\nBridge detected: ${bridgePlatform}`
      : '';
  });
}

// Apply devStatusMap to device cards (version line) and port St dots (op-status).
// Called after runBridgeCheck() and after render().
function applyDevStatusToCards() {
  // Version line: EOS version only (platform is now in the model line)
  document.querySelectorAll('.dev-version-line').forEach(el => {
    const devId = el.dataset.devId;
    const ds = devStatusMap[devId];
    if (!ds || !ds.ok) { el.textContent = ''; return; }
    el.textContent = ds.version ? 'EOS ' + ds.version : '';
  });

  _refreshModelLines();

  // Per-device bridge reachability dot on card header: green = reachable, orange = unreachable
  document.querySelectorAll('.dev-bridge-dot').forEach(el => {
    const ds = devStatusMap[el.dataset.devId];
    if (!ds) { el.className = 'dev-bridge-dot'; el.title = ''; return; }
    if (!ds.ok) {
      el.className = 'dev-bridge-dot dot-orange';
      el.title = ds.error || 'Device not reachable via bridge';
    } else {
      el.className = 'dev-bridge-dot dot-green';
      el.title = 'Reachable via bridge';
    }
  });

  // Port St dots: override with live op-status when available
  Object.entries(devStatusMap).forEach(([devId, ds]) => {
    if (!ds || !ds.ok || !ds.interfaces) return;
    (devicePortsMap[devId] || []).forEach(portId => {
      const portName = portId.split(':')[1];
      const fullName = _expandIfaceName(portName);
      const ifInfo   = ds.interfaces[fullName];
      if (!ifInfo) return;
      const rowEl = document.getElementById('p-' + portId.replace(/[^a-zA-Z0-9]/g, '-'));
      if (!rowEl) return;
      const dotEl = rowEl.querySelector('.port-box .dot');
      if (!dotEl) return;
      dotEl.classList.remove('op-up', 'op-down', 'op-errdisabled', 'op-disabled');
      const ls = ifInfo.linkStatus || '';
      if      (ls === 'connected')    dotEl.classList.add('op-up');
      else if (ls === 'notconnect')   dotEl.classList.add('op-down');
      else if (ls === 'errdisabled')  dotEl.classList.add('op-errdisabled');
      else                            dotEl.classList.add('op-disabled');
      dotEl.title = ls || 'unknown';
    });
  });
}

function runBridgeCheck() {
  if (!currentData || !currentData.nodes) return;
  const btn      = document.getElementById('btnRunBridge');
  const statusEl = document.getElementById('bridgeRunStatus');
  const devices  = currentData.nodes.filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista');

  // Collect IPs and reset per-device dots
  _bridgeHasDeviceFailures = false;
  document.querySelectorAll('.dev-bridge-dot').forEach(el => { el.className = 'dev-bridge-dot'; el.title = ''; });
  const ipMap = {};
  devices.forEach(n => {
    const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp = document.getElementById('bridgeIp_' + safeId);
    ipMap[n.id] = inp ? inp.value.trim() : '';
    const dot = document.getElementById('bridgeDot_' + safeId);
    if (dot) { dot.className = 'bridge-dev-dot'; dot.title = ''; }
    const hn = document.getElementById('bridgeHn_' + safeId);
    if (hn) { hn.className = 'bridge-hn-dot'; hn.title = 'Hostname'; }
  });

  btn.disabled = true;
  btn.textContent = 'Checking…';
  const _bridgeBtn = document.getElementById('btnBridgeToolbar');
  if (_bridgeBtn) _bridgeBtn.classList.add('bridge-scanning');
  document.getElementById('bridgeResults').style.display = 'none';
  statusEl.style.display = 'block';
  statusEl.style.color = '';
  statusEl.textContent = 'Bridge is querying devices via SSH…';

  const n = devices.length;
  const devWord = n === 1 ? 'device' : 'devices';
  let bridgeDone = false, devDone = false;
  const updateStatus = () => {
    const done = [bridgeDone && 'Bridge', devDone && 'status'].filter(Boolean).join(' + ');
    statusEl.textContent = done
      ? `Querying ${n} ${devWord}… (${done} done)`
      : `Querying ${n} ${devWord}…`;
  };
  updateStatus();

  const postOpts = () => ({
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ ipMap }),
  });

  const fetchLldp = fetch(BRIDGE_URL + '/lldp', postOpts())
    .then(r => { if (!r.ok) throw new Error('Bridge HTTP ' + r.status); return r.json(); })
    .then(d => { if (d.auth_expired) throw Object.assign(new Error(d.message || 'Auth expired'), { authExpired: true }); bridgeDone = true; updateStatus(); return d; });
  const fetchDev  = fetch(BRIDGE_URL + '/devstatus', postOpts())
    .then(r => { if (!r.ok) throw new Error('Bridge HTTP ' + r.status); return r.json(); })
    .then(d => { if (d.auth_expired) throw Object.assign(new Error(d.message || 'Auth expired'), { authExpired: true }); devDone = true; updateStatus(); return d; });

  Promise.allSettled([fetchLldp, fetchDev])
    .then(([bridgeResult, devResult]) => {
      // Auth expired — bridge returned {auth_expired:true} before querying any device
      const _ae = [bridgeResult, devResult].find(r => r.status === 'rejected' && r.reason && r.reason.authExpired);
      if (_ae) {
        btn.disabled = false;
        btn.textContent = 'Run Checks';
        if (_bridgeBtn) _bridgeBtn.classList.remove('bridge-scanning');
        _handleBridgeAuthExpired(_ae.reason.message);
        return;
      }
      let _manualOrphanCount = 0;
      btn.disabled = false;
      btn.textContent = 'Run Checks';
      if (_bridgeBtn) _bridgeBtn.classList.remove('bridge-scanning');
      const bridgeData = bridgeResult.status === 'fulfilled' ? bridgeResult.value : null;
      const dsData   = devResult.status  === 'fulfilled' ? devResult.value  : null;

      if (!bridgeData && !dsData) {
        // Both failed — show error
        const err = bridgeResult.reason || devResult.reason;
        statusEl.textContent = 'Bridge error: ' + err.message + ' — is device_bridge.py running?';
        _checkBridgeHealth();
        return;
      }

      if (bridgeData) {
        devices.forEach(n => {
          const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
          const dot = document.getElementById('bridgeDot_' + safeId);
          if (!dot) return;
          const res = bridgeData[n.id];
          if (!res)       { dot.className = 'bridge-dev-dot dot-gray';  dot.title = 'No IP / not queried'; }
          else if (res.ok){ dot.className = 'bridge-dev-dot dot-green'; dot.title = 'SSH OK'; }
          else            { dot.className = 'bridge-dev-dot dot-red'; dot.title = res.error || 'Error'; _bridgeHasDeviceFailures = true; }
        });
        _updateBridgeToolbarIcon(_bridgeHasDeviceFailures ? 'partial' : 'up');
        const { results, orphans } = _compareBridgeData(bridgeData);
        _populateBridgePortSubTypes(dsData);
        _populateBridgePortL1Errors(dsData);
        _renderLldpResults(results, orphans);
        _logBridgeIssuesToStatusLog(results, orphans, dsData, true);
        _manualOrphanCount = orphans.length;
      }

      if (dsData) {
        devStatusMap = dsData;
        deviceInternalVlans = {};
        Object.entries(devStatusMap).forEach(([devId, ds]) => {
          if (ds.ok && ds.internalVlans && ds.internalVlans.length)
            deviceInternalVlans[devId.toLowerCase()] = ds.internalVlans;
        });
        google.script.run.saveInternalVlans(deviceInternalVlans);
        _autoDetectBridgeMac(devStatusMap);
        _applyHostnameIndicators(devices);
        applyDevStatusToCards();
        // Overlay orange dot on devices with partial cmd failures.
        // Runs after bridgeData dot pass so green→orange upgrade is visible.
        devices.forEach(n => {
          const ds = dsData[n.id];
          if (!ds || !ds.ok || !ds.cmdErrors) return;
          const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
          const dot = document.getElementById('bridgeDot_' + safeId);
          if (!dot) return;
          const failed = Object.entries(ds.cmdErrors)
            .map(([cmd, err]) => cmd.replace('show ', '') + ' (' + err + ')');
          dot.className = 'bridge-dev-dot dot-orange';
          dot.title = 'Partial — failed: ' + failed.join(', ');
        });
      }

      applyLldpIndicators();
      if (isValidationMode) runValidation();

      // Compute per-device summary with auth error and partial-failure detection
      const _chkData = bridgeData || dsData;
      let _msg = 'Device Bridge checks complete';
      let _msgColor = '#15803d';
      if (_chkData) {
        const _vals = Object.values(_chkData).filter(v => v && typeof v === 'object');
        const _reached = _vals.filter(d => d.ok).length;
        const _total = _vals.length;
        const _authFails = _vals.filter(d => !d.ok && d.error &&
          /auth|expired|permission denied|authentication failed|arista-ssh-agent/i.test(d.error)).length;
        if (_total > 0) _msg += ` \u2014 ${_reached}/${_total} reached`;
        if (_authFails) { _msg += ` (${_authFails} auth error${_authFails > 1 ? 's' : ''})`; _msgColor = '#d97706'; }
        else if (_reached < _total) _msgColor = '#dc2626';
      }
      // Count partial command failures from devstatus (ok:true but some cmds failed)
      const _cmdFails = Object.values(dsData || {})
        .filter(d => d && d.ok && d.cmdErrors)
        .reduce((sum, d) => sum + Object.keys(d.cmdErrors).length, 0);
      if (_cmdFails > 0) {
        _msg += ` \u00b7 ${_cmdFails} cmd failure${_cmdFails !== 1 ? 's' : ''}`;
        if (_msgColor === '#15803d') _msgColor = '#d97706';
      }
      if (_manualOrphanCount > 0 && _msgColor !== '#dc2626') {
        _msg += ` \u00b7 ${_manualOrphanCount} extra cable${_manualOrphanCount !== 1 ? 's' : ''} found`;
        _msgColor = '#d97706';
      }
      if (bridgeResult.status === 'rejected') _msg += ' \u2014 LLDP endpoint error: ' + bridgeResult.reason.message;
      else if (devResult.status === 'rejected') _msg += ' \u2014 status endpoint error: ' + devResult.reason.message;
      statusEl.style.display = 'block';
      statusEl.style.color = _msgColor;
      statusEl.textContent = _msg;
      // If nothing reached, re-run health check so the orange auth warning
      // appears automatically — no need for the user to click Recheck.
      const _noneReached = _chkData && Object.values(_chkData).every(r => !r || !r.ok);
      if (_noneReached) _checkBridgeHealth();
    });
}

// Minimal HTML escape — prevents XSS when inserting device/interface names into innerHTML.
function _esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Build {devName: [portNames]} from allNodesData — includes physical ports, PO names,
// sub-interfaces (l3-*-sub-int), and SVIs (l2-* with svi_vlan_).
// Anything __TA-tagged on device but NOT here is orphaned.
function _buildExpectedPortsPerDevice() {
  const out = {};
  Object.entries(allNodesData).forEach(([key, node]) => {
    const colon = key.lastIndexOf(':');
    const dev   = key.slice(0, colon);
    const port  = key.slice(colon + 1);
    if (!out[dev]) out[dev] = new Set();
    out[dev].add(port);

    const det  = node.details || {};
    const mode = (det.sp_mode_ || '').trim();
    // po_ is raw user input — canonicalize so Port-Channel10 == Po10
    const po   = canonicalizeInterface((det.po_ || '').trim());
    if (po) out[dev].add(po);

    // Sub-interfaces: l3-*-sub-int generates <port>.<vlan> entries with __TA
    if (mode.includes('-sub-int')) {
      const basePort = (mode.includes('l3-po-sub-int') && po) ? po : port;
      const pv = parseVlanWithNative(det.vlan_ || '');
      String(pv.vlans || '').split(',').map(s => s.trim()).filter(Boolean)
        .forEach(v => out[dev].add(basePort + '.' + v));
    }

    // SVIs: l2-* with svi_vlan_ generates VlanX with __TA
    if (mode.startsWith('l2-')) {
      const sviRaw = (det.svi_vlan_ || '').trim().toLowerCase();
      if (sviRaw && sviRaw !== 'none') {
        // 'all' → derive SVIs from vlan_ list; explicit list → parse directly
        const vlanSource = (sviRaw === 'all')
          ? String(parseVlanWithNative(det.vlan_ || '').vlans || '')
          : sviRaw;
        vlanSource.split(',').map(s => s.trim()).filter(s => /^\d+$/.test(s))
          .forEach(v => out[dev].add('Vlan' + v));
      }
    }
  });
  // Convert Sets to arrays
  const result = {};
  Object.entries(out).forEach(([dev, s]) => { result[dev] = Array.from(s); });
  return result;
}

let _cleanupAbort     = null;
let _cleanupResults   = {};
let _cleanupIpMap     = {};
let _cleanupItemStore = [];  // [{dev, type, data}] indexed by checkbox data-idx

function _resetStopCleanupBtn() {
  const b = document.getElementById('btnStopCleanup');
  if (!b) return;
  b.disabled = true;
  b.className = 'btn-mono genall-btn';
  b.textContent = 'Stop';
  b.onclick = null;
}

function runCleanup() {
  if (!currentData || !currentData.nodes) return;
  const btn      = document.getElementById('btnCleanupTargets');
  const reconBody = document.getElementById('reconResultsBody');
  if (!btn || !reconBody) return;

  const allArista = currentData.nodes.filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista');
  const devices   = allArista.filter(n => {
    const pill = document.querySelector(`.genall-dev-pill[data-dev="${CSS.escape(n.id)}"]`);
    return !pill || pill.classList.contains('selected');
  });
  if (!devices.length) {
    setStatus('No devices selected — check Targets', 'status-warn');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Scanning…';
  _switchGenTab('cleanup');

  _doRunCleanup(btn, reconBody, devices);
}

async function _doRunCleanup(btn, reconBody, devices) {
  const mgmtIps        = _getLldpMgmtIps();
  const portsPerDev    = _buildExpectedPortsPerDevice();
  const allDeviceNames = _getTopologyAristaIds();

  const stopBtn = document.getElementById('btnStopCleanup');
  _cleanupAbort = new AbortController();
  if (stopBtn) {
    stopBtn.disabled = false;
    stopBtn.className = 'btn-mono genall-btn stop-active';
    stopBtn.textContent = 'Stop Clean-up';
    stopBtn.onclick = () => {
      if (_cleanupAbort) _cleanupAbort.abort();
      _resetStopCleanupBtn();
    };
  }

  btn.disabled = true;
  btn.textContent = 'Fetching configs…';
  reconBody.innerHTML = '<div style="color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">' +
    'Fetching configs for ' + devices.length + ' device' + (devices.length === 1 ? '' : 's') + '…</div>';

  let configResults;
  try {
    configResults = await Promise.all(devices.map(n => _fetchConfigForPush(n.id)));
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Clean-up Targets';
    _resetStopCleanupBtn();
    reconBody.innerHTML = '<div style="color:#dc2626;font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">Config fetch failed: ' + _esc(e.message) + '</div>';
    return;
  }
  if (_cleanupAbort && _cleanupAbort.signal.aborted) {
    btn.disabled = false;
    btn.textContent = 'Clean-up Targets';
    _resetStopCleanupBtn();
    reconBody.innerHTML = '<div style="color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">Cleanup stopped.</div>';
    return;
  }

  const configMap = {};
  configResults.forEach(({ deviceName, config }) => { configMap[deviceName] = config || ''; });

  _cleanupIpMap = {};
  devices.forEach(n => {
    const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp = document.getElementById('bridgeIp_' + safeId);
    let ip  = (inp ? inp.value.trim() : '') || mgmtIps[n.id] || '';
    if (!ip) ip = n.id;
    _cleanupIpMap[n.id] = { ip, ports: portsPerDev[n.id] || [], config_text: configMap[n.id] || '' };
  });

  btn.textContent = 'Detecting orphans…';
  reconBody.innerHTML = '<div style="color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">Querying ' +
    devices.length + ' device' + (devices.length === 1 ? '' : 's') + ' for stale __TA config…</div>';

  const _guard = setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Clean-up Targets';
    _resetStopCleanupBtn();
    reconBody.innerHTML = '<div style="color:#dc2626;font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">Cleanup timed out — try again.</div>';
  }, 60000);

  fetch(BRIDGE_URL + '/reconcile', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ ipMap: _cleanupIpMap, allDeviceNames }),
    signal:  _cleanupAbort.signal,
  })
    .then(r => { if (!r.ok) throw new Error('Bridge HTTP ' + r.status); return r.json(); })
    .then(results => {
      clearTimeout(_guard);
      btn.disabled = false;
      btn.textContent = 'Clean-up Targets';
      _resetStopCleanupBtn();
      if (results.auth_expired) { _handleBridgeAuthExpired(results.message); return; }
      _cleanupResults = results;
      const vals      = Object.values(results);
      const anyFailed = vals.some(r => !r || !r.ok);
      const total     = vals.reduce((s, r) => s + (r && r.ok
        ? (r.interfaces || []).length + (r.bgp || []).length +
          (r.vlans || []).length + (r.vrfs || []).length + (r.ospf || []).length
        : 0), 0);
      if (!anyFailed && total === 0) {
        reconBody.innerHTML = '<div style="color:#15803d;font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">All __TA config accounted for — no stale interfaces, BGP neighbors, VLANs, VRFs, or OSPF entries.</div>';
      } else {
        _renderCleanupResults(results, reconBody);
      }
    })
    .catch(err => {
      clearTimeout(_guard);
      btn.disabled = false;
      btn.textContent = 'Clean-up Targets';
      _resetStopCleanupBtn();
      if (err.name === 'AbortError') {
        reconBody.innerHTML = '<div style="color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">Cleanup stopped.</div>';
      } else {
        reconBody.innerHTML = '<div style="color:#dc2626;font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:8px 0;">Cleanup error: ' + _esc(err.message) + '</div>';
      }
    });
}

function _jsContiguousRanges(nums) {
  if (!nums.length) return [];
  const ranges = [];
  let start = nums[0], end = nums[0];
  for (let i = 1; i < nums.length; i++) {
    if (nums[i] === end + 1) { end = nums[i]; }
    else { ranges.push([start, end]); start = end = nums[i]; }
  }
  ranges.push([start, end]);
  return ranges;
}

function _buildCleanupConfig(items) {
  const lines = [];
  const sviVids = [], otherIfaces = [];
  items.filter(x => x.type === 'interface').forEach(x => {
    const n = x.data.name;
    const m = n.match(/^[Vv]lan(\d+)$/);
    if (m) sviVids.push(parseInt(m[1], 10));
    else if (n.includes('.')) otherIfaces.push(['no', n]);
    else if (/^[Pp]ort-[Cc]hannel\d+$/.test(n) || /^[Pp]o\d+$/.test(n)) otherIfaces.push(['no', n]);
    else otherIfaces.push(['default', n]);
  });
  if (sviVids.length) {
    sviVids.sort((a, b) => a - b);
    _jsContiguousRanges(sviVids).forEach(([s, e]) => {
      lines.push(s === e ? `no interface Vlan${s}` : `no interface Vlan${s}-${e}`);
    });
  }
  otherIfaces.forEach(([t, n]) => lines.push((t === 'no' ? 'no' : 'default') + ' interface ' + n));
  const bgpByAsn = {};
  items.filter(x => x.type === 'bgp').forEach(x => {
    if (x.data.asn) { bgpByAsn[x.data.asn] = bgpByAsn[x.data.asn] || []; bgpByAsn[x.data.asn].push(x.data.neighbor); }
  });
  Object.entries(bgpByAsn).forEach(([asn, ns]) => {
    lines.push('router bgp ' + asn);
    ns.forEach(n => lines.push('   no neighbor ' + n));
    lines.push('!');
  });
  const vlanVids = items.filter(x => x.type === 'vlan').map(x => parseInt(x.data.vid, 10)).sort((a, b) => a - b);
  _jsContiguousRanges(vlanVids).forEach(([s, e]) => {
    lines.push(s === e ? `no vlan ${s}` : `no vlan ${s}-${e}`);
  });
  items.filter(x => x.type === 'vrf').forEach(x => lines.push('no vrf instance ' + x.data.name));
  const ospfByCtx = {};
  items.filter(x => x.type === 'ospf').forEach(x => {
    ospfByCtx[x.data.context] = ospfByCtx[x.data.context] || [];
    ospfByCtx[x.data.context].push(x.data.iface);
  });
  Object.entries(ospfByCtx).forEach(([ctx, ifaces]) => {
    lines.push(ctx);
    ifaces.forEach(i => lines.push('   default passive-interface ' + i));
    lines.push('!');
  });
  return lines.join('\n') + '\n';
}

// DUPLICATED in device_bridge.py as _orphans_to_cmds. Last synced: 2026-05-09
// Converts raw _detect_orphans dict → flat EOS command lines via _buildCleanupConfig.
// Used by the consent modal so both consent and Cleanup UI share the same command-gen path.
function _orphansToCmds(orphans) {
  const items = [];
  (orphans.interfaces || []).forEach(d => items.push({ type: 'interface', data: d }));
  (orphans.bgp        || []).forEach(d => items.push({ type: 'bgp',       data: d }));
  (orphans.vlans      || []).forEach(d => items.push({ type: 'vlan',      data: d }));
  (orphans.vrfs       || []).forEach(d => items.push({ type: 'vrf',       data: d }));
  (orphans.ospf       || []).forEach(d => items.push({ type: 'ospf',      data: d }));
  return _buildCleanupConfig(items).split('\n').filter(l => l);
}

function _renderCleanupResults(results, reconBody) {
  _cleanupItemStore = [];

  const btnStyle = 'font-family:\'JetBrains Mono\',monospace;font-size:11px;padding:2px 8px;height:20px;box-sizing:border-box;line-height:16px;';
  const chevronSvg = '<svg class="cleanup-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">' +
    '<polyline points="2,2 7,5 2,8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  let html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">' +
    '<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:11px;user-select:none;-webkit-user-select:none;">' +
    '<input type="checkbox" id="reconSelectAll" onchange="toggleReconSelectAll()"> Select All</label>' +
    '<button id="btnCleanSelected" class="btn-mono" onclick="runCleanSelected()" disabled style="' + btnStyle + '">Clean Selected (0)</button>' +
    '<button class="btn-mono" onclick="runCleanAll()" style="' + btnStyle + '">Clean All</button>' +
    '<button class="btn-mono" onclick="_cleanupExpandAll()" style="' + btnStyle + 'margin-left:auto;">Expand All</button>' +
    '<button class="btn-mono" onclick="_cleanupCollapseAll()" style="' + btnStyle + '">Collapse All</button>' +
    '</div>' +
    '<div id="cleanupCmdPreview" style="display:none;margin-bottom:8px;">' +
    '<div style="font-size:10px;color:#64748b;margin-bottom:3px;user-select:none;-webkit-user-select:none;">EOS commands to execute:</div>' +
    '<pre id="cleanupCmdPreviewPre" style="margin:0;padding:6px 8px;background:#1e293b;color:#e2e8f0;' +
    'border-radius:4px;font-family:\'JetBrains Mono\',monospace;font-size:10px;' +
    'line-height:1.5;overflow-x:auto;max-height:100px;overflow-y:auto;' +
    'user-select:text;-webkit-user-select:text;white-space:pre;"></pre>' +
    '</div>';

  Object.entries(results)
    .sort(([a], [b]) => (allDevicesData[a]?.sheetIndex || 0) - (allDevicesData[b]?.sheetIndex || 0))
    .forEach(([dev, r]) => {
      const totalStale = (!r || !r.ok) ? 0 :
        (r.interfaces||[]).length + (r.bgp||[]).length + (r.vlans||[]).length + (r.vrfs||[]).length + (r.ospf||[]).length;

      html += '<div class="bridge-recon-dev" data-dev="' + _esc(dev) + '">';
      if (!r || !r.ok) {
        html += '<div class="bridge-recon-dev-hdr">' + chevronSvg +
                '<span>' + _esc(_fmtDev(dev)) + '</span>' +
                '<span class="bridge-recon-counts" style="color:#dc2626;">' + _esc(r ? r.error : 'no response') + '</span></div>';
      } else {
        html += '<div class="bridge-recon-dev-hdr cleanup-hdr-clickable" onclick="_toggleCleanupDev(\'' + _esc(dev) + '\')">' + chevronSvg;
        if (totalStale > 0) {
          html += '<input type="checkbox" class="recon-dev-cb" data-dev="' + _esc(dev) + '" ' +
                  'onclick="event.stopPropagation();" onchange="_cleanupDevCheck(\'' + _esc(dev) + '\', this)">';
        }
        html += '<span style="font-size:12px;font-weight:700;">' + _esc(_fmtDev(dev)) + '</span>' +
                '<span class="bridge-recon-counts">' +
                (totalStale ? totalStale + ' stale' : r.matched + '/' + r.ta_total + ' matched') +
                '</span></div>';
      }
      html += '<div class="bridge-recon-dev-body" style="display:none;"></div>';
      html += '</div>';
    });

  reconBody.innerHTML = html || '<div style="color:var(--text-muted);font-size:12px;padding:8px 0;">No results.</div>';
  updateReconSelCount();
}

function _cleanupRenderDevBody(dev, bodyEl) {
  if (bodyEl.dataset.rendered) return;
  bodyEl.dataset.rendered = '1';
  const r = _cleanupResults[dev];
  if (!r || !r.ok) return;

  const ifaceOrphans = r.interfaces || [];
  const bgpOrphans   = r.bgp || [];
  const vlanOrphans  = r.vlans || [];
  const vrfOrphans   = r.vrfs || [];
  const ospfOrphans  = r.ospf || [];
  const totalStale   = ifaceOrphans.length + bgpOrphans.length + vlanOrphans.length + vrfOrphans.length + ospfOrphans.length;

  function addItem(type, data, labelHtml, badgeHtml) {
    const idx = _cleanupItemStore.length;
    _cleanupItemStore.push({ dev, type, data });
    return '<div class="bridge-orphan-row" style="display:flex;align-items:center;gap:6px;padding:3px 0;">' +
      '<label style="display:flex;align-items:center;gap:6px;flex:1;cursor:pointer;min-width:0;">' +
      '<input type="checkbox" class="recon-item-cb" data-dev="' + _esc(dev) + '" data-idx="' + idx + '" onchange="updateReconSelCount()">' +
      '<span style="display:flex;gap:6px;align-items:center;min-width:0;overflow:hidden;">' + labelHtml + '</span>' +
      '</label>' + badgeHtml + '</div>';
  }

  let html = '';
  const detectionErrs = r.detection_errors || {};
  const detectionErrKeys = Object.keys(detectionErrs);
  if (detectionErrKeys.length) {
    html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;' +
            'color:#92400e;background:#fffbeb;border-radius:3px;padding:4px 8px;' +
            'margin:3px 0 4px;line-height:1.5;">' +
            '<b>Some categories could not be checked — results may be incomplete:</b><br>' +
            detectionErrKeys.map(k => _esc(k) + ': ' + _esc(detectionErrs[k])).join('<br>') +
            '</div>';
  }

  if (totalStale === 0) {
    html += '<div class="bridge-recon-ok-msg">All __TA config accounted for.</div>';
  } else {
    if (ifaceOrphans.length) {
      html += '<div class="bridge-recon-sub-hdr">Stale Interfaces</div><div class="bridge-orphan-list">';
      ifaceOrphans.forEach(o => {
        const proto    = (o.linkStatus || o.protocol || '').toLowerCase();
        const badgeCls = proto === 'up' ? 'badge-up' : proto === 'down' ? 'badge-down' : 'badge-unk';
        html += addItem('interface', o,
          '<span class="bridge-orphan-name">' + _esc(o.name) + '</span>' +
          '<span class="bridge-orphan-desc" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + _esc(o.description) + '</span>',
          '<span class="bridge-link-badge ' + badgeCls + '" style="flex-shrink:0;">' + _esc(proto || 'unk') + '</span>');
      });
      html += '</div>';
    }
    if (bgpOrphans.length) {
      html += '<div class="bridge-recon-sub-hdr">Stale BGP Neighbors</div><div class="bridge-orphan-list">';
      bgpOrphans.forEach(o => {
        html += addItem('bgp', o,
          '<span class="bridge-orphan-name">' + _esc(o.neighbor) + '</span>' +
          '<span class="bridge-orphan-desc" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + _esc(o.description) + '</span>',
          '<span class="bridge-link-badge badge-unk" style="flex-shrink:0;">BGP</span>');
      });
      html += '</div>';
    }
    if (vlanOrphans.length) {
      html += '<div class="bridge-recon-sub-hdr">Stale VLANs</div><div class="bridge-orphan-list">';
      vlanOrphans.forEach(o => {
        html += addItem('vlan', o,
          '<span class="bridge-orphan-name">VLAN ' + _esc(String(o.vid)) + '</span>' +
          '<span class="bridge-orphan-desc">' + _esc(o.name) + '</span>',
          '<span class="bridge-link-badge badge-unk" style="flex-shrink:0;">VLAN</span>');
      });
      html += '</div>';
    }
    if (vrfOrphans.length) {
      html += '<div class="bridge-recon-sub-hdr">Stale VRFs</div><div class="bridge-orphan-list">';
      vrfOrphans.forEach(o => {
        html += addItem('vrf', o,
          '<span class="bridge-orphan-name">' + _esc(o.name) + '</span>' +
          '<span class="bridge-orphan-desc">vrf instance ' + _esc(o.name) + ' __TA</span>',
          '<span class="bridge-link-badge badge-unk" style="flex-shrink:0;">VRF</span>');
      });
      html += '</div>';
    }
    if (ospfOrphans.length) {
      html += '<div class="bridge-recon-sub-hdr">Stale OSPF Passive-Interfaces</div><div class="bridge-orphan-list">';
      ospfOrphans.forEach(o => {
        html += addItem('ospf', o,
          '<span class="bridge-orphan-name">' + _esc(o.iface) + '</span>' +
          '<span class="bridge-orphan-desc" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + _esc(o.context) + '</span>',
          '<span class="bridge-link-badge badge-unk" style="flex-shrink:0;">OSPF</span>');
      });
      html += '</div>';
    }
  }
  bodyEl.innerHTML = html;
}

function _toggleCleanupDev(dev) {
  const section = document.querySelector('.bridge-recon-dev[data-dev="' + dev + '"]');
  if (!section) return;
  const body = section.querySelector('.bridge-recon-dev-body');
  if (!body) return;
  if (section.classList.contains('cleanup-open')) {
    section.classList.remove('cleanup-open');
    body.style.display = 'none';
  } else {
    _cleanupRenderDevBody(dev, body);
    body.style.display = '';
    section.classList.add('cleanup-open');
  }
}

function _cleanupDevCheck(dev, cb) {
  const section = document.querySelector('.bridge-recon-dev[data-dev="' + dev + '"]');
  if (!section) return;
  const body = section.querySelector('.bridge-recon-dev-body');
  if (body && body.style.display === 'none') {
    _cleanupRenderDevBody(dev, body);
    body.style.display = '';
    section.classList.add('cleanup-open');
  }
  if (body) body.querySelectorAll('.recon-item-cb').forEach(c => { c.checked = cb.checked; });
  updateReconSelCount();
}

function _cleanupExpandAll() {
  document.querySelectorAll('.bridge-recon-dev[data-dev]').forEach(section => {
    if (section.classList.contains('cleanup-open')) return;
    const dev  = section.dataset.dev;
    const body = section.querySelector('.bridge-recon-dev-body');
    if (!body) return;
    _cleanupRenderDevBody(dev, body);
    body.style.display = '';
    section.classList.add('cleanup-open');
  });
}

function _cleanupCollapseAll() {
  document.querySelectorAll('.bridge-recon-dev').forEach(section => {
    const body = section.querySelector('.bridge-recon-dev-body');
    if (body) body.style.display = 'none';
    section.classList.remove('cleanup-open');
  });
}

function toggleReconSelectAll() {
  const master = document.getElementById('reconSelectAll');
  if (!master) return;
  if (master.checked) _cleanupExpandAll();
  document.querySelectorAll('.recon-item-cb').forEach(cb => { cb.checked = master.checked; });
  document.querySelectorAll('.recon-dev-cb').forEach(cb => { cb.checked = master.checked; });
  updateReconSelCount();
}

function toggleReconDevItems(dev) {
  const devCb = document.querySelector('.recon-dev-cb[data-dev="' + dev + '"]');
  if (!devCb) return;
  _cleanupDevCheck(dev, devCb);
}

function updateReconSelCount() {
  const selected = document.querySelectorAll('.recon-item-cb:checked').length;
  const total    = document.querySelectorAll('.recon-item-cb').length;
  const btn = document.getElementById('btnCleanSelected');
  if (btn) { btn.disabled = selected === 0; btn.textContent = 'Clean Selected (' + selected + ')'; }
  const master = document.getElementById('reconSelectAll');
  if (master) master.checked = total > 0 && selected === total;

  // Live EOS command preview — grouped by device
  const preview = document.getElementById('cleanupCmdPreview');
  const pre     = document.getElementById('cleanupCmdPreviewPre');
  if (!preview || !pre) return;
  if (selected === 0) { preview.style.display = 'none'; return; }
  const byDev = {};
  document.querySelectorAll('.recon-item-cb:checked').forEach(cb => {
    const entry = _cleanupItemStore[parseInt(cb.dataset.idx, 10)];
    if (!entry) return;
    (byDev[entry.dev] = byDev[entry.dev] || []).push(entry);
  });
  const devNames = Object.keys(byDev).sort((a, b) =>
    (allDevicesData[a]?.sheetIndex || 0) - (allDevicesData[b]?.sheetIndex || 0));
  const lines = [];
  devNames.forEach(dev => {
    if (devNames.length > 1) lines.push('! ' + _fmtDev(dev));
    _buildCleanupConfig(byDev[dev]).split('\n').filter(l => l).forEach(l => lines.push(l));
  });
  pre.textContent = lines.join('\n');
  preview.style.display = '';
}

function runCleanAll() {
  const devItems = {};
  Object.entries(_cleanupResults).forEach(([dev, r]) => {
    if (!r || !r.ok) return;
    const items = [];
    (r.interfaces || []).forEach(d => items.push({ type: 'interface', data: d }));
    (r.bgp        || []).forEach(d => items.push({ type: 'bgp',       data: d }));
    (r.vlans      || []).forEach(d => items.push({ type: 'vlan',      data: d }));
    (r.vrfs       || []).forEach(d => items.push({ type: 'vrf',       data: d }));
    (r.ospf       || []).forEach(d => items.push({ type: 'ospf',      data: d }));
    if (items.length) devItems[dev] = items;
  });
  _doCleanDevItems(devItems);
}

function runCleanSelected() {
  const devItems = {};
  document.querySelectorAll('.recon-item-cb:checked').forEach(cb => {
    const entry = _cleanupItemStore[parseInt(cb.dataset.idx, 10)];
    if (!entry) return;
    devItems[entry.dev] = devItems[entry.dev] || [];
    devItems[entry.dev].push({ type: entry.type, data: entry.data });
  });
  _doCleanDevItems(devItems);
}

async function _doCleanDevItems(devItems) {
  const total    = Object.values(devItems).reduce((s, a) => s + a.length, 0);
  const devCount = Object.keys(devItems).length;
  if (!total) { setStatus('Nothing to clean', 'status-warn'); return; }
  if (!confirm('Clean ' + total + ' orphan' + (total > 1 ? 's' : '') + ' on ' + devCount + ' device' + (devCount > 1 ? 's' : '') + '?\n\nThis pushes EOS commands to remove stale __TA config.')) return;

  const t0 = Date.now();
  setStatus(`Pushing cleanup to ${devCount} device${devCount > 1 ? 's' : ''}…`, 'status-info');
  const _timer = setInterval(() => {
    setStatus(`Pushing cleanup to ${devCount} device${devCount > 1 ? 's' : ''} — ${Math.floor((Date.now() - t0) / 1000)}s…`, 'status-info');
  }, 1000);

  // Send structured items to /reconcile/cleanup — server generates EOS commands via
  // _orphans_to_cmds() (Python SSoT) and handles batching via _batch_orphan_cmds().
  const ipMap = {};
  Object.entries(devItems).forEach(([dev, items]) => {
    ipMap[dev] = { ip: (_cleanupIpMap[dev] || {}).ip || '', items };
  });

  let results = {};
  try {
    const r = await fetch(BRIDGE_URL + '/reconcile/cleanup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ipMap, push_timeout: _bridgeCleanupTimeout }),
    });
    clearInterval(_timer);
    if (!r.ok) throw new Error('Bridge HTTP ' + r.status);
    results = await r.json();
    if (results.auth_expired) { _handleBridgeAuthExpired(results.message); return; }
  } catch (err) {
    clearInterval(_timer);
    Object.keys(devItems).forEach(dev => { results[dev] = { ok: false, error: err.message }; });
  }

  // Render final results
  const reconBody = document.getElementById('reconResultsBody');
  let okCount = 0, failCount = 0, rowsHtml = '';
  Object.entries(devItems).forEach(([dev, items]) => {
    const safe = escapeHtml(dev);
    const n    = items.length;
    const res  = results[dev];
    if (!res || !res.ok) {
      failCount++;
      rowsHtml +=
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;' +
        'margin-bottom:2px;background:var(--bg-secondary,#f8fafc);border-radius:3px;">' +
        `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-main);">${safe}</span>` +
        `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#ef4444;">Error: ${escapeHtml((res && res.error) || 'no response')}</span></div>`;
    } else {
      okCount++;
      rowsHtml +=
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;' +
        'margin-bottom:2px;background:var(--bg-secondary,#f8fafc);border-radius:3px;">' +
        `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-main);">${safe}</span>` +
        `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#10b981;">${n} item${n !== 1 ? 's' : ''} removed</span></div>`;
    }
  });
  const ts         = new Date().toTimeString().slice(0, 8);
  const summaryClr = failCount > 0 ? '#f59e0b' : '#10b981';
  const summaryTxt = failCount > 0
    ? `Clean-up: ${okCount} succeeded, ${failCount} failed`
    : `Clean-up complete: ${total} item${total !== 1 ? 's' : ''} removed across ${okCount} device${okCount !== 1 ? 's' : ''}`;
  if (reconBody) {
    reconBody.innerHTML =
      `<div style="font-family:'JetBrains Mono',monospace;font-size:12px;padding-bottom:10px;">` +
      `<span style="font-weight:700;color:${summaryClr};">${escapeHtml(summaryTxt)}</span>` +
      `<span style="font-weight:400;color:var(--text-muted);margin-left:10px;font-size:11px;">${ts}</span></div>` +
      rowsHtml;
  }
  if (failCount > 0) {
    setStatus(`Clean-up: ${okCount} succeeded, ${failCount} failed`, 'status-warn');
  } else {
    setStatus(`Clean-up done — ${total} orphan${total !== 1 ? 's' : ''} removed from ${okCount} device${okCount !== 1 ? 's' : ''}.`, 'status-ok');
  }
}

// Delete the sheet row AND unconfigure the interface on device via bridge.
function deleteAndUnconfigure() {
  if (!editingPortId) return;
  const parts = editingPortId.split(':');
  const deviceName = parts[0];
  const portName   = parts[1] || '';

  // Gather the mgmt IP for the device
  const mgmtIps = _getLldpMgmtIps();
  const safeId  = deviceName.replace(/[^a-zA-Z0-9_-]/g, '_');
  const inp     = document.getElementById('bridgeIp_' + safeId);
  const ip      = (inp ? inp.value.trim() : '') || mgmtIps[deviceName] || '';

  if (!ip) {
    if (!confirm('No IP found for ' + deviceName + '.\nDelete from sheet only (cannot unconfigure)?')) return;
    deletePort();
    return;
  }

  if (!confirm('Delete ' + portName + ' from sheet AND remove its __TA description on ' + deviceName + '?')) return;

  const btn = document.getElementById('btnDeleteUnconfigure');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Working…';

  // Also include the peer port if present in allNodesData
  const node = allNodesData[editingPortId];
  const peerKey = node && node.peer;
  let config = 'interface ' + portName + '\n no description\n';
  if (peerKey) {
    const peerParts = peerKey.split(':');
    const peerPort  = peerParts[1] || '';
    // Only unconfigure peer port if on same device
    if (peerParts[0] === deviceName && peerPort) {
      config += 'interface ' + peerPort + '\n no description\n';
    }
  }

  fetch(BRIDGE_URL + '/pushconfig', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } } }),
  })
    .then(r => { if (!r.ok) throw new Error('Bridge HTTP ' + r.status); return r.json(); })
    .then(results => {
      btn.disabled = false;
      btn.textContent = 'Delete & Unconfigure';
      if (results.auth_expired) { _handleBridgeAuthExpired(results.message); return; }
      const res = results[deviceName];
      if (res && res.ok) {
        // Unconfigure succeeded — now delete from sheet
        initialEditModalState = '';
        closeEditModal();
        setStatus(deviceName + ':' + portName + ' unconfigured + deleted — topology refresh…', 'status-info');
        google.script.run
          .withSuccessHandler(() => fetchData(true))
          .withFailureHandler(err => setStatus('Delete error: ' + err.message, 'status-error'))
          .deleteInterface(deviceName, portName);
      } else {
        const errMsg = res ? res.error : 'no response';
        if (confirm('Unconfigure failed: ' + errMsg + '\n\nDelete from sheet anyway?')) {
          initialEditModalState = '';
          closeEditModal();
          setStatus(deviceName + ':' + portName + ' deleted — topology refresh\u2026', 'status-info');
          google.script.run
            .withSuccessHandler(() => fetchData(true))
            .withFailureHandler(err => setStatus('Delete error: ' + err.message, 'status-error'))
            .deleteInterface(deviceName, portName);
        }
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = 'Delete & Unconfigure';
      setStatus('Network error: ' + err.message, 'status-error');
    });
}

// ── Config Push ───────────────────────────────────────────────────────────────

// Promise wrapper around google.script.run.getDeviceConfig — no UI side effects.
function _fetchConfigForPush(deviceName) {
  return new Promise(resolve => {
    if (configCache[deviceName]) {
      resolve({ deviceName, config: formatConfigText(configCache[deviceName].data) });
      return;
    }
    google.script.run
      .withSuccessHandler(res => {
        if (!res.error && res.config) {
          configCache[deviceName] = { data: res.config };
          resolve({ deviceName, config: formatConfigText(res.config) });
        } else {
          resolve({ deviceName, config: null, error: res.error || 'Config fetch failed' });
        }
      })
      .withFailureHandler(err => {
        resolve({ deviceName, config: null, error: err.message || 'Config fetch failed' });
      })
      .getDeviceConfig(deviceName);
  });
}

// ── Single-device push (from copy strip) ─────────────────────────────────────

async function pushDeviceConfig(deviceName, btnId, portFilter = null) {
  if (!deviceName) return;
  if (_pendingPush) return; // another push is already pending confirm
  if (allDevicesData[deviceName] && allDevicesData[deviceName].type === 'non-arista') {
    const st = document.getElementById('status');
    setStatus(`Push not available — ${deviceName} is a non-EOS device`, "status-error");
    return;
  }
  const btn      = document.getElementById(btnId);
  const origText = btn ? btn.textContent : 'Push';
  const st       = document.getElementById('status');

  // Resolve IP: 1) management interface auto-detect from sheet data,
  // 2) bridge modal input (if modal was opened), 3) device name as hostname (DNS fallback).
  const ips = _getLldpMgmtIps();
  let   ip  = ips[deviceName] || '';
  if (!ip) {
    const safeId = deviceName.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp    = document.getElementById('bridgeIp_' + safeId);
    if (inp) ip  = inp.value.trim();
  }
  if (!ip) ip = deviceName; // fall back to device name as hostname (DNS)

  const label = portFilter ? `${deviceName} : ${portFilter}` : deviceName;
  if (btn) { btn.disabled = true; btn.textContent = 'Previewing…'; }
  _previewingPush = { btnId, origText };
  _showPushConfirmModal(label, null);  // show modal immediately with loading state

  // Phase 1: fetch full device config (uses cache when available)
  const { config: fullConfig, error } = await _fetchConfigForPush(deviceName);
  if (!fullConfig) {
    _previewingPush = null;
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    _updatePushPreviewError(label, deviceName, error || 'could not fetch config for ' + deviceName);
    return;
  }

  // When called from a link strip, push only the selected interface block
  let config = fullConfig;
  if (portFilter) {
    // Lo0/Lo1/Vx1 have dedicated configMap sections — use direct lookup to avoid
    // _extractInterfaceBlock missing them due to section preamble comments.
    const _sectionKeys = { lo0: '000_LO0', lo1: '000_LO1', vx1: '055_VXLAN' };
    const _directKey = _sectionKeys[(portFilter || '').toLowerCase()];
    const _cachedData = configCache[deviceName] && configCache[deviceName].data;
    const ifBlock = (_directKey && _cachedData && _cachedData[_directKey] && _cachedData[_directKey].full)
      || _extractInterfaceBlock(fullConfig, portFilter);
    if (!ifBlock) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _updatePushPreviewError(label, deviceName, `Interface ${portFilter} not found in ${deviceName} config`);
      return;
    }
    config = ifBlock;
  }

  // Phase 1: open configure session, push config, get diff, leave session PENDING on EOS.
  // Orphan detection runs inside _push_config and returns orphans_pending (no cleanup yet).
  // Cleanup is deferred to Phase 2 (finalize) after user confirms in the push confirm modal.
  // Bridge returns session_name so Phase 2 can commit/abort without re-pushing config.
  const _allDevNames = _getTopologyAristaIds();
  try {
    const _p1Body = { ipMap: { [deviceName]: { ip, config } }, open_session: true, all_ifaces: !portFilter,
      allDeviceNames: _allDevNames };
    const resp = await fetch(BRIDGE_URL + '/pushconfig', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(_p1Body),
    });
    if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
    const data = await resp.json();
    if (data.auth_expired) {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _handleBridgeAuthExpired(data.message);
      _updatePushPreviewError(label, deviceName, 'Auth session expired \u2014 ' + (data.message || 'run: arista-ssh login'));
      return;
    }
    const res  = data[deviceName] || {};
    // Guard: user cancelled while Phase 1 fetch was in-flight (Cancel hides the modal).
    // The EOS session is now PENDING — abort it silently before returning.
    // cancelPushConfig already ran but couldn't restore the button (no _pendingPush yet) —
    // restore it here so it doesn't stay stuck on "Previewing…".
    const _phaseModal = document.getElementById('pushConfirmModal');
    if (!_phaseModal || _phaseModal.style.display === 'none') {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      if (res.session_name) {
        fetch(BRIDGE_URL + '/pushconfig/finalize', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ipMap: { [deviceName]: { ip, session_name: res.session_name } }, action: 'abort' }),
        }).catch(() => {});
      }
      return;
    }
    // EOS errors — derive before ok check: ok=false has errors in res.error, not res.eos_errors.
    const _p1EosErrs = !res.ok
      ? (res.error ? res.error.split('\n').filter(Boolean) : null)
      : _eosErrors(res);
    const _p1EosWarns = _eosWarnings(res);
    // Hard failure: no session open — nothing to commit.
    if (!res.ok && !res.session_name) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _updatePushPreviewError(label, deviceName, res.error || 'something went wrong');
      return;
    }
    // ok=false with an open session: EOS skipped failing commands but the session is still PENDING.
    // Committing applies only valid commands — identical to partial staging (Case 2).
    // Fall through to the Commit modal; Phase 2 runs orphan cleanup as normal.
    // Nothing staged + eos errors + no orphans → abort + show error
    if (_p1EosErrs && (!res.diff || !res.diff.trim()) && !res.orphans_pending) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      if (res.session_name) {
        fetch(BRIDGE_URL + '/pushconfig/finalize', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ipMap: { [deviceName]: { ip, session_name: res.session_name } }, action: 'abort' }),
        }).catch(() => {});
      }
      _updatePushPreviewError(label, deviceName, 'EOS rejected commands — device NOT updated:\n' + _formatEosErrors(_p1EosErrs));
      return;
    }
    // Empty diff + no orphans = already in sync — abort the open session silently, show modal briefly
    if (!_p1EosErrs && (!res.diff || !res.diff.trim()) && !res.orphans_pending) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      if (res.session_name) {
        fetch(BRIDGE_URL + '/pushconfig/finalize', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ipMap: { [deviceName]: { ip, session_name: res.session_name } }, action: 'abort' }),
        }).catch(() => {});
      }
      _showPushConfirmModal(label, '', false, true);
      return;
    }
    // Store pending push details + session_name, show confirm modal (button stays disabled)
    _previewingPush = null;
    _pendingPush = { deviceName, ip, config, btnId, origText, label, sessionName: res.session_name, allDeviceNames: _allDevNames };
    if (btn) btn.textContent = 'Pending…';
    _showPushConfirmModal(label, res.diff || '', false, false);
    if (res.orphans_pending) _injectOrphanPendingBanner(res.orphans_pending);
    if (_p1EosErrs) _injectEosRejectionBanner(_p1EosErrs);
    if (_p1EosWarns) _injectEosWarningBanner(_p1EosWarns);
    if (res.asn_changed) _injectPushAsnChangeWarning(res.asn_changed);
    // Guard: auto-abort the open EOS session if user doesn't commit within 5 minutes
    if (res.session_name) {
      _clearPushSessionGuard();
      _pushSessionGuard = setTimeout(() => {
        _pushSessionGuard = null;
        if (!_pendingPush) return; // already committed or cancelled
        const { deviceName: dn, ip: dip, sessionName: sn, btnId: bid, origText: ot } = _pendingPush;
        _pendingPush = null;
        const b = document.getElementById(bid);
        if (b) { b.disabled = false; b.textContent = ot; }
        fetch(BRIDGE_URL + '/pushconfig/finalize', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ipMap: { [dn]: { ip: dip, session_name: sn } }, action: 'abort' }),
        }).catch(() => {});
        closePushConfirmModal();
        setStatus('Push session timed out — session aborted on device', 'status-warn');
      }, 5 * 60 * 1000);
    }
  } catch (err) {
    _previewingPush = null;
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    _updatePushPreviewError(label, deviceName, `${err.message} — is device_bridge.py running?`);
  }
}

function _showPushConfirmModal(deviceName, diff, readOnly = false, alreadyInSync = false) {
  if (_pushAutoCloseTimeout) { clearTimeout(_pushAutoCloseTimeout); _pushAutoCloseTimeout = null; }
  _autoMinimizeOpenModal();   // minimize any open modal so pushConfirmModal is the only one visible
  const modal    = document.getElementById('pushConfirmModal');
  if (modal) { modal.classList.remove('modal-minimized'); delete modal.dataset.preMinDisplay; }
  const body     = document.getElementById('pushConfirmBody');
  const titleEl  = document.getElementById('pushConfirmTitle');
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  // ── Loading state: show modal immediately before diff is fetched ─────────────
  if (diff === null) {
    if (titleEl)    titleEl.textContent     = _buildPushTitle(deviceName, deviceName, 'Push');
    if (commitBtn)  { commitBtn.style.display = 'none'; }
    if (cancelFtr)  { cancelFtr.style.display = ''; cancelFtr.textContent = 'Cancel'; }
    body.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted,#94a3b8);">` +
      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite;flex-shrink:0;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>` +
      `<span id="pushLoadingText" style="font-style:italic;">Computing diff\u2026</span>` +
      `</div>`;
    modal.style.display = 'flex';
    return;
  }
  const noCommit = readOnly || alreadyInSync;
  const _titleState = alreadyInSync ? 'In Sync' : readOnly ? 'Verify' : 'Push';
  if (titleEl)    titleEl.textContent     = _buildPushTitle(deviceName, deviceName, _titleState);
  if (commitBtn)  { commitBtn.style.display = noCommit ? 'none' : 'inline-block'; commitBtn.disabled = false; commitBtn.textContent = 'Commit'; }
  if (cancelFtr)  cancelFtr.textContent   = noCommit ? 'Close' : 'Cancel';
  if (alreadyInSync) {
    body.innerHTML = `<div style="color:var(--text-muted,#94a3b8);font-style:italic;padding:4px 0;">Running config already matches — no push needed.</div>`;
    const _ftr = modal.querySelector('.modal-actions');
    if (_ftr) _ftr.style.display = 'none';
    modal.style.display = 'flex';
    return;
  }
  const lines   = diff.split('\n');
  const changed = lines.filter(l => l.startsWith('+') || l.startsWith('-')).length;
  let html = '';
  if (!diff.trim()) {
    const noChangeMsg = readOnly
      ? 'Config verified — no diff remaining.'
      : 'No changes — running config already matches the generated config.';
    html = `<div style="color:var(--text-muted,#94a3b8);font-style:italic;padding:4px 0;">${noChangeMsg}</div>`;
  } else {
    const changeLabel = readOnly
      ? `${changed} line${changed !== 1 ? 's' : ''} still differ after push`
      : `${changed} line${changed !== 1 ? 's' : ''} will change`;
    html += `<div style="margin-bottom:8px;color:var(--text-muted,#94a3b8);font-size:11px;">${changeLabel}</div>`;
    html += `<pre style="font-family:'JetBrains Mono',monospace;font-size:10px;` +
            `background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:8px;overflow-x:auto;` +
            `max-height:280px;white-space:pre;margin:0;">`;
    html += lines.map(l => {
      const esc = escapeHtml(l);
      if (l.startsWith('+')) return `<span style="color:#16a34a;">${esc}</span>`;
      if (l.startsWith('-')) return `<span style="color:#dc2626;">${esc}</span>`;
      if (l.startsWith('@')) return `<span style="color:#64748b;">${esc}</span>`;
      return `<span style="color:#1e293b;">${esc}</span>`;
    }).join('\n');
    html += `</pre>`;
  }
  body.innerHTML = html;
  modal.style.display = 'flex';
}

// Write push phase status to both #status (sidebar) and #cfgPushStatus (config modal footer)
function _setPushStatus(html) {
  setStatus(html);
  const cfgSt = document.getElementById('cfgPushStatus');
  if (cfgSt) {
    const modal = document.getElementById('configModal');
    if (modal && modal.style.display !== 'none') {
      cfgSt.innerHTML = html;
      cfgSt.style.display = '';
    }
  }
}

function _clearPushSessionGuard() {
  if (_pushSessionGuard) { clearTimeout(_pushSessionGuard); _pushSessionGuard = null; }
}

async function commitPushConfig() {
  _clearPushSessionGuard();
  if (!_pendingPush) return;
  const { deviceName, ip, config, btnId, origText, label, sessionName, allDeviceNames } = _pendingPush;
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  const titleEl   = document.getElementById('pushConfirmTitle');
  const bodyEl    = document.getElementById('pushConfirmBody');

  // Disable commit + cancel; × stays enabled (will confirm if clicked mid-commit)
  _commitInFlight = true;
  if (commitBtn) { commitBtn.disabled = true; commitBtn.textContent = 'Committing…'; }
  if (cancelFtr) cancelFtr.style.display = 'none';

  const _ptRowHtml = (label, id, initColor, initText) =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;` +
    `margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
    `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-main);">${label}</span>` +
    `<span id="${id}" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${initColor};">${initText}</span></div>`;

  if (bodyEl) bodyEl.innerHTML =
    _ptRowHtml('Phase 1: Config staged', 'pt1', '#10b981', 'session open') +
    _ptRowHtml('Phase 2: Commit',  'pt2', '#94a3b8', 'committing…') +
    _ptRowHtml('Phase 3: Verify',  'pt3', '#64748b', 'pending…') +
    '<div id="pt_detail" style="margin-top:6px;"></div>';

  const _ptSet = (id, color, text) => {
    const el = document.getElementById(id);
    if (el) { el.style.color = color; el.textContent = text; }
  };
  const _ptDetail = (html) => {
    const el = document.getElementById('pt_detail');
    if (el) el.innerHTML = html;
  };

  try {
    // Phase 2: commit the open session (no config re-push).
    // If session_name is present, use /pushconfig/finalize (single SSH round-trip:
    // re-enter named session + commit). Falls back to full /pushconfig if session_name
    // is missing (should not happen in normal flow).
    let res = null;
    let lastAttempt = 1;
    const PUSH_MAX_RETRIES = 3;
    const _useFinalize = !!sessionName;
    for (let attempt = 1; attempt <= 1 + PUSH_MAX_RETRIES; attempt++) {
      lastAttempt = attempt;
      const attemptLabel = attempt === 1 ? 'committing…' : `retry ${attempt - 1}/${PUSH_MAX_RETRIES}…`;
      if (commitBtn) commitBtn.textContent = attempt === 1 ? 'Committing…' : `Retry ${attempt - 1}/${PUSH_MAX_RETRIES}…`;
      _ptSet('pt2', '#94a3b8', attemptLabel);
      try {
        const _url  = _useFinalize ? BRIDGE_URL + '/pushconfig/finalize' : BRIDGE_URL + '/pushconfig';
        const _body = _useFinalize
          ? { ipMap: { [deviceName]: { ip, session_name: sessionName } }, action: 'commit',
              config, all_device_names: allDeviceNames }
          : { ipMap: { [deviceName]: { ip, config } } };
        const resp = await fetch(_url, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(_body),
        });
        if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
        const data = await resp.json();
        res = data[deviceName] || null; // null = server thread timed out → retry
      } catch (e) { res = { ok: false, error: e.message }; break; }
      if (res !== null) break;
    }
    const btn = document.getElementById(btnId);
    if (!res) {
      // All retries timed out — run /devstatus reachability check (matches bulk push behavior)
      let reachable = false;
      try {
        const chk = await fetch(BRIDGE_URL + '/devstatus', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ipMap: { [deviceName]: ip } }),
        });
        if (chk.ok) { const d = await chk.json(); reachable = !!(d[deviceName] && d[deviceName].ok); }
      } catch (_) {}
      const errMsg = reachable
        ? 'Push timed out — device reachable, verify config manually'
        : 'No response — device unreachable or push timed out';
      _ptSet('pt2', '#f87171', 'timed out');
      _ptSet('pt3', '#475569', '—');
      _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${escapeHtml(errMsg)}</div>` +
        `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#94a3b8;padding:2px 0 0;">` +
        `If Bridge → Cleanup shows stale items, run Cleanup first — removal commands (default interface, no vlan) are slow on EOS and may have caused this.</div>`);
      if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Push Timed Out');
      if (commitBtn) commitBtn.style.display = 'none';
      if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _setPushStatus(`<b>${label || deviceName}</b> — <span style="color:#f87171;font-weight:600;">${errMsg}</span>`);
    } else if (res.ok) {
      // Phase 2 success → session committed, nothing to abort.
      // Clear _commitInFlight now so × during Phase 3 skips the "commit in progress" dialog.
      // Clear sessionName so cancelPushConfig won't fire a spurious abort to the committed session.
      _commitInFlight = false;
      if (_pendingPush) delete _pendingPush.sessionName;
      // Phase 3 verify — start Phase 3
      // On first-ever push, save the baseline ID snapshot so future shifts are detectable.
      if (!_lastIdShiftResult || _lastIdShiftResult.isFirstRun) {
        google.script.run.withSuccessHandler(function() {
          _lastIdShiftResult = { shifted: [], isFirstRun: false };
        }).withFailureHandler(function() {}).saveDeviceIdSnapshot();
      }
      const _lateResponse = !!(res.late_response);
      const _restaged     = !!(res.restaged);
      const retryNote = lastAttempt > 1 ? ` (${lastAttempt - 1} retr${lastAttempt === 2 ? 'y' : 'ies'})` : '';
      const _p2Color = (_restaged || _lateResponse) ? '#f59e0b' : '#10b981';
      const _p2Label = _restaged     ? `re-staged + committed — session had timed out${retryNote}`
                     : _lateResponse ? `committed — eAPI delayed${retryNote}`
                     : `committed${retryNote}`;
      if (_restaged) _ptSet('pt1', '#f59e0b', 'session expired');
      _ptSet('pt2', _p2Color, _p2Label);
      _ptSet('pt3', '#94a3b8', 'verifying…');
      if (commitBtn) commitBtn.style.display = 'none';
      if (res.orphans_cleaned) _injectOrphanCleanedBanner(res.orphans_cleaned);
      _setPushStatus(`<b>${label || deviceName}</b>${retryNote} — Phase 3: verifying…`);
      try {
        const vResp = await fetch(BRIDGE_URL + '/pushconfig', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } }, dry_run: true }),
        });
        if (!vResp.ok) throw new Error('verify HTTP ' + vResp.status);
        const vData = await vResp.json();
        const vRes  = vData[deviceName] || { ok: false, error: 'No response from bridge for verify step' };
        if (vRes.ok) {
          const _v3EosErrs = _eosErrors(vRes);
          const rem = (vRes.diff || '').split('\n')
            .filter(l => l.startsWith('+') || l.startsWith('-')).length;
          if (rem === 0 && !_v3EosErrs) {
            const _v3EosWarns = _eosWarnings(vRes);
            const warnNote = _v3EosWarns ? ` · ${_v3EosWarns.length} note${_v3EosWarns.length !== 1 ? 's' : ''}` : '';
            _ptSet('pt3', '#10b981', `verified — in sync${warnNote}`);
            if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Push Successful');
            const _xBtn = document.getElementById('btnPushConfirmClose');
            if (_xBtn) _xBtn.onclick = closePushConfirmModal;
            _setPushStatus(`<b>${label || deviceName}</b>${retryNote} — ` +
              `<span style="color:#10b981;font-weight:600;">Committed — in sync</span>`);
            if (_v3EosWarns) {
              _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#92400e;padding:4px 0;">` +
                `<b>EOS notes (non-fatal):</b><br>` +
                _v3EosWarns.map(w => `<span style="display:block;">${escapeHtml(w)}</span>`).join('') + `</div>`);
            }
            if (btn) {
              btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align:-1px;margin-right:3px"><path d="M2 6.5l2.5 2.5 5.5-5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Verified';
              setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 3500);
            }
            setTimeout(() => { setStatus(getReadyStatus()); }, 5000);
          } else if (rem === 0 && _v3EosErrs) {
            // Empty diff but EOS rejected commands — false "in sync", device not fully updated
            _ptSet('pt3', '#f87171', 'EOS rejection on verify');
            if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'EOS Rejection on Verify');
            _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#dc2626;padding:4px 0;">` +
              `<b>EOS rejected commands during verify:</b><br>` + _formatEosErrorsHtml(_v3EosErrs) + `</div>`);
            if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
            _setPushStatus(`<b>${label || deviceName}</b> — ` +
              `<span style="color:#f87171;font-weight:600;">Committed — EOS rejection on verify</span>`);
            if (btn) { btn.disabled = false; btn.textContent = origText; }
          } else {
            // Partial — show remaining diff in pt_detail
            const dlines = (vRes.diff || '').split('\n');
            _ptSet('pt3', '#f59e0b', `${rem} line${rem !== 1 ? 's' : ''} still differ`);
            if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Partial Commit');
            let dhtml = `<pre style="font-family:'JetBrains Mono',monospace;font-size:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;` +
              `padding:8px;overflow-x:auto;max-height:220px;white-space:pre;margin:0;">`;
            dhtml += dlines.map(l => {
              const e = escapeHtml(l);
              if (l.startsWith('+')) return `<span style="color:#16a34a;">${e}</span>`;
              if (l.startsWith('-')) return `<span style="color:#dc2626;">${e}</span>`;
              if (l.startsWith('@')) return `<span style="color:#64748b;">${e}</span>`;
              return `<span style="color:#1e293b;">${e}</span>`;
            }).join('\n') + '</pre>';
            _ptDetail(dhtml);
            // Append Recommit button (closure captures deviceName/btnId before finally clears _pendingPush)
            const _recommitEl = document.getElementById('pt_detail');
            if (_recommitEl) {
              const _rb = document.createElement('button');
              _rb.className = 'btn-primary-mono';
              _rb.style.cssText = "margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:12px;";
              _rb.textContent = 'Recommit';
              const _rDev = deviceName, _rBtnId = btnId;
              _rb.onclick = () => { closePushConfirmModal(); pushDeviceConfig(_rDev, _rBtnId); };
              _recommitEl.appendChild(_rb);
            }
            if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
            _setPushStatus(`<b>${label || deviceName}</b> — ` +
              `<span style="color:#f59e0b;font-weight:600;">Committed — ${rem} line${rem !== 1 ? 's' : ''} still differ</span>`);
            if (btn) {
              btn.textContent = 'Partial';
              setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 4000);
            }
          }
        } else {
          const vErrSafe = escapeHtml(vRes.error || 'something went wrong');
          _ptSet('pt3', '#f87171', 'verify failed');
          if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Verify Failed');
          _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${vErrSafe}</div>`);
          if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
          _setPushStatus(`<b>${label || deviceName}</b> — ` +
            `<span style="color:#f87171;font-weight:600;">Committed — verify failed: ${vErrSafe}</span>`);
          if (btn) { btn.disabled = false; btn.textContent = origText; }
        }
      } catch (verifyErr) {
        const vErrSafe = escapeHtml(verifyErr.message);
        _ptSet('pt3', '#f87171', 'verify error');
        if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Verify Failed');
        _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${vErrSafe}</div>`);
        if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
        _setPushStatus(`<b>${label || deviceName}</b> — ` +
          `<span style="color:#f87171;font-weight:600;">Committed — verify error: ${vErrSafe}</span>`);
        if (btn) { btn.disabled = false; btn.textContent = origText; }
      }
    } else {
      // Phase 2 explicit device error
      const errSafe = escapeHtml(res.error || 'something went wrong');
      const _isTimeout = (res.error || '').toLowerCase().includes('timed out');
      _ptSet('pt2', '#f87171', 'push failed');
      _ptSet('pt3', '#475569', '—');
      _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${errSafe}</div>` +
        (_isTimeout ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#94a3b8;padding:2px 0 0;">` +
        `If Bridge → Cleanup shows stale items, run Cleanup first — removal commands (default interface, no vlan) are slow on EOS and may have caused this.</div>` : ''));
      if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Push Failed');
      if (commitBtn) commitBtn.style.display = 'none';
