/**
* ==========================================
* 5. CORE TOPOLOGY RENDERING & INTERACTION
* ==========================================
*/
function getLocalCoords(elem) {
  let x = 0; let y = 0;
  let w = elem.offsetWidth;
  let h = elem.offsetHeight;
  let current = elem;
  let stop = document.getElementById("canvas-surface");

  while(current && current !== stop) {
    x += current.offsetLeft;
    y += current.offsetTop;
    current = current.offsetParent;
  }

  // Add a slight vertical push to hit the exact visual center of the port dot
  let visualCenterY = y + 2;

  return { x: x, y: visualCenterY, w: w, h: h, right: x + w, bottom: visualCenterY + h };
}

// --- ZOOM & PAN LOGIC (Enhanced with Dynamic Limits & Touch) ---
function setupZoomPan() {
  let viewport = document.getElementById("viewport");
  let surface = document.getElementById("canvas-surface");

  // 1. Wheel Interaction (Mouse Wheel + Trackpad Pinch)
  viewport.addEventListener('wheel', function (e) {
    e.preventDefault();

    if (surface) surface.style.transition = "none";

    // --- MODE A: ZOOM (Ctrl + Scroll OR Trackpad Pinch) ---
    if (e.ctrlKey) {
      let rect = viewport.getBoundingClientRect();
      let mx = e.clientX - rect.left;
      let my = e.clientY - rect.top;

      // Calculate current offset relative to zoom
      let xs = (mx - panX) / zoomLevel;
      let ys = (my - panY) / zoomLevel;

      // --- TRACKPAD DAMPENER ---
      // Trackpads send frequent small deltas. Reduce sensitivity to prevent explosions.
      let isTrackpad = Math.abs(e.deltaY) < 50;
      let sensitivity = isTrackpad ? 0.02 : 0.1;

      let delta = -e.deltaY;

      // Formula: NewZoom = OldZoom * (1 + (direction * sensitivity))
      let factor = 1 + (Math.sign(delta) * sensitivity);
      let newZoom = zoomLevel * factor;

      // --- DYNAMIC ZOOM LIMITS ---
      // Calculate how much we need to zoom out to fit the ENTIRE surface in the viewport
      // We take the smaller of the Width Ratio or Height Ratio.
      // e.g., if Viewport is 1000px and Content is 2000px, minZoom is 0.5.
      const minZoomW = viewport.clientWidth / surface.offsetWidth;
      const minZoomH = viewport.clientHeight / surface.offsetHeight;

      // Allow zooming out slightly past the "perfect fit" (0.9 factor) for padding,
      // but never go below 0.05 (sanity check).
      const fitZoom = Math.min(minZoomW, minZoomH) * 0.9;
      const dynamicMin = Math.max(fitZoom, 0.05);

      // Clamp: Cannot zoom out further than seeing the whole canvas
      if (newZoom < dynamicMin) newZoom = dynamicMin;
      if (newZoom > 5) newZoom = 5;

      // Adjust Pan to keep mouse/pinch center stable
      panX = mx - (xs * newZoom);
      panY = my - (ys * newZoom);

      zoomLevel = newZoom;
    }
    // --- MODE B: SCROLL/PAN (Regular Scroll) ---
    else {
      panX -= e.deltaX;
      panY -= e.deltaY;
    }

    updateTransform();

    clearTimeout(zoomTimer);
    zoomTimer = setTimeout(() => {
      if (surface) surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    }, 200);
  }, { passive: false });

  // 2. Mouse Pan (Desktop Drag)
  viewport.addEventListener('mousedown', function (e) {
    if (isGroupRectMode && currentViewMode === 'holistic') { beginGroupRectDraw(e); return; }
    // Only allow pan on empty space or specific background elements
    if (e.target.id === 'viewport' || e.target.id === 'canvas-surface' || e.target.tagName === 'CANVAS' || e.target.tagName === 'svg') {
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      viewport.style.cursor = "grabbing";
      if (surface) surface.style.transition = "none";
    }
  });

  window.addEventListener('mousemove', function (e) {
    if (isGroupRectMode && activeDrawRect) { updateGroupRectDraw(e); return; }
    if (!isPanning) return;
    e.preventDefault();
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    if (!ticking) {
      window.requestAnimationFrame(function () {
        updateTransform();
        ticking = false;
      });
      ticking = true;
    }
  });

  window.addEventListener('mouseup', function () {
    if (isGroupRectMode && activeDrawRect) { endGroupRectDraw(); return; }
    if (isPanning) {
      isPanning = false;
      viewport.style.cursor = "grab";
      if (surface) surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    }
  });

  // 3. Touch Support (Mobile/Tablet Pinch & Drag)
  let initialPinchDist = null;
  let lastTouchX = 0;
  let lastTouchY = 0;
  let initialZoom = 1;

  viewport.addEventListener('touchstart', function (e) {
    if (surface) surface.style.transition = "none";

    if (e.touches.length === 1) {
      // Single Finger -> Pan
      isPanning = true;
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      // Two Finger -> Pinch Start
      isPanning = false; // Disable pan to focus on zoom
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      initialPinchDist = Math.hypot(dx, dy);
      initialZoom = zoomLevel; // Snapshot current zoom
    }
  }, { passive: false });

  viewport.addEventListener('touchmove', function (e) {
    e.preventDefault(); // Stop browser scrolling

    if (e.touches.length === 1 && isPanning) {
      // Pan Logic
      let dx = e.touches[0].clientX - lastTouchX;
      let dy = e.touches[0].clientY - lastTouchY;
      panX += dx;
      panY += dy;
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
      updateTransform();
    } else if (e.touches.length === 2 && initialPinchDist > 0) {
      // Pinch Zoom Logic
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      let currentDist = Math.hypot(dx, dy);

      // Calculate zoom relative to start of gesture
      let scaleFactor = currentDist / initialPinchDist;
      let newZoom = initialZoom * scaleFactor;

      // --- DYNAMIC ZOOM LIMITS (Same logic as Mouse Wheel) ---
      const minZoomW = viewport.clientWidth / surface.offsetWidth;
      const minZoomH = viewport.clientHeight / surface.offsetHeight;
      const fitZoom = Math.min(minZoomW, minZoomH) * 0.9;
      const dynamicMin = Math.max(fitZoom, 0.05);

      // Clamp limits
      if (newZoom < dynamicMin) newZoom = dynamicMin;
      if (newZoom > 5) newZoom = 5;

      zoomLevel = newZoom;
      updateTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', function (e) {
    isPanning = false;
    initialPinchDist = null;
    if (e.touches.length === 0 && surface) {
      surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    }
  });
}

function updateTransform() {
  let surface = document.getElementById("canvas-surface");
  let vp = document.getElementById("viewport");

  // FIX: Safety check for bounds
  if (!contentBounds || typeof contentBounds.maxX === 'undefined') {
    contentBounds = { minX: 0, minY: 0, maxX: 2000, maxY: 2000 };
  }

  if (surface && vp) {
    const vpW = vp.clientWidth;
    const vpH = vp.clientHeight;

    // --- CLAMPING LOGIC ---
    // 1. Calculate the limits based on Zoom Level
    // The logic: The content edge (plus padding) cannot move past the viewport edge.

    // Left Limit: Rightmost edge of content cannot go left of the Left Padding
    // panX > UNIFIED_PAD - (contentBounds.maxX * zoomLevel)
    const minPanX = UNIFIED_PAD - (contentBounds.maxX * zoomLevel);

    // Right Limit: Leftmost edge of content cannot go right of the Viewport - Padding
    // panX < vpW - UNIFIED_PAD - (contentBounds.minX * zoomLevel)
    const maxPanX = vpW - UNIFIED_PAD - (contentBounds.minX * zoomLevel);

    // Top Limit
    const minPanY = UNIFIED_PAD - (contentBounds.maxY * zoomLevel);

    // Bottom Limit
    const maxPanY = vpH - UNIFIED_PAD - (contentBounds.minY * zoomLevel);

    // 2. Apply Clamping
    // If content is smaller than screen, we prioritize the top/left limits
    // to keep it somewhat centered or logical.

    if (minPanX < maxPanX) {
      panX = Math.max(minPanX, Math.min(panX, maxPanX));
    } else {
      // Special case: Content is small/Zoom is low -> Keep it generally visible
      panX = Math.max(maxPanX, Math.min(panX, minPanX));
    }

    if (minPanY < maxPanY) {
      panY = Math.max(minPanY, Math.min(panY, maxPanY));
    } else {
      panY = Math.max(maxPanY, Math.min(panY, minPanY));
    }

    // --- APPLY CSS ---
    surface.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  }
}

function applyValidationState() {
  const btn = document.getElementById("validateBtn");
  if (!btn) return;
  if (isValidationMode) {
    btn.classList.add("active");
    btn.style.background = "var(--danger)";
    btn.style.color = "white";
  } else {
    btn.classList.remove("active");
    btn.style.background = "";
    btn.style.color = "";
  }
  const errBtn = document.getElementById('btnAuditOnly');
  if (errBtn) errBtn.style.display = isValidationMode ? 'flex' : 'none';
}

function toggleValidationMode() {
  isValidationMode = !isValidationMode;
  applyValidationState();

  const errBtn = document.getElementById('btnAuditOnly');
  if (errBtn) errBtn.style.display = isValidationMode ? 'flex' : 'none';

  const statusEl = document.getElementById("status");
  if (isValidationMode) {
    runValidation();
    setStatus("Audit Mode: Enabled");
  } else {
    validationErrors = {};
    isAuditOnlyView = false;
    const btn = document.getElementById('btnAuditOnly');
    if (btn) btn.classList.remove('active');
    applyAuditOnlyView();
    if (statusEl) {
      setStatus(getReadyStatus());
    }
  }

  requestAnimationFrame(redrawLinks);
}

function toggleAuditOnlyView() {
  const btn = document.getElementById('btnAuditOnly');
  if (!isValidationMode) {
    if (btn) { btn.style.color = '#ef4444'; setTimeout(() => { btn.style.color = ''; }, 600); }
    return;
  }
  isAuditOnlyView = !isAuditOnlyView;
  if (btn) btn.classList.toggle('active', isAuditOnlyView);
  applyAuditOnlyView();
}

function applyAuditOnlyView() {
  if (!isValidationMode || !isAuditOnlyView) {
    document.querySelectorAll('.node[data-id]').forEach(el => {
      if (el.dataset.auditHidden) { el.style.display = ''; delete el.dataset.auditHidden; }
    });
    requestAnimationFrame(redrawLinks);
    return;
  }
  const devsWithErrors = new Set();
  Object.entries(validationErrors).forEach(([linkId, errors]) => {
    if (!errors || !errors.length) return;
    const link = linkMap[linkId];
    if (!link) return;
    devsWithErrors.add(link.u.split(':')[0]);
    devsWithErrors.add(link.v.split(':')[0]);
  });
  document.querySelectorAll('.node[data-id]').forEach(el => {
    if (devsWithErrors.has(el.dataset.id)) {
      el.style.display = '';
      delete el.dataset.auditHidden;
    } else {
      el.style.display = 'none';
      el.dataset.auditHidden = '1';
    }
  });
  requestAnimationFrame(redrawLinks);
}

function runValidation() {
  // 1. Initialize State
  let portErrorCount = 0;
  validationErrors = {};

  const statusEl = document.getElementById("status");

  // 2. Define Helpers
  const normalizeVlan = (val) => {
    if (!val) return "";
    const expanded = Array.from(parseVlanInput(String(val))).sort((a, b) => a - b);
    return expanded.join(',');
  };

  const extractVlans = (str) => String(str).match(/\d+/g) || [];

  // Valid mode pairs for a connected link (both directions listed explicitly)
  const VALID_MODE_PAIRS = new Set([
    'l2-et-access|l2-et-access',
    'l2-et-access|l3-et-int',   'l3-et-int|l2-et-access',
    'l3-et-int|l3-et-int',
    'l2-et-trunk|l2-et-trunk',
    'l2-et-trunk|l3-et-sub-int', 'l3-et-sub-int|l2-et-trunk',
    'l3-et-sub-int|l3-et-sub-int',
    'l2-po-access|l2-po-access',
    'l2-po-access|l3-po-int',   'l3-po-int|l2-po-access',
    'l3-po-int|l3-po-int',
    'l2-po-trunk|l2-po-trunk',
    'l2-po-trunk|l3-po-sub-int', 'l3-po-sub-int|l2-po-trunk',
    'l3-po-sub-int|l3-po-sub-int',
  ]);

  const flagErrorOnPort = (pid, msg) => {
    const links = portMap[pid] || [];
    links.forEach(lid => {
      if (!validationErrors[lid]) validationErrors[lid] = [];
      if (!validationErrors[lid].includes(msg)) {
        validationErrors[lid].push(msg);
        portErrorCount++;
      }
    });
  };

  // 3. Data Structures for Global Aggregation
  const vlanGwUsage = {};

  // =========================================================
  // CHECK GROUP 1: LINK-BASED CHECKS
  // =========================================================
  if (typeof globalLinks !== 'undefined' && globalLinks) {
    globalLinks.forEach(link => {
      let nodeA = allNodesData[link.u];
      let nodeB = allNodesData[link.v];
      if (!nodeA || !nodeB) return;

      // --- PO CONSISTENCY CHECKS ---
      const poA = (nodeA.details.po_ || '').trim();
      const poB = (nodeB.details.po_ || '').trim();
      const poASet = poA !== '';
      const poBSet = poB !== '';
      if (poASet && poBSet) {
        if (poA !== poB) {
          const msg = `[FAIL] Po Mismatch: ${nodeA.device} has ${poA} but ${nodeB.device} has ${poB}`;
          flagErrorOnPort(link.u, msg);
          flagErrorOnPort(link.v, msg);
        }
      } else if (poASet !== poBSet) {
        const setDev  = poASet ? nodeA.device : nodeB.device;
        const setVal  = poASet ? poA : poB;
        const setPort = poASet ? link.u : link.v;
        const misPort = poASet ? link.v : link.u;
        const msg = `[FAIL] Po Asymmetry: ${setDev} has ${setVal} but peer has no po_ set`;
        flagErrorOnPort(setPort, msg);
        flagErrorOnPort(misPort, msg);
      }

      // B. PAIR MISMATCH CHECKS (Speed & VLAN)
      const devAData = allDevicesData[nodeA.device];
      const devBData = allDevicesData[nodeB.device];
      const isNonEosLink = (devAData && devAData.type === 'non-arista') || (devBData && devBData.type === 'non-arista');

      if (!isNonEosLink) {
        let pairErrors = [];

        // C. VLAN MISMATCH
        let vlanA = normalizeVlan(nodeA.details.vlan_);
        let vlanB = normalizeVlan(nodeB.details.vlan_);
        if (vlanA !== vlanB) {
          pairErrors.push(`VLAN Mismatch`);
        }

        // D. MODE COMPATIBILITY
        const modeA = (nodeA.details.sp_mode_ || "").trim().toLowerCase();
        const modeB = (nodeB.details.sp_mode_ || "").trim().toLowerCase();
        if (modeA && modeB && !VALID_MODE_PAIRS.has(`${modeA}|${modeB}`)) {
          pairErrors.push(`Mode Incompatible: '${modeA}' ↔ '${modeB}' is not a supported combination`);
        }

        // E. SPEED MISMATCH
        // Skip 'auto' and blank — only compare when both sides declare an explicit speed.
        // Direct comparison: 25g ↔ 10g flags, 25g ↔ 25g passes.
        const _spRaw = d => (d.details.et_speed_ || '').trim().toLowerCase();
        const spA = _spRaw(nodeA); const spB = _spRaw(nodeB);
        const _sp = s => (s === 'auto' || s === '') ? '' : s;
        const normSpA = _sp(spA); const normSpB = _sp(spB);
        if (normSpA && normSpB) {
          if (normSpA !== normSpB) {
            pairErrors.push(`Speed Mismatch: ${nodeA.device} (${normSpA}) ↔ ${nodeB.device} (${normSpB})`);
          }
        }

        if (pairErrors.length > 0) {
          validationErrors[link.id] = (validationErrors[link.id] || []).concat(pairErrors);
          portErrorCount++;
        }
      }
    });
  }

  // =========================================================
  // CHECK GROUP 2: NODE CONFIGURATION CHECKS
  // =========================================================
  const validIntRegex = /^(Et|Po|Lo|Vl|Ma|Mgmt|Fa|Gi|Te|Twe|Hu|Fo|Vx|Tu)[a-z0-9\/\.\-]+$/i;

  for (let nodeId in allNodesData) {
    let node = allNodesData[nodeId];
    if (!node || !node.details) continue;

    let d = node.details;
    let configErrors = [];
    let connectedLinks = portMap[nodeId] || [];

    // --- Data Prep ---
    const mode = (d.sp_mode_ || "").toLowerCase();
    const svi = (d.svi_vlan_ || "").toLowerCase().trim();
    const ipType = (d.ip_type_ || "").toLowerCase();
    const portName = node.name.toLowerCase();

    // SVI is "On" if svi_vlan_ has any value ('all' or specific VLANs)
    let isSviOn = svi !== '';
    if (portName.startsWith("vlan")) isSviOn = true;

    const hasIp = (ipType !== "" && ipType !== "-");

    // A. NAMING CONVENTION
    if (!validIntRegex.test(node.name)) {
      configErrors.push(`Invalid Interface Name: '${node.name}'`);
    }

    // B. MLAG vs L3 CONFLICT
    if (d.isMlag && mode.includes("l3")) {
      configErrors.push(`MLAG/L3 Conflict: Port is MLAG member but Mode is Layer 3. Must be L2.`);
    }

    // C. INVALID SVI (L3 Port + SVI Enabled)
    if (mode.startsWith("l3") && isSviOn && !portName.startsWith("vlan")) {
      configErrors.push(`Invalid SVI: L3 interfaces cannot have SVI enabled.`);
    }

    // D. MISSING IP FOR SVI
    if (isSviOn && !hasIp) {
      configErrors.push(`Incomplete SVI: SVI is active but IP Type is blank.`);
    }

    // E. MISSING IP FOR L3
    if (mode.startsWith("l3") && !portName.startsWith("vlan") && !hasIp) {
      configErrors.push(`Incomplete L3: Routed interface (${mode}) requires IP Type.`);
    }

    // F. GATEWAY COLLECTION (data for global duplicate GW check below)
    if (ipType.includes("gw") || ipType.includes("gateway")) {
      const vlans = new Set();
      const _pvGw = parseVlanWithNative(d.vlan_);
      if (_pvGw.vlans) extractVlans(_pvGw.vlans).forEach(v => vlans.add(v));
      if (_pvGw.native) vlans.add(_pvGw.native);

      if (portName.startsWith("vlan")) {
        const vid = portName.replace("vlan", "");
        if (vid) vlans.add(vid);
      }

      vlans.forEach(v => {
        if (!vlanGwUsage[v]) vlanGwUsage[v] = [];
        vlanGwUsage[v].push({ portId: nodeId, device: node.device });
      });
    }

    // G. MISSING PO FOR PORT-CHANNEL MODE
    if ((mode.startsWith('l2-po-') || mode.startsWith('l3-po-')) && !d.po_) {
      configErrors.push(`Missing PO: Mode is '${d.sp_mode_}' but Po column is blank.`);
    }

    // H. STALE PO VALUE ON ETHERNET MODE
    if (/^l[23]-et/i.test(mode) && d.po_ && String(d.po_).trim() !== "") {
      configErrors.push(`Stale PO: Mode is '${d.sp_mode_}' but Po column has value '${d.po_}' — should be blank.`);
    }

    // I. STALE IP TYPE ON L2 PORT (no SVI)
    if (mode.startsWith("l2") && !isSviOn && d.ip_type_ && String(d.ip_type_).trim() !== "") {
      configErrors.push(`Stale IP Type: Mode is '${d.sp_mode_}' with no SVI but IP Type is '${d.ip_type_}' — should be blank.`);
    }

    // J. NATIVE VLAN TOKEN ON NON-TRUNK PORT
    const _pvAuditJ = parseVlanWithNative(d.vlan_);
    if (_pvAuditJ.native && !mode.includes("trunk")) {
      configErrors.push(`Native VLAN: nv${_pvAuditJ.native} in VLANs column is only valid on trunk ports — current mode is '${d.sp_mode_ || "blank"}'. Token will be ignored.`);
    }

    // K. VLAN CONFLICTS WITH EOS INTERNAL VLANS (requires bridge check data)
    const _intVlansForDev = deviceInternalVlans[(node.device || "").toLowerCase()] || [];
    if (_intVlansForDev.length) {
      const _vlanStr = [_pvAuditJ.vlans, _pvAuditJ.native].filter(Boolean).join(',');
      if (_vlanStr) {
        const _portVlans = [...parseVlanInput(_vlanStr)].map(v => parseInt(v)).filter(v => !isNaN(v));
        const _conflicts = _portVlans.filter(v => _intVlansForDev.includes(v));
        if (_conflicts.length) {
          const pl = _conflicts.length > 1;
          configErrors.push(`Internal VLAN Conflict: VLAN${pl ? 's' : ''} ${_conflicts.join(', ')} ${pl ? 'are' : 'is'} auto-allocated by EOS on this device — conflicts with internal VLAN allocation.`);
        }
      }
    }

    // Apply Errors
    if (configErrors.length > 0) {
      connectedLinks.forEach(linkId => {
        if (!validationErrors[linkId]) validationErrors[linkId] = [];
        configErrors.forEach(err => {
          if (!validationErrors[linkId].includes(err)) validationErrors[linkId].push(err);
        });
      });
      portErrorCount++;
    }
  }

  // =========================================================
  // CHECK GROUP 3: MLAG PEER-LINK INTEGRITY
  // =========================================================
  const processedPairs = new Set();

  for (let deviceId in allDevicesData) {
    const myPeer = allDevicesData[deviceId].mlagPeer;
    if (myPeer) {
      const pairKey = [deviceId, myPeer].sort().join("|");
      if (!processedPairs.has(pairKey)) {
        processedPairs.add(pairKey);

        // CHECK: Verify if there is a physical connection tagged as 'peer' between these devices
        const hasPhysicalPeerLink = globalLinks.some(l => {
          const uDev = l.u.split(":")[0];
          const vDev = l.v.split(":")[0];
          return (l.type === 'peer') &&
            ((uDev === deviceId && vDev === myPeer) ||
              (uDev === myPeer && vDev === deviceId));
        });

        if (!hasPhysicalPeerLink) {
          const msg = `[FAIL] MLAG Peer-Link Missing: No physical connection found between ${deviceId} and ${myPeer}.`;
          portErrorCount++;
          if (statusEl) {
            setStatus(msg, "status-error");
          }
        }
      }
    }
  }

  // =========================================================
  // CHECK GROUP 4: GLOBAL DUPLICATE GATEWAY CHECK
  // =========================================================
  Object.keys(vlanGwUsage).forEach(vlanId => {
    const usages = vlanGwUsage[vlanId];
    const devices = [...new Set(usages.map(u => u.device))];

    const evpnOn = document.getElementById('chkTechEvpn') && document.getElementById('chkTechEvpn').checked;
    const vxlanOn = document.getElementById('chkTechVxlan') && document.getElementById('chkTechVxlan').checked;

    const isAnycastDesign = (evpnOn || vxlanOn);

    if (devices.length > 2 && !isAnycastDesign) {
      const msg = `Duplicate GW: VLAN ${vlanId} used on ${devices.length} devices.`;
      usages.forEach(u => {
        flagErrorOnPort(u.portId, msg);
      });
    }
  });

  // =========================================================
  // CHECK GROUP 5: DUPLICATE INTERFACE CHECKS
  // =========================================================
  if (typeof globalPortFrequency !== 'undefined') {
    for (const [fullId, count] of Object.entries(globalPortFrequency)) {
      if (count > 1) {
        const err = `Duplicate Interface: '${fullId.split(":")[1]}' defined ${count} times.`;
        flagErrorOnPort(fullId, err);
      }
    }
  }

  // =========================================================
  // CHECK GROUP 6: VLAN USAGE CONSISTENCY
  // =========================================================
  for (const deviceId in devicePortsMap) {
    const portIds = devicePortsMap[deviceId];
    const vlanUsage = {};

    portIds.forEach(pid => {
      const node = allNodesData[pid];
      if (!node || !node.details) return;
      const d = node.details;

      let logicalOwner = node.name;
      if (d.po_ && d.po_.trim() !== "") logicalOwner = d.po_.trim();

      let type = "L2";
      const mode = (d.sp_mode_ || "").toLowerCase();
      const hasIp = (d.ipv4_ && d.ipv4_ !== '-') || (d.ipv6_ && d.ipv6_ !== '-');
      if (mode.includes("l3") || mode === "routed" || hasIp || node.name.toLowerCase().startsWith("vlan")) {
        type = "L3";
      }

      const vlans = new Set();
      const _pvAudit = parseVlanWithNative(d.vlan_);
      if (_pvAudit.vlans) {
        const expanded = parseVlanInput(_pvAudit.vlans);
        expanded.forEach(v => vlans.add(v));
      }
      if (_pvAudit.native) vlans.add(_pvAudit.native);

      vlans.forEach(vid => {
        const vStr = String(vid);
        if (!vlanUsage[vStr]) {
          vlanUsage[vStr] = { type: type, owner: logicalOwner, firstPort: pid };
        } else {
          const existing = vlanUsage[vStr];
          let err = null;
          if (existing.type === "L3" && type === "L3") {
            if (existing.owner !== logicalOwner) {
              err = `VLAN ${vStr} L3 Conflict: Defined on multiple L3 interfaces.`;
            }
          } else if (existing.type !== type) {
            err = `VLAN ${vStr} Mixed Usage: L2 vs L3.`;
          }
          if (err) {
            flagErrorOnPort(pid, err);
            flagErrorOnPort(existing.firstPort, err);
          }
        }
      });
    });
  }

  // =========================================================
  // CHECK GROUP 7: DUPLICATE P2P VLAN ACROSS SHEET
  // =========================================================
  // Same VLAN on two different P2P logical links → same derived subnet → IP conflict.
  // Po member links sharing the same VLAN are expected (all child links carry the same
  // VLAN) and are collapsed to a single logical identity before comparison.
  if (typeof globalLinks !== 'undefined' && globalLinks) {
    const p2pVlanLogical = {}; // vlan → Map<logicalKey, Set<link.id>>

    globalLinks.forEach(link => {
      const nodeA = allNodesData[link.u];
      const nodeB = allNodesData[link.v];
      if (!nodeA || !nodeB) return;

      const ipTypeA = (nodeA.details.ip_type_ || "").toLowerCase();
      const ipTypeB = (nodeB.details.ip_type_ || "").toLowerCase();
      if (!ipTypeA.includes("p2p") && !ipTypeB.includes("p2p")) return;

      // Derive logical identity: Po members → canonical Po pair; standalone → link.id
      const poA = (nodeA.details.po_ || "").trim();
      const poB = (nodeB.details.po_ || "").trim();
      const logicalKey = (poA && poB)
        ? [nodeA.device + ":" + poA, nodeB.device + ":" + poB].sort().join("|")
        : link.id;

      const vlanSrc = ipTypeA.includes("p2p") ? nodeA.details.vlan_ : nodeB.details.vlan_;
      extractVlans(vlanSrc || "").forEach(v => {
        if (!p2pVlanLogical[v]) p2pVlanLogical[v] = new Map();
        if (!p2pVlanLogical[v].has(logicalKey)) p2pVlanLogical[v].set(logicalKey, new Set());
        p2pVlanLogical[v].get(logicalKey).add(link.id);
      });
    });

    Object.keys(p2pVlanLogical).forEach(vlan => {
      const logicalMap = p2pVlanLogical[vlan];
      if (logicalMap.size > 1) {
        const msg = `[FAIL] Duplicate P2P VLAN ${vlan}: Used on ${logicalMap.size} logical links — causes IP conflict in generated config`;
        logicalMap.forEach(linkIds => {
          linkIds.forEach(lid => {
            if (!validationErrors[lid]) validationErrors[lid] = [];
            if (!validationErrors[lid].includes(msg)) {
              validationErrors[lid].push(msg);
              portErrorCount++;
            }
          });
        });
      }
    });
  }

  // =========================================================
  // CHECK GROUP 8: MLAG-STYLE PO WITHOUT DECLARED MLAG PEER
  // Two Arista devices sharing the same PO toward the same upstream = MLAG pattern.
  // If they're not declared as MLAG peers in Device Manager → flag error.
  // =========================================================
  if (typeof globalLinks !== 'undefined' && globalLinks) {
    // poUpstreamSources: "poName|upstreamDev" → Set of source devices (the PO owners)
    const poUpstreamSources = {};
    const poUpstreamLinkIds = {};
    const poUpstreamOriginals = {}; // preserve original casing for error message

    globalLinks.forEach(link => {
      const nodeA = allNodesData[link.u];
      const nodeB = allNodesData[link.v];
      if (!nodeA || !nodeB) return;
      const devAData = allDevicesData[nodeA.device];
      const devBData = allDevicesData[nodeB.device];
      if ((devAData && devAData.type === 'non-arista') || (devBData && devBData.type === 'non-arista')) return;

      const poA = (nodeA.details.po_ || '').trim();
      const poB = (nodeB.details.po_ || '').trim();

      // Only consider links where exactly one side owns the PO (the MLAG member).
      // If both sides have PO set (peer-link LAG) or neither — skip.
      let poOwner = null, upstreamDev = null, poOrig = null;
      if (poA && !poB) { poOwner = nodeA.device; upstreamDev = nodeB.device; poOrig = poA; }
      else if (poB && !poA) { poOwner = nodeB.device; upstreamDev = nodeA.device; poOrig = poB; }
      else return;

      const mapKey = poOrig.toLowerCase() + '|' + upstreamDev.toLowerCase();
      if (!poUpstreamSources[mapKey]) { poUpstreamSources[mapKey] = new Set(); poUpstreamLinkIds[mapKey] = new Set(); poUpstreamOriginals[mapKey] = { poName: poOrig, upstream: upstreamDev }; }
      poUpstreamSources[mapKey].add(poOwner);
      poUpstreamLinkIds[mapKey].add(link.id);
    });

    Object.entries(poUpstreamSources).forEach(([mapKey, sources]) => {
      if (sources.size < 2) return; // Only 1 device → normal LAG, not MLAG
      const parts = mapKey.split('|');
      const { poName: poOrig, upstream: upstreamOrigDev } = poUpstreamOriginals[mapKey];
      const sourceList = Array.from(sources);

      for (let i = 0; i < sourceList.length; i++) {
        for (let j = i + 1; j < sourceList.length; j++) {
          const devA = sourceList[i];
          const devB = sourceList[j];
          const mlagA = allDevicesData[devA] && allDevicesData[devA].mlagPeer;
          const mlagB = allDevicesData[devB] && allDevicesData[devB].mlagPeer;
          const areDeclaredPeers = (mlagA === devB && mlagB === devA);
          if (!areDeclaredPeers) {
            const err = `[FAIL] MLAG Peer Required: ${devA} and ${devB} both use ${poOrig} toward ${upstreamOrigDev} — declare as MLAG peers in Device Manager`;
            poUpstreamLinkIds[mapKey].forEach(lid => {
              if (!validationErrors[lid]) validationErrors[lid] = [];
              if (!validationErrors[lid].includes(err)) { validationErrors[lid].push(err); portErrorCount++; }
            });
          }
        }
      }
    });
  }

  // =========================================================
  // Bridge CHECKS (populated by runBridgeCheck — empty if not yet run)
  // =========================================================
  Object.entries(bridgePortStatus).forEach(([portId, status]) => {
    if (status === 'mismatch') {
      flagErrorOnPort(portId, 'LLDP mismatch — wrong neighbor/port detected');
    } else if (status === 'missing' && bridgeAuditFlagMissing) {
      flagErrorOnPort(portId, 'LLDP — no neighbor seen on this port');
    }
  });

  // UPDATE UI
  if (statusEl && !statusEl.innerText.includes("MLAG Peer-Link Missing")) {
    setStatus(portErrorCount === 0 ? "Audit Clean." : `Audit: ${portErrorCount} Issues Found`, portErrorCount > 0 ? "status-error" : "");
  }

  applyAuditOnlyView();
  requestAnimationFrame(redrawLinks);
}

function normalizeSpeed(s) {
  if (!s) return null;
  s = s.toLowerCase().replace(/gbps|mbps|g|m/g, "").trim();
  if (s === "1000" || s === "1") return "1g";
  if (s === "10000" || s === "10") return "10g";
  if (s === "25000" || s === "25") return "25g";
  if (s === "40000" || s === "40") return "40g";
  if (s === "100000" || s === "100") return "100g";
  if (s === "400000" || s === "400") return "400g";
  if (s === "800000" || s === "800") return "800g";
  return s;
}

/**
* fetchFullConfig
* - Silences background noise (hovers).
* - Accepts custom messages for system actions (Tech Save).
*/
function fetchFullConfig(deviceName, callback, customSuccessMsg) {
  // Non-EOS devices have no EOS config — skip silently, no callback (calling callback causes
  // infinite recursion: fetchFullConfig → refreshCallback → showTooltip → fetchFullConfig → ∞)
  if (allDevicesData[deviceName] && allDevicesData[deviceName].type === 'non-arista') {
    return;
  }
  // 1. Check Cache
  if (configCache[deviceName]) {
    processDeviceConfig(deviceName, configCache[deviceName].data);
    if (selectedDeviceId === deviceName) {
      currentDeviceConfig = formatConfigText(configCache[deviceName].data);
    }
    if (callback) callback(null);
    return;
  }

  // 2. Queueing Logic
  if (pendingFetches.has(deviceName)) {
    if (callback) {
      if (!fetchQueue[deviceName]) fetchQueue[deviceName] = [];
      fetchQueue[deviceName].push(callback);
    }
    return;
  }

  pendingFetches.add(deviceName);
  if (callback) fetchQueue[deviceName] = [callback];

  // 3. Status Bar Update (Context-Aware)
  const st = document.getElementById("status");
  // Only show "Fetching..." if this is the Active Device OR it's a specific system action
  const shouldShowStatus = (selectedDeviceId === deviceName) || (customSuccessMsg);

  if (st && shouldShowStatus) {
    if (customSuccessMsg) {
      setStatus("Tech Settings Saved & Fetching new config...");
    } else {
      setStatus("Fetching " + deviceName + "...");
    }
  }

  // 4. Server Call
  google.script.run
    .withSuccessHandler(res => {
      pendingFetches.delete(deviceName);

      if (res.error) {
        console.error("Fetch Error:", res.error);
        if (selectedDeviceId === deviceName) {
          const btn = document.getElementById("btnDevice");
          if (btn) {
            btn.innerText = "Fetch Failed: " + res.error;
            btn.style.color = "var(--error-text)";
            btn.style.background = "var(--error-bg)";
          }
        }
      }
      else {
        configCache[deviceName] = { data: res.config };
        processDeviceConfig(deviceName, res.config);

        if (selectedDeviceId === deviceName) {
          currentDeviceConfig = formatConfigText(res.config);
        }

        // 5. Success Message
        const isStillSelected = (selectedDeviceId === deviceName);

        if (st && (isStillSelected || customSuccessMsg)) {
          // Use custom message if provided (e.g. "Tech Change"), else default
          setStatus(customSuccessMsg || "<b>New Config Fetched</b>", "status-ok");

          setTimeout(() => {
            setStatus(getReadyStatus());
            if (typeof isValidationMode !== 'undefined' && isValidationMode) runValidation();
          }, 4000);
        }
      }

      if (fetchQueue[deviceName]) {
        fetchQueue[deviceName].forEach(cb => cb(res.error || null));
        delete fetchQueue[deviceName];
      }
    })
    .withFailureHandler(err => {
      pendingFetches.delete(deviceName);
      if (fetchQueue[deviceName]) {
        fetchQueue[deviceName].forEach(cb => cb(err));
        delete fetchQueue[deviceName];
      }
    })
    .getDeviceConfig(deviceName);
}

function formatConfigText(configMap) {
  if (!configMap) return "";
  const keys = Object.keys(configMap).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  const lines = [];
  keys.forEach(k => {
    if (configMap[k].full) lines.push(configMap[k].full);
  });
  return lines.join('\n!\n');
}

  }

function startFlexibleLayout() {
  if (!currentData) return;
  if (typeof d3 === 'undefined') { alert("D3 library not loaded."); return; }

  // Stop any previous instance
  stopFlexibleLayout();

  // 1. SELECT NODES
  let domNodes = Array.from(document.querySelectorAll(".node:not(.dimmed)"));

  let nodesData = domNodes.map(el => {
    let id = el.dataset.id;
    let saved = savedNodePositions[id];

    // Use current DOM position as start point to prevent jumping
    let currentLeft = parseFloat(el.style.left) || 0;
    let currentTop = parseFloat(el.style.top) || 0;

    return {
      id: id,
      hostname: el.dataset.hostname || "",
      element: el,
      // If saved state exists, use it. Otherwise use current DOM position.
      x: saved ? saved.x : currentLeft,
      y: saved ? saved.y : currentTop,
      // PINNING: Essential for "Flexible" view.
      // If fx/fy are set, D3 won't auto-move the node after drag.
      fx: saved ? saved.fx : null,
      fy: saved ? saved.fy : null
    };
  });

  nodesData = nodesData.filter(n => n.id);
  let activeNodeIds = new Set(nodesData.map(n => n.id));
  let linkCounts = {};

  globalLinks.forEach(l => {
    let s = l.u.split(":")[0]; let t = l.v.split(":")[0];
    if (s !== t && activeNodeIds.has(s) && activeNodeIds.has(t)) {
      let id = s < t ? s + "-" + t : t + "-" + s;
      if (!linkCounts[id]) linkCounts[id] = { source: s, target: t, count: 0 };
      linkCounts[id].count++;
    }
  });
  let linksData = Object.values(linkCounts);

  // 2. CONFIGURE SIMULATION
  d3Simulation = d3.forceSimulation(nodesData)
    .force("link", d3.forceLink(linksData).id(d => d.id).distance(250))
    .force("charge", d3.forceManyBody().strength(-1500))
    .force("collide", d3.forceCollide().radius(150))
    .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2).strength(0.02))
    .alphaDecay(0.02)
    .on("tick", () => {
      const surface = document.getElementById("canvas-surface");

      let maxX = 0;
      let maxY = 0;

      nodesData.forEach(d => {
        // HARD WALL (Left/Top) at 150px
        if (d.x < UNIFIED_PAD) d.x = UNIFIED_PAD;
        if (d.y < UNIFIED_PAD) d.y = UNIFIED_PAD;

        // Update DOM
        d.element.style.left = d.x + "px";
        d.element.style.top = d.y + "px";

        // Track Extents
        const w = d.element.offsetWidth || 220;
        const h = d.element.offsetHeight || 300;
        if ((d.x + w) > maxX) maxX = d.x + w;
        if ((d.y + h) > maxY) maxY = d.y + h;

        // --- CRITICAL: UPDATE MEMORY ON TICK ---
        // This ensures that if we save at any moment, we have the latest pos
        if (!savedNodePositions[d.id]) savedNodePositions[d.id] = {};
        savedNodePositions[d.id].x = d.x;
        savedNodePositions[d.id].y = d.y;
      });

      // Dynamic Resize
      const reqW = Math.max(300, maxX + UNIFIED_PAD);
      const reqH = Math.max(300, maxY + UNIFIED_PAD);
      const currentW = surface.offsetWidth;
      const currentH = surface.offsetHeight;

      if (Math.abs(reqW - currentW) > 10 || Math.abs(reqH - currentH) > 10) {
        surface.style.width = reqW + "px";
        surface.style.height = reqH + "px";

        const cvs = document.getElementById("canvas-layer");
        const svg = document.getElementById("svg-layer");
        const dpr = window.devicePixelRatio || 1;

        cvs.width = Math.floor(reqW * dpr);
        cvs.height = Math.floor(reqH * dpr);
        cvs.style.width = reqW + "px";
        cvs.style.height = reqH + "px";
        svg.style.height = reqH + "px";

        if (canvasCtx) {
          canvasCtx.setTransform(1, 0, 0, 1, 0, 0);
          canvasCtx.scale(dpr, dpr);
        }
      }

      requestAnimationFrame(redrawLinks);
    });

  // 3. DRAG BEHAVIOR
  let drag = d3.drag()
    .on("start", (event, d) => {
      if (!event.active) d3Simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on("drag", (event, d) => {
      // Constraint Logic
      applyDragConstraints(event, d, Infinity, Infinity, UNIFIED_PAD);

      d.element.style.left = d.fx + "px";
      d.element.style.top = d.fy + "px";

      requestAnimationFrame(redrawLinks);
    })
    .on("end", (event, d) => {
      if (!event.active) d3Simulation.alphaTarget(0);

      // --- CRITICAL: PIN & SAVE ON DRAG END ---
      if (!savedNodePositions[d.id]) savedNodePositions[d.id] = {};

      // Update memory with Fixed positions (pins the node)
      savedNodePositions[d.id] = { x: d.fx, y: d.fy, fx: d.fx, fy: d.fy };

      // Commit to LocalStorage
      saveCurrentStateToStorage();
    });

  d3.selectAll(".node:not(.dimmed)")
    .data(nodesData, function (d) { return d ? d.id : (this.dataset ? this.dataset.id : null); })
    .call(drag);
}

function stopFlexibleLayout() {
  if (d3Simulation) {
    d3Simulation.stop();
    d3Simulation.on("tick", null);
    d3Simulation = null;
  }
}

function getTimestamp() {
  const now = new Date();
  return now.toLocaleTimeString('en-US', { hour12: false });
}

function formatAge(epochMs) {
  const secs = Math.floor((Date.now() - epochMs) / 1000);
  if (secs < 60) return 'just now';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  return hrs + 'h ' + (mins % 60) + 'm ago';
}

function formatAgeLabel(epochMs) {
  const timeStr = new Date(epochMs).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  return timeStr + ' · ' + formatAge(epochMs);
}

// --- GLOBAL COPY HANDLER ---
function handleCopy(text, btnId) {
  if (!text) { alert("No configuration to copy."); return; }

  const btn = document.getElementById(btnId);
  const wrapper = btn ? btn.closest('.split-btn') : null;

  // 1. Visual Feedback helper
  const doFeedback = () => {
    if (!btn) return;
    const originalLabel = btn.innerText;
    btn.innerText = "Copied";
    if (wrapper) wrapper.style.background = "#3b82f6";
    setTimeout(() => {
      btn.innerText = originalLabel;
      if (wrapper) {
        const isReady = (btnId === "btnDevice") ? !!currentDeviceConfig :
          (btnId === "btnLeft") ? !!currentLeftConfig : !!currentRightConfig;
        wrapper.style.background = isReady ? "#10b981" : "#f59e0b";
      }
    }, 2000);
  };

  // 2. Perform Copy — navigator.clipboard primary, execCommand fallback
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
      alert("Copy failed. Please select and copy manually.");
    });
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0;user-select:text;-webkit-user-select:text;";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); doFeedback(); } catch(e) { alert("Copy failed."); }
    document.body.removeChild(ta);
  }
}

/**
* Displays the hovering tooltip.
* STRICT SYNC: Uses backend 'details.peerDev' to ensure Tooltip matches Config exactly.
*/
function showTooltip(e, portId, peerId) {
  let myData = allNodesData[portId];
  if (!myData) return;

  // --- 1. FORCE LOGICAL SYNC (The Fix) ---
  // The backend config generator uses 'details.peerDev' & 'details.peerPort'.
  // We MUST use the exact same data source to prevent discrepancies.
  // This overrides the visual 'peerId' derived from the line hover.
  if (myData.details && myData.details.peerDev && myData.details.peerPort) {
    const logicalPeerId = myData.details.peerDev + ":" + myData.details.peerPort;

    // Only use it if that node actually exists in our current dataset
    if (allNodesData[logicalPeerId]) {
      peerId = logicalPeerId;
    }
  }
  // ---------------------------------------

  let peerData = peerId ? allNodesData[peerId] : null;

  // Callback to re-run tooltip if config finishes loading while hovering
  const refreshCallback = () => {
    if (activeTooltipPortId === portId) showTooltip(null, portId, peerId);
  };

  // --- 1. CONFIG FETCH LOGIC ---
  const _isNonEos = d => allDevicesData[d] && allDevicesData[d].type === 'non-arista';
  if (!myData.details.configLoaded && !_isNonEos(myData.device)) {
    if (configCache[myData.device]) {
      processDeviceConfig(myData.device, configCache[myData.device].data);
    } else {
      fetchFullConfig(myData.device, refreshCallback);
    }
  }

  if (peerData && !peerData.details.configLoaded && !_isNonEos(peerData.device)) {
    if (configCache[peerData.device]) {
      processDeviceConfig(peerData.device, configCache[peerData.device].data);
    } else {
      fetchFullConfig(peerData.device, refreshCallback);
    }
  }

  let myDev = allDevicesData[myData.device];
  let peerDev = peerData ? allDevicesData[peerData.device] : null;

  let myIdx = (myDev && myDev.sheetIndex) ? myDev.sheetIndex : "-";
  let peerIdx = (peerDev && peerDev.sheetIndex) ? peerDev.sheetIndex : "-";

  // --- 2. UI HELPER: HEADER BOXES ---
  const buildBox = (idx, dev, port, isDim) => {
    if (isDim) return `<div class="tt-dev-box" style="color:#94a3b8; font-style:italic">Disconnected</div>`;
    return `<div class="tt-dev-box">
<div><span class="tt-dev-idx">[${idx}]</span>${escapeHtml(dev)}</div>
<div class="tt-port-name">${escapeHtml(port)}</div>
</div>`;
  };

  // --- 3. BUILD LEFT PANE: ATTRIBUTE GRID ---
  let html = `<div class="tt-left-pane">
<div class="tt-header">
${buildBox(myIdx, myData.device, escapeHtml(myData.name), false)}
<div class="tt-arrow">↔</div>
${peerData ? buildBox(peerIdx, peerData.device, peerData.name, false) : buildBox(0, 0, 0, true)}
</div>
<div class="tt-body">`;

  // Iterate through schema and compare values; skip rows where both sides are empty
  globalSchema.filter(item => item.key !== 'int').forEach(item => {
    let key = item.key + "_";
    let raw1 = (myData.details[key] || "").trim();
    let raw2 = peerData ? ((peerData.details[key] || "").trim()) : "";

    // Skip row if both sides are blank — avoids noise for unconfigured attributes
    if (!raw1 && !raw2) return;

    let v1 = raw1 || "-";
    let v2 = raw2 || (peerData ? "-" : "");

    let s1 = String(v1).trim().toLowerCase();
    let s2 = String(v2).trim().toLowerCase();

    // A. Basic String Diff (Ignores diffs if one side is effectively empty)
    let isDiff = (peerData && s1 !== s2 && s1 !== '-' && s2 !== '-' && s1 !== "" && s2 !== "");

    // B. Smart VLAN Diff (If basic diff found, check if values are logically identical)
    if (isDiff && item.key === 'vlan') {
      const set1 = parseVlanInput(s1);
      const set2 = parseVlanInput(s2);

      // If both sets have the same numbers, it's NOT a real mismatch
      if (set1.size === set2.size && [...set1].every(v => set2.has(v))) {
        isDiff = false;
      }
    }

    let rowClass = isDiff ? "tt-row-label tt-diff-row" : "tt-row-label";
    let valClass = isDiff ? "tt-val tt-diff-row" : "tt-val";

    html += `
<div class="${valClass} local">${escapeHtml(v1)}</div>
<div class="${rowClass}">${escapeHtml(item.label)}</div>
<div class="${valClass} peer">${escapeHtml(v2)}</div>`;
  });

  html += `</div></div>`;

  // --- 4. BUILD RIGHT PANE: CONFIG SNIPPETS ---
  let localCfg = myData.details.config || "Loading...";
  let peerCfg = peerData ? (peerData.details.config || "Loading...") : "";

  html += `<div class="tt-right-pane">
<div class="tt-config-header">
${buildBox(myIdx, myData.device, escapeHtml(myData.name), false)}
<div class="tt-arrow">↔</div>
${peerData ? buildBox(peerIdx, peerData.device, peerData.name, false) : `<div class="tt-dev-box" style="color:#94a3b8; font-style:italic">Peer Config</div>`}
</div>
<div class="tt-config-body">
<div class="tt-config-col local">${escapeHtml(localCfg)}</div>
<div class="tt-config-col peer">${escapeHtml(peerCfg)}</div>
</div>
</div>`;

  // --- 5. RENDER TO DOM ---
  let tooltip = document.getElementById("tooltip");
  tooltip.innerHTML = html;
  tooltip.style.display = "flex";

  if (e) moveTooltip(e);
}

function moveTooltip(e) {
  let tt = document.getElementById("tooltip");

  // 1. SAFETY: Stop if tooltip is hidden or doesn't exist
  if (!tt || tt.style.display === 'none' || tt.style.display === '') return;

  // 2. GHOST EFFECT: Only dim if movement is significant (> 5px)
  // This prevents the "flicker" when the mouse is barely moving.
  if (Math.abs(e.movementX) > 5 || Math.abs(e.movementY) > 5) {
    tt.classList.add("is-moving");
  }

  // 3. DEBOUNCE: Remove ghost effect after stopping
  if (tooltipTimer) clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => {
    tt.classList.remove("is-moving");
  }, 100);

  // 4. POSITIONING — right of cursor, vertically centered; flip left if near right edge
  let w = tt.offsetWidth, h = tt.offsetHeight;
  let winW = window.innerWidth, winH = window.innerHeight;
  let gap = 18;
  let x = e.clientX + gap;
  let y = e.clientY - Math.round(h / 2); // vertically centered on cursor

  // Flip left if tooltip would overflow right edge
  if (x + w > winW - 10) x = e.clientX - w - gap;
  // Clamp left edge
  if (x < 10) x = 10;
  // Clamp vertical
  if (y < 10) y = 10;
  if (y + h > winH - 10) y = winH - h - 10;

  tt.style.left = x + "px";
  tt.style.top = y + "px";
}

// --- 1. GLOBAL LISTENER: Tracks mouse everywhere to ensure smooth transparency ---
document.addEventListener('mousemove', function (e) {
  lastMouseEvent = e;
  // Only run if the tooltip exists
  const tt = document.getElementById("tooltip");
  if (tt && tt.style.display !== 'none' && tt.style.display !== '') {
    moveTooltip(e);
  }
});

function scheduleTooltip(e, portId, peerId) {
  if (tooltipShowTimer) { clearTimeout(tooltipShowTimer); tooltipShowTimer = null; }
  tooltipShowTimer = setTimeout(function() {
    tooltipShowTimer = null;
    showTooltip(lastMouseEvent || e, portId, peerId);
  }, 350);
}

function cancelTooltip() {
  if (tooltipShowTimer) { clearTimeout(tooltipShowTimer); tooltipShowTimer = null; }
}

function hideTooltip() {
  activeTooltipPortId = null;
  document.getElementById("tooltip").style.display = "none";
}

function updateNodeStats(nodeEl, filteredCount) {
  let headerStats = nodeEl.querySelector(".node-header-stats");
  if (!headerStats) return;
  let totalPorts = parseInt(headerStats.getAttribute("data-tot") || 0);
  let connPorts = parseInt(headerStats.getAttribute("data-con") || 0);
  let discPorts = parseInt(headerStats.getAttribute("data-dis") || 0);
  headerStats.innerHTML = "Tot:" + totalPorts + " | <span style='color:#4ade80'>Con:" + connPorts + "</span> | <span style='color:#f87171'>Dis:" + discPorts + "</span> | <span style='color:#fbbf24'>Flt:" + filteredCount + "</span>";
}

function captureCameraState() {
  if (!preSearchCameraState) {
    preSearchCameraState = { x: panX, y: panY, z: zoomLevel };
  }
}

function restoreCameraState() {
  if (preSearchCameraState) {
    panX = preSearchCameraState.x;
    panY = preSearchCameraState.y;
    zoomLevel = preSearchCameraState.z;

    let surface = document.getElementById("canvas-surface");
    if (surface) surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    updateTransform();

    preSearchCameraState = null; // Wipe memory after restoring
  }
}

function filterTopology() {
  // --- [FIX 1] CLEAR GHOST ARTIFACTS ---
  // This wipes the blue SVG layer immediately so it doesn't get stuck
  clearInteractionSVG();
  selectedLineId = null; // Deselect active lines to prevent ghosting
  hoveredLink = null;
  // -------------------------------------

  let input = document.getElementById("searchInp").value.toLowerCase().trim();
  let isStrict = document.getElementById("strictSearch").checked;

  const searchContainer = document.getElementById("searchInp")?.closest('.search-container');

  // === VLAN TRACE MODE: input is "v" + digits (e.g. v10, v10,20, v10-20) ===
  const vlanTraceMatch = input.match(/^v([\d,\-\s]+)$/i);
  if (vlanTraceMatch) {
    // Reset filter state so all nodes are visible for tracing
    document.querySelectorAll(".node").forEach(n => { n.classList.remove("dimmed"); if (!hiddenDevices.has(n.dataset.id)) n.style.display = ""; });
    document.querySelectorAll(".port-row").forEach(p => p.classList.remove("hidden-global"));
    searchActiveLinks.clear();
    traceVlan(vlanTraceMatch[1].trim());
    const st = document.getElementById("status");
    setStatus(`Tracing VLAN ${vlanTraceMatch[1].trim()}`);
    return;
  }

  // === FILTER MODE: clear any active trace before filtering ===
  searchContainer?.classList.remove('search-matched');
  clearVlanTrace();

  // 1. RESET STATE IF EMPTY
  if (!input) {
    searchContainer?.classList.remove('search-matched');
    restoreCameraState();
    document.querySelectorAll(".node").forEach(n => { n.classList.remove("dimmed"); if (!hiddenDevices.has(n.dataset.id)) n.style.display = ""; });
    document.querySelectorAll(".port-row").forEach(p => { p.classList.remove("hidden-global"); });
    searchActiveLinks.clear();
    requestAnimationFrame(redrawLinks);
    return;
  } else {
    captureCameraState();
  }

  // 2. PREPARE SEARCH TERMS
  let rawTerms = input.split(",").map(t => t.trim()).filter(t => t !== "");
  let searchPatterns = rawTerms.map(term => {
    if (isStrict) {
      let safeTerm = escapeRegExp(term);
      return new RegExp("(?:^|\\s|\\/|:)" + safeTerm + "(?:$|\\s|\\/|:)", "i");
    } else {
      return term;
    }
  });

  // 3. FILTER NODES & PORTS
  let nodes = document.querySelectorAll(".node");
  let visibleMaxY = 0;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let hasMatch = false;
  let deviceMatchCount = 0;
  let matchedPortIds = new Set();

  nodes.forEach(function (n) {
    let deviceName = (n.querySelector(".node-header-title")?.innerText || "").toLowerCase();
    const deviceRoles = n.dataset.roles || "";
    const intVlans = deviceInternalVlans[n.dataset.id?.toLowerCase()] || [];

    // Check if Device Name, Role, or internal VLAN matches
    let deviceMatch = rawTerms.some(t => {
      if (isStrict) return deviceName === t;
      if (deviceName.includes(t) || deviceRoles.includes(t)) return true;
      const tNum = parseInt(t);
      return !isNaN(tNum) && intVlans.includes(tNum);
    });

    let hasVisiblePorts = false;
    let ports = n.querySelectorAll(".port-row");
    let matchCount = 0;

    ports.forEach(function (p) {
      p.classList.remove("hidden-global");

      let fullPortId = p.dataset.portId;
      let portData = allNodesData[fullPortId];

      if (!portData || !portData.details) return;

      let d = portData.details;

      // SEARCHABLE TEXT (Includes Config/IPs)
      let rowText = [
        portData.name,
        d.vlan_, d.et_speed_, d.xcvr_speed_, d.desc_,
        d.ip_type_, d.sp_mode_, d.vrf_,
        d.po_,
        d.config || ""
      ].join(" ").toLowerCase();

      let isPortMatch = false;

      if (deviceMatch) {
        isPortMatch = true;
      } else {
        isPortMatch = searchPatterns.some(pattern => {
          if (isStrict) return pattern.test(rowText);
          return rowText.includes(pattern);
        });
      }

      if (isPortMatch) {
        hasVisiblePorts = true;
        matchCount++;
        matchedPortIds.add(fullPortId);
      } else {
        p.classList.add("hidden-global");
      }
    });

    updateNodeStats(n, matchCount);

    if (deviceMatch || hasVisiblePorts) {
      if (hiddenDevices.has(n.dataset.id)) {
        n.style.display = "none";
      } else {
        n.classList.remove("dimmed");
        n.style.display = "";

        // Bounding Box Logic
        let nodeTop = parseInt(n.style.top || 0);
        let nodeLeft = parseInt(n.style.left || 0);
        let nodeWidth = n.offsetWidth;
        let nodeHeight = n.offsetHeight;

        if ((nodeTop + nodeHeight) > visibleMaxY) visibleMaxY = nodeTop + nodeHeight;

        hasMatch = true;
        deviceMatchCount++;
        if (nodeLeft < minX) minX = nodeLeft;
        if (nodeTop < minY) minY = nodeTop;
        if (nodeLeft + nodeWidth > maxX) maxX = nodeLeft + nodeWidth;
        if (nodeTop + nodeHeight > maxY) maxY = nodeTop + nodeHeight;
      }
    } else {
      n.classList.add("dimmed");
      n.style.display = "none";
    }
  });

  // 4. FILTER LINKS & RESIZE
  searchActiveLinks.clear();
  globalLinks.forEach(function (link) {
    if (matchedPortIds.has(link.u) && matchedPortIds.has(link.v)) {
      searchActiveLinks.add(link.id);
    }
  });

  let surface = document.getElementById("canvas-surface");
  let finalH = Math.max(900, visibleMaxY + 200);
  surface.style.height = finalH + "px";
  let cvs = document.getElementById("canvas-layer");
  let svg = document.getElementById("svg-layer");
  let dpr = window.devicePixelRatio || 1;

  if (cvs.height !== Math.floor(finalH * dpr)) {
    cvs.height = Math.floor(finalH * dpr);
    cvs.style.height = finalH + "px";
    svg.style.height = finalH + "px";
    if (canvasCtx) canvasCtx.scale(dpr, dpr);
  }

  requestAnimationFrame(redrawLinks);

  // 5. UPDATE VIEW & STATUS
  searchContainer?.classList.toggle('search-matched', hasMatch);

  if (hasMatch && minX !== Infinity) {
    setTimeout(() => {
      focusView(minX, minY, maxX - minX, maxY - minY);
      requestAnimationFrame(redrawLinks);
    }, 50);

    let st = document.getElementById("status");
    if (st) {
      const portCount = matchedPortIds.size;
      setStatus(deviceMatchCount + " device" + (deviceMatchCount !== 1 ? "s" : "") + " · " + portCount + " port" + (portCount !== 1 ? "s" : ""));
    }
  } else if (!hasMatch && input !== "") {
    let st = document.getElementById("status");
    if (st) {
      setStatus("No matches found for '" + input + "'", "status-error");
    }

    zoomLevel = 1;
    panX = 0;
    panY = 0;
    updateTransform();

  } else {
    let st = document.getElementById("status");
    if (st) {
      setStatus(getReadyStatus());
    }
  }
}

function focusView(x, y, w, h) {
  let vp = document.getElementById("viewport");
  let surface = document.getElementById("canvas-surface");
  let vpW = vp.clientWidth;
  let vpH = vp.clientHeight;

  // 1. Padding (Keep results away from the edges)
  let padding = 100;

  // 2. Calculate Required Scale to fit content
  // Prevent division by zero if width/height is 0 (single node)
  let contentW = w || 300;
  let contentH = h || 300;

  let scaleX = (vpW - (padding * 2)) / contentW;
  let scaleY = (vpH - (padding * 2)) / contentH;

  // Fit to screen (Keep aspect ratio)
  let newScale = Math.min(scaleX, scaleY);

  // 3. Clamp Zoom Levels
  // Max 1.2 (Don't get too close), Min 0.2 (Don't get too far)
  if (newScale > 1.2) newScale = 1.2;
  if (newScale < 0.2) newScale = 0.2;

  // 4. Calculate Center of Content
  let centerX = x + (w / 2);
  let centerY = y + (h / 2);

  // 5. Calculate Pan to Center content in Viewport
  // Formula: Pan = (ScreenCenter) - (ContentCenter * Scale)
  let newPanX = (vpW / 2) - (centerX * newScale);
  let newPanY = (vpH / 2) - (centerY * newScale);

  // 6. Apply Immediately
  zoomLevel = newScale;
  panX = newPanX;
  panY = newPanY;

  // Remove transition momentarily for snap-to-view feel, then restore
  surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
  updateTransform();
}


function filterDevicePorts(inp, deviceId) {
  let term = inp.value.toLowerCase();
  deviceSearchTerms[deviceId] = term;
  let header = inp.parentNode;
  let node = header.parentNode;
  let ports = node.querySelectorAll(".port-row");
  let matchCount = 0;
  ports.forEach(function (p) {
    if (term === "") { p.classList.remove("hidden-local"); matchCount++; } else {
      let rowText = p.innerText;
      if (checkSearchMatch(rowText, term)) { p.classList.remove("hidden-local"); matchCount++; } else { p.classList.add("hidden-local"); }
    }
  });
  updateNodeStats(node, (term === "") ? 0 : matchCount);
  requestAnimationFrame(redrawLinks);
}

function getVlanColor(vlanId) {
  if (!vlanColorCache[vlanId]) {
    let h;
    const num = parseInt(vlanId);

    if (!isNaN(num)) {
      // STRATEGY A: Numeric VLANs (10, 20, 999)
      // Use Golden Angle (approx 137.5 degrees)
      // This ensures adjacent or similar numbers have vastly different colors
      // e.g. 10=Green, 11=Pink, 12=Blue
      h = Math.floor((num * 137.508) % 360);
    } else {
      // STRATEGY B: Non-Numeric (Mgmt, etc) -> String Hash
      let str = String(vlanId);
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      h = Math.abs(hash % 360);
    }

    // Style: High Saturation (85%) + Darker Lightness (45%) for good contrast against white
    vlanColorCache[vlanId] = `hsl(${h}, 85%, 40%)`;
  }
  return vlanColorCache[vlanId];
}

function parseVlanInput(input) {
  let vlanSet = new Set();
  if (!input) return vlanSet;

  // TWEAK: Replace spaces with commas to allow "10 20" format
  let cleanInput = input.replace(/\s+/g, ",").replace(/[^0-9,\-]/g, "");

  let parts = cleanInput.split(",");
  parts.forEach(function (part) {
    part = part.trim();

    // Check for Range (10-20)
    if (part.includes("-")) {
      let range = part.split("-");
      if (range.length === 2 && range[0] !== "" && range[1] !== "") {
        let start = parseInt(range[0]);
        let end = parseInt(range[1]);
        if (!isNaN(start) && !isNaN(end)) {
          let low = Math.min(start, end);
          let high = Math.max(start, end);
          if ((high - low) < 1000) {
            for (let i = low; i <= high; i++) vlanSet.add(i.toString());
          }
        }
      }
    }
    // Check for Single Number
    else {
      if (part !== "" && !isNaN(part)) {
        vlanSet.add(part);
      }
    }
  });
  return vlanSet;
}


// Parses a vlan_ field value that may contain an 'nv<N>' native-VLAN token.
// DUPLICATED in Code.gs — last synced: 2026-04-20
// Returns { native: string|null, vlans: string } where:
//   native = the native VLAN number as a string (e.g. "100"), or null if absent
//   vlans  = the remaining VLAN string with the nv token removed (e.g. "10,20")
function parseVlanWithNative(str) {
  var s = String(str || '').trim();
  if (!s) return { native: null, vlans: '' };
  var native = null;
  var rest = [];
  s.split(',').forEach(function(p) {
    var t = p.trim();
    var m = t.match(/^nv(\d+)$/i);
    if (m && !native) {
      native = m[1];
    } else if (t) {
      rest.push(t);
    }
  });
  return { native: native, vlans: rest.join(',') };
}

// vlanStr: digit string e.g. "10" or "10,20" or "10-20". Omit to read from vlanTraceInp.
function traceVlan(vlanStr) {
  const inputEl = document.getElementById("vlanTraceInp");
  const traceContainer = inputEl?.closest('.trace-container');
  const inputVal = (vlanStr !== undefined) ? String(vlanStr).trim() : (inputEl?.value || "");

  // --- Input validation & container styling ---
  const invalidChars = /[^0-9,\-\s]/;
  if (inputEl) {
    if (inputVal && invalidChars.test(inputVal)) {
      traceContainer?.classList.add('trace-error');
      traceContainer?.classList.remove('trace-active');
    } else if (inputVal) {
      traceContainer?.classList.add('trace-active');
      traceContainer?.classList.remove('trace-error');
    } else {
      traceContainer?.classList.remove('trace-active', 'trace-error');
    }
  }

  let nodes = document.querySelectorAll(".node");
  let ports = document.querySelectorAll(".port-row");

  activeLinkColors = {};
  vlanColorCache = {};
  let activeVlanData = {};

  const searchContainer = document.getElementById("searchInp")?.closest('.search-container');

  // Reset View if empty
  if (!inputVal) {
    searchContainer?.classList.remove('search-matched');
    restoreCameraState();
    nodes.forEach(n => { n.classList.remove("trace-hidden"); });
    ports.forEach(p => {
      p.classList.remove("trace-hidden", "trace-active-port");
      p.style.backgroundColor = "";
      p.style.borderLeftColor = "";
      let dot = p.querySelector(".dot");
      if (dot) { dot.style.backgroundColor = ""; dot.style.boxShadow = ""; }
    });
    updateVlanLegend({});
    requestAnimationFrame(redrawLinks);
    return;
  } else {
    captureCameraState();
  }

  let targetVlans = parseVlanInput(inputVal);
  let validPortIds = new Set();
  let activeDeviceIds = new Set();
  let portColors = {};

  // 2. Identify Matches
  for (let pid in allNodesData) {
    let data = allNodesData[pid];
    let matchedVlan = getMatchingVlan(data, targetVlans);
    let elObj = globalPortElements[pid];

    if (matchedVlan) {
      validPortIds.add(pid);
      activeDeviceIds.add(data.device);

      let color = getVlanColor(matchedVlan);
      portColors[pid] = color;

      // NEW: Collect for Legend
      activeVlanData[matchedVlan] = color;

      if (elObj && elObj.row) {
        let row = elObj.row;
        row.classList.remove("trace-hidden");
        row.classList.add("trace-active-port");
        row.style.borderLeftColor = color;
        row.style.backgroundColor = "var(--success-bg)";
        let dot = row.querySelector(".dot");
        if (dot) {
          dot.style.backgroundColor = color;
          dot.style.boxShadow = "0 0 4px " + color;
        }
      }
    } else {
      if (elObj && elObj.row) {
        elObj.row.classList.remove("trace-active-port");
        elObj.row.classList.add("trace-hidden");
      }
    }
  }

  // 3. Update Links & Inject Non-Arista Devices
  globalLinks.forEach(function(link) {
    let uData = allNodesData[link.u];
    let vData = allNodesData[link.v];
    if (!uData || !vData) return;

    let uMatch = validPortIds.has(link.u);
    let vMatch = validPortIds.has(link.v);

    let devA = allDevicesData[uData.device];
    let devB = allDevicesData[vData.device];
    let uIsNonArista = devA && devA.type === 'non-arista';
    let vIsNonArista = devB && devB.type === 'non-arista';

    // 🛑 FIX: Trace through to Non-Arista devices
    if ((uMatch && vMatch) || (uMatch && vIsNonArista) || (vMatch && uIsNonArista)) {
      let sourceMatch = uMatch ? link.u : link.v;
      let linkColor = portColors[sourceMatch] || "#999";
      activeLinkColors[link.id] = linkColor;

      // Wake up BOTH devices connected to this link
      activeDeviceIds.add(uData.device);
      activeDeviceIds.add(vData.device);

      // Visually highlight the Non-Arista Port to complete the path
      let nonAristaPort = null;
      if (uMatch && vIsNonArista) nonAristaPort = link.v;
      if (vMatch && uIsNonArista) nonAristaPort = link.u;

      if (nonAristaPort && !validPortIds.has(nonAristaPort)) {
         validPortIds.add(nonAristaPort);
         portColors[nonAristaPort] = linkColor;

         let elObj = globalPortElements[nonAristaPort];
         if (elObj && elObj.row) {
             elObj.row.classList.remove("trace-hidden");
             elObj.row.classList.add("trace-active-port");
             elObj.row.style.borderLeftColor = linkColor;
             elObj.row.style.backgroundColor = "var(--success-bg)";
             let dot = elObj.row.querySelector(".dot");
             if(dot) { dot.style.backgroundColor = linkColor; dot.style.boxShadow = "0 0 4px " + linkColor; }
         }
      }
    }
  });

  // 4. Update Nodes & Calculate Auto-Focus
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let hasMatch = false;

  nodes.forEach(function(n) {
    let devId = n.dataset.id;
    if (activeDeviceIds.has(devId)) {
      n.classList.remove("trace-hidden");
      const x = n.offsetLeft;
      const y = n.offsetTop;
      const w = n.offsetWidth;
      const h = n.offsetHeight;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x + w > maxX) maxX = x + w;
      if (y + h > maxY) maxY = y + h;
      hasMatch = true;
    } else {
      n.classList.add("trace-hidden");
    }
  });

  // 5. RENDER LEGEND & VIEW
  updateVlanLegend(activeVlanData);

  // Annotate internal VLANs — show which devices have the traced VLAN as EOS-allocated
  (function() {
    const legend = document.getElementById('vlan-legend');
    if (!legend || !Object.keys(deviceInternalVlans).length) return;
    const intAnnotations = [];
    targetVlans.forEach(vid => {
      const vidN = parseInt(vid);
      if (isNaN(vidN)) return;
      const onDevices = Object.entries(deviceInternalVlans)
        .filter(([, vlans]) => vlans.includes(vidN))
        .map(([devId]) => devId);
      if (onDevices.length) intAnnotations.push({ vid: vidN, onDevices });
    });
    if (intAnnotations.length) {
      let html = intAnnotations.map(({ vid, onDevices }) =>
        `<div class="legend-internal-note">VLAN ${vid} — EOS internal on:<br>${onDevices.join(', ')}</div>`
      ).join('');
      legend.innerHTML += html;
      legend.classList.add('visible');
    }
  })();

  requestAnimationFrame(redrawLinks);

  // Green only when VLAN is actually found in topology
  searchContainer?.classList.toggle('search-matched', hasMatch);

  if (hasMatch && minX !== Infinity) {
    focusView(minX, minY, maxX - minX, maxY - minY);
  }
}

function getMatchingVlan(portData, vlanSet) {
  if (!portData || !portData.details) return null;
  let d = portData.details;

  // Helper to check set existence with string conversion
  const check = (val) => {
    if (val === undefined || val === null || val === "") return false;
    return vlanSet.has(String(val).trim());
  };

  // 1. Check Native VLAN (encoded as nv<N> token in vlan_)
  const _pvVlan = parseVlanWithNative(d.vlan_);
  if (_pvVlan.native && check(_pvVlan.native)) return _pvVlan.native;

  // 2. Check Sub-interface (e.g., Et1.10)
  if (portData.name.includes(".")) {
    let sub = portData.name.split(".")[1];
    if (check(sub)) return sub;
  }

  let mode = (d.sp_mode_ || "").toLowerCase(); // Note: underscore
  let isTrunk = mode.includes("trunk");

  // 3. Check Access VLAN
  if (!isTrunk) {
    if (check(d.vlan_)) return String(d.vlan_);
  }

  // 4. Check Trunk Allowed VLANs
  if (isTrunk) {
    // If VLAN is empty OR explicitly says "all" or "1-4094"
    const vVal = String(d.vlan_ || "").toLowerCase();
    if (!vVal || vVal === "all" || vVal.includes("1-4094")) {
      const first = vlanSet.values().next().value;
      return first !== undefined ? first : null;
    }

    // Check list: "10, 20, 30"
    let allowed = String(d.vlan_).split(",").map(s => s.trim());
    for (let i = 0; i < allowed.length; i++) {
      if (vlanSet.has(allowed[i])) return allowed[i];
    }
  }
  return null;
}

/**
* REUSABLE HELPER: Zooms and Pans the camera to fit all visible nodes.
* UPDATED: Now handles both Detailed (HTML) and Holistic (SVG) centering correctly.
*/
function zoomToFit() {
  const surface = document.getElementById("canvas-surface");
  if (!surface) return;

  // 1. Enable smooth transition for the "Slide" effect
  surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";

  // 2. Identify which mode we are in and gather nodes
  const htmlNodes = document.querySelectorAll(".node:not(.dimmed)");
  const svgNodes = document.querySelectorAll(".node-circle");

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let hasContent = false;

  // CASE A: Detailed View (HTML Cards)
  if (htmlNodes.length > 0 && document.getElementById("nodes-layer").innerHTML !== "") {
    htmlNodes.forEach(n => {
      hasContent = true;
      const x = n.offsetLeft;
      const y = n.offsetTop;
      const w = n.offsetWidth;
      const h = n.offsetHeight;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x + w > maxX) maxX = x + w;
      if (y + h > maxY) maxY = y + h;
    });
  }
  // CASE B: Holistic View (SVG Circles)
  else if (svgNodes.length > 0) {
    svgNodes.forEach(n => {
      // D3 binds position data to the DOM element's __data__ property
      const d = n.__data__;
      if (d) {
        hasContent = true;
        const r = 40; // Radius + Padding
        if (d.x - r < minX) minX = d.x - r;
        if (d.y - r < minY) minY = d.y - r;
        if (d.x + r > maxX) maxX = d.x + r;
        if (d.y + r > maxY) maxY = d.y + r;
      }
    });
  }

  // 3. Apply Focus
  if (hasContent && minX !== Infinity) {
    // Add some padding to the calculation so nodes aren't touching the screen edge
    const w = maxX - minX;
    const h = maxY - minY;

    // Use your existing focusView helper to calculate center
    focusView(minX, minY, w, h);
  }
  else {
    // Fallback: Reset to origin
    zoomLevel = 1;
    panX = 0;
    panY = 0;
    updateTransform();
  }
}

/**
* Updates a button's visual state based on whether data is "Dirty" (Changed).
*/
// Reads the button's own text on first call (strips any trailing " *") so the
// label never needs to be hardcoded at each call site — rename the HTML and it follows.
function updateDirtyButton(btnSelector, isDirty) {
  const btn = document.querySelector(btnSelector);
  if (!btn) return;
  if (!btn.dataset.cleanLabel) btn.dataset.cleanLabel = btn.innerText.replace(/ \*$/, '').trim();
  const label = btn.dataset.cleanLabel;
  if (isDirty) {
    btn.innerText = label + " *";
    btn.style.background = "#f59e0b";
  } else {
    btn.innerText = label;
    btn.style.background = "#10b981";
  }
}

const TECH_COMPAT = {
  // IPv4 only — no IPv6 on P2P links
  ipv4:          new Set(['chkBgpIpv4',
                          'chkOspfIpv4',
                          'chkVxlanIpv4',

                          'chkEvpnIpv6']),
  // IPv6 unnumbered only — no IPv4, no explicit IPv6 addresses
  ipv6unnum:     new Set(['chkBgpIpv6Unnum','chkBgpRfc5549',
                          'chkOspfIpv6','chkOspfIpv6Unnum',
                          'chkVxlanIpv6',
                          'chkEvpnIpv6']),
  // IPv4 + IPv6 explicit
  ipv4ipv6:      new Set(['chkBgpIpv4','chkBgpIpv6','chkBgpRfc5549',
                          'chkOspfIpv4','chkOspfIpv6',
                          'chkVxlanIpv4','chkVxlanIpv6',
                          'chkEvpnIpv4','chkEvpnIpv6']),
  // IPv4 + IPv6 unnumbered
  ipv4ipv6unnum: new Set(['chkBgpIpv4','chkBgpIpv6Unnum','chkBgpRfc5549',
                          'chkOspfIpv4','chkOspfIpv6Unnum',
                          'chkVxlanIpv4','chkVxlanIpv6',
                          'chkEvpnIpv4','chkEvpnIpv6'])
};
const TECH_ALL_CHKS = ['chkBgpIpv4','chkBgpIpv6','chkBgpIpv6Unnum','chkBgpRfc5549',
                       'chkOspfIpv4','chkOspfIpv6','chkOspfIpv6Unnum',
                       'chkVxlanIpv4','chkVxlanIpv6',

/* --- TECH CROSS-VALIDATION: returns array of error strings (empty = valid) --- */
function validateTechSettings() {
  const getChk = id => !!(document.getElementById(id) && document.getElementById(id).checked);
  const errors = [];

  // Rule 1: IPv6 GW needs at least one IPv6 routing protocol
  if (getChk('chkGwIpv6') &&
      !getChk('chkBgpIpv6') && !getChk('chkBgpRfc5549') && !getChk('chkBgpIpv6Unnum') &&
      !getChk('chkOspfIpv6') && !getChk('chkOspfIpv6Unnum') &&
      !getChk('chkEvpnIpv4') && !getChk('chkEvpnIpv6')) {
    errors.push("IPv6 GW requires an IPv6 routing protocol — enable BGP IPv6, RFC5549, BGP Unnum, OSPFv3, or EVPN.");
  }

  // Rule 2: VXLAN IPv4 VTEP needs IPv4 underlay reachability
  // (BGP Unnum and RFC5549 can carry ipv4 unicast AF even over IPv6 sessions)
  if (getChk('chkVxlanIpv4') &&
      !getChk('chkBgpIpv4') && !getChk('chkBgpIpv6Unnum') && !getChk('chkBgpRfc5549') &&
      !getChk('chkOspfIpv4')) {
    errors.push("VXLAN IPv4 VTEP requires an IPv4 routing protocol — enable BGP IPv4, RFC5549, BGP Unnum, or OSPFv2.");
  }

  // Rule 3: VXLAN IPv6 VTEP needs IPv6 underlay reachability
  if (getChk('chkVxlanIpv6') &&
      !getChk('chkBgpIpv6') && !getChk('chkBgpIpv6Unnum') && !getChk('chkBgpRfc5549') &&
      !getChk('chkOspfIpv6') && !getChk('chkOspfIpv6Unnum')) {
    errors.push("VXLAN IPv6 VTEP requires an IPv6 routing protocol — enable BGP IPv6, RFC5549, BGP Unnum, or OSPFv3.");
  }

  // Rule 4: EVPN is a BGP address-family — requires at least one BGP variant
  if ((getChk('chkEvpnIpv4') || getChk('chkEvpnIpv6')) &&
      !getChk('chkBgpIpv4') && !getChk('chkBgpIpv6') && !getChk('chkBgpIpv6Unnum') && !getChk('chkBgpRfc5549')) {
    errors.push("EVPN requires BGP — enable BGP IPv4, BGP IPv6, RFC5549, or BGP Unnumbered.");
  }

  return errors;
}

      const setChk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
      setChk('chkGwIpv4', settings.gw_ipv4 !== false);
      setChk('chkGwIpv6', settings.gw_ipv6);

      // 3. Set protocol checkboxes
      setChk('chkBgpIpv4',       settings.bgp_ipv4);
      setChk('chkBgpIpv6',       settings.bgp_ipv6);
      setChk('chkBgpIpv6Unnum',  settings.bgp_ipv6_unnum);
      setChk('chkBgpRfc5549',    settings.bgp_rfc5549);
      setChk('chkOspfIpv4',      settings.ospf_ipv4);
      setChk('chkOspfIpv6',      settings.ospf_ipv6);
      setChk('chkOspfIpv6Unnum', settings.ospf_ipv6_unnum);
      setChk('chkVxlanIpv4',     settings.vxlan_ipv4);
      setChk('chkVxlanIpv6',     settings.vxlan_ipv6);
      setChk('chkEvpnIpv4',      settings.evpn_ipv4);
      setChk('chkEvpnIpv6',      settings.evpn_ipv6);

      // 4. Apply compat filter (dims + unchecks options incompatible with P2P mode)
      applyTechCompat(p2pMode);

      // 5. Attach handlers: P2P radios update compat then dirty; checkboxes just dirty
      document.querySelectorAll('#techModal input[name="p2pMode"]').forEach(el => {
        el.onchange = function() { applyTechCompat(this.value); checkTechDirty(); };
      });
      document.querySelectorAll('#techModal input[type="checkbox"]').forEach(el => {
        el.onchange = checkTechDirty;
      });

      // 6. Capture initial state + run first validation
      initialTechState = getCurrentTechState();
      checkTechDirty();

      // 7. Show modal
      const overlay = document.getElementById('editOverlay');
      const modal   = document.getElementById('techModal');
      if (overlay) { overlay.style.display = 'block'; overlay.style.zIndex = '29999'; }
      if (modal)   { modal.style.display = 'flex';   modal.style.zIndex = '30000';
                     modal.style.opacity = '1'; modal.style.visibility = 'visible'; }
    })
    .withFailureHandler(err => {
      hideGlobalLoading();
      alert("Server Error: " + err.message);
    })
    .getNetworkSettings();
}

  };

      if (typeof configCache !== 'undefined') configCache = {};

      // 2. Invalidate Memory (Forces Lazy Load for others)
      if (typeof allDevicesData !== 'undefined') {

/**

  const dlg = document.createElement('div');
  dlg.style.cssText = [
    'position:fixed','inset:0','z-index:30000','display:flex',
    'align-items:center','justify-content:center',
    'background:rgba(15,23,42,0.55)'
  ].join(';');
  dlg.innerHTML = `

                max-height:90vh;display:flex;flex-direction:column;overflow:hidden;
                box-shadow:0 8px 32px rgba(0,0,0,.25);font-family:'JetBrains Mono',monospace">
      <div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:8px;flex-shrink:0;user-select:none">
        ${orphans.length} column(s) not in schema will be deleted
      </div>
      <div style="flex:1;overflow-y:auto;min-height:0">
        <div style="border:1px solid #e2e8f0;border-radius:4px;padding:5px 8px;margin-bottom:8px;background:#f8fafc">
          <ul style="margin:0 0 0 14px;padding:0;font-size:11px;list-style:disc">${items}</ul>
        </div>
        ${hasData ? `<div style="font-size:11px;color:#b45309;background:#fef3c7;
            border:1px solid #fcd34d;border-radius:4px;padding:6px 8px;margin-bottom:8px;user-select:none">
            Columns with data will be permanently lost.
          </div>` : ''}
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;margin-top:8px">
        <button id="_orphanCancel" style="font-family:'JetBrains Mono',monospace;font-size:12px;
          padding:6px 14px;border:1px solid #cbd5e1;border-radius:4px;background:#f8fafc;
