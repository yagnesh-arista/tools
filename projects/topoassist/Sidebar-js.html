// CONFIG AGE REFRESH
// =====================================================================

function refreshConfigAges() {
  const isGreen = w => w && w.style.display !== 'none' && w.dataset.splitState === 'ready';

  if (selectedDeviceId) {
    const dev = allDevicesData[selectedDeviceId];
    const wrapper = document.getElementById('splitDevice');
    if (dev && dev.fetchEpoch && isGreen(wrapper)) {
      const label = wrapper.querySelector('.split-label');
      const sheetId = dev.sheetIndex || '-';
      if (label) label.innerText = _buildSplitLabel(sheetId, selectedDeviceId, null, 'ready', formatAgeLabel(dev.fetchEpoch));
    }
  }

  if (selectedLineId && linkMap[selectedLineId]) {
    const link = linkMap[selectedLineId];
    [['splitLeft', link.u], ['splitRight', link.v]].forEach(([sid, portId]) => {
      const devName = portId.split(':')[0];
      const portName = portId.split(':')[1] || '';
      const dev = allDevicesData[devName];
      if (!dev || !dev.fetchEpoch) return;
      const wrapper = document.getElementById(sid);
      if (!isGreen(wrapper)) return;
      const label = wrapper.querySelector('.split-label');
      const sheetId = dev.sheetIndex || '-';
      if (label) label.innerText = _buildSplitLabel(sheetId, devName, portName, 'ready', formatAgeLabel(dev.fetchEpoch));
    });
  }
}

setInterval(refreshConfigAges, 30000);

// Poll for post-restore reload flag (set by restoreFromSnapshot in Code.gs).
// Fires every 5s; when flag is detected, clears configCache and reloads topology.
// The GAS modal dialog blocks the sidebar while open — this timer fires naturally
// once the modal closes, picking up the flag immediately after restore completes.
setInterval(function _checkRestoreReload() {
  google.script.run
    .withSuccessHandler(function(needed) {
      if (!needed) return;
      configCache = {};
      setStatus('Sheet restored — reloading topology…', 'status-info');
      fetchData(true);
    })
    .withFailureHandler(function() { /* silent — non-critical poll */ })
    .checkAndClearReloadFlag();
}, 5000);

let _vlanSortKey        = 'id';   // 'id' | 'type' | 'vrf' | 'ports'
let _vlanConflictsOnly  = false;

// Conflict = the SAME device has the VLAN both user-configured (ports[]) and EOS-internal (internalOn[])
function _vlanHasConflict(info) {
  const portDevs = new Set((info.ports || []).map(p => p.device));
  return (info.internalOn || []).some(d => portDevs.has(d));
}

function _updateVlanSortBtns() {
  ['Id', 'Type', 'Vrf', 'Ports'].forEach(k => {
    const btn = document.getElementById('vlanSort' + k);
    if (!btn) return;
    const active = _vlanSortKey === k.toLowerCase();
    btn.style.background   = active ? '#3b82f6' : 'var(--bg-body)';
    btn.style.color        = active ? '#ffffff'  : 'var(--text-muted)';
    btn.style.borderColor  = active ? '#3b82f6' : 'var(--border)';
  });
  const cb = document.getElementById('vlanConflictsOnlyBtn');
  if (cb) {
    cb.style.background  = _vlanConflictsOnly ? '#ef4444' : 'var(--bg-body)';
    cb.style.color       = _vlanConflictsOnly ? '#ffffff'  : 'var(--text-muted)';
    cb.style.borderColor = _vlanConflictsOnly ? '#ef4444' : 'var(--border)';
  }
}

function setVlanSort(key) {
  _vlanSortKey = key;
  _updateVlanSortBtns();
  filterVlanSummary();
}

function toggleVlanConflictsOnly() {
  _vlanConflictsOnly = !_vlanConflictsOnly;
  _updateVlanSortBtns();
  filterVlanSummary();
}

function _applyVlanFilterSort(sorted, vlanMap, q) {
  let result = sorted;
  if (q) {
    result = result.filter(vid =>
      vid.includes(q)
      || (vlanMap[vid].vrf || '').toLowerCase().includes(q)
      || vlanMap[vid].ports.some(p => p.device.toLowerCase().includes(q) || p.port.toLowerCase().includes(q))
      || (vlanMap[vid].internalOn || []).some(d => d.toLowerCase().includes(q)));
  }
  if (_vlanConflictsOnly) {
    result = result.filter(vid => _vlanHasConflict(vlanMap[vid]));
  }
  result = result.slice();
  if (_vlanSortKey === 'type') {
    result.sort((a, b) => (vlanMap[a].type || '').localeCompare(vlanMap[b].type || '') || parseInt(a) - parseInt(b));
  } else if (_vlanSortKey === 'vrf') {
    result.sort((a, b) => (vlanMap[a].vrf || '').localeCompare(vlanMap[b].vrf || '') || parseInt(a) - parseInt(b));
  } else if (_vlanSortKey === 'ports') {
    result.sort((a, b) => (vlanMap[b].ports.length - vlanMap[a].ports.length) || parseInt(a) - parseInt(b));
  } else {
    result.sort((a, b) => parseInt(a) - parseInt(b)); // 'id' (default)
  }
  return result;
}

function openVlanSummaryModal() {
  _autoMinimizeOpenModal();
  document.getElementById('vlanSummaryFilter').value = '';
  _vlanSortKey       = 'id';
  _vlanConflictsOnly = false;
  buildVlanSummary();
  _updateVlanSortBtns();
  document.getElementById('vlanSummaryModal').style.display = 'flex';
  setActiveModalChip('vlanSummaryModal');
}

function closeVlanSummaryModal() {
  _onModalClose(document.getElementById('vlanSummaryModal'));
  document.getElementById('vlanSummaryModal').style.display = 'none';
  document.getElementById('editOverlay').style.display = 'none';
}

function buildVlanSummary() {
  const vlanMap = {};
  // Pass 1: user-configured VLANs from topology port rows
  for (const pid in allNodesData) {
    const node = allNodesData[pid];
    if (!node || !node.details) continue;
    const d = node.details;
    const mode = (d.sp_mode_ || '').toLowerCase();
    const hasIp = (d.ipv4_ && d.ipv4_ !== '-') || (d.ipv6_ && d.ipv6_ !== '-');
    const type = (mode.includes('l3') || mode === 'routed' || hasIp || node.name.toLowerCase().startsWith('vlan'))
      ? 'L3' : 'L2';
    const vrf = (d.vrf_ || '').trim();
    const vlans = new Set();
    const _pvMap = parseVlanWithNative(d.vlan_);
    if (_pvMap.vlans) parseVlanInput(_pvMap.vlans).forEach(v => vlans.add(v));
    if (_pvMap.native) vlans.add(_pvMap.native);
    vlans.forEach(vid => {
      if (!vid) return;
      if (!vlanMap[vid]) vlanMap[vid] = { type, vrf, ports: [], internalOn: [] };
      if (type === 'L3') { vlanMap[vid].type = 'L3'; vlanMap[vid].vrf = vlanMap[vid].vrf || vrf; }
      vlanMap[vid].ports.push({ device: node.device, port: node.name });
    });
  }
  // Pass 1b: Vx1/VTEP VLANs — excluded from allNodesData; sourced from node.vtepVlans
  // Split by comma only — do NOT expand ranges (parseVlanInput would turn "1-4000" into 4000 entries).
  // Each comma-token (e.g. "1-4000", "10", "20-30") becomes one VLAN Summary row.
  if (currentData && currentData.nodes) {
    currentData.nodes.forEach(function(node) {
      if (!node.vtepVlans) return;
      node.vtepVlans.split(',').forEach(function(tok) {
        const vid = tok.trim();
        if (!vid) return;
        if (vlanMap[vid]) {
          // VLAN already present from regular ports — annotate as also VTEP
          if (!vlanMap[vid].vtepDevices) vlanMap[vid].vtepDevices = [];
          vlanMap[vid].vtepDevices.push(node.id);
        } else {
          vlanMap[vid] = { type: 'VTEP', vrf: '', ports: [], internalOn: [], vtepDevices: [node.id] };
        }
      });
    });
  }
  // Pass 2: EOS-internal VLANs from device bridge (deviceInternalVlans: devId → [N,...])
  Object.entries(deviceInternalVlans).forEach(function([devId, ivids]) {
    ivids.forEach(function(numVid) {
      const vid = String(numVid);
      if (vlanMap[vid]) {
        // VLAN is both user-configured and EOS-internal on this device — flag conflict
        if (!vlanMap[vid].internalOn) vlanMap[vid].internalOn = [];
        vlanMap[vid].internalOn.push(devId);
      } else {
        vlanMap[vid] = { type: 'INT', vrf: '', ports: [], internalOn: [devId] };
      }
    });
  });
  const sorted = Object.keys(vlanMap).sort((a, b) => parseInt(a) - parseInt(b));
  window._vlanSummaryData = { vlanMap, sorted };
  renderVlanSummaryTable(sorted, vlanMap);
}

function renderVlanSummaryTable(sorted, vlanMap) {
  const body = document.getElementById('vlanSummaryBody');
  if (!sorted.length) {
    body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);">No VLANs found in topology.</div>';
    document.getElementById('vlanSummaryCount').innerText = '';
    return;
  }
  let html = '<table style="width:100%;border-collapse:collapse;">'
    + '<thead><tr style="position:sticky;top:0;background:var(--bg-secondary);z-index:1;">'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);width:70px;">VLAN</th>'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);width:48px;">Type</th>'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);width:90px;">VRF</th>'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);">Ports / Devices</th>'
    + '</tr></thead><tbody>';
  sorted.forEach((vid, i) => {
    const info = vlanMap[vid];
    const isIntOnly = info.type === 'INT';
    const isVtep = info.type === 'VTEP' || (info.vtepDevices && info.vtepDevices.length > 0);
    const hasConflict = _vlanHasConflict(info);
    const typeColor = isIntOnly ? '#a855f7' : (isVtep && info.type === 'VTEP' ? '#0d9488' : (info.type === 'L3' ? '#f59e0b' : '#60a5fa'));
    let portsSummary = info.ports.map(p => p.device + ':' + p.port).join(', ');
    if (info.vtepDevices && info.vtepDevices.length) {
      const vtepText = 'Vx1: ' + info.vtepDevices.join(', ');
      if (portsSummary) {
        portsSummary += ' <span style="color:#0d9488;font-size:10px;margin-left:8px;font-family:\'JetBrains Mono\',monospace;">[' + vtepText + ']</span>';
      } else {
        portsSummary = '<span style="color:#0d9488;font-family:\'JetBrains Mono\',monospace;">' + vtepText + '</span>';
      }
    }
    if (info.internalOn && info.internalOn.length) {
      const intText = 'EOS Internal: ' + info.internalOn.join(', ');
      if (portsSummary) {
        portsSummary += ' <span style="color:#a855f7;font-size:10px;margin-left:8px;font-family:\'JetBrains Mono\',monospace;">[' + intText + ']</span>';
      } else {
        portsSummary = '<span style="color:#a855f7;font-family:\'JetBrains Mono\',monospace;">' + intText + '</span>';
      }
    }
    const vidCell = vid + (hasConflict
      ? ' <span style="color:#ef4444;font-size:10px;font-weight:700;font-family:\'JetBrains Mono\',monospace;">[CONFLICT]</span>'
      : '');
    const rowBg = i % 2 === 0 ? 'var(--bg-modal, #ffffff)' : 'var(--bg-secondary)';
    html += '<tr data-vid="' + vid + '" style="background:' + rowBg + ';cursor:pointer;"'
      + ' onclick="closeVlanSummaryModal();setTimeout(function(){traceVlan(\'' + vid + '\');},80);"'
      + ' onmouseover="this.style.background=\'var(--hover-bg,#1e293b)\'"'
      + ' onmouseout="this.style.background=\'' + rowBg + '\'">'
      + '<td style="padding:6px 12px;font-weight:700;color:var(--text-main);">' + vidCell + '</td>'
      + '<td style="padding:6px 12px;"><span style="color:' + typeColor + ';font-weight:700;">' + info.type + '</span></td>'
      + '<td style="padding:6px 12px;color:var(--text-muted);">' + (info.vrf || '—') + '</td>'
      + '<td style="padding:6px 12px;color:var(--text-muted);word-break:break-all;font-size:11px;">' + portsSummary + '</td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  body.innerHTML = html;
  const suffix = _vlanConflictsOnly ? ' · conflicts only' : '';
  document.getElementById('vlanSummaryCount').innerText = sorted.length + ' VLAN' + (sorted.length !== 1 ? 's' : '') + suffix;
}

function filterVlanSummary() {
  const q = (document.getElementById('vlanSummaryFilter').value || '').toLowerCase().trim();
  const { vlanMap, sorted } = window._vlanSummaryData || {};
  if (!vlanMap) return;
  renderVlanSummaryTable(_applyVlanFilterSort(sorted, vlanMap, q), vlanMap);
}

// =====================================================================
// GROUP RECTANGLE FEATURE — Draw, Render, Edit, Delete, Persist
// =====================================================================

// --- DRAW: Convert viewport mouse coords to SVG canvas coords ---
function viewportToSVG(clientX, clientY) {
  const vp = document.getElementById("viewport");
  const rect = vp.getBoundingClientRect();
  const mx = clientX - rect.left;
  const my = clientY - rect.top;
  return { x: (mx - panX) / zoomLevel, y: (my - panY) / zoomLevel };
}

function _activeGroupRectSvg() {
  return layoutMode === 'flexible' ? d3.select("#flex-grect-svg") : d3.select("#svg-layer");
}

function _isHolisticView() {
  return currentViewMode === 'holistic';
}

function _getTopologyDevices() {
  const devices = [];
  const seen = new Set();
  if (_isHolisticView()) {
    if (typeof holisticSimulation !== 'undefined' && holisticSimulation) {
      holisticSimulation.nodes().forEach(n => {
        if (n.id && !seen.has(n.id)) { seen.add(n.id); devices.push(n.id); }
      });
    }
  } else {
    document.querySelectorAll('#canvas-surface .node[data-id]').forEach(el => {
      const id = el.dataset.id || '';
      if (id && !seen.has(id)) { seen.add(id); devices.push(id); }
    });
  }
  return devices;
}

function _computeGroupBounds(memberIds, padding) {
  padding = (padding !== undefined) ? padding : 30;
  if (!memberIds || !memberIds.length) return null;
  const set = new Set(memberIds.map(id => (id || '').toLowerCase()));
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let found = 0;
  if (_isHolisticView()) {
    if (typeof holisticSimulation !== 'undefined' && holisticSimulation) {
      const r = (typeof holisticNodeR !== 'undefined' ? holisticNodeR : 52);
      // Pill labels (role/model/tags) render below circle: NODE_R+8 gap + up to 3 pills×20px+16px.
      // Use r+84 as effective bottom so pills are always enclosed.
      const pillBottom = r + 84;
      holisticSimulation.nodes().forEach(n => {
        if (!set.has((n.id || '').toLowerCase())) return;
        if (n.x - r < minX) minX = n.x - r;
        if (n.y - r < minY) minY = n.y - r;
        if (n.x + r > maxX) maxX = n.x + r;
        if (n.y + pillBottom > maxY) maxY = n.y + pillBottom;
        found++;
      });
    }
  } else {
    document.querySelectorAll('#canvas-surface .node[data-id]').forEach(el => {
      if (!set.has((el.dataset.id || '').toLowerCase())) return;
      if (el.style.display === 'none') return; // skip nodes hidden by any visibility filter
      const x = parseFloat(el.style.left) || 0;
      const y = parseFloat(el.style.top) || 0;
      const w = el.offsetWidth || 220;
      const h = el.offsetHeight || 80;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x + w > maxX) maxX = x + w;
      if (y + h > maxY) maxY = y + h;
      found++;
    });
  }
  if (!found) return null;
  return { x: minX - padding, y: minY - padding, width: (maxX - minX) + 2 * padding, height: (maxY - minY) + 2 * padding };
}

// Split member nodes into spatial clusters (union-find on bounding-box proximity).
// Returns an array of {x,y,width,height} bounding boxes, one per cluster.
// Nodes whose edges are within gapThreshold px of each other are in the same cluster.
function _computeGroupClusters(memberIds, padding, gapThreshold) {
  padding = padding !== undefined ? padding : 30;
  if (gapThreshold === undefined) {
    // Detailed view: one full slot (W + G) — any non-member card between two members splits them.
    // Holistic view: fixed fallback (force-sim spacing has no card geometry).
    if (!_isHolisticView()) {
      const W = parseInt(document.getElementById("cardWidthInp")?.value) || 250;
      const G = parseInt(document.getElementById("deviceGapInp")?.value) || 100;
      gapThreshold = W + G;
    } else {
      gapThreshold = 300;
    }
  }
  if (!memberIds || !memberIds.length) return [];
  const set = new Set(memberIds.map(id => (id || '').toLowerCase()));
  const nodes = [];
  if (_isHolisticView()) {
    if (typeof holisticSimulation !== 'undefined' && holisticSimulation) {
      const r = (typeof holisticNodeR !== 'undefined' ? holisticNodeR : 52);
      const pillBottom = r + 84;
      holisticSimulation.nodes().forEach(n => {
        if (!set.has((n.id || '').toLowerCase())) return;
        nodes.push({ x1: n.x - r, y1: n.y - r, x2: n.x + r, y2: n.y + pillBottom });
      });
    }
  } else {
    document.querySelectorAll('#canvas-surface .node[data-id]').forEach(el => {
      if (!set.has((el.dataset.id || '').toLowerCase())) return;
      if (el.style.display === 'none') return;
      const x = parseFloat(el.style.left) || 0;
      const y = parseFloat(el.style.top) || 0;
      const w = el.offsetWidth || 220;
      const h = el.offsetHeight || 80;
      nodes.push({ x1: x, y1: y, x2: x + w, y2: y + h });
    });
  }
  if (!nodes.length) return [];
  const parent = nodes.map((_, i) => i);
  function find(i) { return parent[i] === i ? i : (parent[i] = find(parent[i])); }
  function union(i, j) { parent[find(i)] = find(j); }
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = Math.max(0, Math.max(a.x1, b.x1) - Math.min(a.x2, b.x2));
      const dy = Math.max(0, Math.max(a.y1, b.y1) - Math.min(a.y2, b.y2));
      if (Math.sqrt(dx * dx + dy * dy) <= gapThreshold) union(i, j);
    }
  }
  const clusterMap = new Map();
  nodes.forEach((node, i) => {
    const root = find(i);
    if (!clusterMap.has(root)) clusterMap.set(root, []);
    clusterMap.get(root).push(node);
  });
  return [...clusterMap.values()].map(clNodes => {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    clNodes.forEach(({ x1, y1, x2, y2 }) => {
      if (x1 < minX) minX = x1; if (y1 < minY) minY = y1;
      if (x2 > maxX) maxX = x2; if (y2 > maxY) maxY = y2;
    });
    return { x: minX - padding, y: minY - padding, width: (maxX - minX) + 2 * padding, height: (maxY - minY) + 2 * padding };
  });
}

// --- RENDER: Draw all saved rects into the SVG group-rects layer ---
// Maps a textPos key to SVG text attributes for a given rect
function getTextAttrs(gr) {
  const pos = gr.textPos || "top-left";
  const P = 10; // inner padding
  const map = {
    "top-left":    { x: gr.x + P,              y: gr.y + 18,                   anchor: "start",  base: "auto"   },
    "top-center":  { x: gr.x + gr.width / 2,   y: gr.y + 18,                   anchor: "middle", base: "auto"   },
    "top-right":   { x: gr.x + gr.width - P,   y: gr.y + 18,                   anchor: "end",    base: "auto"   },
    "mid-left":    { x: gr.x + P,              y: gr.y + gr.height / 2,         anchor: "start",  base: "middle" },
    "mid-center":  { x: gr.x + gr.width / 2,   y: gr.y + gr.height / 2,         anchor: "middle", base: "middle" },
    "mid-right":   { x: gr.x + gr.width - P,   y: gr.y + gr.height / 2,         anchor: "end",    base: "middle" },
    "bot-left":    { x: gr.x + P,              y: gr.y + gr.height - 8,         anchor: "start",  base: "auto"   },
    "bot-center":  { x: gr.x + gr.width / 2,   y: gr.y + gr.height - 8,         anchor: "middle", base: "auto"   },
    "bot-right":   { x: gr.x + gr.width - P,   y: gr.y + gr.height - 8,         anchor: "end",    base: "auto"   },
    "custom":      { x: gr.x + (gr.textOffsetX ?? P), y: gr.y + (gr.textOffsetY ?? 18), anchor: "start", base: "auto" },
  };
  return map[pos] || map["top-left"];
}

// Word-wraps gr.label into <tspan> lines inside textEl, respecting rect width and textPos
function applyWrapToLabel(textEl, gr, ta) {
  const CHAR_W = 7.2;  // JetBrains Mono 12px — monospace so all chars equal
  const LINE_H = 15;
  const maxW = Math.max(gr.width - 20, 10); // 10px padding each side

  const words = (gr.label || "").split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = "";
  words.forEach(word => {
    const test = cur ? cur + " " + word : word;
    if (test.length * CHAR_W > maxW && cur) { lines.push(cur); cur = word; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  if (!lines.length) return;

  // Adjust startY for vertical positions when there are multiple lines
  const pos = gr.textPos || "top-left";
  let startY = ta.y;
  if (pos.startsWith("mid")) startY = gr.y + gr.height / 2 - ((lines.length - 1) * LINE_H) / 2;
  else if (pos.startsWith("bot")) startY = gr.y + gr.height - 8 - (lines.length - 1) * LINE_H;

  textEl.text(null).attr("y", startY).attr("dominant-baseline", "auto");
  lines.forEach((line, i) => {
    textEl.append("tspan").attr("x", ta.x).attr("dy", i === 0 ? 0 : LINE_H).text(line);
  });
}

// Compute vertical label anchor (left edge, bottom-to-top reading)
function getVertLabelAttrs(gr) {
  // Baseline at x = gr.x + 18 so character bodies clear the left border by ~8px
  // Anchor at bottom of rect so text reads upward through the box
  return { x: gr.x + 18, y: gr.y + gr.height - 10 };
}

function renderGroupRectsInto(rectGroup, labelGroup) {
  rectGroup.selectAll(".grect-item").remove();
  if (labelGroup) labelGroup.selectAll(".grect-label-item").remove();

  groupRects.forEach(gr => {
    // Member-based rects: recompute bounds from current node positions every render.
    // Spatially-separated members render as multiple compact cluster rects (same label/color).
    const isMemberRect = gr.members && gr.members.length > 0;
    if (isMemberRect) {
      const clusters = _computeGroupClusters(gr.members);
      if (!clusters.length) return; // all members hidden — skip
      if (clusters.length === 1) {
        // Single cluster — fall through to common rendering with gr geom set
        const b = clusters[0];
        gr.x = b.x; gr.y = b.y; gr.width = b.width; gr.height = b.height;
      } else {
        // Multiple clusters — render each as a simple rect+label, then return
        const strokeColor = gr.color.replace(/[0-9a-f]{2}$/i, "ff");
        const dblclickHandler = (e) => {
          e.stopPropagation();
          editingGroupRectId = gr.id;
          selectedGroupRectColor = gr.color;
          selectedGroupRectTextPos = gr.textPos || "top-left";
          selectedGroupRectWrapText = !!gr.wrapText;
          selectedGroupRectBoldText = !!gr.boldText;
          selectedGroupRectVertical = !!gr.vertical;
          document.getElementById("groupRectLabelInp").value = gr.label;
          document.querySelectorAll(".grect-swatch").forEach(s => {
            s.classList.toggle("selected", s.dataset.color === gr.color);
          });
          openGroupRectModal();
        };
        clusters.forEach(box => {
          const cg = rectGroup.append("g").attr("class", "grect-item").attr("data-id", gr.id);
          const clg = labelGroup
            ? labelGroup.append("g").attr("class", "grect-label-item").attr("data-id", gr.id)
            : cg;
          cg.append("rect").attr("class", "grect-body")
            .attr("x", box.x).attr("y", box.y)
            .attr("width", box.width).attr("height", box.height)
            .attr("rx", 8).attr("fill", gr.color)
            .attr("stroke", strokeColor).attr("stroke-width", 2)
            .attr("stroke-dasharray", "8 4")
            .style("pointer-events", "all").style("cursor", "default");
          const boxGr = Object.assign({}, gr, { x: box.x, y: box.y, width: box.width, height: box.height });
          const ta = getTextAttrs(boxGr);
          const labelEl = clg.append("text").attr("class", "grect-label")
            .attr("font-family", "'JetBrains Mono', monospace")
            .attr("font-size", "12px").attr("font-weight", gr.boldText ? "800" : "400")
            .attr("fill", strokeColor).style("pointer-events", "none");
          if (gr.vertical) {
            const va = getVertLabelAttrs(boxGr);
            labelEl.attr("x", va.x).attr("y", va.y)
              .attr("text-anchor", "start").attr("dominant-baseline", "auto")
              .attr("transform", `rotate(-90, ${va.x}, ${va.y})`).text(gr.label);
          } else {
            labelEl.attr("x", ta.x).attr("y", ta.y)
              .attr("text-anchor", ta.anchor).attr("dominant-baseline", ta.base);
            if (gr.wrapText) applyWrapToLabel(labelEl, boxGr, ta);
            else labelEl.text(gr.label);
          }
          cg.on("dblclick", dblclickHandler);
        });
        return; // skip single-rect path
      }
    } else if (!_isHolisticView()) {
      // Coordinate-based rects: hide when no .node divs are visible (search no-match, all hidden).
      // Holistic view uses SVG circles, not .node divs — skip this check there.
      const anyVisible = [...document.querySelectorAll('#canvas-surface .node[data-id]')]
        .some(el => el.style.display !== 'none');
      if (!anyVisible) return;
    }
    const strokeColor = gr.color.replace(/[0-9a-f]{2}$/i, "ff");
    const g = rectGroup.append("g").attr("class", "grect-item").attr("data-id", gr.id);
    // Label lives in labelGroup overlay (above cables) if provided, else falls back to g
    const lg = labelGroup
      ? labelGroup.append("g").attr("class", "grect-label-item").attr("data-id", gr.id)
      : g;

    // Helper — keeps all child element positions in sync after any drag/resize
    const HANDLE = 8; // handle square size px
    function syncGrect() {
      g.select(".grect-body")
        .attr("x", gr.x).attr("y", gr.y)
        .attr("width", gr.width).attr("height", gr.height);
      const lbl = lg.select(".grect-label");
      if (gr.vertical) {
        const va = getVertLabelAttrs(gr);
        lbl.attr("x", va.x).attr("y", va.y)
           .attr("text-anchor", "start").attr("dominant-baseline", "auto")
           .attr("transform", `rotate(-90, ${va.x}, ${va.y})`);
      } else {
        const ta = getTextAttrs(gr);
        lbl.attr("text-anchor", ta.anchor);
        if (gr.wrapText) {
          applyWrapToLabel(lbl, gr, ta);
        } else {
          lbl.text(gr.label).attr("x", ta.x).attr("y", ta.y).attr("dominant-baseline", ta.base).attr("transform", null);
        }
      }
      g.select(".grect-handle-nw").attr("x", gr.x - HANDLE/2).attr("y", gr.y - HANDLE/2);
      g.select(".grect-handle-ne").attr("x", gr.x + gr.width - HANDLE/2).attr("y", gr.y - HANDLE/2);
      g.select(".grect-handle-sw").attr("x", gr.x - HANDLE/2).attr("y", gr.y + gr.height - HANDLE/2);
      g.select(".grect-handle-se").attr("x", gr.x + gr.width - HANDLE/2).attr("y", gr.y + gr.height - HANDLE/2);
    }

    // Main body rect — drag only for non-member rects
    const bodyRect = g.append("rect").attr("class", "grect-body")
      .attr("x", gr.x).attr("y", gr.y)
      .attr("width", gr.width).attr("height", gr.height)
      .attr("rx", 8)
      .attr("fill", gr.color)
      .attr("stroke", strokeColor)
      .attr("stroke-width", 2)
      .attr("stroke-dasharray", "8 4")
      .style("pointer-events", "all")
      .style("cursor", isMemberRect ? "default" : "move");
    if (!isMemberRect) {
      bodyRect.call(d3.drag()
        .on("drag", (event) => { gr.x += event.dx; gr.y += event.dy; syncGrect(); })
        .on("end", () => saveGroupRects()));
    }

    // Label text — rendered into lg (overlay layer or same g if no overlay)
    const ta0 = getTextAttrs(gr);
    const labelEl = lg.append("text").attr("class", "grect-label")
      .attr("font-family", "'JetBrains Mono', monospace")
      .attr("font-size", "12px").attr("font-weight", gr.boldText ? "800" : "400")
      .attr("fill", strokeColor);

    if (gr.vertical) {
      // Left-edge vertical: text reads bottom→top with gap matching horizontal feel
      const va = getVertLabelAttrs(gr);
      labelEl.attr("x", va.x).attr("y", va.y)
             .attr("text-anchor", "start").attr("dominant-baseline", "auto")
             .attr("transform", `rotate(-90, ${va.x}, ${va.y})`)
             .text(gr.label);
    } else {
      labelEl.attr("x", ta0.x).attr("y", ta0.y)
             .attr("text-anchor", ta0.anchor).attr("dominant-baseline", ta0.base);
      // Apply label — plain or word-wrapped
      if (gr.wrapText) {
        applyWrapToLabel(labelEl, gr, ta0);
      } else {
        labelEl.text(gr.label);
      }
    }

    // Custom mode: text is draggable to reposition
    if ((gr.textPos || "top-left") === "custom") {
      labelEl.style("pointer-events", "all").style("cursor", "grab")
        .call(d3.drag()
          .on("start", (e) => e.sourceEvent.stopPropagation())
          .on("drag", (event) => {
            gr.textOffsetX = (gr.textOffsetX ?? 10) + event.dx;
            gr.textOffsetY = (gr.textOffsetY ?? 18) + event.dy;
            const ta = getTextAttrs(gr);
            labelEl.attr("x", ta.x).attr("y", ta.y);
          })
          .on("end", () => saveGroupRects()));
    } else {
      labelEl.style("pointer-events", "none");
    }

    // Corner resize handles — NW, NE, SW, SE (skipped for member-bound rects)
    if (!isMemberRect) {
      const corners = [
        { cls: "grect-handle-nw", cursor: "nw-resize",
          x: () => gr.x - HANDLE/2, y: () => gr.y - HANDLE/2,
          drag: (dx, dy) => {
            const newW = gr.width - dx, newH = gr.height - dy;
            if (newW >= 30) { gr.x += dx; gr.width = newW; }
            if (newH >= 30) { gr.y += dy; gr.height = newH; }
          }
        },
        { cls: "grect-handle-ne", cursor: "ne-resize",
          x: () => gr.x + gr.width - HANDLE/2, y: () => gr.y - HANDLE/2,
          drag: (dx, dy) => {
            const newW = gr.width + dx, newH = gr.height - dy;
            if (newW >= 30) gr.width = newW;
            if (newH >= 30) { gr.y += dy; gr.height = newH; }
          }
        },
        { cls: "grect-handle-sw", cursor: "sw-resize",
          x: () => gr.x - HANDLE/2, y: () => gr.y + gr.height - HANDLE/2,
          drag: (dx, dy) => {
            const newW = gr.width - dx, newH = gr.height + dy;
            if (newW >= 30) { gr.x += dx; gr.width = newW; }
            if (newH >= 30) gr.height = newH;
          }
        },
        { cls: "grect-handle-se", cursor: "se-resize",
          x: () => gr.x + gr.width - HANDLE/2, y: () => gr.y + gr.height - HANDLE/2,
          drag: (dx, dy) => {
            if (gr.width  + dx >= 30) gr.width  += dx;
            if (gr.height + dy >= 30) gr.height += dy;
          }
        }
      ];
      corners.forEach(c => {
        g.append("rect").attr("class", "grect-handle " + c.cls)
          .attr("x", c.x()).attr("y", c.y())
          .attr("width", HANDLE).attr("height", HANDLE)
          .attr("rx", 2)
          .attr("fill", strokeColor)
          .style("cursor", c.cursor)
          .style("pointer-events", "all")
          .call(d3.drag()
            .on("drag", (event) => { c.drag(event.dx, event.dy); syncGrect(); })
            .on("end", () => saveGroupRects()))
          .on("dblclick", (e) => e.stopPropagation());
      });
    }

    // Double-click body to edit/delete
    g.on("dblclick", (e) => {
      e.stopPropagation();
      editingGroupRectId = gr.id;
      selectedGroupRectColor = gr.color;
      selectedGroupRectTextPos = gr.textPos || "top-left";
      selectedGroupRectWrapText = !!gr.wrapText;
      selectedGroupRectBoldText = !!gr.boldText;
      selectedGroupRectVertical = !!gr.vertical;
      document.getElementById("groupRectLabelInp").value = gr.label;
      document.querySelectorAll(".grect-swatch").forEach(s => {
        s.classList.toggle("selected", s.dataset.color === gr.color);
      });
      openGroupRectModal();
    });
  });
}

// Creates #linear-grect-svg overlay and renders group rects into it.
// Deferred one rAF so render()'s node style.left/top are committed and
// offsetWidth/offsetHeight are valid for _computeGroupBounds().
// Called from both switchLayout('linear') and toggleViewMode() so group rects
// appear on every topology load, not only when the user clicks the Linear button.
function _initLinearGroupRectSvg() {
  requestAnimationFrame(() => {
    d3.select('#linear-grect-svg').remove();
    const linSvg = d3.select('#canvas-surface').append('svg')
      .attr('id', 'linear-grect-svg')
      .style('position', 'absolute').style('top', '0').style('left', '0')
      .style('width', '100%').style('height', '100%')
      .style('overflow', 'visible').style('pointer-events', 'none')
      .style('z-index', '1');
    const linRectGroup  = linSvg.append('g').attr('class', 'group-rects');
    const linLabelGroup = linSvg.append('g').attr('class', 'group-rect-labels');
    renderGroupRectsInto(linRectGroup, linLabelGroup);
  });
}

function refreshGroupRects() {
  const rectGroup = d3.select("#svg-layer .group-rects");
  if (!rectGroup.empty()) {
    const labelOverlay = d3.select("#svg-layer .group-rect-labels");
    renderGroupRectsInto(rectGroup, labelOverlay.empty() ? null : labelOverlay);
  }
  const flexRectGroup = d3.select("#flex-grect-svg .group-rects");
  if (!flexRectGroup.empty()) {
    const flexLabelGroup = d3.select("#flex-grect-svg .group-rect-labels");
    renderGroupRectsInto(flexRectGroup, flexLabelGroup.empty() ? null : flexLabelGroup);
  }
  const linRectGroup = d3.select("#linear-grect-svg .group-rects");
  if (!linRectGroup.empty()) {
    const linLabelGroup = d3.select("#linear-grect-svg .group-rect-labels");
    renderGroupRectsInto(linRectGroup, linLabelGroup.empty() ? null : linLabelGroup);
  }
}

function _setGroupRectLabelError(msg) {
  const el = document.getElementById('groupRectLabelError');
  const inp = document.getElementById('groupRectLabelInp');
  if (!el) return;
  if (msg) {
    el.textContent = msg;
    el.style.display = 'block';
    if (inp) inp.style.borderColor = '#ef4444';
  } else {
    el.style.display = 'none';
    if (inp) inp.style.borderColor = '';
  }
}

// --- MODAL ---
function openGroupRectModal() {
  _autoMinimizeOpenModal();
  const modal = document.getElementById("groupRectModal");
  const overlay = document.getElementById("editOverlay");
  if (!modal || !overlay) return;
  _setGroupRectLabelError('');
  if (!editingGroupRectId) {
    document.getElementById("groupRectLabelInp").value = "";
    selectedGroupRectColor = "#3b82f620";
    selectedGroupRectTextPos = "top-left";
    selectedGroupRectWrapText = false;
    selectedGroupRectBoldText = false;
    selectedGroupRectVertical = false;
    document.querySelectorAll(".grect-swatch").forEach(s => s.classList.remove("selected"));
    const first = document.querySelector(".grect-swatch");
    if (first) first.classList.add("selected");
    document.getElementById("groupRectDeleteBtn").style.display = "none";
  } else {
    document.getElementById("groupRectDeleteBtn").style.display = "inline-flex";
  }
  // Sync alignment grid and wrap toggle to current selection
  document.querySelectorAll(".grect-align-cell").forEach(c => {
    c.classList.toggle("active", c.dataset.pos === selectedGroupRectTextPos);
  });
  const wrapOpt = document.getElementById("groupRectWrapOpt");
  if (wrapOpt) wrapOpt.classList.toggle("active", selectedGroupRectWrapText);
  const boldOpt = document.getElementById("groupRectBoldOpt");
  if (boldOpt) boldOpt.classList.toggle("active", selectedGroupRectBoldText);
  const vertOpt = document.getElementById("groupRectVerticalOpt");
  if (vertOpt) vertOpt.classList.toggle("active", selectedGroupRectVertical);

  // Populate member device checklist
  const memberList = document.getElementById("groupRectMemberList");
  if (memberList) {
    memberList.innerHTML = "";
    const existing = editingGroupRectId ? groupRects.find(r => r.id === editingGroupRectId) : null;
    const currentMembers = new Set((existing && existing.members || []).map(m => (m || "").toLowerCase()));
    const devices = _getTopologyDevices();
    devices.sort((a, b) => {
      const ia = parseInt((allDevicesData[a] || {}).sheetIndex);
      const ib = parseInt((allDevicesData[b] || {}).sheetIndex);
      const sa = isNaN(ia) ? Number.MAX_SAFE_INTEGER : ia;
      const sb = isNaN(ib) ? Number.MAX_SAFE_INTEGER : ib;
      return (sa - sb) || a.localeCompare(b, undefined, { numeric: true });
    });
    if (!devices.length) {
      memberList.innerHTML = '<span style="color:#94a3b8;font-style:italic;font-family:\'JetBrains Mono\',monospace;font-size:11px;">No devices in topology</span>';
    } else {
      devices.forEach(devId => {
        const lbl = document.createElement("label");
        lbl.style.cssText = "display:flex;align-items:center;gap:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-main);user-select:none;-webkit-user-select:none;";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = devId;
        cb.checked = currentMembers.has(devId.toLowerCase());
        cb.style.cssText = "accent-color:#8b5cf6;cursor:pointer;flex-shrink:0;";
        const devData = allDevicesData[devId];
        const idx = (devData && devData.sheetIndex) ? devData.sheetIndex : '-';
        const idBadge = document.createElement('span');
        idBadge.style.cssText = "color:#94a3b8;font-size:10px;flex-shrink:0;font-family:'JetBrains Mono',monospace;";
        idBadge.textContent = '[' + idx + ']';
        lbl.appendChild(cb);
        lbl.appendChild(idBadge);
        lbl.appendChild(document.createTextNode(devId));
        memberList.appendChild(lbl);
      });
    }
  }

  setActiveModalChip('groupRectModal');
  modal.style.display = "flex";
  setTimeout(() => document.getElementById("groupRectLabelInp").focus(), 50);
  initialGroupRectState = _captureGroupRectState();
}

function closeGroupRectModal() {
  const isDirty = initialGroupRectState !== '' && _captureGroupRectState() !== initialGroupRectState;
  if (!_confirmDirtyClose(isDirty, "Group")) return;
  initialGroupRectState = '';
  _onModalClose(document.getElementById("groupRectModal"));
  document.getElementById("groupRectModal").style.display = "none";
  document.getElementById("editOverlay").style.display = "none";
  pendingGroupRectGeom = null;
  editingGroupRectId = null;
}

function confirmGroupRect() {
  initialGroupRectState = '';
  const label = (document.getElementById("groupRectLabelInp").value || "").trim();
  if (!label) { closeGroupRectModal(); return; }

  // Collect checked members
  const members = [];
  document.querySelectorAll("#groupRectMemberList input[type=checkbox]:checked").forEach(cb => members.push(cb.value));

  function minWidthForLabel(lbl) {
    return Math.ceil(lbl.length * 7.2) + 20;
  }

  // Block duplicate label — find any group with same name (excluding the one being edited)
  const dupLabel = groupRects.find(r => r.label.toLowerCase() === label.toLowerCase() && r.id !== editingGroupRectId);
  if (dupLabel) {
    _setGroupRectLabelError('A group "' + dupLabel.label + '" already exists. Click it on the canvas to edit, or choose a different name.');
    return;
  }
  _setGroupRectLabelError('');

  if (editingGroupRectId) {
    const existing = groupRects.find(r => r.id === editingGroupRectId);
    if (existing) {
      existing.label = label;
      existing.color = selectedGroupRectColor;
      existing.textPos = selectedGroupRectTextPos;
      existing.wrapText = selectedGroupRectWrapText;
      existing.boldText = selectedGroupRectBoldText;
      existing.vertical = selectedGroupRectVertical;
      existing.members = members;
      if (!members.length && !selectedGroupRectVertical && !selectedGroupRectWrapText) {
        existing.width = Math.max(existing.width || 100, minWidthForLabel(label));
      }
      if (selectedGroupRectTextPos !== "custom") { delete existing.textOffsetX; delete existing.textOffsetY; }
    }
  } else {
    let geom;
    if (members.length) {
      geom = _computeGroupBounds(members) || { x: 100, y: 100, width: 200, height: 100 };
    } else {
      geom = pendingGroupRectGeom || { x: 100, y: 100, width: 200, height: 100 };
      if (!selectedGroupRectVertical && !selectedGroupRectWrapText) {
        geom.width = Math.max(geom.width, minWidthForLabel(label));
      }
    }
    groupRects.push({
      id: "grect_" + Date.now(),
      x: geom.x, y: geom.y, width: geom.width, height: geom.height,
      label, color: selectedGroupRectColor,
      textPos: selectedGroupRectTextPos,
      wrapText: selectedGroupRectWrapText,
      boldText: selectedGroupRectBoldText,
      vertical: selectedGroupRectVertical,
      members
    });
  }
  saveGroupRects();
  closeGroupRectModal();
  refreshGroupRects();
}

function deleteGroupRect() {
  if (!editingGroupRectId) return;
  groupRects = groupRects.filter(r => r.id !== editingGroupRectId);
  saveGroupRects();
  initialGroupRectState = '';
  closeGroupRectModal();
  refreshGroupRects();
}

function toggleDevVisPanelOpen() {
  const panel = document.getElementById('devVisPanel');
  const btn = document.getElementById('devVisPanelBtn');
  if (!panel) return;
  const isOpen = panel.classList.toggle('is-open');
  if (btn) btn.classList.toggle('active', isOpen);
  if (isOpen) {
    panel.classList.remove('is-minimized');
    const minBtn = document.getElementById('devVisMinBtn');
    if (minBtn) minBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="vertical-align:middle"><rect x="1" y="4.25" width="8" height="1.5" rx="0.75" fill="currentColor"/></svg>';
    populateDevVisPanel();
    initDevVisPanelDrag();
  } else {
    _devVisRestoreAll();
  }
}

function populateDevVisPanel() {
  const list = document.getElementById('devVisList');
  if (!list) return;
  list.innerHTML = '';
  const nodes = document.querySelectorAll('.node');
  if (!nodes.length) return;
  nodes.forEach(node => {
    const id = node.dataset.id;
    if (!id) return;
    const titleEl = node.querySelector('.node-header-title');
    const label = titleEl ? titleEl.innerText : id;
    const portCount = node.querySelectorAll('.port-row').length;
    const isHidden = hiddenDevices.has(id);
    const item = document.createElement('div');
    item.className = 'dev-vis-item' + (isHidden ? ' is-hidden' : '');
    item.dataset.devId = id;
    item.title = isHidden ? 'Click to show' : 'Click to hide';
    const isSel = selectedInDevVis.has(id);
    if (isSel) item.classList.add('is-selected');
    item.innerHTML = `
      <input type="checkbox" class="dev-vis-chk" title="Select"${isSel ? ' checked' : ''}>
      <div class="dev-vis-eye" title="${isHidden ? 'Show in topology' : 'Hide in topology'}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${isHidden ? DEV_VIS_EYE_CLOSED : DEV_VIS_EYE_OPEN}</svg>
      </div>
      <span class="dev-vis-name dev-vis-nav" title="Navigate to device in sheet">${escapeHtml(label)}</span>
      <span class="dev-vis-count">${portCount}</span>`;
    const chk = item.querySelector('.dev-vis-chk');
    chk.addEventListener('click', e => e.stopPropagation());
    chk.addEventListener('change', () => toggleDevVisSelect(id));
    item.querySelector('.dev-vis-eye').addEventListener('click', e => { e.stopPropagation(); toggleDeviceVis(id); });
    item.querySelector('.dev-vis-nav').addEventListener('click', e => { e.stopPropagation(); navigateDeviceInSheet(id); });
    item.addEventListener('click', () => toggleDevVisSelect(id));
    list.appendChild(item);
  });
  filterDevVisList();
}

function toggleDeviceVis(deviceId) {
  // Immediate toggling feedback before doing the work
  const item = document.querySelector(`.dev-vis-item[data-dev-id="${CSS.escape(deviceId)}"]`);
  if (item) item.classList.add('is-toggling');
  requestAnimationFrame(() => {
    if (hiddenDevices.has(deviceId)) {
      hiddenDevices.delete(deviceId);
    } else {
      hiddenDevices.add(deviceId);
    }
    applyDeviceVisibility();
    _updateDevVisItem(deviceId);
  });
}

function _updateDevVisItem(deviceId) {
  const item = document.querySelector(`.dev-vis-item[data-dev-id="${CSS.escape(deviceId)}"]`);
  if (!item) return;
  const isHidden = hiddenDevices.has(deviceId);
  item.classList.toggle('is-hidden', isHidden);
  item.classList.remove('is-toggling');
  item.title = isHidden ? 'Click to show' : 'Click to hide';
  const eye = item.querySelector('.dev-vis-eye svg');
  if (eye) eye.innerHTML = isHidden ? DEV_VIS_EYE_CLOSED : DEV_VIS_EYE_OPEN;
}

const _DEV_VIS_MIN_IDS = ['devVisSelRow', 'devVisIpSection', 'devVisIntModeSection', 'devVisSviSection', 'devVisVlanSection', 'devVisSearchRow', 'devVisList'];

// Restore full topology visibility — called on DevVis × close only (not minimize).
function _devVisRestoreAll() {
  hiddenDevices.clear();
  selectedInDevVis.clear();
  document.querySelectorAll('.node').forEach(n => { n.style.display = ''; n.classList.remove('hidden-vlan'); });
  // Reset all DevVis filter state to defaults
  topoVlanFilter    = [];
  topoSviFilter     = ['active', 'blank'];
  topoIpFilter      = ['p2p', 'gw', 'blank'];
  topoIntModeFilter = ['l2-et-access','l2-et-trunk','l2-po-access','l2-po-trunk','l3-et-int','l3-et-sub-int','l3-po-int','l3-po-sub-int'];
  // Clear filter CSS classes from port rows and re-render filter strips
  applyTopoSviFilter();
  applyTopoIpTypeFilter();
  applyTopoIntModeFilter();
  applyVlanFilter();        // clears hidden-vlan from port rows + calls refreshGroupRects + redrawLinks
  buildVlanStrip();
  renderSviList();
  renderIpTypeList();
  renderIntModeList();
}

function toggleDevVisMinimize(e) {
  if (e) e.stopPropagation();
  const panel = document.getElementById('devVisPanel');
  const header = document.getElementById('devVisPanelHeader');
  const btn = document.getElementById('devVisMinBtn');
  if (!panel || !header) return;
  const isMin = panel.classList.toggle('is-minimized');
  if (isMin) {
    panel.style.height = header.offsetHeight + 'px';
    panel.style.overflow = 'hidden';
  } else {
    panel.style.height = '';
    panel.style.overflow = '';
  }
  _DEV_VIS_MIN_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = isMin ? 'none' : '';
  });

// ─── VLAN CHIP STRIP ─────────────────────────────────────────────────────────

function buildVlanStrip() {
  const strip = document.getElementById('devVisVlanStrip');
  const clearBtn = document.getElementById('devVisVlanClear');
  if (!strip) return;

  // Collect VLAN info from all port data
  const vlanInfo = {}; // vid → { hasSvi: bool, hasVtep: bool, trunkCount: number }
  Object.values(allNodesData).forEach(function(n) {
    const d = (n && n.details) || {};
    const parsed = parseVlanWithNative(d.vlan_ || '');

    // Allowed (trunk) VLANs
    if (parsed.vlans) {
      parsed.vlans.split(',').forEach(function(v) {
        v = v.trim();
        if (!v || isNaN(parseInt(v, 10))) return;
        if (!vlanInfo[v]) vlanInfo[v] = { hasSvi: false, hasVtep: false, trunkCount: 0 };
        vlanInfo[v].trunkCount++;
      });
    }
    // Native VLAN (may not be in trunk list)
    if (parsed.native) {
      if (!vlanInfo[parsed.native]) vlanInfo[parsed.native] = { hasSvi: false, hasVtep: false, trunkCount: 0 };
    }
    // SVI VLANs
    const sviRaw = String(d.svi_vlan_ || '').trim().toLowerCase();
    if (sviRaw === 'all') {
      if (parsed.vlans) {
        parsed.vlans.split(',').forEach(function(v) {
          v = v.trim(); if (vlanInfo[v]) vlanInfo[v].hasSvi = true;
        });
      }
      if (parsed.native && vlanInfo[parsed.native]) vlanInfo[parsed.native].hasSvi = true;
    } else if (sviRaw) {
      sviRaw.split(',').forEach(function(tok) {
        tok = tok.trim();
        const m = tok.match(/^nv(\d+)$/i);
        const vid = m ? m[1] : tok;
        if (vid && vlanInfo[vid]) vlanInfo[vid].hasSvi = true;
      });
    }
  });

  // Vx1/VTEP VLANs — excluded from allNodesData; sourced from node.vtepVlans (compressed ranges)
  // Split by comma only — do NOT expand ranges (parseVlanInput turns "1-4000" into 4000 chips).
  // Each comma-token (e.g. "1-4000", "10") becomes one teal chip-vtep.
  if (currentData && currentData.nodes) {
    currentData.nodes.forEach(function(node) {
      if (!node.vtepVlans) return;
      node.vtepVlans.split(',').forEach(function(tok) {
        const vid = tok.trim();
        if (!vid) return;
        if (!vlanInfo[vid]) vlanInfo[vid] = { hasSvi: false, hasVtep: false, trunkCount: 0 };
        vlanInfo[vid].hasVtep = true;
      });
    });
  }

  const sortedVlans = Object.keys(vlanInfo).sort(function(a, b) { return parseInt(a, 10) - parseInt(b, 10); });

  if (!sortedVlans.length) {
    strip.innerHTML = '<span class="dev-vis-vlan-empty">\u2014</span>';
    if (clearBtn) clearBtn.style.display = 'none';
    return;
  }

  strip.innerHTML = sortedVlans.map(function(vid) {
    const info = vlanInfo[vid];
    const cls = info.hasVtep ? 'chip-vtep' : (info.hasSvi ? 'chip-svi' : (info.trunkCount > 0 ? 'chip-trunk' : 'chip-native'));
    const isActive = topoVlanFilter.indexOf(vid) !== -1;
    const tip = 'VLAN ' + vid + (info.hasVtep ? ' \u00b7 VTEP' : '') + (info.hasSvi ? ' \u00b7 SVI' : '') + (info.trunkCount === 0 && !info.hasVtep ? ' \u00b7 native only' : '');
    return '<span class="dev-vis-vlan-chip ' + cls + (isActive ? ' active' : '') + '"' +
           ' data-vlan="' + vid + '" onclick="toggleVlanChip(\'' + vid + '\')" title="' + tip + '">' +
           vid + '</span>';
  }).join('');

  if (clearBtn) clearBtn.style.display = topoVlanFilter.length > 0 ? '' : 'none';
}

function toggleVlanChip(vid) {
  const idx = topoVlanFilter.indexOf(vid);
  if (idx !== -1) topoVlanFilter.splice(idx, 1);
  else topoVlanFilter.push(vid);
  buildVlanStrip();
  applyVlanFilter();
}

function clearVlanFilter() {
  topoVlanFilter = [];
  buildVlanStrip();
  applyVlanFilter();
}

function applyVlanFilter() {
  // Expand filter tokens to a flat Set<string> — handles VTEP range chips like "1-4000"
  const filterVlans = new Set();
  topoVlanFilter.forEach(function(tok) {
    parseVlanInput(tok).forEach(function(v) { filterVlans.add(String(v)); });
  });

  Object.entries(globalPortElements).forEach(function([id, elObj]) {
    const row = elObj.row;
    if (topoVlanFilter.length === 0) { row.classList.remove('hidden-vlan'); return; }
    const d = ((allNodesData[id] || {}).details) || {};
    const parsed = parseVlanWithNative(d.vlan_ || '');
    const portVlans = new Set();
    if (parsed.native) portVlans.add(parsed.native);
    if (parsed.vlans) {
      parsed.vlans.split(',').forEach(function(v) { v = v.trim(); if (v) portVlans.add(v); });
    }
    if ([...portVlans].some(function(v) { return filterVlans.has(v); })) {
      row.classList.remove('hidden-vlan');
    } else {
      row.classList.add('hidden-vlan');
    }
  });
  // Hide device nodes with no visible VLAN-matching ports
  Object.keys(devicePortsMap).forEach(function(devId) {
    const node = document.querySelector('#canvas-surface .node[data-id="' + CSS.escape(devId) + '"]');
    if (!node) return;
    if (topoVlanFilter.length === 0) {
      node.classList.remove('hidden-vlan');
    } else {
      const ports = devicePortsMap[devId] || [];
      const hasVisiblePort = ports.some(function(pid) {
        const elObj = globalPortElements[pid];
        return elObj && elObj.row && !elObj.row.classList.contains('hidden-vlan');
      });
      if (hasVisiblePort) {
        node.classList.remove('hidden-vlan');
      } else {
        node.classList.add('hidden-vlan');
      }
    }
  });
  requestAnimationFrame(refreshGroupRects);
  requestAnimationFrame(redrawLinks);
}

function applyTopoSviFilter() {
  Object.entries(globalPortElements).forEach(function([id, elObj]) {
    const row = elObj.row;
    if (topoSviFilter.length === 0) { row.classList.remove('hidden-svi'); return; }
    const svi = String(((allNodesData[id] || {}).details || {}).svi_vlan_ || '').toLowerCase().trim();
    const mapped = (svi && svi !== 'no' && svi !== '-') ? 'active' : 'blank';
    if (topoSviFilter.indexOf(mapped) !== -1) row.classList.remove('hidden-svi');
    else row.classList.add('hidden-svi');
  });
}

function toggleTopoSviFilter(val) {
  const idx = topoSviFilter.indexOf(val);
  if (idx !== -1) topoSviFilter.splice(idx, 1);
  else topoSviFilter.push(val);
  renderSviList();
  applyTopoSviFilter();
  requestAnimationFrame(redrawLinks);
}


function toggleDevVisSelect(id) {
  if (selectedInDevVis.has(id)) selectedInDevVis.delete(id);
  else selectedInDevVis.add(id);
  const item = document.querySelector(`.dev-vis-item[data-dev-id="${CSS.escape(id)}"]`);
  if (item) {
    item.classList.toggle('is-selected', selectedInDevVis.has(id));
    const chk = item.querySelector('.dev-vis-chk');
    if (chk) chk.checked = selectedInDevVis.has(id);
  }
  _updateDevVisSelUI();
}

function _updateDevVisSelUI() {
  const n = selectedInDevVis.size;
  const showBtn = document.getElementById('btnDevVisShowSel');
  const hideBtn = document.getElementById('btnDevVisHideSel');
  if (showBtn) { showBtn.disabled = n === 0; showBtn.textContent = n > 0 ? `SHOW (${n})` : 'SHOW'; }
  if (hideBtn) { hideBtn.disabled = n === 0; hideBtn.textContent = n > 0 ? `HIDE (${n})` : 'HIDE'; }
  const visItems = Array.from(document.querySelectorAll('#devVisList .dev-vis-item'))
    .filter(el => el.style.display !== 'none');
  const allSel  = visItems.length > 0 && visItems.every(el => selectedInDevVis.has(el.dataset.devId));
  const someSel = visItems.some(el => selectedInDevVis.has(el.dataset.devId));
  const allChk  = document.getElementById('devVisSelAllChk');
  if (allChk) { allChk.checked = allSel; allChk.indeterminate = someSel && !allSel; }
}

function selectAllDevVis(checked) {
  Array.from(document.querySelectorAll('#devVisList .dev-vis-item'))
    .filter(el => el.style.display !== 'none')
    .forEach(el => {
      const id = el.dataset.devId;
      if (checked) selectedInDevVis.add(id); else selectedInDevVis.delete(id);
      el.classList.toggle('is-selected', checked);
      const chk = el.querySelector('.dev-vis-chk');
      if (chk) chk.checked = checked;
    });
  _updateDevVisSelUI();
}

function showSelectedDevVis() {
  if (!selectedInDevVis.size) return;
  selectedInDevVis.forEach(id => hiddenDevices.delete(id));
  selectedInDevVis.clear();
  applyDeviceVisibility();
  populateDevVisPanel();
}

function hideSelectedDevVis() {
  if (!selectedInDevVis.size) return;
  selectedInDevVis.forEach(id => hiddenDevices.add(id));
  selectedInDevVis.clear();
  applyDeviceVisibility();
  populateDevVisPanel();
}

function applyDeviceVisibility() {
  document.querySelectorAll('.node').forEach(node => {
    const id = node.dataset.id;
    if (hiddenDevices.has(id)) {
      node.style.display = 'none';
    } else {
      // Always clear DevVis-hidden state unconditionally — stale .dimmed from a
      // prior search run while this node was hidden would otherwise block display:''.
      // If search is active, filterTopology() below will re-dim non-matching nodes.
      node.classList.remove('dimmed');
      node.style.display = '';
    }
  });
  const searchInput = document.getElementById('searchInp');
  if (searchInput && searchInput.value.trim()) {
    filterTopology(); // re-applies search dimming; calls requestAnimationFrame(redrawLinks) internally
  } else {
    requestAnimationFrame(redrawLinks);
  }
}


// DevVis panel drag — delegates to unified _makeDraggable.
function initDevVisPanelDrag() {
  _makeDraggable('devVisPanel', { headerSel: '.dev-vis-header', noReset: true, toolbarGap: true });
}
