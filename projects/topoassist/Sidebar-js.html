// --- HELPER FUNCTIONS ---
function debounce(func, wait) {
  let timeout;
  const debounced = function (...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
  debounced.cancel = function () { clearTimeout(timeout); };
  return debounced;
}

/**
* LAYOUT MANAGER
* Automatically adjusts the Canvas (Viewport) top position so it never
* overlaps with the Toolbar, regardless of how many rows are visible.
*/
function initLayoutObserver() {
  const toolbar = document.getElementById("mainToolbar");
  const minBar = document.getElementById("minimizedBar");
  const viewport = document.getElementById("viewport");

  if (!viewport) return;

  const adjustTop = () => {
    let newTop = 0;

    // 1. Minimized Mode
    if (minBar && getComputedStyle(minBar).display !== "none") {
      newTop = minBar.offsetHeight;
    }
    // 2. Normal Mode (Toolbar Visible)
    else if (toolbar && getComputedStyle(toolbar).display !== "none") {
      // Calculate total height: Toolbar offset + height
      newTop = toolbar.offsetTop + toolbar.offsetHeight;
    }

    // Apply to Viewport (Add small buffer)
    viewport.style.top = (newTop + 5) + "px";
  };

  // Observer: Watches for Toolbar height changes (e.g. Copy Row appearing)
  if (toolbar) {
    new ResizeObserver(adjustTop).observe(toolbar);
  }

  // Initial Adjustment
  adjustTop();

  // Expose for manual calls
  window.adjustLayout = adjustTop;
}

// --- THEME MANAGEMENT ---
function initTheme() {
  const saved = localStorage.getItem('portmap-theme');
  if (saved === 'dark') {
    document.documentElement.removeAttribute('data-theme'); // force dark
  } else if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    // No saved pref — respect OS preference; default to light
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (!prefersDark) document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeIcon();
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('portmap-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('portmap-theme', 'light');
  }
  updateThemeIcon();
}

function updateThemeIcon() {

function initApp() {

  } else if (currentMode === 'view_custom') {
    initCustomViewManager();
  } else {
    // TOPOLOGY MODE INITIALIZATION

    // Render filter lists with initial state
    renderIpTypeList();
    renderIntModeList();
    renderSviList();
    _renderBridgeLldpLegend();

    hideGlobalLoading();

    // 1. RESTORE VIEW PREFERENCE IMMEDIATELY
    // We must know if we are in 'detailed' or 'holistic' before loading positions
    const savedMode = localStorage.getItem('topology_view_mode');
    if (savedMode) {
      currentViewMode = savedMode;
    }

    // 2. FORCE LOAD POSITIONS BEFORE RENDER
    // This populates 'savedNodePositions' so the first render sees the X/Y coords
    loadStateFromStorage(currentViewMode);
    loadGroupRects();
    dbg("Loaded positions for mode:", currentViewMode, Object.keys(savedNodePositions).length + " nodes.");

    // 3. Try Instant Restore from Session Storage (Data Cache)
    const cachedData = loadFromSession();

    if (cachedData) {
      dbg("Instant Restore from Session");

      // Render based on the saved mode
      if (currentViewMode === 'holistic') {
        renderHolistic(cachedData);
      } else {
        render(cachedData);
      }

      updateTopoButtons(determineCurrentTopoMode());

      // Restore Camera
      restoreCameraForMode(currentViewMode);

      let st = document.getElementById("status");
      setStatus("Topology restored from cache (Checking for updates…)");

      // Background Fetch — auto-verify to confirm session cache == actual.
      // silent=true: topology already visible, keep "Topology restored from cache" in status.
      fetchData(false, true, true);
    } else {
      // Cold Start: try GAS cache first for instant render, then auto-verify
      fetchData(false, true);
    }

    if (typeof bindGlobalSearchListeners === 'function') {
      bindGlobalSearchListeners();
    }

    if (typeof initLayoutObserver === 'function') {
      initLayoutObserver();
    }

    // Apply drag to all standard (non-fullscreen) modals
    document.querySelectorAll('.modal-std:not(.modal-large)').forEach(m => _makeDraggable(m));
    // Bridge: restore icon state, silent startup check
    _updateBridgeToolbarIcon('idle');
    _silentBridgeCheck();
  }
  startSmartPolling();
}

}

window.onerror = function (msg, url, line, col, error) {
  if (msg === "Script error.") return;
  setStatus("Error: " + msg, "status-error");
};

window.addEventListener('unhandledrejection', function (event) {
  const err = event.reason;
  const msg = err && err.message ? err.message : String(err);
  setStatus("Error: " + msg, "status-error");
});

function startSmartPolling() {
  if (smartPollTimer) clearInterval(smartPollTimer);

  // Check every 4 seconds (Balance between load and responsiveness)
  smartPollTimer = setInterval(() => {
    // 1. EDIT MODE GUARD
    if (typeof isEditMode !== 'undefined' && isEditMode) return;

    // 2. FETCH GUARD — skip if a fetchData is already in flight (prevents concurrent GAS executions writing to the same TOPOLOGY_STATUS cache key, which causes phase flickering)
    if (isFetching) return;

    // 3. LOADING GUARD
    const overlay = document.getElementById('loading-overlay');
    if (overlay && overlay.style.display !== 'none' && !overlay.classList.contains('hidden')) return;

    // Note: visibility guard removed — poll continues when tab is hidden so that sheet edits
    // made while the tab is backgrounded are detected and configCache is kept current.
    // getDataVersion() is a single DocumentProperties.getProperty() — ~15 extra calls/min,
    // well within GAS quota. The background prefetch already runs without a visibility guard.

    google.script.run
      .withSuccessHandler(serverVersion => {
        if (serverVersion && serverVersion !== localDataVersion) {
          dbg("Change detected (v" + serverVersion + ")! Refreshing...");
          localDataVersion = serverVersion;
          setStatus("Sheet changed — refreshing topology\u2026", "status-info");
          configCache = {};
          _markConfigsFetching();
          fetchData(false);
        }
      })
      .withFailureHandler(e => console.warn("Poll failed (ignoring)", e))
      .getDataVersion();

  }, 4000);
}

function DeviceManagerOpenButton() {
  document.getElementById("emptyMsg").style.display = "none";
  document.getElementById("reorderList").innerHTML = `
<div style="padding:40px; text-align:center; color:#94a3b8;">
<div style="display:inline-block; animation:spin 1s linear infinite; margin-bottom:10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg></div>
<div>Loading Devices...</div>
</div>`;

  google.script.run.withSuccessHandler(devices => {
    DeviceManagerLoadDevices(devices);
    DeviceManager();
  }).getExistingDevices();
}

// Shared helper — builds currentDeviceManagerList from raw server response and snapshots state
function DeviceManagerLoadDevices(devices) {
  let aristaCounter = 0;
  currentDeviceManagerList = devices.map((d, index) => {
    let name = d.name || d;
    let isNonArista = d.type === 'non-arista';
    let origTID = index + 1;
    let origDID = "-";
    if (!isNonArista) { aristaCounter++; origDID = aristaCounter; }
    return {
      name: name,
      originalName: name,
      type: isNonArista ? 'non-arista' : 'full',
      _origTID: origTID,
      _origDID: origDID,
      isVisible: d.isVisible,
      labels: d.labels || [],
      hostname: d.hostname || "",
      _origHostname: d.hostname || "",
      role: d.role || "",
      _origRole: d.role || "",
      mlagPeer: d.mlagPeer || "",
      _origMlagPeer: d.mlagPeer || "",
      model: d.model || "",
      rack: d.rack || ""
    };
  });
  // Sync deviceMetadata global so cabling report has model/rack even if Device Manager stays closed
  currentDeviceManagerList.forEach(d => {
    if (d.model || d.rack) deviceMetadata[d.name] = { model: d.model || '', rack: d.rack || '' };
  });
  initialDeviceManagerState = JSON.stringify(currentDeviceManagerList);
  isDeviceManagerDirty = false;
  DeviceManagerSaveButton();
}

// Called automatically when topology refreshes — silently syncs the device manager
// if it is open and the user has made no pending edits
function DeviceManagerAutoRefresh() {
  if (currentMode !== 'manager' || isDeviceManagerDirty) return;

  google.script.run.withSuccessHandler(devices => {
    // Guard again: user may have started editing while the server call was in-flight
    if (isDeviceManagerDirty) return;
    DeviceManagerLoadDevices(devices);
    DeviceManager();
  }).getExistingDevices();
}

function DeviceManager() {
  closeLabelPicker();
  const listEl = document.getElementById("reorderList");
  listEl.innerHTML = "";


  if (!currentDeviceManagerList || currentDeviceManagerList.length === 0) {
    document.getElementById("emptyMsg").style.display = "block";
    return;
  }
  document.getElementById("emptyMsg").style.display = "none";

  let currentAristaCount = 0;

  // Render Loop
  currentDeviceManagerList.forEach((devObj, index) => {
    const li = document.createElement("li");
    li.className = "reorder-item reorder-grid";

    const isChecked = devObj.isVisible ? "checked" : "";
    const isNonArista = (devObj.type === 'non-arista');

    // 1. DYNAMICALLY CALCULATE IDs (1, 2, 3...)
    // Since the new device is in the list, this loop naturally gives it the next number.
    let currTID = index + 1;
    let currDID = "-";

    if (!isNonArista) {
      currentAristaCount++;
      currDID = currentAristaCount;
    }

    // 2. DISPLAY LOGIC (Compare Current vs Original)

    // Topology ID Display (#)
    let tidHtml = "";
    if (devObj._origTID === "NEW") {
      // Shows "+3" in Green
      tidHtml = `<span class="col-id" style="color:#10b981; font-weight:bold;">+${currTID}</span>`;
    } else if (devObj._origTID !== currTID) {
      // Shows "1➜3" in Orange
      tidHtml = `<span class="col-id id-orange">${devObj._origTID}➜${currTID}</span>`;
    } else {
      // Shows "3" in Blue
      tidHtml = `<span class="col-id id-blue">${currTID}</span>`;
    }

    // Device ID Display (ID)
    let didHtml = "";
    if (currDID === "-") {
      didHtml = `<span class="col-id id-gray">-</span>`;
    } else if (devObj._origDID === "NEW") {
      didHtml = `<span class="col-id" style="color:#10b981; font-weight:bold;">+${currDID}</span>`;
    } else if (devObj._origDID !== currDID) {
      didHtml = `<span class="col-id id-orange">${devObj._origDID}➜${currDID}</span>`;
    } else {
      didHtml = `<span class="col-id id-blue">${currDID}</span>`;
    }

    const wasChanged = devObj.originalName && devObj.name !== devObj.originalName;
    const hostnameWasChanged = devObj._origHostname !== undefined && devObj.hostname !== devObj._origHostname;
    const roleChanged = devObj._origRole !== undefined && devObj.role !== devObj._origRole;
    const mlagChanged = devObj._origMlagPeer !== undefined && devObj.mlagPeer !== devObj._origMlagPeer;

    const isRoleManaged = (devObj.role === 'IXIA' || devObj.role === 'SPIRENT');
    let typeBadge;
    if (isRoleManaged) {
      typeBadge = `<span class="non-arista-badge" title="Non-EOS driven by role">Non-EOS</span>`;
    } else if (isNonArista) {
      typeBadge = `<button class="type-toggle-btn type-toggle-nonarista" onclick="setDeviceType(${index})" title="Non-EOS — click to restore as EOS">Non-EOS</button>`;
    } else {
      typeBadge = `<span class="type-eos-label" onclick="setDeviceType(${index})" title="EOS — click to mark as Non-EOS" style="cursor:pointer;">EOS</span>`;
    }

    const isPendingDelete = (index === pendingDeviceManagerDeleteIndex);
    if (isPendingDelete) {
      li.style.background = 'rgba(239,68,68,0.08)';
      li.style.outline = '1px solid rgba(239,68,68,0.35)';
    }

    const deleteCell = isPendingDelete
      ? `<div class="col-center" style="gap:3px;display:flex;">
           <button onclick="confirmRemoveDevice()" title="Confirm delete" style="font-size:10px;padding:2px 6px;background:#ef4444;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;display:inline-flex;align-items:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
           <button onclick="cancelRemoveDevice()" title="Cancel" style="font-size:10px;padding:2px 5px;background:var(--bg-secondary);color:var(--text-muted);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
         </div>`
      : `<div class="col-center"><button class="btn-icon-delete" onclick="removeDeviceFromList(${index})" title="Remove"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>`;

    const roleVal = devObj.role || '';
    const roleOptions = ['', ...DEVICE_ROLE_OPTIONS].map(r =>
      `<option value="${r}" ${roleVal === r ? 'selected' : ''}>${r || '—'}</option>`
    ).join('');
    const safeId = devObj.name.replace(/[^a-zA-Z0-9_-]/g, '_');
    const dsPlat = (devStatusMap[devObj.name] || {}).platform || '';
    const modelPlaceholder = dsPlat || 'e.g. 7050CX3-32S';

    const mlagPeerVal = devObj.mlagPeer || '';
    const mlagPeerOptions = ['', ...currentDeviceManagerList
      .filter(d => d.name !== devObj.name && d.type !== 'non-arista')
      .map(d => d.name)
    ].map(n => `<option value="${n}" ${mlagPeerVal === n ? 'selected' : ''}>${n ? _fmtDev(n) : '—'}</option>`).join('');

    li.innerHTML = `
<div class="col-center"><span class="reorder-handle"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span></div>
<div class="col-center" title="Toggle Visibility">
<input type="checkbox" style="cursor:pointer;" ${isChecked}
onchange="toggleDeviceVisibility(${index})">
</div>
<div class="col-center">${tidHtml}</div>
<div class="col-center">${didHtml}</div>
<div class="col-left"><div class="dev-name-cell">
  <input class="dev-name-inp${wasChanged ? ' dev-name-changed' : ''}" type="text" value="${escapeHtml(devObj.name)}" placeholder="dns-name" spellcheck="false" oninput="DeviceManagerUpdateName(${index}, this)">
  <span class="dev-name-was" style="display:${wasChanged ? 'block' : 'none'}">${wasChanged ? `was: ${escapeHtml(devObj.originalName)}` : ''}</span>
  <span class="dev-name-error" style="display:none;"></span>
  <input class="dev-hostname-inp" type="text" value="${escapeHtml(devObj.hostname || '')}" placeholder="hostname (optional)" spellcheck="false" oninput="DeviceManagerUpdateHostname(${index}, this.value)">
  <span id="devHostnameWas_${index}" class="dev-name-was" style="display:${hostnameWasChanged ? 'block' : 'none'}">${hostnameWasChanged ? `was: ${escapeHtml(devObj._origHostname)}` : ''}</span>
</div></div>
<div class="col-center">${typeBadge}</div>
<div class="dev-role-cell"><select class="role-select${roleChanged ? ' changed' : ''}" onchange="setDeviceRole(${index},this.value)" title="Device role — drives VXLAN/EVPN config generation">${roleOptions}</select></div>
<div class="dev-role-cell"><select class="role-select mlag-peer-select${mlagChanged ? ' changed' : ''}" onchange="setDeviceMlagPeer(${index},this.value)" title="MLAG peer — explicit pair declaration; server enforces bidirectionality">${mlagPeerOptions}</select></div>
<div class="dev-label-cell" data-label-index="${index}">${renderDeviceLabelPills(devObj.labels || [], index)}</div>
${deleteCell}
<div class="dev-meta-row">
  <span class="dev-meta-label">Model</span>
  <input class="dev-meta-inp" id="devModel_${safeId}" type="text" value="${escapeHtml(devObj.model || '')}" placeholder="${escapeHtml(modelPlaceholder)}" spellcheck="false" oninput="updateDeviceMeta(${index},'model',this.value)">
  <span class="dev-meta-label">Rack</span>
  <input class="dev-meta-inp" id="devRack_${safeId}" type="text" value="${escapeHtml(devObj.rack || '')}" placeholder="e.g. R14" spellcheck="false" oninput="updateDeviceMeta(${index},'rack',this.value)">
</div>
`;
    listEl.appendChild(li);
  });

  if (sortableInstance) {
    sortableInstance.destroy();
    sortableInstance = null;
  }

  if (window.Sortable) {
    new Sortable(listEl, {
      animation: 150, handle: '.reorder-handle', ghostClass: 'sortable-ghost',
      onEnd: function (evt) {
        const item = currentDeviceManagerList.splice(evt.oldIndex, 1)[0];
        currentDeviceManagerList.splice(evt.newIndex, 0, item);
        pendingDeviceManagerDeleteIndex = -1;
        DeviceManagerCheckChanges();
        DeviceManager();
      }
    });
  }
  // Resize dialog height to fit device count
  requestAnimationFrame(autoResizePanelHeight);
}

// --- DEVICE LABEL HELPERS ---

function renderDeviceLabelPills(labels, index) {
  if (!labels || labels.length === 0) {
    return `<button class="dev-label-add-btn" onclick="openLabelPicker(${index})">+ label</button>`;
  }
  let html = '';
  labels.forEach(lbl => {
    const c = ROLE_COLORS[lbl] || { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' };
    html += `<span class="dev-label-pill" style="background:${c.bg};color:${c.text};border-color:${c.border};"
      onclick="openLabelPicker(${index})">${lbl}</span>`;
  });
  return html;
}

function buildLabelsMap() {
  const map = {};
  currentDeviceManagerList.forEach(d => {
    if (d.labels && d.labels.length > 0) map[d.name] = d.labels;
  });
  return map;
}

function buildHostnamesMap() {
  const map = {};
  currentDeviceManagerList.forEach(d => {
    if (d.hostname && d.hostname.trim()) map[d.name] = d.hostname.trim();
  });
  return map;
}

function buildRolesMap() {
  const map = {};
  currentDeviceManagerList.forEach(d => {
    if (d.role && d.role.trim()) map[d.name] = d.role.trim().toUpperCase();
  });
  return map;
}

function setDeviceType(index) {
  const dev = currentDeviceManagerList[index];
  if (!dev) return;
  const role = (dev.role || '').toUpperCase();
  if (role === 'IXIA' || role === 'SPIRENT') return; // role-managed, toggle disabled
  dev.type = dev.type === 'non-arista' ? 'full' : 'non-arista';
  DeviceManagerCheckChanges();
  DeviceManager();
}

function setDeviceRole(index, value) {
  const dev = currentDeviceManagerList[index];
  if (!dev) return;
  dev.role = value ? value.toUpperCase() : '';
  DeviceManagerCheckChanges();
  DeviceManager();
}

function buildMlagPeersMap() {
  const map = {};
  currentDeviceManagerList.forEach(d => {
    map[d.name] = d.mlagPeer || '';
  });
  return map;
}

function setDeviceMlagPeer(index, value) {
  const dev = currentDeviceManagerList[index];
  if (!dev) return;
  dev.mlagPeer = value || '';
  DeviceManagerCheckChanges();
  DeviceManager();
}

function buildMetadataMap() {
  const map = {};
  currentDeviceManagerList.forEach(d => {
    const model = (d.model || '').trim();
    const rack  = (d.rack  || '').trim();
    if (model || rack) map[d.name] = { model, rack };
  });
  return map;
}

function updateDeviceMeta(index, field, value) {
  const dev = currentDeviceManagerList[index];
  if (!dev) return;
  dev[field] = value;
  DeviceManagerCheckChanges();
}

function openLabelPicker(index) {
  const existing = document.getElementById('labelEditorRow');
  if (existing && existing.dataset.labelEditorFor == index) {
    closeLabelPicker();
    return;
  }
  closeLabelPicker();
  // Find the li row for this device
  const cell = document.querySelector(`[data-label-index="${index}"]`);
  if (!cell) return;
  const li = cell.closest('li');
  if (!li) return;

  const sub = document.createElement('li');
  sub.id = 'labelEditorRow';
  sub.dataset.labelEditorFor = index;
  sub.innerHTML = buildLabelEditorHTML(index);
  li.after(sub);
}

function buildLabelEditorHTML(index) {
  const dev = currentDeviceManagerList[index];
  const current = dev ? (dev.labels || []) : [];
  const maxReached = current.length >= 5;
  // All labels are custom — no predefined chips
  let customChips = '';
  current.forEach(lbl => {
    const c = ROLE_COLORS[lbl] || { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' };
    customChips += `<span style="display:inline-flex;align-items:center;gap:2px;background:${c.bg};color:${c.text};border:1px solid ${c.border};border-radius:3px;padding:1px 4px;font-size:10px;font-weight:700;letter-spacing:0.3px;">${lbl}<button onclick="toggleDeviceLabel(${index},'${lbl}')" title="Remove ${lbl}" style="background:none;border:none;cursor:pointer;color:${c.text};padding:0 0 0 2px;line-height:1;display:inline-flex;align-items:center;"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>`;
  });

  const customDisabled = maxReached ? 'disabled' : '';
  const customPlaceholder = maxReached ? 'Max 5 reached' : 'Custom label…';
  return `<div class="label-editor-row">
    <span style="font-size:10px;font-weight:700;color:#94a3b8;white-space:nowrap;">TAGS:</span>
    <div style="display:flex;flex-wrap:wrap;gap:4px;flex:1;">${customChips}</div>
    <input id="customLabelInput_${index}" type="text" maxlength="16" placeholder="${customPlaceholder}"
      ${customDisabled}
      style="font-size:10px;padding:2px 6px;border:1px solid #cbd5e1;border-radius:4px;width:90px;height:20px;font-family:'JetBrains Mono',monospace;${maxReached ? 'opacity:0.4;' : ''}"
      onkeydown="if(event.key==='Enter'){addCustomLabel(${index})}"
      onclick="event.stopPropagation()">
    <button onclick="addCustomLabel(${index})" ${customDisabled}
      style="font-size:10px;padding:2px 6px;background:#3b82f6;color:white;border:none;border-radius:4px;cursor:${maxReached ? 'not-allowed' : 'pointer'};height:20px;font-family:'JetBrains Mono',monospace;${maxReached ? 'opacity:0.4;' : ''}">Add</button>
    <button onclick="closeLabelPicker()" class="label-editor-done" style="display:inline-flex;align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`;
}

function addCustomLabel(index) {
  const input = document.getElementById(`customLabelInput_${index}`);
  if (!input) return;
  const val = input.value.trim().toUpperCase();
  if (!val) return;
  toggleDeviceLabel(index, val);
}

function closeLabelPicker() {
  const sub = document.getElementById('labelEditorRow');
  if (sub) sub.remove();
}

function toggleDeviceLabel(index, label) {
  const dev = currentDeviceManagerList[index];
  if (!dev.labels) dev.labels = [];
  const i = dev.labels.indexOf(label);
  if (i !== -1) dev.labels.splice(i, 1);
  else if (dev.labels.length < 5) dev.labels.push(label);

  // Update the pill display in the row
  const cell = document.querySelector(`[data-label-index="${index}"]`);
  if (cell) cell.innerHTML = renderDeviceLabelPills(dev.labels, index);

  DeviceManagerCheckChanges();

  // Refresh the editor sub-row in place (keep it open)
  const sub = document.getElementById('labelEditorRow');
  if (sub && sub.dataset.labelEditorFor == index) sub.innerHTML = buildLabelEditorHTML(index);
}

// Checks if current state differs from the initial snapshot
function DeviceManagerCheckChanges() {
  const currentState = JSON.stringify(currentDeviceManagerList);
  isDeviceManagerDirty = (currentState !== initialDeviceManagerState);
  DeviceManagerSaveButton();
}

function addDevicesToList() {
  const input = document.getElementById("newDeviceInput");
  const btn = document.getElementById("btnAddDevice");
  const isNonArista = document.getElementById("chkNonArista").checked;
  const val = input.value.trim();

  if (!val) { input.focus(); return; }

  const originalText = "Add";

  btn.innerText = "Adding...";
  btn.disabled = true;
  btn.style.opacity = "0.7";

  google.script.run.withSuccessHandler(newDevNames => {
    if (!newDevNames || newDevNames.length === 0) {
      alert("No valid devices found.");
      resetAddBtn();
      return;
    }

    let addedCount = 0;
    newDevNames.forEach(name => {
      const exists = currentDeviceManagerList.some(d => d.name.toLowerCase() === name.toLowerCase());
      if (!exists) {
        // ID STRATEGY: Mark as "NEW".
        // The render loop will assign the next sequential number (e.g., 3) automatically.
        currentDeviceManagerList.push({
          name: name,
          originalName: name,
          type: isNonArista ? 'non-arista' : 'full',
          role: '',
          mlagPeer: '',
          _origTID: "NEW",
          _origDID: "NEW",
          isVisible: true,
          labels: [],
          hostname: ""
        });
        addedCount++;
      }
    });

    if (addedCount > 0) {
      DeviceManagerCheckChanges();
      input.value = "";
      DeviceManager();

      const scrollContainer = document.getElementById("reorderScrollContainer");
      if (scrollContainer) {
        setTimeout(() => { scrollContainer.scrollTop = scrollContainer.scrollHeight; }, 50);
      }

      btn.innerText = "Added!";
      btn.style.background = "#10b981";
      setTimeout(() => { resetAddBtn(); }, 1200);
    } else {
      alert("Device(s) already in the list.");
      resetAddBtn();
    }
    input.focus();

  }).withFailureHandler(err => {
    setStatus("Error: " + err.message, "status-error");
    resetAddBtn();
  }).parseAndExpandDevices(val);

  function resetAddBtn() {
    btn.innerText = originalText;
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.background = "";
  }
}

function removeDeviceFromList(index) {
  pendingDeviceManagerDeleteIndex = index;
  DeviceManager();
}

function confirmRemoveDevice() {
  if (pendingDeviceManagerDeleteIndex >= 0) {
    currentDeviceManagerList.splice(pendingDeviceManagerDeleteIndex, 1);
    pendingDeviceManagerDeleteIndex = -1;
    DeviceManagerCheckChanges();
    DeviceManager();
  }
}

function cancelRemoveDevice() {
  pendingDeviceManagerDeleteIndex = -1;
  DeviceManager();
}

function toggleDeviceVisibility(index) {
  if (currentDeviceManagerList[index]) {
    currentDeviceManagerList[index].isVisible = !currentDeviceManagerList[index].isVisible;
    DeviceManagerCheckChanges(); // Marks button as "Save *"
  }
}

function DeviceManagerUpdateName(index, input) {
  const newName = input.value.trim();
  const cell = input.closest('.dev-name-cell');
  const errEl = cell.querySelector('.dev-name-error');
  const wasEl = cell.querySelector('.dev-name-was');
  const dev = currentDeviceManagerList[index];

  input.classList.remove('has-error');
  errEl.style.display = 'none';

  if (!newName || !/^[a-zA-Z0-9_\-]{1,64}$/.test(newName)) {
    errEl.textContent = 'Alphanumeric, hyphens, underscores only (max 64).';
    errEl.style.display = 'block';
    input.classList.add('has-error');
    return;
  }
  if (currentDeviceManagerList.some((d, i) => i !== index && d.name.toLowerCase() === newName.toLowerCase())) {
    errEl.textContent = 'Name already exists.';
    errEl.style.display = 'block';
    input.classList.add('has-error');
    return;
  }

  dev.name = newName;
  const wasChanged = dev.originalName && newName !== dev.originalName;
  wasEl.textContent = wasChanged ? `was: ${dev.originalName}` : '';
  wasEl.style.display = wasChanged ? 'block' : 'none';
  input.classList.toggle('dev-name-changed', !!wasChanged);
  isDeviceManagerDirty = true;
  DeviceManagerCheckChanges();
  DeviceManagerSaveButton();
}

function DeviceManagerUpdateHostname(index, value) {
  const dev = currentDeviceManagerList[index];
  if (!dev) return;
  dev.hostname = value.trim();

  DeviceManagerCheckChanges();
  DeviceManagerSaveButton();
  const wasSpan = document.getElementById('devHostnameWas_' + index);
  if (wasSpan && dev._origHostname !== undefined) {
    const changed = dev.hostname !== dev._origHostname;
    wasSpan.textContent = changed ? 'was: ' + dev._origHostname : '';
    wasSpan.style.display = changed ? 'block' : 'none';
  }
}

/**
* UPDATED SAVE LOGIC (Optimized)
* Skips spreadsheet rebuild if only "Visibility" changed.
*/
/* --- UPDATED SAVE LOGIC (Fixes 1->2 Persisting Issue) --- */
function saveDeviceChanges() {
  const btn = document.getElementById("btnSaveOrder");
  const origText = "Save Changes";

  btn.innerText = "Analyzing...";
  btn.disabled = true;

  // 1. Detect Structural Changes
  let initialList = [];
  try { initialList = JSON.parse(initialDeviceManagerState); } catch (e) { }

  const currentStructure = JSON.stringify(currentDeviceManagerList.map(d => ({ name: d.name, type: d.type, hostname: d.hostname || "" })));
  const initialStructure = JSON.stringify(initialList.map(d => ({ name: d.name, type: d.type, hostname: d.hostname || "" })));

  const isStructureDirty = (currentStructure !== initialStructure);

  // 2. Prepare Hidden List
  const hiddenList = [];
  currentDeviceManagerList.forEach(d => {
    if (!d.isVisible) hiddenList.push(d.name);
  });

  // --- DEFINITION: Success Handler ---
  const handleSuccess = () => {
    btn.innerText = "Saved!";
    btn.style.background = "#10b981"; // Green

    // ============================================================
    // 🛑 CRITICAL FIX: COMMIT NEW BASELINE (Reset IDs to match new order)
    // ============================================================
    let tempAristaCounter = 0;

    currentDeviceManagerList.forEach((d, index) => {
      const isNonArista = (d.type === 'non-arista');

      // 1. Commit Name (Clear "Rename" status)
      d.originalName = d.name;

      // 2. Commit Topology ID (Linear 1..N)
      d._origTID = index + 1;

      // 3. Commit Device ID (Selective Increment)
      if (!isNonArista) {
        tempAristaCounter++;
        d._origDID = tempAristaCounter; // e.g. Becomes '2' permanently
      } else {
        d._origDID = "-";
      }
    });
    // ============================================================

    // Reset Dirty Flags using the UPDATED list
    initialDeviceManagerState = JSON.stringify(currentDeviceManagerList);
    isDeviceManagerDirty = false;

    setTimeout(() => {
      // 1. Reset UI
      btn.innerText = origText;
      btn.disabled = false;
      btn.style.background = "";

      DeviceManagerCheckChanges();
      DeviceManager(); // Will now render Blue IDs (e.g. "2")

      // 2. TRIGGER REFRESH
      dbg("Triggering Auto-Refresh...");
      // Build status message naming added/removed devices
      let dmMsg = 'Device Manager saved';
      try {
        const prevNames = new Set(initialList.map(d => d.name));
        const currNames = new Set(currentDeviceManagerList.map(d => d.name));
        const added = currentDeviceManagerList.filter(d => !prevNames.has(d.name)).map(d => d.name);
        const removed = [...prevNames].filter(n => !currNames.has(n));
        const parts = [];
        if (added.length) parts.push('+' + added.join(', +'));
        if (removed.length) parts.push('\u2212' + removed.join(', \u2212'));
        if (parts.length) dmMsg += ': ' + parts.join(' ');
      } catch (e) {}
      if (typeof showGlobalLoading === 'function') showGlobalLoading("Updating Topology...");
      setStatus(dmMsg + ' \u2014 topology refresh\u2026', 'status-info');
      if (typeof fetchData === "function") fetchData(true);

    }, 1000);
  };

  const handleError = (err) => {
    setStatus("Error: " + err.message, "status-error");
    btn.innerText = origText;
    btn.disabled = false;
    btn.style.background = "";
  };

  // Helper: save hostnames then call final success handler
  const saveHostnamesAndFinish = () => {
    google.script.run
      .withSuccessHandler(handleSuccess)
      .withFailureHandler(handleError)
      .saveDeviceHostnames(buildHostnamesMap());
  };

  // Helper: save mlag peers → done
  const saveMetadataAndFinish = () => {
    google.script.run
      .withSuccessHandler(() => {
        deviceMetadata = buildMetadataMap();
        _refreshModelLines();
        handleSuccess();
      })
      .withFailureHandler(handleError)
      .saveDeviceMetadata(buildMetadataMap());
  };

  const saveMlagPeersAndFinish = () => {
    google.script.run
      .withSuccessHandler(saveMetadataAndFinish)
      .withFailureHandler(handleError)
      .saveDeviceMlagPeers(buildMlagPeersMap());
  };

  // Helper: save roles → mlag peers → done
  const saveRolesAndFinish = () => {
    const rolesMap = buildRolesMap();
    const nonAristaRoles = new Set(['IXIA', 'SPIRENT']);
    // Role-based non-Arista (IXIA/SPIRENT) — handled server-side by saveDeviceRoles()
    const changedDevs = Object.entries(rolesMap).filter(([, r]) => nonAristaRoles.has(r)).map(([name]) => name);
    // Manually toggled non-EOS devices (not IXIA/SPIRENT role)
    const manualNonArista = currentDeviceManagerList
      .filter(d => d.type === 'non-arista' && !nonAristaRoles.has((d.role || '').toUpperCase()))
      .map(d => d.name);
    // Show Force Sync notice for all devices that need column collapse/expand
    const allNonArista = [...changedDevs, ...manualNonArista];
    if (allNonArista.length > 0) _nonAristaSyncNotice = allNonArista;
    google.script.run
      .withSuccessHandler(saveMlagPeersAndFinish)
      .withFailureHandler(handleError)
      .saveDeviceRoles(rolesMap, manualNonArista);
  };

  // Helper: save labels → roles → mlag peers → done
  const saveLabelsAndFinish = () => {
    google.script.run
      .withSuccessHandler(saveRolesAndFinish)
      .withFailureHandler(handleError)
      .saveDeviceLabels(buildLabelsMap());
  };

  // --- EXECUTION BRANCHING ---

  if (!isStructureDirty) {
    // ⚡ FAST PATH (Visibility + Labels)
    // Save hostnames FIRST — before saveDeviceLabels bumps DATA_VERSION.
    // If hostnames were saved after the version bump, a poller-triggered fetch
    // could read stale (empty) hostname data and cache it, then block the
    // forced refresh in handleSuccess via the isFetching guard.
    dbg("Fast Path: Saving hostnames then visibility + labels...");
    btn.innerText = "Saving...";

    google.script.run
      .withSuccessHandler(() => {
        google.script.run
          .withSuccessHandler(saveLabelsAndFinish)
          .withFailureHandler(handleError)
          .saveDeviceVisibility(hiddenList);
      })
      .withFailureHandler(handleError)
      .saveDeviceHostnames(buildHostnamesMap());

  } else {
    // 🐢 SLOW PATH (Reorder/Rename + Visibility + Labels)
    // Pass hostnamesMap to processDeviceBatch so it saves hostnames BEFORE
    // bumping DATA_VERSION — same race-condition fix as the fast path.
    dbg("Slow Path: Rebuilding sheet...");
    btn.innerText = "Reordering Sheet...";
    showGlobalLoading('Preparing sheet rebuild...');
    const rebuildPollTimer = setInterval(() => {
      google.script.run.withSuccessHandler(msg => {
        if (!msg) return;
        const msgEl = document.getElementById('loading-message');
        if (msgEl) msgEl.innerText = msg;
      }).getSyncStatus();
    }, 600);

    const renames = currentDeviceManagerList.filter(d => d.name !== d.originalName).map(d => ({ old: d.originalName, new: d.name }));
    const finalOrder = currentDeviceManagerList.map(d => ({ name: d.name, type: d.type, hostname: d.hostname || "" }));

    const _guard = setTimeout(() => {
      clearInterval(rebuildPollTimer);
      hideGlobalLoading();
      setStatus("Sheet rebuild timed out — try again", "status-error");
      btn.innerText = origText;
      btn.disabled = false;
    }, 60000);

    google.script.run
      .withSuccessHandler(() => {
        clearTimeout(_guard);
        clearInterval(rebuildPollTimer);
        hideGlobalLoading();
        google.script.run
          .withSuccessHandler(saveLabelsAndFinish)
          .withFailureHandler(handleError)
          .saveDeviceVisibility(hiddenList);
      })
      .withFailureHandler(err => {
        clearTimeout(_guard);
        clearInterval(rebuildPollTimer);
        hideGlobalLoading();
        handleError(err);
      })
      .processDeviceBatch(renames, finalOrder, buildHostnamesMap());
  }
}

// 2. HELPER: Prepares data for comparison (removes UI artifacts)
function SheetColumnManagerCleanState(list) {
  return list.map(item => ({
    key: item.key,
    label: item.label,
    options: item.options || []
  }));
}

// 3. CHECKER: Determines if Orange or Green
function SheetColumnManagerCheckChanges() {
  const currentState = JSON.stringify(SheetColumnManagerCleanState(currentSheetColumnManagerList));
  isSheetColumnManagerDirty = (currentState !== initialSheetColumnManagerState);
  SheetColumnManagerSaveButton();
}

// 4. VISUALS: Toggles Button Color

}

// 5. INPUT HANDLERS (Must trigger the check)
function SheetColumnManagerUpdateLabel(key, newLabel, inputEl) {
  const item = currentSheetColumnManagerList.find(i => i.key === key);
  if (item) {
    item.label = newLabel;

    // 1. Visual Logic: Check against snapshot
    const original = SheetColumnManagerGetOriginalItem(key);
    // It is modified if it's New (no original) OR value doesn't match original
    const isModified = !original || (original.label !== newLabel);

    if (inputEl) {
      if (isModified) inputEl.classList.add("modified-highlight");
      else inputEl.classList.remove("modified-highlight");
    }

    // Update "was: X" span in-place
    const safeKey = key.replace(/[^a-zA-Z0-9_-]/g, '_');
    const wasSpan = document.getElementById('schemaWas_' + safeKey);
    if (wasSpan && original) {
      const origLbl = original.label || original.key;
      const changed = newLabel !== origLbl;
      wasSpan.textContent = changed ? 'was: ' + origLbl : '';
      wasSpan.style.display = changed ? 'block' : 'none';
    }

    // 2. Global Button State
    SheetColumnManagerCheckChanges();
  }
}

function SheetColumnManagerUpdateOption(key, valStr, inputEl) {
  // Semicolon is the sole delimiter — commas inside an option value are preserved
  const arr = valStr.split(";").map(s => s.trim()).filter(s => s !== "");

  const item = currentSheetColumnManagerList.find(i => i.key === key);
  if (item) {
    item.options = arr;

    // 1. Visual Logic
    const original = SheetColumnManagerGetOriginalItem(key);
    const currJson = JSON.stringify(arr);
    const origJson = original ? JSON.stringify(original.options || []) : "[]";

    const isModified = !original || (currJson !== origJson);

    if (inputEl) {
      if (isModified) inputEl.classList.add("modified-highlight");
      else inputEl.classList.remove("modified-highlight");
    }

    // 2. Global Button State
    SheetColumnManagerCheckChanges();
  }
}

function SheetColumnManagerGetOriginalItem(key) {
  try {
    const parsed = JSON.parse(initialSheetColumnManagerState || "[]");
    return parsed.find(p => p.key === key);
  } catch (e) { return null; }
}

function SheetColumnManagerDeleteField(key) {
  if (!confirm(`Delete field '${key}'?`)) return;
  currentSheetColumnManagerList = currentSheetColumnManagerList.filter(i => i.key !== key);
  SheetColumnManager();
  SheetColumnManagerCheckChanges();
}

function SheetColumnManagerAddField() {
  const keyInput = document.getElementById("newFieldKey");
  const labelInput = document.getElementById("newFieldLabel");

  let label = labelInput.value.trim();
  let key = keyInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, "_");

  if (!label) { alert("Please enter a Description."); return; }
  if (!key) key = label.toLowerCase().replace(/[^a-z0-9]/g, "_");

  if (currentSheetColumnManagerList.some(i => i.key === key)) { alert("Field ID already exists."); return; }

  // Prefix collision guard: reject keys where one is a prefix of another (e.g. "xcvr" vs "xcvr_speed").
  // Such pairs cause silent data loss in rebuildSheet — the shorter key overwrites the longer one during backup.
  const newKeySuf = key + "_";
  const collision = currentSheetColumnManagerList.find(item => {
    const existing = item.key + "_";
    return existing !== newKeySuf && (newKeySuf.startsWith(existing) || existing.startsWith(newKeySuf));
  });
  if (collision) {
    alert(`Field ID "${key}" conflicts with existing field "${collision.key}": one is a prefix of the other.\n\nThis would silently corrupt column data during schema sync. Choose a different name.`);
    return;
  }

  currentSheetColumnManagerList.push({ key: key, label: label, options: [] });

  keyInput.value = "";
  labelInput.value = "";

  SheetColumnManagerCheckChanges();
  SheetColumnManager();

  const body = document.getElementById("sheetColumnManagerBody");
  body.scrollTop = body.scrollHeight;
}

function SheetColumnManager() {
  const body = document.getElementById("sheetColumnManagerBody");
  body.innerHTML = "";

  // 1. Parse the Snapshot for comparison
  let originalMap = new Map();
  let originalKeys = [];
  try {
    const parsed = JSON.parse(initialSheetColumnManagerState || "[]");
    parsed.forEach(p => {
      originalMap.set(p.key, p);
      originalKeys.push(p.key);
    });
  } catch (e) { }

  const ul = document.createElement("div");

  currentSheetColumnManagerList.forEach((item, index) => {
    // --- DIFF LOGIC ---
    const originalItem = originalMap.get(item.key);
    const isNew = !originalItem; // True if this field didn't exist in the snapshot

    // 1. Check Label (Description) Change
    let labelClass = "schema-label-input";
    if (isNew || (originalItem && item.label !== originalItem.label)) {
      labelClass += " modified-highlight";
    }

    // 2. Check Dropdown (Options) Change
    let areaClass = "schema-input-area";
    const currOpts = JSON.stringify(item.options || []);
    const origOpts = originalItem ? JSON.stringify(originalItem.options || []) : "[]";

    if (isNew || currOpts !== origOpts) {
      areaClass += " modified-highlight";
    }

    // 3. Check Key (ID) - Highlight if NEW
    // Existing keys can't change, but new keys should look "dirty"
    let keyClass = "schema-key-locked";
    if (isNew) {
      keyClass += " modified-highlight";
    }

    // 4. Index Display Logic
    let indexDisplay = `${index + 1}.`;
    let originalIdx = originalItem ? originalKeys.indexOf(item.key) : -1;

    // 5. "was: X" label text — only for existing (non-new) items with changed labels
    const safeSchemaKey = item.key.replace(/[^a-zA-Z0-9_-]/g, '_');
    const origLabel = originalItem ? (originalItem.label || originalItem.key) : '';
    const labelWasChanged = !isNew && originalItem && item.label !== originalItem.label;

    if (isNew) {
      indexDisplay = `<span style="color:#10b981;">+${index + 1}</span>`;
    } else if (originalIdx !== -1 && originalIdx !== index) {
      indexDisplay = `<span style="color:#d97706;">${originalIdx + 1}➜${index + 1}</span>`;
    }

    // --- RENDER HTML ---
    const valStr = (item.options || []).join("; ");
    const row = document.createElement("div");
    row.className = "schema-row";

    row.innerHTML = `
<div class="schema-handle" style="display:inline-flex;align-items:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
<div class="schema-idx">${indexDisplay}</div>

<div class="schema-content" style="flex:1;">
<div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
<!-- Added ', this' to onchange -->
<input type="text" class="${labelClass}"
value="${item.label || item.key}"
onchange="SheetColumnManagerUpdateLabel('${item.key}', this.value, this)"
placeholder="Description">

<div class="${keyClass}">${item.key}_</div>
</div>
<span id="schemaWas_${safeSchemaKey}" class="schema-was" style="display:${labelWasChanged ? 'block' : 'none'}">${labelWasChanged ? `was: ${escapeHtml(origLabel)}` : ''}</span>
<textarea class='${areaClass}'
onchange="SheetColumnManagerUpdateOption('${item.key}', this.value, this)">${valStr}</textarea>
</div>

<button class="schema-del" onclick="SheetColumnManagerDeleteField('${item.key}')" title="Remove"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
`;
    ul.appendChild(row);
  });

  body.appendChild(ul);

  // Sortable Logic (Drag & Drop)
  if (window.Sortable) {
    new Sortable(ul, {
      handle: '.schema-handle',
      animation: 150,
      onEnd: function (evt) {
        // Update List Order
        const item = currentSheetColumnManagerList.splice(evt.oldIndex, 1)[0];
        currentSheetColumnManagerList.splice(evt.newIndex, 0, item);

        // Trigger Global Check (Updates Save Button)
        SheetColumnManagerCheckChanges();

        // Re-render (Updates Index Numbers)
        SheetColumnManager();
      }
    });
  }
}

/**
* --- UPDATED SAVE FUNCTION ---
* Locks UI during the entire Save -> Sync chain
*/
function SheetColumnManagerSave() {
  if (isSheetColumnManagerSaving) return; // Guard: prevent concurrent saves
  isSheetColumnManagerSaving = true;

  const btn = document.getElementById("btnSheetColumnManagerSave");
  const origText = btn.innerText;

  // 1. Lock UI
  setUiBusy(true);
  btn.innerText = "Saving...";

  // Hoisted so the timeout handler can clean it up if the server hangs mid-sync
  let syncPollTimer = null;

  // Safety: unlock after 30s if server hangs
  if (sheetColumnManagerLockTimer) clearTimeout(sheetColumnManagerLockTimer);
  sheetColumnManagerLockTimer = setTimeout(() => {
    if (syncPollTimer) { clearInterval(syncPollTimer); syncPollTimer = null; }
    hideGlobalLoading();
    isSheetColumnManagerSaving = false;
    sheetColumnManagerLockTimer = null;
    setUiBusy(false);
    btn.innerText = origText;
    setStatus("Save timed out — server took too long. Please try again.", "status-error");
  }, 30000);

  const applyFormatting = document.getElementById("chkApplyFormatting").checked;

  // Prepare clean list for saving
  const cleanList = SheetColumnManagerCleanState(currentSheetColumnManagerList);

  // --- SMART CHANGE DETECTION ---
  // We compare the Current state vs the Initial Snapshot to decide what sync to run
  let oldList = [];
  try { oldList = JSON.parse(initialSheetColumnManagerState); } catch (e) { }

  // A. Check for Structural Changes (New Fields, Deleted Fields, Reordering)
  const oldKeys = oldList.map(i => i.key).join('|');
  const newKeys = cleanList.map(i => i.key).join('|');
  const isStructuralChange = (oldKeys !== newKeys);

  // B. Check for Dropdown Changes (Options changed)
  const oldOpts = JSON.stringify(oldList.map(i => i.options));
  const newOpts = JSON.stringify(cleanList.map(i => i.options));
  const isDropdownChange = (oldOpts !== newOpts);

  // 2. SAVE CONFIGURATION TO SERVER
  google.script.run
    .withSuccessHandler(res => {
      // --- STEP 3: HANDLE SYNCING (Chained) ---

      // Define what happens after Sync is done
      const onComplete = () => {
        isSheetColumnManagerSaving = false;
        clearTimeout(sheetColumnManagerLockTimer);
        sheetColumnManagerLockTimer = null;

        // Update Snapshot to new state (Reset Dirty Flag)
        initialSheetColumnManagerState = JSON.stringify(cleanList);
        isSheetColumnManagerDirty = false;

        btn.innerText = "Saved!";
        btn.style.background = "#10b981"; // Green

        setUiBusy(false); // Unlock UI
        SheetColumnManager();

        // Reset Button Text after delay
        setTimeout(() => {
          SheetColumnManagerSaveButton(); // Will set text to "Save & Sync"
          btn.disabled = false;
        }, 1500);

        // Structural or dropdown changes affect topology config data — refresh.
        // rebuildSheet does not bump DATA_VERSION, so the 4s poll won't catch this.
        if (isStructuralChange || isDropdownChange) {
          const columnManagerMsg = isStructuralChange
            ? 'Schema columns updated \u2014 topology refresh\u2026'
            : 'Schema dropdowns updated \u2014 topology refresh\u2026';
          setStatus(columnManagerMsg, 'status-info');
          if (typeof fetchData === 'function') fetchData(true);
        }
      };

      const onFailure = (err) => {
        isSheetColumnManagerSaving = false;
        clearTimeout(sheetColumnManagerLockTimer);
        sheetColumnManagerLockTimer = null;
        setUiBusy(false);
        btn.innerText = origText;
        SheetColumnManagerSaveButton();
        setStatus("Save OK, but Sync Failed: " + err.message, "status-error");
      };

      // Execute the appropriate Sync type
      if (isStructuralChange) {
        btn.innerText = "Checking...";
        // Pre-check: detect orphaned columns with data before syncing
        google.script.run
          .withSuccessHandler(orphans => {
            let deleteOrphans = null;
            if (orphans.length > 0) {
              const withData = orphans.filter(o => o.hasData);
              let msg = `${orphans.length} column(s) will be removed from the schema:\n`;
              orphans.forEach(o => { msg += `  \u2022 ${o.key.replace(/_$/, '')}${o.hasData ? '  \u26a0 contains data' : ''}\n`; });
              if (withData.length > 0) {
                msg += `\n\u26a0 ${withData.length} column(s) have data that will be permanently lost.\n`;
              }
              msg += '\nDelete these columns? Cancel = keep them.';
              deleteOrphans = confirm(msg);
            }
            btn.innerText = "Syncing Columns...";
            showGlobalLoading('Starting column sync...');
            syncPollTimer = setInterval(() => {
              google.script.run.withSuccessHandler(msg => {
                if (!msg) return;
                const msgEl = document.getElementById('loading-message');
                if (msgEl) msgEl.innerText = msg;
              }).getSyncStatus();
            }, 600);
            // 60s guard: schema op tier — GAS framework failure fires neither handler
            const _colSyncGuard = setTimeout(() => {
              clearInterval(syncPollTimer);
              hideGlobalLoading();
              btn.innerText = origText;
              btn.disabled = false;
              setStatus('Column sync timed out — try again', 'status-error');
            }, 60000);
            // Full Sync: Add/Remove columns, Apply Formatting
            google.script.run
              .withSuccessHandler(() => { clearTimeout(_colSyncGuard); clearInterval(syncPollTimer); hideGlobalLoading(); onComplete(); })
              .withFailureHandler(err => { clearTimeout(_colSyncGuard); clearInterval(syncPollTimer); hideGlobalLoading(); onFailure(err); })
              .syncSchemaPreservingOrder(cleanList, applyFormatting, deleteOrphans);
          })
          .withFailureHandler(err => { onFailure(err); })
          .getOrphanedColumnsInfo(cleanList);
      }
      else if (isDropdownChange) {
        btn.innerText = "Updating Dropdowns...";
        // Light Sync: Just update validation rules (Fast)
        google.script.run
          .withSuccessHandler(onComplete)

  inputs.forEach(el => el.disabled = isBusy);

function _runForceSyncNow(btn, origHtml, applyFormatting, deleteOrphans) {
  btn.innerHTML = '<span class="btn-icon" style="display:inline-flex;align-items:center;animation:spin 1s linear infinite"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg></span> Syncing...';
  showGlobalLoading('Starting sync...');

  const syncPollTimer = setInterval(() => {
    google.script.run.withSuccessHandler(msg => {
      if (!msg) return;
      const msgEl = document.getElementById('loading-message');
      if (msgEl) msgEl.innerText = msg;
    }).getSyncStatus();
  }, 600);

  // Safety net: sync should never take more than 60s; if GAS hangs at framework level,
  // auto-recover so the UI is not permanently blocked.
  const _guard = setTimeout(() => {
    clearInterval(syncPollTimer);
    hideGlobalLoading();
    setUiBusy(false);
    btn.innerHTML = origHtml;
    setStatus("Force Sync timed out — try again", "status-error");
  }, 60000);

  google.script.run
    .withSuccessHandler(() => {
      clearTimeout(_guard);
      clearInterval(syncPollTimer);
      hideGlobalLoading();
      btn.innerHTML = '<span class="btn-icon" style="display:inline-flex;align-items:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Synced!';
      setUiBusy(false);
      // rebuildSheet does not bump DATA_VERSION — must refresh explicitly
      setStatus('Force Sync complete \u2014 topology refresh\u2026', 'status-info');
      if (typeof fetchData === 'function') fetchData(true);
      setTimeout(() => {
        btn.innerHTML = origHtml;
        // Re-scan after sync so badge reflects actual post-sync state
        google.script.run.withSuccessHandler(_updateForceSyncBadge).withFailureHandler(function() {}).getOrphanedColumnsInfo(null);
      }, 1500);
    })
    .withFailureHandler((err) => {
      clearTimeout(_guard);
      clearInterval(syncPollTimer);
      hideGlobalLoading();
      setUiBusy(false);
      btn.innerHTML = origHtml;
      setStatus('Sync Failed: ' + err.message, 'status-error');
    })
    .syncSchemaPreservingOrder(null, applyFormatting, deleteOrphans);
}

/**
* ==========================================
* 5. CORE TOPOLOGY RENDERING & INTERACTION
* ==========================================
*/
function getLocalCoords(elem) {
  let x = 0; let y = 0;
  let w = elem.offsetWidth;
  let h = elem.offsetHeight;
  let current = elem;
  let stop = document.getElementById("canvas-surface");

  while(current && current !== stop) {
    x += current.offsetLeft;
    y += current.offsetTop;
    current = current.offsetParent;
  }

  // Add a slight vertical push to hit the exact visual center of the port dot
  let visualCenterY = y + 2;

  return { x: x, y: visualCenterY, w: w, h: h, right: x + w, bottom: visualCenterY + h };
}

// --- ZOOM & PAN LOGIC (Enhanced with Dynamic Limits & Touch) ---
function setupZoomPan() {
  let viewport = document.getElementById("viewport");
  let surface = document.getElementById("canvas-surface");

  // 1. Wheel Interaction (Mouse Wheel + Trackpad Pinch)
  viewport.addEventListener('wheel', function (e) {
    e.preventDefault();

    if (surface) surface.style.transition = "none";

    // --- MODE A: ZOOM (Ctrl + Scroll OR Trackpad Pinch) ---
    if (e.ctrlKey) {
      let rect = viewport.getBoundingClientRect();
      let mx = e.clientX - rect.left;
      let my = e.clientY - rect.top;

      // Calculate current offset relative to zoom
      let xs = (mx - panX) / zoomLevel;
      let ys = (my - panY) / zoomLevel;

      // --- TRACKPAD DAMPENER ---
      // Trackpads send frequent small deltas. Reduce sensitivity to prevent explosions.
      let isTrackpad = Math.abs(e.deltaY) < 50;
      let sensitivity = isTrackpad ? 0.02 : 0.1;

      let delta = -e.deltaY;

      // Formula: NewZoom = OldZoom * (1 + (direction * sensitivity))
      let factor = 1 + (Math.sign(delta) * sensitivity);
      let newZoom = zoomLevel * factor;

      // --- DYNAMIC ZOOM LIMITS ---
      // Calculate how much we need to zoom out to fit the ENTIRE surface in the viewport
      // We take the smaller of the Width Ratio or Height Ratio.
      // e.g., if Viewport is 1000px and Content is 2000px, minZoom is 0.5.
      const minZoomW = viewport.clientWidth / surface.offsetWidth;
      const minZoomH = viewport.clientHeight / surface.offsetHeight;

      // Allow zooming out slightly past the "perfect fit" (0.9 factor) for padding,
      // but never go below 0.05 (sanity check).
      const fitZoom = Math.min(minZoomW, minZoomH) * 0.9;
      const dynamicMin = Math.max(fitZoom, 0.05);

      // Clamp: Cannot zoom out further than seeing the whole canvas
      if (newZoom < dynamicMin) newZoom = dynamicMin;
      if (newZoom > 5) newZoom = 5;

      // Adjust Pan to keep mouse/pinch center stable
      panX = mx - (xs * newZoom);
      panY = my - (ys * newZoom);

      zoomLevel = newZoom;
    }
    // --- MODE B: SCROLL/PAN (Regular Scroll) ---
    else {
      panX -= e.deltaX;
      panY -= e.deltaY;
    }

    updateTransform();

    clearTimeout(zoomTimer);
    zoomTimer = setTimeout(() => {
      if (surface) surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    }, 200);
  }, { passive: false });

  // 2. Mouse Pan (Desktop Drag)
  viewport.addEventListener('mousedown', function (e) {
    // Only allow pan on empty space or specific background elements
    if (e.target.id === 'viewport' || e.target.id === 'canvas-surface' || e.target.tagName === 'CANVAS' || e.target.tagName === 'svg') {
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      viewport.style.cursor = "grabbing";
      if (surface) surface.style.transition = "none";
    }
  });

  window.addEventListener('mousemove', function (e) {
    if (isGroupRectMode && activeDrawRect) { updateGroupRectDraw(e); return; }
    if (!isPanning) return;
    e.preventDefault();
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    if (!ticking) {
      window.requestAnimationFrame(function () {
        updateTransform();
        ticking = false;
      });
      ticking = true;
    }
  });

  window.addEventListener('mouseup', function () {
    if (isGroupRectMode && activeDrawRect) { endGroupRectDraw(); return; }
    if (isPanning) {
      isPanning = false;
      viewport.style.cursor = "grab";
      if (surface) surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    }
  });

  // 3. Touch Support (Mobile/Tablet Pinch & Drag)
  let initialPinchDist = null;
  let lastTouchX = 0;
  let lastTouchY = 0;
  let initialZoom = 1;

  viewport.addEventListener('touchstart', function (e) {
    if (surface) surface.style.transition = "none";

    if (e.touches.length === 1) {
      // Single Finger -> Pan
      isPanning = true;
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      // Two Finger -> Pinch Start
      isPanning = false; // Disable pan to focus on zoom
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      initialPinchDist = Math.hypot(dx, dy);
      initialZoom = zoomLevel; // Snapshot current zoom
    }
  }, { passive: false });

  viewport.addEventListener('touchmove', function (e) {
    e.preventDefault(); // Stop browser scrolling

    if (e.touches.length === 1 && isPanning) {
      // Pan Logic
      let dx = e.touches[0].clientX - lastTouchX;
      let dy = e.touches[0].clientY - lastTouchY;
      panX += dx;
      panY += dy;
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
      updateTransform();
    } else if (e.touches.length === 2 && initialPinchDist > 0) {
      // Pinch Zoom Logic
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      let currentDist = Math.hypot(dx, dy);

      // Calculate zoom relative to start of gesture
      let scaleFactor = currentDist / initialPinchDist;
      let newZoom = initialZoom * scaleFactor;

      // --- DYNAMIC ZOOM LIMITS (Same logic as Mouse Wheel) ---
      const minZoomW = viewport.clientWidth / surface.offsetWidth;
      const minZoomH = viewport.clientHeight / surface.offsetHeight;
      const fitZoom = Math.min(minZoomW, minZoomH) * 0.9;
      const dynamicMin = Math.max(fitZoom, 0.05);

      // Clamp limits
      if (newZoom < dynamicMin) newZoom = dynamicMin;
      if (newZoom > 5) newZoom = 5;

      zoomLevel = newZoom;
      updateTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', function (e) {
    isPanning = false;
    initialPinchDist = null;
    if (e.touches.length === 0 && surface) {
      surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    }
  });
}

function updateTransform() {
  let surface = document.getElementById("canvas-surface");
  let vp = document.getElementById("viewport");

  // FIX: Safety check for bounds
  if (!contentBounds || typeof contentBounds.maxX === 'undefined') {
    contentBounds = { minX: 0, minY: 0, maxX: 2000, maxY: 2000 };
  }

  if (surface && vp) {
    const vpW = vp.clientWidth;
    const vpH = vp.clientHeight;

    // --- CLAMPING LOGIC ---
    // 1. Calculate the limits based on Zoom Level
    // The logic: The content edge (plus padding) cannot move past the viewport edge.

    // Left Limit: Rightmost edge of content cannot go left of the Left Padding
    // panX > UNIFIED_PAD - (contentBounds.maxX * zoomLevel)
    const minPanX = UNIFIED_PAD - (contentBounds.maxX * zoomLevel);

    // Right Limit: Leftmost edge of content cannot go right of the Viewport - Padding
    // panX < vpW - UNIFIED_PAD - (contentBounds.minX * zoomLevel)
    const maxPanX = vpW - UNIFIED_PAD - (contentBounds.minX * zoomLevel);

    // Top Limit
    const minPanY = UNIFIED_PAD - (contentBounds.maxY * zoomLevel);

    // Bottom Limit
    const maxPanY = vpH - UNIFIED_PAD - (contentBounds.minY * zoomLevel);

    // 2. Apply Clamping
    // If content is smaller than screen, we prioritize the top/left limits
    // to keep it somewhat centered or logical.

    if (minPanX < maxPanX) {
      panX = Math.max(minPanX, Math.min(panX, maxPanX));
    } else {
      // Special case: Content is small/Zoom is low -> Keep it generally visible
      panX = Math.max(maxPanX, Math.min(panX, minPanX));
    }

    if (minPanY < maxPanY) {
      panY = Math.max(minPanY, Math.min(panY, maxPanY));
    } else {
      panY = Math.max(maxPanY, Math.min(panY, minPanY));
    }

    // --- APPLY CSS ---
    surface.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  }
}

    const link = linkMap[id];
    if (link) {
      // Link-keyed error: flag both endpoints' devices
      devsWithErrors.add(link.u.split(':')[0]);
      devsWithErrors.add(link.v.split(':')[0]);
    } else if (id.includes(':')) {
      // Port-keyed error (e.g. duplicate interface on unconnected port)
      devsWithErrors.add(id.split(':')[0]);
    }
  });
  document.querySelectorAll('.node[data-id]').forEach(el => {
    if (devsWithErrors.has(el.dataset.id)) {
      el.style.display = '';
      delete el.dataset.auditHidden;

      el.style.display = 'none';
      el.dataset.auditHidden = '1';
