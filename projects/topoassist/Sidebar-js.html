  requestAnimationFrame(redrawLinks);
  requestAnimationFrame(refreshGroupRects);
}

function runValidation(logIssues) {
  // 1. Initialize State
  let portErrorCount = 0;
  validationErrors = {};

  const statusEl = document.getElementById("status");

  // 2. Define Helpers
  const normalizeVlan = (val) => {
    if (!val) return "";
    const expanded = Array.from(parseVlanInput(String(val))).sort((a, b) => a - b);
    return expanded.join(',');
  };

  const extractVlans = (str) => String(str).match(/\d+/g) || [];

  // Valid mode pairs for a connected link (both directions listed explicitly)
  const VALID_MODE_PAIRS = new Set([
    'l2-et-access|l2-et-access',
    'l2-et-access|l3-et-int',   'l3-et-int|l2-et-access',
    'l3-et-int|l3-et-int',
    'l2-et-trunk|l2-et-trunk',
    'l2-et-trunk|l3-et-sub-int', 'l3-et-sub-int|l2-et-trunk',
    'l3-et-sub-int|l3-et-sub-int',
    'l2-po-access|l2-po-access',
    'l2-po-access|l3-po-int',   'l3-po-int|l2-po-access',
    'l3-po-int|l3-po-int',
    'l2-po-trunk|l2-po-trunk',
    'l2-po-trunk|l3-po-sub-int', 'l3-po-sub-int|l2-po-trunk',
    'l3-po-sub-int|l3-po-sub-int',
  ]);

  const flagErrorOnPort = (pid, msg) => {
    const links = portMap[pid] || [];
    links.forEach(lid => {
      if (!validationErrors[lid]) validationErrors[lid] = [];
      if (!validationErrors[lid].includes(msg)) {
        validationErrors[lid].push(msg);
        portErrorCount++;
      }
    });
  };

  // 3. Data Structures for Global Aggregation
  const vlanGwUsage = {};

  // Full reset — counts for all checks; enabled/disabled only affects flagging, not counting
  auditCheckHadIssue = {};

  // =========================================================
  // CHECK GROUP 1: LINK-BASED CHECKS
  // =========================================================
  if (typeof globalLinks !== 'undefined' && globalLinks) {
    globalLinks.forEach(link => {
      let nodeA = allNodesData[link.u];
      let nodeB = allNodesData[link.v];
      if (!nodeA || !nodeB) return;

      // --- PO CONSISTENCY CHECKS ---
      const poA = (nodeA.details.po_ || '').trim();
      const poB = (nodeB.details.po_ || '').trim();
      const poASet = poA !== '';
      const poBSet = poB !== '';
      if (poASet && poBSet && poA !== poB) {
        auditCheckHadIssue.auditFlagPoMismatch = (auditCheckHadIssue.auditFlagPoMismatch || 0) + 1;
        if (auditFlagPoMismatch) {
          const msg = `[FAIL] Po Mismatch: ${nodeA.device} has ${poA} but ${nodeB.device} has ${poB}`;
          flagErrorOnPort(link.u, msg);
          flagErrorOnPort(link.v, msg);
        }
      } else if (poASet !== poBSet) {
        auditCheckHadIssue.auditFlagPoAsymmetry = (auditCheckHadIssue.auditFlagPoAsymmetry || 0) + 1;
        if (auditFlagPoAsymmetry) {
          const setDev  = poASet ? nodeA.device : nodeB.device;
          const setVal  = poASet ? poA : poB;
          const setPort = poASet ? link.u : link.v;
          const misPort = poASet ? link.v : link.u;
          const msg = `[FAIL] Po Asymmetry: ${setDev} has ${setVal} but peer has no po_ set`;
          flagErrorOnPort(setPort, msg);
          flagErrorOnPort(misPort, msg);
        }
      }

      // B. PAIR MISMATCH CHECKS (Speed & VLAN)
      const devAData = allDevicesData[nodeA.device];
      const devBData = allDevicesData[nodeB.device];
      const isNonEosLink = (devAData && devAData.type === 'non-arista') || (devBData && devBData.type === 'non-arista');

      if (!isNonEosLink) {
        let pairErrors = [];

        // C. VLAN MISMATCH
        let vlanA = normalizeVlan(nodeA.details.vlan_);
        let vlanB = normalizeVlan(nodeB.details.vlan_);
        if (vlanA !== vlanB) {
          auditCheckHadIssue.auditFlagVlanMismatch = (auditCheckHadIssue.auditFlagVlanMismatch || 0) + 1;
          if (auditFlagVlanMismatch) pairErrors.push(`VLAN Mismatch: ${_fmtDev(nodeA.device)}:${nodeA.name} (${vlanA}) \u2194 ${_fmtDev(nodeB.device)}:${nodeB.name} (${vlanB})`);
        }

        // D. MODE COMPATIBILITY
        const modeA = (nodeA.details.sp_mode_ || "").trim().toLowerCase();
        const modeB = (nodeB.details.sp_mode_ || "").trim().toLowerCase();
        if (modeA && modeB && !VALID_MODE_PAIRS.has(`${modeA}|${modeB}`)) {
          auditCheckHadIssue.auditFlagModeIncompat = (auditCheckHadIssue.auditFlagModeIncompat || 0) + 1;
          if (auditFlagModeIncompat) pairErrors.push(`Mode Incompatible: ${_fmtDev(nodeA.device)}:${nodeA.name} (${modeA}) \u2194 ${_fmtDev(nodeB.device)}:${nodeB.name} (${modeB})`);
        }

        // E. SPEED MISMATCH
        // Skip 'auto' and blank — only compare when both sides declare an explicit speed.
        // Direct comparison: 25g ↔ 10g flags, 25g ↔ 25g passes.
        const _spRaw = d => (d.details.et_speed_ || '').trim().toLowerCase();
        const spA = _spRaw(nodeA); const spB = _spRaw(nodeB);
        const _sp = s => (s === 'auto' || s === '') ? '' : s;
        const normSpA = _sp(spA); const normSpB = _sp(spB);
        if (normSpA && normSpB && normSpA !== normSpB) {
          auditCheckHadIssue.auditFlagSpeedMismatch = (auditCheckHadIssue.auditFlagSpeedMismatch || 0) + 1;
          if (auditFlagSpeedMismatch) pairErrors.push(`Speed Mismatch: ${_fmtDev(nodeA.device)} (${normSpA}) ↔ ${_fmtDev(nodeB.device)} (${normSpB})`);
        }

        if (pairErrors.length > 0) {
          validationErrors[link.id] = (validationErrors[link.id] || []).concat(pairErrors);
          portErrorCount++;
        }
      }
    });
  }

  // =========================================================
  // CHECK GROUP 2: NODE CONFIGURATION CHECKS
  // =========================================================
  // Only Et (Ethernet) and Vx (Vxlan/VTEP) are valid Arista int_ types.
  const validIntRegex = /^(Et|Vx)\d+/i;
  const _seenPoNoPeer = new Set();

  for (let nodeId in allNodesData) {
    let node = allNodesData[nodeId];
    if (!node || !node.details || !node.name) continue;

    let d = node.details;
    let configErrors = [];
    let connectedLinks = portMap[nodeId] || [];

    // --- Data Prep ---
    const mode = (d.sp_mode_ || "").toLowerCase();
    const svi = (d.svi_vlan_ || "").toLowerCase().trim();
    const ipType = (d.ip_type_ || "").toLowerCase();
    const portName = node.name.toLowerCase();

    // SVI is "On" if svi_vlan_ has any value ('all' or specific VLANs).
    // 'no' and '-' are explicit no-SVI markers — treated as blank (same as _parseSviVlans).
    let isSviOn = svi !== '' && svi !== 'no' && svi !== '-';
    if (portName.startsWith("vlan")) isSviOn = true;

    const hasIp = (ipType !== "" && ipType !== "-");

    // A. INTERFACE TYPE — only Et and Vx are valid Arista int_ types
    if (!validIntRegex.test(node.name)) {
      auditCheckHadIssue.auditFlagUnsupportedInt = (auditCheckHadIssue.auditFlagUnsupportedInt || 0) + 1;
      if (auditFlagUnsupportedInt) configErrors.push(`Unsupported Interface: '${node.name}' — only Et (Ethernet) or Vx (VTEP) allowed in int_.`);
    }

    // B. MLAG vs L3 CONFLICT
    if (d.isMlag && mode.includes("l3")) {
      auditCheckHadIssue.auditFlagMlagL3 = (auditCheckHadIssue.auditFlagMlagL3 || 0) + 1;
      if (auditFlagMlagL3) configErrors.push(`MLAG/L3 Conflict: Port is MLAG member but Mode is Layer 3. Must be L2.`);
    }

    // C. INVALID SVI (L3 Port + SVI Enabled)
    if (mode.startsWith("l3") && isSviOn && !portName.startsWith("vlan")) {
      auditCheckHadIssue.auditFlagInvalidSvi = (auditCheckHadIssue.auditFlagInvalidSvi || 0) + 1;
      if (auditFlagInvalidSvi) configErrors.push(`Invalid SVI: L3 interfaces cannot have SVI enabled.`);
    }

    // D. MISSING IP FOR SVI
    if (isSviOn && !hasIp) {
      auditCheckHadIssue.auditFlagMissingIpSvi = (auditCheckHadIssue.auditFlagMissingIpSvi || 0) + 1;
      if (auditFlagMissingIpSvi) configErrors.push(`Incomplete SVI: SVI is active but IP Type is blank.`);
    }

    // E. MISSING IP FOR L3
    if (mode.startsWith("l3") && !portName.startsWith("vlan") && !hasIp) {
      auditCheckHadIssue.auditFlagMissingIpL3 = (auditCheckHadIssue.auditFlagMissingIpL3 || 0) + 1;
      if (auditFlagMissingIpL3) configErrors.push(`Incomplete L3: Routed interface (${mode}) requires IP Type.`);
    }

    // F. GATEWAY COLLECTION (data for global duplicate GW check below)
    // For vlan interfaces: VLAN ID is the port name itself (e.g. vlan4000 → 4000).
    // For other ports: only VLANs with actual SVIs count as gateways — filtered by svi_vlan_.
    // Using vlan_ alone would flag every allowed trunk VLAN, not just the ones with gateways.
    if (ipType.includes("gw") || ipType.includes("gateway")) {
      const vlans = new Set();
      if (portName.startsWith("vlan")) {
        const vid = portName.replace("vlan", "");
        if (vid) vlans.add(vid);
      } else {
        const _pvGw = parseVlanWithNative(d.vlan_);
        const allVlans = [];
        if (_pvGw.vlans) extractVlans(_pvGw.vlans).forEach(v => allVlans.push(v));
        if (_pvGw.native) allVlans.push(_pvGw.native);

        const sviVal = (d.svi_vlan_ || "").trim().toLowerCase();
        if (sviVal === 'all') {
          allVlans.forEach(v => vlans.add(v));
        } else if (sviVal) {
          // Parse svi_vlan_ tokens: plain numeric IDs and nv<N> (native VLAN shorthand)
          const sviSet = new Set(
            sviVal.split(',').map(s => {
              s = s.trim();
              const nv = s.match(/^nv(\d+)$/i);
              return nv ? nv[1] : s;
            }).filter(s => s && !isNaN(s))
          );
          allVlans.forEach(v => { if (sviSet.has(String(v))) vlans.add(v); });
        }
        // sviVal === '' → no SVIs on this port → no gateway VLANs to record
      }

      vlans.forEach(v => {
        if (!vlanGwUsage[v]) vlanGwUsage[v] = [];
        vlanGwUsage[v].push({ portId: nodeId, device: node.device });
      });
    }

    // G. MISSING PO FOR PORT-CHANNEL MODE
    if ((mode.startsWith('l2-po-') || mode.startsWith('l3-po-')) && !d.po_) {
      auditCheckHadIssue.auditFlagMissingPo = (auditCheckHadIssue.auditFlagMissingPo || 0) + 1;
      if (auditFlagMissingPo) configErrors.push(`Missing PO: Mode is '${d.sp_mode_}' but Po column is blank.`);
    }

    // H. STALE PO VALUE ON ETHERNET MODE
    if (/^l[23]-et/i.test(mode) && d.po_ && String(d.po_).trim() !== "") {
      auditCheckHadIssue.auditFlagStalePo = (auditCheckHadIssue.auditFlagStalePo || 0) + 1;
      if (auditFlagStalePo) configErrors.push(`Stale PO: Mode is '${d.sp_mode_}' but Po column has value '${d.po_}' — should be blank.`);
    }

    // L. PO MEMBER WITH NO PEER DEVICE on an Arista device (orphan Po — design error)
    const _devIsArista = !(allDevicesData[node.device] && allDevicesData[node.device].type === 'non-arista');
    if (_devIsArista && (mode.startsWith('l2-po-') || mode.startsWith('l3-po-')) && d.po_ && !d.peerDev) {
      const _poNoPeerKey = node.device + ":" + String(d.po_).trim();
      if (!_seenPoNoPeer.has(_poNoPeerKey)) {
        _seenPoNoPeer.add(_poNoPeerKey);
        auditCheckHadIssue.auditFlagPoNoPeer = (auditCheckHadIssue.auditFlagPoNoPeer || 0) + 1;
        if (auditFlagPoNoPeer) configErrors.push(`Orphan Po: ${d.po_} has no peer device — Po member must have a connected peer on the same row.`);
      }
    }

    // I. STALE IP TYPE ON L2 PORT (no SVI)
    if (mode.startsWith("l2") && !isSviOn && d.ip_type_ && String(d.ip_type_).trim() !== "") {
      auditCheckHadIssue.auditFlagStaleIpType = (auditCheckHadIssue.auditFlagStaleIpType || 0) + 1;
      if (auditFlagStaleIpType) configErrors.push(`Stale IP Type: Mode is '${d.sp_mode_}' with no SVI but IP Type is '${d.ip_type_}' — should be blank.`);
    }

    // M. STALE SVI ON L3 PORT (svi_vlan_ only valid on L2 modes)
    if (mode.startsWith("l3") && d.svi_vlan_ && String(d.svi_vlan_).trim() !== "") {
      auditCheckHadIssue.auditFlagStaleSvi = (auditCheckHadIssue.auditFlagStaleSvi || 0) + 1;
      if (auditFlagStaleSvi) configErrors.push(`Stale SVI: Mode is '${d.sp_mode_}' but svi_vlan_ has value '${d.svi_vlan_}' — SVI only valid on L2 modes.`);
    }

    // N. MULTI-VLAN ON SINGLE-VLAN MODES (access ports accept only one VLAN; pure l3-et/l3-po use one VLAN for subnet derivation)
    if (((mode.startsWith("l3") && !mode.includes("sub-int")) || /^l2-(et|po)-access$/.test(mode)) &&
        d.vlan_ && /[,\-]/.test(String(d.vlan_))) {
      auditCheckHadIssue.auditFlagStaleVlan = (auditCheckHadIssue.auditFlagStaleVlan || 0) + 1;
      if (auditFlagStaleVlan) configErrors.push(`Multi-VLAN: Mode is '${d.sp_mode_}' but vlan_ has '${d.vlan_}' — only a single VLAN is valid here.`);
    }

    // O. STALE VRF ON L2 PORT WITHOUT SVI
    if (mode.startsWith("l2") && !isSviOn && d.vrf_ && String(d.vrf_).trim() !== "") {
      auditCheckHadIssue.auditFlagStaleVrf = (auditCheckHadIssue.auditFlagStaleVrf || 0) + 1;
      if (auditFlagStaleVrf) configErrors.push(`Stale VRF: Mode is '${d.sp_mode_}' with no SVI but vrf_ has value '${d.vrf_}' — should be blank.`);
    }

    // P. XCVR SPEED SET BUT XCVR TYPE MISSING
    if (d.xcvr_speed_ && String(d.xcvr_speed_).trim() !== "" &&
        (!d.xcvr_type_ || String(d.xcvr_type_).trim() === "")) {
      auditCheckHadIssue.auditFlagStaleXcvrSpeed = (auditCheckHadIssue.auditFlagStaleXcvrSpeed || 0) + 1;
      if (auditFlagStaleXcvrSpeed) configErrors.push(`Incomplete Xcvr: xcvr_speed has value '${d.xcvr_speed_}' but xcvr_type is blank — xcvr_type needed for breakout/cabling detection.`);
    }

    // Q. MISSING VLAN ON L3-ET / L3-PO (required for IP subnet derivation)
    if (/^l3-(et|po)/i.test(mode) && (!d.vlan_ || String(d.vlan_).trim() === "")) {
      auditCheckHadIssue.auditFlagMissingVlan = (auditCheckHadIssue.auditFlagMissingVlan || 0) + 1;
      if (auditFlagMissingVlan) configErrors.push(`Missing VLAN: Mode is '${d.sp_mode_}' but vlan_ is blank — required for IP subnet derivation on l3-et/l3-po.`);
    }

    // J. NATIVE VLAN TOKEN ON NON-TRUNK PORT
    const _pvAuditJ = parseVlanWithNative(d.vlan_);
    if (_pvAuditJ.native && !mode.includes("trunk")) {
      auditCheckHadIssue.auditFlagNativeNonTrunk = (auditCheckHadIssue.auditFlagNativeNonTrunk || 0) + 1;
      if (auditFlagNativeNonTrunk) configErrors.push(`Native VLAN: nv${_pvAuditJ.native} in VLANs column is only valid on trunk ports — current mode is '${d.sp_mode_ || "blank"}'. Token will be ignored.`);
    }

    // K. VLAN CONFLICTS WITH EOS INTERNAL VLANS (requires bridge check data)
    // Only l2-* and Vx1 create VLAN database entries — l3-* sub-int uses vlan_ for dot1q
    // encapsulation only (no vlan N stanza generated), so internal VLAN overlap is harmless.
    const _intVlansForDev = deviceInternalVlans[(node.device || "").toLowerCase()] || [];
    if (_intVlansForDev.length && (mode.startsWith('l2') || portName === 'Vx1')) {
      const _vlanStr = [_pvAuditJ.vlans, _pvAuditJ.native].filter(Boolean).join(',');
      if (_vlanStr) {
        const _portVlans = [...parseVlanInput(_vlanStr)].map(v => parseInt(v)).filter(v => !isNaN(v));
        const _conflicts = _portVlans.filter(v => _intVlansForDev.includes(v));
        if (_conflicts.length) {
          auditCheckHadIssue.bridgeAuditFlagInternalVlan = (auditCheckHadIssue.bridgeAuditFlagInternalVlan || 0) + 1;
          if (bridgeAuditFlagInternalVlan) {
            const pl = _conflicts.length > 1;
            configErrors.push(`Internal VLAN Conflict: VLAN${pl ? 's' : ''} ${_conflicts.join(', ')} ${pl ? 'are' : 'is'} auto-allocated by EOS on this device — conflicts with internal VLAN allocation.`);
          }
        }
      }
    }

    // L. SVI VLAN NOT IN VLAN LIST
    // _parseSviVlans() silently drops requested VLANs not present in vlan_ — warn here.
    if (mode.startsWith("l2-") && svi && svi !== 'all') {
      const _pvL = parseVlanWithNative(d.vlan_);
      const _allowedSviVlans = parseVlanInput(_pvL.vlans || "");
      if (_pvL.native) _allowedSviVlans.add(_pvL.native);
      const _missingSvi = [];
      svi.split(',').forEach(s => {
        s = s.trim();
        const _nv = s.match(/^nv(\d+)$/i);
        const _vid = _nv ? _nv[1] : s;
        if (_vid && !isNaN(_vid) && !_allowedSviVlans.has(_vid)) _missingSvi.push(_vid);
      });
      if (_missingSvi.length) {
        auditCheckHadIssue.auditFlagSviVlanMismatch = (auditCheckHadIssue.auditFlagSviVlanMismatch || 0) + 1;
        if (auditFlagSviVlanMismatch) {
          const _pl = _missingSvi.length > 1;
          configErrors.push(`SVI VLAN Mismatch: svi_vlan '${_missingSvi.join(', ')}' ${_pl ? 'are' : 'is'} not in vlan_ — no SVI will be generated for ${_pl ? 'these VLANs' : 'this VLAN'}.`);
        }
      }
    }

    // R. SNAKE PORT WITH WRONG IP TYPE
    if (d.isSnakePrimary || d.isSnakeSecondary) {
      if (!ipType.includes('p2p')) {
        auditCheckHadIssue.auditFlagSnakeIpType = (auditCheckHadIssue.auditFlagSnakeIpType || 0) + 1;
        if (auditFlagSnakeIpType) configErrors.push(`Wrong IP Type: Snake loopback port requires ip_type_=p2p — '${d.ip_type_ || 'blank'}' generates wrong address/command in SNAKE VRF.`);
      }
    }

    // S. IXIA EP PORT WITH WRONG IP TYPE
    const _ixiaDesc = (d.desc_ || '').trim();
    if (_ixiaDesc === 'TRAFFIC_SNAKE_EP1_L3' || _ixiaDesc === 'TRAFFIC_SNAKE_EP2_L3') {
      if (!ipType.includes('p2p')) {
        auditCheckHadIssue.auditFlagIxiaIpType = (auditCheckHadIssue.auditFlagIxiaIpType || 0) + 1;
        if (auditFlagIxiaIpType) configErrors.push(`Wrong IP Type: IXIA ${_ixiaDesc === 'TRAFFIC_SNAKE_EP1_L3' ? 'EP1 (in)' : 'EP2 (out)'} port requires ip_type_=p2p — '${d.ip_type_ || 'blank'}' generates wrong IP or virtual command.`);
      }
    }

    // Apply Errors — prefix each message with device:port so the status log shows location
    if (configErrors.length > 0) {
      const _devPort = `${node.device}:${node.name}: `;
      connectedLinks.forEach(linkId => {
        if (!validationErrors[linkId]) validationErrors[linkId] = [];
        configErrors.forEach(err => {
          const tagged = _devPort + err;
          if (!validationErrors[linkId].includes(tagged)) validationErrors[linkId].push(tagged);
        });
      });
      portErrorCount++;
    }
  }

  // =========================================================
  // CHECK GROUP 3: MLAG PEER-LINK INTEGRITY
  // =========================================================
  const processedPairs = new Set();

  for (let deviceId in allDevicesData) {
    const myPeer = allDevicesData[deviceId].mlagPeer;
    if (myPeer) {
      const pairKey = [deviceId, myPeer].sort().join("|");
      if (!processedPairs.has(pairKey)) {
        processedPairs.add(pairKey);

        // CHECK: Verify if there is a physical connection tagged as 'peer' between these devices
        const hasPhysicalPeerLink = globalLinks.some(l => {
          const uDev = l.u.split(":")[0];
          const vDev = l.v.split(":")[0];
          return (l.type === 'peer') &&
            ((uDev === deviceId && vDev === myPeer) ||
              (uDev === myPeer && vDev === deviceId));
        });

        if (!hasPhysicalPeerLink) {
          auditCheckHadIssue.auditFlagMlagPeerLink = (auditCheckHadIssue.auditFlagMlagPeerLink || 0) + 1;
          if (auditFlagMlagPeerLink) {
            const msg = `MLAG Peer-Link Missing: No physical connection found between ${deviceId} and ${myPeer}.`;
            portErrorCount++;
            const _synthKey = `_mlag_peer_${pairKey}`;
            if (!validationErrors[_synthKey]) validationErrors[_synthKey] = [];
            if (!validationErrors[_synthKey].includes(msg)) validationErrors[_synthKey].push(msg);
          }
        }
      }
    }
  }

  // =========================================================
  // CHECK GROUP 4: GLOBAL DUPLICATE GATEWAY CHECK
  // =========================================================
  Object.keys(vlanGwUsage).forEach(vlanId => {
    const usages = vlanGwUsage[vlanId];
    const devices = [...new Set(usages.map(u => u.device))];

    const evpnOn = document.getElementById('chkTechEvpn') && document.getElementById('chkTechEvpn').checked;
    const vxlanOn = document.getElementById('chkTechVxlan') && document.getElementById('chkTechVxlan').checked;

    const isAnycastDesign = (evpnOn || vxlanOn);

    if (devices.length > 2 && !isAnycastDesign) {
      auditCheckHadIssue.auditFlagDupGateway = (auditCheckHadIssue.auditFlagDupGateway || 0) + 1;
      if (auditFlagDupGateway) {
        const msg = `Duplicate GW: VLAN ${vlanId} on ${devices.join(', ')}`;
        usages.forEach(u => {
          flagErrorOnPort(u.portId, msg);
        });
      }
    }
  });

  // CHECK: EVPN per-vlan — disjoint VTEP VLAN sets (no route exchange between VTEP pairs)
  const _evpnIpv4On = !!(document.getElementById('chkEvpnIpv4') && document.getElementById('chkEvpnIpv4').checked);
  const _evpnIpv6On = !!(document.getElementById('chkEvpnIpv6') && document.getElementById('chkEvpnIpv6').checked);
  const _evpnSvcEl  = document.querySelector('input[name="evpnService"]:checked');
  const _evpnSvc    = _evpnSvcEl ? _evpnSvcEl.value : 'per-vlan';

  if ((_evpnIpv4On || _evpnIpv6On) && _evpnSvc === 'per-vlan') {
    const _vtepSets = {};
    Object.keys(allDevicesData).forEach(dev => {
      const d = allDevicesData[dev];
      if (d.type !== 'full' || !d.vtepVlans) return;
      const vset = new Set();
      d.vtepVlans.split(',').forEach(part => {
        const m = part.match(/^(\d+)-(\d+)$/);
        if (m) { for (let v = +m[1]; v <= +m[2]; v++) vset.add(v); }
        else { const n = parseInt(part, 10); if (!isNaN(n)) vset.add(n); }
      });
      if (vset.size > 0) _vtepSets[dev] = vset;
    });

    const _vtepNames = Object.keys(_vtepSets);
    for (let _i = 0; _i < _vtepNames.length; _i++) {
      for (let _j = _i + 1; _j < _vtepNames.length; _j++) {
        const _a = _vtepNames[_i], _b = _vtepNames[_j];
        if (allDevicesData[_a] && allDevicesData[_a].mlagPeer === _b) continue;
        const _hasOverlap = [..._vtepSets[_a]].some(v => _vtepSets[_b].has(v));
        if (!_hasOverlap) {
          auditCheckHadIssue.auditFlagEvpnVlanMismatch = (auditCheckHadIssue.auditFlagEvpnVlanMismatch || 0) + 1;
          if (auditFlagEvpnVlanMismatch) {
            validationErrors[`_evpn_vlan_mismatch_${_a}_${_b}`] = [{
              device: _a, port: '',
              msg: `[Audit - Design] EVPN per-vlan: ${_fmtDev(_a)} (${allDevicesData[_a].vtepVlans}) ` +
                   `and ${_fmtDev(_b)} (${allDevicesData[_b].vtepVlans}) share no VLANs — ` +
                   `no direct route exchange. Switch to vlan-aware-bundle or add shared VLANs.`
            }];
          }
        }
      }
    }
  }

  // =========================================================
  // CHECK GROUP 5: DUPLICATE INTERFACE CHECKS
  // =========================================================
  // flagErrorOnPort is link-keyed: if the port has no cable connections, the error
  // is silently dropped. For duplicate interfaces, also store a port-level error
  // (keyed by portId) so disconnected duplicates are caught by the audit filter
  // and device click handler.
  if (typeof globalPortFrequency !== 'undefined') {
    for (const [fullId, count] of Object.entries(globalPortFrequency)) {
      if (count > 1) {
        auditCheckHadIssue.auditFlagDuplicateInt = (auditCheckHadIssue.auditFlagDuplicateInt || 0) + 1;
        if (auditFlagDuplicateInt) {
          const err = `Duplicate Interface: ${fullId} defined ${count} times.`;
          flagErrorOnPort(fullId, err);  // covers connected ports via link errors
          // Port-level fallback: ensures disconnected duplicate ports are also flagged
          if (!validationErrors[fullId]) validationErrors[fullId] = [];
          if (!validationErrors[fullId].includes(err)) {
            validationErrors[fullId].push(err);
            portErrorCount++;
          }
        }
      }
    }
  }

  // =========================================================
  // CHECK GROUP 6: VLAN USAGE CONSISTENCY
  // =========================================================
  for (const deviceId in devicePortsMap) {
    const portIds = devicePortsMap[deviceId];
    const vlanUsage = {};

    portIds.forEach(pid => {
      const node = allNodesData[pid];
      if (!node || !node.details || !node.name) return;
      const d = node.details;

      let logicalOwner = node.name;
      if (d.po_ && d.po_.trim() !== "") logicalOwner = d.po_.trim();

      let type = "L2";
      const mode = (d.sp_mode_ || "").toLowerCase();
      const hasIp = (d.ipv4_ && d.ipv4_ !== '-') || (d.ipv6_ && d.ipv6_ !== '-');
      if (mode.includes("l3") || mode === "routed" || hasIp || node.name.toLowerCase().startsWith("vlan")) {
        type = "L3";
      }

      const vlans = new Set();
      const _pvAudit = parseVlanWithNative(d.vlan_);
      if (_pvAudit.vlans) {
        const expanded = parseVlanInput(_pvAudit.vlans);
        expanded.forEach(v => vlans.add(v));
      }
      if (_pvAudit.native) vlans.add(_pvAudit.native);

      vlans.forEach(vid => {
        const vStr = String(vid);
        if (!vlanUsage[vStr]) {
          vlanUsage[vStr] = { type: type, owner: logicalOwner, firstPort: pid };
        } else {
          const existing = vlanUsage[vStr];
          let err = null;
          if (existing.type === "L3" && type === "L3") {
            if (existing.owner !== logicalOwner) {
              err = `VLAN ${vStr} L3 Conflict: ${existing.firstPort} and ${pid} both L3.`;
            }
          } else if (existing.type !== type) {
            err = `VLAN ${vStr} Mixed Usage: ${existing.firstPort} (${existing.type}) vs ${pid} (${type}).`;
          }
          if (err) {
            auditCheckHadIssue.auditFlagVlanUsage = (auditCheckHadIssue.auditFlagVlanUsage || 0) + 1;
            if (auditFlagVlanUsage) {
              flagErrorOnPort(pid, err);
              flagErrorOnPort(existing.firstPort, err);
            }
          }
        }
      });
    });
  }

  // =========================================================
  // CHECK GROUP 7: DUPLICATE P2P VLAN ACROSS SHEET
  // =========================================================
  // Same VLAN on two different P2P logical links → same derived subnet → IP conflict.
  // Po member links sharing the same VLAN are expected (all child links carry the same
  // VLAN) and are collapsed to a single logical identity before comparison.
  if (typeof globalLinks !== 'undefined' && globalLinks) {
    const p2pVlanLogical = {}; // vlan → Map<logicalKey, Set<link.id>>

    globalLinks.forEach(link => {
      const nodeA = allNodesData[link.u];
      const nodeB = allNodesData[link.v];
      if (!nodeA || !nodeB) return;

      const ipTypeA = (nodeA.details.ip_type_ || "").toLowerCase();
      const ipTypeB = (nodeB.details.ip_type_ || "").toLowerCase();
      if (!ipTypeA.includes("p2p") && !ipTypeB.includes("p2p")) return;

      // Derive logical identity: Po members → canonical Po pair; standalone → link.id
      const poA = (nodeA.details.po_ || "").trim();
      const poB = (nodeB.details.po_ || "").trim();
      const logicalKey = (poA && poB)
        ? [nodeA.device + ":" + poA, nodeB.device + ":" + poB].sort().join("|")
        : link.id;

      const vlanSrc = ipTypeA.includes("p2p") ? nodeA.details.vlan_ : nodeB.details.vlan_;
      extractVlans(vlanSrc || "").forEach(v => {
        if (!p2pVlanLogical[v]) p2pVlanLogical[v] = new Map();
        if (!p2pVlanLogical[v].has(logicalKey)) p2pVlanLogical[v].set(logicalKey, new Set());
        p2pVlanLogical[v].get(logicalKey).add(link.id);
      });
    });

    Object.keys(p2pVlanLogical).forEach(vlan => {
      const logicalMap = p2pVlanLogical[vlan];
      if (logicalMap.size > 1) {
        auditCheckHadIssue.auditFlagDupP2pVlan = (auditCheckHadIssue.auditFlagDupP2pVlan || 0) + 1;
        if (auditFlagDupP2pVlan) {
          const msg = `[FAIL] Duplicate P2P VLAN ${vlan}: Used on ${logicalMap.size} logical links — causes IP conflict in generated config`;
          logicalMap.forEach(linkIds => {
            linkIds.forEach(lid => {
              if (!validationErrors[lid]) validationErrors[lid] = [];
              if (!validationErrors[lid].includes(msg)) {
                validationErrors[lid].push(msg);
                portErrorCount++;
              }
            });
          });
        }
      }
    });
  }

  // =========================================================
  // CHECK GROUP 8: MLAG-STYLE PO WITHOUT DECLARED MLAG PEER
  // Two Arista devices sharing the same PO toward the same upstream = MLAG pattern.
  // If they're not declared as MLAG peers in Device Manager → flag error.
  // =========================================================
  if (typeof globalLinks !== 'undefined' && globalLinks) {
    // poUpstreamSources: "poName|upstreamDev" → Set of source devices (the PO owners)
    const poUpstreamSources = {};
    const poUpstreamLinkIds = {};
    const poUpstreamOriginals = {}; // preserve original casing for error message

    globalLinks.forEach(link => {
      const nodeA = allNodesData[link.u];
      const nodeB = allNodesData[link.v];
      if (!nodeA || !nodeB) return;
      const devAData = allDevicesData[nodeA.device];
      const devBData = allDevicesData[nodeB.device];
      if ((devAData && devAData.type === 'non-arista') || (devBData && devBData.type === 'non-arista')) return;

      const poA = (nodeA.details.po_ || '').trim();
      const poB = (nodeB.details.po_ || '').trim();

      // Only consider links where exactly one side owns the PO (the MLAG member).
      // If both sides have PO set (peer-link LAG) or neither — skip.
      let poOwner = null, upstreamDev = null, poOrig = null;
      if (poA && !poB) { poOwner = nodeA.device; upstreamDev = nodeB.device; poOrig = poA; }
      else if (poB && !poA) { poOwner = nodeB.device; upstreamDev = nodeA.device; poOrig = poB; }
      else return;

      const mapKey = poOrig.toLowerCase() + '|' + upstreamDev.toLowerCase();
      if (!poUpstreamSources[mapKey]) { poUpstreamSources[mapKey] = new Set(); poUpstreamLinkIds[mapKey] = new Set(); poUpstreamOriginals[mapKey] = { poName: poOrig, upstream: upstreamDev }; }
      poUpstreamSources[mapKey].add(poOwner);
      poUpstreamLinkIds[mapKey].add(link.id);
    });

    Object.entries(poUpstreamSources).forEach(([mapKey, sources]) => {
      if (sources.size < 2) return; // Only 1 device → normal LAG, not MLAG
      const parts = mapKey.split('|');
      const { poName: poOrig, upstream: upstreamOrigDev } = poUpstreamOriginals[mapKey];
      const sourceList = Array.from(sources);

      for (let i = 0; i < sourceList.length; i++) {
        for (let j = i + 1; j < sourceList.length; j++) {
          const devA = sourceList[i];
          const devB = sourceList[j];
          const mlagA = allDevicesData[devA] && allDevicesData[devA].mlagPeer;
          const mlagB = allDevicesData[devB] && allDevicesData[devB].mlagPeer;
          const areDeclaredPeers = (mlagA === devB && mlagB === devA);
          if (!areDeclaredPeers) {
            auditCheckHadIssue.auditFlagUndeclaredMlag = (auditCheckHadIssue.auditFlagUndeclaredMlag || 0) + 1;
            if (auditFlagUndeclaredMlag) {
              const err = `[FAIL] MLAG Peer Required: ${devA} and ${devB} both use ${poOrig} toward ${upstreamOrigDev} — declare as MLAG peers in Device Manager`;
              poUpstreamLinkIds[mapKey].forEach(lid => {
                if (!validationErrors[lid]) validationErrors[lid] = [];
                if (!validationErrors[lid].includes(err)) { validationErrors[lid].push(err); portErrorCount++; }
              });
            }
          }
        }
      }
    });
  }

  // =========================================================
  // Bridge CHECKS (populated by runBridgeCheck — empty if not yet run)
  // =========================================================
  // Build port→result lookup for detail messages (reused in _auditIssues section below).
  // Keyed by port ID (r.u / r.v) — gives full detail msg for link strip and audit log.
  const _portToResult = {};
  if (_lastBridgeResults) {
    _lastBridgeResults.forEach(r => {
      if (r.status === 'mismatch') { _portToResult[r.u] = r; _portToResult[r.v] = r; }
    });
  }
  Object.entries(bridgePortStatus).forEach(([portId, status]) => {
    const [_bDev, _bPort] = portId.split(':');
    if (status === 'mismatch') {
      auditCheckHadIssue.bridgeAuditFlagMismatch = (auditCheckHadIssue.bridgeAuditFlagMismatch || 0) + 1;
      if (bridgeAuditFlagMismatch) {
        const _br = _portToResult[portId];
        flagErrorOnPort(portId, _br && _br.msg ? `LLDP mismatch: ${_br.msg}` : `LLDP mismatch`);
      }
    } else if (status === 'missing') {
      // Use link-level priority: errdis > shut > down > other.
      const _subA = bridgePortSubType[portId] || 'other';
      const _br = _portToResult[portId];
      const _pairedPort = _br ? (_br.u === portId ? _br.v : _br.u) : null;
      const _subB = _pairedPort ? (bridgePortSubType[_pairedPort] || 'other') : 'other';
      const _sub = (_subA === 'errdis' || _subB === 'errdis') ? 'errdis'
                 : (_subA === 'shut'   || _subB === 'shut')   ? 'shut'
                 : (_subA === 'down'   || _subB === 'down')   ? 'down' : 'other';
      if (_sub === 'errdis') {
        auditCheckHadIssue.bridgeAuditFlagErrDis = (auditCheckHadIssue.bridgeAuditFlagErrDis || 0) + 1;
        if (bridgeAuditFlagErrDis) flagErrorOnPort(portId, 'LLDP missing (errdis)');
      } else if (_sub === 'shut') {
        auditCheckHadIssue.bridgeAuditFlagShut = (auditCheckHadIssue.bridgeAuditFlagShut || 0) + 1;
        if (bridgeAuditFlagShut) flagErrorOnPort(portId, 'LLDP missing (shut)');
      } else if (_sub === 'down') {
        auditCheckHadIssue.bridgeAuditFlagDown = (auditCheckHadIssue.bridgeAuditFlagDown || 0) + 1;
        if (bridgeAuditFlagDown) flagErrorOnPort(portId, 'LLDP missing (down)');
      } else {
        auditCheckHadIssue.bridgeAuditFlagMissing = (auditCheckHadIssue.bridgeAuditFlagMissing || 0) + 1;
        if (bridgeAuditFlagMissing) flagErrorOnPort(portId, 'LLDP missing');
      }
    }
  });

  // Mark run complete — dots in Audit Settings modal will now show green/red
  auditHasRun = true;
  const _auditSettingsEl = document.getElementById('auditSettingsModal');
  if (_auditSettingsEl && _auditSettingsEl.style.display !== 'none') refreshAuditSettingsDots();

  // UPDATE UI — rebuild _auditIssues from scratch (state, not events — no dedup complexity)
  _auditIssues = [];

  // Design issues → _auditIssues (within-run dedup for identical msg on multiple ports)
  const _runSeen = new Set();
  Object.values(validationErrors).forEach(msgs => {
    msgs.forEach(msg => {
      const clean = msg.replace(/^\[FAIL\]\s*/, '');
      if (clean.startsWith('LLDP')) return; // live bridge check covers LLDP detail via _auditIssues live section
      if (!_runSeen.has(clean)) {
        _runSeen.add(clean);
        _auditIssues.push({ msg: '[Audit - Design] ' + clean, cls: 'status-error', src: 'design' });
      }
    });
  });

  // Live issues → _auditIssues from bridgePortStatus (same source as link coloring & audit count).
  // Classification follows bridgePortStatus value, NOT r.msg content — this avoids misrouting
  // mixed-case links (wrong neighbor on one end, no neighbor on other) to the wrong audit flag.
  // _portToResult (built in Bridge CHECKS section above) provides full detail messages.
  // Dedup by link pair: a link with both ends in bridgePortStatus must not create two entries.
  const _bridgeAuditSeen = new Set();
  Object.entries(bridgePortStatus).forEach(([portId, status]) => {
    const _br = _portToResult[portId];
    if (status === 'mismatch' && bridgeAuditFlagMismatch) {
      if (_br) {
        const _pk = [_br.u, _br.v].sort().join('||');
        if (!_bridgeAuditSeen.has(_pk)) {
          _bridgeAuditSeen.add(_pk);
          _auditIssues.push({ msg: `[Audit - Live] LLDP mismatch: ${_br.u} \u2194 ${_br.v}${_br.msg ? ' \u2014 ' + _br.msg : ''}`, cls: 'status-error', src: 'live' });
        }
      } else {
        _auditIssues.push({ msg: `[Audit - Live] LLDP mismatch: ${portId}`, cls: 'status-error', src: 'live' });
      }
    } else if (status === 'missing' && _br) {
      const _pk = [_br.u, _br.v].sort().join('||');
      if (!_bridgeAuditSeen.has(_pk)) {
        _bridgeAuditSeen.add(_pk);
        // Check both ends for sub-type (errdis > shut > down > other) \u2014 mirrors bridge panel classification
        const _uSub = bridgePortSubType[_br.u] || 'other', _vSub = bridgePortSubType[_br.v] || 'other';
        const _sub = (_uSub === 'errdis' || _vSub === 'errdis') ? 'errdis'
                   : (_uSub === 'shut'   || _vSub === 'shut')   ? 'shut'
                   : (_uSub === 'down'   || _vSub === 'down')   ? 'down' : 'other';
        if (_sub === 'errdis' && bridgeAuditFlagErrDis)
          _auditIssues.push({ msg: `[Audit - Live] Interface errdis: ${_br.u} \u2194 ${_br.v}`, cls: 'status-error', src: 'live' });
        else if (_sub === 'shut' && bridgeAuditFlagShut)
          _auditIssues.push({ msg: `[Audit - Live] Interface shut: ${_br.u} \u2194 ${_br.v}`, cls: 'status-error', src: 'live' });
        else if (_sub === 'down' && bridgeAuditFlagDown)
          _auditIssues.push({ msg: `[Audit - Live] Interface down: ${_br.u} \u2194 ${_br.v}`, cls: 'status-error', src: 'live' });
        else if (_sub === 'other' && bridgeAuditFlagMissing)
          _auditIssues.push({ msg: `[Audit - Live] Missing LLDP neighbor: ${_br.u} \u2194 ${_br.v} \u2014 ${_br.msg}`, cls: 'status-error', src: 'live' });
      }
    }
  });
  if (_lastBridgeOrphans && _lastBridgeOrphans.length) {
    auditCheckHadIssue.bridgeAuditFlagOrphan = _lastBridgeOrphans.length;
    if (bridgeAuditFlagOrphan) {
      _lastBridgeOrphans.forEach(o => {
        _auditIssues.push({ msg: `[Audit - Live] New LLDP neighbor: ${o.localDev}:${o.localIf} \u2194 ${o.remDev}:${o.remIf}`, cls: 'status-error', src: 'live' });
      });
    }
  }
  // L1 errors — read from bridgePortL1Errors SSoT (link-level dedup: each link counted once)
  const _l1Seen = new Set();
  if (_lastBridgeResults) {
    _lastBridgeResults.forEach(r => {
      const uErr = bridgePortL1Errors[r.u], vErr = bridgePortL1Errors[r.v];
      if (uErr || vErr) {
        auditCheckHadIssue.bridgeAuditFlagL1Errors = (auditCheckHadIssue.bridgeAuditFlagL1Errors || 0) + 1;
        if (bridgeAuditFlagL1Errors) {
          flagErrorOnPort(r.u, 'L1 errors (CRC/FCS)');
          flagErrorOnPort(r.v, 'L1 errors (CRC/FCS)');
          const _pk = [r.u, r.v].sort().join('||');
          if (!_l1Seen.has(_pk)) {
            _l1Seen.add(_pk);
            const detail = _l1ErrDetail(r.u, uErr, r.v, vErr);
            _auditIssues.push({ msg: `[Audit - Live] L1 errors: ${r.u} \u2194 ${r.v} \u2014 ${detail}`, cls: 'status-warning', src: 'live' });
          }
        }
      }
    });
  }

  // Summary to status bar — always accurate (no logIssues gate needed)
  if (statusEl) {
    if (_auditIssues.length === 0) {
      setStatus("Audit Clean.");
    } else {
      setStatus(`Audit: ${_auditIssues.length} Issues Found`, "status-error");
    }
  }

  // Refresh Audit tab if open — reads _auditIssues directly
  renderAuditLog();

  _updateAuditToolbarIcon(_auditIssues.length > 0, _auditIssues.length);
  _applyAuditCardIndicators();
  applyAuditOnlyView();
  requestAnimationFrame(redrawLinks);
}

function normalizeSpeed(s) {
  if (!s) return null;
  s = s.toLowerCase().replace(/gbps|mbps|g|m/g, "").trim();
  if (s === "1000" || s === "1") return "1g";
  if (s === "10000" || s === "10") return "10g";
  if (s === "25000" || s === "25") return "25g";
  if (s === "40000" || s === "40") return "40g";
  if (s === "100000" || s === "100") return "100g";
  if (s === "400000" || s === "400") return "400g";
  if (s === "800000" || s === "800") return "800g";
  return s;
}

/**
* fetchFullConfig
* - Silences background noise (hovers).
* - Accepts custom messages for system actions (Tech Save).
*/
function fetchFullConfig(deviceName, callback, customSuccessMsg) {
  // Non-EOS devices have no EOS config — skip silently, no callback (calling callback causes
  // infinite recursion: fetchFullConfig → refreshCallback → showTooltip → fetchFullConfig → ∞)
  if (allDevicesData[deviceName] && allDevicesData[deviceName].type === 'non-arista') {
    return;
  }
  // 1. Check Cache
  if (configCache[deviceName]) {
    processDeviceConfig(deviceName, configCache[deviceName].data);
    if (selectedDeviceId === deviceName) {
      currentDeviceConfig = formatConfigText(configCache[deviceName].data);
    }
    if (callback) callback(null);
    return;
  }

  // 2. Queueing Logic
  if (pendingFetches.has(deviceName)) {
    if (callback) {
      if (!fetchQueue[deviceName]) fetchQueue[deviceName] = [];
      fetchQueue[deviceName].push(callback);
    }
    return;
  }

  pendingFetches.add(deviceName);
  if (callback) fetchQueue[deviceName] = [callback];

  // 3. Status Bar Update (Context-Aware)
  const st = document.getElementById("status");
  // Only show "Fetching..." if this is the Active Device OR it's a specific system action
  const shouldShowStatus = (selectedDeviceId === deviceName) || (customSuccessMsg);

  if (st && shouldShowStatus) {
    setStatus("Fetching " + deviceName + "...");
  }

  // Safety net: if GAS call hangs at framework level (auth expiry, quota), flush the
  // callback queue after 20s so callers like hideGlobalLoading() are always called.
  const _fcGuard = setTimeout(() => {
    pendingFetches.delete(deviceName);
    if (fetchQueue[deviceName]) {
      fetchQueue[deviceName].forEach(cb => cb('timeout'));
      delete fetchQueue[deviceName];
    }
    _updateStripFetchError(deviceName, 'Timed out — re-select to retry');
    setStatus("Config fetch timed out for " + deviceName + " — re-select to retry", "status-error");
  }, 20000);

  // 4. Server Call
  google.script.run
    .withSuccessHandler(res => {
      clearTimeout(_fcGuard);
      pendingFetches.delete(deviceName);

      if (res.error) {
        if (selectedDeviceId === deviceName) {
          const btn = document.getElementById("btnDevice");
          if (btn) {
            btn.innerText = "Fetch Failed: " + res.error;
            btn.style.color = "var(--error-text)";
            btn.style.background = "var(--error-bg)";
          }
        }
        _updateStripFetchError(deviceName, 'Fetch failed — re-select to retry');
      }
      else {
        configCache[deviceName] = { data: res.config };
        processDeviceConfig(deviceName, res.config);

        if (selectedDeviceId === deviceName) {
          currentDeviceConfig = formatConfigText(res.config);
        }

        _refreshGenerateRow(deviceName);

        // 5. Success Message
        const isStillSelected = (selectedDeviceId === deviceName);

        if (st && (isStillSelected || customSuccessMsg)) {
          // Use custom message if provided (e.g. "Tech Change"), else default
          setStatus(customSuccessMsg || "<b>New Config Fetched</b>", "status-ok");

          setTimeout(() => {
            setStatus(getReadyStatus());
            if (typeof isValidationMode !== 'undefined' && isValidationMode) runValidation();
          }, 4000);
        }
      }

      if (fetchQueue[deviceName]) {
        fetchQueue[deviceName].forEach(cb => cb(res.error || null));
        delete fetchQueue[deviceName];
      }
    })
    .withFailureHandler(err => {
      clearTimeout(_fcGuard);
      pendingFetches.delete(deviceName);
      if (fetchQueue[deviceName]) {
        fetchQueue[deviceName].forEach(cb => cb(err));
        delete fetchQueue[deviceName];
      }
      _updateStripFetchError(deviceName, 'Fetch failed — re-select to retry');
    })
    .getDeviceConfig(deviceName);
}

* RENAMED: formatConfigText (was getFullDeviceConfig)

function _cfgSectionLabel(key) {
  if (key === '000_BASE')           return '! --- BASELINE ---';
  if (key === '000_GTPL')           return '! --- GLOBAL TEMPLATE ---';
  if (key === '000_LO0')            return '! --- LOOPBACKS ---';
  if (key === '001_SYSTEM')         return '! --- SYSTEM ---';
  if (key === '070_MLAG')           return '! --- MLAG ---';
  if (key === '080_SNAKE')          return '! --- SNAKE TESTING ---';
  if (key === '090_OSPF_UNDERLAY')  return '! --- OSPF UNDERLAY ---';
  if (key === '091_OSPF3_UNDERLAY') return '! --- OSPFv3 UNDERLAY ---';
  if (key.startsWith('100_BGP'))    return '! --- BGP ---';
  return null;
}

function formatConfigText(configMap) {
  if (!configMap) return "";
  const keys = Object.keys(configMap).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  const sections = [];
  keys.forEach(k => {
    if (!configMap[k] || !configMap[k].full) return;
    const label = _cfgSectionLabel(k);
    sections.push(label ? label + '\n' + configMap[k].full : configMap[k].full);
  });
  return sections.join('\n!\n');
}

function switchLayout(mode) {
  closeGroupRectModal();
  // 1. Save CURRENT camera before making the switch
  saveCurrentStateToStorage();

  // 2. Apply new mode
  layoutMode = mode;

  if (mode === "flexible") {
    startFlexibleLayout();
  } else {
    stopFlexibleLayout();
    d3.select('#linear-grect-svg').remove();
    if (currentViewMode === 'detailed' && currentData) {
      render(currentData);
      if (mode === 'linear') _initLinearGroupRectSvg();
    }
  }

  // 3. 🛑 FIX: Restore NEW camera for this specific layout
  const restored = restoreCameraForMode(currentViewMode);
  if (!restored) {
    setTimeout(zoomToFit, 50); // Fallback: Zoom to fit if no memory exists yet
  }

  updateTopoButtons(determineCurrentTopoMode());
}


function startFlexibleLayout() {
  if (!currentData) return;
  if (typeof d3 === 'undefined') { setStatus("D3 library not loaded.", "status-error"); return; }

  // Stop any previous instance
  stopFlexibleLayout();

  // 1. SELECT NODES
  let domNodes = Array.from(document.querySelectorAll(".node:not(.dimmed)"));

  let nodesData = domNodes.map(el => {
    let id = el.dataset.id;
    let saved = savedNodePositions[id];

    // Use current DOM position as start point to prevent jumping
    let currentLeft = parseFloat(el.style.left) || 0;
    let currentTop = parseFloat(el.style.top) || 0;

    return {
      id: id,
      hostname: el.dataset.hostname || "",
      element: el,
      // If saved state exists, use it. Otherwise use current DOM position.
      x: saved ? saved.x : currentLeft,
      y: saved ? saved.y : currentTop,
      // PINNING: Essential for "Flexible" view.
      // If fx/fy are set, D3 won't auto-move the node after drag.
      fx: saved ? saved.fx : null,
      fy: saved ? saved.fy : null
    };
  });

  nodesData = nodesData.filter(n => n.id);
  let activeNodeIds = new Set(nodesData.map(n => n.id));
  let linkCounts = {};

  globalLinks.forEach(l => {
    let s = l.u.split(":")[0]; let t = l.v.split(":")[0];
    if (s !== t && activeNodeIds.has(s) && activeNodeIds.has(t)) {
      let id = s < t ? s + "-" + t : t + "-" + s;
      if (!linkCounts[id]) linkCounts[id] = { source: s, target: t, count: 0 };
      linkCounts[id].count++;
    }
  });
  let linksData = Object.values(linkCounts);

  // 2. CONFIGURE SIMULATION
  d3Simulation = d3.forceSimulation(nodesData)
    .force("link", d3.forceLink(linksData).id(d => d.id).distance(250))
    .force("charge", d3.forceManyBody().strength(-1500))
    .force("collide", d3.forceCollide().radius(150))
    .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2).strength(0.02))
    .alphaDecay(0.02)
    .on("tick", () => {
      const surface = document.getElementById("canvas-surface");

      let maxX = 0;
      let maxY = 0;

      nodesData.forEach(d => {
        // HARD WALL (Left/Top) at 150px
        if (d.x < UNIFIED_PAD) d.x = UNIFIED_PAD;
        if (d.y < UNIFIED_PAD) d.y = UNIFIED_PAD;

        // Update DOM
        d.element.style.left = d.x + "px";
        d.element.style.top = d.y + "px";

        // Track Extents
        const w = d.element.offsetWidth || 220;
        const h = d.element.offsetHeight || 300;
        if ((d.x + w) > maxX) maxX = d.x + w;
        if ((d.y + h) > maxY) maxY = d.y + h;

        // --- CRITICAL: UPDATE MEMORY ON TICK ---
        // This ensures that if we save at any moment, we have the latest pos
        if (!savedNodePositions[d.id]) savedNodePositions[d.id] = {};
        savedNodePositions[d.id].x = d.x;
        savedNodePositions[d.id].y = d.y;
      });

      // Dynamic Resize
      const reqW = Math.max(300, maxX + UNIFIED_PAD);
      const reqH = Math.max(300, maxY + UNIFIED_PAD);
      const currentW = surface.offsetWidth;
      const currentH = surface.offsetHeight;

      if (Math.abs(reqW - currentW) > 10 || Math.abs(reqH - currentH) > 10) {
        surface.style.width = reqW + "px";
        surface.style.height = reqH + "px";

        const cvs = document.getElementById("canvas-layer");
        const svg = document.getElementById("svg-layer");
        const dpr = window.devicePixelRatio || 1;

        cvs.width = Math.floor(reqW * dpr);
        cvs.height = Math.floor(reqH * dpr);
        cvs.style.width = reqW + "px";
        cvs.style.height = reqH + "px";
        svg.style.height = reqH + "px";

        if (canvasCtx) {
          canvasCtx.setTransform(1, 0, 0, 1, 0, 0);
          canvasCtx.scale(dpr, dpr);
        }
      }

      requestAnimationFrame(redrawLinks);
    });

  // 3. DRAG BEHAVIOR
  let drag = d3.drag()
    .on("start", (event, d) => {
      if (!event.active) d3Simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on("drag", (event, d) => {
      // Constraint Logic
      applyDragConstraints(event, d, Infinity, Infinity, UNIFIED_PAD);

      d.element.style.left = d.fx + "px";
      d.element.style.top = d.fy + "px";

      requestAnimationFrame(redrawLinks);
    })
    .on("end", (event, d) => {
      if (!event.active) d3Simulation.alphaTarget(0);

      // --- CRITICAL: PIN & SAVE ON DRAG END ---
      if (!savedNodePositions[d.id]) savedNodePositions[d.id] = {};

      // Update memory with Fixed positions (pins the node)
      savedNodePositions[d.id] = { x: d.fx, y: d.fy, fx: d.fx, fy: d.fy };

      // Commit to LocalStorage
      saveCurrentStateToStorage();
      // Refresh member-based group rect bounds after node repositioned
      refreshGroupRects();
    });

  d3.selectAll(".node:not(.dimmed)")
    .data(nodesData, function (d) { return d ? d.id : (this.dataset ? this.dataset.id : null); })
    .call(drag);

  // Apply initial simulation positions to DOM before rendering group rects —
  // DOM still holds linear-layout positions before the first tick fires.
  nodesData.forEach(d => { d.element.style.left = d.x + "px"; d.element.style.top = d.y + "px"; });

  // Group rect overlay — behind node cards (z-index:1 < node z-index:20)
  d3.select('#flex-grect-svg').remove();
  d3.select('#linear-grect-svg').remove(); // clear linear rects so they don't persist during flex sim
  const flexSvg = d3.select('#canvas-surface').append('svg')
    .attr('id', 'flex-grect-svg')
    .style('position', 'absolute').style('top', '0').style('left', '0')
    .style('width', '100%').style('height', '100%')
    .style('overflow', 'visible').style('pointer-events', 'none')
    .style('z-index', '1');
  const flexRectGroup  = flexSvg.append('g').attr('class', 'group-rects');
  const flexLabelGroup = flexSvg.append('g').attr('class', 'group-rect-labels');
  // Render only after simulation settles — pre-sim positions give wrong/stale member bounds
  d3Simulation.on("end.grects", refreshGroupRects);
}

function stopFlexibleLayout() {
  if (d3Simulation) {
    d3Simulation.stop();
    d3Simulation.on("tick", null);
    d3Simulation = null;

  d3.select('#flex-grect-svg').remove();
}

// --- TIME HELPER ---
function getTimestamp() {
  const now = new Date();
  return now.toLocaleTimeString('en-US', { hour12: false });
}

function formatAge(epochMs) {
  const secs = Math.floor((Date.now() - epochMs) / 1000);
  if (secs < 60) return 'just now';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  return hrs + 'h ' + (mins % 60) + 'm ago';
}

function formatAgeLabel(epochMs) {
  const timeStr = new Date(epochMs).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  return timeStr + ' · ' + formatAge(epochMs);
}

// --- SPLIT BUTTON STATE HELPER ---
// Color map — SSoT for split-btn background per state. Never hardcode colors at call sites.
const _SPLIT_STATE_BG = { ready: '#10b981', fetching: '#f59e0b', 'non-eos': '#64748b', error: '#ef4444' };

// Sets label text, wrapper background (derived from state), and enables/disables action buttons.
// state: 'ready' | 'fetching' | 'non-eos' | 'error' — written to dataset.splitState so
// consumers never compare style.background (Chrome normalizes hex → rgb on read).
function setSplitBtnState(splitId, labelText, state, actionsDisabled) {
  const wrapper = document.getElementById(splitId);
  if (!wrapper) return;
  const label = wrapper.querySelector('.split-label');
  const copyBtn = wrapper.querySelector('.copy-action');
  const viewBtn = wrapper.querySelector('.view-action');
  const pushBtn = wrapper.querySelector('.push-action');
  if (label) label.innerText = labelText;
  wrapper.style.background = _SPLIT_STATE_BG[state] || '#64748b';
  wrapper.dataset.splitState = state;
  if (copyBtn) copyBtn.disabled = actionsDisabled;
  if (viewBtn) viewBtn.disabled = actionsDisabled;
  if (pushBtn) pushBtn.disabled = actionsDisabled;
  if (!actionsDisabled) {
    wrapper.classList.remove("btn-ready-flash");
    void wrapper.offsetWidth;
    wrapper.classList.add("btn-ready-flash");
  }
}

// --- SPLIT BUTTON LABEL HELPERS ---
// Pure label builder — single source of truth for every split-btn label string.
// state: 'ready' | 'fetching' | 'non-eos'
function _buildSplitLabel(sheetId, dev, port, state, ageOrTime) {
  const base = `[${sheetId}] ${port ? `${dev}:${port}:Config` : `${dev}:Config`}`;
  if (state === 'non-eos')  return `${base} — Non-EOS`;
  if (state === 'fetching') return `${base} [${ageOrTime}] - Fetching`;
  return `${base} [${ageOrTime}]`;
}
// Sets label + visual state. Color derived from state via _SPLIT_STATE_BG — no bg arg needed.
function _setSplitBtnLabel(splitId, sheetId, dev, port, state, ageOrTime) {
  setSplitBtnState(splitId, _buildSplitLabel(sheetId, dev, port, state, ageOrTime), state, state !== 'ready');
}

// --- GLOBAL COPY HANDLER ---
function handleCopy(text, btnId) {
  if (!text) { setStatus("No configuration to copy.", "status-warn"); return; }

  const btn = document.getElementById(btnId);
  const wrapper = btn ? btn.closest('.split-btn') : null;

  // 1. Visual Feedback helper
  const doFeedback = () => {
    if (!btn) return;
    const originalLabel = btn.innerText;
    btn.innerText = "Copied";
    if (wrapper) wrapper.style.background = "#3b82f6";
    setTimeout(() => {
      btn.innerText = originalLabel;
      if (wrapper) wrapper.style.background = _SPLIT_STATE_BG[wrapper.dataset.splitState] || '#64748b';
    }, 2000);
  };

  // 2. Perform Copy — navigator.clipboard primary, execCommand fallback
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
      setStatus("Copy failed — please select and copy manually.", "status-error");
    });
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0;user-select:text;-webkit-user-select:text;";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); doFeedback(); } catch(e) { setStatus("Copy failed.", "status-error"); }
    document.body.removeChild(ta);
  }
}

/**
* Displays the hovering tooltip.
* STRICT SYNC: Uses backend 'details.peerDev' to ensure Tooltip matches Config exactly.
*/
function showTooltip(e, portId, peerId) {
  let myData = allNodesData[portId];
  if (!myData) return;

  // --- 1. FORCE LOGICAL SYNC (The Fix) ---
  // The backend config generator uses 'details.peerDev' & 'details.peerPort'.
  // We MUST use the exact same data source to prevent discrepancies.
  // This overrides the visual 'peerId' derived from the line hover.
  if (myData.details && myData.details.peerDev && myData.details.peerPort) {
    const logicalPeerId = myData.details.peerDev + ":" + myData.details.peerPort;

    // Only use it if that node actually exists in our current dataset
    if (allNodesData[logicalPeerId]) {
      peerId = logicalPeerId;
    }
  }
  // ---------------------------------------

  let peerData = peerId ? allNodesData[peerId] : null;

  // Callback to re-run tooltip if config finishes loading while hovering
  const refreshCallback = () => {
    if (activeTooltipPortId === portId) showTooltip(null, portId, peerId);
  };

  // --- 2. CONFIG FETCH LOGIC ---
  const _isNonEos = d => allDevicesData[d] && allDevicesData[d].type === 'non-arista';
  if (!myData.details.config && !_isNonEos(myData.device)) {
    if (configCache[myData.device]) {
      processDeviceConfig(myData.device, configCache[myData.device].data);
    } else {
      fetchFullConfig(myData.device, refreshCallback);
    }
  }

  if (peerData && !peerData.details.config && !_isNonEos(peerData.device)) {
    if (configCache[peerData.device]) {
      processDeviceConfig(peerData.device, configCache[peerData.device].data);
    } else {
      fetchFullConfig(peerData.device, refreshCallback);
    }
  }

  let myDev = allDevicesData[myData.device];
  let peerDev = peerData ? allDevicesData[peerData.device] : null;

  let myIdx = (myDev && myDev.sheetIndex) ? myDev.sheetIndex : "-";
  let peerIdx = (peerDev && peerDev.sheetIndex) ? peerDev.sheetIndex : "-";

  // --- 3. UI HELPER: HEADER BOXES ---
  const buildBox = (idx, dev, port, isDim) => {
    if (isDim) return `<div class="tt-dev-box" style="color:#94a3b8; font-style:italic">Disconnected</div>`;
    return `<div class="tt-dev-box">
<div><span class="tt-dev-idx">[${idx}]</span>${escapeHtml(dev)}</div>
<div class="tt-port-name">${escapeHtml(port)}</div>
</div>`;
  };

  // --- 4. BUILD LEFT PANE: ATTRIBUTE GRID ---
  let html = `<div class="tt-left-pane">
<div class="tt-header">
${buildBox(myIdx, myData.device, escapeHtml(myData.name), false)}
<div class="tt-arrow">↔</div>
${peerData ? buildBox(peerIdx, peerData.device, peerData.name, false) : buildBox(0, 0, 0, true)}
</div>
<div class="tt-body">`;

  // Iterate through schema and compare values; skip rows where both sides are empty
  topoColumnSchema.filter(item => item.key !== 'int').forEach(item => {
    let key = item.key + "_";
    let raw1 = (myData.details[key] || "").trim();
    let raw2 = peerData ? ((peerData.details[key] || "").trim()) : "";

    // Skip row if both sides are blank — avoids noise for unconfigured attributes
    if (!raw1 && !raw2) return;

    let v1 = raw1 || "-";
    let v2 = raw2 || (peerData ? "-" : "");

    let s1 = String(v1).trim().toLowerCase();
    let s2 = String(v2).trim().toLowerCase();

    // A. Basic String Diff (Ignores diffs if one side is effectively empty)
    let isDiff = (peerData && s1 !== s2 && s1 !== '-' && s2 !== '-' && s1 !== "" && s2 !== "");

    // B. Smart VLAN Diff (If basic diff found, check if values are logically identical)
    if (isDiff && item.key === 'vlan') {
      const set1 = parseVlanInput(s1);
      const set2 = parseVlanInput(s2);

      // If both sets have the same numbers, it's NOT a real mismatch
      if (set1.size === set2.size && [...set1].every(v => set2.has(v))) {
        isDiff = false;
      }
    }

    let rowClass = isDiff ? "tt-row-label tt-diff-row" : "tt-row-label";
    let valClass = isDiff ? "tt-val tt-diff-row" : "tt-val";

    html += `
<div class="${valClass} local">${escapeHtml(v1)}</div>
<div class="${rowClass}">${escapeHtml(item.label)}</div>
<div class="${valClass} peer">${escapeHtml(v2)}</div>`;
  });

  html += `</div></div>`;

  // --- 5. BUILD RIGHT PANE: CONFIG SNIPPETS ---
  let localCfg = myData.details.config ? _expandTaCleanDisplay(myData.details.config) : "Loading...";
  let peerCfg = peerData ? (peerData.details.config ? _expandTaCleanDisplay(peerData.details.config) : "Loading...") : "";

  html += `<div class="tt-right-pane">
<div class="tt-config-header">
${buildBox(myIdx, myData.device, escapeHtml(myData.name), false)}
<div class="tt-arrow">↔</div>
${peerData ? buildBox(peerIdx, peerData.device, peerData.name, false) : `<div class="tt-dev-box" style="color:#94a3b8; font-style:italic">Peer Config</div>`}
</div>
<div class="tt-config-body">
<div class="tt-config-col local">${escapeHtml(localCfg)}</div>
<div class="tt-config-col peer">${escapeHtml(peerCfg)}</div>
</div>
</div>`;

  // --- 6. RENDER TO DOM ---
  let tooltip = document.getElementById("tooltip");
  tooltip.innerHTML = html;
  tooltip.style.display = "flex";

  if (e) moveTooltip(e);
}

function moveTooltip(e) {
  let tt = document.getElementById("tooltip");

  // 1. SAFETY: Stop if tooltip is hidden or doesn't exist
  if (!tt || tt.style.display === 'none' || tt.style.display === '') return;

  // 2. GHOST EFFECT: Only dim if movement is significant (> 5px)
  // This prevents the "flicker" when the mouse is barely moving.
  if (Math.abs(e.movementX) > 5 || Math.abs(e.movementY) > 5) {
    tt.classList.add("is-moving");
  }

  // 3. DEBOUNCE: Remove ghost effect after stopping
  if (tooltipTimer) clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => {
    tt.classList.remove("is-moving");
  }, 100);

  // 4. POSITIONING — right of cursor, vertically centered; flip left if near right edge
  let w = tt.offsetWidth, h = tt.offsetHeight;
  let winW = window.innerWidth, winH = window.innerHeight;
  let gap = 18;
  let x = e.clientX + gap;
  let y = e.clientY - Math.round(h / 2); // vertically centered on cursor

  // Flip left if tooltip would overflow right edge
  if (x + w > winW - 10) x = e.clientX - w - gap;
  // Clamp left edge
  if (x < 10) x = 10;
  // Clamp vertical
  if (y < 10) y = 10;
  if (y + h > winH - 10) y = winH - h - 10;

  tt.style.left = x + "px";
  tt.style.top = y + "px";
}

// --- 1. GLOBAL LISTENER: Tracks mouse everywhere to ensure smooth transparency ---
document.addEventListener('mousemove', function (e) {
  lastMouseEvent = e;
  const tt = document.getElementById("tooltip");
  if (tt && tt.style.display !== 'none' && tt.style.display !== '') {
    // Safety: if tooltip is visible but cursor drifted off all port rows (e.g. a floating
    // panel slid over the row without triggering mouseleave), forcibly hide it.
    if (activeTooltipPortId && !e.target.closest('.port-row')) {
      cancelTooltip();
      hideTooltip();
      return;
    }
    moveTooltip(e);
  }
});

function scheduleTooltip(e, portId, peerId) {
  if (tooltipShowTimer) { clearTimeout(tooltipShowTimer); tooltipShowTimer = null; }
  tooltipShowTimer = setTimeout(function() {

}

function cancelTooltip() {
  if (tooltipShowTimer) { clearTimeout(tooltipShowTimer); tooltipShowTimer = null; }
}

function hideTooltip() {
  activeTooltipPortId = null;

}
