function _portColFilter(val) {
  if (!val || val === '-') return;
  const si = document.getElementById('searchInp');
  const clearBtn = document.getElementById('searchClear');
  const v = String(val).toLowerCase();
  si.value = (si.value.toLowerCase().trim() === v) ? '' : v;
  if (clearBtn) clearBtn.style.display = si.value ? 'flex' : 'none';
  filterTopology();
}

function filterTopology() {
  // --- [FIX 1] CLEAR GHOST ARTIFACTS ---
  // This wipes the blue SVG layer immediately so it doesn't get stuck
  clearInteractionSVG();
  selectedLineId = null; // Deselect active lines to prevent ghosting
  hoveredLink = null;
  // -------------------------------------

  let input = document.getElementById("searchInp").value.toLowerCase().trim();
  let isStrict = document.getElementById("strictSearch").checked;

  const searchContainer = document.getElementById("searchInp")?.closest('.search-container');

  // === VLAN TRACE MODE: input is "v" + digits (e.g. v10, v10,20, v10-20) ===
  const vlanTraceMatch = input.match(/^v([\d,\-\s]+)$/i);
  if (vlanTraceMatch) {
    // Reset filter state so all nodes are visible for tracing
    document.querySelectorAll(".node").forEach(n => { n.classList.remove("dimmed"); if (!hiddenDevices.has(n.dataset.id)) n.style.display = ""; });
    document.querySelectorAll(".port-row").forEach(p => p.classList.remove("hidden-global"));
    searchActiveLinks.clear();
    traceVlan(vlanTraceMatch[1].trim());
    const st = document.getElementById("status");
    setStatus(`Tracing VLAN ${vlanTraceMatch[1].trim()}`);
    return;
  }

  // === FILTER MODE: clear any active trace before filtering ===
  searchContainer?.classList.remove('search-matched');
  clearVlanTrace();

  // 1. RESET STATE IF EMPTY
  if (!input) {
    searchContainer?.classList.remove('search-matched');
    restoreCameraState();
    document.querySelectorAll(".node").forEach(n => { n.classList.remove("dimmed"); if (!hiddenDevices.has(n.dataset.id)) n.style.display = ""; });
    document.querySelectorAll(".port-row").forEach(p => { p.classList.remove("hidden-global"); });
    searchActiveLinks.clear();
    requestAnimationFrame(redrawLinks);
    requestAnimationFrame(refreshGroupRects);
    return;
  } else {
    captureCameraState();
  }

  // 2. PREPARE SEARCH TERMS
  let rawTerms = input.split(",").map(t => t.trim()).filter(t => t !== "");
  let searchPatterns = rawTerms.map(term => {
    // Try to compile as regex; fall back to literal on syntax error
    let safeTerm;
    try { new RegExp(term); safeTerm = term; } catch(e) { safeTerm = escapeRegExp(term); }
    if (isStrict) {
      return new RegExp("(?:^|\\s|\\/|:)(?:" + safeTerm + ")(?:$|\\s|\\/|:)", "i");
    } else {
      return new RegExp(safeTerm, "i");
    }
  });

  // 3. FILTER NODES & PORTS
  let nodes = document.querySelectorAll(".node");
  let visibleMaxY = 0;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let hasMatch = false;
  let deviceMatchCount = 0;
  let matchedPortIds = new Set();

  nodes.forEach(function (n) {
    let deviceName = (n.querySelector(".node-header-title")?.innerText || "").toLowerCase();
    const deviceRoles = n.dataset.roles || "";
    const intVlans = deviceInternalVlans[n.dataset.id?.toLowerCase()] || [];

    // Check if Device Name, Role, or internal VLAN matches
    let deviceMatch = rawTerms.some((t, i) => {
      const pat = searchPatterns[i];
      if (pat.test(deviceName) || pat.test(deviceRoles)) return true;
      const tNum = parseInt(t);
      return !isNaN(tNum) && intVlans.includes(tNum);
    });

    let hasVisiblePorts = false;
    let ports = n.querySelectorAll(".port-row");
    let matchCount = 0;

    ports.forEach(function (p) {
      p.classList.remove("hidden-global");

      let fullPortId = p.dataset.portId;
      let portData = allNodesData[fullPortId];

      if (!portData || !portData.details) return;

      let d = portData.details;

      // SEARCHABLE TEXT (Includes Config/IPs)
      let rowText = [
        portData.name,
        d.vlan_, d.et_speed_, d.xcvr_speed_, d.desc_,
        d.ip_type_, d.sp_mode_, d.vrf_,
        d.po_, d.po_ ? 'po' + String(d.po_).replace(/\D/g, '') : '',
        d.config || ""
      ].join(" ").toLowerCase();

      let isPortMatch = false;

      if (deviceMatch) {
        isPortMatch = true;
      } else {
        isPortMatch = searchPatterns.some(pattern => pattern.test(rowText));
      }

      if (isPortMatch) {
        hasVisiblePorts = true;
        matchCount++;
        matchedPortIds.add(fullPortId);
      } else {
        p.classList.add("hidden-global");
      }
    });

    updateNodeStats(n, matchCount);

    if (deviceMatch || hasVisiblePorts) {
      if (hiddenDevices.has(n.dataset.id)) {
        n.style.display = "none";
      } else {
        n.classList.remove("dimmed");
        n.style.display = "";

        // Bounding Box Logic
        let nodeTop = parseInt(n.style.top || 0);
        let nodeLeft = parseInt(n.style.left || 0);
        let nodeWidth = n.offsetWidth;
        let nodeHeight = n.offsetHeight;

        if ((nodeTop + nodeHeight) > visibleMaxY) visibleMaxY = nodeTop + nodeHeight;

        hasMatch = true;
        deviceMatchCount++;
        if (nodeLeft < minX) minX = nodeLeft;
        if (nodeTop < minY) minY = nodeTop;
        if (nodeLeft + nodeWidth > maxX) maxX = nodeLeft + nodeWidth;
        if (nodeTop + nodeHeight > maxY) maxY = nodeTop + nodeHeight;
      }
    } else {
      n.classList.add("dimmed");
      n.style.display = "none";
    }
  });

  // 4. FILTER LINKS & RESIZE
  searchActiveLinks.clear();
  globalLinks.forEach(function (link) {
    if (matchedPortIds.has(link.u) && matchedPortIds.has(link.v)) {
      searchActiveLinks.add(link.id);
    }
  });

  let surface = document.getElementById("canvas-surface");
  let finalH = Math.max(900, visibleMaxY + 200);
  surface.style.height = finalH + "px";
  let cvs = document.getElementById("canvas-layer");
  let svg = document.getElementById("svg-layer");
  let dpr = window.devicePixelRatio || 1;

  if (cvs.height !== Math.floor(finalH * dpr)) {
    cvs.height = Math.floor(finalH * dpr);
    cvs.style.height = finalH + "px";
    svg.style.height = finalH + "px";
    if (canvasCtx) canvasCtx.scale(dpr, dpr);
  }

  requestAnimationFrame(redrawLinks);
  requestAnimationFrame(refreshGroupRects);

  // 5. UPDATE VIEW & STATUS
  searchContainer?.classList.toggle('search-matched', hasMatch);

  if (hasMatch && minX !== Infinity) {
    setTimeout(() => {
      focusView(minX, minY, maxX - minX, maxY - minY);
      requestAnimationFrame(redrawLinks);
    }, 50);

    let st = document.getElementById("status");
    if (st) {
      const portCount = matchedPortIds.size;
      setStatus(deviceMatchCount + " device" + (deviceMatchCount !== 1 ? "s" : "") + " · " + portCount + " port" + (portCount !== 1 ? "s" : ""));
    }
  } else if (!hasMatch && input !== "") {
    let st = document.getElementById("status");
    if (st) {
      setStatus("No matches found for '" + input + "'", "status-error");
    }

    zoomLevel = 1;
    panX = 0;
    panY = 0;
    updateTransform();

  } else {
    let st = document.getElementById("status");
    if (st) {
      setStatus(getReadyStatus());
    }
  }
}

function focusView(x, y, w, h) {
  let vp = document.getElementById("viewport");
  let surface = document.getElementById("canvas-surface");
  let vpW = vp.clientWidth;
  let vpH = vp.clientHeight;

  // 1. Padding (Keep results away from the edges)
  let padding = 60;

  // 2. Calculate Required Scale to fit content
  // Prevent division by zero if width/height is 0 (single node)
  let contentW = w || 300;
  let contentH = h || 300;

  let scaleX = (vpW - (padding * 2)) / contentW;
  let scaleY = (vpH - (padding * 2)) / contentH;

  // Fit to screen (Keep aspect ratio)
  let newScale = Math.min(scaleX, scaleY);

  // 3. Clamp Zoom Levels
  if (newScale > 1.5) newScale = 1.5;
  if (newScale < 0.2) newScale = 0.2;

  // 4. Calculate Center of Content
  let centerX = x + (w / 2);
  let centerY = y + (h / 2);

  // 5. Calculate Pan to Center content in Viewport
  // Formula: Pan = (ScreenCenter) - (ContentCenter * Scale)
  let newPanX = (vpW / 2) - (centerX * newScale);
  let newPanY = (vpH / 2) - (centerY * newScale);

  // 6. Apply Immediately
  zoomLevel = newScale;
  panX = newPanX;
  panY = newPanY;

  // Remove transition momentarily for snap-to-view feel, then restore
  surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
  updateTransform();
}


function filterDevicePorts(inp, deviceId) {
  let term = inp.value.toLowerCase();
  deviceSearchTerms[deviceId] = term;
  let header = inp.parentNode;
  let node = header.parentNode;
  let ports = node.querySelectorAll(".port-row");
  let matchCount = 0;
  ports.forEach(function (p) {
    if (term === "") { p.classList.remove("hidden-local"); matchCount++; } else {
      let rowText = p.innerText;
      if (checkSearchMatch(rowText, term)) { p.classList.remove("hidden-local"); matchCount++; } else { p.classList.add("hidden-local"); }
    }
  });
  updateNodeStats(node, (term === "") ? 0 : matchCount);
  requestAnimationFrame(redrawLinks);
}

function getVlanColor(vlanId) {
  if (!vlanColorCache[vlanId]) {
    let h;
    const num = parseInt(vlanId);

    if (!isNaN(num)) {
      // STRATEGY A: Numeric VLANs (10, 20, 999)
      // Use Golden Angle (approx 137.5 degrees)
      // This ensures adjacent or similar numbers have vastly different colors
      // e.g. 10=Green, 11=Pink, 12=Blue
      h = Math.floor((num * 137.508) % 360);
    } else {
      // STRATEGY B: Non-Numeric (Mgmt, etc) -> String Hash
      let str = String(vlanId);
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      h = Math.abs(hash % 360);
    }

    // Style: High Saturation (85%) + Darker Lightness (45%) for good contrast against white
    vlanColorCache[vlanId] = `hsl(${h}, 85%, 40%)`;
  }
  return vlanColorCache[vlanId];
}

function parseVlanInput(input) {
  let vlanSet = new Set();
  if (!input) return vlanSet;

  // TWEAK: Replace spaces with commas to allow "10 20" format
  let cleanInput = input.replace(/\s+/g, ",").replace(/[^0-9,\-]/g, "");

  let parts = cleanInput.split(",");
  parts.forEach(function (part) {
    part = part.trim();

    // Check for Range (10-20)
    if (part.includes("-")) {
      let range = part.split("-");
      if (range.length === 2 && range[0] !== "" && range[1] !== "") {
        let start = parseInt(range[0]);
        let end = parseInt(range[1]);
        if (!isNaN(start) && !isNaN(end)) {
          let low = Math.min(start, end);
          let high = Math.max(start, end);
          if ((high - low) < 1000) {
            for (let i = low; i <= high; i++) vlanSet.add(i.toString());
          }
        }
      }
    }
    // Check for Single Number
    else {
      if (part !== "" && !isNaN(part)) {
        vlanSet.add(part);
      }
    }
  });
  return vlanSet;
}


// Parses a vlan_ field value that may contain an 'nv<N>' native-VLAN token.
// DUPLICATED in Code.gs — last synced: 2026-05-05
// Returns { native: string|null, vlans: string } where:
//   native = the native VLAN number as a string (e.g. "100"), or null if absent
//   vlans  = the remaining VLAN string with the nv token removed (e.g. "10,20")
function parseVlanWithNative(str) {
  var s = String(str || '').trim();
  if (!s) return { native: null, vlans: '' };
  var native = null;
  var rest = [];
  s.split(',').forEach(function(p) {
    var t = p.trim();
    var m = t.match(/^nv(\d+)$/i);
    if (m && !native) {
      native = m[1];
    } else if (t) {
      rest.push(t);
    }
  });
  return { native: native, vlans: rest.join(',') };
}

// vlanStr: digit string e.g. "10" or "10,20" or "10-20". Omit to read from vlanTraceInp.
function traceVlan(vlanStr) {
  const inputEl = document.getElementById("vlanTraceInp");
  const traceContainer = inputEl?.closest('.trace-container');
  const inputVal = (vlanStr !== undefined) ? String(vlanStr).trim() : (inputEl?.value || "");

  // --- Input validation & container styling ---
  const invalidChars = /[^0-9,\-\s]/;
  if (inputEl) {
    if (inputVal && invalidChars.test(inputVal)) {
      traceContainer?.classList.add('trace-error');
      traceContainer?.classList.remove('trace-active');
    } else if (inputVal) {
      traceContainer?.classList.add('trace-active');
      traceContainer?.classList.remove('trace-error');
    } else {
      traceContainer?.classList.remove('trace-active', 'trace-error');
    }
  }

  let nodes = document.querySelectorAll(".node");
  let ports = document.querySelectorAll(".port-row");

  activeLinkColors = {};
  vlanColorCache = {};
  let activeVlanData = {};

  const searchContainer = document.getElementById("searchInp")?.closest('.search-container');

  // Reset View if empty
  if (!inputVal) {
    searchContainer?.classList.remove('search-matched');
    restoreCameraState();
    nodes.forEach(n => { n.classList.remove("trace-hidden"); });
    ports.forEach(p => {
      p.classList.remove("trace-hidden", "trace-active-port");
      p.style.backgroundColor = "";
      p.style.borderLeftColor = "";
      let dot = p.querySelector(".dot");
      if (dot) { dot.style.backgroundColor = ""; dot.style.boxShadow = ""; }
    });
    updateVlanLegend({});
    requestAnimationFrame(redrawLinks);
    return;
  } else {
    captureCameraState();
  }

  let targetVlans = parseVlanInput(inputVal);
  let validPortIds = new Set();
  let activeDeviceIds = new Set();
  let portColors = {};

  // 2. Identify Matches
  for (let pid in allNodesData) {
    let data = allNodesData[pid];
    let matchedVlan = getMatchingVlan(data, targetVlans);
    let elObj = globalPortElements[pid];

    if (matchedVlan) {
      validPortIds.add(pid);
      activeDeviceIds.add(data.device);

      let color = getVlanColor(matchedVlan);
      portColors[pid] = color;

      // NEW: Collect for Legend
      activeVlanData[matchedVlan] = color;

      if (elObj && elObj.row) {
        let row = elObj.row;
        row.classList.remove("trace-hidden");
        row.classList.add("trace-active-port");
        row.style.borderLeftColor = color;
        row.style.backgroundColor = "var(--success-bg)";
        let dot = row.querySelector(".dot");
        if (dot) {
          dot.style.backgroundColor = color;
          dot.style.boxShadow = "0 0 4px " + color;
        }
      }
    } else {
      if (elObj && elObj.row) {
        elObj.row.classList.remove("trace-active-port");
        elObj.row.classList.add("trace-hidden");
      }
    }
  }

  // 3. Update Links & Inject Non-Arista Devices
  globalLinks.forEach(function(link) {
    let uData = allNodesData[link.u];
    let vData = allNodesData[link.v];
    if (!uData || !vData) return;

    let uMatch = validPortIds.has(link.u);
    let vMatch = validPortIds.has(link.v);

    let devA = allDevicesData[uData.device];
    let devB = allDevicesData[vData.device];
    let uIsNonArista = devA && devA.type === 'non-arista';
    let vIsNonArista = devB && devB.type === 'non-arista';

    // 🛑 FIX: Trace through to Non-Arista devices
    if ((uMatch && vMatch) || (uMatch && vIsNonArista) || (vMatch && uIsNonArista)) {
      let sourceMatch = uMatch ? link.u : link.v;
      let linkColor = portColors[sourceMatch] || "#999";
      activeLinkColors[link.id] = linkColor;

      // Wake up BOTH devices connected to this link
      activeDeviceIds.add(uData.device);
      activeDeviceIds.add(vData.device);

      // Visually highlight the Non-Arista Port to complete the path
      let nonAristaPort = null;
      if (uMatch && vIsNonArista) nonAristaPort = link.v;
      if (vMatch && uIsNonArista) nonAristaPort = link.u;

      if (nonAristaPort && !validPortIds.has(nonAristaPort)) {
         validPortIds.add(nonAristaPort);
         portColors[nonAristaPort] = linkColor;

         let elObj = globalPortElements[nonAristaPort];
         if (elObj && elObj.row) {
             elObj.row.classList.remove("trace-hidden");
             elObj.row.classList.add("trace-active-port");
             elObj.row.style.borderLeftColor = linkColor;
             elObj.row.style.backgroundColor = "var(--success-bg)";
             let dot = elObj.row.querySelector(".dot");
             if(dot) { dot.style.backgroundColor = linkColor; dot.style.boxShadow = "0 0 4px " + linkColor; }
         }
      }
    }
  });

  // 4. Update Nodes & Calculate Auto-Focus
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let hasMatch = false;

  nodes.forEach(function(n) {
    let devId = n.dataset.id;
    if (activeDeviceIds.has(devId)) {
      n.classList.remove("trace-hidden");
      const x = n.offsetLeft;
      const y = n.offsetTop;
      const w = n.offsetWidth;
      const h = n.offsetHeight;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x + w > maxX) maxX = x + w;
      if (y + h > maxY) maxY = y + h;
      hasMatch = true;
    } else {
      n.classList.add("trace-hidden");
    }
  });

  // 5. RENDER LEGEND & VIEW
  updateVlanLegend(activeVlanData);

  // Annotate internal VLANs — show which devices have the traced VLAN as EOS-allocated
  (function() {
    const legend = document.getElementById('vlan-legend');
    if (!legend || !Object.keys(deviceInternalVlans).length) return;
    const intAnnotations = [];
    targetVlans.forEach(vid => {
      const vidN = parseInt(vid);
      if (isNaN(vidN)) return;
      const onDevices = Object.entries(deviceInternalVlans)
        .filter(([, vlans]) => vlans.includes(vidN))
        .map(([devId]) => devId);
      if (onDevices.length) intAnnotations.push({ vid: vidN, onDevices });
    });
    if (intAnnotations.length) {
      let html = intAnnotations.map(({ vid, onDevices }) =>
        `<div class="legend-internal-note">VLAN ${vid} — EOS internal on:<br>${onDevices.join(', ')}</div>`
      ).join('');
      legend.innerHTML += html;
      legend.classList.add('visible');
    }
  })();

  requestAnimationFrame(redrawLinks);

  // Green only when VLAN is actually found in topology
  searchContainer?.classList.toggle('search-matched', hasMatch);

  if (hasMatch && minX !== Infinity) {
    focusView(minX, minY, maxX - minX, maxY - minY);
  }
}

/* --- LEGEND TOGGLE LOGIC --- */
function toggleLegendDisplay() {
  const legend = document.getElementById("floatingLegend");
  if (legend) legend.classList.toggle("collapsed");
}

function getMatchingVlan(portData, vlanSet) {
  if (!portData || !portData.details) return null;
  let d = portData.details;

  // Helper to check set existence with string conversion
  const check = (val) => {
    if (val === undefined || val === null || val === "") return false;
    return vlanSet.has(String(val).trim());
  };

  // 1. Check Native VLAN (encoded as nv<N> token in vlan_)
  const _pvVlan = parseVlanWithNative(d.vlan_);
  if (_pvVlan.native && check(_pvVlan.native)) return _pvVlan.native;

  // 2. Check Sub-interface (e.g., Et1.10)
  if (portData.name.includes(".")) {
    let sub = portData.name.split(".")[1];
    if (check(sub)) return sub;
  }

  let mode = (d.sp_mode_ || "").toLowerCase(); // Note: underscore
  let isTrunk = mode.includes("trunk");

  // 3. Check Access VLAN
  if (!isTrunk) {
    if (check(d.vlan_)) return String(d.vlan_);
  }

  // 4. Check Trunk Allowed VLANs
  if (isTrunk) {
    // If VLAN is empty OR explicitly says "all" or "1-4094"
    const vVal = String(d.vlan_ || "").toLowerCase();
    if (!vVal || vVal === "all" || vVal.includes("1-4094")) {
      const first = vlanSet.values().next().value;
      return first !== undefined ? first : null;
    }

    // Check list: "10, 20, 30"
    let allowed = String(d.vlan_).split(",").map(s => s.trim());
    for (let i = 0; i < allowed.length; i++) {
      if (vlanSet.has(allowed[i])) return allowed[i];
    }
  }
  return null;
}

/**
* REUSABLE HELPER: Zooms and Pans the camera to fit all visible nodes.
* UPDATED: Now handles both Detailed (HTML) and Holistic (SVG) centering correctly.
*/
function zoomToFit() {
  const surface = document.getElementById("canvas-surface");
  if (!surface) return;

  // 1. Enable smooth transition for the "Slide" effect
  surface.style.transition = "transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)";

  // 2. Identify which mode we are in and gather nodes
  const htmlNodes = document.querySelectorAll(".node:not(.dimmed)");
  const svgNodes = document.querySelectorAll(".node-circle");

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let hasContent = false;

  // CASE A: Detailed View (HTML Cards)
  if (htmlNodes.length > 0 && document.getElementById("nodes-layer").innerHTML !== "") {
    htmlNodes.forEach(n => {
      hasContent = true;
      const x = n.offsetLeft;
      const y = n.offsetTop;
      const w = n.offsetWidth;
      const h = n.offsetHeight;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x + w > maxX) maxX = x + w;
      if (y + h > maxY) maxY = y + h;
    });
  }
  // CASE B: Holistic View (SVG Circles)
  else if (svgNodes.length > 0) {
    svgNodes.forEach(n => {
      // D3 binds position data to the DOM element's __data__ property
      const d = n.__data__;
      if (d) {
        hasContent = true;
        const r = 40; // Radius + Padding
        if (d.x - r < minX) minX = d.x - r;
        if (d.y - r < minY) minY = d.y - r;
        if (d.x + r > maxX) maxX = d.x + r;
        if (d.y + r > maxY) maxY = d.y + r;
      }
    });
  }

  // 3. Apply Focus
  if (hasContent && minX !== Infinity) {
    // Add some padding to the calculation so nodes aren't touching the screen edge
    const w = maxX - minX;
    const h = maxY - minY;

    // Use your existing focusView helper to calculate center
    focusView(minX, minY, w, h);
  }
  else {
    // Fallback: Reset to origin
    zoomLevel = 1;
    panX = 0;
    panY = 0;
    updateTransform();
  }
}

/**
* Updates a button's visual state based on whether data is "Dirty" (Changed).
*/
// Reads the button's own text on first call (strips any trailing " *") so the
// label never needs to be hardcoded at each call site — rename the HTML and it follows.
function updateDirtyButton(btnSelector, isDirty) {
  const btn = document.querySelector(btnSelector);
  if (!btn) return;
  if (!btn.dataset.cleanLabel) btn.dataset.cleanLabel = btn.innerText.replace(/ \*$/, '').trim();
  const label = btn.dataset.cleanLabel;
  if (isDirty) {
    btn.innerText = label + " *";
    btn.style.background = "#f59e0b";
  } else {
    btn.innerText = label;
    btn.style.background = "#10b981";
  }
}

// --- DIRTY-CLOSE HELPERS ---
function _confirmDirtyClose(isDirty, modalLabel) {
  if (!isDirty) return true;
  return confirm("△ You have unsaved changes in " + modalLabel + ".\n\nClose anyway? (Changes will be lost)");
}

function _captureFormState(modalId) {
  const modal = document.getElementById(modalId);
  if (!modal) return '';
  const state = {};
  modal.querySelectorAll('input, select, textarea').forEach(function(el) {
    const key = el.id || el.name || (el.type + '_' + el.value);
    state[key] = (el.type === 'checkbox' || el.type === 'radio') ? el.checked : el.value;
  });
  return JSON.stringify(state);
}

function checkSnakeTrafficWarning() {
  const warn = document.getElementById("snakeTrafficWarning");
  if (!warn) return;
  const hasSnake = globalLinks.some(l => l.type === 'snake');
  if (!hasSnake) { warn.style.display = 'none'; return; }

  const msgs = [];
  // Soft NH warning — only shown if traffic gen may not be directly connected
  const ep1NhEl = document.getElementById("ip_ep1_nh");
  const ep2NhEl = document.getElementById("ip_ep2_nh");
  if ((!ep1NhEl || !ep1NhEl.value.trim()) || (!ep2NhEl || !ep2NhEl.value.trim())) {
    msgs.push("fill in EP1/EP2 NH IP if traffic gen is not directly connected");
  }
  if (!_snakeTrafficFlags.hasIn) msgs.push("set EP1 port description to 'TRAFFIC_SNAKE_EP1_L3'");
  if (!_snakeTrafficFlags.hasOut) msgs.push("set EP2 port description to 'TRAFFIC_SNAKE_EP2_L3'");

  if (msgs.length === 0) { warn.style.display = 'none'; return; }
  warn.textContent = 'Snake detected — ' + msgs.join('; ') + '.';
  warn.style.display = 'block';
}

// Validate a mask input and show/hide inline error. min/max are integer prefix lengths.
function _onMaskInput(inp, errId, min, max) {
  const raw = inp.value.trim();
  const errEl = document.getElementById(errId);
  if (!errEl) return;
  if (!raw) { errEl.textContent = ''; inp.closest('.input-wrapper').classList.remove('has-error'); return; }
  const n = parseInt(raw.replace('/', ''));
  const invalid = isNaN(n) || n < min || n > max;
  errEl.textContent = invalid ? '/' + min + '–/' + max : '';
  inp.closest('.input-wrapper').classList.toggle('has-error', invalid);
}

// Wide-prefix mode state — tracks transitions to save/restore the first-field value.
// In wide mode (IPv4 < /24, IPv6 < /64), "1" is the only universally valid prefix:
// any larger digit overflows 255 for VLANs ≥ 1000 (e.g. "3"+oct2=10 → "310").
let _gwV4WideMode = false, _gwV6WideMode = false;
let _gwV4FirstSaved = null, _gwV6FirstSaved = null;

// Rebuild GW Auto Config examples — always shows both standard and wide-prefix columns.
// Example uses VLAN 1520: oct2 = floor(1520/100) = 15, oct3 = 1520 % 100 = 20.
// "GW MLAG phy" rows use last+id (id=3,4 = notional MLAG pair sheet indices).
// "GW phy" row uses just last (non-LEAF / SPINE formula — no device-id offset).
function _updateGwExample() {
  const oct2 = 15, oct3 = 20;
  const firstEl4 = document.getElementById('ip_gw_v4_first');
  const lblEl4   = document.getElementById('lbl_gw_v4_first');
  const firstEl6 = document.getElementById('ip_gw_v6_first');
  const lblEl6   = document.getElementById('lbl_gw_v6_first');

  if (!document.getElementById('ip_gw_v4_mask')) return;
  const m4   = (document.getElementById('ip_gw_v4_mask').value || '/24').trim();
  const m6   = (document.getElementById('ip_gw_v6_mask').value || '/64').trim();
  const pfx4 = parseInt(m4.replace('/', '')) || 24;
  const pfx6 = parseInt(m6.replace('/', '')) || 64;
  const wide4 = pfx4 < 24, wide6 = pfx6 < 64;
  const superWide4 = pfx4 < 16, superWide6 = pfx6 < 48;

  // ── Global first-field lock: "1" in wide mode, saved/restored on transition ──
  if (firstEl4) {
    if (wide4 && !_gwV4WideMode) { _gwV4FirstSaved = firstEl4.value; _gwV4WideMode = true; }
    else if (!wide4 && _gwV4WideMode) { _gwV4WideMode = false; if (_gwV4FirstSaved !== null) firstEl4.value = _gwV4FirstSaved; _gwV4FirstSaved = null; }
    firstEl4.disabled = wide4;
    if (wide4) firstEl4.value = '1';
  }
  if (lblEl4) lblEl4.textContent = wide4 ? 'Prefix' : 'First Octet';

  if (firstEl6) {
    if (wide6 && !_gwV6WideMode) { _gwV6FirstSaved = firstEl6.value; _gwV6WideMode = true; }
    else if (!wide6 && _gwV6WideMode) { _gwV6WideMode = false; if (_gwV6FirstSaved !== null) firstEl6.value = _gwV6FirstSaved; _gwV6FirstSaved = null; }
    firstEl6.disabled = wide6;
    if (wide6) firstEl6.value = '1';
  }
  if (lblEl6) lblEl6.textContent = wide6 ? 'Prefix' : 'First Hextet';

  // ── Per-device override fields ──
  // applyHint: updates only hint-mode fields (hint class or empty). Explicit per-device
  //   values (hint class removed by oninput) are NEVER overwritten — not by global changes,
  //   not by wide-mode transitions. First fields use '1' as the hint in wide mode.
  // SYNC: copied into Tests-client.html — update both when changing this function.
  const applyHint = (el, inheritedVal) => {
    if (!el) return;
    if (!el.value.trim() || el.classList.contains('gw-ov-wide-hint')) {
      el.value = inheritedVal;
      if (inheritedVal) el.classList.add('gw-ov-wide-hint'); else el.classList.remove('gw-ov-wide-hint');
    }
  };
  const glb4first = wide4 ? '1' : ((firstEl4 && firstEl4.value.trim()) || '');
  const glb4firstForNonWide = wide4 ? (_gwV4FirstSaved || '') : ((firstEl4 && firstEl4.value.trim()) || '');
  const glb4last  = (document.getElementById('ip_gw_v4_last')  || {}).value || '';
  const glb6first = wide6 ? '1' : ((firstEl6 && firstEl6.value.trim()) || '');
  const glb6firstForNonWide = wide6 ? (_gwV6FirstSaved || '') : ((firstEl6 && firstEl6.value.trim()) || '');
  const glb6last  = (document.getElementById('ip_gw_v6_last')  || {}).value || '';
  document.querySelectorAll('#gwDeviceOverrideTable .gw-ov-row[data-dev]').forEach(row => {
    const n = row.getAttribute('data-dev');
    const dMEl4 = document.getElementById('gw_ov_' + n + '_v4_mask');
    const dMEl6 = document.getElementById('gw_ov_' + n + '_v6_mask');
    // explicitMask: truthy (the value string) when the user has typed a per-device mask; falsy when still a hint.
    const explicitMask4 = dMEl4 && !dMEl4.classList.contains('gw-ov-wide-hint') && dMEl4.value.trim();
    const explicitMask6 = dMEl6 && !dMEl6.classList.contains('gw-ov-wide-hint') && dMEl6.value.trim();
    const devM4 = explicitMask4 || m4;
    const devM6 = explicitMask6 || m6;
    const devWide4 = (parseInt(devM4.replace('/', '')) || 24) < 24;
    const devWide6 = (parseInt(devM6.replace('/', '')) || 64) < 64;
    // forceValue: only true when the per-device mask itself is explicitly wide.
    // When global is wide but per-device mask is inherited (hint), explicit per-device first values are preserved.
    const devExplicitWide4 = !!(explicitMask4 && devWide4);
    const devExplicitWide6 = !!(explicitMask6 && devWide6);
    // SYNC: copied into Tests-client.html — update both when changing this function.
    const lockFirst = (el, wide, fallback, forceValue) => {
      if (!el) return;
      if (wide) {
        if (!el.disabled) {
          const isHint = !el.value.trim() || el.classList.contains('gw-ov-wide-hint');
          el.dataset.preLockVal = isHint ? '' : el.value;
          el.disabled = true;
          if (forceValue || isHint) { el.classList.remove('gw-ov-wide-hint'); el.value = '1'; }
          // Global wide + explicit per-device first: disable only, preserve the user's value
        } else if (forceValue && el.value !== '1') {
          // Already locked (e.g. from global wide) but per-device mask just went explicitly wide — force '1' now
          el.classList.remove('gw-ov-wide-hint');
          el.value = '1';
        }
      } else {
        if (el.disabled) {
          const saved = el.dataset.preLockVal || '';
          delete el.dataset.preLockVal;
          el.disabled = false;
          if (saved) { el.value = saved; el.classList.remove('gw-ov-wide-hint'); }
          else { el.value = ''; applyHint(el, fallback); }
        } else {
          applyHint(el, fallback);
        }
      }
    };
    lockFirst(document.getElementById('gw_ov_' + n + '_v4_first'), devWide4, glb4firstForNonWide, devExplicitWide4);
    applyHint(document.getElementById('gw_ov_' + n + '_v4_last'),  glb4last);
    applyHint(document.getElementById('gw_ov_' + n + '_v4_mask'),  m4);
    lockFirst(document.getElementById('gw_ov_' + n + '_v6_first'), devWide6, glb6firstForNonWide, devExplicitWide6);
    applyHint(document.getElementById('gw_ov_' + n + '_v6_last'),  glb6last);
    applyHint(document.getElementById('gw_ov_' + n + '_v6_mask'),  m6);
  });

  // ── Build values used in examples ──
  // Standard section uses configured first (if currently wide, use saved value).
  const f4std = (wide4 ? (_gwV4FirstSaved || '100') : ((firstEl4 ? firstEl4.value : '') || '100')).trim();
  const f6std = (wide6 ? (_gwV6FirstSaved || '100') : ((firstEl6 ? firstEl6.value : '') || '100')).trim();
  const l4n   = parseInt((document.getElementById('ip_gw_v4_last').value || '1').trim()) || 1;
  const l6n   = parseInt((document.getElementById('ip_gw_v6_last').value || '1').trim()) || 1;

  // Masks per tier — actual value when in that tier's range, illustrative otherwise.
  const m4s  = pfx4 >= 24 ? m4 : '/24';
  const m4w  = (pfx4 >= 16 && pfx4 < 24) ? m4 : '/16';
  const m4sw = pfx4 < 16 ? m4 : '/8';
  const m6s  = pfx6 >= 64 ? m6 : '/64';
  const m6w  = (pfx6 >= 48 && pfx6 < 64) ? m6 : '/48';
  const m6sw = pfx6 < 48 ? m6 : '/32';

  const sp   = (cls, v) => '<span class="' + cls + '">' + v + '</span>';
  const note = v => sp('ip-ex-note', v);
  const set  = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };

  // ── IPv4 standard formula: {f4std}.{oct2}.{oct3}.{N}/{mask} ──
  const s4p = (n) => sp('f-var',f4std)+'.'+sp('f-dyn',oct2)+'.'+sp('f-dyn',oct3)+'.'+sp('ip-ex-result',n);
  const s4mphy  = (id) => s4p(l4n+id)+m4s+' '+note('last+id');
  const s4solo  = ()   => s4p(l4n)+m4s+' '+note('last');
  const s4vip   = ()   => s4p(l4n)+' '+note('&rarr; ip virtual-router address');
  const s4any   = ()   => s4p(l4n)+m4s+' '+note('&rarr; ip address virtual');

  // ── IPv4 wide formula: {1}{oct2}.{oct3}.0.{N}/{mask} ──
  const w4p = (n) => sp('f-var','1')+sp('f-dyn',oct2)+'.'+sp('f-dyn',oct3)+'.0.'+sp('ip-ex-result',n);
  const w4mphy  = (id) => w4p(l4n+id)+m4w+' '+note('last+id');
  const w4solo  = ()   => w4p(l4n)+m4w+' '+note('last');
  const w4vip   = ()   => w4p(l4n)+' '+note('&rarr; ip virtual-router address');
  const w4any   = ()   => w4p(l4n)+m4w+' '+note('&rarr; ip address virtual');

  // ── IPv4 super-wide formula: {1}{oct3}.0.0.{N}/{mask} (oct2 dropped) ──
  const sw4p = (n) => sp('f-var','1')+sp('f-dyn',oct3)+'.0.0.'+sp('ip-ex-result',n);
  const sw4mphy = (id) => sw4p(l4n+id)+m4sw+' '+note('last+id');
  const sw4solo = ()   => sw4p(l4n)+m4sw+' '+note('last');
  const sw4vip  = ()   => sw4p(l4n)+' '+note('&rarr; ip virtual-router address');
  const sw4any  = ()   => sw4p(l4n)+m4sw+' '+note('&rarr; ip address virtual');

  // ── IPv6 standard formula: {f6std}:{oct2}:{oct3}::{N}/{mask} ──
  const s6p = (n) => sp('f-var',f6std)+':'+sp('f-dyn',oct2)+':'+sp('f-dyn',oct3)+'::'+sp('ip-ex-result',n);
  const s6mphy  = (id) => s6p(l6n+id)+m6s+' '+note('last+id');
  const s6solo  = ()   => s6p(l6n)+m6s+' '+note('last');
  const s6vip   = ()   => s6p(l6n)+' '+note('&rarr; ipv6 virtual-router address');
  const s6any   = ()   => s6p(l6n)+m6s+' '+note('&rarr; ipv6 address virtual');

  // ── IPv6 wide formula: {1}{oct2}:{oct3}:0::{N}/{mask} ──
  const w6p = (n) => sp('f-var','1')+sp('f-dyn',oct2)+':'+sp('f-dyn',oct3)+':0::'+sp('ip-ex-result',n);
  const w6mphy  = (id) => w6p(l6n+id)+m6w+' '+note('last+id');
  const w6solo  = ()   => w6p(l6n)+m6w+' '+note('last');
  const w6vip   = ()   => w6p(l6n)+' '+note('&rarr; ipv6 virtual-router address');
  const w6any   = ()   => w6p(l6n)+m6w+' '+note('&rarr; ipv6 address virtual');

  // ── IPv6 super-wide formula: {1}{oct3}:0:0::{N}/{mask} (oct2 dropped) ──
  const sw6p = (n) => sp('f-var','1')+sp('f-dyn',oct3)+':0:0::'+sp('ip-ex-result',n);
  const sw6mphy = (id) => sw6p(l6n+id)+m6sw+' '+note('last+id');
  const sw6solo = ()   => sw6p(l6n)+m6sw+' '+note('last');
  const sw6vip  = ()   => sw6p(l6n)+' '+note('&rarr; ipv6 virtual-router address');
  const sw6any  = ()   => sw6p(l6n)+m6sw+' '+note('&rarr; ipv6 address virtual');

  // ── Calc labels — each section always shows its own formula ──
  const bStyle = 'color:#64748b;font-weight:600;font-style:normal';
  const oct2s  = String(oct2);
  const oct3s  = String(oct3);
  set('gw-ex4-calc',    `Wide /16–/23:  1·${oct2s}=<b style="${bStyle}">${'1'+oct2s}</b>, oct3=${oct3}`);
  set('gw-ex4-sw-calc', `Super-wide /8–/15:  1·${oct3s}=<b style="${bStyle}">${'1'+oct3s}</b> (oct2=${oct2} dropped)`);
  set('gw-ex6-calc',    `Wide /48–/63:  1·${oct2s}=<b style="${bStyle}">${'1'+oct2s}</b>, oct3=${oct3}`);
  set('gw-ex6-sw-calc', `Super-wide /32–/47:  1·${oct3s}=<b style="${bStyle}">${'1'+oct3s}</b> (oct2=${oct2} dropped)`);
  set('gw-ex4-std-pref',  'Preferred: any VLAN');
  set('gw-ex4-wide-pref', `Preferred: VLANs ≥100 (oct2≥1)`);
  set('gw-ex4-sw-pref',   `Preferred: VLANs 1–99 (oct3 = VLAN itself)`);
  set('gw-ex6-std-pref',  'Preferred: any VLAN');
  set('gw-ex6-wide-pref', `Preferred: VLANs ≥100 (oct2≥1)`);
  set('gw-ex6-sw-pref',   `Preferred: VLANs 1–99 (oct3 = VLAN itself)`);

  // Super-wide caution: collision warning (dynamic)
  const c4El = document.getElementById('gw-ex4-caution');
  const c6El = document.getElementById('gw-ex6-caution');
  const exVlan = oct2 * 100 + oct3;   // 1520 when oct2=15, oct3=20
  const _warnSvg = '<svg width="10" height="9" viewBox="0 0 10 9" fill="none" style="vertical-align:-1px;margin-right:2px"><path d="M5 0.5L9.5 8.5H0.5L5 0.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M5 3.5v1.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="6.8" r="0.6" fill="currentColor"/></svg>';
  if (c4El) c4El.innerHTML = `${_warnSvg}VLAN ${exVlan} &amp; ${oct3} → both oct3=${oct3} → 1${oct3s}.0.0.${l4n}${m4sw} — VLANs sharing last-2-digits share one GW IP`;
  if (c6El) c6El.innerHTML = `${_warnSvg}VLAN ${exVlan} &amp; ${oct3} → both oct3=${oct3} → 1${oct3s}:0:0::${l6n}${m6sw} — VLANs sharing last-2-digits share one GW IP`;

  // ── Populate all three tier sections ──
  set('gw-ex4-std-mphy1',  s4mphy(3));  set('gw-ex4-wide-mphy1',  w4mphy(3));  set('gw-ex4-sw-mphy1',  sw4mphy(3));
  set('gw-ex4-std-mphy2',  s4mphy(4));  set('gw-ex4-wide-mphy2',  w4mphy(4));  set('gw-ex4-sw-mphy2',  sw4mphy(4));
  set('gw-ex4-std-solo',   s4solo());   set('gw-ex4-wide-solo',   w4solo());   set('gw-ex4-sw-solo',   sw4solo());
  set('gw-ex4-std-anycast',s4any());    set('gw-ex4-wide-anycast', w4any());    set('gw-ex4-sw-anycast', sw4any());
  set('gw-ex4-std-vip',    s4vip());    set('gw-ex4-wide-vip',    w4vip());    set('gw-ex4-sw-vip',    sw4vip());

  set('gw-ex6-std-mphy1',  s6mphy(3));  set('gw-ex6-wide-mphy1',  w6mphy(3));  set('gw-ex6-sw-mphy1',  sw6mphy(3));
  set('gw-ex6-std-mphy2',  s6mphy(4));  set('gw-ex6-wide-mphy2',  w6mphy(4));  set('gw-ex6-sw-mphy2',  sw6mphy(4));
  set('gw-ex6-std-solo',   s6solo());   set('gw-ex6-wide-solo',   w6solo());   set('gw-ex6-sw-solo',   sw6solo());
  set('gw-ex6-std-anycast',s6any());    set('gw-ex6-wide-anycast', w6any());    set('gw-ex6-sw-anycast', sw6any());
  set('gw-ex6-std-vip',    s6vip());    set('gw-ex6-wide-vip',    w6vip());    set('gw-ex6-sw-vip',    sw6vip());

}

// --- UPDATED OPEN FUNCTION ---
function openIpConfigModal(btn) {
  initialIpState = '';
  _autoMinimizeOpenModal();
  showModalLoading("autoConfigModal");

  const _guard = setTimeout(() => {
    hideModalLoading('autoConfigModal');
    document.getElementById("autoConfigModal").style.display = 'none';

    setStatus("Auto Config load timed out — try again", "status-error");

    hideModalLoading('autoConfigModal');

    // 1. Populate Fields
    document.getElementById("ip_p2p_v4_first").value = prefs.p2p_v4_first;
    document.getElementById("ip_p2p_v4_mask").value = prefs.p2p_v4_mask;

    document.getElementById("ip_p2p_v6_mask").value = prefs.p2p_v6_mask;

    document.getElementById("ip_gw_v4_first").value = prefs.gw_v4_first;
    document.getElementById("ip_gw_v4_last").value = prefs.gw_v4_last;
    document.getElementById("ip_gw_v4_mask").value = prefs.gw_v4_mask;

    document.getElementById("ip_gw_v6_first").value = prefs.gw_v6_first;
    document.getElementById("ip_gw_v6_last").value = prefs.gw_v6_last;
    document.getElementById("ip_gw_v6_mask").value = prefs.gw_v6_mask;
    document.getElementById("ip_lo_base").value = prefs.lo_base || "0";
    document.getElementById("ip_mlag_base").value = prefs.mlag_peer_base || "1";
    document.getElementById("ip_vni_base").value = prefs.vni_base || "10000";
    document.getElementById("ip_bgp_asn_base").value = prefs.bgp_asn_base || "65000";
    document.getElementById("ip_bridge_mac").value = prefs.bridge_mac || "";
    // Auto-fill from device bridge if field is still empty and a unique MAC was detected
    if (!prefs.bridge_mac && _detectedBridgeMac) {
      document.getElementById("ip_bridge_mac").value = _detectedBridgeMac;
    }
    document.getElementById("ip_ep1_nh").value     = prefs.ep1_nh     || "";
    document.getElementById("ip_ep1_mac").value    = prefs.ep1_mac    || "";
    document.getElementById("ip_ep1_subnet").value = prefs.ep1_subnet || "";
    document.getElementById("ip_ep2_nh").value     = prefs.ep2_nh     || "";
    document.getElementById("ip_ep2_mac").value    = prefs.ep2_mac    || "";
    document.getElementById("ip_ep2_subnet").value = prefs.ep2_subnet || "";

    // 2. Bind Listeners to ALL inputs (per-device override table excluded — _buildGwDeviceOverrideTable sets those)
    const inputs = document.querySelectorAll("#autoConfigModal input[type='text']");
    inputs.forEach(el => { if (!el.closest('#gwDeviceOverrideTable')) el.oninput = checkIpDirty; });
    // EP NH fields also trigger snake warning re-check
    ['ip_ep1_nh', 'ip_ep2_nh'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.oninput = () => { checkIpDirty(); checkSnakeTrafficWarning(); };
    });
    // Mask validation + GW example updater (override generic handler set above)
    [['ip_p2p_v4_mask','err_p2p_v4_mask',24,32],['ip_p2p_v6_mask','err_p2p_v6_mask',64,128]].forEach(([id,errId,min,max]) => {
      const el = document.getElementById(id); if (!el) return;
      el.oninput = () => { checkIpDirty(); _onMaskInput(el, errId, min, max); };
    });
    [['ip_gw_v4_mask','err_gw_v4_mask',8,32],['ip_gw_v6_mask','err_gw_v6_mask',32,128]].forEach(([id,errId,min,max]) => {
      const el = document.getElementById(id); if (!el) return;
      el.oninput = () => { checkIpDirty(); _onMaskInput(el, errId, min, max); _updateGwExample(); };
    });
    ['ip_gw_v4_first','ip_gw_v4_last','ip_gw_v6_first','ip_gw_v6_last'].forEach(id => {
      const el = document.getElementById(id); if (!el) return;
      el.oninput = () => { checkIpDirty(); _updateGwExample(); };
    });

    // 3. Build per-device GW override table (after blanket binding — sets its own rich handlers)
    _buildGwDeviceOverrideTable(prefs.arista_devices || [], prefs.gw_device_overrides || {});

    // 4. Settle derived state before snapshot: wide-mode locks (firstEl4/6.value = '1') +
    //    override hint values (applyHint sets .value on empty inputs). Both modify input
    //    values — snapshot must be taken AFTER, or those changes cause a false dirty warning.
    _updateGwExample();

    // 5. Capture Snapshot (after table built and example settled — all input values are final)
    initialIpState = getCurrentIpState();

    // 6. Reset Button Visuals
    checkIpDirty();
    checkSnakeTrafficWarning();

  }).withFailureHandler(err => {
    clearTimeout(_guard);
    hideModalLoading('autoConfigModal');
    document.getElementById("autoConfigModal").style.display = 'none';
    setActiveModalChip(null);
    setStatus("Failed to load settings: " + err, "status-error");
  }).getIpPreferencesForModal();
}


function saveIpConfig() {
  const p2p_v4 = (document.getElementById("ip_p2p_v4_first").value || '').trim();
  const p2p_v6 = (document.getElementById("ip_p2p_v6_first").value || '').trim();
  const gw_v4_first = (document.getElementById("ip_gw_v4_first").value || '').trim();
  const gw_v4_last = (document.getElementById("ip_gw_v4_last").value || '').trim();
  const gw_v6_first = (document.getElementById("ip_gw_v6_first").value || '').trim();
  const gw_v6_last = (document.getElementById("ip_gw_v6_last").value || '').trim();

  if (p2p_v4.endsWith('.') || gw_v4_first.endsWith('.') || gw_v4_last.endsWith('.')) {
    alert("Validation Error (IPv4)\n\nOctets cannot end with a dot."); return;
  }
  if (p2p_v6.endsWith(':') || gw_v6_first.endsWith(':') || gw_v6_last.endsWith(':')) {
    alert("Validation Error (IPv6)\n\nHextets cannot end with a colon."); return;
  }

  // Mask prefix-length range validation
  const _pfx = (id, def) => { const v = parseInt((document.getElementById(id).value || def).replace('/', '')); return isNaN(v) ? parseInt(def.replace('/','')) : v; };
  const gwV4Pfx  = _pfx("ip_gw_v4_mask",  '/24');
  const gwV6Pfx  = _pfx("ip_gw_v6_mask",  '/64');
  const p2pV4Pfx = _pfx("ip_p2p_v4_mask", '/24');
  const p2pV6Pfx = _pfx("ip_p2p_v6_mask", '/64');
  if (gwV4Pfx < 16 || gwV4Pfx > 32) {
    alert("Validation Error (GW IPv4 Mask)\n\nSupported range: /16 – /32\n  /16–/23 → wide-prefix formula\n  /24–/32 → standard formula"); return;
  }
  if (gwV6Pfx < 32 || gwV6Pfx > 128) {
    alert("Validation Error (GW IPv6 Mask)\n\nSupported range: /32 – /128\n  /32–/63 → wide-prefix formula\n  /64–/128 → standard formula"); return;
  }
  if (p2pV4Pfx < 24 || p2pV4Pfx > 32) {
    alert("Validation Error (P2P IPv4 Mask)\n\nSupported range: /24 – /32"); return;
  }
  if (p2pV6Pfx < 64 || p2pV6Pfx > 128) {
    alert("Validation Error (P2P IPv6 Mask)\n\nSupported range: /64 – /128"); return;
  }

  // Collect per-device GW overrides and warn on MLAG mismatch before saving
  const gwDeviceOverrides = _readGwDeviceOverrides();
  const mlagMismatches = _checkGwMlagMismatches(gwDeviceOverrides);
  if (mlagMismatches.length > 0) {
    const lines = mlagMismatches.map(m => {
      const parts = [];
      if (m.v4a && m.v4b && m.v4a !== m.v4b) parts.push(`IPv4 first: ${m.a}=${m.v4a} vs ${m.b}=${m.v4b}`);
      if (m.v6a && m.v6b && m.v6a !== m.v6b) parts.push(`IPv6 first: ${m.a}=${m.v6a} vs ${m.b}=${m.v6b}`);
      return parts.join(', ');
    }).join('\n');
    if (!confirm('MLAG GW Mismatch\n\nMLAG pairs must share the same first octet for anycast/VARP:\n' + lines + '\n\nSave anyway?')) return;
  }

  const prefs = {
    p2p_v4_first: p2p_v4 || '200',
    p2p_v4_mask: document.getElementById("ip_p2p_v4_mask").value || '/24',
    p2p_v6_first: p2p_v6 || '200',
    p2p_v6_mask: document.getElementById("ip_p2p_v6_mask").value || '/64',
    gw_v4_first: gw_v4_first || '100',
    gw_v4_last: gw_v4_last || '1',
    gw_v4_mask: document.getElementById("ip_gw_v4_mask").value || '/24',
    gw_v6_first: gw_v6_first || '100',
    gw_v6_last: gw_v6_last || '1',
    gw_v6_mask: document.getElementById("ip_gw_v6_mask").value || '/64',
    lo_base: document.getElementById("ip_lo_base").value || '0',
    mlag_peer_base: document.getElementById("ip_mlag_base").value || '1',
    vni_base: document.getElementById("ip_vni_base").value || '10000',
    bgp_asn_base: document.getElementById("ip_bgp_asn_base").value || '65000',
    bridge_mac:  (document.getElementById("ip_bridge_mac").value  || '').trim(),
    ep1_nh:      (document.getElementById("ip_ep1_nh").value      || '').trim(),
    ep1_mac:     (document.getElementById("ip_ep1_mac").value     || '').trim(),
    ep1_subnet:  (document.getElementById("ip_ep1_subnet").value  || '').trim(),
    ep2_nh:      (document.getElementById("ip_ep2_nh").value      || '').trim(),
    ep2_mac:     (document.getElementById("ip_ep2_mac").value     || '').trim(),
    ep2_subnet:  (document.getElementById("ip_ep2_subnet").value  || '').trim(),
    gw_device_overrides: gwDeviceOverrides
  };

  showGlobalLoading("Saving & Applying IPs...");

  const _guard = setTimeout(() => {
    hideGlobalLoading();
    setStatus("IP Config save timed out — try again", "status-error");
  }, 15000);

  google.script.run.withSuccessHandler(res => {
    clearTimeout(_guard);
    hideGlobalLoading();

    // Update Snapshot (Now Clean)
    initialIpState = getCurrentIpState();
    checkIpDirty(); // This turns the button Green again

    configCache = {};
    if (typeof selectedDeviceId !== 'undefined' && selectedDeviceId) {
      setStatus('IP prefs saved \u2014 ' + selectedDeviceId + ' config refresh\u2026', 'status-info');
      fetchFullConfig(selectedDeviceId);
    }

    // Use smart scheduler instead of setTimeout; force=true because save wiped configCache
    if (typeof scheduleBackgroundPrefetch === 'function') scheduleBackgroundPrefetch(true);
  })
    .withFailureHandler(err => {
      clearTimeout(_guard);
      hideGlobalLoading();
      setTimeout(() => { setStatus("Save Failed: " + err.message, "status-error"); }, 50);
    })
    .saveIpPreferences(prefs);
}

// ── Per-device GW override helpers ──────────────────────────────────────────

// MLAG pairs map, populated when the override table is built
let _gwMlagPairs = {};

function _toggleGwAdvanced() {
  const sec  = document.getElementById('gwAdvancedSection');
  const chev = document.getElementById('gwAdvancedChevron');
  const open = sec.style.display !== 'none';
  sec.style.display  = open ? 'none' : 'block';
  chev.style.transform = open ? '' : 'rotate(180deg)';
}

function _buildGwDeviceOverrideTable(devices, overrides) {
  _gwMlagPairs = {};
  devices.forEach(d => { if (d.mlagPeer) _gwMlagPairs[d.name] = d.mlagPeer; });

  const tbl = document.getElementById('gwDeviceOverrideTable');
  if (!tbl) return;
  if (!devices || devices.length === 0) {
    tbl.innerHTML = '<div style="font-size:11px;color:#94a3b8;padding:4px 0;font-family:\'JetBrains Mono\',monospace">No Arista devices found.</div>';
    return;
  }

  const colHdr = t => `<span class="gw-ov-col-hdr">${t}</span>`;
  let html = '<div class="gw-ov-row gw-ov-header">' +
    '<span class="gw-ov-devname"></span>' +
    colHdr('v4 First') + colHdr('v4 Last') + colHdr('v4 Mask') +
    colHdr('v6 First') + colHdr('v6 Last') + colHdr('v6 Mask') +
    '</div>';

  // Ensure group rects are current (loaded from localStorage)
  loadGroupRects();

  // Read global GW values for use as placeholders in per-device inputs
  const g = id => (document.getElementById(id) || {}).value || '';
  const globalGw = {
    v4_first: g('ip_gw_v4_first'), v4_last: g('ip_gw_v4_last'), v4_mask: g('ip_gw_v4_mask'),
    v6_first: g('ip_gw_v6_first'), v6_last: g('ip_gw_v6_last'), v6_mask: g('ip_gw_v6_mask')
  };

  const shown = new Set();
  const renderDev = dev => {
    if (shown.has(dev.name)) return '';
    shown.add(dev.name);
    let r = _gwDeviceRow(dev, overrides[dev.name] || {}, !!dev.mlagPeer, false, globalGw);
    if (dev.mlagPeer && !shown.has(dev.mlagPeer)) {
      shown.add(dev.mlagPeer);
      const peer = devices.find(d => d.name === dev.mlagPeer);
      if (peer) r += _gwDeviceRow(peer, overrides[dev.mlagPeer] || {}, true, true, globalGw);
    }
    return r;
  };

  // Build a position index for gap detection
  const deviceIndexMap = {};
  devices.forEach((d, i) => { deviceIndexMap[d.name] = i; });

  // Render grouped by topology group rects (holistic view groups)
  // Non-adjacent members (gap of non-member devices between them) get separate sub-headers
  // Groups are sorted by the sheet position of their first member (not creation order)
  const hasGroups = groupRects && groupRects.length > 0;
  if (hasGroups) {
    const sortedGroups = groupRects.slice().sort((a, b) => {
      const firstA = devices.findIndex(d => (a.members || []).includes(d.name));
      const firstB = devices.findIndex(d => (b.members || []).includes(d.name));
      const ia = firstA === -1 ? Number.MAX_SAFE_INTEGER : firstA;
      const ib = firstB === -1 ? Number.MAX_SAFE_INTEGER : firstB;
      return ia - ib;
    });
    sortedGroups.forEach(gr => {
      const memberSet = new Set(gr.members || []);
      // orderedMembers: group's devices in sheet-index order
      const orderedMembers = devices.filter(d => memberSet.has(d.name));
      if (orderedMembers.length === 0) return;

      // Split into contiguous runs: a gap exists when any device between two
      // consecutive members (by sheet position) is NOT in this group
      const runs = [[orderedMembers[0]]];
      for (let i = 1; i < orderedMembers.length; i++) {
        const prevIdx = deviceIndexMap[orderedMembers[i - 1].name];
        const currIdx = deviceIndexMap[orderedMembers[i].name];
        let hasGap = false;
        for (let j = prevIdx + 1; j < currIdx; j++) {
          if (!memberSet.has(devices[j].name)) { hasGap = true; break; }
        }
        if (hasGap) runs.push([orderedMembers[i]]);
        else runs[runs.length - 1].push(orderedMembers[i]);
      }

      const label = gr.label || 'Group';
      runs.forEach(run => {
        html += `<div class="gw-ov-group-header">${label}</div>`;
        run.forEach(dev => { html += renderDev(dev); });
      });
    });
  }

  // Ungrouped (or all, when no groups defined)
  const ungrouped = devices.filter(d => !shown.has(d.name));
  if (ungrouped.length > 0) {
    if (hasGroups) html += '<div class="gw-ov-group-header">Other</div>';
    ungrouped.forEach(dev => { html += renderDev(dev); });
  }

  tbl.innerHTML = html;
  tbl.querySelectorAll('input[type="text"]').forEach(el => {
    const isMask = el.id.endsWith('_v4_mask') || el.id.endsWith('_v6_mask');
    el.onfocus = () => { if (el.classList.contains('gw-ov-wide-hint')) { el.value = ''; el.classList.remove('gw-ov-wide-hint'); } };
    el.oninput = () => {
      el.classList.remove('gw-ov-wide-hint');
      if (isMask) _updateGwExample();
      checkIpDirty();
      _highlightGwMlagMismatch();
    };
    el.onblur = () => { if (!el.value.trim()) _updateGwExample(); };
  });
  _highlightGwMlagMismatch();
}

function _gwDeviceRow(dev, ov, hasMlag, isPeer, globalGw) {
  const name   = dev.name;
  const gw     = globalGw || {};
  const _devIdx = dev.sheetIndex ? String(dev.sheetIndex).padStart(2, '0') : null;
  const idTag  = _devIdx ? `<span class="gw-ov-dev-id">[${_devIdx}]</span>` : '';
  const rowCls = 'gw-ov-row' + (hasMlag ? ' gw-ov-mlag' + (isPeer ? ' gw-ov-mlag-peer' : ' gw-ov-mlag-first') : '');
  const badge  = hasMlag ? '<span class="gw-ov-mlag-badge">[M]</span>' : '';
  const inp = (field, val, ph) =>
    `<input type="text" id="gw_ov_${name}_${field}" value="${val || ''}" placeholder="${ph || '—'}"` +
    ` style="font-family:'JetBrains Mono',monospace;font-size:11px;box-sizing:border-box">`;
  return `<div class="${rowCls}" data-dev="${name}">` +
    `<span class="gw-ov-devname">${badge}${idTag}<span class="gw-ov-devname-text">${name}</span></span>` +
    `<span class="gw-ov-cell gw-ov-cell-first">${inp('v4_first', ov.v4_first, gw.v4_first)}</span>` +
    `<span class="gw-ov-cell">${inp('v4_last',  ov.v4_last,  gw.v4_last)}</span>` +
    `<span class="gw-ov-cell gw-ov-cell-mask">${inp('v4_mask',  ov.v4_mask,  gw.v4_mask)}</span>` +
    `<span class="gw-ov-cell gw-ov-cell-first">${inp('v6_first', ov.v6_first, gw.v6_first)}</span>` +
    `<span class="gw-ov-cell">${inp('v6_last',  ov.v6_last,  gw.v6_last)}</span>` +
    `<span class="gw-ov-cell gw-ov-cell-mask">${inp('v6_mask',  ov.v6_mask,  gw.v6_mask)}</span>` +
    '</div>';
}

function _readGwDeviceOverrides() {
  const overrides = {};
  document.querySelectorAll('#gwDeviceOverrideTable .gw-ov-row[data-dev]').forEach(row => {
    const name = row.getAttribute('data-dev');
    if (!name) return;
    const g = f => {
      const el = document.getElementById('gw_ov_' + name + '_' + f);
      if (!el) return '';
      if (el.disabled) return el.value.trim(); // wide-mode first field — always '1', save explicitly
      if (el.classList.contains('gw-ov-wide-hint')) return '';
      return el.value.trim();
    };
    const vals = { v4_first: g('v4_first'), v4_last: g('v4_last'), v4_mask: g('v4_mask'), v6_first: g('v6_first'), v6_last: g('v6_last'), v6_mask: g('v6_mask') };
    if (vals.v4_first || vals.v4_last || vals.v4_mask || vals.v6_first || vals.v6_last || vals.v6_mask) overrides[name] = vals;
  });
  return overrides;
}

function _highlightGwMlagMismatch() {
  const seen = new Set();
  Object.entries(_gwMlagPairs).forEach(([devA, devB]) => {
    const key = [devA, devB].sort().join('|');
    if (seen.has(key)) return;
    seen.add(key);
    const aEl = document.getElementById('gw_ov_' + devA + '_v4_first');
    const bEl = document.getElementById('gw_ov_' + devB + '_v4_first');
    const mismatch = aEl && bEl && aEl.value.trim() && bEl.value.trim() && aEl.value.trim() !== bEl.value.trim();
    if (aEl) aEl.classList.toggle('gw-ov-mismatch', !!mismatch);
    if (bEl) bEl.classList.toggle('gw-ov-mismatch', !!mismatch);
  });
}

function _checkGwMlagMismatches(overrides) {
  const mismatches = [];
  const seen = new Set();
  Object.entries(_gwMlagPairs).forEach(([devA, devB]) => {
    const key = [devA, devB].sort().join('|');
    if (seen.has(key)) return;
    seen.add(key);
    const ovA = overrides[devA] || {};
    const ovB = overrides[devB] || {};
    const v4Mismatch = ovA.v4_first && ovB.v4_first && ovA.v4_first !== ovB.v4_first;
    const v6Mismatch = ovA.v6_first && ovB.v6_first && ovA.v6_first !== ovB.v6_first;
    if (v4Mismatch || v6Mismatch) mismatches.push({ a: devA, b: devB, v4a: ovA.v4_first, v4b: ovB.v4_first, v6a: ovA.v6_first, v6b: ovB.v6_first });
  });
  return mismatches;
}

// ── TECH MODAL: P2P mode → flag mapping ─────────────────────────────────────
const P2P_MODE_FLAGS = {
  ipv4:          { int_ipv4: true,  int_ipv6: false, int_ipv6_unnum: false },
  ipv6:          { int_ipv4: false, int_ipv6: true,  int_ipv6_unnum: false },
  ipv6unnum:     { int_ipv4: false, int_ipv6: false, int_ipv6_unnum: true  },
  ipv4ipv6:      { int_ipv4: true,  int_ipv6: true,  int_ipv6_unnum: false },
  ipv4ipv6unnum: { int_ipv4: true,  int_ipv6: false, int_ipv6_unnum: true  }
};

function getCurrentTechState() {
  const getChk = id => !!(document.getElementById(id) && document.getElementById(id).checked);

    int_ipv4:        flags.int_ipv4,
    int_ipv6:        flags.int_ipv6,
    int_ipv6_unnum:  flags.int_ipv6_unnum,
    gw_ipv4:         getChk('chkGwIpv4'),

    bgp_ipv6_unnum:  getChk('chkBgpIpv6Unnum'),
    bgp_rfc5549:     getChk('chkBgpRfc5549'),
    ospf_ipv4:       getChk('chkOspfIpv4'),
    ospf_ipv6:       getChk('chkOspfIpv6'),
    ospf_ipv6_unnum: getChk('chkOspfIpv6Unnum'),
    vxlan_ipv4:      getChk('chkVxlanIpv4'),
    vxlan_ipv6:      getChk('chkVxlanIpv6'),

// Tracks whether any MLAG pairs are declared (loaded from server on modal open).
let _techHasMlag = false;

// Gates EVPN service radios and VGW options based on EVPN/MLAG selection.
// Anycast GW requires EVPN. VARP requires EVPN or MLAG. VGW section header visible when either applies.
// Visual greying uses tech-section-gated on the container (CSS handles chips via specificity 0,3,0).
function applyEvpnGating() {
  const evpnOn = !!(document.getElementById('chkEvpnIpv4') && document.getElementById('chkEvpnIpv4').checked) ||
                 !!(document.getElementById('chkEvpnIpv6') && document.getElementById('chkEvpnIpv6').checked);
  const varpOk = evpnOn || _techHasMlag;

  // EVPN SERVICE section — gate whole container when EVPN is off
  const svcSection = document.getElementById('evpnServiceSection');
  if (svcSection) {
    svcSection.style.pointerEvents = evpnOn ? '' : 'none';
    svcSection.classList.toggle('tech-section-gated', !evpnOn);
  }
  ['evpnServicePerVlan', 'evpnServiceBundle'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.disabled = !evpnOn;
  });

  // VGW section — gate whole container when neither EVPN nor MLAG active
  const vgwSection = document.getElementById('evpnVgwSection');
  if (vgwSection) {
    vgwSection.style.pointerEvents = varpOk ? '' : 'none';
    vgwSection.classList.toggle('tech-section-gated', !varpOk);
  }
  const anycastRadio = document.getElementById('gwL3TypeAnycast');
  if (anycastRadio) anycastRadio.disabled = !evpnOn;
  const varpRadio = document.getElementById('gwL3TypeVarp');
  if (varpRadio) varpRadio.disabled = !varpOk;

  // Auto-switch: if the currently selected option just became disabled, switch to the other
  const selectedGw = document.querySelector('input[name="gwL3Type"]:checked');
  if (selectedGw) {
    if (selectedGw.value === 'anycast' && !evpnOn) {
      if (varpOk && varpRadio) { varpRadio.checked = true; }
    } else if (selectedGw.value === 'varp' && !varpOk) {
      if (evpnOn && anycastRadio) { anycastRadio.checked = true; }
    }
  }

  updateVarpMacVisibility();
}

/* --- TECH COMPAT: protocol checkboxes valid per P2P interface mode --- */
const TECH_COMPAT = {
  // IPv4 only — no IPv6 on P2P links
  ipv4:          new Set(['chkBgpIpv4',
                          'chkOspfIpv4',
                          'chkVxlanIpv4',
                          'chkEvpnIpv4']),
  // IPv6 explicit only — no IPv4 on P2P links
  ipv6:          new Set(['chkBgpIpv6','chkBgpRfc5549',
                          'chkOspfIpv6',
                          'chkVxlanIpv6',
                          'chkEvpnIpv6']),
  // IPv6 unnumbered only — no IPv4, no explicit IPv6 addresses
  ipv6unnum:     new Set(['chkBgpIpv6Unnum','chkBgpRfc5549',
                          'chkOspfIpv6','chkOspfIpv6Unnum',
                          'chkVxlanIpv6',
                          'chkEvpnIpv6']),
  // IPv4 + IPv6 explicit
  ipv4ipv6:      new Set(['chkBgpIpv4','chkBgpIpv6','chkBgpRfc5549',
                          'chkOspfIpv4','chkOspfIpv6',
                          'chkVxlanIpv4','chkVxlanIpv6',
                          'chkEvpnIpv4','chkEvpnIpv6']),
  // IPv4 + IPv6 unnumbered
  ipv4ipv6unnum: new Set(['chkBgpIpv4','chkBgpIpv6Unnum','chkBgpRfc5549',
                          'chkOspfIpv4','chkOspfIpv6Unnum',
                          'chkVxlanIpv4','chkVxlanIpv6',
                          'chkEvpnIpv4','chkEvpnIpv6'])
};
const TECH_ALL_CHKS = ['chkBgpIpv4','chkBgpIpv6','chkBgpIpv6Unnum','chkBgpRfc5549',
                       'chkOspfIpv4','chkOspfIpv6','chkOspfIpv6Unnum',
                       'chkVxlanIpv4','chkVxlanIpv6',
                       'chkEvpnIpv4','chkEvpnIpv6'];

function _enableTechChk(id) {
  const priority = ['ipv4ipv6','ipv4ipv6unnum','ipv6','ipv6unnum','ipv4'];
  const best = priority.find(m => TECH_COMPAT[m] && TECH_COMPAT[m].has(id)) || 'ipv4';
  const radio = document.querySelector(`input[name="p2pMode"][value="${best}"]`);
  if (radio && !radio.checked) { radio.checked = true; applyTechCompat(best); }
  const el = document.getElementById(id);
  if (el) el.checked = true;
  syncTechChipState();
  checkTechDirty();
}

function syncTechChipState() {
  document.querySelectorAll('#networkStackModal .tech-radio-label').forEach(function(lbl) {
    const inp = lbl.querySelector('.chk-input');
    if (!inp) return;
    if (lbl.classList.contains('tech-incompat')) {
      lbl.classList.remove('tech-selected'); // grey always beats selected
    } else {
      lbl.classList.toggle('tech-selected', inp.checked);
    }
  });
}

function applyTechCompat(mode) {
  const allowed = TECH_COMPAT[mode] || TECH_COMPAT.ipv4;
  const _priority = ['ipv4ipv6','ipv4ipv6unnum','ipv6','ipv6unnum','ipv4'];
  const _modeLabel = { ipv4:'IPv4', ipv6:'IPv6', ipv6unnum:'IPv6 Unnum', ipv4ipv6:'IPv4+IPv6', ipv4ipv6unnum:'IPv4+IPv6 Unnum' };
  TECH_ALL_CHKS.forEach(id => {
    const el  = document.getElementById(id);
    const row = document.getElementById('row-' + id);
    if (!el || !row) return;
    const ok = allowed.has(id);
    if (!ok) el.checked = false;
    row.classList.toggle('tech-incompat', !ok);
    if (!ok) {
      const best = _priority.find(m => TECH_COMPAT[m] && TECH_COMPAT[m].has(id)) || 'ipv4';
      row.title = 'Click to enable — will switch P2P to ' + (_modeLabel[best] || best);
    } else {
      row.title = '';
    }
  });
  syncTechChipState();
}

/* --- TECH CROSS-VALIDATION: returns array of error strings (empty = valid) --- */
function validateTechSettings() {
  const getChk = id => !!(document.getElementById(id) && document.getElementById(id).checked);
  const errors = [];

  // Rule 1: IPv6 GW needs at least one IPv6 routing protocol
  if (getChk('chkGwIpv6') &&
      !getChk('chkBgpIpv6') && !getChk('chkBgpRfc5549') && !getChk('chkBgpIpv6Unnum') &&
      !getChk('chkOspfIpv6') && !getChk('chkOspfIpv6Unnum') &&
      !getChk('chkEvpnIpv4') && !getChk('chkEvpnIpv6')) {
    errors.push("IPv6 GW requires an IPv6 routing protocol — enable BGP IPv6, RFC5549, BGP Unnum, OSPFv3, or EVPN.");
  }

  // Rule 2: VXLAN IPv4 VTEP needs IPv4 underlay reachability
  // (BGP Unnum and RFC5549 can carry ipv4 unicast AF even over IPv6 sessions)
  if (getChk('chkVxlanIpv4') &&
      !getChk('chkBgpIpv4') && !getChk('chkBgpIpv6Unnum') && !getChk('chkBgpRfc5549') &&
      !getChk('chkOspfIpv4')) {
    errors.push("VXLAN IPv4 VTEP requires an IPv4 routing protocol — enable BGP IPv4, RFC5549, BGP Unnum, or OSPFv2.");
  }

  // Rule 3: VXLAN IPv6 VTEP needs IPv6 underlay reachability
  if (getChk('chkVxlanIpv6') &&
      !getChk('chkBgpIpv6') && !getChk('chkBgpIpv6Unnum') && !getChk('chkBgpRfc5549') &&
      !getChk('chkOspfIpv6') && !getChk('chkOspfIpv6Unnum')) {
    errors.push("VXLAN IPv6 VTEP requires an IPv6 routing protocol — enable BGP IPv6, RFC5549, BGP Unnum, or OSPFv3.");
  }

  // Rule 4: EVPN is a BGP address-family — requires at least one BGP variant
  if ((getChk('chkEvpnIpv4') || getChk('chkEvpnIpv6')) &&
      !getChk('chkBgpIpv4') && !getChk('chkBgpIpv6') && !getChk('chkBgpIpv6Unnum') && !getChk('chkBgpRfc5549')) {
    errors.push("EVPN requires BGP — enable BGP IPv4, BGP IPv6, RFC5549, or BGP Unnumbered.");
  }

  // Rule 5: GW enabled requires Virtual Router MAC — no default exists in EOS
  if (getChk('chkGwIpv4') || getChk('chkGwIpv6')) {
    const mac = ((document.getElementById('inputVarpMac') || {}).value || '').trim();
    if (!mac) errors.push("L3 Gateway requires a Virtual Router MAC — enter ip virtual-router mac-address value (e.g. 001c.7300.0099).");
  }

  return errors;
}

/* --- TECHNOLOGY MODAL LOGIC --- */
function openTechModal() {
  initialTechState = '';
  _autoMinimizeOpenModal();
  showModalLoading("networkStackModal");

  const _guard = setTimeout(() => {
    hideModalLoading('networkStackModal');
    document.getElementById("networkStackModal").style.display = 'none';
    setActiveModalChip(null);
    setStatus("Network Stack load timed out — try again", "status-error");
  }, 15000);

  google.script.run
    .withSuccessHandler(settings => {
      clearTimeout(_guard);
      hideModalLoading('networkStackModal');

      // 1. Derive P2P mode from stored flags (5-mode)
      let p2pMode;
      if (settings.int_ipv6_unnum && !settings.int_ipv4) p2pMode = 'ipv6unnum';
      else if (settings.int_ipv6_unnum)                   p2pMode = 'ipv4ipv6unnum';
      else if (settings.int_ipv6 && !settings.int_ipv4)   p2pMode = 'ipv6';
      else if (settings.int_ipv6)                         p2pMode = 'ipv4ipv6';
      else                                                p2pMode = 'ipv4';

      const p2pRadio = document.querySelector(`input[name="p2pMode"][value="${p2pMode}"]`);
      if (p2pRadio) p2pRadio.checked = true;

      // 2. Set GW checkboxes (default true for gw_ipv4)
      const setChk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
      setChk('chkGwIpv4', settings.gw_ipv4 !== false);
      setChk('chkGwIpv6', settings.gw_ipv6);

      // 3. Set protocol checkboxes
      setChk('chkBgpIpv4',       settings.bgp_ipv4);
      setChk('chkBgpIpv6',       settings.bgp_ipv6);
      setChk('chkBgpIpv6Unnum',  settings.bgp_ipv6_unnum);
      setChk('chkBgpRfc5549',    settings.bgp_rfc5549);
      setChk('chkOspfIpv4',      settings.ospf_ipv4);
      setChk('chkOspfIpv6',      settings.ospf_ipv6);
      setChk('chkOspfIpv6Unnum', settings.ospf_ipv6_unnum);
      setChk('chkVxlanIpv4',     settings.vxlan_ipv4);
      setChk('chkVxlanIpv6',     settings.vxlan_ipv6);
      setChk('chkEvpnIpv4',      settings.evpn_ipv4);
      setChk('chkEvpnIpv6',      settings.evpn_ipv6);

      // 4. Load EVPN service model radio + bundle groups
      const evpnSvcVal = settings.evpn_service || 'per-vlan';
      const evpnSvcRadio = document.querySelector(`input[name="evpnService"][value="${evpnSvcVal}"]`);
      if (evpnSvcRadio) evpnSvcRadio.checked = true;
      _renderEvpnBundleList(settings.evpn_bundle_groups || []);
      _updateBundleGroupsVisibility();

      // 5. Load L3 GW type radio + VARP MAC input
      const gwL3Val = settings.gw_l3_type || 'anycast';
      const gwL3Radio = document.querySelector(`input[name="gwL3Type"][value="${gwL3Val}"]`);
      if (gwL3Radio) gwL3Radio.checked = true;
      const varpMacEl = document.getElementById('inputVarpMac');
      if (varpMacEl) varpMacEl.value = settings.varp_mac || '';
      updateVarpMacVisibility();

      // 6. Apply compat filter + EVPN gating
      _techHasMlag = !!settings.hasMlag;
      applyTechCompat(p2pMode);
      applyEvpnGating();

      // 7. Attach handlers: P2P radios update compat then dirty; checkboxes just dirty
      document.querySelectorAll('#networkStackModal input[name="p2pMode"]').forEach(el => {
        el.onchange = function() { applyTechCompat(this.value); checkTechDirty(); };
      });
      document.querySelectorAll('#networkStackModal input[type="checkbox"]').forEach(el => {
        el.onchange = checkTechDirty;
      });
      // EVPN checkboxes also re-run gating (overrides the generic checkTechDirty above)
      ['chkEvpnIpv4', 'chkEvpnIpv6'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.onchange = function() { applyEvpnGating(); checkTechDirty(); };
      });
      document.querySelectorAll('#networkStackModal input[name="evpnService"]').forEach(el => {
        el.onchange = function() { _updateBundleGroupsVisibility(); checkTechDirty(); };
      });
      document.querySelectorAll('#networkStackModal input[name="gwL3Type"]').forEach(el => {
        el.onchange = updateVarpMacVisibility;
      });
      const varpMacInput = document.getElementById('inputVarpMac');
      if (varpMacInput) varpMacInput.oninput = checkTechDirty;

      // Click-to-enable: clicking a greyed (tech-incompat) row auto-switches P2P and checks the box
      if (!document.getElementById('networkStackModal')._clickInit) {
        document.getElementById('networkStackModal')._clickInit = true;
        TECH_ALL_CHKS.forEach(id => {
          const row = document.getElementById('row-' + id);
          if (!row) return;
          row.addEventListener('click', function(e) {
            if (!this.classList.contains('tech-incompat')) return;
            e.preventDefault(); e.stopPropagation();
            _enableTechChk(id);
          }, true);
        });
      }

      // Delegated change listener: keeps chip selected-state in sync on every input change
      if (!document.getElementById('networkStackModal')._changeInit) {
        document.getElementById('networkStackModal')._changeInit = true;
        document.getElementById('networkStackModal').addEventListener('change', syncTechChipState);
      }

      // 6. Capture initial state + run first validation
      initialTechState = getCurrentTechState();
      checkTechDirty();

      // 7. Ensure modal display properties (showModalLoading already set display:flex + chip)
      const modal   = document.getElementById('networkStackModal');
      if (modal)   { modal.style.zIndex = '30000'; modal.style.opacity = '1'; modal.style.visibility = 'visible'; }
    })
    .withFailureHandler(err => {
      clearTimeout(_guard);
      hideModalLoading('networkStackModal');
      document.getElementById("networkStackModal").style.display = 'none';
      setActiveModalChip(null);
      setStatus("Server Error: " + err.message, "status-error");
    })
    .getNetworkSettings();
}

function closeTechModal() {
  const isDirty = initialTechState !== '' && getCurrentTechState() !== initialTechState;

  initialTechState = '';

  document.getElementById('networkStackModal').style.display = 'none';

}

// ── Global Config find-in-textarea ───────────────────────────────────────────
var _gcfgMatches = [];
var _gcfgMatchIdx = 0;

function globalCfgSearchUpdate() {
  var inp   = document.getElementById('globalCfgSearch');
  var count = document.getElementById('globalCfgSearchCount');
  var ta    = document.getElementById('globalCfgTextarea');
  var q     = inp ? inp.value : '';
  _gcfgMatches = [];
  _gcfgMatchIdx = 0;
  if (!q || !ta) { if (count) count.textContent = ''; return; }
  var text  = ta.value;
  var lower = text.toLowerCase();
  var ql    = q.toLowerCase();
  var pos   = 0;
  while (true) {
    var idx = lower.indexOf(ql, pos);
    if (idx < 0) break;
    _gcfgMatches.push(idx);
    pos = idx + 1;
  }
  if (_gcfgMatches.length > 0) {
    _gcfgJumpTo(0);
  } else {
    if (count) count.textContent = q ? 'no match' : '';
  }
}

function _gcfgJumpTo(idx) {
  var ta    = document.getElementById('globalCfgTextarea');
  var count = document.getElementById('globalCfgSearchCount');
  var inp   = document.getElementById('globalCfgSearch');
  if (!ta || !_gcfgMatches.length) return;
  _gcfgMatchIdx = ((idx % _gcfgMatches.length) + _gcfgMatches.length) % _gcfgMatches.length;
  var pos = _gcfgMatches[_gcfgMatchIdx];
  var q   = inp ? inp.value : '';
  ta.focus();
  ta.setSelectionRange(pos, pos + q.length);
  var linesBefore = ta.value.slice(0, pos).split('\n').length - 1;
  var lineHeight  = parseFloat(getComputedStyle(ta).lineHeight) || 19.2;
  ta.scrollTop = Math.max(0, (linesBefore - 3) * lineHeight);
  if (count) count.textContent = (_gcfgMatchIdx + 1) + ' / ' + _gcfgMatches.length;
  // Always keep focus in the find bar (Ctrl+F bar behaviour — never leave focus in content)
  if (inp) inp.focus();
}

function globalCfgSearchNext() { _gcfgJumpTo(_gcfgMatchIdx + 1); }
function globalCfgSearchPrev() { _gcfgJumpTo(_gcfgMatchIdx - 1); }

function globalCfgSearchKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey) globalCfgSearchPrev(); else globalCfgSearchNext();
  } else if (e.key === 'Escape') {
    var inp   = document.getElementById('globalCfgSearch');
    var count = document.getElementById('globalCfgSearchCount');
    if (inp)   inp.value = '';
    if (count) count.textContent = '';
    _gcfgMatches = [];
    _gcfgMatchIdx = 0;
  }
}

/**
* saveTechSettings
* - Wipes Cache
* - Invalidates all memory (Lazy Load strategy)
* - Refreshes Active Device immediately
*/
function saveTechSettings() {
  // Guard: block if validation errors exist
  const errors = validateTechSettings();
  if (errors.length > 0) return;

  const getChk = id => !!(document.getElementById(id) && document.getElementById(id).checked);
  const p2pRadio = document.querySelector('input[name="p2pMode"]:checked');
  const p2pMode  = p2pRadio ? p2pRadio.value : 'ipv4';
  const flags    = P2P_MODE_FLAGS[p2pMode] || P2P_MODE_FLAGS.ipv4;

  const settings = {
    int_ipv4:        flags.int_ipv4,
    int_ipv6:        flags.int_ipv6,
    int_ipv6_unnum:  flags.int_ipv6_unnum,
    gw_ipv4:         getChk('chkGwIpv4'),
    gw_ipv6:         getChk('chkGwIpv6'),
    bgp_ipv4:        getChk('chkBgpIpv4'),
    bgp_ipv6:        getChk('chkBgpIpv6'),
    bgp_ipv6_unnum:  getChk('chkBgpIpv6Unnum'),
    bgp_rfc5549:     getChk('chkBgpRfc5549'),
    ospf_ipv4:       getChk('chkOspfIpv4'),
    ospf_ipv6:       getChk('chkOspfIpv6'),
    ospf_ipv6_unnum: getChk('chkOspfIpv6Unnum'),
    vxlan_ipv4:      getChk('chkVxlanIpv4'),
    vxlan_ipv6:      getChk('chkVxlanIpv6'),
    evpn_ipv4:       getChk('chkEvpnIpv4'),
    evpn_ipv6:       getChk('chkEvpnIpv6'),
    evpn_service:        (document.querySelector('input[name="evpnService"]:checked') || {}).value || 'per-vlan',
    evpn_bundle_groups:  _getEvpnBundleGroups(),
    gw_l3_type:          (document.querySelector('input[name="gwL3Type"]:checked') || {}).value || 'anycast',
    varp_mac:            ((document.getElementById('inputVarpMac') || {}).value || '').trim()
  };

  showGlobalLoading("Saving Technology Settings...");

  const _guard = setTimeout(() => {
    hideGlobalLoading();
    setStatus("Tech Settings save timed out — try again", "status-error");
  }, 15000);

  google.script.run
    .withSuccessHandler(() => {
      clearTimeout(_guard);
      initialTechState = getCurrentTechState();
      checkTechDirty();
      closeTechModal();

      // 1. Wipe the Cache
      if (typeof configCache !== 'undefined') configCache = {};

      // 2. Refresh Active Device
      if (typeof selectedDeviceId !== 'undefined' && selectedDeviceId) {
        showGlobalLoading("Tech Settings Saved & Fetching new config...");
        setStatus('Tech settings changed \u2014 ' + selectedDeviceId + ' config refresh\u2026', 'status-info');
        fetchFullConfig(selectedDeviceId, hideGlobalLoading, "<b>New config fetched now</b>");
      } else {
        hideGlobalLoading();
        const st = document.getElementById("status");
        if (st) {
          setStatus("<b>Tech Settings Saved</b>", "status-ok");
          setTimeout(() => { setStatus(getReadyStatus()); }, 3000);
        }
      }

      if (typeof scheduleBackgroundPrefetch === 'function') scheduleBackgroundPrefetch(true);
    })
    .withFailureHandler(err => {
      clearTimeout(_guard);
      hideGlobalLoading();
      setStatus("Error saving: " + err.message, "status-error");
    })
    .saveNetworkSettings(settings);
}
