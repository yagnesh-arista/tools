}

/**
* ---------------------------------------------------------
* FINAL CABLING REPORT (Segregated + Perfectly Aligned)
* ---------------------------------------------------------
*/
function _buildCablingReportStr(mode) {
  if (!currentData || !currentData.nodes) return null;

  // --- DERIVE ORDER FROM SHEET COLUMNS ---
  const sheetOrderNames = currentData.nodes.map(n => n.id);
  const sheetIndexMap = {};
  sheetOrderNames.forEach((name, index) => sheetIndexMap[name] = index);

  // 1. GROUPING PHASE — apply bridge filter (same as CSV/Markdown)
  const { cableGroups, sheetIndexMap: _sim } = buildCableGroups();
  const sortedGroups = _filterCableGroupsByBridge(_sortCableGroups(cableGroups, sheetIndexMap));
  const totalCableGroups = sortedGroups.length;
  const totalIndividualLinks = sortedGroups.reduce((sum, g) => sum + g.links.length, 0);


  // Model/rack lookup: stored metadata first, devstatus platform as fallback for model
  const devModel = name => (deviceMetadata[name] || {}).model || (devStatusMap[name] || {}).platform || '';
  const devRack  = name => (deviceMetadata[name] || {}).rack || '';

  // 2. ORGANIZE DATA
  const groupedLines = {};

  sortedGroups.forEach(group => {
    let count = group.links.length;

    let idxA = sheetIndexMap[group.devA];
    let idxB = sheetIndexMap[group.devB];
    if (idxA === undefined) idxA = 9999;
    if (idxB === undefined) idxB = 9999;

    let leftDev, rightDev, leftPhy, rightPhy, leftPorts, rightPorts;
    let sL, sR, xL, xR;

    if (idxA <= idxB) {
      leftDev = group.devA; rightDev = group.devB;
      leftPhy = group.phyA; rightPhy = group.phyB;
      sL = group.speedA; sR = group.speedB;
      xL = group.xcvrA; xR = group.xcvrB;
      leftPorts = group.links.map(l => l.portA);
      rightPorts = group.links.map(l => l.portB);
    } else {
      leftDev = group.devB; rightDev = group.devA;
      leftPhy = group.phyB; rightPhy = group.phyA;
      sL = group.speedB; sR = group.speedA;
      xL = group.xcvrB; xR = group.xcvrA;
      leftPorts = group.links.map(l => l.portB);
      rightPorts = group.links.map(l => l.portA);
    }

    // Formatting Middle Info
    sL = (sL || "").trim(); sR = (sR || "").trim();
    xL = (xL || "").trim(); xR = (xR || "").trim();
    if (sL.toLowerCase() === "auto") sL = "";
    if (sR.toLowerCase() === "auto") sR = "";
    if (xL.toUpperCase().includes('BASE-T')) xL = 'BASE-T';
    if (xR.toUpperCase().includes('BASE-T')) xR = 'BASE-T';
    // sfp-1000baset in xcvr_speed_ is a transceiver-type descriptor, not a speed string.
    // Normalize to a clean speed ("1g") and fill xcvr label if not already set.
    if (sL.toUpperCase().includes('BASE-T')) { if (!xL) xL = 'BASE-T'; sL = '1g'; }
    if (sR.toUpperCase().includes('BASE-T')) { if (!xR) xR = 'BASE-T'; sR = '1g'; }

    let middleInfoFwd = "";
    let middleInfoRev = "";
    let displayPortL = "";
    let displayPortR = "";

    let leftIsQSFP = (idxA <= idxB) ? group.isBreakoutA : group.isBreakoutB;
    let isMixedBreakout = false;

    // Mixed-breakout detection: speed-first (xcvr_speed_ is reliable), port-slash fallback.
    // Scenario C: one QSFP aggregate side (e.g. "100g-4") vs N SFP lane sides (e.g. "25g").
    // Scenario A: both sides breakout-to-breakout — both have slash, same per-lane speed.
    if (count > 1) {
      const lL = sL.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
      const lR = sR.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
      if ((lL && !lR && parseInt(lL[2]) === count) || (lR && !lL && parseInt(lR[2]) === count)) {
        // One side carries aggregate speed → definitively mixed breakout
        isMixedBreakout = true;
        // Refine leftIsQSFP: the aggregate-speed side is always QSFP
        if (lL && !lR) leftIsQSFP = true;
        else if (lR && !lL) leftIsQSFP = false;
      } else {
        const _gbps = s => { const m = s.match(/^(\d+(?:\.\d+)?)(g|t)/i); return m ? Math.round(parseFloat(m[1]) * (/t/i.test(m[2]) ? 1000 : 1)) : 0; };
        const sLn = _gbps(sL);
        const sRn = _gbps(sR);
        if (sLn > 0 && sRn > 0 && sLn !== sRn && (sLn * count === sRn || sRn * count === sLn)) {
          // Speed ratio matches lane count → mixed breakout; higher speed = QSFP side
          isMixedBreakout = true;
          leftIsQSFP = (sLn > sRn);
        } else {
          // Fallback: port-slash notation (QSFP-DD side ports contain "/")
          const leftHasSlash  = (idxA <= idxB) ? group.isBreakoutA : group.isBreakoutB;
          const rightHasSlash = (idxA <= idxB) ? group.isBreakoutB : group.isBreakoutA;
          if (leftHasSlash !== rightHasSlash) isMixedBreakout = true;
        }
      }
    }

    if (isMixedBreakout && count > 1) {
      // --- SCENARIO C: MIXED BREAKOUT (one QSFP -> N SFP) ---
      let xcvrQSFP = leftIsQSFP ? xL : xR;
      let xcvrSFP  = leftIsQSFP ? xR : xL;
      let sQSFP    = leftIsQSFP ? sL : sR;
      let sSFP     = leftIsQSFP ? sR : sL;
      let qLabel = xcvrQSFP || "QSFP";
      let sLabel = xcvrSFP  || "SFP";
      // Aggregate per-lane speed for QSFP side: 25g × 4 lanes → 100g-4; already-aggregated 100g-4 → as-is
      let sQSFPDisplay = sQSFP;
      if (sQSFP && !sQSFP.includes('-')) {
        const m = sQSFP.match(/^(\d+)g$/i);
        sQSFPDisplay = m ? `${parseInt(m[1]) * count}g-${count}` : `${sQSFP}-${count}`;
      }
      // Position-aware: left always xcvr+speed, right always speed+xcvr (matches Scenario B/A convention)
      const qLeftPart  = [qLabel, sQSFPDisplay].filter(Boolean).join(" ");
      const qRightPart = [sQSFPDisplay, qLabel].filter(Boolean).join(" ");
      const bLeftPart  = [`${count}*${sLabel}(Breakout)`, sSFP].filter(Boolean).join(" ");
      const bRightPart = [sSFP, `${count}*${sLabel}(Breakout)`].filter(Boolean).join(" ");
      if (leftIsQSFP) {
        displayPortL = leftPhy;
        displayPortR = compressPortList(rightPorts);
        middleInfoFwd = `${qLeftPart} ------ ${bRightPart}`;
        middleInfoRev = `${bLeftPart} ------ ${qRightPart}`;
      } else {
        displayPortL = compressPortList(leftPorts);
        displayPortR = rightPhy;
        middleInfoFwd = `${bLeftPart} ------ ${qRightPart}`;
        middleInfoRev = `${qLeftPart} ------ ${bRightPart}`;
      }

    } else if (count > 1) {
      // --- SCENARIO A: BREAKOUT-TO-BREAKOUT ---
      // Aggregate per-lane speed: "25g" × 4 → "100g-4"; already-aggregated "100g-4" → as-is
      const withLanes = (s, n) => {
        if (!s) return s;
        if (s.includes('-')) return s;
        const m = s.match(/^(\d+)g$/i);
        return m ? `${parseInt(m[1]) * n}g-${n}` : s;
      };
      let fwdLeft  = [xL, withLanes(sL, count)].filter(Boolean).join(" ");
      let fwdRight = [withLanes(sR, count), xR].filter(Boolean).join(" ");
      middleInfoFwd = `${fwdLeft} ------ ${fwdRight}`;

      let revLeft  = [xR, withLanes(sR, count)].filter(Boolean).join(" ");
      let revRight = [withLanes(sL, count), xL].filter(Boolean).join(" ");
      middleInfoRev = `${revLeft} ------ ${revRight}`;

      displayPortL = leftPhy;
      displayPortR = rightPhy;

    } else {
      // --- SCENARIO B: STANDARD CABLE ---

      // FORWARD
      let fwdLeft = [xL, sL].filter(Boolean).join(" ");
      let fwdRight = [sR, xR].filter(Boolean).join(" ");

      // REVERSE
      let revLeft = [xR, sR].filter(Boolean).join(" ");
      let revRight = [sL, xL].filter(Boolean).join(" ");

      if (!fwdLeft && !fwdRight) {
        middleInfoFwd = "------";
        middleInfoRev = "------";
      } else {
        middleInfoFwd = `${fwdLeft} ------ ${fwdRight}`;
        middleInfoRev = `${revLeft} ------ ${revRight}`;
      }

      displayPortL = compressPortList(leftPorts);
      displayPortR = compressPortList(rightPorts);
    }

    // STORE RAW DATA (Forward)
    let itemFwd = {
      leftText: `[${leftDev}] ${displayPortL}`,
      midText: middleInfoFwd,
      rightPortText: displayPortR,
      remote: rightDev,
      sortPort: displayPortL
    };

    // --- ADD TO LISTS ---
    if (mode === 'device') {
      if (!groupedLines[leftDev]) groupedLines[leftDev] = [];
      groupedLines[leftDev].push(itemFwd);

      // Reverse Item (Uses middleInfoRev)
      if (!groupedLines[rightDev]) groupedLines[rightDev] = [];
      groupedLines[rightDev].push({
        leftText: `[${rightDev}] ${displayPortR}`,
        midText: middleInfoRev, // <-- CRITICAL FIX APPLIED HERE
        rightPortText: displayPortL,
        remote: leftDev,
        sortPort: displayPortR
      });
    } else {
      if (!groupedLines[leftDev]) groupedLines[leftDev] = [];
      groupedLines[leftDev].push(itemFwd);
    }
  });

  // 3. GENERATE FINAL REPORT
  let lines = [];
  const title = (mode === 'device') ? "Device Patching List (Full Schedule)" : "Topology Netlist (Sheet Order Flow)";

  lines.push("=".repeat(100));
  lines.push(title);
  lines.push(`Total Cables: ${totalCableGroups}${totalIndividualLinks !== totalCableGroups ? `  (${totalIndividualLinks} individual port connections incl. breakouts)` : ""}`);
  lines.push("=".repeat(100));
  lines.push("");

  // DUTs summary: devices with a rack that appear in the filtered cable groups
  const _filteredDevNames = new Set();
  sortedGroups.forEach(function(g) { _filteredDevNames.add(g.devA); _filteredDevNames.add(g.devB); });
  const dutsWithRack = sheetOrderNames.filter(n => devRack(n) && _filteredDevNames.has(n));
  if (dutsWithRack.length > 0) {
    lines.push("## DUTs to be used:");
    lines.push("");
    const maxDevLen = Math.max(...dutsWithRack.map(n => n.length));
    dutsWithRack.forEach(n => lines.push(`- ${n.padEnd(maxDevLen)}    >>    ${devRack(n)}`));
    lines.push("");
    lines.push("");
  }

  sheetOrderNames.forEach(devName => {
    const links = groupedLines[devName];
    if (links && links.length > 0) {

      // --- ALIGNMENT CALCULATION FOR THIS DEVICE BLOCK ---
      // Find the longest string on the left side to ensure perfect alignment
      let maxLeftLen = 0;
      let maxMidLen = 0;
      let maxRightPortLen = 0;
      links.forEach(l => {
        if (l.leftText.length > maxLeftLen) maxLeftLen = l.leftText.length;
        if (l.midText.length > maxMidLen) maxMidLen = l.midText.length;
        if (l.rightPortText.length > maxRightPortLen) maxRightPortLen = l.rightPortText.length;
      });
      // Add a little breathing room
      maxLeftLen += 2;
      maxMidLen += 2;
      maxRightPortLen += 1;

      // Header
      lines.push("-".repeat(100));
      const _m = devModel(devName);
      lines.push(`>> ${devName}${_m ? '  [' + _m + ']' : ''}  (${links.length} Cables)`);
      lines.push("-".repeat(100));
      lines.push("");

      // Sub-Groups
      const linksByRemote = {};
      links.forEach(item => {
        if (!linksByRemote[item.remote]) linksByRemote[item.remote] = [];
        linksByRemote[item.remote].push(item);
      });

      const remoteDevices = Object.keys(linksByRemote).sort();

      remoteDevices.forEach(remoteDev => {
        const groupLinks = linksByRemote[remoteDev];
        lines.push(`${devName} to ${remoteDev} (${groupLinks.length} Cables)`);
        lines.push("");

        groupLinks.sort((a, b) => {
          return a.sortPort.localeCompare(b.sortPort, undefined, { numeric: true, sensitivity: 'base' });
        });

        groupLinks.forEach(l => {
          // APPLY PADDING
          let padL = l.leftText.padEnd(maxLeftLen, " ");
          let arrow = "------";
          let padM = l.midText.padEnd(maxMidLen, " ");
          let padRP = l.rightPortText.padEnd(maxRightPortLen, " ");
          // Result: "[DevA] PortA ------ Info ------ PortB        [DevB]"
          let line = `\t${padL} ${arrow} ${padM} ${arrow} ${padRP} [${l.remote}]`;
          lines.push(line);
        });

        lines.push("");
        lines.push("");
      });
    }
  });

  return lines.join("\n").trim();
}

function downloadCablingReport(mode) {
  if (!currentData || !currentData.nodes) {
    setStatus("No topology data found. Please refresh.", "status-error");
    return;
  }
  document.getElementById('exportCablingModal').style.display = 'none';
  document.getElementById('editOverlay').style.display = 'none';
  const fileContent = _buildCablingReportStr(mode);
  if (!fileContent) return;
  const blob = new Blob([fileContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 19).replace("T", "_").replace(/:/g, "-");
  a.href = url;
  a.download = (mode === 'device' ? "Device_Patching_List" : "Topology_Netlist") + "_" + ts + ".txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Cabling view panel — find-bar state
let _cablingViewFindMatches = [], _cablingViewFindIdx = -1;

function _cablingViewFindUpdate() {
  const inp = document.getElementById('cablingViewFind');
  const ta  = document.getElementById('cablingViewPanelText');
  const cnt = document.getElementById('cablingViewFindCount');
  if (!inp || !ta) return;
  const q = inp.value;
  _cablingViewFindMatches = []; _cablingViewFindIdx = -1;
  if (!q) { if (cnt) cnt.textContent = ''; inp.focus(); return; }
  const lt = ta.value.toLowerCase(), lq = q.toLowerCase();
  let pos = 0;
  while ((pos = lt.indexOf(lq, pos)) !== -1) { _cablingViewFindMatches.push(pos); pos += lq.length; }
  if (cnt) cnt.textContent = _cablingViewFindMatches.length ? '1/' + _cablingViewFindMatches.length : 'No results';
  if (_cablingViewFindMatches.length) { _cablingViewFindIdx = 0; _cablingViewFindJump(); } else inp.focus();
}

function _cablingViewFindJump() {
  const inp = document.getElementById('cablingViewFind');
  const ta  = document.getElementById('cablingViewPanelText');
  const cnt = document.getElementById('cablingViewFindCount');
  if (!inp || !ta || !_cablingViewFindMatches.length || _cablingViewFindIdx < 0) return;
  const start = _cablingViewFindMatches[_cablingViewFindIdx];
  const end   = start + inp.value.length;
  ta.focus(); ta.setSelectionRange(start, end);
  const lineH = parseInt(getComputedStyle(ta).lineHeight) || 15;
  const lines = ta.value.substring(0, start).split('\n').length - 1;
  ta.scrollTop = Math.max(0, lines * lineH - ta.clientHeight / 2);
  if (cnt) cnt.textContent = (_cablingViewFindIdx + 1) + '/' + _cablingViewFindMatches.length;
  inp.focus(); // always return focus to find input (find bar rule)
}

function _cablingViewFindNext() {
  if (!_cablingViewFindMatches.length) return;
  _cablingViewFindIdx = (_cablingViewFindIdx + 1) % _cablingViewFindMatches.length;
  _cablingViewFindJump();
}

function _cablingViewFindPrev() {
  if (!_cablingViewFindMatches.length) return;
  _cablingViewFindIdx = (_cablingViewFindIdx - 1 + _cablingViewFindMatches.length) % _cablingViewFindMatches.length;
  _cablingViewFindJump();
}

function _cablingViewFindKey(e) {
  if (e.key === 'Enter') { e.shiftKey ? _cablingViewFindPrev() : _cablingViewFindNext(); }
  else if (e.key === 'Escape') {
    const inp = document.getElementById('cablingViewFind');
    if (inp && inp.value.trim() !== '') { inp.value = ''; _cablingViewFindUpdate(); }
    else _closeCablingViewPanel();
  }
}

// --- HELPER: Normalize breakout port to lane-1 anchor ---
// Normalizes the lane suffix to /1 so all lanes of the same physical transceiver
// collapse to one key. Returns a valid EOS port name:
//   Et14/4  → Et14/1  (pizza-box QSFP-DD lane 4 → lane-1 anchor)
//   Et5/22/3 → Et5/22/1 (modular chassis lane 3 → lane-1 anchor)
//   Et14/1  → Et14/1  (already lane 1, unchanged)
//   Et5     → Et5     (no slash, returned as-is)
// DUPLICATED in Code.gs (intentional — testable from Test-gs.gs). Last synced: 2026-04-19
// Speed regex: /^(\d+(?:\.\d+)?)[gt]-(\d+)$/i — matches both "100g-4" and "1.6t-8".
function getPhysicalPortParent(portName) {
  if (!portName) return "";
  const parts = portName.split('/');
  if (parts.length > 1) {
    const last = parts[parts.length - 1];
    if (!isNaN(parseInt(last))) {
      parts[parts.length - 1] = '1';
      return parts.join('/');
    }
  }
  return portName;
}

// --- HELPER: Compress Port Lists ---
// DUPLICATED in Code.gs (intentional — testable from Test-gs.gs). Last synced: 2026-04-19
// Joins a sorted port array as a comma-separated list: ["Et1", "Et2", "Et3"] → "Et1, Et2, Et3"
function compressPortList(portArray) {
  if (portArray.length === 0) return "";
  if (portArray.length === 1) return portArray[0];
  portArray.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  return portArray.join(", ");
}

function setBtnLoading(btn, isLoading, loadingText = "⏳ Working...") {
  if (!btn) return;

  if (isLoading) {
    // Save original text if not already saved
    if (!btn.dataset.originalText) {
      btn.dataset.originalText = btn.innerText;
    }

    // Use a span for the spinner to keep it inline
    // The CSS class .btn-std { display: inline-flex; } handles the alignment
    btn.innerHTML = `<span style="display:inline-block; animation: spin 1s linear infinite; margin-right: 8px;">↻</span>${loadingText}`;

    btn.disabled = true;
    btn.style.opacity = "0.8";

    // Restore
    btn.innerText = btn.dataset.originalText || "Action";
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";
  }
}

function initCustomViewManager() {
  const body = document.getElementById("viewCustomBody");
  const container = document.getElementById("sheetVisContainer");

  if (!body || !container) {
    console.error("Missing DOM elements for Custom View");
    return;
  }

  // 1. CLEANUP: Remove ALL conflicting mode classes first
  document.body.classList.remove('mode-schema', 'mode-reorder', 'mode-topology');

  // 2. ACTIVATE: Add the specific mode class
  document.body.classList.add('mode-view_custom');

  // 3. FORCE VISIBILITY (JS Override)
  container.style.display = "flex";
  container.style.zIndex = "10000";
  container.style.opacity = "1";

  // 4. PREPARE LAYOUT FOR LOADER (Flex centers perfectly, Grid does not)
  body.style.display = "flex";
  body.style.flexDirection = "column";
  body.style.alignItems = "center";
  body.style.justifyContent = "center";

  // 5. SHOW LOADING SPINNER
  body.innerHTML = `
<div style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8;">
<svg width="32" height="32" viewBox="0 0 32 32" style="margin-bottom:15px; animation:spin 1s linear infinite;"><circle cx="16" cy="16" r="12" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="56 20" stroke-linecap="round"/></svg>
<div style="font-weight:600; font-size:13px; font-family:'JetBrains Mono',monospace;">Loading preferences...</div>
</div>`;

  // 6. FETCH DATA
  dbg("Custom View: requesting schema...");
  google.script.run
    .withSuccessHandler(function (schema) {
      dbg("Custom View: schema received", schema.length, "items");
      google.script.run
        .withSuccessHandler(function (savedKeys) {
          dbg("Custom View: prefs received", savedKeys);
          renderCustomViewOptions(schema, savedKeys);
        })
        .withFailureHandler(function (err) {
          body.innerHTML = `<div style="padding:20px; color:#ef4444; text-align:center;">Error loading preferences: ${err.message}</div>`;
        })
        .getViewPreferences();
    })
    .withFailureHandler(function (err) {
      console.error("Server Error:", err);
      body.innerHTML = `<div style="padding:20px; color:#ef4444; text-align:center;">Error: ${err.message}</div>`;
    })
    .getSchemaConfig();
}

/* --- RENDER FUNCTION for Custom View --- */
function renderCustomViewOptions(schema, visibleKeys) {
  const body = document.getElementById("viewCustomBody");
  if (!body) return;

  body.innerHTML = ""; // Clear loader

  // Switch back to Grid so the columns align properly (Left-to-Right)
  body.style.display = "grid";
  body.style.alignItems = "start";
  body.style.justifyContent = "start";

  // Safeguard: Ensure visibleKeys is an array
  const activeKeys = Array.isArray(visibleKeys) ? visibleKeys : [];

  schema.forEach((item, idx) => {
    // First schema entry is always the row identifier — never hideable regardless of key name
    const isMandatory = (idx === 0);

    const div = document.createElement("div");
    div.className = "view-item";
    if (isMandatory) div.classList.add("disabled");

    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.value = item.key;
    chk.className = "view-chk";

    // CHECK LOGIC:
    if (isMandatory) {
      chk.checked = true;
      chk.disabled = true;
      div.title = "This column is required";
    } else {
      // Check if key is in the saved list
      chk.checked = activeKeys.includes(item.key);
    }

    const label = document.createElement("label");
    label.innerText = (item.label || item.key);

    // UX: Click div to toggle checkbox
    if (!isMandatory) {
      div.onclick = function (e) {
        if (e.target !== chk) chk.checked = !chk.checked;
      };
    }

    div.appendChild(chk);
    div.appendChild(label);
    body.appendChild(div);
  });

  // Highlight preset button matching the currently saved view (if any)
  setActivePresetBtn(detectActivePreset(activeKeys));
}

function toggleAllView(state) {
  document.querySelectorAll(".view-chk").forEach(c => {
    if (!c.disabled) c.checked = state;
  });
  setActivePresetBtn(null);
}

const VIEW_PRESETS = {
  cabling:     ['int'],
  transceiver: ['int', 'xcvr_type'],
  speed:       ['int', 'xcvr_type', 'et_speed', 'xcvr_speed'],
  po:          ['int', 'po'],
  mode:        ['int', 'po', 'sp_mode'],
  vlan:        ['int', 'po', 'sp_mode', 'vlan'],
};

function setActivePresetBtn(name) {
  document.querySelectorAll('.view-preset-btn[data-preset]').forEach(b => b.classList.remove('active'));
  if (name) {
    const btn = document.querySelector(`.view-preset-btn[data-preset="${name}"]`);
    if (btn) btn.classList.add('active');
  }
}

function detectActivePreset(visibleKeys) {
  for (const [name, keys] of Object.entries(VIEW_PRESETS)) {
    if (keys.length === visibleKeys.length && keys.every(k => visibleKeys.includes(k))) return name;
  }
  return null;
}

function loadViewPreset(name) {
  const keys = VIEW_PRESETS[name];
  if (!keys) return;
  document.querySelectorAll('.view-chk').forEach(chk => {
    if (!chk.disabled) chk.checked = keys.includes(chk.value);
  });
  setActivePresetBtn(name);
  submitCustomView();
}

function submitCustomView() {
  const selected = [];
  document.querySelectorAll(".view-chk").forEach(c => {
    if (c.checked) selected.push(c.value);
  });
  setStatus("Applying view...", "status-info");
  const _guard = setTimeout(() => {
    setStatus("View apply timed out — try again", "status-error");
  }, 15000);
  google.script.run
    .withSuccessHandler(() => {
      clearTimeout(_guard);
      setStatus("View applied", "status-ok");
      setTimeout(() => setStatus(""), 2000);
    })
    .withFailureHandler(err => {
      clearTimeout(_guard);
      setStatus("Apply Failed: " + err.message, "status-error");
    })
    .applyCustomView(selected);
}

/* --- EOS CONFIG SYNTAX HIGHLIGHTER --- */

const _TA_CLEAN_MAP = {
  'ta-clean-et': ['default switchport trunk allowed vlan','no switchport trunk native vlan','default switchport access vlan','no channel-group','no ipv6 address'],
  'ta-clean-po': ['default switchport trunk allowed vlan','no switchport trunk native vlan','default switchport access vlan','no ipv6 address'],
  'ta-clean-vl': ['default ip address','default ip address virtual','default ip virtual-router address','default ipv6 address','default ipv6 address virtual','default ipv6 virtual-router address'],
};

// JS mirror of Python _expand_ta_cleanup — display path only (text sent to device_bridge unchanged).
// Strips ta-clean-* marker lines and injects their expansion as the first sub-commands of the
// immediately following interface block, making the config paste-ready EOS.
function _expandTaCleanDisplay(text) {
  const lines = text.split('\n');
  const out = [];
  let pending = null;
  for (const line of lines) {
    const trimmed = line.trim();
    const marker = trimmed.split(/\s+/, 1)[0];
    if (_TA_CLEAN_MAP[marker] && trimmed.includes(' ')) {
      pending = _TA_CLEAN_MAP[marker];
    } else if (pending && /^interface\s/i.test(trimmed)) {
      out.push(line);
      for (const cmd of pending) out.push(' ' + cmd);
      pending = null;
    } else {
      pending = null;
      out.push(line);
    }
  }
  return out.join('\n');
}

function _cfgLineClass(line) {
  if (/^\s*!!/.test(line))                              return 'cfg-error';
  if (/^\s*!/.test(line))                               return 'cfg-comment';
  if (/^\s*(?:no|default)\s/i.test(line))               return 'cfg-cleanup';
  if (/^interface\s/i.test(line))                       return 'cfg-interface';
  if (/^router\s+(bgp|ospf|isis)\b/i.test(line))        return 'cfg-router';
  if (/^vlan\s+\d/i.test(line))                         return 'cfg-vlan';
  if (/^mlag\s+configuration/i.test(line))              return 'cfg-mlag';
  if (/^(ip routing|ipv6 unicast-routing)/i.test(line)) return 'cfg-routing';
  if (/^\s+(ip|ipv6)\s+address\s/i.test(line))          return 'cfg-ip';
  if (/^\s+neighbor\s/i.test(line))                     return 'cfg-neighbor';
  if (/^\s+shutdown\b/i.test(line))                     return 'cfg-shutdown';
  if (/^\s+description\s/i.test(line))                  return 'cfg-desc';
  return null;
}

function highlightEosConfig(text) {
  if (!text) return "";
  return _expandTaCleanDisplay(text).split('\n').map(line => {
    const esc = escapeHtml(line);
    const cls = _cfgLineClass(line);
    return cls ? `<span class="${cls}">${esc}</span>` : esc;
  }).join('\n');
}

// Split raw config into block objects: [{header, lines, sep}]
// header / sep / each line: {text, lineNum}
function _makeConfigSearchHandler(ids) {
  // ids: { inp, body, clearBtn, badge } — DOM elements, not IDs
  return function() {
    if (!ids.inp || !ids.body || !currentRawConfig) return;
    const rawTerm = ids.inp.value.toLowerCase().trim();
    if (ids.clearBtn) ids.clearBtn.classList.toggle('hidden', !rawTerm);
    if (!rawTerm) {
      ids.body.innerHTML = _renderWithLineNums(currentRawConfig.split('\n').map((text, i) => ({text, lineNum: i + 1})));
      if (ids.badge) ids.badge.classList.add('hidden');
      return;
    }
    const lineJump = rawTerm.match(/^:(\d+)$/);
    if (lineJump) {
      const targetLine = parseInt(lineJump[1], 10);
      ids.body.innerHTML = _renderWithLineNums(currentRawConfig.split('\n').map((text, i) => ({text, lineNum: i + 1})), targetLine);
      if (ids.badge) { ids.badge.textContent = 'Line ' + targetLine; ids.badge.classList.remove('hidden'); }
      const hlEl = ids.body.querySelector('.cfg-line-hl');
      if (hlEl) hlEl.scrollIntoView({block: 'center'});
      return;
    }
    const term = rawTerm
      .replace(/^int\s/, 'interface ').replace(/ethernet/g, 'et').replace(/port-channel/g, 'po')
      .replace(/^desc\s/, 'description ').replace(/^lo\s?/, 'loopback').replace(/^mgmt/, 'management')
      .replace(/vlan\s/g, 'vlan');
    const blocks = _splitConfigIntoBlocks(currentRawConfig);
    const matched = blocks.filter(b => {
      const all = [...(b.header ? [b.header] : []), ...b.lines];
      return all.some(l => l.text.toLowerCase().includes(term));
    });
    const flatLines = [];
    matched.forEach(b => { if (b.header) flatLines.push(b.header); flatLines.push(...b.lines); if (b.sep) flatLines.push(b.sep); });
    ids.body.innerHTML = _renderWithLineNums(flatLines);
    if (ids.badge) {
      ids.badge.textContent = matched.length ? matched.length + ' block' + (matched.length !== 1 ? 's' : '') + ' · ' + flatLines.length + ' lines' : '';
      ids.badge.classList.toggle('hidden', !matched.length);
    }
  };
}

function _splitConfigIntoBlocks(rawConfig) {
  const blocks = [];
  let cur = null;
  rawConfig.split('\n').forEach((text, idx) => {
    const lineNum = idx + 1;
    const isSep = text === '!';
    const isSub = text.startsWith(' ') || text.startsWith('\t');
    const isHeader = text.length > 0 && !isSub && !isSep;
    if (isSep) {
      if (cur) { cur.sep = {text, lineNum}; blocks.push(cur); cur = null; }
      else blocks.push({header: null, lines: [], sep: {text, lineNum}});
    } else if (isHeader) {
      if (cur) blocks.push(cur);
      cur = {header: {text, lineNum}, lines: [], sep: null};
    } else {
      if (!cur) cur = {header: null, lines: [], sep: null};
      cur.lines.push({text, lineNum});
    }
  });
  if (cur) blocks.push(cur);
  return blocks;
}

// Render an array of {text, lineNum} with gutter line numbers + syntax highlight.
// highlightLine: optional line number to highlight (amber glow, scrolled into view by caller).
function _renderWithLineNums(lineObjs, highlightLine) {
  if (!lineObjs.length) return `<span class="cfg-error">!! No matching blocks found !!</span>`;
  const maxNum = Math.max(...lineObjs.map(o => o.lineNum));
  const w = String(maxNum).length;
  return lineObjs.map(({text, lineNum}) => {
    const numStr = String(lineNum).padStart(w);
    const esc = escapeHtml(text);
    const cls = _cfgLineClass(text);
    const code = cls ? `<span class="${cls}">${esc}</span>` : esc;
    if (highlightLine && lineNum === highlightLine)
      return `<span class="cfg-line-hl"><span class="cfg-lno">${numStr}│</span>${code}</span>`;
    return `<span class="cfg-lno">${numStr}│</span>${code}`;
  }).join('\n');
}

function _renderConfigIntoView(configText, preId, searchInputId, clearBtnId, badgeId) {
  currentRawConfig = _expandTaCleanDisplay(configText);
  const body     = document.getElementById(preId);
  const inp      = document.getElementById(searchInputId);
  const clearBtn = document.getElementById(clearBtnId);
  const badge    = document.getElementById(badgeId);
  if (body) body.innerHTML = _renderWithLineNums(
    currentRawConfig.split('\n').map((t, i) => ({text: t, lineNum: i + 1}))
  );

    inp.value = '';
    inp.oninput = _makeConfigSearchHandler({inp, body, clearBtn, badge});
  }
  if (clearBtn) clearBtn.classList.add('hidden');
  if (badge)    badge.classList.add('hidden');
  return {body, inp, clearBtn, badge};

function showConfigModal(deviceName, configText, opts) {
  if (!configText) return;
  const modal = document.getElementById("configModal");
  const title = document.getElementById("configModalTitle");
  title.innerText = "Config: " + _fmtDev(deviceName);
  const { inp: searchInput } = _renderConfigIntoView(
    configText, 'configBody', 'configSearch', 'configSearchClear', 'configMatchCount'
  );
  if (!opts || !opts.noAutoMinimize) _autoMinimizeOpenModal();
  setActiveModalChip('configModal');
  modal.style.display = "flex";
  searchInput.focus();
  searchInput.onkeydown = function(e) {
    if (e.key === "Escape") {
      if (this.value.trim() !== "") {
        e.preventDefault();
        e.stopPropagation();
        clearConfigSearch();
      }
    }
  };
}

/**
* Resolves which configuration text to display based on the button target.
* @param {string} target - 'device', 'left', or 'right'
*/
function openConfigFromButton(target) {
  const statusEl = document.getElementById("status");

  // CASE 1: Full Device Config
  if (target === 'device' && selectedDeviceId) {
    _configViewContext = { deviceName: selectedDeviceId, portFilter: null };
    _setPushBtnVisibility('device');
    if (currentDeviceConfig && currentDeviceConfig !== "") {
      showConfigModal(selectedDeviceId, currentDeviceConfig);
    } else {
      setStatus("Fetching full config for " + selectedDeviceId + "...");
      fetchFullConfig(selectedDeviceId, () => showConfigModal(selectedDeviceId, currentDeviceConfig));
    }
    return;
  }

  // CASE 2: Interface Link — use _leftDev/_rightDev (stable).
  // selectedLineId is cleared by redrawLinks() and filterTopology() while the strip stays
  // visible — reading it here causes false CASE 3 "nothing selected" errors.
  // _leftDev/_rightDev are set in selectLine() and only change on a new selection.
  if (target === 'left' && _leftDev) {
    const devNameL = _leftDev;
    const portL    = _leftPort || null;
    _configViewContext = { deviceName: devNameL, portFilter: portL };
    _setPushBtnVisibility('interface');
    const _showLeft = () => {
      const _fullCfgL = configCache[devNameL] ? formatConfigText(configCache[devNameL].data) : null;
      const cfg = currentLeftConfig
        || (portL && _fullCfgL ? _extractInterfaceBlock(_fullCfgL, portL) : null)
        || _fullCfgL;
      if (cfg) showConfigModal(devNameL, cfg);
      else setStatus("Config unavailable for " + devNameL, "status-error");
    };
    if (currentLeftConfig || configCache[devNameL]) {
      _showLeft();
    } else {
      setStatus("⏳ Fetching " + devNameL + " config...");
      fetchFullConfig(devNameL, _showLeft);
    }
    return;
  }

  if (target === 'right' && _rightDev) {
    const devNameR = _rightDev;
    const portR    = _rightPort || null;
    _configViewContext = { deviceName: devNameR, portFilter: portR };
    _setPushBtnVisibility('interface');
    const _showRight = () => {
      const _fullCfgR = configCache[devNameR] ? formatConfigText(configCache[devNameR].data) : null;
      const cfg = currentRightConfig
        || (portR && _fullCfgR ? _extractInterfaceBlock(_fullCfgR, portR) : null)
        || _fullCfgR;
      if (cfg) showConfigModal(devNameR, cfg);
      else setStatus("Config unavailable for " + devNameR, "status-error");
    };
    if (currentRightConfig || configCache[devNameR]) {
      _showRight();
    } else {
      setStatus("⏳ Fetching " + devNameR + " config...");
      fetchFullConfig(devNameR, _showRight);
    }
    return;
  }

  // CASE 3: Guard (Nothing selected)
  if (statusEl) {
    setStatus("△ Select a device or link first", "status-error");
    setTimeout(() => setStatus(getReadyStatus()), 2000);
  }
}

const _COPY_IFACE_LABEL = 'Copy Base+Ints';
const _COPY_INT_LABEL   = 'Copy Int';
const _PUSH_IFACE_LABEL = 'Push Base+Ints';
const _PUSH_INT_LABEL   = 'Push Int';

function _isNonEosDev(devName) {
  return !!(devName && allDevicesData[devName] && allDevicesData[devName].type === 'non-arista');
}

// Reset all configModal action buttons to idle device-view state (called on modal close).
function _clearPushBtns() {
  const ciBtn = document.getElementById('btnCfgCopyInterface');
  const caBtn = document.getElementById('btnCfgCopyAll');
  const piBtn = document.getElementById('btnCfgPushIface');
  const paBtn = document.getElementById('btnCfgPushAll');

  if (caBtn) { caBtn.style.display = ''; }

  if (paBtn) { paBtn.style.display = 'none'; paBtn.disabled = false; paBtn.textContent = _PUSH_ALL_LABEL; }

// Set all configModal action buttons for the given view type.
// 'device': Copy Base+Ints / Copy All / Push Base+Ints / Push All.
// 'interface': Copy Int / Push Int — Copy All and Push All hidden.
// Non-EOS: all buttons hidden (no generated config).
function _setPushBtnVisibility(viewType) {
  const ciBtn = document.getElementById('btnCfgCopyInterface');
  const caBtn = document.getElementById('btnCfgCopyAll');
  const piBtn = document.getElementById('btnCfgPushIface');
  const paBtn = document.getElementById('btnCfgPushAll');
  if (!piBtn || !paBtn) return;
  const devName = _configViewContext && _configViewContext.deviceName;
  if (_isNonEosDev(devName)) {
    _clearPushBtns();
    if (ciBtn) ciBtn.style.display = 'none';
    if (caBtn) caBtn.style.display = 'none';
    return;
  }
  const isDevice = viewType === 'device';
  if (ciBtn) { ciBtn.style.display = ''; ciBtn.textContent = isDevice ? _COPY_IFACE_LABEL : _COPY_INT_LABEL; }
  if (caBtn) caBtn.style.display = isDevice ? '' : 'none';
  piBtn.style.display = 'inline-block';
  piBtn.disabled = false; piBtn.textContent = isDevice ? _PUSH_IFACE_LABEL : _PUSH_INT_LABEL;
  paBtn.style.display = isDevice ? 'inline-block' : 'none';
  paBtn.disabled = false; paBtn.textContent = _PUSH_ALL_LABEL;
}

// Extract all interface sections from formatted config text (joined with \n!\n).
function _extractAllInterfaceBlocks(configText) {
  return (configText || '').split('\n!\n')
    .filter(s => s.trim().toLowerCase().startsWith('interface '))
    .join('\n!\n');
}

// Lower-level push — takes config text directly, no fetch needed.
async function _pushConfigText(deviceName, config, label, btnId) {
  if (_pendingPush) return; // another push is already pending confirm
  if (allDevicesData[deviceName] && allDevicesData[deviceName].type === 'non-arista') {
    const st = document.getElementById('status');
    setStatus(`Push not available — ${deviceName} is a non-EOS device`, "status-error");
    return;
  }
  const btn      = document.getElementById(btnId);
  const origText = btn ? btn.textContent : 'Push';
  const st       = document.getElementById('status');

  const ips = _getLldpMgmtIps();
  let   ip  = ips[deviceName] || '';
  if (!ip) {
    const safeId = deviceName.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp    = document.getElementById('bridgeIp_' + safeId);
    if (inp) ip  = inp.value.trim();
  }
  if (!ip) ip = deviceName;

  if (btn) { btn.disabled = true; btn.textContent = 'Previewing…'; }
  _previewingPush = { btnId, origText };
  _showPushConfirmModal(label, null);  // show modal immediately — "Computing diff…" shown by default
  try {
    const resp = await fetch(BRIDGE_URL + '/pushconfig', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } }, dry_run: true }),
    });
    if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
    const data = await resp.json();
    if (data.auth_expired) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _handleBridgeAuthExpired(data.message);
      _updatePushPreviewError(label, deviceName, 'Auth session expired \u2014 ' + (data.message || 'run: arista-ssh login'));
      return;
    }
    const res  = data[deviceName] || {};
    // Guard: user cancelled while fetch was in-flight — restore button immediately.
    const modal = document.getElementById('pushConfirmModal');
    if (!modal || modal.style.display === 'none') {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      return;
    }
    if (!res.ok) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      const errMsg = res.error || 'something went wrong';
      setStatus(`${label}: ${errMsg}`, "status-error");
      _updatePushPreviewError(label, deviceName, errMsg);
      return;
    }
    // EOS command rejections with empty diff — false "already in sync"
    const _ptEosErrs = _eosErrors(res);
    const _ptEosWarns = _eosWarnings(res);
    if (_ptEosErrs && (!res.diff || !res.diff.trim())) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _updatePushPreviewError(label, deviceName, 'EOS rejected commands — device NOT updated:\n' + _formatEosErrors(_ptEosErrs));
      return;
    }
    // Empty diff = already in sync — update modal for in-sync state
    if (!res.diff || !res.diff.trim()) {
      _previewingPush = null;
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _showPushConfirmModal(label, '', false, true);
      return;
    }
    _previewingPush = null;
    _pendingPush = { deviceName, ip, config, btnId, origText, label };
    if (btn) btn.textContent = 'Pending…';
    _showPushConfirmModal(label, res.diff);
    if (_ptEosErrs) _injectEosRejectionBanner(_ptEosErrs);
    if (_ptEosWarns) _injectEosWarningBanner(_ptEosWarns);
    // ASN injected first (afterbegin) so id-shift banner ends up above it when both present.
    if (res.asn_changed) _injectPushAsnChangeWarning(res.asn_changed);
    if (_lastIdShiftResult && !_lastIdShiftResult.isFirstRun && _lastIdShiftResult.shifted.length > 0) {
      _injectPushIdShiftWarning(_lastIdShiftResult.shifted);
    }
  } catch (err) {
    _previewingPush = null;
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    const modal = document.getElementById('pushConfirmModal');
    if (!modal || modal.style.display === 'none') {
      setStatus(`Push error: ${err.message} — is device_bridge.py running?`, "status-error");
      return;
    }
    setStatus(`Push error: ${err.message} — is device_bridge.py running?`, "status-error");
    _updatePushPreviewError(label, deviceName, `${err.message} — is device_bridge.py running?`);
  }
}

  }).join(', ');

    'padding:8px 10px;margin-bottom:8px;color:#713f12;line-height:1.5;user-select:none;-webkit-user-select:none;">' +

    '<div style="margin-top:6px;display:flex;gap:6px;">' +
    '<button onclick="_regenerateAllConfigs()" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;' +

    '<button onclick="document.getElementById(\'pushIdShiftBanner\').remove()" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;' +
    'padding:3px 10px;border:1px solid #d6b966;border-radius:3px;background:transparent;' +

// Injects a blue info banner when orphans are detected in Phase 1 — cleanup deferred to commit.
// orphans: {interfaces:[{name}], bgp:[{asn,neighbor}], vlans:[{vid}], vrfs:[{name}], ospf:[{context,iface}]}
// Orphan cleanup always runs at Commit (Phase 2) — banner is only shown when Commit is available.
function _injectOrphanPendingBanner(orphans) {
  const bodyEl = document.getElementById('pushConfirmBody');
  if (!orphans || !bodyEl) return;
  const total = (orphans.interfaces || []).length + (orphans.bgp || []).length +
                (orphans.vlans || []).length + (orphans.vrfs || []).length +
                (orphans.ospf || []).length;
  if (!total) return;
  const parts = [];
  (orphans.interfaces || []).forEach(o => parts.push(escapeHtml(o.name)));

// Returns deduplicated eos_errors from a bridge response, or null if absent/empty.
// Duplicate entries are collapsed with a count suffix: 'cmd → % err (×3)'.
function _eosErrors(res) {
  if (!res || !res.eos_errors || !res.eos_errors.length) return null;
  const counts = Object.create(null);
  res.eos_errors.forEach(function(e) { counts[e] = (counts[e] || 0) + 1; });
  return Object.entries(counts).map(function(pair) {
    return pair[1] > 1 ? pair[0] + ' (\xd7' + pair[1] + ')' : pair[0];
  });
}

// Matches EOS block-entering commands: interface, router bgp/ospf/isis, vlan N, address-family.
const _EOS_BLOCK_RE = /^(?:interface|router\s+(?:bgp|ospf|isis)|vlan\s+\d|address-family)\s/i;

// Formats EOS error list with '!' separator between config-block boundaries (plain text).
function _formatEosErrors(errs) {
  const out = [];
  errs.forEach(function(e, i) {
    if (i > 0 && _EOS_BLOCK_RE.test(e)) out.push('!');
    out.push(e);
  });
  return out.join('\n');
}

// HTML version — styled '!' separator lines for inline HTML rendering.
function _formatEosErrorsHtml(errs) {
  const parts = [];
  errs.forEach(function(e, i) {
    if (i > 0 && _EOS_BLOCK_RE.test(e)) {
      parts.push('<span style="display:block;color:#94a3b8;">!</span>');
    }
    parts.push('<span style="display:block;">' + escapeHtml(e) + '</span>');
  });
  return parts.join('');
}

// Injects a red EOS command-rejection banner into the push confirm modal body.
function _injectEosRejectionBanner(errors) {
  const bodyEl = document.getElementById('pushConfirmBody');
  if (!bodyEl) return;
  const lines = _formatEosErrorsHtml(errors);
  const banner = '<div id="pushEosRejectionBanner" style="' +
    'font-family:\'JetBrains Mono\',monospace;font-size:11px;' +
    'background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;' +
    'padding:8px 10px;margin-bottom:8px;color:#dc2626;line-height:1.5;">' +
    '<b>EOS rejected commands:</b><br>' + lines + '</div>';
  bodyEl.insertAdjacentHTML('afterbegin', banner);
}

// Returns deduplicated eos_warnings from a bridge response, or null if absent/empty.
function _eosWarnings(res) {
  if (!res || !res.eos_warnings || !res.eos_warnings.length) return null;
  const counts = Object.create(null);
  res.eos_warnings.forEach(function(w) { counts[w] = (counts[w] || 0) + 1; });

// Regenerate configs for all Arista devices in sequence, then save ID snapshot.
// Closes the push modal after completion — diff shown before regen is stale.
async function _regenerateAllConfigs() {
  const banner = document.getElementById('pushIdShiftBanner');
  if (banner) banner.remove();
  const aristaDevices = Object.keys(allDevicesData).filter(function(n) {
    return allDevicesData[n] && allDevicesData[n].type !== 'non-arista';
  });
  if (!aristaDevices.length) { setStatus('No Arista devices found.', 'status-warn'); return; }

  // Close push modal immediately — the diff shown is for the old (pre-shift) config.
  // User must re-initiate push after regeneration to get a fresh diff.
  cancelPushConfig();

  const total = aristaDevices.length;
  for (let i = 0; i < total; i++) {
    const devName = aristaDevices[i];
    setStatus('Regenerating ' + (i + 1) + '/' + total + ': ' + devName + '\u2026', 'status-loading');
    await new Promise(function(resolve) {
      const _guard = setTimeout(function() {
        delete configCache[devName];
        resolve();
      }, 20000);
      google.script.run
        .withSuccessHandler(function(result) {
          clearTimeout(_guard);
          // getDeviceConfig returns {config: configMap, error: ...} — store as {data: configMap}
          if (result && result.config) configCache[devName] = { data: result.config };
          resolve();
        })
        .withFailureHandler(function() {
          clearTimeout(_guard);
          resolve();
        })
        .getDeviceConfig(devName);
    });
  }

  // Save snapshot so next load/push shows no shift warning.
  await new Promise(function(resolve) {
    google.script.run
      .withSuccessHandler(function() {
        _lastIdShiftResult = { shifted: [], isFirstRun: false };
        resolve();
      })
      .withFailureHandler(function() { resolve(); })
      .saveDeviceIdSnapshot();
  });

  setStatus('All ' + total + ' configs ready \u2014 push each device to apply new IDs.', 'status-ok');
}

function _copyToClipboard(text, btnEl) {
  if (!text || !text.trim()) { setStatus('No config to copy.', 'status-warn'); return; }
  const doFeedback = () => {
    if (!btnEl) return;
    const orig = btnEl.innerText;
    btnEl.innerText = 'Copied';
    btnEl.style.color = '#10b981';
    setTimeout(() => { btnEl.innerText = orig; btnEl.style.color = ''; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
      setStatus('Copy failed — please select and copy manually.', 'status-error');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;user-select:text;-webkit-user-select:text;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); doFeedback(); } catch(e) { setStatus('Copy failed.', 'status-error'); }
    document.body.removeChild(ta);
  }
}

function _buildCopyInterfaceText(devName, portFilter) {
  if (portFilter) {
    return _extractInterfaceBlock(currentRawConfig, portFilter) || currentRawConfig || '';
  }
  const lines = (currentRawConfig || '').split('\n');
  const out = [];
  let inIntf = false;
  lines.forEach(line => {
    const isHeader = line.length > 0 && !line.startsWith(' ') && !line.startsWith('!');
    if (isHeader) inIntf = line.toLowerCase().startsWith('interface ')
                        && !line.toLowerCase().startsWith('interface defaults');
    if (inIntf) out.push(line);
  });
  let result = out.join('\n');
  if (devName) {
    const base = _getBaseBlock(devName);
    if (base) result = base + '\n!\n' + result;
  }
  return result;
}

function copyInterfaceConfig() {
  const { deviceName: devName, portFilter } = _configViewContext || {};
  _copyToClipboard(_buildCopyInterfaceText(devName, portFilter),
                   document.getElementById('btnCfgCopyInterface'));
}

/**
* GLOBAL SEARCH AUTOCOMPLETE
* - Searches data model (allDevicesData / allNodesData) not DOM text
* - Supports role/tag search (e.g. "SPINE", "LEAF")
* - Keyboard navigation: ↑↓ to move, Enter to select, Esc to close
* - Click: navigate + hide dropdown (filter text stays intact)
*/
(function () {
  const searchInp = document.getElementById('searchInp');
  const list = document.getElementById('search-autocomplete');
  const clearBtn = document.getElementById('searchClear');
  let selectedIdx = -1;

  function getItems() { return list.querySelectorAll('.search-item'); }

  function setSelected(idx) {
    const items = getItems();
    selectedIdx = Math.max(-1, Math.min(idx, items.length - 1));
    items.forEach((it, i) => it.classList.toggle('focused', i === selectedIdx));
  }

  searchInp.addEventListener('keydown', function (e) {
    const items = getItems();
    // Jump to first matching visible device when Enter with no autocomplete selection
    if (e.key === 'Enter' && selectedIdx < 0) {
      const q = (searchInp.value || '').toLowerCase().trim();
      if (q) {
        const allNodes = document.querySelectorAll('.node[data-id]');
        for (const n of allNodes) {
          if (!n.classList.contains('dimmed') && (n.dataset.id || '').toLowerCase().includes(q)) {
            e.preventDefault();
            list.classList.add('hidden');
            n.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            n.style.outline = '2px solid #3b82f6';
            setTimeout(() => { n.style.outline = ''; }, 1000);
            return;
          }
        }
      }
    }
    if (list.classList.contains('hidden') || items.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setSelected(selectedIdx + 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSelected(selectedIdx - 1); }
    else if (e.key === 'Enter' && selectedIdx >= 0) { e.preventDefault(); items[selectedIdx].click(); }
    else if (e.key === 'Escape') { list.classList.add('hidden'); selectedIdx = -1; }
  });

  searchInp.addEventListener('input', function (e) {
    const query = e.target.value.toLowerCase().trim();
    selectedIdx = -1;
    list.innerHTML = '';

    if (query.length < 1) { list.classList.add('hidden'); return; }

    const results = [];
    const seen = new Set();

    // CATEGORY 0: v-prefix → suggest VLAN trace shortcut
    const vTraceMatch = query.match(/^v([\d,\-]*)$/i);
    if (vTraceMatch && vTraceMatch[1].length > 0) {
      results.push({ type: 'trace', label: `Trace VLAN ${vTraceMatch[1]}`, vlan: vTraceMatch[1], className: 'type-trace' });
    }

    // CATEGORY 1: DEVICES — match by name, role, or label
    Object.entries(allDevicesData || {}).forEach(([devId, dev]) => {
      const name = devId.toLowerCase();
      const devRole = (dev.role || '').toLowerCase();
      const tags = [devRole, ...(dev.labels || [])].filter(Boolean).join(',').toLowerCase();
      if (!name.includes(query) && !tags.includes(query)) return;
      const node = document.querySelector(`.node[data-id="${devId}"]`);
      if (!node || seen.has(devId)) return;
      seen.add(devId);
      // Badge: prefer role, fall back to first colored label
      const roleTag = devRole.toUpperCase() && ROLE_COLORS[devRole.toUpperCase()]
        ? devRole.toUpperCase()
        : ''; // custom labels have no predefined role colors
      results.push({ type: 'node', label: devId, badge: roleTag, target: node, className: 'type-node' });
    });

    // CATEGORY 2: PORTS — match by name, VLAN, mode, IP type, desc, VRF, Po
    Object.entries(allNodesData || {}).forEach(([portId, port]) => {
      if (!port || !port.details) return;
      const d = port.details;
      const searchText = [port.name, d.vlan_, d.sp_mode_, d.ip_type_, d.desc_, d.vrf_, d.po_]
        .filter(Boolean).join(' ').toLowerCase();
      if (!searchText.includes(query)) return;
      if (seen.has(portId)) return;
      seen.add(portId);
      const portEl = document.querySelector(`.port-row[data-port-id="${portId}"]`);
      if (!portEl) return;
      const parentNode = portEl.closest('.node');
      const deviceLabel = port.device || '';
      const hasIp = /\d+\.\d+\.\d+/.test(searchText);
      const category = hasIp ? 'ip' : d.vlan_ ? 'vlan' : 'port';
      // Determine which field drove the match for context display
      const fieldChecks = [
        { key: 'desc', val: d.desc_ }, { key: 'vrf', val: d.vrf_ },
        { key: 'vlan', val: d.vlan_ }, { key: 'mode', val: d.sp_mode_ },
        { key: 'ip', val: d.ip_type_ }, { key: 'po', val: d.po_ },
      ];
      const mf = fieldChecks.find(f => f.val && String(f.val).toLowerCase().includes(query));
      const matchCtx = (mf && !port.name.toLowerCase().includes(query)) ? `${mf.key}: ${mf.val}` : null;
      results.push({ type: category, label: `${deviceLabel} → ${port.name}`, portId, target: portEl, parentNode, className: `type-${category}`, matchCtx });
    });

    if (results.length === 0) {
      const noRes = document.createElement('div');
      noRes.className = 'search-no-results';
      noRes.innerHTML = `No matches for "<strong>${e.target.value}</strong>"`;
      list.appendChild(noRes);
      list.classList.remove('hidden');
      return;
    }

    const total = results.length;
    // Auto-select first item when there's only one match — feels "complete"
    if (total === 1) selectedIdx = 0;

    let lastSection = null;
    results.slice(0, 12).forEach(res => {
      // Section header: Devices / Ports — insert when section changes
      const section = (res.type === 'node' || res.type === 'trace') ? 'Devices' : 'Ports';
      if (section !== lastSection) {
        const hdr = document.createElement('div');
        hdr.className = 'search-section-header';
        hdr.textContent = section;
        list.appendChild(hdr);
        lastSection = section;
      }

      const item = document.createElement('div');
      item.className = 'search-item';
      const hlLabel = highlightMatch(res.label, query);
      const badge = res.badge ? `<span class="item-role-badge">${_escHtml(res.badge)}</span>` : '';
      const ctx = res.matchCtx ? `<span class="search-item-ctx">${_escHtml(res.matchCtx)}</span>` : '';
      item.innerHTML = `<span>${hlLabel}${badge}${ctx}</span><span class="item-type ${res.className}">${res.type}</span>`;
      item.onclick = () => {
        list.classList.add('hidden');
        selectedIdx = -1;
        if (res.type === 'trace') {
          searchInp.value = 'v' + res.vlan;
          if (clearBtn) clearBtn.style.display = 'flex';
          filterTopology();
        } else if (res.type === 'node') {
          focusAndPulseNode(res.target);
        } else {
          focusAndPulsePort(res.target);
          if (res.type === 'vlan') {
            const portData = allNodesData[res.portId];
            const _pvSearch = parseVlanWithNative(portData?.details?.vlan_);
            const rawVlan = _pvSearch.vlans || _pvSearch.native;
            const vlanId = rawVlan ? String(rawVlan).match(/\d+/)?.[0] : null;
            if (vlanId) {
              searchInp.value = 'v' + vlanId;
              if (clearBtn) clearBtn.style.display = 'flex';
              filterTopology();
            }
          }
        }
      };
      list.appendChild(item);
    });

    if (total > 12) {
      const more = document.createElement('div');
      more.className = 'search-no-results';
      more.style.textAlign = 'center';
      more.innerText = `+${total - 12} more — type more to narrow`;
      list.appendChild(more);
    }

    const footer = document.createElement('div');
    footer.className = 'search-dropdown-footer';
    footer.innerText = 'Filter already applied — select to navigate';
    list.appendChild(footer);

    list.classList.remove('hidden');
    // Render focused state after DOM update
    if (selectedIdx >= 0) setSelected(selectedIdx);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
      list.classList.add('hidden');
      selectedIdx = -1;
    }
  });
})();

let _generateAllAborted = false;
let _pushAllStopped     = false;
let _pushAllActive      = false;
let _genSignalState     = 'idle';
let _genDotTimer        = null;

function _setGenToolbarSignal(state) {
  clearTimeout(_genDotTimer);
  const dot = document.getElementById('genToolbarDot');
  if (!dot) return;
  dot.className = (state === 'idle') ? '' : ('gen-sig-' + state);
  if (state !== 'running' && state !== 'idle') {
    _genDotTimer = setTimeout(function() { dot.className = ''; }, 5000);
  }
}

function _setGenToolbarActive(on, signalState) {
  const tb = document.getElementById('btnGenerateAllToolbar');
  if (tb) tb.classList.toggle('is-active', on);
  if (on) {
    _genSignalState = 'ok';
    _setGenToolbarSignal('running');
  } else if (signalState !== undefined) {
    _setGenToolbarSignal(signalState);
  }
}
function _resetStopGenerateBtn() {
  const b = document.getElementById('btnStopGenerate');
  if (!b) return;
  b.disabled = true;
  b.className = 'btn-mono genall-btn';
  b.textContent = 'Stop';
  b.onclick = null;
}
function _resetStopPushBtn() {
  const b = document.getElementById('btnStopPush');
  if (!b) return;
  b.disabled = true;
  b.className = 'btn-mono genall-btn';
  b.textContent = 'Stop';
  b.onclick = null;
}

function _populateGenAllDeviceList() {
  const container = document.getElementById('cfgCenterDevList');
  if (!container) return;
  const devices = (currentData && currentData.nodes || [])
    .filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista')
    .map(n => n.id)
    .sort((a, b) => (allDevicesData[a].sheetIndex || 0) - (allDevicesData[b].sheetIndex || 0));
  if (!devices.length) {
    container.innerHTML = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--text-muted);font-style:italic;">No EOS devices.</span>';
    _updateGenAllSelCount();
    _buildRoleFilters();
    return;
  }
  container.innerHTML = devices.map(name => {
    const safeName = escapeHtml(_fmtDev(name));
    const safeAttr = escapeHtml(name);
    const role = escapeHtml((allDevicesData[name] && allDevicesData[name].role) || '');
    return `<button class="genall-dev-pill selected" data-dev="${safeAttr}" data-role="${role}" onclick="_toggleGenAllPill(this)">${safeName}</button>`;
  }).join('');
  _updateGenAllSelCount();
  _buildRoleFilters();
}

function _buildRoleFilters() {
  const rf = document.getElementById('cfgCenterRoleFilters');
  if (!rf) return;
  const container = document.getElementById('cfgCenterDevList');
  const roles = new Set();
  if (container) {
    container.querySelectorAll('.genall-dev-pill[data-role]').forEach(pill => {
      const r = pill.dataset.role;
      if (r) roles.add(r.toUpperCase());
    });
  }
  if (roles.size === 0) { rf.style.display = 'none'; return; }
  rf.style.display = 'flex';
  rf.innerHTML = Array.from(roles).sort().map(role => {
    const safeRole = escapeHtml(role);
    return `<button class="genall-role-chip" data-role="${safeRole}" onclick="_selectByRole('${safeRole}',event.shiftKey)" title="Click: select only ${safeRole} · Shift+click: toggle ${safeRole}">${safeRole}</button>`;
  }).join('');
}

function _selectByRole(role, shiftKey) {
  const container = document.getElementById('cfgCenterDevList');
  if (!container) return;
  const pills = container.querySelectorAll('.genall-dev-pill');
  if (shiftKey) {
    // Toggle: if ALL matching are selected → deselect them; else → select them
    const matching = Array.from(pills).filter(p => (p.dataset.role || '').toUpperCase() === role);
    const allSelected = matching.every(p => p.classList.contains('selected'));
    matching.forEach(p => p.classList.toggle('selected', !allSelected));
  } else {
    // Exclusive select: only devices of this role
    pills.forEach(p => p.classList.toggle('selected', (p.dataset.role || '').toUpperCase() === role));
  }
  _updateGenAllSelCount();
}

function _toggleGenAllPill(btn) {
  btn.classList.toggle('selected');
  _updateGenAllSelCount();
}

function _updateGenAllSelCount() {
  const container = document.getElementById('cfgCenterDevList');
  if (!container) return;
  const total   = container.querySelectorAll('.genall-dev-pill').length;
  const checked = container.querySelectorAll('.genall-dev-pill.selected').length;
  const el = document.getElementById('cfgCenterSelCount');
  if (!el) return;
  if (checked === total) {
    el.textContent = `All ${total} selected`;
  } else {
    el.textContent = `${checked} of ${total} selected`;
  }
}

function _genAllSelectAll(state) {
  const container = document.getElementById('cfgCenterDevList');
  if (!container) return;
  container.querySelectorAll('.genall-dev-pill').forEach(pill => {
    pill.classList.toggle('selected', state);
  });
  _updateGenAllSelCount();
}

function _switchCfgPanel(panel) {
  // 'view' is a sub-panel of Generate — keep Generate nav highlighted
  const navActive = panel === 'view' ? 'generate' : panel;
  ['generate', 'template', 'cleanup', 'push', 'view'].forEach(p => {
    const nav = document.getElementById('cfgNav-' + p);
    const content = document.getElementById('cfgPanel-' + p);
    if (nav) nav.classList.toggle('active', p === navActive);
    if (content) content.classList.toggle('active', p === panel);
  });
  if (panel === 'generate') {
    const genSub = document.getElementById('cfgNavGenSub');
    if (genSub) genSub.textContent = 'Build EOS configs from sheet';
  }
}

function _switchGenTab(tab) {
  // Forward to the panel switcher — called by runGenerateAll, runCleanup, pushAllConfigs
  _switchCfgPanel(tab === 'cleanup' ? 'cleanup' : tab === 'push' ? 'push' : 'generate');
}

function openGenerateAllModal(panel) {
  const modal = document.getElementById('configCenterModal');
  if (modal && modal.classList.contains('modal-minimized')) {
    _autoMinimizeOpenModal();
    toggleModalMinimize('configCenterModal');
    setActiveModalChip('configCenterModal');
    return;
  }
  if (!window._generateAllConfigs) {
    try {
      const raw = localStorage.getItem('ta_gen_cache');
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.configs && saved.configs.length) {
          window._generateAllConfigs = saved.configs;
          window._generateAllMeta = saved.meta;
        }
      }
    } catch(e) {}
  }
  _autoMinimizeOpenModal();
  _populateGenAllDeviceList();
  _resetStopGenerateBtn();
  _resetStopPushBtn();
  _renderGenerateDeviceList();
  const btn = document.getElementById('btnGenerateConfigs');
  if (btn) btn.disabled = false;
  const stopBtn = document.getElementById('btnStopGenerate');
  if (window._generateAllConfigs && window._generateAllConfigs.length) {
    if (stopBtn) { stopBtn.disabled = false; stopBtn.className = 'btn-success-mono genall-btn'; stopBtn.textContent = 'Copy All'; stopBtn.onclick = copyAllConfigs; }
  }
  _switchCfgPanel(panel || 'generate');
  if (modal) modal.style.display = 'flex';
  setActiveModalChip('configCenterModal');
  _loadGlobalCfgTemplate();
}

function closeGenerateAllModal() {
  if (_pushAllActive) {
    const warn = document.getElementById('pushWarnBanner');
    if (warn) {
      warn.style.display = 'block';
      setTimeout(() => { warn.style.display = 'none'; }, 3500);
    }
    return;
  }
  const _gcfgTa = document.getElementById('globalCfgTextarea');
  const isCfgDirty = _gcfgTa && initialGlobalCfgState !== '' && _gcfgTa.value !== initialGlobalCfgState;
  if (!_confirmDirtyClose(isCfgDirty, "Config Center")) return;
  initialGlobalCfgState = '';
  _onModalClose(document.getElementById('configCenterModal'));
  document.getElementById('configCenterModal').style.display = 'none';
  document.getElementById('editOverlay').style.display = 'none';
}

function runGenerateAll() {
  // Clear any previously cached results — fresh generation requested
  window._generateAllConfigs = null;
  window._generateAllText = null;
  window._generateAllMeta = null;
  try { localStorage.removeItem('ta_gen_cache'); } catch(e) {}

  _generateAllAborted = false;
  const btn     = document.getElementById('btnGenerateConfigs');
  const stopBtn = document.getElementById('btnStopGenerate');

  btn.disabled = true;
  btn.innerText = 'Generating...';
  _setGenToolbarActive(true);
  _switchGenTab('generate');

  // Activate stop button
  stopBtn.disabled = false;
  stopBtn.className = 'btn-mono genall-btn stop-active';
  stopBtn.textContent = 'Stop Generate';
  stopBtn.onclick = function() {
    _generateAllAborted = true;
    _setGenToolbarActive(false, 'warn');
    _resetStopGenerateBtn();
    btn.disabled = false;
    btn.innerText = 'Generate Configs';
    document.getElementById('genResultsBody').innerHTML =
      '<div style="color:var(--text-muted);padding:20px 0;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-style:italic;">Generation stopped.</div>';
  };

  document.getElementById('genResultsBody').innerHTML =
    '<div style="text-align:center;padding:30px 0;color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:12px;">'
    + '<div style="font-size:20px;margin-bottom:10px;">⏳</div>'
    + '<div>Generating configs… this may take 30–60 seconds for large topologies.</div></div>';

  google.script.run
    .withSuccessHandler(function(result) {
      if (_generateAllAborted) return;
      _setGenToolbarActive(false, result.error ? 'err' : 'ok');
      if (result.error) {
        _resetStopGenerateBtn();
        btn.disabled = false;
        btn.innerText = 'Generate Configs';
        document.getElementById('genResultsBody').innerHTML =
          '<div style="color:var(--error-text,#ef4444);padding:20px;font-family:\'JetBrains Mono\',monospace;font-size:12px;"><b>Error:</b> ' + result.error + '</div>';
        return;
      }
      const configs = result.configs || [];
      const meta = { sheetName: result.sheetName, ts: new Date().toTimeString().slice(0, 8) };
      _renderGenerateResults(configs, meta);
    })
    .withFailureHandler(function(err) {
      if (_generateAllAborted) return;
      _setGenToolbarActive(false, 'err');
      _resetStopGenerateBtn();
      btn.disabled = false;
      btn.innerText = 'Retry';
      document.getElementById('genResultsBody').innerHTML =
        '<div style="color:var(--error-text,#ef4444);padding:20px;font-family:\'JetBrains Mono\',monospace;font-size:12px;"><b>Error:</b> ' + err.message + '</div>';
    })
    .getAllDeviceConfigs();
}

function _renderGenerateResults(configs, meta) {
  window._generateAllText = configs.map(function(c) {
    return '! === ' + c.name + ' ===\n' + c.text;
  }).join('\n!\n!\n');
  window._generateAllConfigs = configs;
  if (meta) window._generateAllMeta = meta;
  try { localStorage.setItem('ta_gen_cache', JSON.stringify({configs: configs, meta: window._generateAllMeta})); } catch(e) {}
  const btn = document.getElementById('btnGenerateConfigs');
  if (btn) btn.disabled = false;
  _renderGenerateDeviceList();
  const stopBtn = document.getElementById('btnStopGenerate');
  if (stopBtn) {
    stopBtn.disabled = false;
    stopBtn.className = 'btn-success-mono genall-btn';
    stopBtn.textContent = 'Copy All';
    stopBtn.onclick = copyAllConfigs;
  }
}

function _viewGeneratedConfig(idx) {
  const cfg = window._generateAllConfigs && window._generateAllConfigs[idx];
  if (!cfg) return;
  showConfigModal(cfg.name, cfg.text);
}
function copyAllConfigs() {
  const text = window._generateAllText || '';
  if (!text) return;
  handleCopy(text, 'btnCopyAllConfigs');
}

// ----- Generate panel helpers -----

function _getConfigTextForDevice(name) {
  if (window._generateAllConfigs) {
    const entry = window._generateAllConfigs.find(c => c.name === name);
    if (entry && entry.text) return entry.text;
  }
  if (configCache[name] && configCache[name].data) {
    return formatConfigText(configCache[name].data);
  }
  return null;
}

function _viewGeneratedConfigByName(name) {
  _openCfgPanelView(name);
}

function _openCfgPanelView(name) {
  var text = _getConfigTextForDevice(name);
  if (!text) return;
  _configViewContext = { deviceName: name, portFilter: null };
  var title = document.getElementById('cfgViewTitle');
  if (title) title.innerHTML =
    '<button onclick="_switchCfgPanel(\'generate\')" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:400;font-style:normal;color:var(--text-muted);background:none;border:none;padding:0;cursor:pointer;user-select:none;-webkit-user-select:none;" title="Back to device list">← Generate</button>'
    + '<span style="color:var(--text-muted);margin:0 5px;font-weight:400;font-style:normal;">›</span>'
    + '<span>' + escapeHtml(_fmtDev(name)) + '</span>';
  var genSub = document.getElementById('cfgNavGenSub');
  if (genSub) genSub.textContent = '↳ ' + _fmtDev(name);
  var { inp } = _renderConfigIntoView(text, 'cfgViewBody', 'cfgViewSearch', 'cfgViewSearchClear', 'cfgViewMatchCount');
  if (inp) {
    inp.onkeydown = function(e) {
      if (e.key === 'Escape' && inp.value.trim() !== '') {
        e.preventDefault(); e.stopPropagation(); _clearCfgViewSearch();
      }
    };
  }
  var copyIface = document.getElementById('btnCfgViewCopyIface');
  var pushDiv   = document.getElementById('cfgViewPushDiv');
  var pushIface = document.getElementById('btnCfgViewPushIface');
  var pushAllBtn = document.getElementById('btnCfgViewPushAll');
  if (copyIface) copyIface.textContent = _COPY_IFACE_LABEL;
  if (pushIface) pushIface.textContent = _PUSH_IFACE_LABEL;
  var isNonEos = _isNonEosDev(name);
  if (pushDiv)    pushDiv.style.display    = isNonEos ? 'none' : '';
  if (pushIface)  pushIface.style.display  = isNonEos ? 'none' : '';
  if (pushAllBtn) pushAllBtn.style.display = isNonEos ? 'none' : '';

function _clearCfgViewSearch() {
  var inp = document.getElementById('cfgViewSearch');
  if (!inp) return;
  inp.value = '';
  inp.dispatchEvent(new Event('input'));
  inp.focus();
}

function _cfgViewCopyAll() {
  _copyToClipboard(currentRawConfig, document.getElementById('btnCfgViewCopyAll'));
}

function _cfgViewCopyInterface() {
  const { deviceName: devName, portFilter } = _configViewContext || {};
  _copyToClipboard(_buildCopyInterfaceText(devName, portFilter),
                   document.getElementById('btnCfgViewCopyIface'));
}

function _copyGenRow(devName, btn) {
  const text = _getConfigTextForDevice(devName);
  if (!text) return;
  const wrapper = btn ? btn.closest('.split-btn') : null;
  const doFeedback = () => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = 'Copied';
    if (wrapper) wrapper.style.background = '#3b82f6';
    setTimeout(() => {
      btn.textContent = orig;
      if (wrapper) wrapper.style.background = _SPLIT_STATE_BG[wrapper.dataset.splitState] || '#64748b';
    }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => setStatus('Copy failed.', 'status-error'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;user-select:text;-webkit-user-select:text;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); doFeedback(); } catch(e) { setStatus('Copy failed.', 'status-error'); }
    document.body.removeChild(ta);
  }
}

function _renderGenerateDeviceList() {
  const left = document.getElementById('genResultsBody');
  if (!left) return;
  const devices = (currentData && currentData.nodes || [])
    .filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista')
    .map(n => n.id)
    .sort((a, b) => (allDevicesData[a].sheetIndex || 0) - (allDevicesData[b].sheetIndex || 0));

  if (!devices.length) {
    left.innerHTML = '<div style="color:var(--text-muted);font-style:italic;'
      + 'font-family:\'JetBrains Mono\',monospace;font-size:11px;padding:8px 0;">'
      + 'No EOS devices in topology.</div>';
    return;
  }

  const totalCached = devices.filter(n => !!_getConfigTextForDevice(n)).length;
  const allCached = totalCached === devices.length && totalCached > 0;
  const m = window._generateAllMeta || {};
  const ts = m.ts
    ? ' <span style="font-weight:400;color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:11px;">' + m.ts + '</span>'
    : '';
  let header;
  if (allCached) {
    const sheetName = m.sheetName || 'Configs';
    header = '<div style="color:#10b981;font-weight:700;margin-bottom:10px;font-family:\'JetBrains Mono\',monospace;font-size:12px;">'
      + '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="vertical-align:-2px;margin-right:3px"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + totalCached + ' device(s) → written to <b>' + escapeHtml(sheetName) + '</b> tab' + ts + '</div>';
  } else if (totalCached > 0) {
    header = '<div style="color:var(--text-muted);margin-bottom:10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-style:italic;">'
      + totalCached + ' of ' + devices.length + ' device(s) auto-cached'
      + ' — open more device cards, or <b>Generate Configs</b> to fetch remaining.</div>';
  } else {
    header = '<div style="color:var(--text-muted);margin-bottom:10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-style:italic;">'
      + devices.length + ' device(s) — open a device card to auto-cache its config,'
      + ' or <b>Generate Configs</b> to build all.</div>';
  }

  const genBtn = document.getElementById('btnGenerateConfigs');
  if (genBtn && !genBtn.disabled) {
    genBtn.innerText = allCached ? 'Regenerate Configs' : 'Generate Configs';
  }

  let html = '<div style="padding:4px 0;">' + header;
  devices.forEach(function(name) {
    const text = _getConfigTextForDevice(name);
    const lines = text ? text.split('\n').length : null;
    const bg = text ? '#10b981' : '#475569';
    const safeAttr = escapeHtml(name);
    const label = escapeHtml(_fmtDev(name) + (lines !== null ? ' · ' + lines + ' lines' : ''));
    const isFetching = window._genSingleFetching && window._genSingleFetching.has(name);
    const genSingleBtn = isFetching
      ? '<button class="split-action" disabled style="font-family:\'JetBrains Mono\',monospace;">…</button>'
      : text
        ? '<button class="split-action" data-dev="' + safeAttr + '" onclick="_generateSingleDevice(this.dataset.dev)" style="font-family:\'JetBrains Mono\',monospace;">Regen</button>'
        : '<button class="split-action" data-dev="' + safeAttr + '" onclick="_generateSingleDevice(this.dataset.dev)" style="font-family:\'JetBrains Mono\',monospace;">Gen</button>';
    const copyBtn = text
      ? '<button class="split-action copy-action" data-dev="' + safeAttr + '" onclick="_copyGenRow(this.dataset.dev,this)">Copy</button>'
      : '<button class="split-action copy-action" disabled>Copy</button>';
    const viewBtn = text
      ? '<button class="split-action view-action" data-dev="' + safeAttr + '" onclick="_viewGeneratedConfigByName(this.dataset.dev)">View</button>'
      : '<button class="split-action view-action" disabled>View</button>';
    html += '<div class="split-btn" data-dev="' + safeAttr + '" style="display:flex;background:' + bg + ';margin-bottom:3px;width:100%;">'
      + '<span class="split-label" style="flex:1;min-width:0;">' + label + '</span>'
      + '<div class="split-action-divider"></div>'
      + genSingleBtn
      + '<div class="split-action-divider"></div>'
      + copyBtn
      + '<div class="split-action-divider"></div>'
      + viewBtn
      + '</div>';
  });
  html += '</div>';
  left.innerHTML = html;
  left.dataset.generated = allCached ? '1' : '0';
}

function _refreshGenerateRow(devName) {
  const left = document.getElementById('genResultsBody');
  if (!left) return;
  const panel = document.getElementById('cfgPanel-generate');
  if (!panel || !panel.classList.contains('active')) return;
  const row = left.querySelector('[data-dev="' + CSS.escape(devName) + '"]');
  if (!row) return;
  const text = _getConfigTextForDevice(devName);
  if (!text) return;
  // Re-render the full list so the header count and all rows stay consistent
  _renderGenerateDeviceList();
}

function _generateSingleDevice(name) {
  delete configCache[name];
  if (window._generateAllConfigs) {
    const idx = window._generateAllConfigs.findIndex(c => c.name === name);
    if (idx !== -1) window._generateAllConfigs.splice(idx, 1);
  }
  try {
    const raw = localStorage.getItem('ta_gen_cache');
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && saved.configs) {
        saved.configs = saved.configs.filter(c => c.name !== name);
        localStorage.setItem('ta_gen_cache', JSON.stringify(saved));
      }
    }
  } catch(e) {}
  if (!window._genSingleFetching) window._genSingleFetching = new Set();
  window._genSingleFetching.add(name);
  _renderGenerateDeviceList();
  fetchFullConfig(name, function() {
    if (window._genSingleFetching) window._genSingleFetching.delete(name);
    _renderGenerateDeviceList();
  });
}

function collapseAllCards() {

    collapsed[el.dataset.id] = 1;
  });

}

function expandAllCards() {
  document.querySelectorAll('.node.is-collapsed').forEach(el => el.classList.remove('is-collapsed'));
  localStorage.setItem('nb_collapsed', '{}');
  requestAnimationFrame(redrawLinks);
}

const _svgChevronDown = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
const _svgChevronUp   = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>';

function toggleAllCards() {

    collapseAllCards();

}
