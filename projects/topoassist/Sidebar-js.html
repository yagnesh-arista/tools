async function downloadPNG(btn) {
  const surface = document.getElementById("canvas-surface");
  const cvs = document.getElementById("canvas-layer");
  const svg = document.getElementById("svg-layer");
  const stat = document.getElementById("status");

  // 1. Show Loading
  showGlobalLoading("Generating High-Res Image...");
  if (stat) stat.innerText = "Generating Image...";

  // 2. Save Original State
  const originalTransform = surface.style.transform;
  const originalW = surface.style.width;
  const originalH = surface.style.height;
  const originalCvsW = cvs.width;
  const originalCvsH = cvs.height;
  const originalBorder = surface.style.border;
  const hadGridActive = surface.classList.contains("grid-active");

  // Save SVG state
  const originalSvgW = svg.getAttribute("width");
  const originalSvgH = svg.getAttribute("height");
  const originalSvgStyleW = svg.style.width;
  const originalSvgStyleH = svg.style.height;

  try {
    // 3. RESET VIEW (1:1 Scale, No Pan)
    // We remove the zoom/pan transform so we can calculate absolute positions
    surface.style.transition = "none";
    surface.style.transform = "none";
    surface.style.border = "none";

    // Wait for DOM layout to settle
    await new Promise(r => setTimeout(r, 50));

    // 4. CALCULATE BOUNDS (Nodes + Cables)
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    let hasNodes = false;

    // A. Scan HTML Cards (Detailed View)
    document.querySelectorAll(".node:not(.dimmed)").forEach(el => {
      hasNodes = true;
      const x = el.offsetLeft;
      const y = el.offsetTop;
      const w = el.offsetWidth;
      const h = el.offsetHeight;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x + w > maxX) maxX = x + w;
      if (y + h > maxY) maxY = y + h;
    });

    // B. Scan SVG Nodes (Holistic View)
    document.querySelectorAll(".node-circle").forEach(el => {
      hasNodes = true;
      // D3 binds data to __data__, use that for precise coordinates
      const d = el.__data__;
      const r = 45; // Radius + padding
      if (d) {
        if (d.x - r < minX) minX = d.x - r;
        if (d.y - r < minY) minY = d.y - r;
        if (d.x + r > maxX) maxX = d.x + r;
        if (d.y + r > maxY) maxY = d.y + r;
      }
    });

    // C. Scan Cables (To prevent cropping high arcs)
    if (currentViewMode !== 'holistic' && typeof globalLinks !== 'undefined') {
      globalLinks.forEach(l => {
        if (l.coords) {
          const c = l.coords;
          const linkMinY = Math.min(c.y1, c.y2, c.cp1y, c.cp2y);
          const linkMaxY = Math.max(c.y1, c.y2, c.cp1y, c.cp2y);
          const linkMinX = Math.min(c.x1, c.x2, c.cp1x, c.cp2x);
          const linkMaxX = Math.max(c.x1, c.x2, c.cp1x, c.cp2x);

          if (linkMinY < minY) minY = linkMinY;
          if (linkMaxY > maxY) maxY = linkMaxY;
          if (linkMinX < minX) minX = linkMinX;
          if (linkMaxX > maxX) maxX = linkMaxX;
        }
      });
    }

    // Fallback if empty
    if (!hasNodes) {
      minX = 0; minY = 0; maxX = 1200; maxY = 900;
    }

    const padding = 60;

    // 5. EXPAND CONTAINER
    const requiredW = Math.max(maxX + padding, 1200);
    const requiredH = Math.max(maxY + padding, 900);

    // Apply size to the main surface container
    surface.style.width = requiredW + "px";
    surface.style.height = requiredH + "px";

    // 6. RESIZE LAYERS (Context Aware)
    const dpr = window.devicePixelRatio || 1;

    // --- HOLISTIC VIEW FIX ---
    if (currentViewMode === 'holistic') {
      // In Holistic view, lines are SVG. We MUST resize the SVG element.
      // We do NOT call redrawLinks() because that draws on Canvas (which we don't use here).
      svg.setAttribute("width", requiredW + "px");
      svg.setAttribute("height", requiredH + "px");
      svg.style.width = requiredW + "px";
      svg.style.height = requiredH + "px";

      // Ensure Canvas is hidden or 0 size to avoid interference
      cvs.width = 0;
      cvs.height = 0;
    }
    // --- DETAILED VIEW ---
    else {
      // In Detailed view, lines are Canvas. Resize Canvas and Redraw.
      cvs.width = Math.floor(requiredW * dpr);
      cvs.height = Math.floor(requiredH * dpr);
      cvs.style.width = requiredW + "px";
      cvs.style.height = requiredH + "px";

      if (canvasCtx) {
        canvasCtx.setTransform(1, 0, 0, 1, 0, 0);
        canvasCtx.scale(dpr, dpr);
      }
      // Force redraw of canvas lines
      if (typeof redrawLinks === 'function') redrawLinks();
    }

    // Wait for render
    await new Promise(r => setTimeout(r, 200));

    // 7. CAPTURE WITH CROP
    const cropX = Math.max(0, minX - padding);
    const cropY = Math.max(0, minY - padding);
    const cropW = (maxX - minX) + (padding * 2);
    const cropH = (maxY - minY) + (padding * 2);

    // Remove grid lines from snapshot (not needed in exported image)
    surface.classList.remove("grid-active");

    const canvas = await html2canvas(surface, {
      scale: 2,
      backgroundColor: "#f8fafc",
      logging: false,
      useCORS: true,
      x: cropX,
      y: cropY,
      width: cropW,
      height: cropH,
      windowWidth: requiredW + 200, // Buffer
      windowHeight: requiredH + 200,
      scrollX: 0,
      scrollY: 0,
      ignoreElements: (element) => {
        // Optional: Ignore hidden elements explicitly
        return element.classList.contains('hidden') || element.style.display === 'none';
      }
    });

    // 8. DOWNLOAD
    const link = document.createElement('a');
    link.download = `Topology_${new Date().getTime()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    if (stat) stat.innerText = "Image Downloaded";

  } catch (e) {
    console.error("Screenshot Error:", e);
    if (stat) stat.innerText = "Error: " + e.message;
    alert("Snapshot Failed: " + e.message);
  } finally {
    // 9. RESTORE ORIGINAL STATE
    surface.style.width = originalW;
    surface.style.height = originalH;

    // Restore Canvas
    cvs.width = originalCvsW;
    cvs.height = originalCvsH;
    cvs.style.width = originalW;
    cvs.style.height = originalH;

    // Restore SVG
    if (svg) {
      svg.setAttribute("width", originalSvgW);
      svg.setAttribute("height", originalSvgH);
      svg.style.width = originalSvgStyleW;
      svg.style.height = originalSvgStyleH;
    }

    if (canvasCtx) {
      const dpr = window.devicePixelRatio || 1;
      canvasCtx.setTransform(1, 0, 0, 1, 0, 0);
      canvasCtx.scale(dpr, dpr);
    }

    surface.style.transform = originalTransform;
    surface.style.border = originalBorder;
    surface.style.transition = "";
    if (hadGridActive) surface.classList.add("grid-active");

    // Redraw appropriate lines for current view
    if (currentViewMode === 'detailed' && typeof redrawLinks === 'function') {
      redrawLinks();
    }

    hideGlobalLoading();
  }
}

/* ==================================================
TOPOLOGY MODE LOGIC (3 Icons)
================================================== */

function setTopoMode(mode) {
  if (mode === 'simple') {
    toggleViewMode('holistic');
  }
  else if (mode === 'linear') {
    if (currentViewMode !== 'detailed') toggleViewMode('detailed');
    switchLayout('linear');
  }
  else if (mode === 'flexible') { // CHANGED
    if (currentViewMode !== 'detailed') toggleViewMode('detailed');
    switchLayout('flexible'); // CHANGED
  }
  updateTopoButtons(mode);
}

// 2. Button Visual State Manager
function updateTopoButtons(activeMode) {
  // 1. Highlight the correct top icon
  const btnIds = ['btnTopoSimple', 'btnTopoLinear', 'btnTopoFlexible'];
  btnIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });

  let activeId = '';
  if (activeMode === 'simple') activeId = 'btnTopoSimple';
  else if (activeMode === 'linear') activeId = 'btnTopoLinear';
  else if (activeMode === 'flexible') activeId = 'btnTopoFlexible';

  const activeEl = document.getElementById(activeId);
  if (activeEl) activeEl.classList.add('active');

  // 2. AUTO-GRID: Always show grid background in Simple Mode
  // Grid is on canvas-surface (not viewport) so it moves with pan/zoom and stays aligned with the 50px snap grid
  const canvasSurface = document.getElementById("canvas-surface");
  if (canvasSurface) {
    if (activeMode === 'simple') {
      canvasSurface.classList.add("grid-active"); // VISUAL GRID ON
    } else {
      canvasSurface.classList.remove("grid-active"); // VISUAL GRID OFF
    }
  }

  // 3. Edit Mode button — only active in detailed/flexible (not holistic)
  const editBtn = document.getElementById("editModeBtn");
  if (editBtn) {
    const editActive = (activeMode !== 'simple');
    editBtn.style.opacity = editActive ? "1" : "0.35";
    editBtn.style.pointerEvents = editActive ? "" : "none";
    // Exit edit mode if switching into holistic while edit is on
    if (!editActive && isEditMode) toggleEditMode();
  }

  // 3b. LAYOUT + CABLE sections — not applicable in holistic (no cards/cables rendered)
  ['tbSectionLayout', 'tbSectionCable'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const active = (activeMode !== 'simple');
    el.style.opacity = active ? '' : '0.35';
    el.style.pointerEvents = active ? '' : 'none';
  });

  // 3c. Holistic canvas controls — show floating panel only in holistic mode
  const holisticCtrl = document.getElementById('holistic-controls');
  if (holisticCtrl) holisticCtrl.style.display = (activeMode === 'simple') ? 'flex' : 'none';
  if (activeMode === 'simple') _updateNodeSizeBtns();

  // 4. Collapse/Expand all — only meaningful in detailed/flexible (cards exist)
  const toggleBtn = document.getElementById('btnToggleCards');
  if (toggleBtn) {
    const isSimple = (activeMode === 'simple');
    toggleBtn.disabled = isSimple;
    toggleBtn.style.opacity = isSimple ? '0.3' : '';
    toggleBtn.style.cursor = isSimple ? 'not-allowed' : '';
  }
}

// Helper to map View+Layout to the 3-Button State
function determineCurrentTopoMode() {
  if (currentViewMode === 'holistic') return 'simple';
  if (layoutMode === 'flexible') return 'flexible'; // CHANGED
  return 'linear';
}
/**
* UPDATED: toggleViewMode
* Now accepts 'doZoom' (default true).
* We set this to false during data refreshes to prevent the map from jumping.
*/
function toggleViewMode(mode, doZoom = true) {
  // 1. Save State of the mode we are LEAVING (Snapshots where we are right now)
  saveCurrentStateToStorage();

  // 2. SWITCH Mode
  currentViewMode = mode;
  localStorage.setItem('topology_view_mode', mode);

  // 3. LOAD Node Positions
  loadStateFromStorage(mode);
  if (mode === 'holistic') loadGroupRects();

  const isDetail = (mode === 'detailed');

  // 4. CLEANUP
  if (d3Simulation) d3Simulation.stop();
  if (holisticSimulation) holisticSimulation.stop();

  const nodesLayer = document.getElementById("nodes-layer");
  const svgLayer = document.getElementById("svg-layer");
  const cvs = document.getElementById("canvas-layer");

  if (cvs) {
    const ctx = cvs.getContext('2d');
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    cvs.style.display = (mode === 'detailed') ? "block" : "none";
  }

  if (nodesLayer) nodesLayer.innerHTML = "";
  if (svgLayer) svgLayer.innerHTML = "";

  // 5. RENDER
  if (isDetail) {
    render(currentData);
    if (layoutMode === 'flexible') startFlexibleLayout();
  } else {
    renderHolistic(currentData);
  }

  // 6. Sync UI
  const computedMode = determineCurrentTopoMode();
  updateTopoButtons(computedMode);

  // 7. [UPDATED] SMART CAMERA RESTORE
  // If we are supposed to adjust the view...
  if (doZoom) {
    // Try to restore the last known position for this mode
    const restored = restoreCameraForMode(mode);

    // Only "Zoom to Fit" if we have NEVER visited this mode before in this session
    if (!restored) {
      setTimeout(zoomToFit, 50);
    }
  }
}

// Helper to update global object
function updateSavedPos(id, x, y) {
  if (!savedNodePositions[id]) savedNodePositions[id] = {};
  savedNodePositions[id].x = x;
  savedNodePositions[id].y = y;
  savedNodePositions[id].fx = x; // Pin it
  savedNodePositions[id].fy = y;
}

function renderHolistic(data) {
  if (!data || !data.nodes) return;

  // =========================================================
  // 1. --- NUCLEAR RESET (DESTROY & RECREATE) ---
  // =========================================================
  const surface = document.getElementById("canvas-surface");
  const cvs = document.getElementById("canvas-layer");
  const viewport = document.getElementById("viewport");

  // A. Stop any running simulation immediately
  if (typeof holisticSimulation !== 'undefined' && holisticSimulation) {
    holisticSimulation.stop();
    holisticSimulation = null;
  }

  // B. Hard Reset Containers
  if (surface) {
    surface.style.width = "";
    surface.style.height = "";
    surface.style.transform = "";
  }
  if (cvs) {
    cvs.style.width = "0px";
    cvs.style.height = "0px";
  }
  if (viewport) {
    viewport.style.top = "";
    viewport.style.left = "";
  }

  // C. DESTROY OLD SVG & CREATE FRESH
  // This flexible D3 to calculate dimensions based on the *current* window,
  // not the old 5000px scroll width.
  d3.select("#svg-layer").remove();

  // Re-append a fresh SVG to the canvas-surface
  const svg = d3.select("#canvas-surface")
    .append("svg")
    .attr("id", "svg-layer")
    .style("position", "absolute")
    .style("top", "0")
    .style("left", "0")
    .style("width", "100%")
    .style("height", "100%")
    .style("z-index", "11")
    .style("overflow", "visible"); // Vital for D3 drag

  // Clear HTML Nodes
  document.getElementById("nodes-layer").innerHTML = "";

  // Cleanup Observers
  if (typeof resizeObserver !== 'undefined' && resizeObserver) resizeObserver.disconnect();
  if (typeof isInteractionInit !== 'undefined' && !isInteractionInit) {
    setupCanvasInteraction();
    setupZoomPan();
    isInteractionInit = true;
  }

  // =========================================================
  // 2. --- DELAYED START (ENSURES LAYOUT PAINT) ---
  // =========================================================

  // We use setTimeout(..., 0) to push this to the end of the event loop.
  // This guarantees the browser has finished removing the old SVG
  // and resetting the width before we start calculating positions.
  setTimeout(() => {

    const NODE_R = holisticNodeR;
    const PAD = (typeof UNIFIED_PAD !== 'undefined') ? UNIFIED_PAD : 100;

    // --- Links ---
    const linkMap = {};
    const safelyLinks = globalLinks || [];
    const connectedNodeIds = new Set();
    safelyLinks.forEach(l => {
      const uDev = l.u.split(':')[0];
      const vDev = l.v.split(':')[0];
      connectedNodeIds.add(uDev); connectedNodeIds.add(vDev);
      if (uDev === vDev) return;
      const key = uDev < vDev ? `${uDev}|${vDev}` : `${vDev}|${uDev}`;
      if (!linkMap[key]) linkMap[key] = { source: uDev, target: vDev, count: 0 };
      linkMap[key].count++;
    });
    const linksData = Object.values(linkMap);

    // --- Nodes ---
    let hasSavedData = false;
    const visibleNodeIds = new Set(data.nodes.map(n => n.id));
    // Compute centroid of saved positions — used to seed new/unknown nodes near the
    // existing cluster instead of in a line to the right (which inflates the canvas
    // to linear-view width and triggers the "full canvas" appearance bug).
    let centX = PAD + NODE_R + 50, centY = PAD + NODE_R, centCount = 0;
    if (typeof savedNodePositions !== 'undefined' && savedNodePositions) {
      Object.keys(savedNodePositions).forEach(id => {
        if (visibleNodeIds.has(id)) {
          const pos = savedNodePositions[id];
          if (pos && pos.x && pos.y) {
            hasSavedData = true;
            centX += pos.x; centY += pos.y; centCount++;
          }
        }
      });
      if (centCount > 0) { centX /= centCount; centY /= centCount; }
    }

    const nodesData = data.nodes.map(n => {
      const saved = savedNodePositions[n.id];
      let displayId = n.sheetIndex || "-";
      if (!isNaN(parseInt(displayId))) displayId = String(displayId).padStart(2, '0');
      const isOrphan = !connectedNodeIds.has(n.id);
      let startX, startY;

      if (saved) {
        startX = saved.x;
        startY = saved.y;
      } else {
        // Seed near the cluster centroid with jitter so D3 spreads them into gaps
        // (previously placed at maxSavedX+PAD which inflated canvas to linear width)
        const jitter = () => (Math.random() - 0.5) * NODE_R * 2;
        startX = centX + jitter();
        startY = centY + jitter();
      }

      return {
        id: n.id, type: n.type, ports: n.ports, displayId: displayId, isOrphan: isOrphan,
        labels: n.labels || [], hostname: n.hostname || "", role: n.role || "",
        model: ((deviceMetadata[n.id] || {}).model || '').trim(),
        x: startX, y: startY,
        fx: saved ? saved.x : null, fy: saved ? saved.y : null
      };
    });

    // --- Auto-Shift ---
    if (nodesData.length > 0) {
      let minX = Infinity, minY = Infinity;
      nodesData.forEach(n => {
        if ((n.x - NODE_R) < minX) minX = n.x - NODE_R;
        if ((n.y - NODE_R) < minY) minY = n.y - NODE_R;
      });
      if (minX !== Infinity && (Math.abs(minX - PAD) > 5 || Math.abs(minY - PAD) > 5)) {
        const shiftX = minX - PAD;
        const shiftY = minY - PAD;
        nodesData.forEach(n => {
          n.x -= shiftX; n.y -= shiftY;
          if (n.fx !== null) n.fx -= shiftX;
          if (n.fy !== null) n.fy -= shiftY;
          if (!savedNodePositions[n.id]) savedNodePositions[n.id] = {};
          savedNodePositions[n.id].x = n.x; savedNodePositions[n.id].y = n.y;
        });
      }
    }

    // --- Initial Size ---
    let currentMaxX = 0, currentMaxY = 0;
    nodesData.forEach(n => {
      if (n.x + NODE_R > currentMaxX) currentMaxX = n.x + NODE_R;
      if (n.y + NODE_R > currentMaxY) currentMaxY = n.y + NODE_R;
    });
    let currentW = Math.max(100, currentMaxX + PAD);
    let currentH = Math.max(100, currentMaxY + PAD);

    svg.style("width", currentW + "px").style("height", currentH + "px");
    if (surface) { surface.style.width = currentW + "px"; surface.style.height = currentH + "px"; }

    // --- SIMULATION ---
    const isRestored = nodesData.some(n => n.fx !== null);

    // Tier Y targets: gateway/spine → top, L3 leaf (has IP) → mid, L2 (no IP) → lower, non-arista → bottom
    const getTierY = (d) => {
      if (d.type === 'non-arista') return 900;
      const ports = d.ports || [];
      const hasGateway = ports.some(p => (p.details.ip_type_ || "").toLowerCase().includes("gw"));
      const hasAnyIp = ports.some(p => (p.details.ip_type_ || "").toLowerCase().length > 1);
      if (hasGateway) return 200;
      if (hasAnyIp) return 450;
      return 700;
    };

    holisticSimulation = d3.forceSimulation(nodesData)
      .force("link", d3.forceLink(linksData).id(d => d.id).distance(250))
      .force("charge", d3.forceManyBody().strength(-600))
      .force("collide", d3.forceCollide().radius(NODE_R + 15))
      .force("tier-y", d3.forceY(d => getTierY(d)).strength(0.06));

    // Draw Elements
    // Layer order: group-rects bodies → links (cables) → badges → group-rect-labels → nodes
    const rectGroup = svg.append("g").attr("class", "group-rects");

    const linkGroup = svg.append("g").attr("class", "links");
    const linkLines = linkGroup.selectAll("line").data(linksData).enter().append("line")
      .attr("class", "link-line")
      .attr("stroke", "#64748b")
      .attr("stroke-linecap", "round")
      .attr("stroke-width", d => Math.max(2, Math.min(8, Math.sqrt(d.count) * 2.5)))
      .attr("opacity", 0.85);

    const badgeGroup = svg.append("g").attr("class", "badges");
    const badgeGroups = badgeGroup.selectAll("g").data(linksData).enter().append("g").attr("class", "link-badge-group")
      .on("click", (e, d) => alert(`${d.source.id} ↔ ${d.target.id}\n\n${d.count} Cables connected.`));
    // 1. Draw Rect (Centering adjustment)
    // Move y up by half height (-8) to center the box
    badgeGroups.append("rect")
      .attr("class", "link-badge-text-bg")
      .attr("width", 24)
      .attr("height", 16)
      .attr("x", -12) // Center Horizontally (24/2)
      .attr("y", -8)// Center Vertically (16/2) <--- CRITICAL FIX
      .attr("rx", 4)// Optional: Rounded corners look better
      .attr("fill", "#f1f5f9")
      .attr("stroke", "#cbd5e1");

    // 2. Draw Text (Vertical Middle)
    badgeGroups.append("text")
      .attr("class", "link-badge-text")
      .text(d => d.count)
      .attr("text-anchor", "middle") // Horizontal Center
      .attr("dominant-baseline", "middle") // Vertical Center (The modern SVG way)
      .attr("dy", 1) // Tiny visual tweak if font renders slightly off
      .attr("font-size", "10px")
      .attr("fill", "#334155")
      .attr("font-weight", "bold");

    // Label overlay sits above cables so group labels are never buried under wires
    const labelOverlay = svg.append("g").attr("class", "group-rect-labels");
    renderGroupRectsInto(rectGroup, labelOverlay);

    const nodeGroup = svg.append("g").attr("class", "nodes");

    const dragHandler = d3.drag()
      .on("start", (event, d) => {
        if (!event.active) holisticSimulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
        d3.select("body").style("cursor", "grabbing");
      })
      .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on("end", (event, d) => {
        if (!event.active) holisticSimulation.alphaTarget(0);
        const gridSize = 50;
        d.fx = Math.round(d.fx / gridSize) * gridSize;
        d.fy = Math.round(d.fy / gridSize) * gridSize;
        if (d.fx - NODE_R < PAD) d.fx = PAD + NODE_R;
        if (d.fy - NODE_R < PAD) d.fy = PAD + NODE_R;
        if (!savedNodePositions[d.id]) savedNodePositions[d.id] = {};
        savedNodePositions[d.id] = { x: d.fx, y: d.fy, fx: d.fx, fy: d.fy };
        saveCurrentStateToStorage();
        d3.select("body").style("cursor", "default");
        holisticSimulation.alpha(0.1).restart();
      });

    const nodeNodes = nodeGroup.selectAll("g").data(nodesData).enter().append("g")
      .attr("class", "node-circle").style("pointer-events", "all").call(dragHandler)
      .append("title").text(d => `Col: ${d.displayId}  —  ${d.id}`).select(function() { return this.parentNode; });

    const NODE_COLOR = "#64748b";

    nodeNodes.each(function (d) {
      const el = d3.select(this);
      if (d.type === 'non-arista') el.append("rect").attr("width", 84).attr("height", 84).attr("x", -42).attr("y", -42).attr("rx", 10).attr("fill", "#f1f5f9").attr("stroke", NODE_COLOR).attr("stroke-width", 3).style("filter", "drop-shadow(0 2px 3px rgba(0,0,0,0.1))");
      else el.append("circle").attr("r", NODE_R).attr("fill", "#ffffff").attr("stroke", NODE_COLOR).attr("stroke-width", 3).style("filter", "drop-shadow(0 2px 3px rgba(0,0,0,0.1))");
    });
    nodeNodes.append("text").text(d => `#${d.displayId}`).attr("dy", "-26").attr("text-anchor", "middle").attr("font-size", "11px").attr("font-weight", "800").attr("fill", NODE_COLOR);
    nodeNodes.append("text").attr("dy", "-2").attr("text-anchor", "middle").attr("font-size", "10px").attr("font-weight", "500").attr("fill", "#334155").each(function (d) { const el = d3.select(this); const label = d.hostname || d.id; let p = label.split(/[-_.]/).filter(x => x); if (!p.length) el.append("tspan").text(label); else if (p.length === 1) { let s = p[0]; if (s.length > 10) { let m = Math.floor(s.length / 2); el.append("tspan").attr("x", 0).attr("dy", 0).text(s.substring(0, m) + "-"); el.append("tspan").attr("x", 0).attr("dy", 11).text(s.substring(m)); } else el.append("tspan").attr("x", 0).attr("dy", 4).text(s); } else { let l = ["", "", ""], c = 0; p.forEach(x => { let P = l[c] ? "-" : ""; if ((l[c] + P + x).length <= 9) l[c] += P + x; else { if (c < 2 && l[c]) l[c] += "-"; c++; if (c < 3) l[c] = x; else l[2] = l[2].substring(0, 7) + ".."; } }); if (l[0]) el.append("tspan").attr("x", 0).attr("dy", -2).text(l[0]); if (l[1]) el.append("tspan").attr("x", 0).attr("dy", 11).text(l[1]); if (l[2]) el.append("tspan").attr("x", 0).attr("dy", 11).text(l[2]); } });

    // Device pills below node circle: model first (if set), then role, then labels (dedup)
    // Uniform pill width: sized to the longest pill text across all nodes
    const MODEL_PILL = { bg: '#e0f2fe', text: '#0369a1', border: '#bae6fd' };
    const getPillsForNode = (d) => {
      const role = (d.role || '').toUpperCase();
      const labels = d.labels || [];
      const modelStr = d.model ? (d.model.length > 18 ? d.model.substring(0, 17) + '\u2026' : d.model) : '';
      return [
        ...(modelStr ? [{ lbl: modelStr, isModel: true }] : []),
        ...(role ? [{ lbl: role, isModel: false }] : []),
        ...labels.filter(lbl => lbl.toUpperCase() !== role).map(lbl => ({ lbl, isModel: false }))
      ];
    };
    const maxLabelLen = nodesData.reduce((max, d) =>
      Math.max(max, ...getPillsForNode(d).map(p => p.lbl.length), 0), 0);
    const uniformPillW = Math.max(60, Math.ceil(maxLabelLen * 6) + 10);

    nodeNodes.each(function(d) {
      const pills = getPillsForNode(d);
      if (!pills.length) return;
      const el = d3.select(this);
      pills.forEach(({ lbl, isModel }, i) => {
        const c = isModel ? MODEL_PILL : (ROLE_COLORS[lbl] || { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' });
        const pillH = 16, pillX = -uniformPillW / 2, pillY = NODE_R + 8 + i * 20;
        el.append("rect").attr("x", pillX).attr("y", pillY).attr("width", uniformPillW).attr("height", pillH)
          .attr("rx", 3).attr("fill", c.bg).attr("stroke", c.border).attr("stroke-width", 1);
        el.append("text").attr("x", 0).attr("y", pillY + pillH - 4)
          .attr("text-anchor", "middle").attr("font-size", "10px").attr("font-weight", isModel ? "500" : "700")
          .attr("font-family", "'JetBrains Mono', monospace").attr("fill", c.text).text(lbl);
      });
    });

    // --- Bind Tick ---
    holisticSimulation.on("tick", () => {
      let maxX = 0, maxY = 0;

      nodesData.forEach(d => {
        if (d.x - NODE_R < PAD) d.x = PAD + NODE_R;
        if (d.y - NODE_R < PAD) d.y = PAD + NODE_R;
        if (d.x + NODE_R > maxX) maxX = d.x + NODE_R;
        if (d.y + NODE_R > maxY) maxY = d.y + NODE_R;
      });

      const reqW = Math.max(100, maxX + PAD);
      const reqH = Math.max(100, maxY + PAD);

      if (Math.abs(reqW - currentW) > 5 || Math.abs(reqH - currentH) > 5) {
        currentW = reqW; currentH = reqH;
        surface.style.width = currentW + "px";
        surface.style.height = currentH + "px";
        svg.style("width", currentW + "px").style("height", currentH + "px");
      }

      linkLines.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      badgeGroups.attr("transform", d => `translate(${(d.source.x + d.target.x) / 2},${(d.source.y + d.target.y) / 2})`);
      nodeNodes.attr("transform", d => `translate(${d.x},${d.y})`);

      if (typeof updateCanvasBounds === 'function') updateCanvasBounds();
    });

    // Start simulation.
    // hasNewNodes: some nodes have no saved position (new devices added since last holistic save).
    // When isRestored+hasNewNodes, use gentle alpha to avoid displacing pinned nodes, but
    // still call zoomToFit (with extra delay for gentle settle) so new nodes aren't off-screen.
    const hasNewNodes = nodesData.some(n => n.fx === null);
    if (isRestored && !isFirstLoad) {
      holisticSimulation.alpha(0.3).restart();
      if (hasNewNodes) setTimeout(() => { if (typeof zoomToFit === 'function') zoomToFit(); }, 600);
    } else {
      holisticSimulation.alpha(1).restart();
      setTimeout(() => { if (typeof zoomToFit === 'function') zoomToFit(); }, 300);
    }

  }, 0); // End Timeout
}

// --- STATE MANAGEMENT HELPERS ---

function getStorageKey(mode) {
  // Returns unique keys for each view mode
  return mode === 'detailed' ? 'topology_pos_detailed' : 'topology_pos_holistic';
}

function restoreCameraForMode(mode) {
  // 🛑 FIX: Create independent camera memories for all 3 views
  const keyCamera = mode === 'detailed'
    ? 'camera_state_detailed_' + layoutMode
    : 'camera_state_holistic';

  try {
    const raw = localStorage.getItem(keyCamera);
    if (raw) {
      const cam = JSON.parse(raw);
      // Restore saved state
      panX = cam.x;
      panY = cam.y;
      zoomLevel = cam.z;
      updateTransform(); // Apply immediately
      return true; // Success
    }
  } catch(e) { console.warn("Camera restore failed", e); }

  return false; // No saved state found
}

function saveCurrentStateToStorage() {
  // 🛑 FIX: Create independent camera memories for all 3 views
  const keyCamera = currentViewMode === 'detailed'
    ? 'camera_state_detailed_' + layoutMode
    : 'camera_state_holistic';

  // 1. ALWAYS Save Camera State (regardless of layout mode)
  try {
      localStorage.setItem(keyCamera, JSON.stringify({ x: panX, y: panY, z: zoomLevel }));
  } catch(e) { console.warn("localStorage full", e); }

  // 2. GUARD: Prevent Linear Layout from overwriting custom node positions
  // Linear positions are auto-calculated and should be ephemeral.
  if (currentViewMode === 'detailed' && layoutMode === 'linear') {
      return;
  }

  const keyNodes = getStorageKey(currentViewMode);
  // Merge with existing state so hidden devices keep their positions
  let state = {};
  try { const ex = localStorage.getItem(keyNodes); if (ex) state = JSON.parse(ex); } catch(e) {}
  let hasNodes = false;

  // 3. SAVE NODES
  if (currentViewMode === 'detailed') {
    const nodes = document.querySelectorAll(".node");
    nodes.forEach(el => {
      hasNodes = true;
      const id = el.dataset.id;
      const x = parseFloat(el.style.left);
      const y = parseFloat(el.style.top);

      // We save fx/fy (Fixed positions) to pin the node in D3
      if (!isNaN(x) && !isNaN(y)) {
          state[id] = { x: x, y: y, fx: x, fy: y };
      }
    });
  } else {
    // Holistic (SVG)
    const nodes = document.querySelectorAll(".node-circle");
    nodes.forEach(el => {
      hasNodes = true;
      // D3 data binding
      const d = d3.select(el).datum();
      if (d && d.id) {
          state[d.id] = { x: d.x, y: d.y, fx: d.x, fy: d.y };
      }
    });
  }

  if (hasNodes) {
    localStorage.setItem(keyNodes, JSON.stringify(state));
  }
}

function loadStateFromStorage(mode) {
  const key = getStorageKey(mode);
  const raw = localStorage.getItem(key);
  savedNodePositions = raw ? JSON.parse(raw) : {};
}

function loadGroupRects() {
  try {
    const raw = localStorage.getItem("holistic_group_rects");
    groupRects = raw ? JSON.parse(raw) : [];
  } catch(e) { groupRects = []; }
}

function saveGroupRects() {
  localStorage.setItem("holistic_group_rects", JSON.stringify(groupRects));
}

/**
* Smart Scheduler: Waits for the topology physics to "cool down" and
* become steady before kicking off the background network requests.
*/
function scheduleBackgroundPrefetch() {
  if (prefetchStartTimer) clearTimeout(prefetchStartTimer);

  const checkSteadyState = () => {
    let isMoving = false;

    // Check if Flexible Layout is still actively moving
    if (typeof d3Simulation !== 'undefined' && d3Simulation && d3Simulation.alpha() > 0.1) {
      isMoving = true;
    }
    // Check if Holistic (Simple) Layout is still actively moving
    if (typeof holisticSimulation !== 'undefined' && holisticSimulation && holisticSimulation.alpha() > 0.1) {
      isMoving = true;
    }

    if (isMoving) {
      // Cabling is still settling. Check again in 1 second.
      // console.log("⏳ Waiting for topology layout to stabilize...");
      prefetchStartTimer = setTimeout(checkSteadyState, 1000);
    } else {
      // Setup is completely steady! Start caching.
      startBackgroundPrefetch();
    }
  };

  // Give the initial DOM render a 3-second head start before we even start checking
  prefetchStartTimer = setTimeout(checkSteadyState, 3000);
}

function startBackgroundPrefetch() {
  // 1. Clear any running loops
  stopBackgroundPrefetch();

  // 2. Build the queue: Find all Arista switches not yet in cache
  prefetchQueue = Object.keys(allDevicesData).filter(dev => {
    return allDevicesData[dev].type === 'full' && !configCache[dev];
  });

  prefetchTotal = prefetchQueue.length;

  if (prefetchTotal === 0) return;
  dbg(`Starting background pre-fetch for ${prefetchTotal} devices...`);

  let st = document.getElementById("status");

  // 3. Start a slow loop (1 request every 3 seconds)
  prefetchInterval = setInterval(() => {
    // Stop if queue is empty
    if (prefetchQueue.length === 0) {
      stopBackgroundPrefetch();
      dbg("Background pre-fetching complete.");

      // Show subtle completion message in status bar
      if (st) {
        setStatus("All configs cached locally!", "status-ok");

        // Revert back to Ready after 3 seconds
        setTimeout(() => {
          // Only revert if it hasn't been overwritten by a user click/error
          if (st.innerText.includes("All configs")) {
            setStatus(getReadyStatus());
            // color cleared by setStatus above
          }
        }, 3000);
      }
      return;
    }

    // YIELD TO USER: If the user is currently clicking/hovering, skip this tick
    if (pendingFetches.size > 0) return;

    // Pop the next device from the queue
    const nextDev = prefetchQueue.shift();
    const currentCount = prefetchTotal - prefetchQueue.length;

    // Verify it hasn't been cached manually in the meantime
    if (!configCache[nextDev]) {
      // Update the status bar text dynamically (Non-blocking)
      if (st && !st.innerText.includes("△") && !st.innerText.includes("Error")) {
        setStatus(`🔄 Background caching: ${nextDev} (${currentCount} of ${prefetchTotal})`, 'status-info');
        // status-info color applied via setStatus above
      }

      // Fetch silently
      fetchFullConfig(nextDev);
    }
  }, 3000);
}

function stopBackgroundPrefetch() {
  if (prefetchInterval) clearInterval(prefetchInterval);
  prefetchQueue = [];
  prefetchTotal = 0;
}

// Selective config cache invalidation — called after every fetchData() render.
// Keeps configCache entries for devices whose config-relevant data is unchanged;
// deletes only devices that are new, removed, or have a different fingerprint.
// Falls back to full clear if something unexpected happens.
function _selectiveConfigInvalidate(oldDevs, newDevs) {
  try {
    // Fingerprint: everything that drives getDeviceConfig() output
    function _fp(dev) {
      if (!dev) return '';
      const portSig = (dev.ports || []).map(p => {
        const d = p.details || {};
        return [p.name, p.connected ? 1 : 0,
                d.sp_mode_ || '', d.po_ || '', d.xcvr_speed_ || '',
                d.et_speed_ || '', d.category || ''].join(':');
      }).sort().join('|');
      return [dev.role || '', dev.mlagPeer || '', dev.hostname || '', portSig].join('\x00');
    }

    const invalidate = new Set();

    // Devices removed from topology — evict immediately
    Object.keys(oldDevs).forEach(name => {
      if (!newDevs[name]) delete configCache[name];
    });

    // Devices whose config-relevant fingerprint changed (or are brand-new)
    Object.keys(newDevs).forEach(name => {
      if (_fp(oldDevs[name]) !== _fp(newDevs[name])) invalidate.add(name);
    });

    // Propagate to MLAG peers — peer config references the partner device
    [...invalidate].forEach(name => {
      const oldPeer = (oldDevs[name] || {}).mlagPeer;
      const newPeer = (newDevs[name] || {}).mlagPeer;
      if (oldPeer && newDevs[oldPeer]) invalidate.add(oldPeer);
      if (newPeer && newDevs[newPeer]) invalidate.add(newPeer);
    });

    invalidate.forEach(name => { delete configCache[name]; });
    if (invalidate.size > 0) {
      dbg(`Config cache: invalidated ${invalidate.size} device(s):`, [...invalidate]);
    } else {
      dbg('Config cache: all devices unchanged.');
    }
  } catch (e) {
    // Safety net — full clear on any unexpected error
    console.warn('_selectiveConfigInvalidate failed, falling back to full clear:', e);
    configCache = {};
  }
}

function fetchData(force, autoVerify, silent) {
  if (isFetching) return;
  isFetching = true;
  let isTopologyLoading = true;

  try {
    if (typeof isEditMode !== 'undefined' && isEditMode && !force) {
      isFetching = false;
      alert("Please exit Edit Mode to refresh.");
      return;
    }

    // Reset Tooltips
    let tooltip = document.getElementById("tooltip");
    if (tooltip) {
      tooltip.style.display = "none";
      tooltip.innerHTML = "";
    }
    activeTooltipPortId = null;

    // Reset Status Bar
    let statusEl = document.getElementById("status");
    let btn = document.getElementById("manualRefreshBtn");

    if (btn) { btn.disabled = true; btn.style.cursor = "not-allowed"; }
    _topologyReady = false; // block auto-Bridge until fresh data arrives

    if (!silent && !savedSelectionId && !selectedDeviceId && statusEl) {
      setStatus("🚀 Requesting Topology Data.. no local cache");
      document.getElementById("status").classList.remove("highlighted");
    }

    // Reset all port filters on topology reload to default (all selected)
    if (!silent) {
      topoIpFilter      = ['p2p', 'gw', 'blank'];
      topoIntModeFilter = ['l2-et-access','l2-et-trunk','l2-po-access','l2-po-trunk','l3-et-int','l3-et-sub-int','l3-po-int','l3-po-sub-int'];
      topoSviFilter     = ['active', 'blank'];
      renderIpTypeList();
      renderIntModeList();
      renderSviList();
    }

    // Snapshot current device data for selective config cache invalidation after render.
    // Taken before clearing so we can diff old vs new after the server responds.
    const _prevDevSnap = Object.assign({}, allDevicesData);

    // --- MEMORY CLEANUP ---
    // Skip during silent/verify fetches so the existing topology stays visible while the background call runs
    // configCache is NOT cleared here — _selectiveConfigInvalidate() runs after render() instead.
    // Exception: force=true (manual refresh) clears configCache entirely so fresh configs are fetched.
    if (force) {
      configCache = {};
      dbg('Manual refresh: config cache cleared');
    }
    if (!silent) {
      for (let key in allNodesData) delete allNodesData[key];
      for (let key in allDevicesData) delete allDevicesData[key];
      for (let key in globalPortElements) delete globalPortElements[key];
    }

    // Progress Indicator (Small status bar update)
    let progressTimer = setInterval(() => {
      if (!isTopologyLoading) return;
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(msg => {
          if (isTopologyLoading && statusEl && msg) {
            setStatus(msg);
          }
        }).getProgressStatus();
      }
    }, 1000);

    // 🛑 FIX: Use correct ID matching your HTML
    let colorChk = document.getElementById("chkApplyFormatting") || document.getElementById("chkColor");
    let isColorEnabled = colorChk ? colorChk.checked : true;

    // --- CALL SERVER ---
    google.script.run.withSuccessHandler(function (data) {
      // 🛑 FIX: STOP LOADING SPINNER
      hideGlobalLoading();

      isTopologyLoading = false;
      clearInterval(progressTimer);

      isFetching = false;

      // Update Version
      if (data.version) localDataVersion = data.version;

      // Save Cache
      try {
        sessionStorage.setItem('topology_data_cache', JSON.stringify(data));
      } catch (e) {
        console.warn("Session Storage Full or Disabled", e);
      }

      dbg("Topology Data Received:", data);
      if (btn) { btn.disabled = false; btn.style.cursor = "pointer"; }

      if (data.error) {
        setStatus("Error: " + data.error, "status-error");
        return;
      }

      if (!data.nodes || !data.links) {
        setStatus("Error: Invalid topology data received.", "status-error");
        console.error("fetchData: Missing nodes or links in server response.", data);
        return;
      }

      // Populate Globals
      if (data.dropdowns) globalDropdowns = data.dropdowns;
      if (data.deviceNames) globalDeviceNames = data.deviceNames;
      if (data.schema) globalSchema = data.schema;
      if (data.links) globalLinks = data.links;
      if (data.portFrequency) globalPortFrequency = data.portFrequency;
      if (data.snakeTrafficFlags) _snakeTrafficFlags = data.snakeTrafficFlags;
      currentData = data;

      // Pre-load device metadata so topology card model lines are populated before bridge runs
      google.script.run
        .withSuccessHandler(meta => {
          if (meta) {
            Object.assign(deviceMetadata, meta);
            _refreshModelLines();
            // Re-render holistic pills — deviceMetadata was empty when renderHolistic first ran
            // (getDeviceMetadata is async so it resolves after the initial render completes)
            if (currentViewMode === 'holistic' && currentData) renderHolistic(currentData);
          }
        })
        .withFailureHandler(() => {})
        .getDeviceMetadata();

      // Sync device manager if it's open and has no pending edits
      silentRefreshDeviceManager();

      // Clear stale audit badge on fresh data load
      const auditBadge = document.getElementById("auditBadge");
      if (auditBadge) auditBadge.classList.add("hidden");

      // [CRITICAL] VIEW PRESERVATION
      // Note: loadStateFromStorage is called inside toggleViewMode — no need to call it here.
      // Run render FIRST — runValidation() inside render() may write "Audit Clean." to status
      if (typeof toggleViewMode === 'function') {
        toggleViewMode(currentViewMode, false);
      } else {
        render(data);
      }

      // Set status AFTER render so it overwrites anything runValidation() wrote
      if (statusEl) {
        if (data.fromCache) {
          // Cache hit: always show cache message (overrides "Audit Clean.")
          setStatus(autoVerify ? "⚡ Loaded from cache — verifying..." : "⚡ Loaded from cache");
        } else if (!isValidationMode) {
          // Fresh fetch, audit mode off: show ready status, or pending non-Arista notice
          if (_nonAristaSyncNotice && _nonAristaSyncNotice.length > 0) {
            setStatus(`ℹ ${_nonAristaSyncNotice.join(', ')}: IXIA/SPIRENT role set — run Force Sync to collapse to 1 column`);
            _nonAristaSyncNotice = null;
          } else {
            setStatus(getReadyStatus());
          }
        }
        // Fresh fetch + audit mode on: leave "Audit Clean." that runValidation() wrote
      }

      isFirstLoad = false;

      // Restore Filters
      let searchInp = document.getElementById("searchInp");
      if (searchInp && searchInp.value && typeof debouncedFilterTopology === 'function') {
        debouncedFilterTopology();
      }

      let vlanVal = document.getElementById("vlanTraceInp");
      if (vlanVal && vlanVal.value && typeof traceVlan === 'function') {
        traceVlan();
      }

      // Selective config cache invalidation — preserve cache for unchanged devices,
      // delete only devices whose config-relevant data changed since last render.
      _selectiveConfigInvalidate(_prevDevSnap, allDevicesData);

      // Auto-verify: if this render came from GAS cache, fire a forced refresh
      // to confirm cache == actual sheet state. Runs after render so UI is instant.
      if (data.fromCache && autoVerify) {
        fetchData(true, false, true); // silent=true keeps "⚡ Loaded from cache — verifying..." visible
        return;
      }

      // --- START BACKGROUND FETCH ---
      // Uses the smart scheduler to wait until physics settle before fetching
      if (typeof scheduleBackgroundPrefetch === 'function') {
        scheduleBackgroundPrefetch();
      }

      // Auto bridge health check after topology loads (if integration enabled).
      // If bridge is already confirmed up, also run Bridge check immediately (topology just refreshed).
      // If bridge state is unknown, _silentBridgeCheck will trigger Bridge check on fresh connect via transition.
      _topologyReady = true; // topology is fully loaded — auto-LLDP may now proceed
      _silentBridgeCheck();
      // Only run Bridge on fetchData if cabling changed (or never run before).
      // Bridge up→down→up transition fires unconditionally (fresh connect path in _updateBridgeToolbarIcon).
      if (_bridgeUpState && _getLinkSig() !== _lastBridgeLinkSig) _autoRunBridge();

    }).withFailureHandler(function (err) {
      hideGlobalLoading();
      isFetching = false;
      isTopologyLoading = false;
      clearInterval(progressTimer);
      if (btn) { btn.disabled = false; btn.style.cursor = "pointer"; }
      setStatus("Server Error: " + err.message, "status-error");
    }).getTopologyData(force, isColorEnabled);

  } catch (e) {
    hideGlobalLoading();
    isFetching = false;
    let st = document.getElementById("status");
    setStatus("Init Error: " + e.message, "status-error");
  }
}

function downloadBridgeScript() {
  const src = `#!/usr/bin/env python3
"""
TopoAssist Device Bridge
========================
Local HTTP server that bridges the TopoAssist sidebar to lab devices.
Runs on http://localhost:8765 -- no SSL cert needed (localhost is exempt from
browser mixed-content policy when called from HTTPS pages).

Usage:
    python3 device_bridge.py

Keep this terminal open while using Device Bridge in the sidebar.
Ctrl+C to stop.

Transport options (set METHOD below):
  ssh   -- SSH via jump host or direct (default; stdlib only)
  eapi  -- Arista eAPI JSON-RPC over HTTPS (stdlib only)
  rest  -- RESTCONF over HTTPS, OpenConfig YANG (stdlib only; EOS 4.22+)
  gnmi  -- gRPC/gNMI, OpenConfig YANG (requires: pip install pygnmi; EOS 4.22+)

Endpoints:
  GET  /health      -> {"status":"ok","version":"2.11","port":8765}
  POST /lldp        -> {ipMap} -> per-device LLDP neighbors
  POST /devstatus   -> {ipMap} -> per-device EOS version, platform, interface op-status
  POST /pushconfig  -> {ipMap: {dev:{ip,config}}} -> per-device push result + session diff
"""

from http.server import HTTPServer, BaseHTTPRequestHandler
import subprocess, json, threading, sys, urllib.request, ssl, base64, time, os, re

VERSION = "260421.2"
PORT    = 8765
TIMEOUT = 15  # seconds per device

# -- Active transport -----------------------------------------------------------
METHOD = "ssh"      # ssh | eapi | rest | gnmi

# -- SSH config (METHOD = "ssh") -----------------------------------------------
SSH_USER  = os.environ.get("BRIDGE_SSH_USER",  "admin")     # override: export BRIDGE_SSH_USER=myuser
JUMP_HOST = os.environ.get("BRIDGE_JUMP_HOST", "bus-home")  # override: export BRIDGE_JUMP_HOST=""

# -- eAPI config (METHOD = "eapi") ---------------------------------------------
EAPI_USER = "admin"
EAPI_PASS = ""
EAPI_PORT = 443

# -- RESTCONF config (METHOD = "rest") -----------------------------------------
REST_USER = "admin"
REST_PASS = ""
REST_PORT = 443

# -- gNMI config (METHOD = "gnmi") ---------------------------------------------
GNMI_USER = "admin"
GNMI_PASS = ""
GNMI_PORT = 6030

# -- Concurrency cap for bulk SSH operations ------------------------------------
MAX_WORKERS = 10   # max concurrent SSH sessions for /lldp, /devstatus, /pushconfig

# -- Optional gNMI import ------------------------------------------------------
try:
    from pygnmi.client import gNMIclient
    HAS_GNMI = True
except ImportError:
    HAS_GNMI = False

# -- Shared SSL context (eAPI + REST) ------------------------------------------
_SSL_CTX = ssl.create_default_context()
_SSL_CTX.check_hostname = False
_SSL_CTX.verify_mode    = ssl.CERT_NONE


# -- OpenConfig -> EOS format normalizers (used by rest + gnmi) ----------------

def _oc_lldp_to_eos(raw):
    neighbors = {}
    root = raw.get("openconfig-lldp:lldp", raw)
    for iface in root.get("interfaces", {}).get("interface", []):
        name = iface.get("name", "")
        nbrs = iface.get("neighbors", {}).get("neighbor", [])
        if not nbrs:
            continue
        state = nbrs[0].get("state", {})
        neighbors[name] = {"bridgeNeighborInfo": [{
            "systemName": state.get("system-name", ""),
            "neighborInterfaceInfo": {"interfaceId_v2": state.get("port-id", "")},
        }]}
    return neighbors

def _oc_version(raw):
    for comp in raw.get("openconfig-platform:components", raw).get("component", []):
        ver = comp.get("state", {}).get("software-version", "")
        if ver:
            return ver.split(" (")[0].strip()
    return ""

def _oc_platform(raw):
    for comp in raw.get("openconfig-platform:components", raw).get("component", []):
        if "CHASSIS" in comp.get("state", {}).get("type", ""):
            return comp["state"].get("description", "").lstrip("DCS-")
    return ""

def _oc_iface_status(raw):
    oc_map = {"UP": "connected", "DOWN": "notconnect", "LOWER_LAYER_DOWN": "notconnect"}
    return {
        iface.get("name", ""): {"linkStatus": oc_map.get(iface.get("state", {}).get("oper-status", ""), "notconnect")}
        for iface in raw.get("openconfig-interfaces:interfaces", raw).get("interface", [])
    }

def _gnmi_val(response):
    try:
        return response["notification"][0]["update"][0]["val"]
    except (KeyError, IndexError, TypeError):
        return {}


def _parse_internal_vlans(ivlans):
    """Parse 'show vlan internal usage' JSON response into a sorted int list.

    EOS returns: {"internalVlans": {"1025": "Ethernet1", "1026": "Ethernet2", ...}}
    Returns [] when the response is empty, None (command failed), or the key is absent.
    """
    if not ivlans:
        return []
    return sorted(int(vid) for vid in ivlans.get("internalVlans", {}).keys())


def _build_devstatus_ssh(ver, ifs, ivlans):
    """Build devstatus response dict from raw _run_cmds results (any may be None on failure).

    Each argument corresponds to one SSH/eAPI command result:
      ver    — 'show version'              (None if command failed)
      ifs    — 'show interfaces status'    (None if command failed)
      ivlans — 'show vlan internal usage'  (None if command failed)

    A failed command contributes empty data but never causes ok:False — the
    other commands' data is still returned intact.
    """
    ver = ver or {}
    ifs = ifs or {}
    raw_ver = ver.get("version", "")
    if raw_ver.startswith("Software image version: "):
        raw_ver = raw_ver[len("Software image version: "):]
    raw_ver = raw_ver.split(" (")[0].strip()
    return {
        "ok":          True,
        "hostname":    ver.get("hostname", ""),
        "version":     raw_ver,
        "platform":    ver.get("modelName", "").lstrip("DCS-"),
        "bridgeMac":   ver.get("systemMacAddress", ""),
        "interfaces":  {
            k: {"linkStatus": v.get("linkStatus", "")}
            for k, v in ifs.get("interfaceStatuses", {}).items()
        },
        "internalVlans": _parse_internal_vlans(ivlans),
    }


def _extract_session_diff(output):
    """Extract 'show session-config diffs' text from raw SSH stdout.
    EOS diff format:
      --- system:/running-config
      +++ session:/topoassist-session-config
      interface Ethernet1/1
      +   description foo
    No @@ hunk headers. Echoed commit/abort appears as 'Prompt#commit' -- stop there."""
    lines   = output.split("\\n")
    diff    = []
    started = False
    for line in lines:
        s = line.rstrip()
        if not started:
            if s.startswith("--- ") or s.startswith("+++ "):
                started = True
                diff.append(s)
        else:
            if "#commit" in s or "#abort" in s:
                break
            diff.append(s)
    return "\\n".join(diff).strip()


# -- Section-level cleaners for idempotent push --------------------------------

_SECTION_CLEANERS = [
    (re.compile(r'^interface\s+((?:Ethernet|Et)\S+)$', re.I),   'default interface {0}'),
    (re.compile(r'^interface\s+((?:Port-Channel|Po)\d+\S*)$', re.I), 'default interface {0}'),
    (re.compile(r'^interface\s+(Loopback\d+)$', re.I),          'default interface {0}'),
    (re.compile(r'^interface\s+(Vxlan\d+)$', re.I),             'default interface {0}'),
    (re.compile(r'^interface\s+(Vlan\d+)$', re.I),              'default interface {0}'),
    (re.compile(r'^router\s+bgp\s+(\d+)$', re.I),              'no router bgp {0}'),
    (re.compile(r'^router\s+ospf\s+\d+$', re.I),               'no router ospf 1'),
    (re.compile(r'^mlag\s+configuration$', re.I),               'no mlag configuration'),
]

_MGMT_IFACE_RE = re.compile(r'^interface\s+(?:Ma|Management)\d+', re.I)


def _prepend_section_cleaners(config_text):
    """Prepend section-level cleanup commands before each major EOS config section.
    Ensures idempotent push: stale BGP neighbors, interface IPs, OSPF areas, etc.
    are wiped before new config is applied. Management interfaces are never touched."""
    out = []
    for line in config_text.split("\\n"):
        s = line.strip()
        if _MGMT_IFACE_RE.match(s):
            out.append(line)
            continue
        for pattern, fmt in _SECTION_CLEANERS:
            m = pattern.match(s)
            if m:
                grp = m.group(1) if m.lastindex else None
                out.append(fmt.format(grp) if grp else fmt)
                break
        out.append(line)
    return "\\n".join(out)


# -- Bridge HTTP handler --------------------------------------------------------

class BridgeHandler(BaseHTTPRequestHandler):

    def _cors(self):
        self.send_header("Access-Control-Allow-Origin",  "*")
        self.send_header("Access-Control-Allow-Headers", "Content-Type")
        self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")

    def do_OPTIONS(self):
        self.send_response(204); self._cors(); self.end_headers()

    def do_GET(self):
        if self.path == "/health":
            self._json(200, {"status": "ok", "version": VERSION, "port": PORT, "method": METHOD})
        else:
            self._json(404, {"error": "not found"})

    def do_POST(self):
        if self.path not in ("/lldp", "/devstatus", "/pushconfig"):
            self._json(404, {"error": "not found"}); return
        try:
            length = int(self.headers.get("Content-Length", 0))
            body   = json.loads(self.rfile.read(length))
        except Exception:
            self._json(400, {"error": "invalid JSON body"}); return
        ip_map  = body.get("ipMap", {})
        dry_run = bool(body.get("dry_run", False))
        if self.path == "/lldp":
            self._json(200, self._run_parallel(ip_map, self._check_lldp))
        elif self.path == "/devstatus":
            self._json(200, self._run_parallel(ip_map, self._check_devstatus))
        else:
            results = {}
            lock    = threading.Lock()
            sem     = threading.Semaphore(MAX_WORKERS)
            def run_push(dev, entry):
                ip     = (entry.get("ip") or "").strip()
                config = entry.get("config", "")
                if not ip:
                    with lock: results[dev] = {"ok": False, "error": "No IP configured"}; return
                with sem:
                    try:
                        with lock: results[dev] = self._push_config(ip, config, dry_run=dry_run)
                    except subprocess.TimeoutExpired:
                        with lock: results[dev] = {"ok": False, "error": f"Timeout -- {ip} unreachable?"}
                    except NotImplementedError as e:
                        with lock: results[dev] = {"ok": False, "error": str(e)}
                    except Exception as e:
                        with lock: results[dev] = {"ok": False, "error": str(e)[:120]}
            threads = [threading.Thread(target=run_push, args=(d, v), daemon=True) for d, v in ip_map.items()]
            for t in threads: t.start()
            for t in threads: t.join(timeout=TIMEOUT + 3)
            self._json(200, results)

    # -- Transports ------------------------------------------------------------
    def _ssh_cmds(self, ip, *cmds):
        results = [None] * len(cmds)
        def fetch(i, cmd):
            eos_cmd  = f'{cmd} | json'
            remote   = f'sshpass -p "" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 {SSH_USER}@{ip} "{eos_cmd}"'
            exec_cmd = ["ssh", JUMP_HOST, remote] if JUMP_HOST else [
                "sshpass", "-p", "", "ssh", "-o", "StrictHostKeyChecking=no",
                "-o", "PasswordAuthentication=yes", "-o", "PubkeyAuthentication=no",
                "-o", "ConnectTimeout=8", f"{SSH_USER}@{ip}", eos_cmd,
            ]
            results[i] = json.loads(subprocess.check_output(exec_cmd, timeout=TIMEOUT, text=True, stderr=subprocess.DEVNULL))
        if len(cmds) == 1:
            fetch(0, cmds[0])
        else:
            ts = [threading.Thread(target=fetch, args=(i, c)) for i, c in enumerate(cmds)]
            for t in ts: t.start()
            for t in ts: t.join(timeout=TIMEOUT)
        return results

    def _eapi_cmds(self, ip, *cmds):
        url     = f"https://{ip}:{EAPI_PORT}/command-api"
        payload = json.dumps({"jsonrpc":"2.0","method":"runCmds","params":{"version":1,"cmds":list(cmds),"format":"json"},"id":1}).encode()
        creds   = base64.b64encode(f"{EAPI_USER}:{EAPI_PASS}".encode()).decode()
        req     = urllib.request.Request(url, data=payload, headers={"Content-Type":"application/json","Authorization":f"Basic {creds}"})
        with urllib.request.urlopen(req, timeout=TIMEOUT, context=_SSL_CTX) as r:
            resp = json.loads(r.read())
        if "error" in resp:
            raise RuntimeError(resp["error"].get("message", "eAPI error"))
        return resp["result"]

    def _eapi_push(self, ip, *cmds):
        url     = f"https://{ip}:{EAPI_PORT}/command-api"
        payload = json.dumps({"jsonrpc":"2.0","method":"runCmds","params":{"version":1,"cmds":list(cmds),"format":"text"},"id":1}).encode()
        creds   = base64.b64encode(f"{EAPI_USER}:{EAPI_PASS}".encode()).decode()
        req     = urllib.request.Request(url, data=payload, headers={"Content-Type":"application/json","Authorization":f"Basic {creds}"})
        with urllib.request.urlopen(req, timeout=TIMEOUT, context=_SSL_CTX) as r:
            resp = json.loads(r.read())
        if "error" in resp:
            raise RuntimeError(resp["error"].get("message", "eAPI error"))
        return [r.get("output", "") if isinstance(r, dict) else str(r) for r in resp["result"]]

    def _ssh_stdin(self, ip, *cmds):
        stdin_text = "\\n".join(cmds) + "\\n"
        if JUMP_HOST:
            b64    = base64.b64encode(stdin_text.encode()).decode()
            inner  = (f'sshpass -p "" ssh -o StrictHostKeyChecking=no'
                      f' -o PasswordAuthentication=yes -o PubkeyAuthentication=no'
                      f' -o ConnectTimeout=8 {SSH_USER}@{ip}')
            remote = f"echo '{b64}' | base64 -d | {inner}"
            proc   = subprocess.Popen(["ssh", JUMP_HOST, remote], stdout=subprocess.PIPE, stderr=subprocess.PIPE)
            out, err = proc.communicate(timeout=TIMEOUT)
        else:
            proc = subprocess.Popen(
                ["sshpass", "-p", "", "ssh", "-o", "StrictHostKeyChecking=no",
                 "-o", "PasswordAuthentication=yes", "-o", "PubkeyAuthentication=no",
                 "-o", "ConnectTimeout=8", f"{SSH_USER}@{ip}"],
                stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
            out, err = proc.communicate(stdin_text.encode(), timeout=TIMEOUT)
        return out.decode("utf-8", errors="replace"), err.decode("utf-8", errors="replace")

    def _abort_stale_sessions(self, ip):
        if METHOD not in ("ssh", "eapi"):
            return []
        if METHOD == "ssh":
            raw, _ = self._ssh_stdin(ip, "terminal length 0", "show configuration sessions")
        else:
            raw = self._eapi_push(ip, "show configuration sessions")[0]
        stale = []
        for line in raw.splitlines():
            parts = line.split()
            if len(parts) >= 2 and parts[0].startswith("topoassist_") and "pending" in line.lower():
                stale.append(parts[0])
        if not stale:
            return []
        abort_cmds = []
        for name in stale:
            abort_cmds += [f"configure session {name}", "abort"]
        if METHOD == "ssh":
            self._ssh_stdin(ip, *abort_cmds)
        else:
            self._eapi_push(ip, *abort_cmds)
        return stale

    def _push_config(self, ip, config_text, dry_run=False):
        cleaned = _prepend_section_cleaners(config_text)
        lines = [l for l in cleaned.strip().split("\\n") if l.strip()]
        if not lines:
            raise RuntimeError("Config is empty -- nothing to push")
        try:
            self._abort_stale_sessions(ip)
        except Exception:
            pass
        session   = f"topoassist_{int(time.time())}"
        final_cmd = "abort" if dry_run else "commit"
        # 'end' exits from any sub-mode to exec mode; re-entering puts us at session
        # root where show/commit/abort work. 'top' was replaced -- it did not reliably
        # navigate to session root, leaving sessions stuck as pending.
        core_cmds = (
            [f"configure session {session}"]
            + lines
            + ["end", f"configure session {session}", "show session-config diffs", final_cmd]
        )
        if METHOD == "eapi":
            results = self._eapi_push(ip, *core_cmds)
            diff = results[-2].strip() if len(results) >= 2 else ""
            return {"ok": True, "diff": diff, "dry_run": dry_run}
        if METHOD == "ssh":
            output, err_text = self._ssh_stdin(ip, "terminal length 0", *core_cmds)
            _auth_errs = ("permission denied", "authentication failed",
                          "no route to host", "connection refused",
                          "connection timed out", "host key verification failed")
            if not output.strip() and any(k in err_text.lower() for k in _auth_errs):
                raise RuntimeError(f"SSH failed: {err_text.strip()[:120]}")
            if "maximum number of pending sessions" in output.lower():
                raise RuntimeError(
                    "EOS pending session limit reached -- Device Bridge will auto-clean "
                    "on next push; or manually run: configure session <name> / abort")
            diff = _extract_session_diff(output)
            if not diff:
                eos_errs = [l.strip() for l in output.split("\\n") if l.strip().startswith("%")]
                if eos_errs:
                    raise RuntimeError(f"Config session error: {eos_errs[0][:120]}")
            return {"ok": True, "diff": diff, "dry_run": dry_run}
        raise NotImplementedError(f"Config push not supported for METHOD={METHOD!r} -- use ssh or eapi")

    def _rest_get(self, ip, path):
        url   = f"https://{ip}:{REST_PORT}/restconf/data/{path}"
        creds = base64.b64encode(f"{REST_USER}:{REST_PASS}".encode()).decode()
        req   = urllib.request.Request(url, headers={"Accept":"application/yang-data+json","Authorization":f"Basic {creds}"})
        with urllib.request.urlopen(req, timeout=TIMEOUT, context=_SSL_CTX) as r:
            return json.loads(r.read())

    def _gnmi_get(self, ip, *paths):
        if not HAS_GNMI:
            raise RuntimeError("gNMI requires: pip install pygnmi")
        with gNMIclient(target=(ip, GNMI_PORT), username=GNMI_USER, password=GNMI_PASS, insecure=True) as gc:
            return [gc.get(path=[p]) for p in paths]

    def _run_cmds(self, ip, *cmds):
        if METHOD == "ssh":  return self._ssh_cmds(ip, *cmds)
        if METHOD == "eapi": return self._eapi_cmds(ip, *cmds)
        raise NotImplementedError(f"_run_cmds not supported for METHOD={METHOD!r}")

    # -- Per-device checks -----------------------------------------------------
    def _check_lldp(self, ip):
        if METHOD in ("ssh", "eapi"):
            data = self._run_cmds(ip, "show lldp neighbors detail")[0]
            return {"ok": True, "neighbors": data.get("lldpNeighbors", {})}
        if METHOD == "rest":
            return {"ok": True, "neighbors": _oc_lldp_to_eos(self._rest_get(ip, "openconfig-lldp:lldp/interfaces"))}
        if METHOD == "gnmi":
            return {"ok": True, "neighbors": _oc_lldp_to_eos(_gnmi_val(self._gnmi_get(ip, "openconfig-lldp:lldp")[0]))}
        raise RuntimeError(f"Unknown METHOD: {METHOD!r}")

    def _check_devstatus(self, ip):
        if METHOD in ("ssh", "eapi"):
            ver, ifs, ivlans = self._run_cmds(
                ip, "show version", "show interfaces status", "show vlan internal usage"
            )
            return _build_devstatus_ssh(ver, ifs, ivlans)
        if METHOD == "rest":
            plat  = self._rest_get(ip, "openconfig-platform:components")
            iface = self._rest_get(ip, "openconfig-interfaces:interfaces")
            return {"ok": True, "version": _oc_version(plat), "platform": _oc_platform(plat), "interfaces": _oc_iface_status(iface)}
        if METHOD == "gnmi":
            plat_r, iface_r = self._gnmi_get(ip, "openconfig-platform:components", "openconfig-interfaces:interfaces")
            plat = _gnmi_val(plat_r); iface = _gnmi_val(iface_r)
            return {"ok": True, "version": _oc_version(plat), "platform": _oc_platform(plat), "interfaces": _oc_iface_status(iface)}
        raise RuntimeError(f"Unknown METHOD: {METHOD!r}")

    # -- Parallel runner -------------------------------------------------------
    def _run_parallel(self, ip_map, check_fn):
        results = {}
        lock    = threading.Lock()
        sem     = threading.Semaphore(MAX_WORKERS)
        def run(dev, ip):
            ip = (ip or "").strip()
            if not ip:
                with lock: results[dev] = {"ok": False, "error": "No IP configured"}; return
            with sem:
                try:
                    with lock: results[dev] = check_fn(ip)
                except subprocess.TimeoutExpired:
                    with lock: results[dev] = {"ok": False, "error": f"Timeout -- {ip} unreachable?"}
                except subprocess.CalledProcessError:
                    with lock: results[dev] = {"ok": False, "error": f"SSH failed -- check admin access on {ip}"}
                except json.JSONDecodeError:
                    with lock: results[dev] = {"ok": False, "error": "Device returned invalid JSON"}
                except FileNotFoundError:
                    with lock: results[dev] = {"ok": False, "error": "ssh not found -- is OpenSSH installed?"}
                except Exception as e:
                    with lock: results[dev] = {"ok": False, "error": str(e)[:120]}
        threads = [threading.Thread(target=run, args=(d, i), daemon=True) for d, i in ip_map.items()]
        for t in threads: t.start()
        for t in threads: t.join(timeout=TIMEOUT + 3)
        return results

    def _json(self, code, data):
        body = json.dumps(data).encode()
        self.send_response(code)
        self.send_header("Content-Type",   "application/json")
        self.send_header("Content-Length", str(len(body)))
        self._cors(); self.end_headers(); self.wfile.write(body)

function openBridgeModal() {
  const modal = document.getElementById('bridgeModal');
  // Restore last dragged position (default: top-right via CSS)
  try {
    const savedPos = JSON.parse(localStorage.getItem('bridgeModalPos') || 'null');
    if (savedPos && typeof savedPos.left === 'string' && typeof savedPos.top === 'string' &&
        parseFloat(savedPos.left) >= 0 && parseFloat(savedPos.top) >= 0) {
      modal.style.left = savedPos.left; modal.style.top = savedPos.top;
      modal.style.right = 'auto'; modal.style.transform = 'none';
    }
  } catch (e) { localStorage.removeItem('bridgeModalPos'); }
  modal.style.display = 'flex';
  _setBridgeOrphanBadge(0); // clear orphan badge when user opens modal
  // No editOverlay — floating modal does not block background
  document.getElementById('bridgeResults').style.display = 'none';
  document.getElementById('bridgeRunStatus').style.display = 'none';
  document.getElementById('btnRunBridge').disabled = true;
  const chk = document.getElementById('chkBridgeAuditMissing');
  if (chk) chk.checked = bridgeAuditFlagMissing;
  _syncBridgeEnableCheckbox();
  _populateLldpDevTable();
  _checkBridgeHealth();
}

function toggleBridgeAuditMissing(val) {
  bridgeAuditFlagMissing = val;
  localStorage.setItem('bridgeAuditFlagMissing', val);
  applyLldpIndicators();          // recolor missing dots: gray ↔ red
  if (isValidationMode) runValidation();
}

function _checkBridgeHealth() {
  const dot  = document.getElementById('bridgeDot');
  const msg  = document.getElementById('bridgeMsg');
  const cmd  = document.getElementById('bridgeCmd');
  const btn  = document.getElementById('btnRunBridge');
  dot.className = 'bridge-dev-dot';
  msg.textContent = 'Checking…';
  fetch(BRIDGE_URL + '/health', { method: 'GET' })
    .then(r => r.json())
    .then(data => {
      if (data.status === 'ok') {
        dot.className = 'bridge-dev-dot dot-green';
        msg.textContent = 'Running on port ' + (data.port || 8765);
        cmd.style.display = 'none';
        btn.disabled = false;
        if (data.timeout) _bridgeDeviceTimeout = data.timeout;
        _updateBridgeToolbarIcon('up');
      } else {
        throw new Error('unexpected response');
      }
    })
    .catch(() => {
      dot.className = 'bridge-dev-dot dot-red';
      msg.textContent = 'Not running';
      cmd.style.display = 'block';
      btn.disabled = true;
      _updateBridgeToolbarIcon('down');
    });
}

function closeBridgeModal() {
  document.getElementById('bridgeModal').style.display = 'none';
  // No editOverlay to hide — floating modal
}

// ── Bridge toolbar icon single/double-click handler ──────────────────────────
// Single-click (>220ms) = open modal. Double-click (<220ms) = toggle enable.
function onBridgeIconClick() {
  if (_bridgeClickTimer) {
    clearTimeout(_bridgeClickTimer);
    _bridgeClickTimer = null;
    toggleBridgeEnabled();
  } else {
    _bridgeClickTimer = setTimeout(() => {
      _bridgeClickTimer = null;
      openBridgeModal();
    }, 220);
  }
}

function toggleBridgeEnabled() {
  const nowEnabled = localStorage.getItem('bridgeEnabled') === 'false'; // was disabled → enable
  localStorage.setItem('bridgeEnabled', nowEnabled ? 'true' : 'false');
  _syncBridgeEnableCheckbox();
  _updateBridgeToolbarIcon('idle');
  if (nowEnabled) _silentBridgeCheck();
}

function setBridgeEnabled(val) {
  localStorage.setItem('bridgeEnabled', val ? 'true' : 'false');
  _updateBridgeToolbarIcon('idle');
  if (val) _silentBridgeCheck();
}

function _syncBridgeEnableCheckbox() {
  const chk = document.getElementById('chkBridgeEnabled');
  if (chk) chk.checked = localStorage.getItem('bridgeEnabled') !== 'false';
}

// Silent health check — only updates toolbar icon, does not touch modal DOM.
// Debounced: multiple rapid calls collapse into one check after 400 ms.
function _silentBridgeCheck() {
  if (_silentBridgeTimer) { clearTimeout(_silentBridgeTimer); }
  _silentBridgeTimer = setTimeout(() => {
    _silentBridgeTimer = null;
    if (localStorage.getItem('bridgeEnabled') === 'false') return;
    fetch(BRIDGE_URL + '/health', { method: 'GET' })
      .then(r => r.json())
      .then(data => { if (data.timeout) _bridgeDeviceTimeout = data.timeout; _updateBridgeToolbarIcon(data.status === 'ok' ? 'up' : 'down'); })
      .catch(()  => _updateBridgeToolbarIcon('down'));
  }, 400);
}

// Show/hide amber orphan count badge on the bridge toolbar icon.
// Call with n>0 to show, 0 to clear (e.g. on modal open).
function _setBridgeOrphanBadge(n) {
  const el = document.getElementById('bridgeOrphanBadge');
  if (!el) return;
  if (n > 0) { el.textContent = n; el.classList.remove('hidden'); }
  else        { el.classList.add('hidden'); }
}

// Update toolbar bridge icon color based on enabled state + health.
// state: 'up' (green), 'down' (yellow), 'idle' (enabled, state unknown = normal color)
function _updateBridgeToolbarIcon(state) {
  const btn = document.getElementById('btnBridgeToolbar');
  if (!btn) return;
  const enabled = localStorage.getItem('bridgeEnabled') !== 'false';
  btn.classList.remove('bridge-up', 'bridge-down', 'bridge-disabled');
  if (!enabled)              btn.classList.add('bridge-disabled');
  else if (state === 'up')   btn.classList.add('bridge-up');
  else if (state === 'down') btn.classList.add('bridge-down');
  // 'idle' = enabled but health unknown — no class (normal toolbar color)

  // Auto-Bridge: trigger only on fresh connect (down/idle → up transition)
  const wasUp = _bridgeUpState;
  _bridgeUpState = (enabled && state === 'up');
  if (!wasUp && _bridgeUpState) _autoRunBridge();
}

// Returns a stable string fingerprint of current cabling (sorted link ids).
// Used to detect cabling changes between fetchData calls; config-only changes don't affect links.
function _getLinkSig() {
  return globalLinks.map(l => l.id || `${l.u}:${l.v}`).sort().join('|');
}

// Silent auto-Bridge run on fresh bridge connect or cabling change.
// IP resolution: Ma0/Management0 from sheet → bridge modal input → device name as DNS hostname.
// Fires only after fetchData() sets _topologyReady=true; never on stale session-restored data.
function _autoRunBridge() {
  if (!_topologyReady || !currentData || !currentData.nodes) {
    dbg('Auto-Bridge: skipped — topology not ready yet');
    return;
  }
  const autoIps = _getLldpMgmtIps();
  dbg('Auto-Bridge: triggered — running LLDP + device status check');
  const st  = document.getElementById('status');
  const btn = document.getElementById('btnBridgeToolbar');
  setStatus('Running Bridge check\u2026', 'status-info');
  if (btn) { btn.classList.add('bridge-scanning'); }
  _lastBridgeLinkSig = _getLinkSig(); // snapshot cabling — next config-only fetchData won't re-trigger
  const _done = () => { if (btn) btn.classList.remove('bridge-scanning'); };
  const devices = currentData.nodes.filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista');
  const ipMap = {};
  devices.forEach(n => {
    let ip = autoIps[n.id] || '';
    if (!ip) { const inp = document.getElementById('bridgeIp_' + n.id.replace(/[^a-zA-Z0-9_-]/g, '_')); if (inp) ip = inp.value.trim(); }
    if (!ip) ip = n.id; // DNS hostname fallback — device_bridge.py resolves via DNS
    ipMap[n.id] = ip;
  });
  const postOpts = () => ({ method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ipMap }) });
  Promise.allSettled([
    fetch(BRIDGE_URL + '/lldp',      postOpts()).then(r => r.json()),
    fetch(BRIDGE_URL + '/devstatus', postOpts()).then(r => r.json())
  ]).then(([bridgeResult, devResult]) => {
    _done();
    let _autoOrphanCount = 0;
    if (bridgeResult.status === 'fulfilled') {
      dbg('Auto-Bridge: LLDP results received');
      const { results, orphans } = _compareBridgeData(bridgeResult.value);
      _autoOrphanCount = orphans.length;
      _renderLldpResults(results, orphans);
      applyLldpIndicators();
    } else {
      dbg('Auto-Bridge: LLDP fetch failed —', bridgeResult.reason);
    }
    if (devResult.status === 'fulfilled') {
      dbg('Auto-Bridge: device status received');
      devStatusMap = devResult.value;
      deviceInternalVlans = {};
      Object.entries(devStatusMap).forEach(([devId, ds]) => {
        if (ds.ok && ds.internalVlans && ds.internalVlans.length)
          deviceInternalVlans[devId.toLowerCase()] = ds.internalVlans;
      });
      _autoDetectBridgeMac(devStatusMap);
      _applyHostnameIndicators(devices);
      applyDevStatusToCards();
    } else {
      dbg('Auto-Bridge: device status fetch failed —', devResult.reason);
    }
    if (isValidationMode) runValidation();
    const _dbChkData = (bridgeResult.status === 'fulfilled' && bridgeResult.value)
      ? bridgeResult.value
      : (devResult.status === 'fulfilled' && devResult.value) ? devResult.value : null;
    let _dbChkMsg = 'Device Bridge checks complete';
    let _dbChkColor = '#15803d';
    if (_dbChkData) {
      const _vals = Object.values(_dbChkData).filter(v => v && typeof v === 'object');
      const _reached = _vals.filter(d => d.ok).length;
      const _total = _vals.length;
      const _authFails = _vals.filter(d => !d.ok && d.error &&
        /auth|expired|permission denied|authentication failed|arista-ssh-agent/i.test(d.error)).length;
      if (_total > 0) _dbChkMsg += ` \u2014 ${_reached}/${_total} reached`;
      if (_authFails) { _dbChkMsg += ` (${_authFails} auth error${_authFails > 1 ? 's' : ''})`; _dbChkColor = '#d97706'; }
      else if (_reached < _total) _dbChkColor = '#dc2626';
    }
    if (_autoOrphanCount > 0 && _dbChkColor !== '#dc2626') {
      _dbChkMsg += ` \u00b7 ${_autoOrphanCount} extra cable${_autoOrphanCount !== 1 ? 's' : ''} found`;
      _dbChkColor = '#d97706';
    }
    setStatus('<b>' + _dbChkMsg + '</b>', '', _dbChkColor); setTimeout(() => { setStatus(getReadyStatus()); }, 4000);
  }).catch(err => { _done(); dbg('Auto-Bridge: unexpected error —', err); setStatus(getReadyStatus()); });
}
