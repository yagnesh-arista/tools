// Make the bridge modal draggable by its header.
function _initLldpModalDrag() {
  const modal  = document.getElementById('bridgeModal');
  const header = document.getElementById('bridgeModalHeader');
  if (!header || !modal) return;
  header.addEventListener('mousedown', e => {
    if (e.target.closest('button')) return; // buttons stay clickable
    e.preventDefault();
    // Anchor to absolute top/left if currently using default CSS right/transform
    if (!modal.style.left || modal.style.left === 'auto') {
      const r = modal.getBoundingClientRect();
      modal.style.left = r.left + 'px'; modal.style.top = r.top + 'px';
      modal.style.right = 'auto'; modal.style.transform = 'none';
    }
    const startX = e.clientX - modal.offsetLeft;
    const startY = e.clientY - modal.offsetTop;
    document.body.style.cursor = 'grabbing';
    const onMove = ev => {
      const tb     = document.querySelector('.toolbar');
      const minTop = tb ? tb.getBoundingClientRect().bottom + 4 : 0;
      modal.style.left = Math.min(Math.max(0, ev.clientX - startX), window.innerWidth  - modal.offsetWidth)  + 'px';
      modal.style.top  = Math.min(Math.max(minTop, ev.clientY - startY), window.innerHeight - modal.offsetHeight) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.body.style.cursor = '';
      localStorage.setItem('bridgeModalPos', JSON.stringify({ left: modal.style.left, top: modal.style.top }));
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// Auto-detect management IPs from Ma0/Management0 entries in allNodesData.
function _getLldpMgmtIps() {
  const ips = {};
  Object.entries(allNodesData).forEach(([key, node]) => {
    const colon = key.lastIndexOf(':');
    const dev = key.slice(0, colon);
    const iface = key.slice(colon + 1);
    if (/^(ma|management)\d+$/i.test(iface) && node.details && node.details.ip_) {
      ips[dev] = (node.details.ip_ || '').split('/')[0].trim();
    }
  });
  return ips;
}

// Auto-detect bridge MAC from devstatus results.
// If exactly one unique non-empty MAC is seen across all queried devices, cache it in
// _detectedBridgeMac so the Auto Config modal can pre-fill the Bridge MAC field.
function _autoDetectBridgeMac(dsData) {
  if (!dsData) return;
  const macs = new Set();
  Object.values(dsData).forEach(r => {
    if (r && r.ok && r.bridgeMac) macs.add(r.bridgeMac);
  });
  _detectedBridgeMac = macs.size === 1 ? Array.from(macs)[0] : null;
}

function _populateLldpDevTable() {
  const table = document.getElementById('bridgeDevTable');
  if (!currentData || !currentData.nodes) { table.innerHTML = '<div class="bridge-empty">No topology data.</div>'; return; }
  const autoIps = _getLldpMgmtIps();
  const devices = currentData.nodes.filter(n => {
    const d = allDevicesData[n.id];
    return d && d.type !== 'non-arista';
  });
  if (!devices.length) { table.innerHTML = '<div class="bridge-empty">No Arista devices found.</div>'; return; }
  table.innerHTML = devices.map(n => {
    const host = autoIps[n.id] || n.id;
    const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    return `<div class="bridge-dev-row">
      <span class="bridge-dev-name">${n.id}</span>
      <input class="bridge-ip-inp" id="bridgeIp_${safeId}" type="text" value="${host}" placeholder="host / IP" spellcheck="false">
      <span class="bridge-dev-dot" id="bridgeDot_${safeId}" title="SSH status"></span>
      <span class="bridge-hn-dot"  id="bridgeHn_${safeId}"  title="Hostname"></span>
    </div>`;
  }).join('');
}

// Extract short device name from LLDP systemName FQDN.
// "DUT-L-Leaf1-VG-cal423.sjc.aristanetworks.com" → "cal423"
// Falls back to original string if no dashes/dots found.
function _normSysName(sysName) {
  const host = (sysName || '').split('.')[0];   // strip domain
  const seg  = host.split('-').pop();            // last dash segment
  return seg || host;
}

// Normalize LLDP full interface names to canonical short form (Ethernet1 → Et1).
function _normLldpIface(name) {
  return (name || '')
    .replace(/^Ethernet(\d.*)/i,    'Et$1')
    .replace(/^Management(\d.*)/i,  'Ma$1')
    .replace(/^Port-Channel(\d.*)/i,'Po$1')
    .replace(/^Loopback(\d.*)/i,    'Lo$1')
    .replace(/^Vxlan(\d.*)/i,       'Vx$1');
}

// Apply bridgePortStatus to topology card port rows.
// Called after runBridgeCheck() and after render() (to survive topology redraws).
function _bridgeEffectiveClass(status) {
  if (status === 'missing') return bridgeAuditFlagMissing ? 'missing' : 'missing-quiet';
  return status;
}

function _applyHostnameIndicators(devices) {
  devices.forEach(n => {
    const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    const el = document.getElementById('bridgeHn_' + safeId);
    if (!el) return;
    const ds = devStatusMap[n.id];
    if (!ds || !ds.ok || !ds.hostname) return;
    const expected = _normSysName(n.id);
    const actual   = _normSysName(ds.hostname);
    if (expected === actual) {
      el.className = 'bridge-hn-dot hn-match';
      el.title = 'Hostname verified: ' + ds.hostname;
    } else {
      el.className = 'bridge-hn-dot hn-mismatch';
      el.title = 'Hostname mismatch — expected: ' + n.id + ', got: ' + ds.hostname;
    }
  });
}

function applyLldpIndicators() {
  document.querySelectorAll('.col-bridge').forEach(el => { el.innerHTML = ''; });
  Object.entries(bridgePortStatus).forEach(([portId, status]) => {
    const rowEl = document.getElementById('p-' + portId.replace(/[^a-zA-Z0-9]/g, '-'));
    if (!rowEl) return;
    const col = rowEl.querySelector('.col-bridge');
    if (!col) return;
    const cls   = _bridgeEffectiveClass(status);
    const title = status === 'match' ? 'LLDP match' : status === 'mismatch' ? 'LLDP mismatch' : 'No LLDP neighbor';
    col.innerHTML = `<span class="bridge-port-dot bridge-port-${cls}" title="${title}"></span>`;
  });
}

// Expand short EOS interface names to full form for devstatus lookup
function _expandIfaceName(name) {
  if (!name) return '';
  return name
    .replace(/^Et(\d)/i,  'Ethernet$1')
    .replace(/^Ma(\d)/i,  'Management$1')
    .replace(/^Po(\d)/i,  'Port-Channel$1')
    .replace(/^Vl(\d)/i,  'Vlan$1');
}

// Update every .dev-model-line: manual model wins over bridge platform; flag mismatch in amber.
// DCS- prefix is stripped before comparison (bridge returns "DCS-7050CX3-32S", users type "7050CX3-32S").
function _refreshModelLines() {
  const norm = s => (s || '').replace(/^DCS-/i, '').trim().toLowerCase();
  document.querySelectorAll('.dev-model-line').forEach(el => {
    const devId = el.dataset.devId;
    const ds = devStatusMap[devId];
    const manualModel    = (deviceMetadata[devId] || {}).model || '';
    const bridgePlatform = (ds && ds.ok && ds.platform) ? ds.platform : '';
    const mismatch = manualModel && bridgePlatform && norm(manualModel) !== norm(bridgePlatform);
    el.textContent = manualModel || bridgePlatform;
    el.classList.toggle('model-mismatch', !!mismatch);
    el.title = mismatch
      ? `Device Manager: ${manualModel}\nBridge detected: ${bridgePlatform}`
      : '';
  });
}

// Apply devStatusMap to device cards (version line) and port St dots (op-status).
// Called after runBridgeCheck() and after render().
function applyDevStatusToCards() {
  // Version line: EOS version only (platform is now in the model line)
  document.querySelectorAll('.dev-version-line').forEach(el => {
    const devId = el.dataset.devId;
    const ds = devStatusMap[devId];
    if (!ds || !ds.ok) { el.textContent = ''; return; }
    el.textContent = ds.version ? 'EOS ' + ds.version : '';
  });

  _refreshModelLines();

  // Port St dots: override with live op-status when available
  Object.entries(devStatusMap).forEach(([devId, ds]) => {
    if (!ds || !ds.ok || !ds.interfaces) return;
    (devicePortsMap[devId] || []).forEach(portId => {
      const portName = portId.split(':')[1];
      const fullName = _expandIfaceName(portName);
      const ifInfo   = ds.interfaces[fullName];
      if (!ifInfo) return;
      const rowEl = document.getElementById('p-' + portId.replace(/[^a-zA-Z0-9]/g, '-'));
      if (!rowEl) return;
      const dotEl = rowEl.querySelector('.port-box .dot');
      if (!dotEl) return;
      dotEl.classList.remove('op-up', 'op-down', 'op-errdisabled', 'op-disabled');
      const ls = ifInfo.linkStatus || '';
      if      (ls === 'connected')    dotEl.classList.add('op-up');
      else if (ls === 'notconnect')   dotEl.classList.add('op-down');
      else if (ls === 'errdisabled')  dotEl.classList.add('op-errdisabled');
      else                            dotEl.classList.add('op-disabled');
      dotEl.title = ls || 'unknown';
    });
  });
}

function runBridgeCheck() {
  if (!currentData || !currentData.nodes) return;
  const btn      = document.getElementById('btnRunBridge');
  const statusEl = document.getElementById('bridgeRunStatus');
  const devices  = currentData.nodes.filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista');

  // Collect IPs and reset per-device dots
  const ipMap = {};
  devices.forEach(n => {
    const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp = document.getElementById('bridgeIp_' + safeId);
    ipMap[n.id] = inp ? inp.value.trim() : '';
    const dot = document.getElementById('bridgeDot_' + safeId);
    if (dot) { dot.className = 'bridge-dev-dot'; dot.title = ''; }
    const hn = document.getElementById('bridgeHn_' + safeId);
    if (hn) { hn.className = 'bridge-hn-dot'; hn.title = 'Hostname'; }
  });

  btn.disabled = true;
  btn.textContent = 'Checking…';
  const _bridgeBtn = document.getElementById('btnBridgeToolbar');
  if (_bridgeBtn) _bridgeBtn.classList.add('bridge-scanning');
  document.getElementById('bridgeResults').style.display = 'none';
  statusEl.style.display = 'block';
  statusEl.style.color = '';
  statusEl.textContent = 'Bridge is querying devices via SSH…';

  const n = devices.length;
  const devWord = n === 1 ? 'device' : 'devices';
  let bridgeDone = false, devDone = false;
  const updateStatus = () => {
    const done = [bridgeDone && 'Bridge', devDone && 'status'].filter(Boolean).join(' + ');
    statusEl.textContent = done
      ? `Querying ${n} ${devWord}… (${done} done)`
      : `Querying ${n} ${devWord}…`;
  };
  updateStatus();

  const postOpts = () => ({
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ ipMap }),
  });

  const fetchLldp = fetch(BRIDGE_URL + '/lldp', postOpts())
    .then(r => { if (!r.ok) throw new Error('Bridge HTTP ' + r.status); return r.json(); })
    .then(d => { bridgeDone = true; updateStatus(); return d; });
  const fetchDev  = fetch(BRIDGE_URL + '/devstatus', postOpts())
    .then(r => { if (!r.ok) throw new Error('Bridge HTTP ' + r.status); return r.json(); })
    .then(d => { devDone = true; updateStatus(); return d; });

  Promise.allSettled([fetchLldp, fetchDev])
    .then(([bridgeResult, devResult]) => {
      let _manualOrphanCount = 0;
      btn.disabled = false;
      btn.textContent = 'Run Checks';
      if (_bridgeBtn) _bridgeBtn.classList.remove('bridge-scanning');
      const bridgeData = bridgeResult.status === 'fulfilled' ? bridgeResult.value : null;
      const dsData   = devResult.status  === 'fulfilled' ? devResult.value  : null;

      if (!bridgeData && !dsData) {
        // Both failed — show error
        const err = bridgeResult.reason || devResult.reason;
        statusEl.textContent = 'Bridge error: ' + err.message + ' — is device_bridge.py running?';
        _checkBridgeHealth();
        return;
      }

      if (bridgeData) {
        devices.forEach(n => {
          const safeId = n.id.replace(/[^a-zA-Z0-9_-]/g, '_');
          const dot = document.getElementById('bridgeDot_' + safeId);
          if (!dot) return;
          const res = bridgeData[n.id];
          if (!res)       { dot.className = 'bridge-dev-dot dot-gray';  dot.title = 'No IP / not queried'; }
          else if (res.ok){ dot.className = 'bridge-dev-dot dot-green'; dot.title = 'SSH OK'; }
          else            { dot.className = 'bridge-dev-dot dot-red';   dot.title = res.error || 'Error'; }
        });
        const { results, orphans } = _compareBridgeData(bridgeData);
        _renderLldpResults(results, orphans);
        applyLldpIndicators();
        _manualOrphanCount = orphans.length;
      }

      if (dsData) {
        devStatusMap = dsData;
        deviceInternalVlans = {};
        Object.entries(devStatusMap).forEach(([devId, ds]) => {
          if (ds.ok && ds.internalVlans && ds.internalVlans.length)
            deviceInternalVlans[devId.toLowerCase()] = ds.internalVlans;
        });
        _autoDetectBridgeMac(devStatusMap);
        _applyHostnameIndicators(devices);
        applyDevStatusToCards();
      }

      if (isValidationMode) runValidation();

      // Compute per-device summary with auth error detection
      const _chkData = bridgeData || dsData;
      let _msg = 'Device Bridge checks complete';
      let _msgColor = '#15803d';
      if (_chkData) {
        const _vals = Object.values(_chkData).filter(v => v && typeof v === 'object');
        const _reached = _vals.filter(d => d.ok).length;
        const _total = _vals.length;
        const _authFails = _vals.filter(d => !d.ok && d.error &&
          /auth|expired|permission denied|authentication failed|arista-ssh-agent/i.test(d.error)).length;
        if (_total > 0) _msg += ` \u2014 ${_reached}/${_total} reached`;
        if (_authFails) { _msg += ` (${_authFails} auth error${_authFails > 1 ? 's' : ''})`; _msgColor = '#d97706'; }
        else if (_reached < _total) _msgColor = '#dc2626';
      }
      if (_manualOrphanCount > 0 && _msgColor !== '#dc2626') {
        _msg += ` \u00b7 ${_manualOrphanCount} extra cable${_manualOrphanCount !== 1 ? 's' : ''} found`;
        _msgColor = '#d97706';
      }
      if (bridgeResult.status === 'rejected') _msg += ' \u2014 LLDP endpoint error: ' + bridgeResult.reason.message;
      else if (devResult.status === 'rejected') _msg += ' \u2014 status endpoint error: ' + devResult.reason.message;
      statusEl.style.display = 'block';
      statusEl.style.color = _msgColor;
      statusEl.textContent = _msg;
    });
}

// ── Config Push ───────────────────────────────────────────────────────────────

// Promise wrapper around google.script.run.getDeviceConfig — no UI side effects.
function _fetchConfigForPush(deviceName) {
  return new Promise(resolve => {
    if (configCache[deviceName]) {
      resolve({ deviceName, config: formatConfigText(configCache[deviceName].data) });
      return;
    }
    google.script.run
      .withSuccessHandler(res => {
        if (!res.error && res.config) {
          configCache[deviceName] = { data: res.config };
          resolve({ deviceName, config: formatConfigText(res.config) });
        } else {
          resolve({ deviceName, config: null, error: res.error || 'Config fetch failed' });
        }
      })
      .withFailureHandler(err => {
        resolve({ deviceName, config: null, error: err.message || 'Config fetch failed' });
      })
      .getDeviceConfig(deviceName);
  });
}

// ── Single-device push (from copy strip) ─────────────────────────────────────

async function pushDeviceConfig(deviceName, btnId, portFilter = null) {
  if (!deviceName) return;
  if (_pendingPush) return; // another push is already pending confirm
  if (allDevicesData[deviceName] && allDevicesData[deviceName].type === 'non-arista') {
    const st = document.getElementById('status');
    setStatus(`Push not available — ${deviceName} is a non-EOS device`, "status-error");
    return;
  }
  const btn      = document.getElementById(btnId);
  const origText = btn ? btn.textContent : 'Push';
  const st       = document.getElementById('status');

  // Resolve IP: 1) management interface auto-detect from sheet data,
  // 2) bridge modal input (if modal was opened), 3) device name as hostname (DNS fallback).
  const ips = _getLldpMgmtIps();
  let   ip  = ips[deviceName] || '';
  if (!ip) {
    const safeId = deviceName.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp    = document.getElementById('bridgeIp_' + safeId);
    if (inp) ip  = inp.value.trim();
  }
  if (!ip) ip = deviceName; // fall back to device name as hostname (DNS)

  if (btn) { btn.disabled = true; btn.textContent = 'Previewing…'; }

  // Fetch full device config (uses cache when available)
  const { config: fullConfig, error } = await _fetchConfigForPush(deviceName);
  if (!fullConfig) {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    setStatus(`Push failed: ${error || 'could not fetch config for ' + deviceName}`, "status-error");
    return;
  }

  // When called from a link strip, push only the selected interface block
  let config = fullConfig;
  if (portFilter) {
    const ifBlock = _extractInterfaceBlock(fullConfig, portFilter);
    if (!ifBlock) {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      setStatus(`Push: interface ${portFilter} not found in ${deviceName} config`, "status-error");
      return;
    }
    config = ifBlock;
  }

  const label = portFilter ? `${deviceName} : ${portFilter}` : deviceName;

  // Phase 1: dry-run to get diff preview (no commit)
  try {
    const resp = await fetch(BRIDGE_URL + '/pushconfig', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } }, dry_run: true }),
    });
    if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
    const data = await resp.json();
    const res  = data[deviceName] || {};
    if (!res.ok) {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      const errMsg = res.error || 'something went wrong';
      setStatus(`${label}: ${errMsg}`, "status-error");
      return;
    }
    // Empty diff = already in sync — show modal briefly then auto-close
    if (!res.diff || !res.diff.trim()) {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _showPushConfirmModal(label, '', false, true);
      return;
    }
    // Store pending push details, show confirm modal (button stays disabled)
    _pendingPush = { deviceName, ip, config, btnId, origText, label };
    _showPushConfirmModal(label, res.diff);
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    setStatus(`Push error: ${err.message} — is device_bridge.py running?`, 'status-error');
  }
}

function _showPushConfirmModal(deviceName, diff, readOnly = false, alreadyInSync = false) {
  if (_pushAutoCloseTimeout) { clearTimeout(_pushAutoCloseTimeout); _pushAutoCloseTimeout = null; }
  const modal    = document.getElementById('pushConfirmModal');
  const subtitle = document.getElementById('pushConfirmSubtitle');
  const body     = document.getElementById('pushConfirmBody');
  subtitle.textContent = deviceName;
  const titleEl  = document.getElementById('pushConfirmTitle');
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelHdr = document.getElementById('btnCancelPushHdr');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  // ── Loading state: show modal immediately before diff is fetched ─────────────
  if (diff === null) {
    if (titleEl)    titleEl.textContent     = 'Confirm Config Push';
    if (commitBtn)  { commitBtn.style.display = 'inline-block'; commitBtn.disabled = true; commitBtn.textContent = 'Commit'; }
    if (cancelHdr)  { cancelHdr.style.display = ''; cancelHdr.textContent = 'Cancel'; }
    if (cancelFtr)  { cancelFtr.style.display = ''; cancelFtr.textContent = 'Cancel'; }
    body.innerHTML = `<div style="color:var(--text-muted,#94a3b8);font-style:italic;padding:4px 0;font-family:'JetBrains Mono',monospace;font-size:12px;">Fetching diff\u2026</div>`;
    modal.style.display = 'flex';
    return;
  }
  const noCommit = readOnly || alreadyInSync;
  if (titleEl)    titleEl.textContent     = alreadyInSync ? 'Already in Sync' : (readOnly ? 'Verification Result' : 'Confirm Config Push');
  if (commitBtn)  { commitBtn.style.display = noCommit ? 'none' : 'inline-block'; commitBtn.disabled = false; commitBtn.textContent = 'Commit'; }
  if (cancelHdr)  cancelHdr.textContent   = noCommit ? 'Close' : 'Cancel';
  if (cancelFtr)  cancelFtr.textContent   = noCommit ? 'Close' : 'Cancel';
  if (alreadyInSync) {
    body.innerHTML = `<div style="color:var(--text-muted,#94a3b8);font-style:italic;padding:4px 0;">Running config already matches — no push needed.</div>`;
    modal.style.display = 'flex';
    _pushAutoCloseTimeout = setTimeout(closePushConfirmModal, 5000);
    return;
  }
  const lines   = diff.split('\n');
  const changed = lines.filter(l => l.startsWith('+') || l.startsWith('-')).length;
  let html = '';
  if (!diff.trim()) {
    const noChangeMsg = readOnly
      ? 'Config verified — no diff remaining.'
      : 'No changes — running config already matches the generated config.';
    html = `<div style="color:var(--text-muted,#94a3b8);font-style:italic;padding:4px 0;">${noChangeMsg}</div>`;
  } else {
    const changeLabel = readOnly
      ? `${changed} line${changed !== 1 ? 's' : ''} still differ after push`
      : `${changed} line${changed !== 1 ? 's' : ''} will change`;
    html += `<div style="margin-bottom:8px;color:var(--text-muted,#94a3b8);font-size:11px;">${changeLabel}</div>`;
    html += `<pre style="font-family:'JetBrains Mono',monospace;font-size:10px;` +
            `background:#0f172a;border-radius:4px;padding:8px;overflow-x:auto;` +
            `max-height:280px;white-space:pre;margin:0;">`;
    html += lines.map(l => {
      const esc = escapeHtml(l);
      if (l.startsWith('+')) return `<span style="color:#4ade80;">${esc}</span>`;
      if (l.startsWith('-')) return `<span style="color:#f87171;">${esc}</span>`;
      if (l.startsWith('@')) return `<span style="color:#94a3b8;">${esc}</span>`;
      return `<span style="color:#cbd5e1;">${esc}</span>`;
    }).join('\n');
    html += `</pre>`;
  }
  body.innerHTML = html;
  modal.style.display = 'flex';
}

// Write push phase status to both #status (sidebar) and #cfgPushStatus (config modal footer)
function _setPushStatus(html) {
  setStatus(html);
  const cfgSt = document.getElementById('cfgPushStatus');
  if (cfgSt) {
    const modal = document.getElementById('configModal');
    if (modal && modal.style.display !== 'none') {
      cfgSt.innerHTML = html;
      cfgSt.style.display = '';
    }
  }
}

async function commitPushConfig() {
  if (!_pendingPush) return;
  const { deviceName, ip, config, btnId, origText, label } = _pendingPush;
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelHdr = document.getElementById('btnCancelPushHdr');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  const titleEl   = document.getElementById('pushConfirmTitle');
  const bodyEl    = document.getElementById('pushConfirmBody');

  // Disable commit + both cancel buttons; switch body to phase tracker
  if (commitBtn) { commitBtn.disabled = true; commitBtn.textContent = 'Committing…'; }
  if (cancelHdr) cancelHdr.style.display = 'none';
  if (cancelFtr) cancelFtr.style.display = 'none';

  const _ptRowHtml = (label, id, initColor, initText) =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;` +
    `margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
    `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-main);">${label}</span>` +
    `<span id="${id}" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${initColor};">${initText}</span></div>`;

  if (bodyEl) bodyEl.innerHTML =
    _ptRowHtml('Phase 1: Dry-run', 'pt1', '#10b981', '✓ diff ready') +
    _ptRowHtml('Phase 2: Commit',  'pt2', '#94a3b8', 'committing…') +
    _ptRowHtml('Phase 3: Verify',  'pt3', '#64748b', 'pending…') +
    '<div id="pt_detail" style="margin-top:6px;"></div>';

  const _ptSet = (id, color, text) => {
    const el = document.getElementById(id);
    if (el) { el.style.color = color; el.textContent = text; }
  };
  const _ptDetail = (html) => {
    const el = document.getElementById('pt_detail');
    if (el) el.innerHTML = html;
  };

  try {
    // Phase 2: commit with retry (null result = server thread timeout → retry)
    let res = null;
    let lastAttempt = 1;
    const PUSH_MAX_RETRIES = 3;
    for (let attempt = 1; attempt <= 1 + PUSH_MAX_RETRIES; attempt++) {
      lastAttempt = attempt;
      const attemptLabel = attempt === 1 ? 'committing…' : `retry ${attempt - 1}/${PUSH_MAX_RETRIES}…`;
      if (commitBtn) commitBtn.textContent = attempt === 1 ? 'Committing…' : `Retry ${attempt - 1}/${PUSH_MAX_RETRIES}…`;
      _ptSet('pt2', '#94a3b8', attemptLabel);
      try {
        const resp = await fetch(BRIDGE_URL + '/pushconfig', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } } }),
        });
        if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
        const data = await resp.json();
        res = data[deviceName] || null; // null = server thread timed out → retry
      } catch (e) { res = { ok: false, error: e.message }; break; }
      if (res !== null) break;
    }
    const btn = document.getElementById(btnId);
    if (!res) {
      // All retries timed out — run /devstatus reachability check (matches bulk push behavior)
      let reachable = false;
      try {
        const chk = await fetch(BRIDGE_URL + '/devstatus', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ipMap: { [deviceName]: ip } }),
        });
        if (chk.ok) { const d = await chk.json(); reachable = !!(d[deviceName] && d[deviceName].ok); }
      } catch (_) {}
      const errMsg = reachable
        ? 'Push timed out — device reachable, verify config manually'
        : 'No response — device unreachable or push timed out';
      _ptSet('pt2', '#f87171', '✗ timed out');
      _ptSet('pt3', '#475569', '—');
      _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${escapeHtml(errMsg)}</div>`);
      if (titleEl) titleEl.textContent = 'Push Timed Out';
      if (commitBtn) commitBtn.style.display = 'none';
      if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _setPushStatus(`<b>${label || deviceName}</b> — <span style="color:#f87171;font-weight:600;">${errMsg}</span>`);
    } else if (res.ok) {
      // Phase 2 success → start Phase 3
      const retryNote = lastAttempt > 1 ? ` (${lastAttempt - 1} retr${lastAttempt === 2 ? 'y' : 'ies'})` : '';
      _ptSet('pt2', '#10b981', `✓ committed${retryNote}`);
      _ptSet('pt3', '#94a3b8', 'verifying…');
      if (commitBtn) commitBtn.style.display = 'none';
      _setPushStatus(`<b>${label || deviceName}</b>${retryNote} — Phase 3: verifying…`);
      try {
        const vResp = await fetch(BRIDGE_URL + '/pushconfig', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } }, dry_run: true }),
        });
        if (!vResp.ok) throw new Error('verify HTTP ' + vResp.status);
        const vData = await vResp.json();
        const vRes  = vData[deviceName] || { ok: false, error: 'No response from bridge for verify step' };
        if (vRes.ok) {
          const rem = (vRes.diff || '').split('\n')
            .filter(l => l.startsWith('+') || l.startsWith('-')).length;
          if (rem === 0) {
            _ptSet('pt3', '#10b981', '✓ no diff remaining');
            if (titleEl) titleEl.textContent = 'Push Successful';
            _setPushStatus(`<b>${label || deviceName}</b>${retryNote} — ` +
              `<span style="color:#10b981;font-weight:600;">Push successful, no config diff</span>`);
            if (btn) {
              btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align:-1px;margin-right:3px"><path d="M2 6.5l2.5 2.5 5.5-5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Verified';
              setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 3500);
            }
            _pushAutoCloseTimeout = setTimeout(() => closePushConfirmModal(), 5000);
            setTimeout(() => { setStatus(getReadyStatus()); }, 5000);
          } else {
            // Partial — show remaining diff in pt_detail
            const dlines = (vRes.diff || '').split('\n');
            _ptSet('pt3', '#f59e0b', `⚠ ${rem} line${rem !== 1 ? 's' : ''} still differ`);
            if (titleEl) titleEl.textContent = 'Partial Push';
            let dhtml = `<pre style="font-family:'JetBrains Mono',monospace;font-size:10px;background:#0f172a;border-radius:4px;` +
              `padding:8px;overflow-x:auto;max-height:220px;white-space:pre;margin:0;">`;
            dhtml += dlines.map(l => {
              const e = escapeHtml(l);
              if (l.startsWith('+')) return `<span style="color:#4ade80;">${e}</span>`;
              if (l.startsWith('-')) return `<span style="color:#f87171;">${e}</span>`;
              if (l.startsWith('@')) return `<span style="color:#94a3b8;">${e}</span>`;
              return `<span style="color:#cbd5e1;">${e}</span>`;
            }).join('\n') + '</pre>';
            _ptDetail(dhtml);
            if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
            _setPushStatus(`<b>${label || deviceName}</b> — ` +
              `<span style="color:#f59e0b;font-weight:600;">${rem} line${rem !== 1 ? 's' : ''} still differ after push</span>`);
            if (btn) {
              btn.textContent = '⚠ Partial';
              setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 4000);
            }
          }
        } else {
          const vErrSafe = escapeHtml(vRes.error || 'something went wrong');
          _ptSet('pt3', '#f87171', '✗ verify failed');
          if (titleEl) titleEl.textContent = 'Push Succeeded — Verify Failed';
          _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${vErrSafe}</div>`);
          if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
          _setPushStatus(`<b>${label || deviceName}</b> — ` +
            `<span style="color:#f87171;font-weight:600;">verify failed: ${vErrSafe}</span>`);
          if (btn) { btn.disabled = false; btn.textContent = origText; }
        }
      } catch (verifyErr) {
        const vErrSafe = escapeHtml(verifyErr.message);
        _ptSet('pt3', '#f87171', '✗ verify error');
        if (titleEl) titleEl.textContent = 'Push Succeeded — Verify Failed';
        _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${vErrSafe}</div>`);
        if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
        _setPushStatus(`<b>${label || deviceName}</b> — ` +
          `<span style="color:#f87171;font-weight:600;">verify error: ${vErrSafe}</span>`);
        if (btn) { btn.disabled = false; btn.textContent = origText; }
      }
    } else {
      // Phase 2 explicit device error
      const errSafe = escapeHtml(res.error || 'something went wrong');
      _ptSet('pt2', '#f87171', '✗ push failed');
      _ptSet('pt3', '#475569', '—');
      _ptDetail(`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${errSafe}</div>`);
      if (titleEl) titleEl.textContent = 'Push Failed';
      if (commitBtn) commitBtn.style.display = 'none';
      if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _setPushStatus(`<b>${label || deviceName}</b> — <span style="color:#f87171;font-weight:600;">push failed: ${errSafe}</span>`);
    }
  } catch (err) {
    // Network/bridge error
    const errSafe = escapeHtml(err.message);
    _ptSet('pt2', '#f87171', '✗ network error');
    _ptSet('pt3', '#475569', '—');
    _ptDetail(
      `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${errSafe}<br>` +
      `<span style="opacity:0.7;">Is device_bridge.py running?</span></div>`);
    if (titleEl) titleEl.textContent = 'Push Error';
    if (commitBtn) commitBtn.style.display = 'none';
    if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
    const btn = document.getElementById(btnId);
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    _setPushStatus(`<b>${label || deviceName}</b> — <span style="color:#f87171;font-weight:600;">Push error: ${err.message} — is device_bridge.py running?</span>`);
  } finally {
    _pendingPush = null;
  }
}

function cancelPushConfig() {
  if (_pendingPush) {
    const btn = document.getElementById(_pendingPush.btnId);
    if (btn) { btn.disabled = false; btn.textContent = _pendingPush.origText; }
    _pendingPush = null;
  }
  closePushConfirmModal();
}


function closePushConfirmModal() {
  if (_pushAutoCloseTimeout) { clearTimeout(_pushAutoCloseTimeout); _pushAutoCloseTimeout = null; }
  const m = document.getElementById('pushConfirmModal');
  if (m) m.style.display = 'none';
  const titleEl   = document.getElementById('pushConfirmTitle');
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelHdr = document.getElementById('btnCancelPushHdr');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  if (titleEl)   titleEl.textContent     = 'Confirm Config Push';
  if (commitBtn) { commitBtn.disabled = false; commitBtn.textContent = 'Commit'; commitBtn.style.display = 'inline-block'; }
  if (cancelHdr) { cancelHdr.style.display = ''; cancelHdr.textContent = 'Cancel'; }
  if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Cancel'; }
}

function pushLinkSide(side) {
  const dev   = side === 'left' ? _pushLeftDev   : _pushRightDev;
  const port  = side === 'left' ? _pushLeftPort  : _pushRightPort;
  const btnId = side === 'left' ? 'btnPushLeft'  : 'btnPushRight';
  if (dev) pushDeviceConfig(dev, btnId, port);
}

// Extract a single interface block from full formatted config text.
// Matches by full or abbreviated interface name (Et1/1 ↔ Ethernet1/1).
function _extractInterfaceBlock(configText, portName) {
  const fullName = _expandIfaceName(portName);
  const targets  = new Set([portName.toLowerCase(), fullName.toLowerCase()]);
  for (const section of configText.split('\n!\n')) {
    const firstLine = section.trim().split('\n')[0].trim().toLowerCase();
    if (firstLine.startsWith('interface ')) {
      const ifName = firstLine.slice('interface '.length).trim();
      if (targets.has(ifName)) return section.trim();
    }
  }
  return null;
}

// ── Bulk push (from Generate All Configs modal) ───────────────────────────────

async function pushAllConfigs() {
  const btn  = document.getElementById('btnPushAllConfigs');
  const body = document.getElementById('generateAllRight');
  body.style.display = '';  // reveal right pane

  // Device list: all EOS devices in current topology — no pre-generated configs needed
  const deviceNames = (currentData && currentData.nodes || [])
    .filter(n => allDevicesData[n.id] && allDevicesData[n.id].type !== 'non-arista')
    .map(n => n.id);

  if (!deviceNames.length) {
    body.insertAdjacentHTML('beforeend',
      `<div style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:10px;">` +
      `No EOS devices found in topology.</div>`);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Pushing…';

  // Resolve IPs: management IP from sheet → bridge modal input → hostname fallback (DNS)
  const ips = _getLldpMgmtIps();
  const ipMap = {};
  deviceNames.forEach(name => {
    let ip = ips[name] || '';
    if (!ip) {
      const inp = document.getElementById('bridgeIp_' + name.replace(/[^a-zA-Z0-9_-]/g, '_'));
      ip = inp ? inp.value.trim() : '';
    }
    if (!ip) ip = name;  // hostname fallback — device_bridge.py will resolve via DNS
    ipMap[name] = ip;
  });

  const total = deviceNames.length;
  let completed = 0, okCount = 0;

  // Set up push results pane
  body.innerHTML =
    `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;` +
    `color:var(--text-muted);letter-spacing:0.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);">Push Results</div>` +
    `<div style="font-family:'JetBrains Mono',monospace;font-size:12px;padding-bottom:10px;">` +
    `<span id="genAllPushSummary" style="font-weight:700;color:var(--text-muted);">Pushing 0/${total}…</span>` +
    `<span style="font-size:10px;color:var(--text-muted);margin-left:10px;font-weight:400;">${_bridgeDeviceTimeout}s/attempt · 3 retries</span></div>` +
    `<div id="genAllPushRows"></div>`;
  const rowsEl    = document.getElementById('genAllPushRows');
  const summaryEl = document.getElementById('genAllPushSummary');

  // Helper: build and set a result row (replaces element by id via outerHTML)
  // diff: colored diff block (push remaining diff); details: plain error text block
  function _setResultRow(rowId, safeName, color, label, diff, details) {
    let html =
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;` +
      `margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
      `<span style="color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:12px;">${safeName}</span>` +
      `<span style="color:${color};font-size:11px;">${label}</span></div>`;
    if (diff) {
      html +=
        `<pre style="font-family:'JetBrains Mono',monospace;font-size:10px;background:#0f172a;` +
        `border-radius:3px;padding:5px 8px;margin:0 0 6px;overflow-x:auto;max-height:120px;white-space:pre;">` +
        diff.split('\n').map(l => {
          const e = escapeHtml(l);
          if (l.startsWith('+')) return `<span style="color:#4ade80;">${e}</span>`;
          if (l.startsWith('-')) return `<span style="color:#f87171;">${e}</span>`;
          if (l.startsWith('@')) return `<span style="color:#94a3b8;">${e}</span>`;
          return `<span style="color:#94a3b8;">${e}</span>`;
        }).join('\n') + '</pre>';
    }
    if (details) {
      const safeDetails = escapeHtml(details);
      html +=
        `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#f87171;` +
        `background:#0f172a;border-radius:3px;padding:5px 8px;margin:0 0 6px;">${safeDetails}</div>`;
    }
    const rowEl = document.getElementById(rowId);
    if (rowEl) rowEl.outerHTML = html;
  }

  // Helper: update summary counter after each device completes all phases
  function _updateSummary() {
    if (!summaryEl) return;
    if (completed < total) {
      summaryEl.textContent = `Pushing ${completed}/${total}…`;
    } else {
      const ts = new Date().toTimeString().slice(0, 8);
      summaryEl.innerHTML = `Push complete: ${okCount}/${total} successful` +
        `<span style="font-weight:400;color:var(--text-muted);margin-left:10px;font-size:11px;">${ts}</span>`;
      summaryEl.style.color = okCount === total ? '#10b981' : '#f59e0b';
    }
  }

  // Insert a pending placeholder row for each device immediately
  deviceNames.forEach(name => {
    const rowId    = 'gapr_' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
    const safeName = name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    rowsEl.insertAdjacentHTML('beforeend',
      `<div id="${rowId}" style="display:flex;justify-content:space-between;align-items:center;` +
      `padding:3px 8px;margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
      `<span style="color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:12px;">${safeName}</span>` +
      `<span style="color:var(--text-muted);font-size:11px;">pending…</span></div>`);
  });

  // Rolling concurrency window — at most PUSH_CONCURRENCY devices in fetch+push+verify at once.
  // As soon as one device finishes all phases, the next queued device starts.
  const PUSH_CONCURRENCY = 3;
  let _semCount = 0;
  const _semQueue = [];
  const _semAcquire = () => {
    if (_semCount < PUSH_CONCURRENCY) { _semCount++; return Promise.resolve(); }
    return new Promise(r => _semQueue.push(r));
  };
  const _semRelease = () => {
    _semCount--;
    if (_semQueue.length > 0) { _semCount++; _semQueue.shift()(); }
  };

  // Fetch + push + verify each device — rolling window of PUSH_CONCURRENCY concurrent pipelines
  await Promise.allSettled(deviceNames.map(async (name) => {
    await _semAcquire();
    try {
      const rowId    = 'gapr_' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
      const safeName = escapeHtml(name);
      const ip       = ipMap[name];
      const rowEl    = document.getElementById(rowId);

      // ── Phase 0: fetch config (cache hit = instant; cache miss = getDeviceConfig()) ──
      if (rowEl) { const sp = rowEl.querySelector('span:last-child'); if (sp) sp.textContent = configCache[name] ? 'pushing…' : 'fetching config…'; }
      const { config, error: fetchError } = await _fetchConfigForPush(name);
      if (!config) {
        completed++;
        _updateSummary();
        _setResultRow(rowId, safeName, '#ef4444', fetchError || 'config fetch failed', null);
        return;
      }

      // ── Phase 2: actual push (commit) — up to 3 retries on server-side timeout ──
      if (rowEl) { const sp = rowEl.querySelector('span:last-child'); if (sp) sp.textContent = 'pushing…'; }
      let res = null;
      const PUSH_MAX_RETRIES = 3;
      for (let attempt = 1; attempt <= 1 + PUSH_MAX_RETRIES; attempt++) {
        if (rowEl) {
          const sp = rowEl.querySelector('span:last-child');
          if (sp) sp.textContent = attempt === 1 ? 'pushing…' : `retry ${attempt - 1}/${PUSH_MAX_RETRIES}…`;
        }
        try {
          const resp = await fetch(BRIDGE_URL + '/pushconfig', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ ipMap: { [name]: { ip, config } } }),
          });
          if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
          const data = await resp.json();
          res = data[name] || null;  // null = server thread timed out → retry
        } catch (e) {
          res = { ok: false, error: e.message };
          break; // Network/HTTP error — no point retrying
        }
        if (res !== null) break; // Got a result (success or explicit device error) — stop
      }

      // ── "No result" diagnosis: all attempts timed out on server side ──────────
      if (!res) {
        let reachable = false;
        try {
          const chk = await fetch(BRIDGE_URL + '/devstatus', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ ipMap: { [name]: ip } }),
          });
          if (chk.ok) {
            const chkData = await chk.json();
            reachable = !!(chkData[name] && chkData[name].ok);
          }
        } catch (_) { /* unreachable */ }
        res = {
          ok: false,
          error: reachable
            ? 'Push timed out — device reachable, verify config manually'
            : 'No response — device unreachable or push timed out',
        };
      }

      if (!res.ok) {
        completed++;
        _updateSummary();
        _setResultRow(rowId, safeName, '#ef4444', res.error || 'something went wrong', null);
        return;
      }

      // ── Phase 3: dry-run verify (confirm nothing remains after commit) ────────
      // Show "verifying…" state — keep the row id so Phase 3 can replace it
      const verifyPlaceholder =
        `<div id="${rowId}" style="display:flex;justify-content:space-between;align-items:center;` +
        `padding:3px 8px;margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
        `<span style="color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:12px;">${safeName}</span>` +
        `<span style="color:var(--text-muted);font-size:11px;">verifying…</span></div>`;
      const pushRowEl = document.getElementById(rowId);
      if (pushRowEl) pushRowEl.outerHTML = verifyPlaceholder;

      let vDiff  = null;   // null = verify failed; '' = clean; non-empty = partial
      let vError = null;   // captured error message when verify fails
      try {
        const vResp = await fetch(BRIDGE_URL + '/pushconfig', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ ipMap: { [name]: { ip, config } }, dry_run: true }),
        });
        if (!vResp.ok) throw new Error('verify HTTP ' + vResp.status);
        const vData = await vResp.json();
        const vRes  = vData[name];
        if (!vRes)        { vError = 'No response from bridge for verify step'; }
        else if (vRes.ok) { vDiff  = (vRes.diff || '').trim(); }
        else              { vError = vRes.error || 'Verify returned error'; }
      } catch (e) { vError = e.message; }

      completed++;
      if (vDiff === '') okCount++;   // only count as success if verify confirms clean
      _updateSummary();

      if (vDiff === null) {
        _setResultRow(rowId, safeName, '#f59e0b', 'Pushed — verify check failed', null, vError);
      } else if (vDiff === '') {
        _setResultRow(rowId, safeName, '#10b981', 'Push successful, no config diff', null);
      } else {
        const remLines = vDiff.split('\n').filter(l => l.startsWith('+') || l.startsWith('-')).length;
        _setResultRow(rowId, safeName, '#f59e0b',
          `${remLines} line${remLines !== 1 ? 's' : ''} remaining after push`, vDiff);
      }
    } finally {
      _semRelease();  // always release slot so next queued device can start
    }
  }));

  btn.disabled = false;
  btn.textContent = 'Push All';
}

// Compare LLDP data against globalLinks. Only checks Et↔Et links on Arista devices.
function _compareBridgeData(bridgeData) {
  bridgePortStatus = {};  // reset per-port status for topology cards
  // Build bridgeMap: "DevName:NormIface" → {remoteDevice, remoteIface}
  const bridgeMap = {};
  Object.entries(bridgeData).forEach(([devName, res]) => {
    if (!res.ok || !res.neighbors) return;
    Object.entries(res.neighbors).forEach(([rawIface, info]) => {
      const neighborList = info.bridgeNeighborInfo;
      if (!neighborList || !neighborList.length) return;
      const nb = neighborList[0];
      const remDev  = _normSysName((nb.systemName || '').trim());
      // interfaceId_v2 is clean; interfaceId has embedded quotes ("Ethernet1") — strip them
      const rawRemIface = (nb.neighborInterfaceInfo && (nb.neighborInterfaceInfo.interfaceId_v2 || nb.neighborInterfaceInfo.interfaceId || '')).replace(/^"|"$/g, '');
      const remIface = _normLldpIface(rawRemIface);
      bridgeMap[devName + ':' + _normLldpIface(rawIface)] = { remoteDevice: remDev, remoteIface: remIface };
    });
  });

  const results = [];
  const seen = new Set();

  globalLinks.forEach(link => {
    const pairKey = [link.u, link.v].sort().join('||');
    if (seen.has(pairKey)) return;
    seen.add(pairKey);

    const colonU = link.u.lastIndexOf(':'), colonV = link.v.lastIndexOf(':');
    const devU = link.u.slice(0, colonU), ifU = link.u.slice(colonU + 1);
    const devV = link.v.slice(0, colonV), ifV = link.v.slice(colonV + 1);

    // Only check physical Ethernet links on Arista devices
    const arisU = allDevicesData[devU] && allDevicesData[devU].type !== 'non-arista';
    const arisV = allDevicesData[devV] && allDevicesData[devV].type !== 'non-arista';
    if (!arisU || !arisV)  { results.push({ u: link.u, v: link.v, status: 'skip', msg: 'non-Arista device' }); return; }
    if (!/^et\d/i.test(ifU) || !/^et\d/i.test(ifV)) { results.push({ u: link.u, v: link.v, status: 'skip', msg: 'non-Ethernet interface' }); return; }

    const queriedU = bridgeData[devU] !== undefined;
    const queriedV = bridgeData[devV] !== undefined;
    const okU = bridgeData[devU] && bridgeData[devU].ok;
    const okV = bridgeData[devV] && bridgeData[devV].ok;

    if (!queriedU && !queriedV) { results.push({ u: link.u, v: link.v, status: 'unknown', msg: 'neither device queried' }); return; }

    const bridgeU = bridgeMap[link.u]; // what LLDP says U sees
    const bridgeV = bridgeMap[link.v]; // what LLDP says V sees

    // Check each direction independently (only if device was successfully queried)
    const uMatch = !okU ? null : (bridgeU && bridgeU.remoteDevice === devV && bridgeU.remoteIface === ifV);
    const vMatch = !okV ? null : (bridgeV && bridgeV.remoteDevice === devU && bridgeV.remoteIface === ifU);

    // Populate per-port status for topology card indicators
    if (okU) bridgePortStatus[link.u] = uMatch ? 'match' : (bridgeU ? 'mismatch' : 'missing');
    if (okV) bridgePortStatus[link.v] = vMatch ? 'match' : (bridgeV ? 'mismatch' : 'missing');

    if (uMatch === true && (vMatch === true || vMatch === null)) {
      results.push({ u: link.u, v: link.v, status: 'match' });
    } else if (uMatch === false || vMatch === false) {
      const parts = [];
      if (uMatch === false) {
        parts.push(bridgeU
          ? devU + ':' + ifU + ' sees ' + bridgeU.remoteDevice + ':' + bridgeU.remoteIface
          : devU + ':' + ifU + ' — no LLDP neighbor');
      }
      if (vMatch === false) {
        parts.push(bridgeV
          ? devV + ':' + ifV + ' sees ' + bridgeV.remoteDevice + ':' + bridgeV.remoteIface
          : devV + ':' + ifV + ' — no LLDP neighbor');
      }
      results.push({ u: link.u, v: link.v, status: 'mismatch', msg: parts.join(' / ') });
    } else {
      // Build per-device status: SSH failed vs not queried at all
      const label = (dev, queried, ok) =>
        !queried ? dev + ' not queried' : !ok ? dev + ' SSH failed' : null;
      const msgs = [label(devU, queriedU, okU), label(devV, queriedV, okV)].filter(Boolean);
      results.push({ u: link.u, v: link.v, status: 'partial', msg: msgs.join(', ') });
    }
  });

  // Find LLDP-discovered links not present in the sheet (both endpoints must be topology devices)
  const orphans = [];
  const seenOrphanPairs = new Set();
  Object.entries(bridgeMap).forEach(([key, val]) => {
    const colon    = key.lastIndexOf(':');
    const localDev = key.slice(0, colon);
    const localIf  = key.slice(colon + 1);
    const remDev   = val.remoteDevice;
    const remIf    = val.remoteIface;
    if (!allDevicesData[localDev] || !allDevicesData[remDev]) return;
    const pairKey  = [localDev + ':' + localIf, remDev + ':' + remIf].sort().join('||');
    if (seenOrphanPairs.has(pairKey)) return;
    seenOrphanPairs.add(pairKey);
    const inSheet  = globalLinks.some(l => {
      const cu = l.u.lastIndexOf(':'), cv = l.v.lastIndexOf(':');
      const dU = l.u.slice(0, cu),  iU = _normLldpIface(l.u.slice(cu + 1));
      const dV = l.v.slice(0, cv),  iV = _normLldpIface(l.v.slice(cv + 1));
      return (dU === localDev && iU === localIf && dV === remDev && iV === remIf) ||
             (dV === localDev && iV === localIf && dU === remDev && iU === remIf);
    });
    if (!inSheet) orphans.push({ localDev, localIf, remDev, remIf });
  });

  return { results, orphans };
}

function _renderLldpResults(results, orphans) {
  const container = document.getElementById('bridgeResults');
  const list = document.getElementById('bridgeResultList');
  const badge = document.getElementById('bridgeSummaryBadge');

  const matched   = results.filter(r => r.status === 'match').length;
  const mismatched = results.filter(r => r.status === 'mismatch').length;
  const partial   = results.filter(r => r.status === 'partial').length;
  const unknown   = results.filter(r => r.status === 'unknown').length;
  const skipped   = results.filter(r => r.status === 'skip').length;
  const checkable = results.length - skipped;

  badge.textContent = matched + '/' + checkable + ' matched';
  badge.className = 'bridge-summary-badge ' + (mismatched > 0 ? 'badge-fail' : 'badge-ok');

  // Sort: mismatches first, then partial/unknown, then match, then skip
  const order = { mismatch: 0, partial: 1, unknown: 2, match: 3, skip: 4 };
  const sorted = [...results].sort((a, b) => order[a.status] - order[b.status]);

  const svgCheck = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const svgX     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  const svgQ     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
  const svgSkip  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;

  list.innerHTML = sorted.map(r => {
    let icon, cls, detail = '';
    if      (r.status === 'match')    { icon = svgCheck; cls = 'bridge-row-ok'; }
    else if (r.status === 'mismatch') { icon = svgX;     cls = 'bridge-row-fail'; detail = r.msg; }
    else if (r.status === 'partial')  { icon = svgQ;     cls = 'bridge-row-part'; detail = r.msg; }
    else if (r.status === 'unknown')  { icon = svgQ;     cls = 'bridge-row-unk';  detail = r.msg; }
    else                              { icon = svgSkip;   cls = 'bridge-row-skip'; detail = r.msg; }
    return `<div class="bridge-result-row ${cls}">
      <span class="bridge-row-icon">${icon}</span>
      <span class="bridge-row-cable">${r.u} ↔ ${r.v}</span>
      ${detail ? `<span class="bridge-row-detail">${detail}</span>` : ''}
    </div>`;
  }).join('');

  // Discovered links section
  const discEl   = document.getElementById('bridgeDiscovered');
  const discList = document.getElementById('bridgeDiscoveredList');
  if (orphans && orphans.length) {
    const svgPlus = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    discList.innerHTML = orphans.map((o, i) =>
      `<label class="bridge-disc-row">
        <input type="checkbox" class="bridge-disc-check" id="disc_${i}"
               data-pair="${encodeURIComponent(JSON.stringify(o))}">
        <span class="bridge-disc-cable">${o.localDev}:${o.localIf} ↔ ${o.remDev}:${o.remIf}</span>
      </label>`
    ).join('');
    document.getElementById('bridgeDiscHdr').innerHTML =
      `Discovered — not in sheet <span class="bridge-summary-badge" style="background:#ede9fe;color:#6d28d9;">${orphans.length} link${orphans.length !== 1 ? 's' : ''}</span>`;
    discEl.style.display = 'block';
  } else {
    discEl.style.display = 'none';
  }

  container.style.display = 'block';
  _setBridgeOrphanBadge(orphans ? orphans.length : 0);
}

function addSelectedDiscovered() {

/**
* Shared grouping logic for cabling export and copy functions.
* Returns { cableGroups, sheetIndexMap }.
* DUPLICATED in Code.gs (as _buildCableGroupsForTest) — last synced: 2026-04-20
*/
function buildCableGroups() {
  if (!currentData || !currentData.nodes) return { cableGroups: {}, sheetIndexMap: {} };
  const sheetOrderNames = currentData.nodes.map(n => n.id);
  const sheetIndexMap = {};
  sheetOrderNames.forEach((name, index) => sheetIndexMap[name] = index);

  const cableGroups = {};

  globalLinks.forEach(link => {
    let nodeA = allNodesData[link.u];
    let nodeB = allNodesData[link.v];
    if (!nodeA || !nodeB) return;

    let compareResult = nodeA.device.localeCompare(nodeB.device, undefined, { numeric: true, sensitivity: 'base' });
    let first = (compareResult <= 0) ? nodeA : nodeB;
    let second = (compareResult <= 0) ? nodeB : nodeA;

    // Snake self-loops (same device on both ends) are plain loopback cables.
    // Force non-breakout so a breakout primary port (e.g. Et14/4) doesn't create
    // a phantom breakout group — they always take Scenario B (one standard cable row).
    const isSelfLoop = nodeA.device === nodeB.device;

    // Non-Arista devices (IXIA, Spirent) use card/port slash notation (e.g. Et5/22)
    // that is NOT a QSFP-DD breakout — suppress breakout detection for their side.
    const devAIsNonArista = allDevicesData[first.device]?.type === 'non-arista';
    const devBIsNonArista = allDevicesData[second.device]?.type === 'non-arista';
    // xcvr_speed_ holds the physical transceiver speed (e.g. "100g-4" for QSFP-DD).
    // Fall back to et_speed_ if xcvr_speed_ is not set.
    let speedA_raw = (first.details.xcvr_speed_ || first.details.et_speed_ || "").trim();
    let speedB_raw = (second.details.xcvr_speed_ || second.details.et_speed_ || "").trim();
    if (speedA_raw.toLowerCase() === 'auto') speedA_raw = '';
    if (speedB_raw.toLowerCase() === 'auto') speedB_raw = '';

    // Breakout detection: port has slash AND is a multi-lane transceiver.
    // Two signals for multi-lane:
    //   1. xcvr_speed_ in aggregate format (e.g. "100g-4") — explicit lane count
    //   2. xcvr_type_ starts with QSFP/OSFP — multi-lane capable (e.g. QSFP100 in 4x25G mode
    //      stores xcvr_speed_="25g" per lane, not aggregate)
    // Chassis native SFP ports (e.g. Et3/1 SFP25) have slash but xcvr_type_="SFP25" (no QSFP
    // prefix) and no aggregate speed — correctly excluded.
    const aggA = speedA_raw.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
    const aggB = speedB_raw.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
    const xcvrA = (first.details.xcvr_type_  || "").trim();
    const xcvrB = (second.details.xcvr_type_ || "").trim();
    const isMultiLaneA = !!aggA || /^[OQ]SFP/i.test(xcvrA);
    const isMultiLaneB = !!aggB || /^[OQ]SFP/i.test(xcvrB);

    let isBreakoutA = !isSelfLoop && !devAIsNonArista && first.name.includes('/') && isMultiLaneA;
    let isBreakoutB = !isSelfLoop && !devBIsNonArista && second.name.includes('/') && isMultiLaneB;
    let phyPortA = (devAIsNonArista || !isBreakoutA) ? first.name : getPhysicalPortParent(first.name);
    let phyPortB = (devBIsNonArista || !isBreakoutB) ? second.name : getPhysicalPortParent(second.name);

    let groupKey;
    if (isBreakoutA && !isBreakoutB && aggA) {
      // A has aggregate xcvr_speed_ → confirmed QSFP-DD; group by phyPortA, drop B port
      groupKey = `${first.device}:${phyPortA} <-> ${second.device}`;
    } else if (isBreakoutB && !isBreakoutA && aggB) {
      // B has aggregate xcvr_speed_ → confirmed QSFP-DD; drop A port
      groupKey = `${first.device} <-> ${second.device}:${phyPortB}`;
    } else if (isBreakoutA && isBreakoutB && aggA && !aggB) {
      // Both slash but only A has aggregate speed → A is QSFP, B ports are individual SFPs
      groupKey = `${first.device}:${phyPortA} <-> ${second.device}`;
    } else if (isBreakoutA && isBreakoutB && aggB && !aggA) {
      // Both slash but only B has aggregate speed → B is QSFP, A ports are individual SFPs
      groupKey = `${first.device} <-> ${second.device}:${phyPortB}`;
    } else if (isBreakoutA && isBreakoutB && aggA && aggB) {
      // Both sides have aggregate speed → true breakout-to-breakout (Scenario A)
      groupKey = `${first.device}:${phyPortA} <-> ${second.device}:${phyPortB}`;
    } else {
      // No aggregate speed — slash is card/port style or standard cable; each link is its own
      groupKey = `${first.device}:${first.name} <-> ${second.device}:${second.name}`;
    }

    if (!cableGroups[groupKey]) {
      cableGroups[groupKey] = {
        devA: first.device, phyA: phyPortA,
        devB: second.device, phyB: phyPortB,
        isBreakoutA, isBreakoutB, links: [],
        speedA: first.details.xcvr_speed_ || first.details.et_speed_ || "",
        speedB: second.details.xcvr_speed_ || second.details.et_speed_ || "",
        xcvrA: first.details.xcvr_type_ || "",
        xcvrB: second.details.xcvr_type_ || ""
      };
    }
    cableGroups[groupKey].links.push({ portA: first.name, portB: second.name });
  });

  return { cableGroups, sheetIndexMap };
}

// Mirrors the Topology Patching List mixed-breakout detection:
// The QSFP aggregate side (Xg-N speed) is NOT "Breakout"; the SFP lane side IS.
// Falls back to port-slash notation only when speed cannot determine orientation.
function _breakoutSides(g) {
  const count = g.links.length;
  if (count <= 1) return { a: false, b: false };
  const sA = (g.speedA || "").trim().toLowerCase() === 'auto' ? '' : (g.speedA || "").trim();
  const sB = (g.speedB || "").trim().toLowerCase() === 'auto' ? '' : (g.speedB || "").trim();
  const lA = sA.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
  const lB = sB.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
  if (lA && !lB && parseInt(lA[2]) === count) return { a: false, b: true }; // A is QSFP aggregate
  if (lB && !lA && parseInt(lB[2]) === count) return { a: true, b: false }; // B is QSFP aggregate
  // Convert speed string to Gbps for ratio comparison — handles both g (Gbps) and t (Tbps) suffixes.
  const _gbps = s => { const m = s.match(/^(\d+(?:\.\d+)?)(g|t)/i); return m ? Math.round(parseFloat(m[1]) * (/t/i.test(m[2]) ? 1000 : 1)) : 0; };
  const sAn = _gbps(sA);
  const sBn = _gbps(sB);
  if (sAn > 0 && sBn > 0 && sAn !== sBn) {
    if (sAn * count === sBn) return { a: true, b: false };  // A is SFP lane
    if (sBn * count === sAn) return { a: false, b: true };  // B is SFP lane
  }
  // Fallback: port-slash tells us which side is the QSFP-DD breakout aggregate.
  // The slash side is the QSFP aggregate (bo=false = no Breakout label, collapsed to phyPort);
  // the plain side is the lane endpoint (bo=true = Breakout label, individual ports shown).
  if (g.isBreakoutA && !g.isBreakoutB) return { a: false, b: true };
  if (g.isBreakoutB && !g.isBreakoutA) return { a: true, b: false };
  return { a: false, b: false };
}

// Sort cable groups: primary = anchor device sheet index (lowest), secondary = anchor port (natural).
// Also sorts g.links within each group by portA then portB (natural) so breakout lanes appear in order.
function _sortCableGroups(cableGroups, sheetIndexMap) {
  return Object.values(cableGroups)
    .map(g => {
      g.links.sort((la, lb) => {
        const ca = la.portA.localeCompare(lb.portA, undefined, { numeric: true });
        return ca !== 0 ? ca : la.portB.localeCompare(lb.portB, undefined, { numeric: true });
      });
      return g;
    })
    .sort((a, b) => {
      // devA is always alphabetically first (fixed by buildCableGroups).
      // Sort by devA's sheet position first, then devA's port — consistently left-side anchored.
      const ia = sheetIndexMap[a.devA] ?? 9999;
      const ib = sheetIndexMap[b.devA] ?? 9999;
      if (ia !== ib) return ia - ib;
      return a.phyA.localeCompare(b.phyA, undefined, { numeric: true });
    });
}

function copyCablingCsv() {
  if (!currentData || !currentData.nodes) { alert('No topology data found. Please refresh.'); return; }
  const { cableGroups, sheetIndexMap } = buildCableGroups();
  const sorted = _sortCableGroups(cableGroups, sheetIndexMap);
  const cleanSpeed = s => { const v = (s || "").trim(); if (v.toLowerCase() === 'auto') return ''; if (v.toUpperCase().includes('BASE-T')) return '1g'; return v; };
  const xcvrLabel = (x, bo) => { const v = (x || "").trim(); return bo ? (v ? `${v} (Breakout)` : "(Breakout)") : v; };
  const q = s => `"${String(s).replace(/"/g, '""')}"`;
  const devModel = name => (deviceMetadata[name] || {}).model || (devStatusMap[name] || {}).platform || '';
  const devRack  = name => (deviceMetadata[name] || {}).rack || '';
  const rows = ['Device A,Model A,Rack A,Port A,Xcvr A,Speed A,Speed B,Xcvr B,Port B,Device B,Model B,Rack B'];
  sorted.forEach(g => {
    const bo = _breakoutSides(g);
    const isMulti = g.links.length > 1;
    // Scenario A (QSFP/OSFP ↔ QSFP/OSFP, laser lane split): physically ONE cable.
    // Splitter cables are always 1-to-N: one QSFP/OSFP aggregate end → 2, 4, or 8 individual SFP ends.
    // Two QSFP/OSFP connectors facing each other = single cable (laser lane split), never dual harnesses.
    // So both-side slash + both-side aggX = single cable → one row.
    const linksToRender = (isMulti && g.isBreakoutA && g.isBreakoutB) ? [g.links[0]] : g.links;
    linksToRender.forEach(l => {
      const portA = (isMulti && !bo.a) ? g.phyA : l.portA;
      const portB = (isMulti && !bo.b) ? g.phyB : l.portB;
      rows.push([
        q(g.devA), q(devModel(g.devA)), q(devRack(g.devA)),
        q(portA), q(xcvrLabel(g.xcvrA, bo.a)), q(cleanSpeed(g.speedA)),
        q(cleanSpeed(g.speedB)), q(xcvrLabel(g.xcvrB, bo.b)), q(portB),
        q(g.devB), q(devModel(g.devB)), q(devRack(g.devB))
      ].join(','));
    });
  });
  handleCopy(rows.join('\n'), 'btnCablingCsv');
}

function _buildCablingMarkdownStr() {
  if (!currentData || !currentData.nodes) return '';
  const { cableGroups, sheetIndexMap } = buildCableGroups();
  const sorted = _sortCableGroups(cableGroups, sheetIndexMap);
  const cleanSpeed = s => { const v = (s || "").trim(); if (v.toLowerCase() === 'auto') return ''; if (v.toUpperCase().includes('BASE-T')) return '1g'; return v; };
  const xcvrLabel = (x, bo) => { const v = (x || "").trim(); return bo ? (v ? `${v} (Breakout)` : "(Breakout)") : v; };
  const esc = s => String(s).replace(/\|/g, '\\|');
  const devModel = name => (deviceMetadata[name] || {}).model || (devStatusMap[name] || {}).platform || '';
  const devRack  = name => (deviceMetadata[name] || {}).rack || '';
  const lines = [
    '| Device A | Model A | Rack A | Port A | Xcvr A | Speed A | Speed B | Xcvr B | Port B | Device B | Model B | Rack B |',
    '|---|---|---|---|---|---|---|---|---|---|---|---|'
  ];
  sorted.forEach(g => {
    const bo = _breakoutSides(g);
    const isMulti = g.links.length > 1;
    // Scenario A (QSFP/OSFP ↔ QSFP/OSFP, laser lane split): physically ONE cable.
    // Splitter cables are always 1-to-N: one QSFP/OSFP aggregate end → 2, 4, or 8 individual SFP ends.
    // Two QSFP/OSFP connectors facing each other = single cable (laser lane split), never dual harnesses.
    // So both-side slash + both-side aggX = single cable → one row.
    const linksToRender = (isMulti && g.isBreakoutA && g.isBreakoutB) ? [g.links[0]] : g.links;
    linksToRender.forEach(l => {
      const portA = (isMulti && !bo.a) ? g.phyA : l.portA;
      const portB = (isMulti && !bo.b) ? g.phyB : l.portB;
      lines.push(`| ${esc(g.devA)} | ${esc(devModel(g.devA))} | ${esc(devRack(g.devA))} | ${esc(portA)} | ${esc(xcvrLabel(g.xcvrA, bo.a))} | ${esc(cleanSpeed(g.speedA))} | ${esc(cleanSpeed(g.speedB))} | ${esc(xcvrLabel(g.xcvrB, bo.b))} | ${esc(portB)} | ${esc(g.devB)} | ${esc(devModel(g.devB))} | ${esc(devRack(g.devB))} |`);
    });
  });
  return lines.join('\n');
}

function copyCablingMarkdown() {
  if (!currentData || !currentData.nodes) { alert('No topology data found. Please refresh.'); return; }
  handleCopy(_buildCablingMarkdownStr(), 'btnCablingMd');

      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      finish();
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = prompt;
    ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;user-select:text;-webkit-user-select:text;';

    ta.select();
    try { document.execCommand('copy'); } catch(e) {}

    finish();
