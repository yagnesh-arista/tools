// --- HELPER FUNCTIONS ---
function debounce(func, wait) {
  let timeout;
  const debounced = function (...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
  debounced.cancel = function () { clearTimeout(timeout); };
  return debounced;
}

/**
* LAYOUT MANAGER
* Automatically adjusts the Canvas (Viewport) top position so it never
* overlaps with the Toolbar, regardless of how many rows are visible.
*/
function initLayoutObserver() {
  const toolbar = document.getElementById("mainToolbar");
  const minBar = document.getElementById("minimizedBar");
  const viewport = document.getElementById("viewport");

  if (!viewport) return;

  const adjustTop = () => {
    let newTop = 0;

    // 1. Minimized Mode
    if (minBar && getComputedStyle(minBar).display !== "none") {
      newTop = minBar.offsetHeight;
    }
    // 2. Normal Mode (Toolbar Visible)
    else if (toolbar && getComputedStyle(toolbar).display !== "none") {
      // Calculate total height: Toolbar offset + height
      newTop = toolbar.offsetTop + toolbar.offsetHeight;
    }

    // Apply to Viewport (Add small buffer)
    viewport.style.top = (newTop + 5) + "px";
  };

  // Observer: Watches for Toolbar height changes (e.g. Copy Row appearing)
  if (toolbar) {
    new ResizeObserver(adjustTop).observe(toolbar);
  }

  // Initial Adjustment
  adjustTop();

  // Expose for manual calls
  window.adjustLayout = adjustTop;
}

// --- THEME MANAGEMENT ---
function initTheme() {
  const saved = localStorage.getItem('portmap-theme');
  if (saved === 'dark') {
    document.documentElement.removeAttribute('data-theme'); // force dark
  } else if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    // No saved pref — respect OS preference; default to light
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (!prefersDark) document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeIcon();
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('portmap-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('portmap-theme', 'light');
  }
  updateThemeIcon();
}

      let st = document.getElementById("status");
      setStatus("Topology restored from cache (Checking for updates…)");

      // Background Fetch — auto-verify to confirm session cache == actual.
      // silent=true: topology already visible, keep "Topology restored from cache" in status.
      fetchData(false, true, true);
    } else {
      // Cold Start: try GAS cache first for instant render, then auto-verify
      fetchData(false, true);
    }

    if (typeof bindGlobalSearchListeners === 'function') {
      bindGlobalSearchListeners();
    }

  }
  startSmartPolling();
}

function startSmartPolling() {
  if (smartPollTimer) clearInterval(smartPollTimer);

  // Check every 4 seconds (Balance between load and responsiveness)
  smartPollTimer = setInterval(() => {
    // 1. EDIT MODE GUARD
    if (typeof isEditMode !== 'undefined' && isEditMode) return;

    // 2. FETCH GUARD — skip if a fetchData is already in flight (prevents concurrent GAS executions writing to the same TOPOLOGY_STATUS cache key, which causes phase flickering)
    if (isFetching) return;

    // 3. LOADING GUARD
    const overlay = document.getElementById('loading-overlay');
    if (overlay && overlay.style.display !== 'none' && !overlay.classList.contains('hidden')) return;

    // 4. VISIBILITY GUARD (Don't poll if tab is backgrounded to save quotas)
    if (document.hidden) return;

    google.script.run
      .withSuccessHandler(serverVersion => {
        if (serverVersion && serverVersion !== localDataVersion) {
          dbg("Change detected (v" + serverVersion + ")! Refreshing...");
          localDataVersion = serverVersion;
          fetchData(false);
        }
      })
      .withFailureHandler(e => console.warn("Poll failed (ignoring)", e))
      .getDataVersion();

  }, 4000);
}

// Shared helper — builds currentDeviceList from raw server response and snapshots state
function applyDeviceListFromServer(devices) {
  let aristaCounter = 0;
  currentDeviceList = devices.map((d, index) => {
    let name = d.name || d;
    let isNonArista = d.type === 'non-arista';
    let origTID = index + 1;
    let origDID = "-";
    if (!isNonArista) { aristaCounter++; origDID = aristaCounter; }
    return {
      name: name,
      originalName: name,
      type: isNonArista ? 'non-arista' : 'full',
      _origTID: origTID,
      _origDID: origDID,
      isVisible: d.isVisible,
      labels: d.labels || [],
      hostname: d.hostname || "",
      role: d.role || "",
      mlagPeer: d.mlagPeer || "",
      model: d.model || "",
      rack: d.rack || ""
    };
  });
  // Sync deviceMetadata global so cabling report has model/rack even if Device Manager stays closed
  currentDeviceList.forEach(d => {
    if (d.model || d.rack) deviceMetadata[d.name] = { model: d.model || '', rack: d.rack || '' };
  });
  initialDeviceState = JSON.stringify(currentDeviceList);
  isDeviceListDirty = false;
  updateDeviceSaveButton();
}

// Called automatically when topology refreshes — silently syncs the device manager

function silentRefreshDeviceManager() {
  const modal = document.getElementById("reorderModal");
  if (!modal || modal.style.display === 'none' || isDeviceListDirty) return;

  google.script.run.withSuccessHandler(devices => {
    // Guard again: user may have started editing while the server call was in-flight
    if (isDeviceListDirty) return;
    applyDeviceListFromServer(devices);
    renderManagerList();
  }).getExistingDevices();
}

    const isRoleManaged = (devObj.role === 'IXIA' || devObj.role === 'SPIRENT');
    let typeBadge;
    if (isRoleManaged) {
      typeBadge = `<span class="non-arista-badge" title="Non-EOS driven by role">Non-EOS</span>`;
    } else if (isNonArista) {
      typeBadge = `<button class="type-toggle-btn type-toggle-nonarista" onclick="setDeviceType(${index})" title="Non-EOS — click to restore as EOS (requires Force Sync)">Non-EOS</button>`;
    } else {
      typeBadge = `<button class="type-toggle-btn" onclick="setDeviceType(${index})" title="EOS — click to mark as Non-EOS (requires Force Sync)">EOS</button>`;
    }

    const isPendingDelete = (index === pendingDeleteIndex);
    if (isPendingDelete) {
      li.style.background = 'rgba(239,68,68,0.08)';
      li.style.outline = '1px solid rgba(239,68,68,0.35)';
    }

    const deleteCell = isPendingDelete
      ? `<div class="col-center" style="gap:3px;display:flex;">
           <button onclick="confirmRemoveDevice()" title="Confirm delete" style="font-size:10px;padding:2px 6px;background:#ef4444;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;display:inline-flex;align-items:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
           <button onclick="cancelRemoveDevice()" title="Cancel" style="font-size:10px;padding:2px 5px;background:var(--bg-secondary);color:var(--text-muted);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
         </div>`
      : `<div class="col-center"><button class="btn-icon-delete" onclick="removeDeviceFromList(${index})" style="display:inline-flex;align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;

    const roleVal = devObj.role || '';
    const roleOptions = ['', ...DEVICE_ROLE_OPTIONS].map(r =>
      `<option value="${r}" ${roleVal === r ? 'selected' : ''}>${r || '—'}</option>`
    ).join('');
    const safeId = devObj.name.replace(/[^a-zA-Z0-9_-]/g, '_');
    const dsPlat = (devStatusMap[devObj.name] || {}).platform || '';
    const modelPlaceholder = dsPlat || 'e.g. 7050CX3-32S';

    const mlagPeerVal = devObj.mlagPeer || '';
    const mlagPeerOptions = ['', ...currentDeviceList
      .filter(d => d.name !== devObj.name && d.type !== 'non-arista')
      .map(d => d.name)
    ].map(n => `<option value="${n}" ${mlagPeerVal === n ? 'selected' : ''}>${n || '—'}</option>`).join('');

    li.innerHTML = `
<div class="col-center"><span class="reorder-handle"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span></div>
<div class="col-center" title="Toggle Visibility">
<input type="checkbox" style="cursor:pointer;" ${isChecked}
onchange="toggleDeviceVisibility(${index})">
</div>
<div class="col-center">${tidHtml}</div>
<div class="col-center">${didHtml}</div>
<div class="col-left"><div class="dev-name-cell">${nameDisplay}${hostnameHtml}</div></div>
<div class="col-center"><button class="btn-icon-edit" onclick="promptRenameDevice(${index})" style="display:inline-flex;align-items:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div>
<div class="col-center">${typeBadge}</div>
<div class="dev-role-cell"><select class="role-select" onchange="setDeviceRole(${index},this.value)" title="Device role — drives VXLAN/EVPN config generation">${roleOptions}</select></div>
<div class="dev-role-cell"><select class="role-select mlag-peer-select" onchange="setDeviceMlagPeer(${index},this.value)" title="MLAG peer — explicit pair declaration; server enforces bidirectionality">${mlagPeerOptions}</select></div>
<div class="dev-label-cell" data-label-index="${index}">${renderDeviceLabelPills(devObj.labels || [], index)}</div>
${deleteCell}
<div class="dev-meta-row">
  <span class="dev-meta-label">Model</span>
  <input class="dev-meta-inp" id="devModel_${safeId}" type="text" value="${escapeHtml(devObj.model || '')}" placeholder="${escapeHtml(modelPlaceholder)}" spellcheck="false" oninput="updateDeviceMeta(${index},'model',this.value)">
  <span class="dev-meta-label">Rack</span>
  <input class="dev-meta-inp" id="devRack_${safeId}" type="text" value="${escapeHtml(devObj.rack || '')}" placeholder="e.g. R14" spellcheck="false" oninput="updateDeviceMeta(${index},'rack',this.value)">
</div>
`;
    listEl.appendChild(li);
  });

  if (sortableInstance) {
    sortableInstance.destroy();
    sortableInstance = null;
  }

  if (window.Sortable) {
    new Sortable(listEl, {
      animation: 150, handle: '.reorder-handle', ghostClass: 'sortable-ghost',
      onEnd: function (evt) {
        const item = currentDeviceList.splice(evt.oldIndex, 1)[0];
        currentDeviceList.splice(evt.newIndex, 0, item);
        pendingDeleteIndex = -1;
        checkForChanges();
        renderManagerList();
      }
    });
  }
}

// --- DEVICE LABEL HELPERS ---

function renderDeviceLabelPills(labels, index) {
  if (!labels || labels.length === 0) {
    return `<button class="dev-label-add-btn" onclick="openLabelPicker(${index})">+ label</button>`;
  }
  let html = '';
  labels.forEach(lbl => {
    const c = ROLE_COLORS[lbl] || { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' };
    html += `<span class="dev-label-pill" style="background:${c.bg};color:${c.text};border-color:${c.border};"
      onclick="openLabelPicker(${index})">${lbl}</span>`;
  });
  return html;
}

function buildLabelsMap() {
  const map = {};
  currentDeviceList.forEach(d => {
    if (d.labels && d.labels.length > 0) map[d.name] = d.labels;
  });
  return map;
}

function buildHostnamesMap() {
  const map = {};
  currentDeviceList.forEach(d => {
    if (d.hostname && d.hostname.trim()) map[d.name] = d.hostname.trim();
  });
  return map;
}

function buildRolesMap() {
  const map = {};
  currentDeviceList.forEach(d => {
    if (d.role && d.role.trim()) map[d.name] = d.role.trim().toUpperCase();
  });
  return map;
}

function setDeviceType(index) {
  const dev = currentDeviceList[index];
  if (!dev) return;
  const role = (dev.role || '').toUpperCase();
  if (role === 'IXIA' || role === 'SPIRENT') return; // role-managed, toggle disabled
  dev.type = dev.type === 'non-arista' ? 'full' : 'non-arista';
  checkForChanges();
  renderManagerList();
}

function setDeviceRole(index, value) {
  const dev = currentDeviceList[index];
  if (!dev) return;
  dev.role = value ? value.toUpperCase() : '';
  checkForChanges();
  renderManagerList();
}

function buildMlagPeersMap() {
  const map = {};
  currentDeviceList.forEach(d => {
    map[d.name] = d.mlagPeer || '';
  });
  return map;
}

function setDeviceMlagPeer(index, value) {
  const dev = currentDeviceList[index];
  if (!dev) return;
  dev.mlagPeer = value || '';
  checkForChanges();
  renderManagerList();
}

function buildMetadataMap() {
  const map = {};
  currentDeviceList.forEach(d => {
    const model = (d.model || '').trim();
    const rack  = (d.rack  || '').trim();
    if (model || rack) map[d.name] = { model, rack };
  });
  return map;
}

function updateDeviceMeta(index, field, value) {
  const dev = currentDeviceList[index];
  if (!dev) return;
  dev[field] = value;
  checkForChanges();
}

function openLabelPicker(index) {
  const existing = document.getElementById('labelEditorRow');
  if (existing && existing.dataset.labelEditorFor == index) {
    closeLabelPicker();
    return;
  }
  closeLabelPicker();
  // Find the li row for this device
  const cell = document.querySelector(`[data-label-index="${index}"]`);
  if (!cell) return;
  const li = cell.closest('li');
  if (!li) return;

  const sub = document.createElement('li');
  sub.id = 'labelEditorRow';
  sub.dataset.labelEditorFor = index;
  sub.innerHTML = buildLabelEditorHTML(index);
  li.after(sub);
}

function buildLabelEditorHTML(index) {
  const dev = currentDeviceList[index];
  const current = dev ? (dev.labels || []) : [];
  const maxReached = current.length >= 5;
  // All labels are custom — no predefined chips
  let customChips = '';
  current.forEach(lbl => {
    const c = ROLE_COLORS[lbl] || { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' };
    customChips += `<span style="display:inline-flex;align-items:center;gap:2px;background:${c.bg};color:${c.text};border:1px solid ${c.border};border-radius:3px;padding:1px 4px;font-size:10px;font-weight:700;letter-spacing:0.3px;">${lbl}<button onclick="toggleDeviceLabel(${index},'${lbl}')" title="Remove ${lbl}" style="background:none;border:none;cursor:pointer;color:${c.text};padding:0 0 0 2px;line-height:1;display:inline-flex;align-items:center;"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>`;
  });

  const customDisabled = maxReached ? 'disabled' : '';
  const customPlaceholder = maxReached ? 'Max 5 reached' : 'Custom label…';
  return `<div class="label-editor-row">
    <span style="font-size:10px;font-weight:700;color:#94a3b8;white-space:nowrap;">TAGS:</span>
    <div style="display:flex;flex-wrap:wrap;gap:4px;flex:1;">${customChips}</div>
    <input id="customLabelInput_${index}" type="text" maxlength="16" placeholder="${customPlaceholder}"
      ${customDisabled}
      style="font-size:10px;padding:2px 6px;border:1px solid #cbd5e1;border-radius:4px;width:90px;height:20px;font-family:'JetBrains Mono',monospace;${maxReached ? 'opacity:0.4;' : ''}"
      onkeydown="if(event.key==='Enter'){addCustomLabel(${index})}"
      onclick="event.stopPropagation()">
    <button onclick="addCustomLabel(${index})" ${customDisabled}
      style="font-size:10px;padding:2px 6px;background:#3b82f6;color:white;border:none;border-radius:4px;cursor:${maxReached ? 'not-allowed' : 'pointer'};height:20px;font-family:'JetBrains Mono',monospace;${maxReached ? 'opacity:0.4;' : ''}">Add</button>
    <button onclick="closeLabelPicker()" class="label-editor-done" style="display:inline-flex;align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`;
}

function addCustomLabel(index) {
  const input = document.getElementById(`customLabelInput_${index}`);
  if (!input) return;
  const val = input.value.trim().toUpperCase();
  if (!val) return;
  toggleDeviceLabel(index, val);
}

function closeLabelPicker() {
  const sub = document.getElementById('labelEditorRow');
  if (sub) sub.remove();
}

function toggleDeviceLabel(index, label) {
  const dev = currentDeviceList[index];
  if (!dev.labels) dev.labels = [];
  const i = dev.labels.indexOf(label);
  if (i !== -1) dev.labels.splice(i, 1);
  else if (dev.labels.length < 5) dev.labels.push(label);

  // Update the pill display in the row
  const cell = document.querySelector(`[data-label-index="${index}"]`);
  if (cell) cell.innerHTML = renderDeviceLabelPills(dev.labels, index);

  checkForChanges();

  // Refresh the editor sub-row in place (keep it open)
  const sub = document.getElementById('labelEditorRow');
  if (sub && sub.dataset.labelEditorFor == index) sub.innerHTML = buildLabelEditorHTML(index);
}

// Checks if current state differs from the initial snapshot
function checkForChanges() {
  const currentState = JSON.stringify(currentDeviceList);
  isDeviceListDirty = (currentState !== initialDeviceState);
  updateDeviceSaveButton();
}

function addDevicesToList() {
  const input = document.getElementById("newDeviceInput");
  const btn = document.getElementById("btnAddDevice");
  const isNonArista = document.getElementById("chkNonArista").checked;
  const val = input.value.trim();

  if (!val) { input.focus(); return; }

  const originalText = "Add";
  const originalBg = btn.style.background || "#3b82f6";

  btn.innerText = "Adding...";
  btn.disabled = true;
  btn.style.opacity = "0.7";

  google.script.run.withSuccessHandler(newDevNames => {
    if (!newDevNames || newDevNames.length === 0) {
      alert("No valid devices found.");
      resetAddBtn();
      return;
    }

    let addedCount = 0;
    newDevNames.forEach(name => {
      const exists = currentDeviceList.some(d => d.name.toLowerCase() === name.toLowerCase());
      if (!exists) {
        // ID STRATEGY: Mark as "NEW".
        // The render loop will assign the next sequential number (e.g., 3) automatically.
        currentDeviceList.push({
          name: name,
          originalName: name,
          type: isNonArista ? 'non-arista' : 'full',
          role: '',
          mlagPeer: '',
          _origTID: "NEW",
          _origDID: "NEW",
          isVisible: true,
          labels: [],
          hostname: ""
        });
        addedCount++;
      }
    });

    if (addedCount > 0) {
      checkForChanges();
      input.value = "";
      renderManagerList();

      const scrollContainer = document.getElementById("reorderScrollContainer");
      if (scrollContainer) {
        setTimeout(() => { scrollContainer.scrollTop = scrollContainer.scrollHeight; }, 50);
      }

      btn.innerText = "Added!";
      btn.style.background = "#10b981";
      setTimeout(() => { resetAddBtn(); }, 1200);
    } else {
      alert("Device(s) already in the list.");
      resetAddBtn();
    }
    input.focus();

  }).withFailureHandler(err => {
    alert("Error: " + err.message);
    resetAddBtn();
  }).parseAndExpandDevices(val);

  function resetAddBtn() {
    btn.innerText = originalText;
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.background = originalBg;
  }
}

function removeDeviceFromList(index) {
  pendingDeleteIndex = index;
  renderManagerList();
}

function confirmRemoveDevice() {
  if (pendingDeleteIndex >= 0) {
    currentDeviceList.splice(pendingDeleteIndex, 1);
    pendingDeleteIndex = -1;
    checkForChanges();
    renderManagerList();
  }
}

function cancelRemoveDevice() {
  pendingDeleteIndex = -1;
  renderManagerList();
}

function toggleDeviceVisibility(index) {
  if (currentDeviceList[index]) {
    currentDeviceList[index].isVisible = !currentDeviceList[index].isVisible;
    checkForChanges(); // Marks button as "Save *"
  }
}

function promptRenameDevice(index) {
  const existing = document.getElementById('deviceEditRow');
  if (existing && existing.dataset.editFor == index) { closeDeviceEditor(); return; }
  closeDeviceEditor();

  const items = document.querySelectorAll('#reorderList .reorder-item');
  const li = items[index];
  if (!li) return;

  const dev = currentDeviceList[index];
  const editorLi = document.createElement('li');
  editorLi.id = 'deviceEditRow';
  editorLi.dataset.editFor = index;
  editorLi.className = 'device-edit-row';
  const inputStyle = 'width:100%;box-sizing:border-box;font-family:"JetBrains Mono",monospace;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:3px;background:var(--bg-secondary);color:var(--text-main);';
  editorLi.innerHTML = `
    <div class="device-edit-form">
      <div class="device-edit-field">
        <label>DNS Name <span style="color:#ef4444;">*</span></label>
        <input type="text" id="editDeviceName" value="${escapeHtml(dev.name)}" placeholder="e.g. leaf1" style="${inputStyle}">
      </div>
      <div class="device-edit-field">
        <label>Hostname <span style="color:var(--text-muted);">(optional — shown in sheet Row 1 &amp; EOS config)</span></label>
        <input type="text" id="editDeviceHostname" value="${escapeHtml(dev.hostname || '')}" placeholder="e.g. LAB-DC1-Leaf1" style="${inputStyle}">
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button onclick="applyDeviceEdit(${index})" style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 12px;background:#3b82f6;color:#fff;border:none;border-radius:3px;cursor:pointer;font-weight:700;">Apply</button>
        <button onclick="closeDeviceEditor()" style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;background:var(--bg-secondary);color:var(--text-muted);border:1px solid var(--border);border-radius:3px;cursor:pointer;">Cancel</button>
      </div>
      <div id="editDeviceError" style="color:#ef4444;font-size:10px;margin-top:4px;display:none;font-family:'JetBrains Mono',monospace;"></div>
    </div>`;
  li.after(editorLi);
  const nameInput = document.getElementById('editDeviceName');
  nameInput.focus();
  nameInput.select();
  nameInput.addEventListener('keydown', e => { if (e.key === 'Escape') closeDeviceEditor(); });
  document.getElementById('editDeviceHostname').addEventListener('keydown', e => { if (e.key === 'Escape') closeDeviceEditor(); });
}

function closeDeviceEditor() {
  const el = document.getElementById('deviceEditRow');
  if (el) el.remove();
}

function applyDeviceEdit(index) {
  const nameInput = document.getElementById('editDeviceName');
  const hostnameInput = document.getElementById('editDeviceHostname');
  const errorDiv = document.getElementById('editDeviceError');

  const newName = nameInput.value.trim();
  const newHostname = hostnameInput.value.trim();

  if (!newName || !/^[a-zA-Z0-9_\-]{1,64}$/.test(newName)) {
    errorDiv.textContent = 'DNS name: alphanumeric, hyphens, underscores only (max 64 chars).';
    errorDiv.style.display = 'block';
    nameInput.focus();
    return;
  }
  const isDuplicate = currentDeviceList.some((d, i) => i !== index && d.name.toLowerCase() === newName.toLowerCase());
  if (isDuplicate) {
    errorDiv.textContent = 'DNS name already exists in the list.';
    errorDiv.style.display = 'block';
    nameInput.focus();
    return;
  }

  currentDeviceList[index].name = newName;
  currentDeviceList[index].hostname = newHostname;
  closeDeviceEditor();
  checkForChanges();
  renderManagerList();
}

/**
* UPDATED SAVE LOGIC (Optimized)
* Skips spreadsheet rebuild if only "Visibility" changed.
*/
/* --- UPDATED SAVE LOGIC (Fixes 1->2 Persisting Issue) --- */
function saveDeviceChanges() {
  const btn = document.getElementById("btnSaveOrder");
  const origText = "Save Changes";

  btn.innerText = "Analyzing...";
  btn.disabled = true;

  // 1. Detect Structural Changes
  let initialList = [];
  try { initialList = JSON.parse(initialDeviceState); } catch (e) { }

  const currentStructure = JSON.stringify(currentDeviceList.map(d => ({ name: d.name, type: d.type, hostname: d.hostname || "" })));
  const initialStructure = JSON.stringify(initialList.map(d => ({ name: d.name, type: d.type, hostname: d.hostname || "" })));

  const isStructureDirty = (currentStructure !== initialStructure);

  // 2. Prepare Hidden List
  const hiddenList = [];
  currentDeviceList.forEach(d => {
    if (!d.isVisible) hiddenList.push(d.name);
  });

  // --- DEFINITION: Success Handler ---
  const handleSuccess = () => {
    btn.innerText = "Saved!";
    btn.style.background = "#10b981"; // Green

    // ============================================================
    // 🛑 CRITICAL FIX: COMMIT NEW BASELINE (Reset IDs to match new order)
    // ============================================================
    let tempAristaCounter = 0;

    currentDeviceList.forEach((d, index) => {
      const isNonArista = (d.type === 'non-arista');

      // 1. Commit Name (Clear "Rename" status)
      d.originalName = d.name;

      // 2. Commit Topology ID (Linear 1..N)
      d._origTID = index + 1;

      // 3. Commit Device ID (Selective Increment)
      if (!isNonArista) {
        tempAristaCounter++;
        d._origDID = tempAristaCounter; // e.g. Becomes '2' permanently
      } else {
        d._origDID = "-";
      }
    });
    // ============================================================

    // Reset Dirty Flags using the UPDATED list
    initialDeviceState = JSON.stringify(currentDeviceList);
    isDeviceListDirty = false;

    setTimeout(() => {
      // 1. Reset UI
      btn.innerText = origText;
      btn.disabled = false;
      btn.style.background = "";

      checkForChanges();
      renderManagerList(); // Will now render Blue IDs (e.g. "2")

      // 2. TRIGGER REFRESH
      dbg("Triggering Auto-Refresh...");
      if (typeof showGlobalLoading === 'function') showGlobalLoading("Updating Topology...");
      if (typeof fetchData === "function") fetchData(true);

    }, 1000);
  };

  const handleError = (err) => {
    alert("Error: " + err.message);
    btn.innerText = origText;
    btn.disabled = false;
    btn.style.background = "";
  };

  // Helper: save hostnames then call final success handler
  const saveHostnamesAndFinish = () => {
    google.script.run
      .withSuccessHandler(handleSuccess)
      .withFailureHandler(handleError)
      .saveDeviceHostnames(buildHostnamesMap());
  };

  // Helper: save mlag peers → done
  const saveMetadataAndFinish = () => {
    google.script.run
      .withSuccessHandler(() => {
        deviceMetadata = buildMetadataMap();
        _refreshModelLines();
        handleSuccess();
      })
      .withFailureHandler(handleError)
      .saveDeviceMetadata(buildMetadataMap());
  };

  const saveMlagPeersAndFinish = () => {
    google.script.run
      .withSuccessHandler(saveMetadataAndFinish)
      .withFailureHandler(handleError)
      .saveDeviceMlagPeers(buildMlagPeersMap());
  };

  // Helper: save roles → mlag peers → done
  const saveRolesAndFinish = () => {
    const rolesMap = buildRolesMap();
    const nonAristaRoles = new Set(['IXIA', 'SPIRENT']);
    // Role-based non-Arista (IXIA/SPIRENT) — handled server-side by saveDeviceRoles()
    const changedDevs = Object.entries(rolesMap).filter(([, r]) => nonAristaRoles.has(r)).map(([name]) => name);
    // Manually toggled non-EOS devices (not IXIA/SPIRENT role)
    const manualNonArista = currentDeviceList
      .filter(d => d.type === 'non-arista' && !nonAristaRoles.has((d.role || '').toUpperCase()))
      .map(d => d.name);
    // Show Force Sync notice for all devices that need column collapse/expand
    const allNonArista = [...changedDevs, ...manualNonArista];
    if (allNonArista.length > 0) _nonAristaSyncNotice = allNonArista;
    google.script.run
      .withSuccessHandler(saveMlagPeersAndFinish)
      .withFailureHandler(handleError)
      .saveDeviceRoles(rolesMap, manualNonArista);
  };

  // Helper: save labels → roles → mlag peers → done
  const saveLabelsAndFinish = () => {
    google.script.run
      .withSuccessHandler(saveRolesAndFinish)
      .withFailureHandler(handleError)
      .saveDeviceLabels(buildLabelsMap());
  };

  // --- EXECUTION BRANCHING ---

  if (!isStructureDirty) {
    // ⚡ FAST PATH (Visibility + Labels)
    // Save hostnames FIRST — before saveDeviceLabels bumps DATA_VERSION.
    // If hostnames were saved after the version bump, a poller-triggered fetch
    // could read stale (empty) hostname data and cache it, then block the
    // forced refresh in handleSuccess via the isFetching guard.
    dbg("Fast Path: Saving hostnames then visibility + labels...");
    btn.innerText = "Saving...";

    google.script.run
      .withSuccessHandler(() => {
        google.script.run
          .withSuccessHandler(saveLabelsAndFinish)
          .withFailureHandler(handleError)
          .saveDeviceVisibility(hiddenList);
      })
      .withFailureHandler(handleError)
      .saveDeviceHostnames(buildHostnamesMap());

  } else {
    // 🐢 SLOW PATH (Reorder/Rename + Visibility + Labels)
    // Pass hostnamesMap to processDeviceBatch so it saves hostnames BEFORE
    // bumping DATA_VERSION — same race-condition fix as the fast path.
    dbg("Slow Path: Rebuilding sheet...");
    btn.innerText = "Reordering Sheet...";
    showGlobalLoading('🔍 Preparing sheet rebuild...');
    const rebuildPollTimer = setInterval(() => {
      google.script.run.withSuccessHandler(msg => {
        if (!msg) return;
        const msgEl = document.getElementById('loading-message');
        if (msgEl) msgEl.innerText = msg;
      }).getSyncStatus();
    }, 600);

    const renames = currentDeviceList.filter(d => d.name !== d.originalName).map(d => ({ old: d.originalName, new: d.name }));
    const finalOrder = currentDeviceList.map(d => ({ name: d.name, type: d.type, hostname: d.hostname || "" }));

    google.script.run
      .withSuccessHandler(() => {
        clearInterval(rebuildPollTimer);
        hideGlobalLoading();
        google.script.run
          .withSuccessHandler(saveLabelsAndFinish)
          .withFailureHandler(handleError)
          .saveDeviceVisibility(hiddenList);
      })
      .withFailureHandler(err => {
        clearInterval(rebuildPollTimer);
        hideGlobalLoading();
        handleError(err);
      })
      .processDeviceBatch(renames, finalOrder, buildHostnamesMap());
  }
}

function attemptCloseManager() {
  // 1. Check for Unsaved Changes
  if (typeof isDeviceListDirty !== 'undefined' && isDeviceListDirty) {
    if (!confirm("△ You have unsaved changes in the Device Manager.\n\nClose anyway? (Changes will be lost)")) {
      return; // User clicked Cancel, keep window open
    }
  }

  // 2. Reset flag to prevent 'beforeunload' interference
  isDeviceListDirty = false;

  // 3. Close the window
  google.script.host.close();
}

// 1. INIT
function initSchemaManager() {
  const body = document.getElementById("schemaBody");
  body.innerHTML = `<div style="padding:40px; text-align:center; color:#94a3b8;">
<div style="font-size:24px; animation:spin 1s linear infinite; display:inline-block;">◌</div>
<div>Loading Schema...</div>
</div>`;

  // Reset Flag
  isSchemaDirty = false;
  updateSaveButtonVisuals();

  google.script.run.withSuccessHandler(schemaArray => {
    currentSchemaList = schemaArray || [];

    // TAKE SNAPSHOT (This replaces your old _originalLabel logic)
    initialSchemaState = JSON.stringify(getCleanSchema(currentSchemaList));

    renderSchemaList();
  }).getSchemaConfig();

  // Pre-scan for orphaned columns — updates Force Sync warning badge (read-only, non-blocking)
  google.script.run.withSuccessHandler(_updateForceSyncBadge).withFailureHandler(function() {}).getOrphanedColumnsInfo(null);

  // Sync debug checkbox to current localStorage state
  const chkDbg = document.getElementById('chkDebugLogging');
  if (chkDbg) chkDbg.checked = localStorage.getItem('topoassist_debug') === '1';
}

// 2. HELPER: Prepares data for comparison (removes UI artifacts)
function getCleanSchema(list) {
  return list.map(item => ({
    key: item.key,
    label: item.label,
    options: item.options || []
  }));
}

// 3. CHECKER: Determines if Orange or Green
function checkSchemaChanges() {
  const currentState = JSON.stringify(getCleanSchema(currentSchemaList));
  isSchemaDirty = (currentState !== initialSchemaState);
  updateSaveButtonVisuals();
}

// 4. VISUALS: Toggles Button Color
function updateSaveButtonVisuals() {
  const btn = document.getElementById("btnSaveSchema");
  if (!btn) return;
  if (!btn.dataset.cleanLabel) btn.dataset.cleanLabel = btn.innerText.replace(/ \*$/, '').trim();
  const label = btn.dataset.cleanLabel;
  if (isSchemaDirty) {
    btn.style.background = "#f59e0b";
    btn.innerText = label + " *";
  } else {
    btn.style.background = "#10b981";
    btn.innerText = label;
  }
}

// 5. INPUT HANDLERS (Must trigger the check)
function updateSchemaLabel(key, newLabel, inputEl) {
  const item = currentSchemaList.find(i => i.key === key);
  if (item) {
    item.label = newLabel;

    // 1. Visual Logic: Check against snapshot
    const original = getOriginalItem(key);
    // It is modified if it's New (no original) OR value doesn't match original
    const isModified = !original || (original.label !== newLabel);

    if (inputEl) {
      if (isModified) inputEl.classList.add("modified-highlight");
      else inputEl.classList.remove("modified-highlight");
    }

    // 2. Global Button State
    checkSchemaChanges();
  }
}

function updateSchemaOption(key, valStr, inputEl) {
  // Semicolon is the sole delimiter — commas inside an option value are preserved
  const arr = valStr.split(";").map(s => s.trim()).filter(s => s !== "");

  const item = currentSchemaList.find(i => i.key === key);
  if (item) {
    item.options = arr;

    // 1. Visual Logic
    const original = getOriginalItem(key);
    const currJson = JSON.stringify(arr);
    const origJson = original ? JSON.stringify(original.options || []) : "[]";

    const isModified = !original || (currJson !== origJson);

    if (inputEl) {
      if (isModified) inputEl.classList.add("modified-highlight");
      else inputEl.classList.remove("modified-highlight");
    }

    // 2. Global Button State
    checkSchemaChanges();
  }
}

function getOriginalItem(key) {
  try {
    const parsed = JSON.parse(initialSchemaState || "[]");
    return parsed.find(p => p.key === key);
  } catch (e) { return null; }
}

function deleteField(key) {
  if (!confirm(`Delete field '${key}'?`)) return;
  currentSchemaList = currentSchemaList.filter(i => i.key !== key);
  renderSchemaList();
  checkSchemaChanges();
}

function addNewField() {
  const keyInput = document.getElementById("newFieldKey");
  const labelInput = document.getElementById("newFieldLabel");

  let label = labelInput.value.trim();
  let key = keyInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, "_");

  if (!label) { alert("Please enter a Description."); return; }
  if (!key) key = label.toLowerCase().replace(/[^a-z0-9]/g, "_");

  if (currentSchemaList.some(i => i.key === key)) { alert("Field ID already exists."); return; }

  // Prefix collision guard: reject keys where one is a prefix of another (e.g. "xcvr" vs "xcvr_speed").
  // Such pairs cause silent data loss in rebuildSheet — the shorter key overwrites the longer one during backup.
  const newKeySuf = key + "_";
  const collision = currentSchemaList.find(item => {
    const existing = item.key + "_";
    return existing !== newKeySuf && (newKeySuf.startsWith(existing) || existing.startsWith(newKeySuf));
  });
  if (collision) {
    alert(`Field ID "${key}" conflicts with existing field "${collision.key}": one is a prefix of the other.\n\nThis would silently corrupt column data during schema sync. Choose a different name.`);
    return;
  }

  currentSchemaList.push({ key: key, label: label, options: [] });

  keyInput.value = "";
  labelInput.value = "";

  checkSchemaChanges();
  renderSchemaList();

  const body = document.getElementById("schemaBody");
  body.scrollTop = body.scrollHeight;
}

function renderSchemaList() {
  const body = document.getElementById("schemaBody");
  body.innerHTML = "";

  // 1. Parse the Snapshot for comparison
  let originalMap = new Map();
  let originalKeys = [];
  try {
    const parsed = JSON.parse(initialSchemaState || "[]");
    parsed.forEach(p => {
      originalMap.set(p.key, p);
      originalKeys.push(p.key);
    });
  } catch (e) { }

  const ul = document.createElement("div");

  currentSchemaList.forEach((item, index) => {
    // --- DIFF LOGIC ---
    const originalItem = originalMap.get(item.key);
    const isNew = !originalItem; // True if this field didn't exist in the snapshot

    // 1. Check Label (Description) Change
    let labelClass = "schema-label-input";
    if (isNew || (originalItem && item.label !== originalItem.label)) {
      labelClass += " modified-highlight";
    }

    // 2. Check Dropdown (Options) Change
    let areaClass = "schema-input-area";
    const currOpts = JSON.stringify(item.options || []);
    const origOpts = originalItem ? JSON.stringify(originalItem.options || []) : "[]";

    if (isNew || currOpts !== origOpts) {
      areaClass += " modified-highlight";
    }

    // 3. Check Key (ID) - Highlight if NEW
    // Existing keys can't change, but new keys should look "dirty"
    let keyClass = "schema-key-locked";
    if (isNew) {
      keyClass += " modified-highlight";
    }

    // 4. Index Display Logic
    let indexDisplay = `${index + 1}.`;
    let originalIdx = originalItem ? originalKeys.indexOf(item.key) : -1;

    if (isNew) {
      indexDisplay = `<span style="color:#10b981;">+${index + 1}</span>`;
    } else if (originalIdx !== -1 && originalIdx !== index) {
      indexDisplay = `<span style="color:#d97706;">${originalIdx + 1}➜${index + 1}</span>`;
    }

    // --- RENDER HTML ---
    const valStr = (item.options || []).join("; ");
    const row = document.createElement("div");
    row.className = "schema-row";

    row.innerHTML = `
<div class="schema-handle" style="display:inline-flex;align-items:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
<div class="schema-idx">${indexDisplay}</div>

<div class="schema-content" style="flex:1;">
<div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
<!-- Added ', this' to onchange -->
<input type="text" class="${labelClass}"
value="${item.label || item.key}"
onchange="updateSchemaLabel('${item.key}', this.value, this)"
placeholder="Description">

<div class="${keyClass}">${item.key}_</div>
</div>

<textarea class='${areaClass}'
onchange="updateSchemaOption('${item.key}', this.value, this)">${valStr}</textarea>
</div>

<button class="schema-del" onclick="deleteField('${item.key}')" style="display:inline-flex;align-items:center;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
`;
    ul.appendChild(row);
  });

  body.appendChild(ul);

  // Sortable Logic (Drag & Drop)
  if (window.Sortable) {
    new Sortable(ul, {
      handle: '.schema-handle',
      animation: 150,
      onEnd: function (evt) {
        // Update List Order
        const item = currentSchemaList.splice(evt.oldIndex, 1)[0];
        currentSchemaList.splice(evt.newIndex, 0, item);

        // Trigger Global Check (Updates Save Button)
        checkSchemaChanges();

        // Re-render (Updates Index Numbers)
        renderSchemaList();
      }
    });
  }
}

/**
* --- UPDATED SAVE FUNCTION ---
* Locks UI during the entire Save -> Sync chain
*/
function saveSchemaChanges() {
  if (isSchemaSaving) return; // Guard: prevent concurrent saves
  isSchemaSaving = true;

  const btn = document.getElementById("btnSaveSchema");
  const origText = btn.innerText;

  // 1. Lock UI
  setUiBusy(true);
  btn.innerText = "Saving...";

  // Hoisted so the timeout handler can clean it up if the server hangs mid-sync
  let syncPollTimer = null;

  // Safety: unlock after 30s if server hangs
  if (schemaLockTimer) clearTimeout(schemaLockTimer);
  schemaLockTimer = setTimeout(() => {
    if (syncPollTimer) { clearInterval(syncPollTimer); syncPollTimer = null; }
    hideGlobalLoading();
    isSchemaSaving = false;
    schemaLockTimer = null;
    setUiBusy(false);
    btn.innerText = origText;
    alert("⚠ Save timed out. The server took too long. Please try again.");
  }, 30000);

  const applyFormatting = document.getElementById("chkApplyFormatting").checked;

  // Prepare clean list for saving
  const cleanList = getCleanSchema(currentSchemaList);

  // --- SMART CHANGE DETECTION ---
  // We compare the Current state vs the Initial Snapshot to decide what sync to run
  let oldList = [];
  try { oldList = JSON.parse(initialSchemaState); } catch (e) { }

  // A. Check for Structural Changes (New Fields, Deleted Fields, Reordering)
  const oldKeys = oldList.map(i => i.key).join('|');
  const newKeys = cleanList.map(i => i.key).join('|');
  const isStructuralChange = (oldKeys !== newKeys);

  // B. Check for Dropdown Changes (Options changed)
  const oldOpts = JSON.stringify(oldList.map(i => i.options));
  const newOpts = JSON.stringify(cleanList.map(i => i.options));
  const isDropdownChange = (oldOpts !== newOpts);

  // 2. SAVE CONFIGURATION TO SERVER
  google.script.run
    .withSuccessHandler(res => {
      // --- STEP 3: HANDLE SYNCING (Chained) ---

      // Define what happens after Sync is done
      const onComplete = () => {
        isSchemaSaving = false;
        clearTimeout(schemaLockTimer);
        schemaLockTimer = null;

        // Update Snapshot to new state (Reset Dirty Flag)
        initialSchemaState = JSON.stringify(cleanList);
        isSchemaDirty = false;

        btn.innerText = "Saved!";
        btn.style.background = "#10b981"; // Green

        setUiBusy(false); // Unlock UI
        renderSchemaList();

        // Reset Button Text after delay
        setTimeout(() => {
          updateSaveButtonVisuals(); // Will set text to "Save & Sync"
          btn.disabled = false;
        }, 1500);
      };

      const onFailure = (err) => {
        isSchemaSaving = false;
        clearTimeout(schemaLockTimer);
        schemaLockTimer = null;
        setUiBusy(false);
        btn.innerText = origText;
        updateSaveButtonVisuals();
        alert("Save OK, but Sync Failed: " + err.message);
      };

      // Execute the appropriate Sync type
      if (isStructuralChange) {
        btn.innerText = "Checking...";
        // Pre-check: detect orphaned columns with data before syncing
        google.script.run
          .withSuccessHandler(orphans => {
            let deleteOrphans = null;
            if (orphans.length > 0) {
              const withData = orphans.filter(o => o.hasData);
              let msg = `${orphans.length} column(s) will be removed from the schema:\n`;
              orphans.forEach(o => { msg += `  \u2022 ${o.key.replace(/_$/, '')}${o.hasData ? '  \u26a0 contains data' : ''}\n`; });
              if (withData.length > 0) {
                msg += `\n\u26a0 ${withData.length} column(s) have data that will be permanently lost.\n`;
              }
              msg += '\nDelete these columns? Cancel = keep them.';
              deleteOrphans = confirm(msg);
            }
            btn.innerText = "Syncing Columns...";
            showGlobalLoading('🔍 Starting column sync...');
            syncPollTimer = setInterval(() => {
              google.script.run.withSuccessHandler(msg => {
                if (!msg) return;
                const msgEl = document.getElementById('loading-message');
                if (msgEl) msgEl.innerText = msg;
              }).getSyncStatus();
            }, 600);
            // Full Sync: Add/Remove columns, Apply Formatting
            google.script.run
              .withSuccessHandler(() => { clearInterval(syncPollTimer); hideGlobalLoading(); onComplete(); })
              .withFailureHandler(err => { clearInterval(syncPollTimer); hideGlobalLoading(); onFailure(err); })
              .syncSchemaPreservingOrder(cleanList, applyFormatting, deleteOrphans);
          })
          .withFailureHandler(err => { onFailure(err); })
          .getOrphanedColumnsInfo(cleanList);
      }
      else if (isDropdownChange) {
        btn.innerText = "Updating Dropdowns...";
        // Light Sync: Just update validation rules (Fast)
        google.script.run
          .withSuccessHandler(onComplete)
          .withFailureHandler(onFailure)
          .updateSheetDropdownsOnly();
      }
      else {
        // No Sheet changes needed (Label rename only)
        onComplete();
      }
    })
    .withFailureHandler(err => {
      isSchemaSaving = false;
      clearTimeout(schemaLockTimer);
      schemaLockTimer = null;
      setUiBusy(false);
      btn.innerText = origText;
      updateSaveButtonVisuals();
      alert("✗ Save Failed: " + err.message);
    })
    .saveSchemaConfig(cleanList);
}

/**
* --- UI LOCK HELPER ---
* Locks/Unlocks the entire interface to prevent concurrent actions.
*/
function setUiBusy(isBusy) {
  const container = document.getElementById("schemaContainer");
  if (!container) return;

  // 1. Visually dim the container
  container.style.opacity = isBusy ? "0.6" : "1";

  // 2. Block all mouse clicks/interactions
  container.style.pointerEvents = isBusy ? "none" : "auto";

  // 3. Explicitly disable inputs to prevent keyboard interaction
  const inputs = container.querySelectorAll("button, input, textarea, select");
  inputs.forEach(el => el.disabled = isBusy);
}

function triggerSyncOnly() {

  setUiBusy(true);
  btn.innerHTML = '<span class="btn-icon">🔍</span> Checking...';

  google.script.run
    .withSuccessHandler(orphans => {

          _runForceSyncNow(btn, origHtml, applyFormatting, true);

      setUiBusy(false);

        btn.innerHTML = origHtml;

    .withFailureHandler((err) => {
      clearInterval(syncPollTimer);
      hideGlobalLoading();
      setUiBusy(false);
