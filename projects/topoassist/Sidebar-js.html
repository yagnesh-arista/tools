function getStorageKey(mode) {
  // Returns unique keys for each view mode
  return mode === 'detailed' ? 'topology_pos_detailed' : 'topology_pos_holistic';
}

function restoreCameraForMode(mode) {
  // 🛑 FIX: Create independent camera memories for all 3 views
  const keyCamera = mode === 'detailed'
    ? 'camera_state_detailed_' + layoutMode
    : 'camera_state_holistic';

  try {
    const raw = localStorage.getItem(keyCamera);
    if (raw) {
      const cam = JSON.parse(raw);
      // Restore saved state
      panX = cam.x;
      panY = cam.y;
      zoomLevel = cam.z;
      updateTransform(); // Apply immediately
      return true; // Success
    }
  } catch(e) { console.warn("Camera restore failed", e); }

  return false; // No saved state found
}

function saveCurrentStateToStorage() {
  // 🛑 FIX: Create independent camera memories for all 3 views
  const keyCamera = currentViewMode === 'detailed'
    ? 'camera_state_detailed_' + layoutMode
    : 'camera_state_holistic';

  // 1. ALWAYS Save Camera State (regardless of layout mode)
  try {
      localStorage.setItem(keyCamera, JSON.stringify({ x: panX, y: panY, z: zoomLevel }));
  } catch(e) { console.warn("localStorage full", e); }

  // 2. GUARD: Prevent Linear Layout from overwriting custom node positions
  // Linear positions are auto-calculated and should be ephemeral.
  if (currentViewMode === 'detailed' && layoutMode === 'linear') {
      return;
  }

  const keyNodes = getStorageKey(currentViewMode);
  // Merge with existing state so hidden devices keep their positions
  let state = {};
  try { const ex = localStorage.getItem(keyNodes); if (ex) state = JSON.parse(ex); } catch(e) {}
  let hasNodes = false;

  // 3. SAVE NODES
  if (currentViewMode === 'detailed') {
    const nodes = document.querySelectorAll(".node");
    nodes.forEach(el => {
      hasNodes = true;
      const id = el.dataset.id;
      const x = parseFloat(el.style.left);
      const y = parseFloat(el.style.top);

      // We save fx/fy (Fixed positions) to pin the node in D3
      if (!isNaN(x) && !isNaN(y)) {
          state[id] = { x: x, y: y, fx: x, fy: y };
      }
    });
  } else {
    // Holistic (SVG)
    const nodes = document.querySelectorAll(".node-circle");
    nodes.forEach(el => {
      hasNodes = true;
      // D3 data binding
      const d = d3.select(el).datum();
      if (d && d.id) {
          state[d.id] = { x: d.x, y: d.y, fx: d.x, fy: d.y };
      }
    });
  }

  if (hasNodes) {
    localStorage.setItem(keyNodes, JSON.stringify(state));
  }
}

function loadStateFromStorage(mode) {
  const key = getStorageKey(mode);
  const raw = localStorage.getItem(key);
  savedNodePositions = raw ? JSON.parse(raw) : {};
}

function loadGroupRects() {
  try {
    const raw = localStorage.getItem("holistic_group_rects");
    const parsed = raw ? JSON.parse(raw) : [];
    // Dedup: same label → merge members into the first entry, drop the duplicate
    const byLabel = new Map();
    parsed.forEach(gr => {
      const key = (gr.label || '').toLowerCase();
      if (byLabel.has(key)) {
        const first = byLabel.get(key);
        const merged = new Set([...(first.members || []), ...(gr.members || [])]);
        first.members = [...merged];
      } else {
        byLabel.set(key, gr);
      }
    });
    groupRects = [...byLabel.values()];
    if (groupRects.length < parsed.length) saveGroupRects(); // persist fix
  } catch(e) { groupRects = []; }
  _renderGroupList();
}

function saveGroupRects() {
  localStorage.setItem("holistic_group_rects", JSON.stringify(groupRects));
  _renderGroupList();
}

function _zoomToGroup(grId) {
  const gr = groupRects.find(r => r.id === grId);
  if (!gr) return;
  let x, y, w, h;
  if (gr.members && gr.members.length) {
    const clusters = _computeGroupClusters(gr.members, 30);
    if (!clusters.length) return;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    clusters.forEach(c => {
      if (c.x < minX) minX = c.x;
      if (c.y < minY) minY = c.y;
      if (c.x + c.width > maxX) maxX = c.x + c.width;
      if (c.y + c.height > maxY) maxY = c.y + c.height;
    });
    x = minX; y = minY; w = maxX - minX; h = maxY - minY;
  } else {
    x = gr.x; y = gr.y; w = gr.width; h = gr.height;
  }
  focusView(x, y, w, h);
}

/**
* Smart Scheduler: Waits for the topology physics to "cool down" and
* become steady before kicking off the background network requests.
*/
function scheduleBackgroundPrefetch(forceRestart) {
  if (prefetchStartTimer) clearTimeout(prefetchStartTimer);

  // After the initial run, skip smart-poll restarts unless data was actually invalidated
  // (forceRestart=true means config cache was wiped or devices changed — always re-run)
  if (_prefetchEverRan && !forceRestart) return;

  // forceRestart=true: stop any in-progress prefetch so we rebuild the queue with
  // newly-invalidated devices (leaving it running would orphan those devices — they
  // were deleted from configCache but are not in the running queue).
  if (prefetchInterval !== null) stopBackgroundPrefetch();

  const checkSteadyState = () => {
    let isMoving = false;

    // Check if Flexible Layout is still actively moving
    if (typeof d3Simulation !== 'undefined' && d3Simulation && d3Simulation.alpha() > 0.1) {
      isMoving = true;
    }
    // Check if Holistic (Simple) Layout is still actively moving
    if (typeof holisticSimulation !== 'undefined' && holisticSimulation && holisticSimulation.alpha() > 0.1) {
      isMoving = true;
    }
    // Wait for any in-flight fetchData (smart poll, auto-verify) and bridge scan to finish
    if (isFetching || _prefetchHold) {
      isMoving = true;
    }

    if (isMoving) {
      dbg("Waiting for topology to stabilize (physics=" + (typeof d3Simulation !== 'undefined' && d3Simulation ? d3Simulation.alpha().toFixed(2) : 'n/a') + " fetch=" + isFetching + " bridgeScan=" + _prefetchHold + ")...");
      prefetchStartTimer = setTimeout(checkSteadyState, 1000);
    } else {
      startBackgroundPrefetch();
    }
  };

  // Give the initial DOM render a 3-second head start before we even start checking
  prefetchStartTimer = setTimeout(checkSteadyState, 3000);
}

function startBackgroundPrefetch() {
  _prefetchEverRan = true; // mark as ran so smart-poll won't restart unless forceRestart=true

  // 1. Clear any running loops
  stopBackgroundPrefetch();

  // 2. Build the queue: uncached Arista devices only; total = all Arista so the counter
  //    reads "6 of 10" when 5 were already cached, not a misleading "1 of 5".
  const _allAristaDevs = Object.keys(allDevicesData).filter(dev => allDevicesData[dev].type === 'full');
  prefetchQueue = _allAristaDevs.filter(dev => !configCache[dev]);

  if (prefetchQueue.length === 0) return;
  prefetchTotal = _allAristaDevs.length;
  dbg(`Starting background pre-fetch for ${prefetchQueue.length} devices (${prefetchTotal} total)...`);

  let st = document.getElementById("status");

  // 3. Start a slow loop (1 request every 8 seconds — 3s was too aggressive; with 10+ devices
  //    each taking 2-8s, 3s created a continuous wall of GAS calls. 8s gives each call room to
  //    breathe while still pre-warming the cache within ~1.5 min for a 10-device topology.)
  prefetchInterval = setInterval(() => {
    // Stop if queue is empty
    if (prefetchQueue.length === 0) {
      stopBackgroundPrefetch();
      dbg("Background pre-fetching complete.");

      // Show subtle completion message in status bar
      if (st) {
        setStatus("All configs cached locally!", "status-ok");

        // Revert back to Ready after 3 seconds
        setTimeout(() => {
          // Only revert if it hasn't been overwritten by a user click/error
          if (st.innerText.includes("All configs")) {
            setStatus(getReadyStatus());
            // color cleared by setStatus above
          }
        }, 3000);
      }
      return;
    }

    // YIELD TO USER: If the user is currently clicking/hovering, skip this tick
    if (pendingFetches.size > 0) return;

    // Pop the next device from the queue
    const nextDev = prefetchQueue.shift();
    const currentCount = prefetchTotal - prefetchQueue.length;

    // Verify it hasn't been cached manually in the meantime
    if (!configCache[nextDev]) {
      // Update the status bar text dynamically (Non-blocking)
      if (st && !st.innerText.includes("△") && !st.innerText.includes("Error")) {
        setStatus(`Background caching: ${nextDev} (${currentCount} of ${prefetchTotal})`, 'status-info');
        // status-info color applied via setStatus above
      }

      // Fetch silently
      fetchFullConfig(nextDev);
    }
  }, 8000);
}

function stopBackgroundPrefetch() {
  if (prefetchInterval) clearInterval(prefetchInterval);
  prefetchQueue = [];
  prefetchTotal = 0;
}

// Selective config cache invalidation — called after every fetchData() render.
// Keeps configCache entries for devices whose config-relevant data is unchanged;
// deletes only devices that are new, removed, or have a different fingerprint.
// Falls back to full clear if something unexpected happens.
function _selectiveConfigInvalidate(oldDevs, newDevs) {
  try {
    // Fingerprint: everything that drives getDeviceConfig() output
    function _fp(dev) {
      if (!dev) return '';
      const portSig = (dev.ports || []).map(p => {
        const d = p.details || {};
        return [p.name, p.connected ? 1 : 0,
                d.sp_mode_ || '', d.po_ || '', d.xcvr_speed_ || '',
                d.et_speed_ || '', d.category || '',
                d.vlan_ || '', d.ip_type_ || '', d.svi_vlan_ || '',
                d.vrf_ || '', d.desc_ || ''].join(':');
      }).sort().join('|');
      return [dev.role || '', dev.mlagPeer || '', dev.hostname || '', dev.vtepVlans || '', portSig].join('\x00');
    }

    const invalidate = new Set();

    // Devices removed from topology — evict immediately
    Object.keys(oldDevs).forEach(name => {
      if (!newDevs[name]) delete configCache[name];
    });

    // Devices whose config-relevant fingerprint changed (or are brand-new)
    Object.keys(newDevs).forEach(name => {
      if (_fp(oldDevs[name]) !== _fp(newDevs[name])) invalidate.add(name);
    });

    // Propagate to MLAG peers — peer config references the partner device
    [...invalidate].forEach(name => {
      const oldPeer = (oldDevs[name] || {}).mlagPeer;
      const newPeer = (newDevs[name] || {}).mlagPeer;
      if (oldPeer && newDevs[oldPeer]) invalidate.add(oldPeer);
      if (newPeer && newDevs[newPeer]) invalidate.add(newPeer);
    });

    invalidate.forEach(name => { delete configCache[name]; });
    if (invalidate.size > 0) {
      dbg(`Config cache: invalidated ${invalidate.size} device(s):`, [...invalidate]);
    } else {
      dbg('Config cache: all devices unchanged.');
    }
    return invalidate.size; // callers use this to decide whether to restart background prefetch
  } catch (e) {
    // Safety net — full clear on any unexpected error
    console.warn('_selectiveConfigInvalidate failed, falling back to full clear:', e);
    configCache = {};
    return -1; // unknown — treat as invalidated
  }
}

CLIENT-SIDE FETCH LOGIC
================================================== */
/* --- UPDATED CLIENT-SIDE FETCH LOGIC --- */
function fetchData(force, autoVerify, silent) {
  if (isFetching) return;

  // Warn if a push is in progress — refresh will orphan push status UI
  if (_commitInFlight || _pendingPush || _pushAllActive) {
    const what = _pushAllActive ? 'Push Targets is in progress' : 'A config push is in progress';
    const ok = confirm(what + '.\n\nRefreshing will clear push status. Continue?');
    if (!ok) return;
  }

  isFetching = true;
  let isTopologyLoading = true;

  try {
    if (typeof isEditMode !== 'undefined' && isEditMode && !force) {
      isFetching = false;
      setStatus("Please exit Edit Mode to refresh.", "status-warn");
      return;
    }

    // Reset Tooltips
    let tooltip = document.getElementById("tooltip");
    if (tooltip) {
      tooltip.style.display = "none";
      tooltip.innerHTML = "";
    }
    activeTooltipPortId = null;

    // Reset Status Bar
    let statusEl = document.getElementById("status");
    let btn = document.getElementById("manualRefreshBtn");

    if (btn) { btn.disabled = true; btn.style.cursor = "not-allowed"; }
    _topologyReady = false; // block auto-Bridge until fresh data arrives

    // Only show the cold-start message on first load — subsequent fetchData calls
    // (smart poll, manual refresh, save handlers) each set their own status message
    // before calling fetchData; overwriting it here would hide e.g. "Sheet changed —
    // refreshing topology…" before the user can read it.
    if (isFirstLoad && !silent && !savedSelectionId && !selectedDeviceId && statusEl) {
      setStatus("Requesting Topology Data — no local cache");
      document.getElementById("status").classList.remove("highlighted");
    }

    // Reset all port filters on topology reload to default (all selected)
    if (!silent) {
      topoIpFilter      = ['p2p', 'gw', 'blank'];
      topoIntModeFilter = ['l2-et-access','l2-et-trunk','l2-po-access','l2-po-trunk','l3-et-int','l3-et-sub-int','l3-po-int','l3-po-sub-int'];
      topoSviFilter     = ['active', 'blank'];
      topoVlanFilter    = [];
      renderIpTypeList();
      renderIntModeList();
      renderSviList();
    }

    // Snapshot current device data for selective config cache invalidation after render.
    // Taken before clearing so we can diff old vs new after the server responds.
    const _prevDevSnap = Object.assign({}, allDevicesData);

    // --- MEMORY CLEANUP ---
    // Skip during silent/verify fetches so the existing topology stays visible while the background call runs
    // configCache is NOT cleared here — _selectiveConfigInvalidate() runs after render() instead.
    // Exception: force=true (manual refresh) clears configCache entirely so fresh configs are fetched.
    if (force) {
      configCache = {};
      dbg('Manual refresh: config cache cleared');
    }
    if (!silent) {
      for (let key in allNodesData) delete allNodesData[key];
      for (let key in allDevicesData) delete allDevicesData[key];
      for (let key in globalPortElements) delete globalPortElements[key];
    }

    // Progress Indicator (Small status bar update)
    let progressTimer = setInterval(() => {
      if (!isTopologyLoading) return;
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(msg => {
          if (isTopologyLoading && statusEl && msg) {
            setStatus(msg);
          }
        }).getProgressStatus();
      }
    }, 1000);

    // 🛑 FIX: Use correct ID matching your HTML
    let colorChk = document.getElementById("chkApplyFormatting") || document.getElementById("chkColor");
    let isColorEnabled = colorChk ? colorChk.checked : true;

    // --- CALL SERVER ---
    // Guard: GAS framework failures (auth expiry, quota) fire neither handler — overlay sticks forever without this.
    // 60s: full data load tier — cold GAS start (~10-15s) + large topology processing can exceed 30s legitimately.
    let _fetchGuardFired = false;
    const _fetchGuard = setTimeout(() => {
      _fetchGuardFired = true;
      hideGlobalLoading();
      isFetching = false;
      isTopologyLoading = false;
      clearInterval(progressTimer);
      if (btn) { btn.disabled = false; btn.style.cursor = "pointer"; }
      setStatus("Topology fetch timed out — retrying\u2026", "status-error");
      // Auto-retry after 5s — smart poll alone won't re-fetch unless sheet version changes
      setTimeout(() => { if (!isFetching) fetchData(false); }, 5000);
    }, 60000);

    google.script.run.withSuccessHandler(function (data) {
      clearTimeout(_fetchGuard);
      // Guard already fired — late GAS response after 30s timeout. State already cleaned
      // up; rendering now would silently overwrite the error and confuse the user.
      if (_fetchGuardFired) return;
      hideGlobalLoading();

      isTopologyLoading = false;
      clearInterval(progressTimer);

      isFetching = false;

      // Update Version
      if (data.version) localDataVersion = data.version;

      // Save Cache
      try {
        sessionStorage.setItem('topology_data_cache', JSON.stringify(data));
      } catch (e) {
        console.warn("Session Storage Full or Disabled", e);
      }

      dbg("Topology Data Received:", data);
      if (btn) { btn.disabled = false; btn.style.cursor = "pointer"; }

      if (data.error) {
        setStatus("Error: " + data.error, "status-error");
        return;
      }

      if (!data.nodes || !data.links) {
        setStatus("Error: Invalid topology data received.", "status-error");
        console.error("fetchData: Missing nodes or links in server response.", data);
        return;
      }

      // Populate Globals
      if (data.dropdowns) globalDropdowns = data.dropdowns;
      if (data.deviceNames) globalDeviceNames = data.deviceNames;
      if (data.schema) topoColumnSchema = data.schema;
      if (data.links) globalLinks = data.links;
      if (data.portFrequency) globalPortFrequency = data.portFrequency;
      if (data.snakeTrafficFlags) _snakeTrafficFlags = data.snakeTrafficFlags;
      currentData = data;

      // Pre-load device metadata so topology card model lines are populated before bridge runs
      google.script.run
        .withSuccessHandler(meta => {
          if (meta) {
            Object.assign(deviceMetadata, meta);
            _refreshModelLines();
            // Re-render holistic pills — deviceMetadata was empty when renderHolistic first ran
            // (getDeviceMetadata is async so it resolves after the initial render completes)
            if (currentViewMode === 'holistic' && currentData) renderHolistic(currentData);
          }
        })
        .withFailureHandler(() => {})
        .getDeviceMetadata();

      // Sync device manager if it's open and has no pending edits
      DeviceManagerAutoRefresh();

      // Clear stale audit badge on fresh data load
      const auditBadge = document.getElementById("auditBadge");
      if (auditBadge) auditBadge.classList.add("hidden");

      // [CRITICAL] VIEW PRESERVATION
      // Note: loadStateFromStorage is called inside toggleViewMode — no need to call it here.
      // Run render FIRST — runValidation() inside render() may write "Audit Clean." to status
      if (typeof toggleViewMode === 'function') {
        toggleViewMode(currentViewMode, false);
      } else {
        render(data);
      }

      // Set status AFTER render so it overwrites anything runValidation() wrote
      if (statusEl) {
        if (data.fromCache) {
          // Cache hit: always show cache message (overrides "Audit Clean.")
          setStatus(autoVerify ? "⚡ Loaded from cache — verifying..." : "⚡ Loaded from cache");
        } else if (!isValidationMode) {
          // Fresh fetch, audit mode off: show ready status, or pending non-Arista notice
          if (_nonAristaSyncNotice && _nonAristaSyncNotice.length > 0) {
            setStatus(`ℹ ${_nonAristaSyncNotice.join(', ')}: IXIA/SPIRENT role set — run Force Sync to collapse to 1 column`);
            _nonAristaSyncNotice = null;
          } else {
            setStatus(getReadyStatus());
          }
        }
        // Fresh fetch + audit mode on: leave "Audit Clean." that runValidation() wrote
      }

      isFirstLoad = false;

      // Restore Filters
      let searchInp = document.getElementById("searchInp");
      if (searchInp && searchInp.value && typeof debouncedFilterTopology === 'function') {
        debouncedFilterTopology();
      }

      let vlanVal = document.getElementById("vlanTraceInp");
      if (vlanVal && vlanVal.value && typeof traceVlan === 'function') {
        traceVlan();
      }

      // Selective config cache invalidation — preserve cache for unchanged devices,
      // delete only devices whose config-relevant data changed since last render.
      // Returns: 0 = nothing changed, >0 = N devices invalidated, -1 = error/full clear.
      const _invalidated = _selectiveConfigInvalidate(_prevDevSnap, allDevicesData);

      // Auto-verify: if this render came from GAS cache, fire a forced refresh
      // to confirm cache == actual sheet state. Runs after render so UI is instant.
      if (data.fromCache && autoVerify) {
        fetchData(true, false, true); // silent=true keeps "⚡ Loaded from cache — verifying..." visible
        return;
      }

      // --- START BACKGROUND FETCH ---
      // Uses the smart scheduler to wait until physics settle before fetching.
      // forceRestart only when something was actually invalidated — avoids restarting
      // the prefetcher on every smart-poll cycle when nothing changed.
      if (typeof scheduleBackgroundPrefetch === 'function') {
        scheduleBackgroundPrefetch(_invalidated !== 0);
      }

      // Auto bridge health check after topology loads (if integration enabled).
      // If bridge is already confirmed up, also run Bridge check immediately (topology just refreshed).
      // If bridge state is unknown, _silentBridgeCheck will trigger Bridge check on fresh connect via transition.
      _topologyReady = true; // topology is fully loaded — auto-LLDP may now proceed
      requestAnimationFrame(autoResizePanelHeight);
      _silentBridgeCheck();
      // Only run Bridge on fetchData if cabling changed (or never run before).
      // Bridge up→down→up transition fires unconditionally (fresh connect path in _updateBridgeToolbarIcon).
      if (_bridgeUpState && _getLinkSig() !== _lastBridgeLinkSig) _autoRunBridge();
      // Check for device ID shifts — warn in status bar; cache result for push modal.
      google.script.run
        .withSuccessHandler(function(r) {
          _lastIdShiftResult = r;
          if (!r.isFirstRun && r.shifted.length > 0) {
            const names = r.shifted.map(function(d) { return d.name + ' (' + d.oldId + '\u2192' + d.newId + ')'; }).join(', ');
            setStatus('Device IDs shifted: ' + names + ' \u2014 regenerate all configs before pushing.', 'status-warn');
          }
        })
        .withFailureHandler(function() {}) // silent — non-blocking
        .checkDeviceIdShift();

    }).withFailureHandler(function (err) {
      clearTimeout(_fetchGuard);
      hideGlobalLoading();
      isFetching = false;
      isTopologyLoading = false;
      clearInterval(progressTimer);
      if (btn) { btn.disabled = false; btn.style.cursor = "pointer"; }
      setStatus("Server Error: " + err.message, "status-error");
    }).getTopologyData(force, isColorEnabled);

  } catch (e) {
    hideGlobalLoading();
    isFetching = false;
    let st = document.getElementById("status");
    setStatus("Init Error: " + e.message, "status-error");
  }
}

function toggleMinimize() {
  const minBar = document.getElementById("minimizedBar");
  const toolbar = document.querySelector(".toolbar");
  const viewport = document.getElementById("viewport");

  if (!minBar || !toolbar || !viewport) return;

  if (!isWindowMinimized) {
    // -> MINIMIZE
    previousDims.w = window.innerWidth;
    previousDims.h = window.innerHeight;
    isWindowMinimized = true;

    toolbar.classList.add("hidden");

    minBar.classList.remove("hidden");
    google.script.host.setWidth(280);
    google.script.host.setHeight(42);

  } else {
    // -> RESTORE
    isWindowMinimized = false;
    google.script.host.setWidth(previousDims.w);
    google.script.host.setHeight(previousDims.h);

      requestAnimationFrame(redrawLinks);
    }, 100);

  }, 50);

function downloadBridgeScript() {
  const src = `#!/usr/bin/env python3
"""
TopoAssist Device Bridge
========================
Local HTTP server that bridges the TopoAssist sidebar to lab devices.
Runs on http://localhost:8765 — no SSL cert needed (localhost is exempt from
browser mixed-content policy when called from HTTPS pages).

Usage:
    python3 device_bridge.py

Keep this terminal open while using Device Bridge in the sidebar.
Ctrl+C to stop.

Transport options (set _cfg['transport'] below):
  eapi  — Arista eAPI JSON-RPC over HTTPS (default; stdlib only)
  ssh   — SSH via jump host or direct (stdlib only)
  rest  — RESTCONF over HTTPS, OpenConfig YANG (stdlib only; EOS 4.22+)
  gnmi  — gRPC/gNMI, OpenConfig YANG (requires: pip install pygnmi; EOS 4.22+)

Endpoints:
  GET  /health      → {"status":"ok","version":"<VERSION>","port":8765}
  POST /lldp        → {ipMap} → per-device LLDP neighbors
  POST /devstatus   → {ipMap} → per-device EOS version, platform, interface op-status
  POST /pushconfig  → {ipMap: {dev:{ip,config}}} → per-device push result + session diff
"""

from http.server import HTTPServer, BaseHTTPRequestHandler
import subprocess, json, threading, sys, urllib.request, ssl, base64, time, os, re, shutil
import atexit, stat as _stat, tempfile

# sshpass is not available on all platforms (e.g. macOS without Homebrew).
# Detect once at startup; fall through to SSH_ASKPASS shim, then key-based.
_SSHPASS_BIN = shutil.which("sshpass")

# SSH_ASKPASS shim — empty-password auth without sshpass.
# Creates a temp shell script that echoes nothing (= empty password) and
# registers it as SSH_ASKPASS so SSH calls it instead of prompting.
# Works on any platform with standard /bin/sh and OpenSSH 8.4+
# (pre-8.4 needs DISPLAY set, which we include as a fallback).
_ASKPASS_SCRIPT = None
_SSH_ENV        = None   # subprocess env for SSH_ASKPASS mode; None = inherit
if not _SSHPASS_BIN:
    try:
        _f = tempfile.NamedTemporaryFile(
            mode='w', suffix='.sh', delete=False, prefix='ta_askpass_')
        _f.write('#!/bin/sh\\necho\\n')   # echo empty line = empty password
        _f.flush(); _f.close()
        os.chmod(_f.name, _stat.S_IRWXU)
        _ASKPASS_SCRIPT = _f.name
        _SSH_ENV = {**os.environ,
                    "SSH_ASKPASS":         _ASKPASS_SCRIPT,
                    "SSH_ASKPASS_REQUIRE": "force",                # OpenSSH 8.4+
                    "DISPLAY":             os.environ.get("DISPLAY") or ":0"}  # pre-8.4 fallback
        atexit.register(os.unlink, _ASKPASS_SCRIPT)
    except Exception:
        pass   # fall back to BatchMode=yes key-based auth

def _ssh_base(force_tty=False):
    """Return the base SSH command list.
    sshpass (Linux): supplies empty password via wrapper binary.
    SSH_ASKPASS shim (macOS/no sshpass): SSH_ASKPASS env supplies empty password.
    Fallback: key-based auth via BatchMode=yes.

    force_tty=True: use -tt (force PTY) so EOS assigns a named VTY instead of
    showing 'UnknownTty' in 'show users' and syslog. Used by _ssh_stdin for
    configure-session pushes. _ssh_cmds (show | json path) always uses -T."""
    tty      = "-tt" if force_tty else "-T"
    ssh_pass = _cfg.get("ssh_pass", "")
    ssh_port = int(_cfg.get("ssh_port", 22))
    port_arg = ["-p", str(ssh_port)] if ssh_port != 22 else []
    if _SSHPASS_BIN:
        return [_SSHPASS_BIN, "-p", ssh_pass, "ssh", tty, *port_arg,
                "-o", "StrictHostKeyChecking=no",
                "-o", "PasswordAuthentication=yes",
                "-o", "PubkeyAuthentication=no",
                "-o", "LogLevel=ERROR",
                "-o", "ConnectTimeout=8"]
    if _ASKPASS_SCRIPT:
        return ["ssh", tty, *port_arg,
                "-o", "StrictHostKeyChecking=no",
                "-o", "BatchMode=no",
                "-o", "PasswordAuthentication=yes",
                "-o", "PubkeyAuthentication=no",
                "-o", "NumberOfPasswordPrompts=1",
                "-o", "LogLevel=ERROR",
                "-o", "ConnectTimeout=8"]
    return ["ssh", tty, *port_arg,
            "-o", "StrictHostKeyChecking=no",
            "-o", "BatchMode=yes",
            "-o", "LogLevel=ERROR",
            "-o", "ConnectTimeout=8"]

# Strip ANSI escape sequences from PTY output so diff parsing is not confused
# by terminal control codes EOS may emit when a pseudo-terminal is allocated.
_ANSI_RE = re.compile(r'\\x1b(?:\\[[0-9;]*[A-Za-z]|[^[])')

def _check_ssh_agent():
    """Check arista-ssh credentials via 'arista-ssh check-auth'.
    Only called when using key-based SSH auth (sshpass is absent).

    arista-ssh check-auth exit codes:
      0 — authenticated → ok
      non-zero — session expired or not logged in

    Returns {"ok": True} or {"ok": False, "msg": "<reason>"}.
    """
    if not shutil.which("arista-ssh"):
        return {"ok": False, "msg": "arista-ssh not found — install arista-ssh or set BRIDGE_SSH_USER / use sshpass"}
    try:
        r = subprocess.run(["arista-ssh", "check-auth"],
                           capture_output=True, text=True, timeout=5)
        if r.returncode == 0:
            return {"ok": True}
        return {"ok": False, "msg": "arista-ssh session expired — run: arista-ssh login"}

        return {"ok": False, "msg": "arista-ssh check-auth timed out — run: arista-ssh login"}

# _cfg: active transport settings — initialized from CLI/env, overridable at runtime

_cfg = {
    "transport":  _arg("-m")  or os.environ.get("BRIDGE_METHOD",    "eapi"),

def _oc_lldp_to_eos(raw):
    """Convert openconfig-lldp GET response to EOS lldpNeighbors dict."""
    neighbors = {}
    root = raw.get("openconfig-lldp:lldp", raw)
    for iface in root.get("interfaces", {}).get("interface", []):
        name = iface.get("name", "")
        nbrs = iface.get("neighbors", {}).get("neighbor", [])
        if not nbrs:
            continue
        state = nbrs[0].get("state", {})
        neighbors[name] = {"bridgeNeighborInfo": [{
            "systemName": state.get("system-name", ""),
            "neighborInterfaceInfo": {
                "interfaceId_v2": state.get("port-id", ""),
            },
        }]}
    return neighbors


def _normalize_lldp_neighbors(raw_lldp_neighbors):
    """Rename EOS native key 'lldpNeighborInfo' → 'bridgeNeighborInfo'.

    EOS JSON (show lldp neighbors detail | json) uses 'lldpNeighborInfo' per
    interface.  The client _compareBridgeData reads 'bridgeNeighborInfo' — the
    single canonical key used across all transports (ssh/eapi/rest/gnmi).
    Interfaces that already lack 'lldpNeighborInfo' are passed through as-is.
    """
    return {
        iface: {"bridgeNeighborInfo": info["lldpNeighborInfo"]}
        if "lldpNeighborInfo" in info else info
        for iface, info in raw_lldp_neighbors.items()
    }


def _oc_version(raw):
    """Extract software version string from openconfig-platform GET response."""
    for comp in raw.get("openconfig-platform:components", raw).get("component", []):
        ver = comp.get("state", {}).get("software-version", "")
        if ver:
            return ver.split(" (")[0].strip()
    return ""


def _oc_platform(raw):
    """Extract platform/model name from openconfig-platform GET response."""
    for comp in raw.get("openconfig-platform:components", raw).get("component", []):
        t = comp.get("state", {}).get("type", "")
        if "CHASSIS" in t:
            return comp["state"].get("description", "").lstrip("DCS-")
    return ""


def _oc_iface_status(raw):
    """Convert openconfig-interfaces GET response to EOS interfaceStatuses dict."""
    oc_to_eos = {"UP": "connected", "DOWN": "notconnect",
                 "LOWER_LAYER_DOWN": "notconnect", "DORMANT": "notconnect"}
    result = {}
    for iface in raw.get("openconfig-interfaces:interfaces", raw).get("interface", []):
        name  = iface.get("name", "")
        oper  = iface.get("state", {}).get("oper-status", "")
        result[name] = {"linkStatus": oc_to_eos.get(oper, "notconnect")}
    return result


def _gnmi_val(response):
    """Extract the value dict from a pygnmi get() response."""
    try:

def _parse_internal_vlans(ivlans):
    """Parse 'show vlan internal usage' JSON response into a sorted int list.

    EOS returns: {"internalVlans": {"1025": "Ethernet1", "1026": "Ethernet2", ...}}
    Returns [] when the response is empty, None (command failed), or the key is absent.
    """
    if not ivlans:
        return []
    return sorted(int(vid) for vid in ivlans.get("internalVlans", {}).keys())


def _parse_interface_errors(raw):
    """Return {IfaceName: {fcs, sym, align}} for interfaces with any non-zero L1 counter.

    EOS returns: {"interfaceErrorCounters": {"Ethernet1": {"fcsErrors": 3, ...}, ...}}
    Only interfaces with at least one non-zero counter are included (compact response).
    """
    out = {}
    for iface, c in (raw or {}).get("interfaceErrorCounters", {}).items():
        fcs   = c.get("fcsErrors",       0)
        sym   = c.get("symbolErrors",    0)
        align = c.get("alignmentErrors", 0)
        if fcs or sym or align:
            out[iface] = {"fcs": fcs, "sym": sym, "align": align}
    return out


def _build_devstatus_ssh(ver, ifs, ivlans, errs=None, hn=None):
    """Build devstatus response dict from raw _run_cmds results (any may be None on failure).

    Each argument corresponds to one SSH/eAPI command result:
      ver    — 'show version'                    (None if command failed)
      ifs    — 'show interfaces status'          (None if command failed)
      ivlans — 'show vlan internal usage'        (None if command failed)
      errs   — 'show interfaces counters errors' (None if command failed)
      hn     — 'show hostname'                   (None if command failed)

    A failed command contributes empty data but never causes ok:False — the
    other commands' data is still returned intact.
    """
    ver = ver or {}
    ifs = ifs or {}
    hn  = hn  or {}
    raw_ver = ver.get("version", "")
    if raw_ver.startswith("Software image version: "):
        raw_ver = raw_ver[len("Software image version: "):]
    raw_ver = raw_ver.split(" (")[0].strip()
    return {
        "ok":             True,
        "hostname":       hn.get("hostname", ""),
        "version":        raw_ver,
        "platform":       ver.get("modelName", "").lstrip("DCS-"),
        "bridgeMac":      ver.get("systemMacAddress", ""),
        "interfaces":     {
            k: {"linkStatus": v.get("linkStatus", "")}
            for k, v in ifs.get("interfaceStatuses", {}).items()
        },
        "internalVlans":  _parse_internal_vlans(ivlans),
        "interfaceErrors": _parse_interface_errors(errs),
    }


def _extract_session_diff(output):
    """Extract 'show session-config diffs' text from raw SSH stdout.

    EOS unified-diff format (no @@ hunk headers):
      --- system:/running-config
      +++ session:/topoassist-session-config
      interface Ethernet1/1
      +   description foo

    Capture starts at the first diff header line ('--- ' or '+++ ').
    Capture stops when EOS echoes the next command (always contains '#commit'
    or '#abort' because the prompt includes the mode, e.g.
    'Arista(config-s-topoas)#commit').

    Robustness notes:
      - Accepts either '--- ' or '+++ ' as the start trigger in case EOS
        emits '+++ ' before '--- ' on some versions.
      - Ignores any trailing whitespace on each line.
      - Returns '' for an empty diff (no changes staged).
      - For open_only pushes we don't send a final 'exit' command, so EOS
        outputs a bare prompt ("Hostname#") at EOF — detected by s.endswith('#')."""
    lines   = output.split('\\n')
    diff    = []
    started = False
    for line in lines:
        s = line.rstrip()
        if not started:
            # Accept both orderings of the unified-diff header
            if s.startswith('--- ') or s.startswith('+++ '):
                started = True
                diff.append(s)
        else:
            # EOS echoes the final command as "Prompt#commit", "Prompt#abort",
            # or "Prompt#exit" — '#' is part of the prompt, safe vs diff content.
            # For open_only (no final cmd) a bare EOS prompt ending with '#'
            # signals end of diff output.
            if '#commit' in s or '#abort' in s or '#exit' in s or s.endswith('#'):
                break
            diff.append(s)
    return '\\n'.join(diff).strip()


# EOS block-entering commands — entering these sub-modes changes the PTY prompt context.
# Used to inject context lines into eos_errors so '!' separators can be inserted between blocks.
_BLOCK_CMD_RE = re.compile(
    r'^(?:interface|router\\s+(?:bgp|ospf|isis)|vlan\\s+\\d|address-family)\\s',
    re.IGNORECASE,
)


def _extract_eos_errors(text):
    """Collect EOS % error/warning lines from session output (SSH or joined eAPI text).

    Two stop conditions bound the scan to the config-command phase only:
      1. Diff header ('--- ' or '+++ ') — reached the show session-config diffs output.
      2. Bare exec-mode prompt ('HOSTNAME#') — 'end' was processed and the session
         sub-mode has been exited.  In PTY mode (_ssh_stdin force_tty=True) EOS
         emits a standalone prompt line after 'end' before echoing the next command.
         Condition: line ends with '#' and contains no '(config' (which would indicate
         a configure-session context rather than exec mode).

    In PTY (SSH) mode EOS echoes each command as 'HOSTNAME(config-s-...)#<command>'.
    When a % error follows, the preceding echo is captured as command context so the
    caller can show 'channel-group 4003 mode active → % Invalid input' instead of just
    '% Invalid input'.  Context is only extracted from PTY prompt echoes (lines
    containing both '#' and '(config') — plain eAPI result lines are not treated as
    command echoes, so eAPI mode falls back to bare % lines with no context.

    When a block command (interface, router bgp, vlan, address-family) succeeds but
    sub-commands inside it fail, the block command itself is injected as a context line
    before the first sub-command error.  This lets the caller insert '!' separators
    between distinct config blocks even when the block-entry command produced no error.

    Returns (errors, warnings) — both lists of strings.
    errors: '% error' lines (command rejected), with block context and separators.
    warnings: '! text' lines (command accepted with informational note, e.g. transceiver absent).
    Both lists are empty if no matching lines are found."""
    errors = []
    warnings = []
    prev_cmd = ''
    current_block = ''        # most recent block-entering command seen
    last_block_in_errors = '' # last block whose context line was injected into errors
    for line in text.split('\\n'):
        s = line.strip()
        if s.startswith('--- ') or s.startswith('+++ '):
            break   # reached diff section
        if s.endswith('#') and '(config' not in s:
            break   # bare exec-mode prompt — 'end' was processed, config phase over
        if s.startswith('%'):
            # If we're inside a block that succeeded (e.g. 'interface Eth13' entered OK
            # but 'speed 25g' failed), inject the block command as a context line so
            # the caller can group errors by block with '!' separators.
            if (current_block and current_block != last_block_in_errors
                    and not _BLOCK_CMD_RE.match(prev_cmd)):
                errors.append(current_block)
                last_block_in_errors = current_block
            errors.append(f'{prev_cmd} \\u2192 {s}' if prev_cmd else s)
            # If the block command itself failed, mark it represented so sub-commands
            # in the same block don't re-inject the context line.
            if _BLOCK_CMD_RE.match(prev_cmd):
                last_block_in_errors = current_block
        elif s.startswith('!') and len(s) > 1 and not ('#' in s and '(config' in s):
            # EOS informational note — command was accepted, just a caveat.
            # Exclude PTY prompt-echo lines (!HOSTNAME(config-s-...)#cmd) — those are
            # echoed commands, not warnings, and were being misclassified.
            warnings.append(f'{prev_cmd} \\u2192 {s}' if prev_cmd else s)
        elif '#' in s and '(config' in s:
            # PTY prompt echo: 'HOSTNAME(config-s-...)#the command' → 'the command'
            cmd = s.split('#', 1)[-1].strip()
            if cmd:
                prev_cmd = cmd
                if _BLOCK_CMD_RE.match(cmd):
                    current_block = cmd
    return errors, warnings


_EAPI_FAILED_CMD_RE = re.compile(r"CLI command \\d+ of \\d+ '([^']+)' failed", re.IGNORECASE)

def _annotate_eapi_errors(errors, lines):
    """Inject block-context lines into eAPI error list.

    eAPI errors report 'CLI command N of M <cmd> failed: reason' but carry no
    surrounding block context (no PTY prompt echoes). This function parses the
    failed command name from each error, locates it in lines[], scans backwards
    for the nearest block-entering command (interface / router bgp / etc.), and
    injects that block command as a context line immediately before the error so
    the UI can show 'interface Ethernet5 → ip address ... failed' instead of just
    the raw error with no interface name.
    """
    result = []
    last_injected_block = ''
    for err in errors:
        m = _EAPI_FAILED_CMD_RE.search(err)
        if m:
            failed_cmd = m.group(1).strip()
            block_cmd  = ''
            for i, line in enumerate(lines):
                if line.strip() == failed_cmd:
                    for j in range(i - 1, -1, -1):
                        if _BLOCK_CMD_RE.match(lines[j].strip()):
                            block_cmd = lines[j].strip()
                            break
                    break  # first occurrence of the failed command
            if block_cmd and block_cmd != last_injected_block:
                result.append(block_cmd)
                last_injected_block = block_cmd
        result.append(err)
    return result

# ── SSH stderr cleaner ────────────────────────────────────────────────────────
# Strip known-noisy SSH informational lines from stderr before surfacing errors.
# With -T + LogLevel=ERROR these shouldn't appear; this is a safety net so that
# if they do appear (e.g. older SSH, jump-host quirks), the real error is first.
_SSH_NOISE_RE = re.compile(
    r'^\\s*(pseudo-terminal will not be allocated'
    r'|warning: permanently added'
    r'|debug[123]:'
    r')',
    re.IGNORECASE)

def _clean_ssh_err(err_text):
    """Return err_text with SSH noise lines removed. Strips leading/trailing whitespace."""
    lines = [l for l in err_text.splitlines() if not _SSH_NOISE_RE.match(l)]
    cleaned = '\\n'.join(lines).strip()
    return cleaned or err_text.strip()   # fall back to raw if everything was noise


def _norm_iface(name):
    """Normalize EOS interface names to abbreviated lowercase form for comparison.

    EOS JSON returns long form (Ethernet25/1, Port-Channel10) while the
    topology stores abbreviated form (Et25/1, Po10).  Sub-interfaces
    (Ethernet25/1.100) are handled by the same prefix substitution.
    """
    n = re.sub(r'^Ethernet', 'Et', name, flags=re.IGNORECASE)
    n = re.sub(r'^Port-Channel', 'Po', n, flags=re.IGNORECASE)
    return n.lower()


def _contiguous_ranges(nums):
    """Convert a sorted list of ints to [(start, end), ...] contiguous range tuples.

    [100, 101, 102, 200, 201] → [(100,102), (200,201)]
    """
    if not nums:
        return []
    ranges = []
    start = end = nums[0]
    for n in nums[1:]:
        if n == end + 1:
            end = n
        else:
            ranges.append((start, end))
            start = end = n
    ranges.append((start, end))
    return ranges


# DUPLICATED in Sidebar-js.html as _orphansToCmds. Last synced: 2026-05-09
def _orphans_to_cmds(orphans):
    """Convert _detect_orphans() result to flat EOS CLI cleanup commands.

    SVI orphans (VlanN)      → no interface VlanX-Y  (range — collapses thousands of SVIs)
    Sub-interface orphans    → no interface X          (individual — no EOS range for sub-int)
    PO orphans               → no interface X          (individual — 'default' only resets, PO persists)
    Physical orphans         → default interface X     (individual)
    BGP orphans              → router bgp ASN / no neighbor X / !
    VLAN orphans             → no vlan X-Y             (range)
    VRF orphans              → no vrf instance X
    OSPF orphans             → router ospf_kw / default passive-interface X / !
    """
    cmds = []
    svi_vids    = []   # (vid_int,) for VlanN interfaces → range syntax
    other_ifaces = []  # (cmd_type, name) for sub-int / physical / PO → individual

    for o in orphans.get('interfaces', []):
        name = o['name']
        m = re.match(r'^[Vv]lan(\\d+)$', name)
        if m:
            svi_vids.append(int(m.group(1)))
        elif '.' in name:
            other_ifaces.append(('no', name))
        elif re.match(r'^[Pp]ort-[Cc]hannel\\d+$', name) or re.match(r'^[Pp]o\\d+$', name):
            other_ifaces.append(('no', name))   # delete Po — 'default' only resets, PO persists
        else:
            other_ifaces.append(('default', name))

    if svi_vids:
        svi_vids.sort()
        for start, end in _contiguous_ranges(svi_vids):
            if start == end:
                cmds.append(f'no interface Vlan{start}')
            else:
                cmds.append(f'no interface Vlan{start}-{end}')

    for cmd_type, name in other_ifaces:
        cmds.append(f'{"no" if cmd_type == "no" else "default"} interface {name}')

    bgp_by_asn = {}
    for o in orphans.get('bgp', []):
        asn = o.get('asn')
        if asn:
            bgp_by_asn.setdefault(asn, []).append(o['neighbor'])
    for asn, neighbors in bgp_by_asn.items():
        cmds.append(f'router bgp {asn}')
        for n in neighbors:
            cmds.append(f'   no neighbor {n}')
        cmds.append('!')

    vlan_vids = sorted(int(o['vid']) for o in orphans.get('vlans', []))
    for start, end in _contiguous_ranges(vlan_vids):
        if start == end:
            cmds.append(f'no vlan {start}')
        else:
            cmds.append(f'no vlan {start}-{end}')

    for o in orphans.get('vrfs', []):
        cmds.append(f'no vrf instance {o["name"]}')

    ospf_by_ctx = {}
    for o in orphans.get('ospf', []):
        ospf_by_ctx.setdefault(o['context'], []).append(o['iface'])
    for ctx, ifaces in ospf_by_ctx.items():
        cmds.append(ctx)
        for iface in ifaces:
            cmds.append(f'   default passive-interface {iface}')
        cmds.append('!')
    return cmds


def _items_to_orphans(items):
    """Convert JS [{type, data}] items array to _detect_orphans() dict for _orphans_to_cmds()."""
    orphans = {'interfaces': [], 'bgp': [], 'vlans': [], 'vrfs': [], 'ospf': []}
    for item in (items or []):
        t = item.get('type')
        d = item.get('data', {})
        if   t == 'interface': orphans['interfaces'].append(d)
        elif t == 'bgp':       orphans['bgp'].append(d)
        elif t == 'vlan':      orphans['vlans'].append(d)
        elif t == 'vrf':       orphans['vrfs'].append(d)
        elif t == 'ospf':      orphans['ospf'].append(d)
    return orphans


def _batch_orphan_cmds(cmds, batch_size):
    """Split orphan command list into batches that never cut mid-block.

    EOS cleanup blocks (BGP, OSPF) are multi-line: 'router bgp N' / sub-cmds / '!'.
    Slicing by raw line count can land a batch boundary inside a block, sending EOS
    an incomplete context — the remaining sub-commands then arrive in the next batch
    with no parent context and fail.

    Strategy: segment the list first (one segment = one standalone cmd OR one complete
    block ending with '!'), then fill batches by segment until batch_size is reached.
    A segment boundary only occurs after a standalone line or after '!'.
    """
    # Build segments: each segment is a list of lines forming one logical command/block
    segments = []
    current = []
    for line in cmds:
        if line.strip() == '!':
            current.append(line)
            segments.append(current)
            current = []
        elif (not line.startswith(' ')           # non-indented → standalone or block opener
              and current
              and not current[-1].startswith(' ')  # previous line also non-indented
              and current[-1].strip() != '!'):      # previous line was not a block-end
            # Two consecutive non-indented non-'!' lines → first is a standalone command
            segments.append(current)
            current = [line]
        else:
            current.append(line)
    if current:
        segments.append(current)

    # Pack segments into batches of up to batch_size lines
    batches, batch = [], []
    for seg in segments:
        if batch and len(batch) + len(seg) > batch_size:
            batches.append(batch)
            batch = list(seg)
        else:
            batch.extend(seg)
    if batch:
        batches.append(batch)
    return batches


def _expand_ta_cleanup(lines):
    """Inline ta-clean-* marker expansions into each interface block.

    Markers ('ta-clean-et Et1/1', 'ta-clean-po Port-Channel10', 'ta-clean-vl
    Vlan45') are emitted by Code.gs immediately before the matching 'interface X'
    line. Each marker is stripped and its cleanup commands are injected as the
    first sub-commands of the following interface block — keeping cleanup and new
    config in ONE configure session for atomicity.

    Returns the rewritten line list (no tuple — caller uses it directly as lines).
    """
    result = []
    pending = None
    for line in lines:
        stripped = line.strip()
        parts = stripped.split(None, 1)
        if len(parts) == 2 and parts[0] in TA_ALIAS_EXPANSIONS:
            pending = TA_ALIAS_EXPANSIONS[parts[0]]
        elif pending is not None and stripped.startswith("interface "):
            result.append(line)
            for cmd in pending:
                result.append(" " + cmd)
            pending = None
        else:
            if pending is not None:
                pending = None  # marker not followed by interface — discard silently
            result.append(line)
    return result

class BridgeHandler(BaseHTTPRequestHandler):

    # ── CORS ──────────────────────────────────────────────────────────────────
    def _cors(self):
        self.send_header("Access-Control-Allow-Origin",  "*")
        self.send_header("Access-Control-Allow-Headers", "Content-Type")
        self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")

    def do_OPTIONS(self):
        self.send_response(204)
        self._cors()
        self.end_headers()

    def do_GET(self):
        if self.path == "/health":
            health = {"status": "ok", "version": VERSION,
                      "port": PORT, "method": _cfg['transport'], "timeout": TIMEOUT,
                      "push_timeout": PUSH_TIMEOUT, "cleanup_timeout": CLEANUP_PUSH_TIMEOUT}
            # Only check arista-ssh credentials for pure key-based auth.
            # Password-based modes (sshpass or SSH_ASKPASS shim) don't use
            # arista-ssh certs, so the check is irrelevant.
            if _cfg['transport'] == "ssh":
                if not _SSHPASS_BIN and not _ASKPASS_SCRIPT:
                    # Key-based auth: proactively check arista-ssh cert validity.
                    auth = _check_ssh_agent()
                    if auth["ok"]:
                        _ssh_auth["failures"] = 0
                        _ssh_auth["ok"]  = True
                        _ssh_auth["msg"] = ""
                    else:
                        _ssh_auth["ok"]  = auth["ok"]
                        _ssh_auth["msg"] = auth["msg"]
                # Always report current auth state so the sidebar can show/clear
                # the auth warning banner regardless of the auth method in use.
                health["auth"] = dict(_ssh_auth)
            self._json(200, health)
        else:
            self._json(404, {"error": "not found"})

    def do_POST(self):
        if self.path not in ("/lldp", "/devstatus", "/pushconfig",
                              "/pushconfig/finalize", "/pushconfig/detect_orphans",
                              "/reconcile", "/reconcile/cleanup", "/settings"):
            self._json(404, {"error": "not found"})
            return
        try:
            length = int(self.headers.get("Content-Length", 0))
            body   = json.loads(self.rfile.read(length))
        except Exception:
            self._json(400, {"error": "invalid JSON body"})
            return
        if self.path == "/settings":
            allowed = {"transport", "ssh_user", "ssh_pass", "ssh_port",
                       "jump_host", "jump_user",
                       "eapi_user", "eapi_pass", "eapi_port", "eapi_proto"}
            old_transport = _cfg.get("transport")
            changed = []
            for k, v in body.items():
                if k in allowed:
                    new_v = int(v) if k in ("ssh_port", "eapi_port") else v
                    if _cfg.get(k) != new_v:
                        changed.append((k, _cfg.get(k), new_v))
                    _cfg[k] = new_v
            if changed:
                new_transport = _cfg.get("transport")
                for k, old_v, new_v in changed:
                    if k not in ("ssh_pass", "eapi_pass"):
                        print(f"  {k}: {old_v!r} → {new_v!r}", flush=True)
                if old_transport != new_transport:
                    _print_transport_status()
            self._json(200, {"ok": True, "cfg": {k: _cfg[k] for k in allowed}})
            return
        ip_map              = body.get("ipMap", {})
        dry_run             = bool(body.get("dry_run", False))
        open_session        = bool(body.get("open_session", False))
        all_ifaces          = bool(body.get("all_ifaces", False))
        all_device_names    = body.get("allDeviceNames")  # for BGP __TA neighbor cleanup
        # None = not provided (run detection); {} or {data} = provided (skip re-detection).
        # Do NOT use \`or None\` here — empty dict {} is a valid "detection ran, found nothing" signal.
        orphans_precomputed = body.get("orphans_precomputed")
        # Caller may pass push_timeout (int seconds) to override PUSH_TIMEOUT for this request.
        # Cleanup UI passes CLEANUP_PUSH_TIMEOUT so range-collapsed cmds (e.g. no interface Vlan1-3999)
        # have enough headroom. Regular config pushes omit this → _push_config uses PUSH_TIMEOUT.
        _req_push_timeout   = body.get("push_timeout") or None
        # Auth pre-check: for key-based SSH, fail fast before spawning device threads.
        # Saves 30–120s of per-device SSH timeouts when arista-ssh cert has expired.
        if _cfg['transport'] == "ssh" and not _SSHPASS_BIN and not _ASKPASS_SCRIPT:
            if not _ssh_auth["ok"]:
                self._json(200, {"auth_expired": True, "message": _ssh_auth["msg"]})
                return
            auth = _check_ssh_agent()
            if not auth["ok"]:
                _ssh_auth["ok"]       = False
                _ssh_auth["msg"]      = auth["msg"]
                _ssh_auth["failures"] = _SSH_AUTH_THRESHOLD
                self._json(200, {"auth_expired": True, "message": auth["msg"]})
                return
        if self.path == "/lldp":
            self._json(200, self._run_parallel(ip_map, self._check_lldp))
        elif self.path == "/devstatus":
            self._json(200, self._run_parallel(ip_map, self._check_devstatus))
        elif self.path == "/reconcile":
            # ipMap values are {ip, ports:[...], config_text} dicts
            all_device_names = body.get("allDeviceNames")
            results = {dev: None for dev in ip_map}
            lock    = threading.Lock()
            sem     = threading.Semaphore(MAX_WORKERS)
            def run_cleanup(dev, entry):
                ip             = (entry.get("ip") or "").strip()
                expected_ports = entry.get("ports", [])
                config_text    = entry.get("config_text") or None
                if not ip:
                    with lock: results[dev] = {"ok": False, "error": "No IP configured"}
                    return
                with sem:
                    try:
                        res = self._detect_orphans(ip, config_text=config_text,
                                                   all_device_names=all_device_names,
                                                   expected_ports=expected_ports)
                        with lock: results[dev] = res
                    except subprocess.TimeoutExpired:
                        with lock: results[dev] = {"ok": False, "error": f"Timeout — {ip} unreachable?"}
                    except Exception as e:
                        with lock: results[dev] = {"ok": False, "error": str(e)[:120]}
            threads = [threading.Thread(target=run_cleanup, args=(d, v), daemon=True)
                       for d, v in ip_map.items()]
            for t in threads: t.start()
            for t in threads: t.join(timeout=TIMEOUT + 5)
            with lock:
                for dev in results:
                    if results[dev] is None:
                        results[dev] = {"ok": False, "error": "Cleanup timed out"}
            self._json(200, results)
        elif self.path == "/reconcile/cleanup":
            # ipMap values: {ip, items: [{type, data}]}
            # Converts selected orphan items → _orphans_to_cmds() → _batch_orphan_cmds() → push.
            # Command generation is server-side (Python SSoT) — JS sends structured items, not raw EOS CLI.
            push_timeout = body.get("push_timeout", CLEANUP_PUSH_TIMEOUT)
            results      = {}
            lock         = threading.Lock()
            sem          = threading.Semaphore(MAX_WORKERS)
            def _do_item_cleanup(dev, entry):
                ip    = (entry.get("ip") or "").strip()
                items = entry.get("items") or []
                if not ip:
                    with lock: results[dev] = {"ok": False, "error": "No IP configured"}
                    return
                cmds = _orphans_to_cmds(_items_to_orphans(items))
                if not cmds:
                    with lock: results[dev] = {"ok": True}
                    return
                batches = _batch_orphan_cmds(cmds, CLEANUP_BATCH_SIZE)
                errors  = []
                with sem:
                    for _bn, batch in enumerate(batches, 1):
                        try:
                            res = self._push_config(ip, '\\n'.join(batch),
                                                    push_timeout=push_timeout)
                            if not res.get("ok"):
                                errors.append(res.get("error") or f"batch {_bn} failed")
                        except Exception as e:
                            errors.append(str(e)[:120])
                with lock:
                    results[dev] = {"ok": not errors,
                                    "error": '\\n'.join(errors) if errors else None}
            threads = [threading.Thread(target=_do_item_cleanup, args=(d, v), daemon=True)
                       for d, v in ip_map.items()]
            for t in threads: t.start()
            for t in threads: t.join(timeout=TIMEOUT + 5)
            with lock:
                for dev in ip_map:
                    if dev not in results:
                        results[dev] = {"ok": False, "error": "Cleanup timed out"}
            self._json(200, results)
        elif self.path == "/pushconfig/detect_orphans":
            # Pre-push orphan detection only — no push, no config changes.
            # Client calls this before Phase 1 to show a consent dialog when orphans exist.
            # Failures are best-effort: returns orphans_pending=null so push is never blocked.
            _do_ip   = (body.get("ip") or "").strip()
            _do_cfg  = body.get("config", "")
            _do_devs = body.get("allDeviceNames")
            if not _do_ip or not _do_cfg:
                self._json(400, {"ok": False, "error": "Missing ip or config"})
                return
            try:
                _do_orphans = self._detect_orphans(_do_ip, config_text=_do_cfg,
                                                   all_device_names=_do_devs)
                _do_errs = _do_orphans.get("detection_errors", {}) if _do_orphans else {}
                if (_do_orphans and _do_orphans.get('ok')
                        and _orphans_to_cmds(_do_orphans)):
                    self._json(200, {"ok": True, "orphans_pending": {
                        "interfaces": _do_orphans.get("interfaces", []),
                        "bgp":        _do_orphans.get("bgp",        []),
                        "vlans":      _do_orphans.get("vlans",      []),
                        "vrfs":       _do_orphans.get("vrfs",       []),
                        "ospf":       _do_orphans.get("ospf",       []),
                        "ta_total":   _do_orphans.get("ta_total",   0),
                        "matched":    _do_orphans.get("matched",    0),
                    }, "detection_errors": _do_errs})
                else:
                    self._json(200, {"ok": True, "orphans_pending": None,
                                     "detection_errors": _do_errs})
            except Exception as _doe:
                _vlog(f"[orphan-pre-detect] {_do_ip}: error — {_doe}", flush=True)
                self._json(200, {"ok": True, "orphans_pending": None})
        elif self.path == "/pushconfig/finalize":
            # Phase 2 of two-phase push: batch-clean orphans (on commit), then commit/abort.
            # config + all_device_names present → run orphan cleanup before committing.
            # Absent (abort path) → skip cleanup, just abort the session.
            action           = body.get("action", "abort")
            config_text      = body.get("config") or ""
            all_device_names = body.get("all_device_names") or []
            results = {}
            for dev, entry in ip_map.items():
                ip           = (entry.get("ip") or "").strip()
                session_name = (entry.get("session_name") or "").strip()
                if not ip or not session_name:
                    results[dev] = {"ok": False, "error": "Missing ip or session_name"}
                    continue
                orphans_cleaned = None
                if action == "commit" and config_text and all_device_names:
                    try:
                        _orph = self._detect_orphans(ip, config_text=config_text,
                                                      all_device_names=all_device_names)
                        if _orph and _orph.get('ok'):
                            _orph_cmds = _orphans_to_cmds(_orph)
                            if _orph_cmds:
                                _vlog(f"[orphan-finalize] {ip}: {len(_orph_cmds)} cmd(s) — cleaning before commit", flush=True)
                                _batches   = _batch_orphan_cmds(_orph_cmds, CLEANUP_BATCH_SIZE)
                                _committed = True
                                for _bn, _batch in enumerate(_batches, 1):
                                    try:
                                        self._push_config(ip, '\\n'.join(_batch),
                                                          dry_run=False, all_ifaces=False,
                                                          all_device_names=None,
                                                          push_timeout=CLEANUP_PUSH_TIMEOUT)
                                    except Exception as _be:
                                        _vlog(f"[orphan-finalize] {ip}: batch {_bn} failed — {_be}", flush=True)
                                        _committed = False
                                        break
                                if _committed:
                                    orphans_cleaned = {
                                        "interfaces": _orph.get("interfaces", []),
                                        "bgp":        _orph.get("bgp",        []),
                                        "vlans":      _orph.get("vlans",      []),
                                        "vrfs":       _orph.get("vrfs",       []),
                                        "ospf":       _orph.get("ospf",       []),
                                    }
                    except Exception as _oe:
                        _vlog(f"[orphan-finalize] {ip}: detection error — {_oe}", flush=True)
                try:
                    results[dev] = self._finalize_or_restage(
                        ip, session_name, action, config_text, orphans_cleaned)
                except subprocess.TimeoutExpired:
                    results[dev] = {"ok": False, "error": f"Timeout — {ip} unreachable?"}
                except Exception as e:
                    results[dev] = {"ok": False, "error": str(e)[:200]}
            self._json(200, results)
        else:
            # /pushconfig — ipMap values are {ip, config} dicts, not plain IPs
            # Pre-initialize every device to None so the key always exists in the
            # response even if the thread doesn't finish before join() returns.
            results  = {dev: None for dev in ip_map}
            _n_lines = {}  # dev → config line count, for timeout diagnostics
            lock    = threading.Lock()
            sem     = threading.Semaphore(MAX_WORKERS)
            def run_push(dev, entry):
                ip     = (entry.get("ip") or "").strip()
                config = entry.get("config", "")
                _n_lines[dev] = len(config.splitlines())
                if not ip:
                    with lock: results[dev] = {"ok": False, "error": "No IP configured"}
                    return
                with sem:
                    for attempt in range(PUSH_RETRIES + 1):
                        try:
                            res = self._push_config(ip, config, dry_run=dry_run,
                                                    open_only=open_session,
                                                    all_ifaces=all_ifaces,
                                                    all_device_names=all_device_names,
                                                    push_timeout=_req_push_timeout,
                                                    orphans_precomputed=orphans_precomputed)
                            with lock: results[dev] = res
                            break
                        except subprocess.TimeoutExpired:
                            _nl = _n_lines.get(dev, '?')
                            if attempt < PUSH_RETRIES:
                                if VERBOSE: _vlog(f"[push] {dev} ({ip}): timeout ({_nl} lines, {PUSH_TIMEOUT}s), retrying (attempt {attempt+1})")
                                time.sleep(PUSH_RETRY_DELAY); continue
                            if VERBOSE: _vlog(f"[push] {dev} ({ip}): timeout after {PUSH_RETRIES+1} attempts ({_nl} lines)")
                            with lock: results[dev] = {"ok": False, "error": f"Push timed out — {_nl} config lines, {PUSH_TIMEOUT}s limit exceeded — verify config was applied manually"}
                            break
                        except RuntimeError as e:
                            if ("connection refused" in str(e).lower()
                                    or "ssh failed" in str(e).lower()) and attempt < PUSH_RETRIES:
                                if VERBOSE: _vlog(f"[push] {dev} ({ip}): {e}, retrying (attempt {attempt+1})")
                                time.sleep(PUSH_RETRY_DELAY); continue
                            if VERBOSE: _vlog(f"[push] {dev} ({ip}): error — {e}")
                            with lock: results[dev] = {"ok": False, "error": str(e)}
                            break
                        except NotImplementedError as e:
                            if VERBOSE: _vlog(f"[push] {dev} ({ip}): not implemented — {e}")
                            with lock: results[dev] = {"ok": False, "error": str(e)}
                            break
                        except Exception as e:
                            if VERBOSE: _vlog(f"[push] {dev} ({ip}): unexpected error — {e}")
                            with lock: results[dev] = {"ok": False, "error": str(e)[:120]}
                            break
            threads = [threading.Thread(target=run_push, args=(d, v), daemon=True)
                       for d, v in ip_map.items()]
            for t in threads: t.start()
            # Budget: each _push_config attempt blocks for stale-session cleanup
            # (_abort_stale_sessions thread join — up to TIMEOUT) THEN
            # _ssh_stdin communicate (up to TIMEOUT), so per-attempt cost is 2*TIMEOUT.
            # Using full TIMEOUT for cleanup: sluggish devices (e.g. after large push)
            # need more than 5s to SSH in and abort stale sessions.
            _abort_overhead = TIMEOUT
            join_budget = (PUSH_TIMEOUT + _abort_overhead) * (PUSH_RETRIES + 1) + PUSH_RETRY_DELAY * PUSH_RETRIES + 5
            for t in threads: t.join(timeout=join_budget)
            # Any thread that didn't finish gets a descriptive timeout error instead
            # of null, so the JS never falls through to the generic 'something went wrong'.
            with lock:
                for dev in results:
                    if results[dev] is None:
                        _nl = _n_lines.get(dev, '?')
                        results[dev] = {
                            "ok": False,
                            "error": f"Push timed out — {_nl} config lines, {PUSH_TIMEOUT}s limit exceeded — verify config was applied manually",
                        }
            self._json(200, results)

    # ── Transport: SSH ────────────────────────────────────────────────────────
    def _ssh_cmds(self, ip, *cmds):
        """Run EOS show commands via SSH — parallel connections when >1 command.
        Returns list of parsed JSON dicts, one per command."""
        results = [None] * len(cmds)
        errors  = [None] * len(cmds)  # per-slot exception for re-raise

        def fetch(i, cmd):
            eos_cmd  = f'{cmd} | json'
            base = _ssh_base()
            exec_cmd = [*base, *_jump_args(), f"{_cfg['ssh_user']}@{ip}", eos_cmd]
            if VERBOSE: _vlog(f"[show] {ip}: {cmd}", flush=True)
            stderr_mode = subprocess.PIPE if VERBOSE else subprocess.DEVNULL
            try:
                out = subprocess.check_output(exec_cmd, timeout=TIMEOUT,
                                              text=True, stderr=stderr_mode,
                                              env=_SSH_ENV)
                results[i] = json.loads(out)
                _ssh_auth["failures"] = 0       # successful SSH → clear auth-failure state
                _ssh_auth["ok"]  = True
                _ssh_auth["msg"] = ""
                if VERBOSE: _vlog(f"[show] {ip}: {cmd} → ok", flush=True)
            except subprocess.TimeoutExpired as e:
                if VERBOSE: _vlog(f"[show] {ip}: {cmd} → timeout", flush=True)
                errors[i] = e
            except subprocess.CalledProcessError as e:
                if VERBOSE:
                    err = (e.stderr or "").strip().splitlines()[-1] if e.stderr else ""
                    suffix = f"  [{err}]" if err else ""
                    _vlog(f"[show] {ip}: {cmd} → failed (exit {e.returncode}){suffix}", flush=True)
                # exit 255 = SSH itself failed (auth/connection), not an EOS command error.
                # arista-ssh-agent certs can expire while still appearing in ssh-add -l;
                # the cert is listed but EOS rejects it → SSH exits 255 before any command.
                if e.returncode == 255:
                    _ssh_auth["failures"] += 1
                    if _ssh_auth["failures"] >= _SSH_AUTH_THRESHOLD:
                        _ssh_auth["ok"]  = False
                        _ssh_auth["msg"] = "bus-home session expired — run: arista-ssh login"
                errors[i] = e
            except Exception as e:
                if VERBOSE: _vlog(f"[show] {ip}: {cmd} → error: {e}", flush=True)
                errors[i] = e

        # Run commands sequentially — one SSH connection at a time per device.
        # Opening multiple simultaneous connections to the same device hits
        # EOS ip ssh maximum-sessions and causes "Connection closed by UNKNOWN"
        # (exit 255). Device-level parallelism from _run_parallel provides the
        # speed; per-command parallelism within a device is not needed.
        for i, cmd in enumerate(cmds):
            fetch(i, cmd)
        # Return partial results alongside a cmd→error dict instead of raising.
        # Callers decide whether partial failures are acceptable (devstatus keeps
        # partial data; lldp re-raises because partial LLDP is unusable).
        cmd_errors = {cmds[i]: errors[i] for i in range(len(cmds)) if errors[i] is not None}
        return results, cmd_errors

    # ── Transport: eAPI ───────────────────────────────────────────────────────
    def _eapi_cmds(self, ip, *cmds):
        """Run EOS show commands via eAPI JSON-RPC. Returns list of parsed JSON dicts.
        All commands are sent in a single HTTPS request (more efficient than SSH)."""
        url     = f"{_cfg['eapi_proto']}://{ip}:{_cfg['eapi_port']}/command-api"
        payload = json.dumps({
            "jsonrpc": "2.0", "method": "runCmds",
            "params":  {"version": 1, "cmds": list(cmds), "format": "json"},
            "id":      1,
        }).encode()
        creds = base64.b64encode(f"{_cfg['eapi_user']}:{_cfg['eapi_pass']}".encode()).decode()
        req   = urllib.request.Request(url, data=payload, headers={
            "Content-Type":  "application/json",
            "Authorization": f"Basic {creds}",
        })
        with urllib.request.urlopen(req, timeout=TIMEOUT, context=_SSL_CTX) as r:
            resp = json.loads(r.read())
        if "error" in resp:
            raise RuntimeError(resp["error"].get("message", "eAPI error"))
        return resp["result"]  # list, one entry per command

    # ── Transport: RESTCONF ───────────────────────────────────────────────────
    def _rest_get(self, ip, path):
        """GET a RESTCONF path. Returns parsed dict (OpenConfig YANG JSON)."""
        url   = f"https://{ip}:{REST_PORT}/restconf/data/{path}"
        creds = base64.b64encode(f"{REST_USER}:{REST_PASS}".encode()).decode()
        req   = urllib.request.Request(url, headers={
            "Accept":        "application/yang-data+json",
            "Authorization": f"Basic {creds}",
        })
        with urllib.request.urlopen(req, timeout=TIMEOUT, context=_SSL_CTX) as r:
            return json.loads(r.read())

    # ── Transport: eAPI (text format — for config push) ───────────────────────
    def _eapi_push(self, ip, *cmds, _tout_override=None):
        """Run EOS commands via eAPI with format=text (for configure session).

        stopOnError=False causes EOS to continue executing remaining commands
        after a failure, embedding % error text in each command's output instead
        of aborting and returning a single top-level error.  _extract_eos_errors
        then finds ALL % lines across the full result set in one call.

        Returns list of raw text output strings, one per command.
        """
        url     = f"{_cfg['eapi_proto']}://{ip}:{_cfg['eapi_port']}/command-api"
        payload = json.dumps({
            "jsonrpc": "2.0", "method": "runCmds",
            "params":  {"version": 1, "cmds": list(cmds), "format": "text",
                        "stopOnError": False},
            "id":      1,
        }).encode()
        creds = base64.b64encode(f"{_cfg['eapi_user']}:{_cfg['eapi_pass']}".encode()).decode()
        req   = urllib.request.Request(url, data=payload, headers={
            "Content-Type":  "application/json",
            "Authorization": f"Basic {creds}",
        })
        _tout = _tout_override if _tout_override is not None else (PUSH_TIMEOUT if len(cmds) > 5 else TIMEOUT)
        with urllib.request.urlopen(req, timeout=_tout, context=_SSL_CTX) as r:
            resp = json.loads(r.read())
        if "error" in resp:
            raise RuntimeError(resp["error"].get("message", "eAPI error"))
        return [r.get("output", "") if isinstance(r, dict) else str(r)
                for r in resp["result"]]

    # ── Diagnostic SSH run for eAPI error enrichment ──────────────────────────
    def _diagnose_eapi_errors(self, ip, lines, eos_errs):
        """Open a throwaway SSH configure session to capture % reasons for eAPI errors.

        eAPI 'CLI command N of M cmd failed: could not run command' suppresses the
        specific % reason that EOS emits on a PTY (e.g. '% Virtual IP address is
        already configured').  This function opens a topoassist_<epoch> configure
        session via SSH, replays each failed command in its block context, captures
        all % lines from the PTY output, then aborts — nothing is ever committed.

        % line extraction is index-based (not prompt-based): consecutive % lines
        between non-% output lines form one group; groups are paired to failed
        commands in order.  This avoids EOS prompt-format sensitivity.

        Returns eos_errs with 'could not run command' replaced by the % reason(s).
        If SSH is unavailable or no % lines found, returns eos_errs unchanged.
        """
        try:
            # Collect deduplicated (block_cmd, failed_cmd) pairs in order
            seen  = set()
            pairs = []
            for err in eos_errs:
                m = _EAPI_FAILED_CMD_RE.search(err)
                if not m:
                    continue
                # Skip errors that already have a specific % reason from eAPI —
                # only diagnose those where EOS gave no detail ('could not run command').
                if 'could not run command' not in err.lower():
                    continue
                failed_cmd = m.group(1).strip()
                block_cmd  = ''
                for i, line in enumerate(lines):
                    if line.strip() == failed_cmd:
                        for j in range(i - 1, -1, -1):
                            if _BLOCK_CMD_RE.match(lines[j].strip()):
                                block_cmd = lines[j].strip()
                                break
                        break
                key = (block_cmd, failed_cmd)
                if key not in seen:
                    seen.add(key)
                    pairs.append(key)
            if not pairs:
                return eos_errs

            # Build the diagnostic configure session.
            # Use end + re-enter + abort (same pattern as real push) to ensure clean
            # teardown from any sub-mode depth.  The session is always aborted.
            session   = f"topoassist_{int(time.time())}"
            diag_cmds = [f"configure session {session}"]
            for block_cmd, failed_cmd in pairs:
                if block_cmd:
                    diag_cmds.append(block_cmd)
                diag_cmds.append(failed_cmd)
            diag_cmds.extend(["end", f"configure session {session}", "abort"])

            if VERBOSE:
                _vlog(f"[diag] {ip}: SSH diagnostic for {len(pairs)} error(s) — {session}", flush=True)
            out, _ = self._ssh_stdin(ip, "terminal length 0", *diag_cmds, force_tty=True)

            # Collect consecutive % groups from PTY output — index-aligned with pairs.
            # Each group (one or more consecutive % lines) corresponds to one failed
            # command.  Prompt format is irrelevant: non-% lines flush the current group.
            groups  = []
            current = []
            for line in out.splitlines():
                s = line.strip()
                if s.startswith('%'):
                    current.append(s)
