}

/**
* ---------------------------------------------------------
* FINAL CABLING REPORT (Segregated + Perfectly Aligned)
* ---------------------------------------------------------
*/
function downloadCablingReport(mode) {
  if (!currentData || !currentData.nodes) {
    alert("No topology data found. Please refresh.");
    return;
  }

  // Close modal
  document.getElementById('cablingModal').style.display = 'none';
  document.getElementById('editOverlay').style.display = 'none';

  // --- DERIVE ORDER FROM SHEET COLUMNS ---
  const sheetOrderNames = currentData.nodes.map(n => n.id);
  const sheetIndexMap = {};
  sheetOrderNames.forEach((name, index) => sheetIndexMap[name] = index);

  // 1. GROUPING PHASE
  const { cableGroups } = buildCableGroups();
  const totalCableGroups = Object.values(cableGroups).length;
  const totalIndividualLinks = Object.values(cableGroups).reduce((sum, g) => sum + g.links.length, 0);


  // Model/rack lookup: stored metadata first, devstatus platform as fallback for model
  const devModel = name => (deviceMetadata[name] || {}).model || (devStatusMap[name] || {}).platform || '';
  const devRack  = name => (deviceMetadata[name] || {}).rack || '';

  // 2. ORGANIZE DATA
  const groupedLines = {};

  Object.values(cableGroups).forEach(group => {
    let count = group.links.length;

    let idxA = sheetIndexMap[group.devA];
    let idxB = sheetIndexMap[group.devB];
    if (idxA === undefined) idxA = 9999;
    if (idxB === undefined) idxB = 9999;

    let leftDev, rightDev, leftPhy, rightPhy, leftPorts, rightPorts;
    let sL, sR, xL, xR;

    if (idxA <= idxB) {
      leftDev = group.devA; rightDev = group.devB;
      leftPhy = group.phyA; rightPhy = group.phyB;
      sL = group.speedA; sR = group.speedB;
      xL = group.xcvrA; xR = group.xcvrB;
      leftPorts = group.links.map(l => l.portA);
      rightPorts = group.links.map(l => l.portB);
    } else {
      leftDev = group.devB; rightDev = group.devA;
      leftPhy = group.phyB; rightPhy = group.phyA;
      sL = group.speedB; sR = group.speedA;
      xL = group.xcvrB; xR = group.xcvrA;
      leftPorts = group.links.map(l => l.portB);
      rightPorts = group.links.map(l => l.portA);
    }

    // Formatting Middle Info
    sL = (sL || "").trim(); sR = (sR || "").trim();
    xL = (xL || "").trim(); xR = (xR || "").trim();
    if (sL.toLowerCase() === "auto") sL = "";
    if (sR.toLowerCase() === "auto") sR = "";
    if (xL.toUpperCase().includes('BASE-T')) xL = 'BASE-T';
    if (xR.toUpperCase().includes('BASE-T')) xR = 'BASE-T';
    // sfp-1000baset in xcvr_speed_ is a transceiver-type descriptor, not a speed string.
    // Normalize to a clean speed ("1g") and fill xcvr label if not already set.
    if (sL.toUpperCase().includes('BASE-T')) { if (!xL) xL = 'BASE-T'; sL = '1g'; }
    if (sR.toUpperCase().includes('BASE-T')) { if (!xR) xR = 'BASE-T'; sR = '1g'; }

    let middleInfoFwd = "";
    let middleInfoRev = "";
    let displayPortL = "";
    let displayPortR = "";

    let leftIsQSFP = (idxA <= idxB) ? group.isBreakoutA : group.isBreakoutB;
    let isMixedBreakout = false;

    // Mixed-breakout detection: speed-first (xcvr_speed_ is reliable), port-slash fallback.
    // Scenario C: one QSFP aggregate side (e.g. "100g-4") vs N SFP lane sides (e.g. "25g").
    // Scenario A: both sides breakout-to-breakout — both have slash, same per-lane speed.
    if (count > 1) {
      const lL = sL.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
      const lR = sR.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
      if ((lL && !lR && parseInt(lL[2]) === count) || (lR && !lL && parseInt(lR[2]) === count)) {
        // One side carries aggregate speed → definitively mixed breakout
        isMixedBreakout = true;
        // Refine leftIsQSFP: the aggregate-speed side is always QSFP
        if (lL && !lR) leftIsQSFP = true;
        else if (lR && !lL) leftIsQSFP = false;
      } else {
        const _gbps = s => { const m = s.match(/^(\d+(?:\.\d+)?)(g|t)/i); return m ? Math.round(parseFloat(m[1]) * (/t/i.test(m[2]) ? 1000 : 1)) : 0; };
        const sLn = _gbps(sL);
        const sRn = _gbps(sR);
        if (sLn > 0 && sRn > 0 && sLn !== sRn && (sLn * count === sRn || sRn * count === sLn)) {
          // Speed ratio matches lane count → mixed breakout; higher speed = QSFP side
          isMixedBreakout = true;
          leftIsQSFP = (sLn > sRn);
        } else {
          // Fallback: port-slash notation (QSFP-DD side ports contain "/")
          const leftHasSlash  = (idxA <= idxB) ? group.isBreakoutA : group.isBreakoutB;
          const rightHasSlash = (idxA <= idxB) ? group.isBreakoutB : group.isBreakoutA;
          if (leftHasSlash !== rightHasSlash) isMixedBreakout = true;
        }
      }
    }

    if (isMixedBreakout && count > 1) {
      // --- SCENARIO C: MIXED BREAKOUT (one QSFP -> N SFP) ---
      let xcvrQSFP = leftIsQSFP ? xL : xR;
      let xcvrSFP  = leftIsQSFP ? xR : xL;
      let sQSFP    = leftIsQSFP ? sL : sR;
      let sSFP     = leftIsQSFP ? sR : sL;
      let qLabel = xcvrQSFP || "QSFP";
      let sLabel = xcvrSFP  || "SFP";
      // Aggregate per-lane speed for QSFP side: 25g × 4 lanes → 100g-4; already-aggregated 100g-4 → as-is
      let sQSFPDisplay = sQSFP;
      if (sQSFP && !sQSFP.includes('-')) {
        const m = sQSFP.match(/^(\d+)g$/i);
        sQSFPDisplay = m ? `${parseInt(m[1]) * count}g-${count}` : `${sQSFP}-${count}`;
      }
      let qPart = [qLabel, sQSFPDisplay].filter(Boolean).join(" ");
      let bPart = [sSFP, `${count}*${sLabel}(Breakout)`].filter(Boolean).join(" ");
      if (leftIsQSFP) {
        displayPortL = leftPhy;
        displayPortR = compressPortList(rightPorts);
        middleInfoFwd = `${qPart} ------ ${bPart}`;
        middleInfoRev = `${bPart} ------ ${qPart}`;
      } else {
        displayPortL = compressPortList(leftPorts);
        displayPortR = rightPhy;
        middleInfoFwd = `${bPart} ------ ${qPart}`;
        middleInfoRev = `${qPart} ------ ${bPart}`;
      }

    } else if (count > 1) {
      // --- SCENARIO A: BREAKOUT-TO-BREAKOUT ---
      // Aggregate per-lane speed: "25g" × 4 → "100g-4"; already-aggregated "100g-4" → as-is
      const withLanes = (s, n) => {
        if (!s) return s;
        if (s.includes('-')) return s;
        const m = s.match(/^(\d+)g$/i);
        return m ? `${parseInt(m[1]) * n}g-${n}` : s;
      };
      let fwdLeft  = [xL, withLanes(sL, count)].filter(Boolean).join(" ");
      let fwdRight = [withLanes(sR, count), xR].filter(Boolean).join(" ");
      middleInfoFwd = `${fwdLeft} ------ ${fwdRight}`;

      let revLeft  = [xR, withLanes(sR, count)].filter(Boolean).join(" ");
      let revRight = [withLanes(sL, count), xL].filter(Boolean).join(" ");
      middleInfoRev = `${revLeft} ------ ${revRight}`;

      displayPortL = leftPhy;
      displayPortR = rightPhy;

    } else {
      // --- SCENARIO B: STANDARD CABLE ---

      // FORWARD
      let fwdLeft = [xL, sL].filter(Boolean).join(" ");
      let fwdRight = [sR, xR].filter(Boolean).join(" ");

      // REVERSE
      let revLeft = [xR, sR].filter(Boolean).join(" ");
      let revRight = [sL, xL].filter(Boolean).join(" ");

      if (!fwdLeft && !fwdRight) {
        middleInfoFwd = "------";
        middleInfoRev = "------";
      } else {
        middleInfoFwd = `${fwdLeft} ------ ${fwdRight}`;
        middleInfoRev = `${revLeft} ------ ${revRight}`;
      }

      displayPortL = compressPortList(leftPorts);
      displayPortR = compressPortList(rightPorts);
    }

    // STORE RAW DATA (Forward)
    let itemFwd = {
      leftText: `[${leftDev}] ${displayPortL}`,
      midText: middleInfoFwd,
      rightPortText: displayPortR,
      remote: rightDev,
      sortPort: displayPortL
    };

    // --- ADD TO LISTS ---
    if (mode === 'device') {
      if (!groupedLines[leftDev]) groupedLines[leftDev] = [];
      groupedLines[leftDev].push(itemFwd);

      // Reverse Item (Uses middleInfoRev)
      if (!groupedLines[rightDev]) groupedLines[rightDev] = [];
      groupedLines[rightDev].push({
        leftText: `[${rightDev}] ${displayPortR}`,
        midText: middleInfoRev, // <-- CRITICAL FIX APPLIED HERE
        rightPortText: displayPortL,
        remote: leftDev,
        sortPort: displayPortR
      });
    } else {
      if (!groupedLines[leftDev]) groupedLines[leftDev] = [];
      groupedLines[leftDev].push(itemFwd);
    }
  });

  // 3. GENERATE FINAL REPORT
  let lines = [];
  const title = (mode === 'device') ? "Device Patching List (Full Schedule)" : "Topology Netlist (Sheet Order Flow)";

  lines.push("=".repeat(100));
  lines.push(title);
  lines.push(`Total Cables: ${totalCableGroups}${totalIndividualLinks !== totalCableGroups ? `  (${totalIndividualLinks} individual port connections incl. breakouts)` : ""}`);
  lines.push("=".repeat(100));
  lines.push("");

  // DUTs summary: devices that have a rack assigned
  const dutsWithRack = sheetOrderNames.filter(n => devRack(n));
  if (dutsWithRack.length > 0) {
    lines.push("## DUTs to be used:");
    lines.push("");
    const maxDevLen = Math.max(...dutsWithRack.map(n => n.length));
    dutsWithRack.forEach(n => lines.push(`- ${n.padEnd(maxDevLen)}    >>    ${devRack(n)}`));
    lines.push("");
    lines.push("");
  }

  sheetOrderNames.forEach(devName => {
    const links = groupedLines[devName];
    if (links && links.length > 0) {

      // --- ALIGNMENT CALCULATION FOR THIS DEVICE BLOCK ---
      // Find the longest string on the left side to ensure perfect alignment
      let maxLeftLen = 0;
      let maxMidLen = 0;
      let maxRightPortLen = 0;
      links.forEach(l => {
        if (l.leftText.length > maxLeftLen) maxLeftLen = l.leftText.length;
        if (l.midText.length > maxMidLen) maxMidLen = l.midText.length;
        if (l.rightPortText.length > maxRightPortLen) maxRightPortLen = l.rightPortText.length;
      });
      // Add a little breathing room
      maxLeftLen += 2;
      maxMidLen += 2;
      maxRightPortLen += 1;

      // Header
      lines.push("-".repeat(100));
      const _m = devModel(devName);
      lines.push(`>> ${devName}${_m ? '  [' + _m + ']' : ''}  (${links.length} Cables)`);
      lines.push("-".repeat(100));
      lines.push("");

      // Sub-Groups
      const linksByRemote = {};
      links.forEach(item => {
        if (!linksByRemote[item.remote]) linksByRemote[item.remote] = [];
        linksByRemote[item.remote].push(item);
      });

      const remoteDevices = Object.keys(linksByRemote).sort();

      remoteDevices.forEach(remoteDev => {
        const groupLinks = linksByRemote[remoteDev];
        lines.push(`${devName} to ${remoteDev} (${groupLinks.length} Cables)`);
        lines.push("");

        groupLinks.sort((a, b) => {
          return a.sortPort.localeCompare(b.sortPort, undefined, { numeric: true, sensitivity: 'base' });
        });

        groupLinks.forEach(l => {
          // APPLY PADDING
          let padL = l.leftText.padEnd(maxLeftLen, " ");
          let arrow = "------";
          let padM = l.midText.padEnd(maxMidLen, " ");
          let padRP = l.rightPortText.padEnd(maxRightPortLen, " ");
          // Result: "[DevA] PortA ------ Info ------ PortB        [DevB]"
          let line = `\t${padL} ${arrow} ${padM} ${arrow} ${padRP} [${l.remote}]`;
          lines.push(line);
        });

        lines.push("");
        lines.push("");
      });
    }
  });

  const fileContent = lines.join("\n").trim();
  const blob = new Blob([fileContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const date = new Date();
  const timestamp = date.toISOString().slice(0, 19).replace("T", "_").replace(/:/g, "-");
  const filenameStr = (mode === 'device') ? "Device_Patching_List" : "Topology_Netlist";

  link.href = url;
  link.download = `${filenameStr}_${timestamp}.txt`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}
// --- HELPER: Normalize breakout port to lane-1 anchor ---
// Normalizes the lane suffix to /1 so all lanes of the same physical transceiver
// collapse to one key. Returns a valid EOS port name:
//   Et14/4  → Et14/1  (pizza-box QSFP-DD lane 4 → lane-1 anchor)
//   Et5/22/3 → Et5/22/1 (modular chassis lane 3 → lane-1 anchor)
//   Et14/1  → Et14/1  (already lane 1, unchanged)
//   Et5     → Et5     (no slash, returned as-is)
// DUPLICATED in Code.gs (intentional — testable from Tests.gs). Last synced: 2026-04-19
// Speed regex: /^(\d+(?:\.\d+)?)[gt]-(\d+)$/i — matches both "100g-4" and "1.6t-8".
function getPhysicalPortParent(portName) {
  if (!portName) return "";
  const parts = portName.split('/');
  if (parts.length > 1) {
    const last = parts[parts.length - 1];
    if (!isNaN(parseInt(last))) {
      parts[parts.length - 1] = '1';
      return parts.join('/');
    }
  }
  return portName;
}

// --- HELPER: Compress Port Lists ---
// DUPLICATED in Code.gs (intentional — testable from Tests.gs). Last synced: 2026-04-19
// Joins a sorted port array as a comma-separated list: ["Et1", "Et2", "Et3"] → "Et1, Et2, Et3"
function compressPortList(portArray) {
  if (portArray.length === 0) return "";
  if (portArray.length === 1) return portArray[0];
  portArray.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  return portArray.join(", ");
}

// --- HELPER: BUTTON FEEDBACK ---
function setBtnLoading(btn, isLoading, loadingText = "⏳ Working...") {
  if (!btn) return;

  if (isLoading) {
    // Save original text if not already saved
    if (!btn.dataset.originalText) {
      btn.dataset.originalText = btn.innerText;
    }

    // Use a span for the spinner to keep it inline
    // The CSS class .btn-std { display: inline-flex; } handles the alignment
    btn.innerHTML = `<span style="display:inline-block; animation: spin 1s linear infinite; margin-right: 8px;">↻</span>${loadingText}`;

    btn.disabled = true;
    btn.style.opacity = "0.8";
    btn.style.cursor = "wait";
  } else {
    // Restore
    btn.innerText = btn.dataset.originalText || "Action";
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";
  }
}

function initCustomViewManager() {
  const body = document.getElementById("viewCustomBody");
  const container = document.getElementById("viewCustomContainer");

  if (!body || !container) {
    console.error("Missing DOM elements for Custom View");
    return;
  }

  // 1. CLEANUP: Remove ALL conflicting mode classes first
  document.body.classList.remove('mode-schema', 'mode-reorder', 'mode-topology');

  // 2. ACTIVATE: Add the specific mode class
  document.body.classList.add('mode-view_custom');

  // 3. FORCE VISIBILITY (JS Override)
  container.style.display = "flex";
  container.style.zIndex = "10000";
  container.style.opacity = "1";

  // 4. PREPARE LAYOUT FOR LOADER (Flex centers perfectly, Grid does not)
  body.style.display = "flex";
  body.style.flexDirection = "column";
  body.style.alignItems = "center";
  body.style.justifyContent = "center";

  // 5. SHOW LOADING SPINNER
  body.innerHTML = `
<div style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8;">
<svg width="32" height="32" viewBox="0 0 32 32" style="margin-bottom:15px; animation:spin 1s linear infinite;"><circle cx="16" cy="16" r="12" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="56 20" stroke-linecap="round"/></svg>
<div style="font-weight:600; font-size:13px; font-family:'JetBrains Mono',monospace;">Loading preferences...</div>
</div>`;

  // 6. FETCH DATA
  dbg("Custom View: requesting schema...");
  google.script.run
    .withSuccessHandler(function (schema) {
      dbg("Custom View: schema received", schema.length, "items");
      google.script.run
        .withSuccessHandler(function (savedKeys) {
          dbg("Custom View: prefs received", savedKeys);
          renderCustomViewOptions(schema, savedKeys);
        })
        .withFailureHandler(function (err) {
          body.innerHTML = `<div style="padding:20px; color:#ef4444; text-align:center;">Error loading preferences: ${err.message}</div>`;
        })
        .getViewPreferences();
    })
    .withFailureHandler(function (err) {
      console.error("Server Error:", err);
      body.innerHTML = `<div style="padding:20px; color:#ef4444; text-align:center;">Error: ${err.message}</div>`;
    })
    .getSchemaConfig();
}

/* --- RENDER FUNCTION for Custom View --- */
function renderCustomViewOptions(schema, visibleKeys) {
  const body = document.getElementById("viewCustomBody");
  if (!body) return;

  body.innerHTML = ""; // Clear loader

  // Switch back to Grid so the columns align properly (Left-to-Right)
  body.style.display = "grid";
  body.style.alignItems = "start";
  body.style.justifyContent = "start";

  // Safeguard: Ensure visibleKeys is an array
  const activeKeys = Array.isArray(visibleKeys) ? visibleKeys : [];

  schema.forEach((item, idx) => {
    // First schema entry is always the row identifier — never hideable regardless of key name
    const isMandatory = (idx === 0);

    const div = document.createElement("div");
    div.className = "view-item";
    if (isMandatory) div.classList.add("disabled");

    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.value = item.key;
    chk.className = "view-chk";

    // CHECK LOGIC:
    if (isMandatory) {
      chk.checked = true;
      chk.disabled = true;
      div.title = "This column is required";
    } else {
      // Check if key is in the saved list
      chk.checked = activeKeys.includes(item.key);
    }

    const label = document.createElement("label");
    label.innerText = (item.label || item.key);

    // UX: Click div to toggle checkbox
    if (!isMandatory) {
      div.onclick = function (e) {
        if (e.target !== chk) chk.checked = !chk.checked;
      };
    }

    div.appendChild(chk);
    div.appendChild(label);
    body.appendChild(div);
  });

  // Highlight preset button matching the currently saved view (if any)
  setActivePresetBtn(detectActivePreset(activeKeys));
}

function toggleAllView(state) {
  document.querySelectorAll(".view-chk").forEach(c => {
    if (!c.disabled) c.checked = state;
  });
  setActivePresetBtn(null);
}

const VIEW_PRESETS = {
  cabling:     ['int'],
  transceiver: ['int', 'xcvr_type'],
  speed:       ['int', 'xcvr_type', 'et_speed', 'xcvr_speed'],
  po:          ['int', 'po'],
  mode:        ['int', 'po', 'sp_mode'],
  vlan:        ['int', 'po', 'sp_mode', 'vlan'],
};

function setActivePresetBtn(name) {
  document.querySelectorAll('.view-preset-btn[data-preset]').forEach(b => b.classList.remove('active'));
  if (name) {
    const btn = document.querySelector(`.view-preset-btn[data-preset="${name}"]`);
    if (btn) btn.classList.add('active');
  }
}

function detectActivePreset(visibleKeys) {
  for (const [name, keys] of Object.entries(VIEW_PRESETS)) {
    if (keys.length === visibleKeys.length && keys.every(k => visibleKeys.includes(k))) return name;
  }
  return null;
}

function loadViewPreset(name) {
  const keys = VIEW_PRESETS[name];
  if (!keys) return;
  document.querySelectorAll('.view-chk').forEach(chk => {
    if (!chk.disabled) chk.checked = keys.includes(chk.value);
  });
  setActivePresetBtn(name);
  submitCustomView();
}

function submitCustomView() {
  const btn = document.getElementById("btnApplyView");
  const selected = [];
  document.querySelectorAll(".view-chk").forEach(c => {
    if (c.checked) selected.push(c.value);
  });
  setBtnLoading(btn, true, "Applying...");
  google.script.run
    .withSuccessHandler(() => {
      btn.innerText = "✓ Applied";
      btn.style.background = "var(--success)";
      btn.disabled = false;
      setTimeout(() => {
        btn.innerText = "Apply View";
        btn.style.background = "";
        setBtnLoading(btn, false);
      }, 2000);
    })
    .withFailureHandler(err => {
      setBtnLoading(btn, false);
      btn.innerText = "Apply View";
      alert("✗ Apply Failed: " + err.message);
    })
    .applyCustomView(selected);
}

// --- SESSION STORAGE HELPER (INSTANT RESTORE) ---
function loadFromSession() {
  try {
    const raw = sessionStorage.getItem('topology_data_cache');
    if (raw) {
      const data = JSON.parse(raw);
      // Simple validation to ensure data isn't corrupt
      if (data && data.nodes && data.nodes.length > 0) {
        // Restore Globals needed for Render
        if (data.dropdowns) globalDropdowns = data.dropdowns;
        if (data.deviceNames) globalDeviceNames = data.deviceNames;
        if (data.schema) globalSchema = data.schema;
        if (data.links) globalLinks = data.links;
        if (data.portFrequency) globalPortFrequency = data.portFrequency;
        if (data.snakeTrafficFlags) _snakeTrafficFlags = data.snakeTrafficFlags;
        currentData = data;
        return data;
      }
    }
  } catch (e) {
    console.error("Error restoring session:", e);
  }
  return null;
}

/* --- EOS CONFIG SYNTAX HIGHLIGHTER --- */
function highlightEosConfig(text) {
  if (!text) return "";
  return text.split('\n').map(line => {
    const esc = escapeHtml(line);
    if (/^\s*!!/.test(line))                              return `<span class="cfg-error">${esc}</span>`;
    if (/^\s*!/.test(line))                               return `<span class="cfg-comment">${esc}</span>`;
    if (/^interface\s/i.test(line))                       return `<span class="cfg-interface">${esc}</span>`;
    if (/^router\s+(bgp|ospf|isis)\b/i.test(line))        return `<span class="cfg-router">${esc}</span>`;
    if (/^vlan\s+\d/i.test(line))                         return `<span class="cfg-vlan">${esc}</span>`;
    if (/^mlag\s+configuration/i.test(line))              return `<span class="cfg-mlag">${esc}</span>`;
    if (/^(ip routing|ipv6 unicast-routing)/i.test(line)) return `<span class="cfg-routing">${esc}</span>`;
    if (/^\s+(ip|ipv6)\s+address\s/i.test(line))          return `<span class="cfg-ip">${esc}</span>`;
    if (/^\s+neighbor\s/i.test(line))                     return `<span class="cfg-neighbor">${esc}</span>`;
    if (/^\s+shutdown\b/i.test(line))                     return `<span class="cfg-shutdown">${esc}</span>`;
    if (/^\s+description\s/i.test(line))                  return `<span class="cfg-desc">${esc}</span>`;
    return esc;
  }).join('\n');
}

/* --- UPDATED: showConfigModal with Shortcuts & Aliases --- */
function showConfigModal(deviceName, configText) {
  if (!configText) {
    console.error("No config text provided to modal");
    return;
  }

  currentRawConfig = configText;

  const modal = document.getElementById("configModal");
  const overlay = document.getElementById("editOverlay");
  const body = document.getElementById("configBody");
  const title = document.getElementById("configModalTitle");

  const searchInput = document.getElementById("configSearch");
  const clearBtn = document.getElementById("configSearchClear");
  const matchBadge = document.getElementById("configMatchCount");

  // Reset UI State
  title.innerText = deviceName;
  searchInput.value = "";
  clearBtn.classList.add("hidden");
  matchBadge.classList.add("hidden");

  // Show Full Config initially
  body.innerHTML = highlightEosConfig(configText);

  // Display Modal
  overlay.style.display = "block";
  modal.style.display = "flex";
  searchInput.focus();

  // --- 1. KEYBOARD SHORTCUTS (Esc to Clear) ---
  searchInput.onkeydown = function (e) {
    if (e.key === "Escape") {
      if (this.value.trim() !== "") {
        // If text exists, CLEAR it and keep modal open
        e.preventDefault();
        e.stopPropagation();
        clearConfigSearch();
      }
      // If empty, let the event bubble up to the Global Handler (which closes the modal)
    }
  };

  // --- 2. SMART FILTER LOGIC ---
  searchInput.oninput = function (e) {
    let rawTerm = e.target.value.toLowerCase().trim();

    // Toggle Clear Button
    if (rawTerm.length > 0) clearBtn.classList.remove("hidden");
    else clearBtn.classList.add("hidden");

    if (!rawTerm) {
      body.innerHTML = highlightEosConfig(currentRawConfig);
      matchBadge.classList.add("hidden");
      return;
    }

    // 🧠 EXPANDED ALIASING: Convert CLI shorthands to Full Config Format
    const term = rawTerm
      .replace(/^int\s/, "interface ")// "int " -> "interface "
      .replace(/ethernet/g, "et")// "ethernet" -> "et"
      .replace(/port-channel/g, "po")// "port-channel" -> "po"
      .replace(/^desc\s/, "description ") // "desc " -> "description "
      .replace(/^lo\s?/, "loopback")// "lo0" -> "loopback0"
      .replace(/^mgmt/, "management")// "mgmt" -> "management"
      .replace(/vlan\s/g, "vlan");// Handle vlan spacing

    const lines = currentRawConfig.split('\n');
    let filteredLines = [];
    let isMatchingBlock = false;

    lines.forEach(line => {
      // Header detection: Line with content, not starting with space/bang
      const isHeader = line.length > 0 && !line.startsWith(' ') && !line.startsWith('!');

      if (isHeader) {
        isMatchingBlock = line.toLowerCase().includes(term);
      }

      // Include if block matches OR line matches
      if (isMatchingBlock || line.toLowerCase().includes(term)) {
        filteredLines.push(line);
      }
    });

    body.innerHTML = highlightEosConfig(filteredLines.length > 0
      ? filteredLines.join('\n')
      : "!! No matching blocks found !!");

    matchBadge.innerText = `${filteredLines.length} lines`;
    matchBadge.classList.remove("hidden");
  };
}

/**
* Resolves which configuration text to display based on the button target.
* @param {string} target - 'device', 'left', or 'right'
*/
function openConfigFromButton(target) {
  const statusEl = document.getElementById("status");

  // CASE 1: Full Device Config
  if (target === 'device' && selectedDeviceId) {
    _configViewContext = { deviceName: selectedDeviceId, portFilter: null };
    _setCfgModalPushBtns('device');
    if (currentDeviceConfig && currentDeviceConfig !== "") {
      showConfigModal(selectedDeviceId, currentDeviceConfig);
    } else {
      setStatus("Fetching full config for " + selectedDeviceId + "...");
      fetchFullConfig(selectedDeviceId, () => showConfigModal(selectedDeviceId, currentDeviceConfig));
    }
    return;
  }

  // CASE 2: Interface Link Selected
  if (selectedLineId) {
    const link = linkMap[selectedLineId];
    if (!link) return;

    if (target === 'left') {
      const devNameL = link.u.split(':')[0];
      const portL    = link.u.split(':')[1] || null;
      _configViewContext = { deviceName: devNameL, portFilter: portL };
      _setCfgModalPushBtns('interface');
      if (currentLeftConfig) {
        showConfigModal(devNameL, currentLeftConfig);
      } else {
        setStatus("⏳ Loading End A config...");
      }
    } else if (target === 'right') {
      const devNameR = link.v.split(':')[0];
      const portR    = link.v.split(':')[1] || null;
      _configViewContext = { deviceName: devNameR, portFilter: portR };
      _setCfgModalPushBtns('interface');
      if (currentRightConfig) {
        showConfigModal(devNameR, currentRightConfig);
      } else {
        setStatus("⏳ Loading End B config...");
      }
    }
    return;
  }

  // CASE 3: Guard (Nothing selected)
  if (statusEl) {
    setStatus("△ Select a device or link first", "status-error");
    setTimeout(() => setStatus(getReadyStatus()), 2000);
  }
}

// Show/hide and reset Push buttons in config modal based on view type.
// Hides both push buttons for non-EOS devices — SSH push not applicable.
function _setCfgModalPushBtns(viewType) {
  const piBtn  = document.getElementById('btnCfgPushIface');
  const paBtn  = document.getElementById('btnCfgPushAll');
  if (!piBtn || !paBtn) return;
  const devName  = _configViewContext && _configViewContext.deviceName;
  const isNonEos = devName && allDevicesData[devName] && allDevicesData[devName].type === 'non-arista';
  if (isNonEos) { piBtn.style.display = 'none'; paBtn.style.display = 'none'; return; }
  piBtn.style.display = 'inline-block';
  piBtn.disabled = false; piBtn.textContent = 'Push Interface';
  // 'device' view: show both Push Interface (all iface blocks) + Push All (full config)
  // 'interface' view: show only Push Interface (the single selected interface)
  paBtn.style.display = viewType === 'device' ? 'inline-block' : 'none';
  paBtn.disabled = false; paBtn.textContent = 'Push All';
}

// Extract all interface sections from formatted config text (joined with \n!\n).
function _extractAllInterfaceBlocks(configText) {
  return (configText || '').split('\n!\n')
    .filter(s => s.trim().toLowerCase().startsWith('interface '))
    .join('\n!\n');
}

// Lower-level push — takes config text directly, no fetch needed.
async function _pushConfigText(deviceName, config, label, btnId) {
  if (_pendingPush) return; // another push is already pending confirm
  if (allDevicesData[deviceName] && allDevicesData[deviceName].type === 'non-arista') {
    const st = document.getElementById('status');
    setStatus(`Push not available — ${deviceName} is a non-EOS device`, "status-error");
    return;
  }
  const btn      = document.getElementById(btnId);
  const origText = btn ? btn.textContent : 'Push';
  const st       = document.getElementById('status');

  const ips = _getLldpMgmtIps();
  let   ip  = ips[deviceName] || '';
  if (!ip) {
    const safeId = deviceName.replace(/[^a-zA-Z0-9_-]/g, '_');
    const inp    = document.getElementById('bridgeIp_' + safeId);
    if (inp) ip  = inp.value.trim();
  }
  if (!ip) ip = deviceName;

  if (btn) { btn.disabled = true; btn.textContent = 'Previewing…'; }
  _showPushConfirmModal(label, null);  // show modal immediately with loading state
  try {
    const resp = await fetch(BRIDGE_URL + '/pushconfig', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ipMap: { [deviceName]: { ip, config } }, dry_run: true }),
    });
    if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
    const data = await resp.json();
    const res  = data[deviceName] || {};
    // Guard: user cancelled while fetch was in-flight
    const modal = document.getElementById('pushConfirmModal');
    if (!modal || modal.style.display === 'none') return;
    if (!res.ok) {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      const errMsg = res.error || 'something went wrong';
      setStatus(`${label}: ${errMsg}`, "status-error");
      _updatePushPreviewError(errMsg);
      return;
    }
    // Empty diff = already in sync — update modal for in-sync state
    if (!res.diff || !res.diff.trim()) {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _showPushConfirmModal(label, '', false, true);
      return;
    }
    _pendingPush = { deviceName, ip, config, btnId, origText, label };
    _showPushConfirmModal(label, res.diff);
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    const modal = document.getElementById('pushConfirmModal');
    if (!modal || modal.style.display === 'none') {
      setStatus(`Push error: ${err.message} — is device_bridge.py running?`, "status-error");
      return;
    }
    setStatus(`Push error: ${err.message} — is device_bridge.py running?`, "status-error");
    _updatePushPreviewError(`${err.message} — is device_bridge.py running?`);
  }
}

function _updatePushPreviewError(msg) {
  const titleEl   = document.getElementById('pushConfirmTitle');
  const bodyEl    = document.getElementById('pushConfirmBody');
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  if (titleEl)   titleEl.textContent = 'Push Preview Failed';
  if (bodyEl)    bodyEl.innerHTML    = `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${escapeHtml(msg)}</div>`;
  if (commitBtn) commitBtn.style.display = 'none';
  if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; }
}

function cfgModalPushInterface() {
  if (!_configViewContext) return;
  const { deviceName, portFilter } = _configViewContext;
  if (portFilter) {
    // Single interface view — push just that interface
    pushDeviceConfig(deviceName, 'btnCfgPushIface', portFilter);

}

function _copyToClipboard(text, btnEl) {
  if (!text || !text.trim()) { alert('No config to copy.'); return; }
  const doFeedback = () => {
    if (!btnEl) return;
    const orig = btnEl.innerText;
    btnEl.innerText = '✔ Copied';
    btnEl.style.color = '#10b981';
    setTimeout(() => { btnEl.innerText = orig; btnEl.style.color = ''; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
      alert('Copy failed. Please select and copy manually.');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;user-select:text;-webkit-user-select:text;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); doFeedback(); } catch(e) { alert('Copy failed.'); }
    document.body.removeChild(ta);
  }
}

function copyAllConfig() {
  _copyToClipboard(currentRawConfig, document.getElementById('btnCfgCopyAll'));
}

function copyInterfaceConfig() {
  const lines = (currentRawConfig || '').split('\n');
  const out = [];
  let inIntf = false;
  lines.forEach(line => {
    const isHeader = line.length > 0 && !line.startsWith(' ') && !line.startsWith('!');
    if (isHeader) inIntf = line.toLowerCase().startsWith('interface ');
    if (inIntf) out.push(line);
  });
  _copyToClipboard(out.join('\n'), document.getElementById('btnCfgCopyInterface'));
}

/**
* GLOBAL SEARCH AUTOCOMPLETE
* - Searches data model (allDevicesData / allNodesData) not DOM text
* - Supports role/tag search (e.g. "SPINE", "LEAF")
* - Keyboard navigation: ↑↓ to move, Enter to select, Esc to close
* - Click: navigate + hide dropdown (filter text stays intact)
*/
(function () {
  const searchInp = document.getElementById('searchInp');
  const list = document.getElementById('search-autocomplete');
  const clearBtn = document.getElementById('searchClear');
  let selectedIdx = -1;

  function getItems() { return list.querySelectorAll('.search-item'); }

  function setSelected(idx) {
    const items = getItems();
    selectedIdx = Math.max(-1, Math.min(idx, items.length - 1));
    items.forEach((it, i) => it.classList.toggle('focused', i === selectedIdx));
  }

  searchInp.addEventListener('keydown', function (e) {
    const items = getItems();
    // Jump to first matching visible device when Enter with no autocomplete selection
    if (e.key === 'Enter' && selectedIdx < 0) {
      const q = (searchInp.value || '').toLowerCase().trim();
      if (q) {
        const allNodes = document.querySelectorAll('.node[data-id]');
        for (const n of allNodes) {
          if (!n.classList.contains('dimmed') && (n.dataset.id || '').toLowerCase().includes(q)) {
            e.preventDefault();
            list.classList.add('hidden');
            n.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            n.style.outline = '2px solid #3b82f6';
            setTimeout(() => { n.style.outline = ''; }, 1000);
            return;
          }
        }
      }
    }
    if (list.classList.contains('hidden') || items.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setSelected(selectedIdx + 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSelected(selectedIdx - 1); }
    else if (e.key === 'Enter' && selectedIdx >= 0) { e.preventDefault(); items[selectedIdx].click(); }
    else if (e.key === 'Escape') { list.classList.add('hidden'); selectedIdx = -1; }
  });

  searchInp.addEventListener('input', function (e) {
    const query = e.target.value.toLowerCase().trim();
    selectedIdx = -1;
    list.innerHTML = '';

    if (query.length < 1) { list.classList.add('hidden'); return; }

    const results = [];
    const seen = new Set();

    // CATEGORY 0: v-prefix → suggest VLAN trace shortcut
    const vTraceMatch = query.match(/^v([\d,\-]*)$/i);
    if (vTraceMatch && vTraceMatch[1].length > 0) {
      results.push({ type: 'trace', label: `Trace VLAN ${vTraceMatch[1]}`, vlan: vTraceMatch[1], className: 'type-trace' });
    }

    // CATEGORY 1: DEVICES — match by name, role, or label
    Object.entries(allDevicesData || {}).forEach(([devId, dev]) => {
      const name = devId.toLowerCase();
      const devRole = (dev.role || '').toLowerCase();
      const tags = [devRole, ...(dev.labels || [])].filter(Boolean).join(',').toLowerCase();
      if (!name.includes(query) && !tags.includes(query)) return;
      const node = document.querySelector(`.node[data-id="${devId}"]`);
      if (!node || seen.has(devId)) return;
      seen.add(devId);
      // Badge: prefer role, fall back to first colored label
      const roleTag = devRole.toUpperCase() && ROLE_COLORS[devRole.toUpperCase()]
        ? devRole.toUpperCase()
        : ''; // custom labels have no predefined role colors
      results.push({ type: 'node', label: devId, badge: roleTag, target: node, className: 'type-node' });
    });

    // CATEGORY 2: PORTS — match by name, VLAN, mode, IP type, desc, VRF, Po
    Object.entries(allNodesData || {}).forEach(([portId, port]) => {
      if (!port || !port.details) return;
      const d = port.details;
      const searchText = [port.name, d.vlan_, d.sp_mode_, d.ip_type_, d.desc_, d.vrf_, d.po_]
        .filter(Boolean).join(' ').toLowerCase();
      if (!searchText.includes(query)) return;
      if (seen.has(portId)) return;
      seen.add(portId);
      const portEl = document.querySelector(`.port-row[data-port-id="${portId}"]`);
      if (!portEl) return;
      const parentNode = portEl.closest('.node');
      const deviceLabel = port.device || '';
      const hasIp = /\d+\.\d+\.\d+/.test(searchText);
      const category = hasIp ? 'ip' : d.vlan_ ? 'vlan' : 'port';
      // Determine which field drove the match for context display
      const fieldChecks = [
        { key: 'desc', val: d.desc_ }, { key: 'vrf', val: d.vrf_ },
        { key: 'vlan', val: d.vlan_ }, { key: 'mode', val: d.sp_mode_ },
        { key: 'ip', val: d.ip_type_ }, { key: 'po', val: d.po_ },
      ];
      const mf = fieldChecks.find(f => f.val && String(f.val).toLowerCase().includes(query));
      const matchCtx = (mf && !port.name.toLowerCase().includes(query)) ? `${mf.key}: ${mf.val}` : null;
      results.push({ type: category, label: `${deviceLabel} → ${port.name}`, portId, target: portEl, parentNode, className: `type-${category}`, matchCtx });
    });

    if (results.length === 0) {
      const noRes = document.createElement('div');
      noRes.className = 'search-no-results';
      noRes.innerHTML = `No matches for "<strong>${e.target.value}</strong>"`;
      list.appendChild(noRes);
      list.classList.remove('hidden');
      return;
    }

    const total = results.length;
    // Auto-select first item when there's only one match — feels "complete"
    if (total === 1) selectedIdx = 0;

    let lastSection = null;
    results.slice(0, 12).forEach(res => {
      // Section header: Devices / Ports — insert when section changes
      const section = (res.type === 'node' || res.type === 'trace') ? 'Devices' : 'Ports';
      if (section !== lastSection) {
        const hdr = document.createElement('div');
        hdr.className = 'search-section-header';
        hdr.textContent = section;
        list.appendChild(hdr);
        lastSection = section;
      }

      const item = document.createElement('div');
      item.className = 'search-item';
      const hlLabel = highlightMatch(res.label, query);
      const badge = res.badge ? `<span class="item-role-badge">${_escHtml(res.badge)}</span>` : '';
      const ctx = res.matchCtx ? `<span class="search-item-ctx">${_escHtml(res.matchCtx)}</span>` : '';
      item.innerHTML = `<span>${hlLabel}${badge}${ctx}</span><span class="item-type ${res.className}">${res.type}</span>`;
      item.onclick = () => {
        list.classList.add('hidden');
        selectedIdx = -1;
        if (res.type === 'trace') {
          searchInp.value = 'v' + res.vlan;
          if (clearBtn) clearBtn.style.display = 'flex';
          filterTopology();
        } else if (res.type === 'node') {
          focusAndPulseNode(res.target);
        } else {
          focusAndPulsePort(res.target);
          if (res.type === 'vlan') {
            const portData = allNodesData[res.portId];
            const _pvSearch = parseVlanWithNative(portData?.details?.vlan_);
            const rawVlan = _pvSearch.vlans || _pvSearch.native;
            const vlanId = rawVlan ? String(rawVlan).match(/\d+/)?.[0] : null;
            if (vlanId) {
              searchInp.value = 'v' + vlanId;
              if (clearBtn) clearBtn.style.display = 'flex';
              filterTopology();
            }
          }
        }
      };
      list.appendChild(item);
    });

    if (total > 12) {
      const more = document.createElement('div');
      more.className = 'search-no-results';
      more.style.textAlign = 'center';
      more.innerText = `+${total - 12} more — type more to narrow`;
      list.appendChild(more);
    }

    const footer = document.createElement('div');
    footer.className = 'search-dropdown-footer';
    footer.innerText = 'Filter already applied — select to navigate';
    list.appendChild(footer);

    list.classList.remove('hidden');
    // Render focused state after DOM update
    if (selectedIdx >= 0) setSelected(selectedIdx);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
      list.classList.add('hidden');
      selectedIdx = -1;
    }
  });
})();

  document.getElementById('btnCopyAllConfigs').style.display = 'none';
  document.getElementById('generateAllLeft').innerHTML =
    '<div style="text-align:center;padding:30px 0;color:var(--text-muted);font-family:\'JetBrains Mono\',monospace;font-size:12px;">'
    + '<div style="font-size:20px;margin-bottom:10px;">\u23F3</div>'
    + '<div>Generating configs\u2026 this may take 30\u201360 seconds for large topologies.</div></div>';

  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      btn.innerText = 'Re-Generate All';
      if (result.error) {
        document.getElementById('generateAllLeft').innerHTML =
          '<div style="color:var(--error-text,#ef4444);padding:20px;font-family:\'JetBrains Mono\',monospace;font-size:12px;"><b>Error:</b> ' + result.error + '</div>';
        return;
      }
      const configs = result.configs || [];
      let html = '<div style="font-family:\'JetBrains Mono\',monospace;font-size:12px;padding:4px 0;">'
        + '<div style="color:#10b981;font-weight:700;margin-bottom:12px;">\u2713 ' + configs.length + ' device(s) \u2192 written to <b>' + result.sheetName + '</b> tab'
        + '<span style="font-weight:400;color:var(--text-muted);margin-left:10px;font-size:11px;">' + new Date().toTimeString().slice(0,8) + '</span></div>';
      configs.forEach(function(c) {
        const lines = c.text ? c.text.split('\n').length : 0;
        html += '<div style="display:flex;justify-content:space-between;padding:4px 8px;margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">'
          + '<span style="color:var(--text-main);">' + c.name + '</span>'
          + '<span style="color:var(--text-muted);">' + lines + ' lines</span></div>';
      });
      html += '</div>';
      document.getElementById('generateAllLeft').innerHTML = html;
      window._generateAllText    = configs.map(function(c) {
        return '! === ' + c.name + ' ===\n' + c.text;
      }).join('\n!\n!\n');
      window._generateAllConfigs = configs;  // [{name, text}] — used by pushAllConfigs()
      document.getElementById('btnCopyAllConfigs').style.display  = 'inline-block';
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerText = 'Retry';
      document.getElementById('generateAllLeft').innerHTML =
        '<div style="color:var(--error-text,#ef4444);padding:20px;font-family:\'JetBrains Mono\',monospace;font-size:12px;"><b>Error:</b> ' + err.message + '</div>';
    })
    .getAllDeviceConfigs();
}

function copyAllConfigs() {
  const text = window._generateAllText || '';
  if (!text) return;
  handleCopy(text, 'btnCopyAllConfigs');
}

function collapseAllCards() {

function expandAllCards() {
  document.querySelectorAll('.node.is-collapsed').forEach(el => el.classList.remove('is-collapsed'));
  localStorage.setItem('nb_collapsed', '{}');
  requestAnimationFrame(redrawLinks);
}

const _svgChevronDown = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
const _svgChevronUp   = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>';

function toggleAllCards() {

function refreshConfigAges() {
  const isGreen = w => w && w.style.display !== 'none' &&
    (w.style.background === 'rgb(16, 185, 129)' || w.style.background === '#10b981');

  if (selectedDeviceId) {
    const dev = allDevicesData[selectedDeviceId];
    const wrapper = document.getElementById('splitDevice');
    if (dev && dev.fetchEpoch && isGreen(wrapper)) {
      const label = wrapper.querySelector('.split-label');
      const sheetId = dev.sheetIndex || '-';
      if (label) label.innerText = `[${sheetId}] ${selectedDeviceId}:Config [${formatAgeLabel(dev.fetchEpoch)}]`;
    }
  }

  if (selectedLineId && linkMap[selectedLineId]) {
    const link = linkMap[selectedLineId];
    [['splitLeft', link.u], ['splitRight', link.v]].forEach(([sid, portId]) => {
      const devName = portId.split(':')[0];
      const portName = portId.split(':')[1] || '';
      const dev = allDevicesData[devName];
      if (!dev || !dev.fetchEpoch) return;
      const wrapper = document.getElementById(sid);
      if (!isGreen(wrapper)) return;
      const label = wrapper.querySelector('.split-label');
      const sheetId = dev.sheetIndex || '-';
      if (label) label.innerText = `[${sheetId}] ${devName}:Config:${portName} [${formatAgeLabel(dev.fetchEpoch)}]`;
    });
  }
}

setInterval(refreshConfigAges, 30000);

let _vlanSortKey        = 'id';   // 'id' | 'type' | 'vrf' | 'ports'
let _vlanConflictsOnly  = false;

function _updateVlanSortBtns() {
  ['Id', 'Type', 'Vrf', 'Ports'].forEach(k => {
    const btn = document.getElementById('vlanSort' + k);
    if (!btn) return;
    const active = _vlanSortKey === k.toLowerCase();
    btn.style.background   = active ? '#3b82f6' : 'var(--bg-body)';
    btn.style.color        = active ? '#ffffff'  : 'var(--text-muted)';
    btn.style.borderColor  = active ? '#3b82f6' : 'var(--border)';
  });
  const cb = document.getElementById('vlanConflictsOnlyBtn');
  if (cb) {
    cb.style.background  = _vlanConflictsOnly ? '#ef4444' : 'var(--bg-body)';
    cb.style.color       = _vlanConflictsOnly ? '#ffffff'  : 'var(--text-muted)';
    cb.style.borderColor = _vlanConflictsOnly ? '#ef4444' : 'var(--border)';
  }
}

function setVlanSort(key) {
  _vlanSortKey = key;
  _updateVlanSortBtns();
  filterVlanSummary();
}

function toggleVlanConflictsOnly() {
  _vlanConflictsOnly = !_vlanConflictsOnly;
  _updateVlanSortBtns();
  filterVlanSummary();
}

function _applyVlanFilterSort(sorted, vlanMap, q) {
  let result = sorted;
  if (q) {
    result = result.filter(vid =>
      vid.includes(q)
      || (vlanMap[vid].vrf || '').toLowerCase().includes(q)
      || vlanMap[vid].ports.some(p => p.device.toLowerCase().includes(q) || p.port.toLowerCase().includes(q))
      || (vlanMap[vid].internalOn || []).some(d => d.toLowerCase().includes(q)));
  }
  if (_vlanConflictsOnly) {
    result = result.filter(vid => {
      const info = vlanMap[vid];
      const portDevs = new Set(info.ports.map(p => p.device));
      return (info.internalOn || []).some(d => portDevs.has(d));
    });
  }
  result = result.slice();
  if (_vlanSortKey === 'type') {
    result.sort((a, b) => (vlanMap[a].type || '').localeCompare(vlanMap[b].type || '') || parseInt(a) - parseInt(b));
  } else if (_vlanSortKey === 'vrf') {
    result.sort((a, b) => (vlanMap[a].vrf || '').localeCompare(vlanMap[b].vrf || '') || parseInt(a) - parseInt(b));
  } else if (_vlanSortKey === 'ports') {
    result.sort((a, b) => (vlanMap[b].ports.length - vlanMap[a].ports.length) || parseInt(a) - parseInt(b));
  } else {
    result.sort((a, b) => parseInt(a) - parseInt(b)); // 'id' (default)
  }
  return result;
}

function openVlanSummaryModal() {
  document.getElementById('vlanSummaryFilter').value = '';
  _vlanSortKey       = 'id';
  _vlanConflictsOnly = false;
  buildVlanSummary();
  _updateVlanSortBtns();
  document.getElementById('vlanSummaryModal').style.display = 'flex';
  document.getElementById('editOverlay').style.display = 'block';
}

function closeVlanSummaryModal() {
  document.getElementById('vlanSummaryModal').style.display = 'none';
  document.getElementById('editOverlay').style.display = 'none';
}

function buildVlanSummary() {
  const vlanMap = {};
  // Pass 1: user-configured VLANs from topology port rows
  for (const pid in allNodesData) {
    const node = allNodesData[pid];
    if (!node || !node.details) continue;
    const d = node.details;
    const mode = (d.sp_mode_ || '').toLowerCase();
    const hasIp = (d.ipv4_ && d.ipv4_ !== '-') || (d.ipv6_ && d.ipv6_ !== '-');
    const type = (mode.includes('l3') || mode === 'routed' || hasIp || node.name.toLowerCase().startsWith('vlan'))
      ? 'L3' : 'L2';
    const vrf = (d.vrf_ || '').trim();
    const vlans = new Set();
    const _pvMap = parseVlanWithNative(d.vlan_);
    if (_pvMap.vlans) parseVlanInput(_pvMap.vlans).forEach(v => vlans.add(v));
    if (_pvMap.native) vlans.add(_pvMap.native);
    vlans.forEach(vid => {
      if (!vid) return;
      if (!vlanMap[vid]) vlanMap[vid] = { type, vrf, ports: [], internalOn: [] };
      if (type === 'L3') { vlanMap[vid].type = 'L3'; vlanMap[vid].vrf = vlanMap[vid].vrf || vrf; }
      vlanMap[vid].ports.push({ device: node.device, port: node.name });
    });
  }
  // Pass 2: EOS-internal VLANs from device bridge (deviceInternalVlans: devId → [N,...])
  Object.entries(deviceInternalVlans).forEach(function([devId, ivids]) {
    ivids.forEach(function(numVid) {
      const vid = String(numVid);
      if (vlanMap[vid]) {
        // VLAN is both user-configured and EOS-internal on this device — flag conflict
        if (!vlanMap[vid].internalOn) vlanMap[vid].internalOn = [];
        vlanMap[vid].internalOn.push(devId);
      } else {
        vlanMap[vid] = { type: 'INT', vrf: '', ports: [], internalOn: [devId] };
      }
    });
  });
  const sorted = Object.keys(vlanMap).sort((a, b) => parseInt(a) - parseInt(b));
  window._vlanSummaryData = { vlanMap, sorted };
  renderVlanSummaryTable(sorted, vlanMap);
}

function renderVlanSummaryTable(sorted, vlanMap) {
  const body = document.getElementById('vlanSummaryBody');
  if (!sorted.length) {
    body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);">No VLANs found in topology.</div>';
    document.getElementById('vlanSummaryCount').innerText = '';
    return;
  }
  let html = '<table style="width:100%;border-collapse:collapse;">'
    + '<thead><tr style="position:sticky;top:0;background:var(--bg-secondary);z-index:1;">'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);width:70px;">VLAN</th>'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);width:48px;">Type</th>'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);width:90px;">VRF</th>'
    + '<th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);">Ports / Devices</th>'
    + '</tr></thead><tbody>';
  sorted.forEach((vid, i) => {
    const info = vlanMap[vid];
    const isIntOnly = info.type === 'INT';
    // Conflict only when the SAME device has the VLAN both user-configured and EOS-internal
    const _portDevices = new Set(info.ports.map(p => p.device));
    const hasConflict  = (info.internalOn || []).some(d => _portDevices.has(d));
    const typeColor = isIntOnly ? '#a855f7' : (info.type === 'L3' ? '#f59e0b' : '#60a5fa');
    let portsSummary = info.ports.map(p => p.device + ':' + p.port).join(', ');
    if (info.internalOn && info.internalOn.length) {
      const intText = 'EOS Internal: ' + info.internalOn.join(', ');
      if (portsSummary) {
        portsSummary += ' <span style="color:#a855f7;font-size:10px;margin-left:8px;font-family:\'JetBrains Mono\',monospace;">[' + intText + ']</span>';
      } else {
        portsSummary = '<span style="color:#a855f7;font-family:\'JetBrains Mono\',monospace;">' + intText + '</span>';
      }
    }
    const vidCell = vid + (hasConflict
      ? ' <span style="color:#ef4444;font-size:10px;font-weight:700;font-family:\'JetBrains Mono\',monospace;">[CONFLICT]</span>'
      : '');
    const rowBg = i % 2 === 0 ? 'var(--bg-modal, #ffffff)' : 'var(--bg-secondary)';
    html += '<tr data-vid="' + vid + '" style="background:' + rowBg + ';cursor:pointer;"'
      + ' onclick="closeVlanSummaryModal();setTimeout(function(){traceVlan(\'' + vid + '\');},80);"'
      + ' onmouseover="this.style.background=\'var(--hover-bg,#1e293b)\'"'
      + ' onmouseout="this.style.background=\'' + rowBg + '\'">'
      + '<td style="padding:6px 12px;font-weight:700;color:var(--text-main);">' + vidCell + '</td>'
      + '<td style="padding:6px 12px;"><span style="color:' + typeColor + ';font-weight:700;">' + info.type + '</span></td>'
      + '<td style="padding:6px 12px;color:var(--text-muted);">' + (info.vrf || '—') + '</td>'
      + '<td style="padding:6px 12px;color:var(--text-muted);word-break:break-all;font-size:11px;">' + portsSummary + '</td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  body.innerHTML = html;
  const suffix = _vlanConflictsOnly ? ' · conflicts only' : '';
  document.getElementById('vlanSummaryCount').innerText = sorted.length + ' VLAN' + (sorted.length !== 1 ? 's' : '') + suffix;
}

function filterVlanSummary() {
  const q = (document.getElementById('vlanSummaryFilter').value || '').toLowerCase().trim();
  const { vlanMap, sorted } = window._vlanSummaryData || {};
  if (!vlanMap) return;
  renderVlanSummaryTable(_applyVlanFilterSort(sorted, vlanMap, q), vlanMap);
}

// =====================================================================
// GROUP RECTANGLE FEATURE — Draw, Render, Edit, Delete, Persist
// =====================================================================

// --- DRAW: Convert viewport mouse coords to SVG canvas coords ---
function viewportToSVG(clientX, clientY) {
  const vp = document.getElementById("viewport");
  const rect = vp.getBoundingClientRect();
  const mx = clientX - rect.left;
  const my = clientY - rect.top;
  return { x: (mx - panX) / zoomLevel, y: (my - panY) / zoomLevel };
}

function beginGroupRectDraw(e) {
  e.preventDefault();
  drawStartSVG = viewportToSVG(e.clientX, e.clientY);
  const svg = d3.select("#svg-layer");
  activeDrawRect = svg.select(".group-rects").append("rect")
    .attr("class", "grect-preview")
    .attr("x", drawStartSVG.x).attr("y", drawStartSVG.y)
    .attr("width", 0).attr("height", 0)
    .attr("rx", 8)
    .attr("fill", "none")
    .attr("stroke", "#8b5cf6")
    .attr("stroke-width", 2)
    .attr("stroke-dasharray", "6 3")
    .style("pointer-events", "none");
}

function updateGroupRectDraw(e) {
  if (!activeDrawRect || !drawStartSVG) return;
  const cur = viewportToSVG(e.clientX, e.clientY);
  const x = Math.min(drawStartSVG.x, cur.x);
  const y = Math.min(drawStartSVG.y, cur.y);
  const w = Math.abs(cur.x - drawStartSVG.x);
  const h = Math.abs(cur.y - drawStartSVG.y);
  activeDrawRect.attr("x", x).attr("y", y).attr("width", w).attr("height", h);
}

function endGroupRectDraw() {
  if (!activeDrawRect || !drawStartSVG) return;
  const x = parseFloat(activeDrawRect.attr("x"));
  const y = parseFloat(activeDrawRect.attr("y"));
  const w = parseFloat(activeDrawRect.attr("width"));
  const h = parseFloat(activeDrawRect.attr("height"));
  activeDrawRect.remove();
  activeDrawRect = null;
  drawStartSVG = null;

  // Discard accidental tiny clicks
  if (w < 30 || h < 30) return;

  pendingGroupRectGeom = { x, y, width: w, height: h };
  editingGroupRectId = null;
  openGroupRectModal();
}

// --- RENDER: Draw all saved rects into the SVG group-rects layer ---
// Maps a textPos key to SVG text attributes for a given rect
function getTextAttrs(gr) {
  const pos = gr.textPos || "top-left";
  const P = 10; // inner padding
  const map = {
    "top-left":    { x: gr.x + P,              y: gr.y + 18,                   anchor: "start",  base: "auto"   },
    "top-center":  { x: gr.x + gr.width / 2,   y: gr.y + 18,                   anchor: "middle", base: "auto"   },
    "top-right":   { x: gr.x + gr.width - P,   y: gr.y + 18,                   anchor: "end",    base: "auto"   },
    "mid-left":    { x: gr.x + P,              y: gr.y + gr.height / 2,         anchor: "start",  base: "middle" },
    "mid-center":  { x: gr.x + gr.width / 2,   y: gr.y + gr.height / 2,         anchor: "middle", base: "middle" },
    "mid-right":   { x: gr.x + gr.width - P,   y: gr.y + gr.height / 2,         anchor: "end",    base: "middle" },
    "bot-left":    { x: gr.x + P,              y: gr.y + gr.height - 8,         anchor: "start",  base: "auto"   },
    "bot-center":  { x: gr.x + gr.width / 2,   y: gr.y + gr.height - 8,         anchor: "middle", base: "auto"   },
    "bot-right":   { x: gr.x + gr.width - P,   y: gr.y + gr.height - 8,         anchor: "end",    base: "auto"   },
    "custom":      { x: gr.x + (gr.textOffsetX ?? P), y: gr.y + (gr.textOffsetY ?? 18), anchor: "start", base: "auto" },
  };
  return map[pos] || map["top-left"];
}

// Word-wraps gr.label into <tspan> lines inside textEl, respecting rect width and textPos
function applyWrapToLabel(textEl, gr, ta) {
  const CHAR_W = 7.2;  // JetBrains Mono 12px — monospace so all chars equal
  const LINE_H = 15;
  const maxW = Math.max(gr.width - 20, 10); // 10px padding each side

  const words = (gr.label || "").split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = "";
  words.forEach(word => {
    const test = cur ? cur + " " + word : word;
    if (test.length * CHAR_W > maxW && cur) { lines.push(cur); cur = word; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  if (!lines.length) return;

  // Adjust startY for vertical positions when there are multiple lines
  const pos = gr.textPos || "top-left";
  let startY = ta.y;
  if (pos.startsWith("mid")) startY = gr.y + gr.height / 2 - ((lines.length - 1) * LINE_H) / 2;
  else if (pos.startsWith("bot")) startY = gr.y + gr.height - 8 - (lines.length - 1) * LINE_H;

  textEl.text(null).attr("y", startY).attr("dominant-baseline", "auto");
  lines.forEach((line, i) => {
    textEl.append("tspan").attr("x", ta.x).attr("dy", i === 0 ? 0 : LINE_H).text(line);
  });
}

// Compute vertical label anchor (left edge, bottom-to-top reading)
function getVertLabelAttrs(gr) {
  // Baseline at x = gr.x + 18 so character bodies clear the left border by ~8px
  // Anchor at bottom of rect so text reads upward through the box
  return { x: gr.x + 18, y: gr.y + gr.height - 10 };
}

function renderGroupRectsInto(rectGroup, labelGroup) {
  rectGroup.selectAll(".grect-item").remove();
  if (labelGroup) labelGroup.selectAll(".grect-label-item").remove();

  groupRects.forEach(gr => {
    const strokeColor = gr.color.replace(/[0-9a-f]{2}$/i, "ff");
    const g = rectGroup.append("g").attr("class", "grect-item").attr("data-id", gr.id);
    // Label lives in labelGroup overlay (above cables) if provided, else falls back to g
    const lg = labelGroup
      ? labelGroup.append("g").attr("class", "grect-label-item").attr("data-id", gr.id)
      : g;

    // Helper — keeps all child element positions in sync after any drag/resize
    const HANDLE = 8; // handle square size px
    function syncGrect() {
      g.select(".grect-body")
        .attr("x", gr.x).attr("y", gr.y)
        .attr("width", gr.width).attr("height", gr.height);
      const lbl = lg.select(".grect-label");
      if (gr.vertical) {
        const va = getVertLabelAttrs(gr);
        lbl.attr("x", va.x).attr("y", va.y)
           .attr("text-anchor", "start").attr("dominant-baseline", "auto")
           .attr("transform", `rotate(-90, ${va.x}, ${va.y})`);
      } else {
        const ta = getTextAttrs(gr);
        lbl.attr("text-anchor", ta.anchor);
        if (gr.wrapText) {
          applyWrapToLabel(lbl, gr, ta);
        } else {
          lbl.text(gr.label).attr("x", ta.x).attr("y", ta.y).attr("dominant-baseline", ta.base).attr("transform", null);
        }
      }
      g.select(".grect-handle-nw").attr("x", gr.x - HANDLE/2).attr("y", gr.y - HANDLE/2);
      g.select(".grect-handle-ne").attr("x", gr.x + gr.width - HANDLE/2).attr("y", gr.y - HANDLE/2);
      g.select(".grect-handle-sw").attr("x", gr.x - HANDLE/2).attr("y", gr.y + gr.height - HANDLE/2);
      g.select(".grect-handle-se").attr("x", gr.x + gr.width - HANDLE/2).attr("y", gr.y + gr.height - HANDLE/2);
    }

    // Main body rect — drag moves the whole rectangle
    g.append("rect").attr("class", "grect-body")
      .attr("x", gr.x).attr("y", gr.y)
      .attr("width", gr.width).attr("height", gr.height)
      .attr("rx", 8)
      .attr("fill", gr.color)
      .attr("stroke", strokeColor)
      .attr("stroke-width", 2)
      .attr("stroke-dasharray", "8 4")
      .style("pointer-events", "all")
      .style("cursor", "move")
      .call(d3.drag()
        .on("drag", (event) => { gr.x += event.dx; gr.y += event.dy; syncGrect(); })
        .on("end", () => saveGroupRects()));

    // Label text — rendered into lg (overlay layer or same g if no overlay)
    const ta0 = getTextAttrs(gr);
    const labelEl = lg.append("text").attr("class", "grect-label")
      .attr("font-family", "'JetBrains Mono', monospace")
      .attr("font-size", "12px").attr("font-weight", gr.boldText ? "800" : "400")
      .attr("fill", strokeColor);

    if (gr.vertical) {
      // Left-edge vertical: text reads bottom→top with gap matching horizontal feel
      const va = getVertLabelAttrs(gr);
      labelEl.attr("x", va.x).attr("y", va.y)
             .attr("text-anchor", "start").attr("dominant-baseline", "auto")
             .attr("transform", `rotate(-90, ${va.x}, ${va.y})`)
             .text(gr.label);
    } else {
      labelEl.attr("x", ta0.x).attr("y", ta0.y)
             .attr("text-anchor", ta0.anchor).attr("dominant-baseline", ta0.base);
      // Apply label — plain or word-wrapped
      if (gr.wrapText) {
        applyWrapToLabel(labelEl, gr, ta0);
      } else {
        labelEl.text(gr.label);
      }
    }

    // Custom mode: text is draggable to reposition
    if ((gr.textPos || "top-left") === "custom") {
      labelEl.style("pointer-events", "all").style("cursor", "grab")
        .call(d3.drag()
          .on("start", (e) => e.sourceEvent.stopPropagation())
          .on("drag", (event) => {
            gr.textOffsetX = (gr.textOffsetX ?? 10) + event.dx;
            gr.textOffsetY = (gr.textOffsetY ?? 18) + event.dy;
            const ta = getTextAttrs(gr);
            labelEl.attr("x", ta.x).attr("y", ta.y);
          })
          .on("end", () => saveGroupRects()));
    } else {
      labelEl.style("pointer-events", "none");
    }

    // Corner resize handles — NW, NE, SW, SE
    const corners = [
      { cls: "grect-handle-nw", cursor: "nw-resize",
        x: () => gr.x - HANDLE/2, y: () => gr.y - HANDLE/2,
        drag: (dx, dy) => {
          const newW = gr.width - dx, newH = gr.height - dy;
          if (newW >= 30) { gr.x += dx; gr.width = newW; }
          if (newH >= 30) { gr.y += dy; gr.height = newH; }
        }
      },
      { cls: "grect-handle-ne", cursor: "ne-resize",
        x: () => gr.x + gr.width - HANDLE/2, y: () => gr.y - HANDLE/2,
        drag: (dx, dy) => {
          const newW = gr.width + dx, newH = gr.height - dy;
          if (newW >= 30) gr.width = newW;
          if (newH >= 30) { gr.y += dy; gr.height = newH; }
        }
      },
      { cls: "grect-handle-sw", cursor: "sw-resize",
        x: () => gr.x - HANDLE/2, y: () => gr.y + gr.height - HANDLE/2,
        drag: (dx, dy) => {
          const newW = gr.width - dx, newH = gr.height + dy;
          if (newW >= 30) { gr.x += dx; gr.width = newW; }
          if (newH >= 30) gr.height = newH;
        }
      },
      { cls: "grect-handle-se", cursor: "se-resize",
        x: () => gr.x + gr.width - HANDLE/2, y: () => gr.y + gr.height - HANDLE/2,
        drag: (dx, dy) => {
          if (gr.width  + dx >= 30) gr.width  += dx;
          if (gr.height + dy >= 30) gr.height += dy;
        }
      }
    ];

    corners.forEach(c => {
      g.append("rect").attr("class", "grect-handle " + c.cls)
        .attr("x", c.x()).attr("y", c.y())
        .attr("width", HANDLE).attr("height", HANDLE)
        .attr("rx", 2)
        .attr("fill", strokeColor)
        .style("cursor", c.cursor)
        .style("pointer-events", "all")
        .call(d3.drag()
          .on("drag", (event) => { c.drag(event.dx, event.dy); syncGrect(); })
          .on("end", () => saveGroupRects()))
        .on("dblclick", (e) => e.stopPropagation()); // don't bubble to edit modal
    });

    // Double-click body to edit/delete
    g.on("dblclick", (e) => {
      e.stopPropagation();
      pendingGroupRectGeom = { x: gr.x, y: gr.y, width: gr.width, height: gr.height };
      editingGroupRectId = gr.id;
      selectedGroupRectColor = gr.color;
      selectedGroupRectTextPos = gr.textPos || "top-left";
      selectedGroupRectWrapText = !!gr.wrapText;
      selectedGroupRectBoldText = !!gr.boldText;
      selectedGroupRectVertical = !!gr.vertical;
      document.getElementById("groupRectLabelInp").value = gr.label;
      document.querySelectorAll(".grect-swatch").forEach(s => {
        s.classList.toggle("selected", s.dataset.color === gr.color);
      });
      openGroupRectModal();
    });
  });
}

function refreshGroupRects() {
  const rectGroup = d3.select("#svg-layer .group-rects");
  if (rectGroup.empty()) return;
  const labelOverlay = d3.select("#svg-layer .group-rect-labels");
  renderGroupRectsInto(rectGroup, labelOverlay.empty() ? null : labelOverlay);
}

// --- MODAL ---
function openGroupRectModal() {
  const modal = document.getElementById("groupRectModal");
  const overlay = document.getElementById("editOverlay");
  if (!modal || !overlay) return;
  if (!editingGroupRectId) {
    document.getElementById("groupRectLabelInp").value = "";
    selectedGroupRectColor = "#3b82f620";
    selectedGroupRectTextPos = "top-left";
    selectedGroupRectWrapText = false;
    selectedGroupRectBoldText = false;
    selectedGroupRectVertical = false;
    document.querySelectorAll(".grect-swatch").forEach(s => s.classList.remove("selected"));
    const first = document.querySelector(".grect-swatch");
    if (first) first.classList.add("selected");
    document.getElementById("groupRectDeleteBtn").style.display = "none";
  } else {
    document.getElementById("groupRectDeleteBtn").style.display = "inline-flex";
  }
  // Sync alignment grid and wrap toggle to current selection
  document.querySelectorAll(".grect-align-cell").forEach(c => {
    c.classList.toggle("active", c.dataset.pos === selectedGroupRectTextPos);
  });
  const wrapOpt = document.getElementById("groupRectWrapOpt");
  if (wrapOpt) wrapOpt.classList.toggle("active", selectedGroupRectWrapText);
  const boldOpt = document.getElementById("groupRectBoldOpt");
  if (boldOpt) boldOpt.classList.toggle("active", selectedGroupRectBoldText);
  const vertOpt = document.getElementById("groupRectVerticalOpt");
  if (vertOpt) vertOpt.classList.toggle("active", selectedGroupRectVertical);
  modal.style.display = "flex";
  overlay.style.display = "block";
  setTimeout(() => document.getElementById("groupRectLabelInp").focus(), 50);
}

function closeGroupRectModal() {
  document.getElementById("groupRectModal").style.display = "none";
  document.getElementById("editOverlay").style.display = "none";
  pendingGroupRectGeom = null;
  editingGroupRectId = null;
}

function confirmGroupRect() {
  const label = (document.getElementById("groupRectLabelInp").value || "").trim();
  if (!label || !pendingGroupRectGeom) { closeGroupRectModal(); return; }

  // Auto-expand width so the label always fits inside the rect.
  // JetBrains Mono 12px ≈ 7.2px per char (same constant used in applyWrapToLabel).
  // Skip for vertical and wrap modes — those aren't single-line width-constrained.
  function minWidthForLabel(lbl) {
    return Math.ceil(lbl.length * 7.2) + 20; // 10px padding each side
  }

  if (editingGroupRectId) {
    const existing = groupRects.find(r => r.id === editingGroupRectId);
    if (existing) {
      existing.label = label;
      existing.color = selectedGroupRectColor;
      existing.textPos = selectedGroupRectTextPos;
      existing.wrapText = selectedGroupRectWrapText;
      existing.boldText = selectedGroupRectBoldText;
      existing.vertical = selectedGroupRectVertical;
      if (!selectedGroupRectVertical && !selectedGroupRectWrapText) {
        existing.width = Math.max(existing.width, minWidthForLabel(label));
      }
      if (selectedGroupRectTextPos !== "custom") { delete existing.textOffsetX; delete existing.textOffsetY; }
    }
  } else {
    if (!selectedGroupRectVertical && !selectedGroupRectWrapText) {
      pendingGroupRectGeom.width = Math.max(pendingGroupRectGeom.width, minWidthForLabel(label));
    }
    groupRects.push({
      id: "grect_" + Date.now(),
      x: pendingGroupRectGeom.x, y: pendingGroupRectGeom.y,
      width: pendingGroupRectGeom.width, height: pendingGroupRectGeom.height,
      label: label, color: selectedGroupRectColor,
      textPos: selectedGroupRectTextPos,
      wrapText: selectedGroupRectWrapText,
      boldText: selectedGroupRectBoldText,
      vertical: selectedGroupRectVertical
    });
  }
  saveGroupRects();
  closeGroupRectModal();
  refreshGroupRects();
}

function deleteGroupRect() {
  if (!editingGroupRectId) return;
  groupRects = groupRects.filter(r => r.id !== editingGroupRectId);
  saveGroupRects();
  closeGroupRectModal();
  refreshGroupRects();
}

function populateDevVisPanel() {
  const list = document.getElementById('devVisList');
  if (!list) return;
  list.innerHTML = '';
  const nodes = document.querySelectorAll('.node');
  if (!nodes.length) return;
  nodes.forEach(node => {
    const id = node.dataset.id;
    if (!id) return;
    const titleEl = node.querySelector('.node-header-title');
    const label = titleEl ? titleEl.innerText : id;
    const portCount = node.querySelectorAll('.port-row').length;
    const isHidden = hiddenDevices.has(id);
    const item = document.createElement('div');
    item.className = 'dev-vis-item' + (isHidden ? ' is-hidden' : '');
    item.dataset.devId = id;
    item.title = isHidden ? 'Click to show' : 'Click to hide';
    const isSel = selectedInDevVis.has(id);
    if (isSel) item.classList.add('is-selected');
    item.innerHTML = `
      <input type="checkbox" class="dev-vis-chk" title="Select"${isSel ? ' checked' : ''}>
      <div class="dev-vis-eye" title="${isHidden ? 'Show in topology' : 'Hide in topology'}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${isHidden ? DEV_VIS_EYE_CLOSED : DEV_VIS_EYE_OPEN}</svg>
      </div>
      <span class="dev-vis-name dev-vis-nav" title="Navigate to device in sheet">${escapeHtml(label)}</span>
      <span class="dev-vis-count">${portCount}</span>`;
    const chk = item.querySelector('.dev-vis-chk');
    chk.addEventListener('click', e => e.stopPropagation());
    chk.addEventListener('change', () => toggleDevVisSelect(id));
    item.querySelector('.dev-vis-eye').addEventListener('click', e => { e.stopPropagation(); toggleDeviceVis(id); });
    item.querySelector('.dev-vis-nav').addEventListener('click', e => { e.stopPropagation(); navigateDeviceInSheet(id); });
    item.addEventListener('click', () => toggleDevVisSelect(id));
    list.appendChild(item);
  });
  filterDevVisList();
}

function initDevVisPanelDrag() {
  const panel = document.getElementById('devVisPanel');
  if (!panel || panel._dragInit) return;
  panel._dragInit = true;

  // Convert right/bottom CSS to left/top once so top-clamping is straightforward
  function anchorToLeftTop() {
    if (panel.style.left) return;
    const r = panel.getBoundingClientRect();
    panel.style.right  = '';
    panel.style.bottom = '';
    panel.style.left   = r.left + 'px';
    panel.style.top    = r.top  + 'px';
  }

  panel.addEventListener('mousedown', e => {
    // Allow scroll inside device list and normal interaction on buttons/inputs
    if (e.target.closest('button, input, .dev-vis-list')) return;
    e.preventDefault();
    anchorToLeftTop();

    const r        = panel.getBoundingClientRect();
    const startX   = e.clientX;
    const startY   = e.clientY;
    const startL   = r.left;
    const startT   = r.top;
    panel.style.transition = 'none';
    document.body.style.cursor = 'grabbing';

    const onMove = ev => {
      const tb      = document.querySelector('.toolbar');
      const minTop  = tb ? tb.getBoundingClientRect().bottom + 4 : 0;
      const maxLeft = window.innerWidth  - panel.offsetWidth;
      const maxTop  = window.innerHeight - panel.offsetHeight;
      panel.style.left = Math.min(Math.max(0,      startL + (ev.clientX - startX)), maxLeft) + 'px';
      panel.style.top  = Math.min(Math.max(minTop, startT + (ev.clientY - startY)), maxTop)  + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.body.style.cursor = '';
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}
</script >
