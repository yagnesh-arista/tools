      if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      _setPushStatus(`<b>${label || deviceName}</b> — <span style="color:#f87171;font-weight:600;">push failed: ${errSafe}</span>`);
    }
  } catch (err) {
    // Network/bridge error
    const errSafe = escapeHtml(err.message);
    _ptSet('pt2', '#f87171', 'network error');
    _ptSet('pt3', '#475569', '—');
    _ptDetail(
      `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#f87171;padding:4px 0;">${errSafe}<br>` +
      `<span style="opacity:0.7;">Is device_bridge.py running?</span></div>`);
    if (titleEl) titleEl.textContent = _buildPushTitle(label, deviceName, 'Push Error');
    if (commitBtn) commitBtn.style.display = 'none';
    if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Close'; cancelFtr.onclick = closePushConfirmModal; }
    const btn = document.getElementById(btnId);
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    _setPushStatus(`<b>${label || deviceName}</b> — <span style="color:#f87171;font-weight:600;">Push error: ${err.message} — is device_bridge.py running?</span>`);
  } finally {
    _commitInFlight = false;
    _pendingPush = null;
  }
}


/**
 * _makeDraggable(elOrId, opts) — unified drag-by-header for all modals/panels.
 *
 * opts.headerSel  {string}  CSS selector for drag handle (default: '.modal-header')
 * opts.saveKey    {string}  localStorage key — saves on drag end, restores at init
 * opts.noReset    {bool}    if true, keep position when element is hidden (floating panels)
 * opts.toolbarGap {bool}    if true, clamp top to below .toolbar bottom edge
 */
function _makeDraggable(elOrId, opts) {
  const o     = opts || {};
  const modal = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
  if (!modal) return;
  const header = modal.querySelector(o.headerSel || '.modal-header');
  if (!header || header.dataset.draggable) return; // guard double-attach
  header.dataset.draggable = '1';
  modal.classList.add('modal-draggable');

  // Restore persisted position for panels that save across sessions
  if (o.saveKey) {
    try {
      const saved = JSON.parse(localStorage.getItem(o.saveKey) || 'null');
      if (saved && typeof saved.left === 'string' && typeof saved.top === 'string' &&
          parseFloat(saved.left) >= 0 && parseFloat(saved.top) >= 0) {
        modal.style.left      = saved.left;
        modal.style.top       = saved.top;
        modal.style.right     = '';
        modal.style.bottom    = '';
        modal.style.transform = 'none';
      }
    } catch (e) { localStorage.removeItem(o.saveKey); }
  }

  // Auto-reset to CSS-centered position whenever the element is hidden
  if (!o.noReset) {
    new MutationObserver(() => {
      const d = modal.style.display;
      if (d === 'none' || d === '') {
        modal.style.transform = '';
        modal.style.top       = '';
        modal.style.left      = '';
      }
    }).observe(modal, { attributes: true, attributeFilter: ['style'] });
  }

  // On first drag: convert right/bottom or transform-centered to explicit top/left
  function _anchor() {
    if (modal.style.left && modal.style.left !== 'auto') return;
    const r           = modal.getBoundingClientRect();
    modal.style.transform = 'none';
    modal.style.right     = '';
    modal.style.bottom    = '';
    modal.style.left      = r.left + 'px';
    modal.style.top       = r.top  + 'px';
  }

  header.addEventListener('mousedown', function(e) {
    if (e.target.closest('button')) return;
    e.preventDefault();
    _anchor();
    const startX = e.clientX, startY = e.clientY;
    const startL = parseFloat(modal.style.left) || 0;
    const startT = parseFloat(modal.style.top)  || 0;
    header.style.cursor = 'grabbing';

    function onMove(ev) {
      const mw = modal.offsetWidth, mh = modal.offsetHeight;
      const tb = o.toolbarGap ? document.querySelector('.toolbar') : null;
      const minTop = tb ? tb.getBoundingClientRect().bottom + 4 : 0;
      modal.style.left = Math.max(0,      Math.min(startL + ev.clientX - startX, window.innerWidth  - mw)) + 'px';
      modal.style.top  = Math.max(minTop, Math.min(startT + ev.clientY - startY, window.innerHeight - mh)) + 'px';
    }
    function onUp() {
      header.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      if (o.saveKey) {
        localStorage.setItem(o.saveKey, JSON.stringify({ left: modal.style.left, top: modal.style.top }));
      }
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}


// Strip minimize state when a modal is closed. Call at the top of every close function.
function _onModalClose(el) {
  if (!el) return;
  if (el.id && el.id === _activeModalChipId) _activeModalChipId = null;
  if (el.classList.contains('modal-minimized')) {
    el.classList.remove('modal-minimized');
    delete el.dataset.preMinDisplay;
  }
  _refreshDock();
}
function toggleModalMinimize(modalId) {
  const modal = document.getElementById(modalId);
  if (!modal) return;
  const btn = modal.querySelector('.btn-modal-minimize');
  const isMin = modal.classList.toggle('modal-minimized');
  if (isMin) {
    modal.dataset.preMinDisplay = modal.style.display || 'flex';
    modal.dataset.minimizedAt = Date.now();
    modal.style.display = 'none';
  } else {
    modal.style.display = modal.dataset.preMinDisplay || 'flex';
    delete modal.dataset.preMinDisplay;
    delete modal.dataset.minimizedAt;
  }
  if (btn) {
    btn.innerHTML = isMin
      ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
    btn.title = isMin ? 'Restore' : 'Minimize';
  }
  // In full-screen dialog modes (schema, reorder, view_custom) the container is
  // 100vh — CSS alone can't collapse the GAS dialog window. Resize it via host API.
  if (typeof google !== 'undefined' && google.script && google.script.host) {
    if (document.body.classList.contains('mode-schema') ||
        document.body.classList.contains('mode-reorder') ||
        document.body.classList.contains('mode-view_custom')) {
      if (isMin) {
        const hdr = modal.querySelector('.modal-header');
        google.script.host.setHeight(hdr ? hdr.offsetHeight + 2 : 50);
      } else {
        google.script.host.setHeight(800);
      }
    }
  }
  _refreshDock();
}

// Auto-inject minimize buttons into every modal that has a .btn-modal-close
// but no .btn-modal-minimize yet. Runs once at initApp time.
function _injectMinimizeButtons() {
  const _minSvg = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
  document.querySelectorAll('.modal-std').forEach(modal => {
    if (!modal.id) return;
    const header = modal.querySelector('.modal-header, .modal-keep-on-min');
    if (!header) return;
    if (header.querySelector('.btn-modal-minimize')) return; // already has one
    const btn = document.createElement('button');
    btn.className = 'btn-modal-minimize';
    btn.title = 'Minimize';
    btn.innerHTML = _minSvg;
    btn.onclick = function() { toggleModalMinimize(modal.id); };
    const closeBtn = header.querySelector('.btn-modal-close');
    if (closeBtn) { closeBtn.parentNode.insertBefore(btn, closeBtn); } else { header.appendChild(btn); }
  });
}

function cancelPushConfig() {
  _clearPushSessionGuard();
  if (!_pendingPush) {
    // Phase-1 fetch still in-flight — restore the button immediately; the in-flight
    // path will also restore it when the fetch resolves, but the user sees the fix now.
    if (_previewingPush) {
      const { btnId, origText } = _previewingPush;
      _previewingPush = null;
      const b = document.getElementById(btnId);
      if (b) { b.disabled = false; b.textContent = origText; }
    }
    closePushConfirmModal();
    return;
  }
  // Commit is in-flight — warn before aborting (abort may race against an already-applied commit)
  if (_commitInFlight) {
    const ok = confirm(
      'Config commit is in progress on ' + _pendingPush.deviceName + '.\n\n' +
      'Closing now cannot undo changes already applied to the device.\nClose anyway?'
    );
    if (!ok) return;
  }
  const { deviceName, ip, sessionName, btnId, origText } = _pendingPush;
  _pendingPush = null;
  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = false; btn.textContent = origText; }

  if (!sessionName) {
    // No EOS session was opened — nothing to abort on device
    setStatus('Push cancelled', 'status-warn');
    closePushConfirmModal();
    return;
  }

  // Fire-and-forget abort — close immediately without waiting for device round-trip
  fetch(BRIDGE_URL + '/pushconfig/finalize', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ipMap: { [deviceName]: { ip, session_name: sessionName } }, action: 'abort' }),
  }).catch(() => {});
  setStatus('Push cancelled — session abort sent', 'status-warn');
  closePushConfirmModal();
}


function closePushConfirmModal() {
  _onModalClose(document.getElementById('pushConfirmModal'));
  if (_pushAutoCloseTimeout) { clearTimeout(_pushAutoCloseTimeout); _pushAutoCloseTimeout = null; }
  _clearPushSessionGuard();
  const m = document.getElementById('pushConfirmModal');
  if (m) m.style.display = 'none';
  const titleEl   = document.getElementById('pushConfirmTitle');
  const commitBtn = document.getElementById('btnCommitPush');
  const cancelFtr = document.getElementById('btnCancelPushFtr');
  if (titleEl)   titleEl.textContent     = 'Config Push';
  if (commitBtn) { commitBtn.disabled = false; commitBtn.textContent = 'Commit'; commitBtn.style.display = 'inline-block'; }
  if (cancelFtr) { cancelFtr.style.display = ''; cancelFtr.textContent = 'Cancel'; cancelFtr.onclick = cancelPushConfig; }
  const _xBtn = document.getElementById('btnPushConfirmClose');
  if (_xBtn) _xBtn.onclick = cancelPushConfig;
  const _ftr = m && m.querySelector('.modal-actions');
  if (_ftr) _ftr.style.display = '';
}

function pushLinkSide(side) {
  const dev   = side === 'left' ? _leftDev   : _rightDev;
  const port  = side === 'left' ? _leftPort  : _rightPort;
  const btnId = side === 'left' ? 'btnPushLeft'  : 'btnPushRight';
  if (dev) pushDeviceConfig(dev, btnId, port);
}

// Extract a single interface block from full formatted config text.
// Matches by full or abbreviated interface name (Et1/1 ↔ Ethernet1/1).
function _extractInterfaceBlock(configText, portName) {
  const fullName = _expandIfaceName(portName);
  const targets  = new Set([portName.toLowerCase(), fullName.toLowerCase()]);
  for (const section of configText.split('\n!\n')) {
    const firstLine = section.trim().split('\n')[0].trim().toLowerCase();
    if (firstLine.startsWith('interface ')) {
      const ifName = firstLine.slice('interface '.length).trim();
      if (targets.has(ifName)) return section.trim();
    }
  }
  return null;
}

// ── Bulk push (from Device Operations modal — Push Targets) ───────────────────

async function pushAllConfigs() {
  // Guard: a single-device push is waiting for user confirmation (EOS session PENDING).
  // Push All runs _abort_stale_sessions on each device, which would silently kill the
  // open session — the user's pending Commit would then fail with "session not found".
  if (_pendingPush) {
    setStatus('A push is awaiting confirmation — commit or cancel it before pushing all.', 'status-warn');
    return;
  }
  const btn  = document.getElementById('btnPushAllConfigs');
  const body = document.getElementById('pushResultsBody');
  _switchGenTab('push');

  const _allArista = _getTopologyAristaIds();

  // Device list: EOS devices in current topology, filtered by Push Targets pill selector (all selected by default)
  const deviceNames = _allArista.filter(name => {
    const pill = document.querySelector(`.genall-dev-pill[data-dev="${CSS.escape(name)}"]`);
    return !pill || pill.classList.contains('selected');
  });

  if (!deviceNames.length) {
    body.insertAdjacentHTML('beforeend',
      `<div style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:10px;">` +
      `No devices selected — check Targets above.</div>`);
    return;
  }

  _pushAllStopped = false;
  _pushAllActive  = true;
  btn.disabled = true;
  btn.textContent = 'Pushing…';
  _setGenToolbarActive(true);

  const stopPushBtn = document.getElementById('btnStopPush');
  stopPushBtn.disabled = false;
  stopPushBtn.className = 'btn-mono genall-btn stop-active';
  stopPushBtn.textContent = 'Stop Push';
  stopPushBtn.onclick = function() {
    _pushAllStopped = true;
    _setGenToolbarActive(false, 'warn');
    _resetStopPushBtn();
  };

  // Resolve IPs: management IP from sheet → bridge modal input → hostname fallback (DNS)
  const ips = _getLldpMgmtIps();
  const ipMap = {};
  deviceNames.forEach(name => {
    let ip = ips[name] || '';
    if (!ip) {
      const inp = document.getElementById('bridgeIp_' + name.replace(/[^a-zA-Z0-9_-]/g, '_'));
      ip = inp ? inp.value.trim() : '';
    }
    if (!ip) ip = name;  // hostname fallback — device_bridge.py will resolve via DNS
    ipMap[name] = ip;
  });

  const total = deviceNames.length;
  let completed = 0, okCount = 0;

  // Set up push results pane
  body.innerHTML =
    `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;` +
    `color:var(--text-muted);letter-spacing:0.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);">Push Results</div>` +
    `<div style="font-family:'JetBrains Mono',monospace;font-size:12px;padding-bottom:10px;">` +
    `<span id="genAllPushSummary" style="font-weight:700;color:var(--text-muted);">Pushing 0/${total}…</span>` +
    `<span style="font-size:10px;color:var(--text-muted);margin-left:10px;font-weight:400;">${_bridgeDeviceTimeout}s/attempt · 3 retries</span></div>` +
    `<div id="genAllPushRows"></div>`;
  const rowsEl    = document.getElementById('genAllPushRows');
  const summaryEl = document.getElementById('genAllPushSummary');

  // Helper: build and set a result row (replaces element by id via outerHTML)
  // diff: colored diff block; details: red error text; warnDetails: amber note text
  function _setResultRow(rowId, safeName, color, label, diff, details, warnDetails, infoDetails) {
    if (color === '#ef4444' || color === '#f87171') { _genSignalState = 'err'; }
    else if (color === '#f59e0b' && _genSignalState !== 'err') { _genSignalState = 'warn'; }
    let html =
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;` +
      `margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
      `<span style="color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:12px;">${safeName}</span>` +
      `<span style="color:${color};font-size:11px;">${label}</span></div>`;
    if (diff) {
      html +=
        `<pre style="font-family:'JetBrains Mono',monospace;font-size:10px;background:#0f172a;` +
        `border-radius:3px;padding:5px 8px;margin:0 0 6px;overflow-x:auto;max-height:120px;white-space:pre;">` +
        diff.split('\n').map(l => {
          const e = escapeHtml(l);
          if (l.startsWith('+')) return `<span style="color:#4ade80;">${e}</span>`;
          if (l.startsWith('-')) return `<span style="color:#f87171;">${e}</span>`;
          if (l.startsWith('@')) return `<span style="color:#94a3b8;">${e}</span>`;
          return `<span style="color:#94a3b8;">${e}</span>`;
        }).join('\n') + '</pre>';
    }
    if (details) {
      const safeDetails = escapeHtml(details);
      html +=
        `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#f87171;` +
        `background:#0f172a;border-radius:3px;padding:5px 8px;margin:0 0 6px;white-space:pre-wrap;">${safeDetails}</div>`;
    }
    if (warnDetails) {
      const safeWarn = escapeHtml(warnDetails);
      html +=
        `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#92400e;` +
        `background:#fffbeb;border-radius:3px;padding:5px 8px;margin:0 0 6px;white-space:pre-wrap;">${safeWarn}</div>`;
    }
    if (infoDetails) {
      const safeInfo = escapeHtml(infoDetails);
      html +=
        `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#0c4a6e;` +
        `background:#f0f9ff;border-radius:3px;padding:5px 8px;margin:0 0 6px;white-space:pre-wrap;">${safeInfo}</div>`;
    }
    const rowEl = document.getElementById(rowId);
    if (rowEl) rowEl.outerHTML = html;
  }

  // Helper: update summary counter after each device completes all phases
  function _updateSummary() {
    if (!summaryEl) return;
    if (completed < total) {
      summaryEl.textContent = `Pushing ${completed}/${total}…`;
    } else {
      const ts = new Date().toTimeString().slice(0, 8);
      summaryEl.innerHTML = `Push complete: ${okCount}/${total} successful` +
        `<span style="font-weight:400;color:var(--text-muted);margin-left:10px;font-size:11px;">${ts}</span>`;
      summaryEl.style.color = okCount === total ? '#10b981' : '#f59e0b';
    }
  }

  // Insert a pending placeholder row for each device immediately
  deviceNames.forEach(name => {
    const rowId    = 'gapr_' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
    const safeName = name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    rowsEl.insertAdjacentHTML('beforeend',
      `<div id="${rowId}" style="display:flex;justify-content:space-between;align-items:center;` +
      `padding:3px 8px;margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
      `<span style="color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:12px;">${safeName}</span>` +
      `<span style="color:var(--text-muted);font-size:11px;">pending…</span></div>`);
  });

  // Rolling concurrency window — at most PUSH_CONCURRENCY devices in fetch+push+verify at once.
  // As soon as one device finishes all phases, the next queued device starts.
  const PUSH_CONCURRENCY = 3;
  let _semCount = 0;
  const _semQueue = [];
  const _semAcquire = () => {
    if (_semCount < PUSH_CONCURRENCY) { _semCount++; return Promise.resolve(); }
    return new Promise(r => _semQueue.push(r));
  };
  const _semRelease = () => {
    _semCount--;
    if (_semQueue.length > 0) { _semCount++; _semQueue.shift()(); }
  };

  // Fetch + push + verify each device — rolling window of PUSH_CONCURRENCY concurrent pipelines
  await Promise.allSettled(deviceNames.map(async (name) => {
    await _semAcquire();
    if (_pushAllStopped) {
      const rowId    = 'gapr_' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
      const safeName = escapeHtml(name);
      completed++;
      _updateSummary();
      _setResultRow(rowId, safeName, '#94a3b8', 'skipped', null, null);
      _semRelease();
      return;
    }
    try {
      const rowId    = 'gapr_' + name.replace(/[^a-zA-Z0-9_-]/g, '_');
      const safeName = escapeHtml(name);
      const ip       = ipMap[name];
      const rowEl    = document.getElementById(rowId);

      // ── Phase 0: fetch config (cache hit = instant; cache miss = getDeviceConfig()) ──
      if (rowEl) { const sp = rowEl.querySelector('span:last-child'); if (sp) { sp.textContent = configCache[name] ? 'pushing…' : 'fetching config…'; sp.style.color = '#60a5fa'; } }
      const { config, error: fetchError } = await _fetchConfigForPush(name);
      if (!config) {
        completed++;
        _updateSummary();
        _setResultRow(rowId, safeName, '#ef4444', fetchError || 'config fetch failed', null);
        return;
      }

      // ── Phase 2: actual push (commit) — up to 3 retries on server-side timeout ──
      if (rowEl) { const sp = rowEl.querySelector('span:last-child'); if (sp) { sp.textContent = 'pushing…'; sp.style.color = '#60a5fa'; } }
      let res = null;
      const PUSH_MAX_RETRIES = 3;
      for (let attempt = 1; attempt <= 1 + PUSH_MAX_RETRIES; attempt++) {
        if (rowEl) {
          const sp = rowEl.querySelector('span:last-child');
          if (sp) { sp.textContent = attempt === 1 ? 'pushing…' : `retry ${attempt - 1}/${PUSH_MAX_RETRIES}…`; sp.style.color = attempt === 1 ? '#60a5fa' : '#f59e0b'; }
        }
        try {
          const resp = await fetch(BRIDGE_URL + '/pushconfig', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ ipMap: { [name]: { ip, config } }, all_ifaces: true, allDeviceNames: _allArista }),
          });
          if (!resp.ok) throw new Error('Bridge HTTP ' + resp.status);
          const data = await resp.json();
          if (data.auth_expired) {
            _handleBridgeAuthExpired(data.message);
            res = { ok: false, error: data.message || 'arista-ssh session expired \u2014 run: arista-ssh login' };
            break;
          }
          res = data[name] || null;  // null = server thread timed out → retry
        } catch (e) {
          res = { ok: false, error: e.message };
          break; // Network/HTTP error — no point retrying
        }
        if (res !== null) break; // Got a result (success or explicit device error) — stop
      }

      // ── "No result" diagnosis: all attempts timed out on server side ──────────
      if (!res) {
        let reachable = false;
        try {
          const chk = await fetch(BRIDGE_URL + '/devstatus', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ ipMap: { [name]: ip } }),
          });
          if (chk.ok) {
            const chkData = await chk.json();
            reachable = !!(chkData[name] && chkData[name].ok);
          }
        } catch (_) { /* unreachable */ }
        res = {
          ok: false,
          error: reachable
            ? 'Push timed out — device reachable, verify config manually'
            : 'No response — device unreachable or push timed out',
        };
      }

      if (!res.ok) {
        completed++;
        _updateSummary();
        const _bulkIsTimeout = (res.error || '').toLowerCase().includes('timed out');
        const _bulkHint = _bulkIsTimeout ? 'If Bridge → Cleanup shows stale items, run Cleanup first — removal commands (default interface, no vlan) are slow on EOS and may have caused this.' : null;
        _setResultRow(rowId, safeName, '#ef4444', res.error || 'something went wrong', null, null, null, _bulkHint);
        return;
      }

      const _lateResponse = !!(res.late_response);  // eAPI timed out but session verified committed

      // EOS rejected commands during push — nothing staged means nothing committed
      const _pushEosErrs = _eosErrors(res);
      const _pushEosWarns = _eosWarnings(res);
      if (_pushEosErrs && (!res.diff || !res.diff.trim()) && !_lateResponse) {
        completed++;
        _updateSummary();
        _setResultRow(rowId, safeName, '#f87171', 'All rejected — device unchanged', null, _formatEosErrors(_pushEosErrs));
        return;
      }

      // Capture committed diff and orphan metadata for summary display in Phase 3 success row
      const pushDiff    = (res.diff || '').trim();
      const pushOrphans = res.orphans_cleaned || null;
      const _orphanTotal = pushOrphans
        ? (pushOrphans.interfaces||[]).length + (pushOrphans.bgp||[]).length +
          (pushOrphans.vlans||[]).length + (pushOrphans.vrfs||[]).length +
          (pushOrphans.ospf||[]).length
        : 0;

      // ── Phase 3: dry-run verify (confirm nothing remains after commit) ────────
      // Show "verifying…" state — keep the row id so Phase 3 can replace it
      const verifyPlaceholder =
        `<div id="${rowId}" style="display:flex;justify-content:space-between;align-items:center;` +
        `padding:3px 8px;margin-bottom:2px;background:var(--bg-secondary,#1e293b);border-radius:3px;">` +
        `<span style="color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:12px;">${safeName}</span>` +
        `<span style="color:#a78bfa;font-size:11px;">verifying…</span></div>`;
      const pushRowEl = document.getElementById(rowId);
      if (pushRowEl) pushRowEl.outerHTML = verifyPlaceholder;

      let vDiff      = null;   // null = verify failed; '' = clean; non-empty = partial
      let vError     = null;   // captured error message when verify fails
      let _vEosWarns = null;   // warnings from the dry-run verify pass
      try {
        const vResp = await fetch(BRIDGE_URL + '/pushconfig', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ ipMap: { [name]: { ip, config } }, dry_run: true }),
        });
        if (!vResp.ok) throw new Error('verify HTTP ' + vResp.status);
        const vData = await vResp.json();
        const vRes  = vData[name];
        if (!vRes) { vError = 'No response from bridge for verify step'; }
        else if (vRes.ok) {
          const _vEosErrs = _eosErrors(vRes);
          _vEosWarns = _eosWarnings(vRes);
          if (_vEosErrs && !(vRes.diff || '').trim()) {
            vError = _formatEosErrors(_vEosErrs);
          } else {
            vDiff = (vRes.diff || '').trim();
          }
        }
        else { vError = vRes.error || 'Verify returned error'; }
      } catch (e) { vError = e.message; }

      completed++;
      if (vDiff === '') okCount++;   // only count as success if verify confirms clean
      _updateSummary();

      // Combine Phase 2 push warnings + Phase 3 verify warnings into one amber block.
      const allWarns = [...(_pushEosWarns || []), ...(_vEosWarns || [])];
      const combinedWarnText = allWarns.length ? allWarns.join('\n') : null;
      // Build teal orphan detail line (shown in all non-skip outcomes when orphans were removed).
      const orphanInfoText = _orphanDetailText(pushOrphans);

      if (vDiff === null) {
        const _failLbl = _lateResponse ? 'Committed — eAPI timed out (verify failed)' : 'Committed — verify failed';
        _setResultRow(rowId, safeName, '#f59e0b', _failLbl, null, vError, combinedWarnText, orphanInfoText);
      } else if (vDiff === '') {
        if (_lateResponse) {
          const warnSuffix = allWarns.length > 0 ? ` · ${allWarns.length} note${allWarns.length !== 1 ? 's' : ''}` : '';
          _setResultRow(rowId, safeName, '#f59e0b',
            `Committed — eAPI timed out (verified clean)${warnSuffix}`, null, null, combinedWarnText, orphanInfoText);
        } else if (pushDiff) {
          const added   = pushDiff.split('\n').filter(l => l.startsWith('+')).length;
          const removed = pushDiff.split('\n').filter(l => l.startsWith('-')).length;
          const allWarnCount = allWarns.length;
          const warnSuffix   = allWarnCount > 0 ? ` · ${allWarnCount} note${allWarnCount !== 1 ? 's' : ''}` : '';
          const orphanSuffix = _orphanTotal > 0 ? ` · ${_orphanTotal} orphan${_orphanTotal !== 1 ? 's' : ''} removed` : '';
          const lbl = _pushEosErrs
            ? `Committed (+${added} / -${removed}) · ${_pushEosErrs.length} rejected${warnSuffix}${orphanSuffix}`
            : `Committed (+${added} / -${removed})${warnSuffix}${orphanSuffix}`;
          const clr = _pushEosErrs ? '#f59e0b' : '#10b981';
          _setResultRow(rowId, safeName, clr, lbl, pushDiff,
            _pushEosErrs ? _formatEosErrors(_pushEosErrs) : null,
            combinedWarnText,
            orphanInfoText);
        } else {
          _setResultRow(rowId, safeName, '#64748b', 'Already in sync', null);
        }
      } else {
        const remLines = vDiff.split('\n').filter(l => l.startsWith('+') || l.startsWith('-')).length;
        const _diffLbl = _lateResponse
          ? `Committed — eAPI timed out, ${remLines} line${remLines !== 1 ? 's' : ''} still differ`
          : `Committed — ${remLines} line${remLines !== 1 ? 's' : ''} still differ`;
        _setResultRow(rowId, safeName, '#f59e0b', _diffLbl, vDiff, null, combinedWarnText, orphanInfoText);
      }
    } finally {
      _semRelease();  // always release slot so next queued device can start
    }
  }));

  _pushAllActive = false;
  btn.disabled = false;
  btn.textContent = 'Push Targets';
  _setGenToolbarActive(false, _genSignalState);
  _resetStopPushBtn();

  // Status bar summary — push results are also in the Generate panel but the user
  // may have scrolled away during a long push; this notification persists in the bar.
  if (_pushAllStopped) {
    setStatus(`Push stopped — ${okCount} of ${completed} pushed successfully.`, okCount > 0 ? 'status-warn' : 'status-info');
  } else if (okCount === total) {
    setStatus(`Push complete — ${okCount}/${total} successful.`, 'status-ok');
  } else if (okCount > 0) {
    setStatus(`Push partial — ${okCount}/${total} successful. Check push results for details.`, 'status-warn');
  } else {
    setStatus(`Push failed — 0/${total} successful. Check push results for details.`, 'status-error');
  }
}

// Compare LLDP data against globalLinks. Only checks Et↔Et links on Arista devices.
function _compareBridgeData(bridgeData) {
  bridgePortStatus = {};   // reset per-port status for topology cards
  bridgePortSubType = {};  // reset sub-type (repopulated by _populateBridgePortSubTypes)
  // Build bridgeMap: "DevName:NormIface" → {remoteDevice, remoteIface}
  const bridgeMap = {};
  Object.entries(bridgeData).forEach(([devName, res]) => {
    if (!res.ok || !res.neighbors) return;
    Object.entries(res.neighbors).forEach(([rawIface, info]) => {
      const neighborList = info.bridgeNeighborInfo;
      if (!neighborList || !neighborList.length) return;
      const nb = neighborList[0];
      const remDev  = _normSysName((nb.systemName || '').trim());
      // interfaceId_v2 is clean; interfaceId has embedded quotes ("Ethernet1") — strip them
      const rawRemIface = (nb.neighborInterfaceInfo && (nb.neighborInterfaceInfo.interfaceId_v2 || nb.neighborInterfaceInfo.interfaceId || '')).replace(/^"|"$/g, '');
      const remIface = _normLldpIface(rawRemIface);
      bridgeMap[devName + ':' + _normLldpIface(rawIface)] = { remoteDevice: remDev, remoteIface: remIface };
    });
  });

  const results = [];
  const seen = new Set();

  globalLinks.forEach(link => {
    const pairKey = [link.u, link.v].sort().join('||');
    if (seen.has(pairKey)) return;
    seen.add(pairKey);

    const colonU = link.u.lastIndexOf(':'), colonV = link.v.lastIndexOf(':');
    const devU = link.u.slice(0, colonU), ifU = link.u.slice(colonU + 1);
    const devV = link.v.slice(0, colonV), ifV = link.v.slice(colonV + 1);

    // Only check physical Ethernet links on Arista devices
    const arisU = allDevicesData[devU] && allDevicesData[devU].type !== 'non-arista';
    const arisV = allDevicesData[devV] && allDevicesData[devV].type !== 'non-arista';
    if (!arisU || !arisV)  { results.push({ u: link.u, v: link.v, status: 'skip', msg: 'non-Arista device' }); return; }
    if (!/^et\d/i.test(ifU) || !/^et\d/i.test(ifV)) { results.push({ u: link.u, v: link.v, status: 'skip', msg: 'non-Ethernet interface' }); return; }

    const queriedU = bridgeData[devU] !== undefined;
    const queriedV = bridgeData[devV] !== undefined;
    const okU = bridgeData[devU] && bridgeData[devU].ok;
    const okV = bridgeData[devV] && bridgeData[devV].ok;

    if (!queriedU && !queriedV) { results.push({ u: link.u, v: link.v, status: 'unknown', msg: 'neither device queried' }); return; }

    const bridgeU = bridgeMap[link.u]; // what LLDP says U sees
    const bridgeV = bridgeMap[link.v]; // what LLDP says V sees

    // Check each direction independently (only if device was successfully queried).
    // `|| false` is critical: bridgeU/bridgeV may be undefined (no LLDP neighbor on that port).
    // undefined && expr = undefined, and undefined !== false, so without || false the
    // mismatch branch is skipped and the link incorrectly shows as "SSH failed" (partial).
    const uMatch = !okU ? null : ((bridgeU && bridgeU.remoteDevice === devV && bridgeU.remoteIface === ifV) || false);
    const vMatch = !okV ? null : ((bridgeV && bridgeV.remoteDevice === devU && bridgeV.remoteIface === ifU) || false);

    // Populate per-port status for topology card indicators
    if (okU) bridgePortStatus[link.u] = uMatch ? 'match' : (bridgeU ? 'mismatch' : 'missing');
    if (okV) bridgePortStatus[link.v] = vMatch ? 'match' : (bridgeV ? 'mismatch' : 'missing');

    if (uMatch === true && (vMatch === true || vMatch === null)) {
      results.push({ u: link.u, v: link.v, status: 'match' });
    } else if (uMatch === false || vMatch === false) {
      const parts = [];
      if (uMatch === false) {
        parts.push(bridgeU
          ? devU + ':' + ifU + ' sees ' + bridgeU.remoteDevice + ':' + bridgeU.remoteIface
          : devU + ':' + ifU + ' — no LLDP neighbor');
      }
      if (vMatch === false) {
        parts.push(bridgeV
          ? devV + ':' + ifV + ' sees ' + bridgeV.remoteDevice + ':' + bridgeV.remoteIface
          : devV + ':' + ifV + ' — no LLDP neighbor');
      }
      results.push({ u: link.u, v: link.v, status: 'mismatch', msg: parts.join(' / ') });
    } else {
      // Build per-device status: SSH failed vs not queried at all
      const label = (dev, queried, ok) =>
        !queried ? dev + ' not queried' : !ok ? dev + ' SSH failed' : null;
      const msgs = [label(devU, queriedU, okU), label(devV, queriedV, okV)].filter(Boolean);
      results.push({ u: link.u, v: link.v, status: 'partial', msg: msgs.join(', ') });
    }
  });

  // Find LLDP-discovered links not present in the sheet (both endpoints must be topology devices)
  const orphans = [];
  const seenOrphanPairs = new Set();
  Object.entries(bridgeMap).forEach(([key, val]) => {
    const colon    = key.lastIndexOf(':');
    const localDev = key.slice(0, colon);
    const localIf  = key.slice(colon + 1);
    const remDev   = val.remoteDevice;
    const remIf    = val.remoteIface;
    if (!allDevicesData[localDev] || !allDevicesData[remDev]) return;
    const pairKey  = [localDev + ':' + localIf, remDev + ':' + remIf].sort().join('||');
    if (seenOrphanPairs.has(pairKey)) return;
    seenOrphanPairs.add(pairKey);
    // A link is Discovered only when BOTH ports are absent from every sheet row.
    // If either port already appears in a sheet link (pointing to a different peer),
    // the mismatch is already reported in the Results section — don't duplicate it here.
    const _portInSheet = (dev, iface) => globalLinks.some(l => {
      const cu = l.u.lastIndexOf(':'), cv = l.v.lastIndexOf(':');
      const dU = l.u.slice(0, cu), iU = _normLldpIface(l.u.slice(cu + 1));
      const dV = l.v.slice(0, cv), iV = _normLldpIface(l.v.slice(cv + 1));
      return (dU === dev && iU === iface) || (dV === dev && iV === iface);
    });
    if (!_portInSheet(localDev, localIf) && !_portInSheet(remDev, remIf))
      orphans.push({ localDev, localIf, remDev, remIf });
  });

  // Keep _lastBridgeResults/_lastBridgeOrphans in sync with bridgePortStatus — both come from here.
  // runValidation() reads bridgePortStatus for port counts and replays _lastBridgeResults for log detail.
  _lastBridgeResults = results;
  _lastBridgeOrphans = orphans;

  return { results, orphans };
}

// Log bridge check results to statusLog for All/Errors/Bridge tabs.
// [Audit - Live] emitted unconditionally — no dedup (each bridge check is a distinct event).
//   runValidation() rebuilds _auditIssues from bridgePortStatus for the Audit tab separately.
// [Bridge] for SSH/cmd failures (operational) — only when dsData is provided, never replayed.
// Classification uses bridgePortStatus (same source as link coloring), NOT r.msg content —
// avoids misrouting mixed-case links (wrong neighbor one end, no neighbor other end).
function _logBridgeIssuesToStatusLog(results, orphans, dsData) {
  if (results) {
    results.filter(r => r.status === 'mismatch').forEach(r => {
      const uStatus = bridgePortStatus[r.u];
      const vStatus = bridgePortStatus[r.v];
      const hasMismatch = uStatus === 'mismatch' || vStatus === 'mismatch';
      if (hasMismatch && bridgeAuditFlagMismatch) {
        setStatus(`[Audit - Live] LLDP mismatch: ${r.u} \u2194 ${r.v}${r.msg ? ' \u2014 ' + r.msg : ''}`, 'status-error');
      } else if (!hasMismatch) {
        const uSub = bridgePortSubType[r.u] || 'other', vSub = bridgePortSubType[r.v] || 'other';
        const _sub = (uSub === 'errdis' || vSub === 'errdis') ? 'errdis'
                   : (uSub === 'shut'   || vSub === 'shut')   ? 'shut'
                   : (uSub === 'down'   || vSub === 'down')   ? 'down' : 'other';
        if (_sub === 'errdis' && bridgeAuditFlagErrDis)
          setStatus(`[Audit - Live] Interface errdis: ${r.u} \u2194 ${r.v}`, 'status-error');
        else if (_sub === 'shut' && bridgeAuditFlagShut)
          setStatus(`[Audit - Live] Interface shut: ${r.u} \u2194 ${r.v}`, 'status-error');
        else if (_sub === 'down' && bridgeAuditFlagDown)
          setStatus(`[Audit - Live] Interface down: ${r.u} \u2194 ${r.v}`, 'status-error');
        else if (_sub === 'other' && bridgeAuditFlagMissing)
          setStatus(`[Audit - Live] Missing LLDP neighbor: ${r.u} \u2194 ${r.v} \u2014 ${r.msg}`, 'status-error');
      }
    });
  }
  if (orphans && orphans.length && bridgeAuditFlagOrphan) {
    orphans.forEach(o => {
      setStatus(`[Audit - Live] New LLDP neighbor: ${o.localDev}:${o.localIf} \u2194 ${o.remDev}:${o.remIf}`, 'status-error');
    });
  }
  // L1 errors — reads from bridgePortL1Errors SSoT (no ad-hoc re-derivation from dsData)
  if (bridgeAuditFlagL1Errors && results) {
    results.forEach(r => {
      const uErr = bridgePortL1Errors[r.u], vErr = bridgePortL1Errors[r.v];
      if (uErr || vErr) {
        const detail = _l1ErrDetail(r.u, uErr, r.v, vErr);
        setStatus(`[Audit - Live] L1 errors: ${r.u} \u2194 ${r.v} \u2014 ${detail}`, 'status-warning');
      }
    });
  }
  // [Bridge] cmd failures: operational, not replayed — only emit when dsData provided
  if (dsData) {
    Object.entries(dsData).forEach(([devId, ds]) => {
      if (ds && ds.ok && ds.cmdErrors) {
        Object.entries(ds.cmdErrors).forEach(([cmd, err]) => {
          setStatus(`[Bridge] Cmd failed on ${devId}: ${cmd.replace('show ', '')} (${err})`, 'status-error');
        });
      }
    });
  }
}

function _renderLldpResults(results, orphans) {
  const container  = document.getElementById('bridgeResults');
  const sectionsEl = document.getElementById('bridgeResultSections');

  // ── SVG icons ─────────────────────────────────────────────────────────
  const svgCheck = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const svgX     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  const svgNoNbr = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`;
  const svgDown  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`;
  const svgShut  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`;
  const svgPart  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
  const svgUnk   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" stroke-dasharray="3 3"/></svg>`;
  const svgSkip  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
  const svgChev   = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M2 3l2.5 3L7 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const svgWarn   = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1L11 10H1L6 1Z" stroke="#d97706" stroke-width="1.4" stroke-linejoin="round"/><line x1="6" y1="4.5" x2="6" y2="7" stroke="#d97706" stroke-width="1.3" stroke-linecap="round"/><circle cx="6" cy="8.5" r="0.6" fill="#d97706"/></svg>`;
  const svgErrDis = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="7" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;

  // ── Classify by bridgePortStatus / bridgePortSubType — single source ──
  const mismatchR = [], noNbrR = [], noNbrErrDisR = [], noNbrDownR = [], noNbrShutR = [], okR = [], noeosR = [];

  results.forEach(r => {
    if (r.status === 'match') { okR.push(r); return; }
    if (r.status === 'partial' || r.status === 'unknown' || r.status === 'skip') { noeosR.push(r); return; }
    if (r.status === 'mismatch') {
      const uSt = bridgePortStatus[r.u], vSt = bridgePortStatus[r.v];
      if (uSt === 'mismatch' || vSt === 'mismatch') { mismatchR.push(r); return; }
      // No-neighbour: sub-classify from bridgePortSubType (populated at bridge-check time), priority errdis > shut > down
      const uSub = bridgePortSubType[r.u] || 'other', vSub = bridgePortSubType[r.v] || 'other';
      if (uSub === 'errdis' || vSub === 'errdis') { noNbrErrDisR.push(r); return; }
      if (uSub === 'shut'   || vSub === 'shut')   { noNbrShutR.push(r); return; }
      if (uSub === 'down'   || vSub === 'down')   { noNbrDownR.push(r); return; }
      noNbrR.push(r);
    }
  });

  // ── L1 error classification — reads from bridgePortL1Errors SSoT ─────
  const l1ErrR = [];
  results.forEach(r => {
    const uErr = bridgePortL1Errors[r.u], vErr = bridgePortL1Errors[r.v];
    if (uErr || vErr) l1ErrR.push({ r, uErr, vErr });
  });

  const orphanCount = orphans ? orphans.length : 0;
  const issueCount  = orphanCount + mismatchR.length + noNbrR.length + noNbrErrDisR.length + noNbrDownR.length + noNbrShutR.length + l1ErrR.length;
  const skipCount   = results.filter(r => r.status === 'skip').length;
  const checkable   = results.length - skipCount;

  // ── Row renderer ───────────────────────────────────────────────────────
  function rowHtml(r, icon, cls, detail, rowTitle, dotCls) {
    const clickable = r.status !== 'skip' && r.status !== 'unknown';
    const attrs = clickable
      ? ` onclick="_selectBridgeLink('${r.u}','${r.v}')" title="${rowTitle}"`
      : (rowTitle ? ` title="${rowTitle}"` : '');
    const dot = dotCls ? `<span class="bridge-port-dot ${dotCls}" style="margin-right:3px"></span>` : '';
    return `<div class="bridge-result-row ${cls}"${attrs}><span class="bridge-row-icon">${dot}${icon}</span><span class="bridge-row-cable">${r.u} ↔ ${r.v}</span>${detail ? `<span class="bridge-row-detail">${detail}</span>` : ''}</div>`;
  }

  // ── Sub-section builder ────────────────────────────────────────────────
  function subHtml(label, count, bodyHtml) {
    return `<div class="br-sub"><div class="br-sub-hdr"><span class="br-sub-label">${label}</span><span class="br-sub-count">${count}</span></div><div class="br-sub-list">${bodyHtml}</div></div>`;
  }

  // ── Section builder ────────────────────────────────────────────────────
  function isCollapsed(key) {
    try { const v = localStorage.getItem('bridgeSec_' + key); if (v !== null) return v === '0'; } catch(e) {}
    return key !== 'issues'; // Issues open by default; OK and No EOS collapsed
  }
  function secHtml(key, title, badgeCls, badgeText, bodyHtml, hidden) {
    const col = isCollapsed(key);
    return `<div class="br-sec"${hidden ? ' style="display:none"' : ''}><div class="br-sec-hdr" onclick="_toggleBrSec('${key}')"><span class="br-chev${col ? ' collapsed' : ''}" id="brChev_${key}">${svgChev}</span><span class="br-sec-title">${title}</span><span class="br-sec-badge ${badgeCls}">${badgeText}</span></div><div class="br-sec-body${col ? ' collapsed' : ''}" id="brSecBody_${key}">${bodyHtml}</div></div>`;
  }

  // ── Issues section body — order matches audit modal: LLDP group / Int State group
  // LLDP: New LLDP neighbor / LLDP Mismatch / INT Up - no LLDP neighbor
  // Int State: L1 errors / No link / Err-Dis / Disabled
  const issueParts = [];
  if (orphanCount) {
    const rows = orphans.map((o, i) =>
      `<label class="bridge-disc-row"><input type="checkbox" class="bridge-disc-check" id="disc_${i}" data-pair="${encodeURIComponent(JSON.stringify(o))}"><span class="bridge-port-dot bridge-port-mismatch"></span><span class="bridge-disc-cable">${o.localDev}:${o.localIf} ↔ ${o.remDev}:${o.remIf}</span></label>`
    ).join('');
    issueParts.push(
      subHtml('New LLDP neighbor', orphanCount, `<div id="bridgeDiscoveredList" class="bridge-disc-list">${rows}</div>`) +
      `<div class="bridge-disc-actions"><button id="btnAddDiscovered" class="btn-mono" onclick="addSelectedDiscovered()">Add Selected</button></div>`
    );
  }
  if (mismatchR.length) {
    issueParts.push(subHtml('LLDP Mismatch', mismatchR.length,
      mismatchR.map(r => rowHtml(r, svgX, 'bridge-row-fail', r.msg, 'LLDP mismatch — click to select link', 'bridge-port-mismatch')).join('')));
  }
  if (noNbrR.length) {
    issueParts.push(subHtml('INT Up - no LLDP neighbor', noNbrR.length,
      noNbrR.map(r => rowHtml(r, svgNoNbr, 'bridge-row-fail', r.msg, 'No LLDP neighbor — interface is up but no peer seen', 'bridge-port-missing')).join('')));
  }
  if (l1ErrR.length) {
    issueParts.push(subHtml('L1 errors (CRC / FCS)', l1ErrR.length,
      l1ErrR.map(({ r, uErr, vErr }) => {
        const detail  = _l1ErrDetail(r.u, uErr, r.v, vErr);
        const sub = bridgePortSubType[r.u] || bridgePortSubType[r.v] || 'other';
        const baseCls = sub === 'errdis' ? 'bridge-port-errdis' : sub === 'down' ? 'bridge-port-down' : 'bridge-port-mismatch';
        return rowHtml(r, svgWarn, 'bridge-row-l1', detail, 'L1 errors detected — click to select link', baseCls + ' has-l1');
      }).join('')));
  }
  if (noNbrDownR.length) {
    issueParts.push(subHtml('No link (notconnect)', noNbrDownR.length,
      noNbrDownR.map(r => {
        const l1 = _l1ErrDetail(r.u, bridgePortL1Errors[r.u], r.v, bridgePortL1Errors[r.v]);
        return rowHtml(r, svgDown, 'bridge-row-part', r.msg + (l1 ? ' | ' + l1 : ''), 'Link is physically down — click to select link', 'bridge-port-down' + _linkL1Cls(r.u, r.v));
      }).join('')));
  }
  if (noNbrErrDisR.length) {
    issueParts.push(subHtml('Err-Dis (errdisabled)', noNbrErrDisR.length,
      noNbrErrDisR.map(r => {
        const l1 = _l1ErrDetail(r.u, bridgePortL1Errors[r.u], r.v, bridgePortL1Errors[r.v]);
        return rowHtml(r, svgErrDis, 'bridge-row-errdis', l1 || r.msg, 'Errdisabled — protocol shutdown — click to select link', 'bridge-port-errdis' + _linkL1Cls(r.u, r.v));
      }).join('')));
  }
  if (noNbrShutR.length) {
    issueParts.push(subHtml('Disabled (admin shut)', noNbrShutR.length,
      noNbrShutR.map(r => {
        const l1 = _l1ErrDetail(r.u, bridgePortL1Errors[r.u], r.v, bridgePortL1Errors[r.v]);
        return rowHtml(r, svgShut, 'bridge-row-shut', l1, 'Admin shutdown — click to select link', 'bridge-port-shut' + _linkL1Cls(r.u, r.v));
      }).join('')));
  }
  const issueBody   = issueParts.join('') || `<div class="br-empty-msg">No issues found</div>`;
  const issueBadge  = issueCount > 0 ? ['br-sec-badge-red', String(issueCount)] : ['br-sec-badge-green', 'Clean'];

  // ── OK section body ────────────────────────────────────────────────────
  const okBody = okR.map(r => rowHtml(r, svgCheck, 'bridge-row-ok', '', 'Click to select this link in topology', 'bridge-port-match')).join('')
    || `<div class="br-empty-msg">No matched links</div>`;

  // ── Other section body (partial / unknown / excluded) ──────────────────
  const otherBody = noeosR.map(r => {
    if (r.status === 'partial') return rowHtml(r, svgPart, 'bridge-row-part', 'SSH failed — ' + r.msg, 'Partial: one or both sides unreachable via SSH', 'bridge-port-missing-quiet');
    if (r.status === 'unknown') return rowHtml(r, svgUnk, 'bridge-row-unk', 'Not queried — no DNS/IP configured', 'Neither device was included in the bridge check (no IP set)');
    return rowHtml(r, svgSkip, 'bridge-row-skip', 'Excluded — ' + r.msg, 'Non-Arista or excluded from bridge check');
  }).join('') || `<div class="br-empty-msg">No other links</div>`;

  // ── Interface States title with total link count ────────────────────────
  const titleHtml = `<div class="bridge-results-title"><span>Interface States</span><span class="br-total-badge">${results.length}</span></div><div class="info-box info-box--dim" style="margin:4px 0 6px;font-size:10px;">Audit icon in toolbar shows issue count — click to open audit details &amp; toggle checks</div>`;

  // ── Assemble all sections ──────────────────────────────────────────────
  sectionsEl.innerHTML = titleHtml +
    secHtml('issues', 'Issues', issueBadge[0], issueBadge[1], issueBody, false) +
    secHtml('ok',     'OK',     'br-sec-badge-green', `${okR.length}/${checkable}`, okBody, false) +
    secHtml('other',  'Other',  'br-sec-badge-gray',  String(noeosR.length), otherBody, noeosR.length === 0);

  container.style.display = 'block';
  _setBridgeOrphanBadge(orphanCount);
}

function _toggleBrSec(key) {
  const body = document.getElementById('brSecBody_' + key);
  const chev = document.getElementById('brChev_' + key);
  if (!body) return;
  const nowCollapsed = body.classList.toggle('collapsed');
  chev.classList.toggle('collapsed', nowCollapsed);
  try { localStorage.setItem('bridgeSec_' + key, nowCollapsed ? '0' : '1'); } catch(e) {}
}

function addSelectedDiscovered() {
  const checked = Array.from(document.querySelectorAll('.bridge-disc-check:checked'));
  if (!checked.length) { setStatus('No links selected — check boxes first', 'status-error'); return; }
  const btn = document.getElementById('btnAddDiscovered');
  btn.disabled = true;
  btn.textContent = 'Adding…';
  const n = checked.length;
  setStatus(`Adding ${n} discovered link${n > 1 ? 's' : ''} to sheet…`, 'status-info');

  let pending = n, added = 0, errors = [];
  checked.forEach(cb => {
    const o = JSON.parse(decodeURIComponent(cb.dataset.pair));
    google.script.run
      .withSuccessHandler(res => {
        pending--;
        if (res && res.error) errors.push(o.localDev + ':' + o.localIf + ' — ' + res.error);
        else added++;
        if (pending === 0) _onAddDiscoveredDone(btn, added, errors);
      })
      .withFailureHandler(err => {
        pending--;
        errors.push(o.localDev + ':' + o.localIf + ' — ' + (err.message || 'Server error'));
        if (pending === 0) _onAddDiscoveredDone(btn, added, errors);
      })
      .addLinkPair(o.localDev, o.localIf, o.remDev, o.remIf, {}, {});
  });
}

function _onAddDiscoveredDone(btn, added, errors) {
  btn.disabled = false;
  btn.textContent = 'Add Selected';
  if (errors.length) {
    const msg = `${added} link${added !== 1 ? 's' : ''} added \u00b7 ${errors.length} failed \u2014 topology refresh\u2026`;
    setStatus(msg, 'status-error');
    setStatus('Could not add: ' + errors.join(', '), 'status-error');
    if (added > 0) fetchData(true);
  } else {
    setStatus(`${added} link${added !== 1 ? 's' : ''} added \u2014 topology refresh\u2026`, 'status-ok');
    fetchData(true);
  }
}

/**
* Shared grouping logic for cabling export and copy functions.
* Returns { cableGroups, sheetIndexMap }.
* DUPLICATED in Code.gs (as _buildCableGroupsForTest) — last synced: 2026-04-26
*/
function buildCableGroups() {
  if (!currentData || !currentData.nodes) return { cableGroups: {}, sheetIndexMap: {} };
  const sheetOrderNames = currentData.nodes.map(n => n.id);
  const sheetIndexMap = {};
  sheetOrderNames.forEach((name, index) => sheetIndexMap[name] = index);

  const cableGroups = {};

  globalLinks.forEach(link => {
    let nodeA = allNodesData[link.u];
    let nodeB = allNodesData[link.v];
    if (!nodeA || !nodeB) return;

    let compareResult = nodeA.device.localeCompare(nodeB.device, undefined, { numeric: true, sensitivity: 'base' });
    let first = (compareResult <= 0) ? nodeA : nodeB;
    let second = (compareResult <= 0) ? nodeB : nodeA;

    // Snake self-loops (same device on both ends) are plain loopback cables.
    // Force non-breakout so a breakout primary port (e.g. Et14/4) doesn't create
    // a phantom breakout group — they always take Scenario B (one standard cable row).
    const isSelfLoop = nodeA.device === nodeB.device;

    // Non-Arista devices (IXIA, Spirent) use card/port slash notation (e.g. Et5/22)
    // that is NOT a QSFP-DD breakout — suppress breakout detection for their side.
    const devAIsNonArista = allDevicesData[first.device]?.type === 'non-arista';
    const devBIsNonArista = allDevicesData[second.device]?.type === 'non-arista';
    // xcvr_speed_ holds the physical transceiver speed (e.g. "100g-4" for QSFP-DD).
    // Fall back to et_speed_ if xcvr_speed_ is not set.
    let speedA_raw = (first.details.xcvr_speed_ || first.details.et_speed_ || "").trim();
    let speedB_raw = (second.details.xcvr_speed_ || second.details.et_speed_ || "").trim();
    if (speedA_raw.toLowerCase() === 'auto') speedA_raw = '';
    if (speedB_raw.toLowerCase() === 'auto') speedB_raw = '';

    // Breakout detection: port has slash AND is a multi-lane transceiver.
    // Two signals for multi-lane:
    //   1. xcvr_speed_ in aggregate format (e.g. "100g-4") — explicit lane count
    //   2. xcvr_type_ starts with QSFP/OSFP — multi-lane capable (e.g. QSFP100 in 4x25G mode
    //      stores xcvr_speed_="25g" per lane, not aggregate)
    // Chassis native SFP ports (e.g. Et3/1 SFP25) have slash but xcvr_type_="SFP25" (no QSFP
    // prefix) and no aggregate speed — correctly excluded.
    const aggA = speedA_raw.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
    const aggB = speedB_raw.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
    const xcvrA = (first.details.xcvr_type_  || "").trim();
    const xcvrB = (second.details.xcvr_type_ || "").trim();
    const isMultiLaneA = !!aggA || /^[OQ]SFP/i.test(xcvrA);
    const isMultiLaneB = !!aggB || /^[OQ]SFP/i.test(xcvrB);

    let isBreakoutA = !isSelfLoop && !devAIsNonArista && first.name.includes('/') && isMultiLaneA;
    let isBreakoutB = !isSelfLoop && !devBIsNonArista && second.name.includes('/') && isMultiLaneB;
    let phyPortA = (devAIsNonArista || !isBreakoutA) ? first.name : getPhysicalPortParent(first.name);
    let phyPortB = (devBIsNonArista || !isBreakoutB) ? second.name : getPhysicalPortParent(second.name);

    let groupKey;
    if (isBreakoutA && !isBreakoutB && aggA) {
      // A has aggregate xcvr_speed_ → confirmed QSFP-DD; group by phyPortA, drop B port
      groupKey = `${first.device}:${phyPortA} <-> ${second.device}`;
    } else if (isBreakoutB && !isBreakoutA && aggB) {
      // B has aggregate xcvr_speed_ → confirmed QSFP-DD; drop A port
      groupKey = `${first.device} <-> ${second.device}:${phyPortB}`;
    } else if (isBreakoutA && isBreakoutB && aggA && !aggB) {
      // Both slash but only A has aggregate speed → A is QSFP, B ports are individual SFPs
      groupKey = `${first.device}:${phyPortA} <-> ${second.device}`;
    } else if (isBreakoutA && isBreakoutB && aggB && !aggA) {
      // Both slash but only B has aggregate speed → B is QSFP, A ports are individual SFPs
      groupKey = `${first.device} <-> ${second.device}:${phyPortB}`;
    } else if (isBreakoutA && isBreakoutB && aggA && aggB) {
      // Both sides have aggregate speed → true breakout-to-breakout (Scenario A)
      groupKey = `${first.device}:${phyPortA} <-> ${second.device}:${phyPortB}`;
    } else {
      // No aggregate speed — slash is card/port style or standard cable; each link is its own
      groupKey = `${first.device}:${first.name} <-> ${second.device}:${second.name}`;
    }

    if (!cableGroups[groupKey]) {
      cableGroups[groupKey] = {
        devA: first.device, phyA: phyPortA,
        devB: second.device, phyB: phyPortB,
        isBreakoutA, isBreakoutB, links: [],
        speedA: first.details.xcvr_speed_ || first.details.et_speed_ || "",
        speedB: second.details.xcvr_speed_ || second.details.et_speed_ || "",
        xcvrA: first.details.xcvr_type_ || "",
        xcvrB: second.details.xcvr_type_ || ""
      };
    }
    cableGroups[groupKey].links.push({ portA: first.name, portB: second.name });
  });

  return { cableGroups, sheetIndexMap };
}

// Mirrors the Topology Patching List mixed-breakout detection:
// The QSFP aggregate side (Xg-N speed) is NOT "Breakout"; the SFP lane side IS.
// Falls back to port-slash notation only when speed cannot determine orientation.
function _breakoutSides(g) {
  const count = g.links.length;
  if (count <= 1) return { a: false, b: false };
  const sA = (g.speedA || "").trim().toLowerCase() === 'auto' ? '' : (g.speedA || "").trim();
  const sB = (g.speedB || "").trim().toLowerCase() === 'auto' ? '' : (g.speedB || "").trim();
  const lA = sA.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
  const lB = sB.match(/^(\d+(?:\.\d+)?)[gt]-(\d+)$/i);
  if (lA && !lB && parseInt(lA[2]) === count) return { a: false, b: true }; // A is QSFP aggregate
  if (lB && !lA && parseInt(lB[2]) === count) return { a: true, b: false }; // B is QSFP aggregate
  // Convert speed string to Gbps for ratio comparison — handles both g (Gbps) and t (Tbps) suffixes.
  const _gbps = s => { const m = s.match(/^(\d+(?:\.\d+)?)(g|t)/i); return m ? Math.round(parseFloat(m[1]) * (/t/i.test(m[2]) ? 1000 : 1)) : 0; };
  const sAn = _gbps(sA);
  const sBn = _gbps(sB);
  if (sAn > 0 && sBn > 0 && sAn !== sBn) {
    if (sAn * count === sBn) return { a: true, b: false };  // A is SFP lane
    if (sBn * count === sAn) return { a: false, b: true };  // B is SFP lane
  }
  // Fallback: port-slash tells us which side is the QSFP-DD breakout aggregate.
  // The slash side is the QSFP aggregate (bo=false = no Breakout label, collapsed to phyPort);
  // the plain side is the lane endpoint (bo=true = Breakout label, individual ports shown).
  if (g.isBreakoutA && !g.isBreakoutB) return { a: false, b: true };
  if (g.isBreakoutB && !g.isBreakoutA) return { a: true, b: false };
  return { a: false, b: false };
}

// Sort cable groups: primary = anchor device sheet index (lowest), secondary = anchor port (natural).
// Also sorts g.links within each group by portA then portB (natural) so breakout lanes appear in order.
function _sortCableGroups(cableGroups, sheetIndexMap) {
  return Object.values(cableGroups)
    .map(g => {
      g.links.sort((la, lb) => {
        const ca = la.portA.localeCompare(lb.portA, undefined, { numeric: true });
        return ca !== 0 ? ca : la.portB.localeCompare(lb.portB, undefined, { numeric: true });
      });
      return g;
    })
    .sort((a, b) => {
      // devA is always alphabetically first (fixed by buildCableGroups).
      // Sort by devA's sheet position first, then devA's port — consistently left-side anchored.
      const ia = sheetIndexMap[a.devA] ?? 9999;
      const ib = sheetIndexMap[b.devA] ?? 9999;
      if (ia !== ib) return ia - ib;
      return a.phyA.localeCompare(b.phyA, undefined, { numeric: true });
    });
}

const _CABLING_BRIDGE_CATS = [
  { val: 'mismatch', label: 'Mismatch' },
  { val: 'missing',  label: 'Miss'     },
  { val: 'errdis',   label: 'ErrDis'   },
  { val: 'down',     label: 'Down'     },
  { val: 'shut',     label: 'Shut'     },
  { val: 'l1',       label: 'Error'    },
];

// Returns Set of bridge issue categories for a cable group.
// Uses bridgePortStatus/SubType (LLDP) and bridgePortL1Errors (error counters) as SSoT.
function _cableGroupBridgeCategories(group) {
  const cats = new Set();
  (group.links || []).forEach(function(lnk) {
    const pidA = group.devA + ':' + lnk.portA;
    const pidB = group.devB + ':' + lnk.portB;
    const stA = bridgePortStatus[pidA];
    const stB = bridgePortStatus[pidB];
    // Mismatch: either port
    if (stA === 'mismatch' || stB === 'mismatch') cats.add('mismatch');
    // Missing: link-level priority (errdis > shut > down > other) — same logic as audit
    if (stA === 'missing' || stB === 'missing') {
      const subA = bridgePortSubType[pidA] || 'other';
      const subB = bridgePortSubType[pidB] || 'other';
      const sub = (subA === 'errdis' || subB === 'errdis') ? 'errdis'
                : (subA === 'shut'   || subB === 'shut')   ? 'shut'
                : (subA === 'down'   || subB === 'down')   ? 'down' : 'other';
      cats.add(sub === 'errdis' ? 'errdis' : sub === 'shut' ? 'shut' : sub === 'down' ? 'down' : 'missing');
    }
    // L1 errors: per-port (no link-level priority)
    if (bridgePortL1Errors[pidA]) cats.add('l1');
    if (bridgePortL1Errors[pidB]) cats.add('l1');
  });
  return cats;
}

// Returns a human-readable issues string for a cable group (used in export Issues column).
// Reads bridgePortStatus/SubType for LLDP issues; _lastBridgeResults for mismatch detail;
// bridgePortL1Errors for FCS/sym/align error counts.
function _cableGroupIssueReason(group) {
  const mismatchMsg = {};
  if (_lastBridgeResults) {
    _lastBridgeResults.forEach(function(r) {
      if (r.status === 'mismatch') { mismatchMsg[r.u] = r.msg || ''; mismatchMsg[r.v] = r.msg || ''; }
    });
  }
  const seen = new Set();
  const parts = [];
  (group.links || []).forEach(function(lnk) {
    [[group.devA, lnk.portA], [group.devB, lnk.portB]].forEach(function(pair) {
      const pid = pair[0] + ':' + pair[1];
      const st = bridgePortStatus[pid];
      if (st && st !== 'match') {
        let reason;
        if (st === 'mismatch') reason = mismatchMsg[pid] ? 'Mismatch: ' + mismatchMsg[pid] : 'Mismatch';
        else {
          const sub = bridgePortSubType[pid];
          reason = sub === 'shut' ? 'Shut (admin disabled)' : sub === 'down' ? 'Down (link not connected)' : 'Missing (no LLDP neighbor)';
        }
        if (!seen.has(reason)) { seen.add(reason); parts.push(reason); }
      }
      const errs = bridgePortL1Errors[pid];
      if (errs) {
        const ep = [];
        if (errs.fcs)   ep.push('FCS=' + errs.fcs);
        if (errs.sym)   ep.push('sym=' + errs.sym);
        if (errs.align) ep.push('align=' + errs.align);
        if (ep.length) {
          const reason = 'L1: ' + ep.join(' ');
          if (!seen.has(reason)) { seen.add(reason); parts.push(reason); }
        }
      }
    });
  });
  return parts.join('; ');
}

// Filter a sorted cable-groups array to those matching the active _cablingBridgeFilter.
// Empty filter → return all (no filter). Multi-select = union.
function _filterCableGroupsByBridge(sortedGroups) {
  if (!_cablingBridgeFilter.size) return sortedGroups;
  return sortedGroups.filter(function(g) {
    const cats = _cableGroupBridgeCategories(g);
    for (const cat of _cablingBridgeFilter) { if (cats.has(cat)) return true; }
    return false;
  });
}

function _renderCablingBridgeFilter() {
  const bar = document.getElementById('cablingBridgeFilterBar');
  if (!bar) return;
  const hasBridge = Object.keys(bridgePortStatus).length > 0 || Object.keys(bridgePortL1Errors).length > 0;
  const counts = {};
  _CABLING_BRIDGE_CATS.forEach(function(c) { counts[c.val] = 0; });
  let allSorted = [], filtered = [];
  if (hasBridge) {
    const built = buildCableGroups();
    allSorted = _sortCableGroups(built.cableGroups, built.sheetIndexMap);
    allSorted.forEach(function(g) {
      _cableGroupBridgeCategories(g).forEach(function(cat) { if (cat in counts) counts[cat]++; });
    });
    filtered = _filterCableGroupsByBridge(allSorted);
  }
  const isFiltered = _cablingBridgeFilter.size > 0 && hasBridge;
  const zeroMatch  = isFiltered && filtered.length === 0;
  const pills = _CABLING_BRIDGE_CATS.map(function(c) {
    const active = _cablingBridgeFilter.has(c.val);
    const cnt = counts[c.val] || 0;
    const disabled = !hasBridge || cnt === 0;
    return '<button class="cabling-pill' + (active ? ' cabling-pill-active' : '') + '"'
      + (disabled ? ' disabled' : ` onclick="_toggleCablingBridgeFilter('${c.val}')"`)
      + '>' + c.label + ' (' + cnt + ')</button>';
  }).join('');
  const summary = (isFiltered && !zeroMatch)
    ? '<span class="cabling-filter-summary">' + filtered.length + '/' + allSorted.length + '</span>'
    : '';
  const noData = !hasBridge ? ' disabled title="No bridge data — run a Device Bridge check first"' : '';
  let html = '<div class="cabling-filter-row">'
    + '<span class="cabling-filter-label" style="margin:0;white-space:nowrap;">Filter by Issues:</span>'
    + '<button class="cabling-filter-ctrl"' + noData + ' onclick="_cablingBridgeSelectAll()">All</button>'
    + '<button class="cabling-filter-ctrl"' + noData + ' onclick="_cablingBridgeSelectNone()">None</button>'
    + '<div class="cabling-filter-sep"></div>'
    + pills
    + summary
    + '</div>';
  if (!hasBridge) {
    html += '<div class="cabling-note">Run Device Bridge to enable issue filtering</div>';
  } else if (zeroMatch) {
    html += '<div class="cabling-note">No cables match the current filter</div>';
  }
  bar.innerHTML = html;

  // Count badges on section titles
  const countText = (isFiltered && !zeroMatch) ? filtered.length + '/' + allSorted.length : '';
  ['cablingTopoCount', 'cablingDeviceCount'].forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = countText;
    el.style.display = countText ? 'inline' : 'none';
  });

  // Disable all action buttons when filter is active but nothing matches
  ['btnCablingMd', 'btnCablingCsv', 'btnCablingViewNetlist', 'btnCablingDownloadNetlist',
   'btnCablingViewDevice', 'btnCablingDownloadDevice'].forEach(function(id) {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = zeroMatch;
  });
}

function _toggleCablingBridgeFilter(cat) {
  if (_cablingBridgeFilter.has(cat)) _cablingBridgeFilter.delete(cat);
  else _cablingBridgeFilter.add(cat);
  _renderCablingBridgeFilter();
}

function _cablingBridgeSelectAll() {
  _CABLING_BRIDGE_CATS.forEach(function(c) { _cablingBridgeFilter.add(c.val); });
  _renderCablingBridgeFilter();
}

function _cablingBridgeSelectNone() {
  _cablingBridgeFilter.clear();
  _renderCablingBridgeFilter();
}

function copyCablingCsv() {
  if (!currentData || !currentData.nodes) { setStatus('No topology data found. Please refresh.', 'status-error'); return; }
  const { cableGroups, sheetIndexMap } = buildCableGroups();
  const sorted = _filterCableGroupsByBridge(_sortCableGroups(cableGroups, sheetIndexMap));
  const hasBridgeData = Object.keys(bridgePortStatus).length > 0 || Object.keys(bridgePortL1Errors).length > 0;
  const cleanSpeed = s => { const v = (s || "").trim(); if (v.toLowerCase() === 'auto') return ''; if (v.toUpperCase().includes('BASE-T')) return '1g'; return v; };
  const xcvrLabel = (x, bo) => { const v = (x || "").trim(); return bo ? (v ? `${v} (Breakout)` : "(Breakout)") : v; };
  const q = s => `"${String(s).replace(/"/g, '""')}"`;
  const devModel = name => (deviceMetadata[name] || {}).model || (devStatusMap[name] || {}).platform || '';
  const devRack  = name => (deviceMetadata[name] || {}).rack || '';
  const header = 'Device A,Model A,Rack A,Port A,Xcvr A,Speed A,Speed B,Xcvr B,Port B,Device B,Model B,Rack B' + (hasBridgeData ? ',Issues' : '');
  const rows = [header];
  sorted.forEach(g => {
    const bo = _breakoutSides(g);
    const isMulti = g.links.length > 1;
    // Scenario A (QSFP/OSFP ↔ QSFP/OSFP, laser lane split): physically ONE cable.
    // Splitter cables are always 1-to-N: one QSFP/OSFP aggregate end → 2, 4, or 8 individual SFP ends.
    // Two QSFP/OSFP connectors facing each other = single cable (laser lane split), never dual harnesses.
    // So both-side slash + both-side aggX = single cable → one row.
    const linksToRender = (isMulti && g.isBreakoutA && g.isBreakoutB) ? [g.links[0]] : g.links;
    const issue = hasBridgeData ? _cableGroupIssueReason(g) : '';
    linksToRender.forEach(l => {
      const portA = (isMulti && !bo.a) ? g.phyA : l.portA;
      const portB = (isMulti && !bo.b) ? g.phyB : l.portB;
      const rowData = [
        q(g.devA), q(devModel(g.devA)), q(devRack(g.devA)),
        q(portA), q(xcvrLabel(g.xcvrA, bo.a)), q(cleanSpeed(g.speedA)),
        q(cleanSpeed(g.speedB)), q(xcvrLabel(g.xcvrB, bo.b)), q(portB),
        q(g.devB), q(devModel(g.devB)), q(devRack(g.devB))
      ];
      if (hasBridgeData) rowData.push(q(issue));
      rows.push(rowData.join(','));
    });
  });
  handleCopy(rows.join('\n'), 'btnCablingCsv');
}

function _buildCablingMarkdownStr() {

  const esc = s => String(s).replace(/\|/g, '\\|');
  const devModel = name => (deviceMetadata[name] || {}).model || (devStatusMap[name] || {}).platform || '';
  const devRack  = name => (deviceMetadata[name] || {}).rack || '';
  const headerRow = '| Device A | Model A | Rack A | Port A | Xcvr A | Speed A | Speed B | Xcvr B | Port B | Device B | Model B | Rack B |' + (hasBridgeData ? ' Issues |' : '');
  const sepRow    = '|---|---|---|---|---|---|---|---|---|---|---|---|' + (hasBridgeData ? '---|' : '');
  const lines = [headerRow, sepRow];
  sorted.forEach(g => {
    const bo = _breakoutSides(g);
    const isMulti = g.links.length > 1;
    // Scenario A (QSFP/OSFP ↔ QSFP/OSFP, laser lane split): physically ONE cable.
    // Splitter cables are always 1-to-N: one QSFP/OSFP aggregate end → 2, 4, or 8 individual SFP ends.
    // Two QSFP/OSFP connectors facing each other = single cable (laser lane split), never dual harnesses.
    // So both-side slash + both-side aggX = single cable → one row.
    const linksToRender = (isMulti && g.isBreakoutA && g.isBreakoutB) ? [g.links[0]] : g.links;
    const issue = hasBridgeData ? _cableGroupIssueReason(g) : '';
    linksToRender.forEach(l => {
      const portA = (isMulti && !bo.a) ? g.phyA : l.portA;
      const portB = (isMulti && !bo.b) ? g.phyB : l.portB;
      lines.push(`| ${esc(g.devA)} | ${esc(devModel(g.devA))} | ${esc(devRack(g.devA))} | ${esc(portA)} | ${esc(xcvrLabel(g.xcvrA, bo.a))} | ${esc(cleanSpeed(g.speedA))} | ${esc(cleanSpeed(g.speedB))} | ${esc(xcvrLabel(g.xcvrB, bo.b))} | ${esc(portB)} | ${esc(g.devB)} | ${esc(devModel(g.devB))} | ${esc(devRack(g.devB))} |` + (hasBridgeData ? ` ${esc(issue)} |` : ''));
    });
  });
  return lines.join('\n');
}
